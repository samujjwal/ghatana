 * Generic Adaptive Agent (GAA) - Memory Event Contracts
 * Version: 2.0.0
 * 
 * This file defines the event-sourced memory contracts for the GAA framework.
 * All agent memory operations are captured as immutable events in the EventLog.
 */
syntax = "proto3";

package ghatana.contracts.agent.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/any.proto";

option go_package = "github.com/ghatana/contracts/gen/go/agent/v1;agentv1";
option java_multiple_files = true;
option java_package = "com.ghatana.contracts.agent.v1";
option java_outer_classname = "MemoryEventsProto";
option csharp_namespace = "Ghatana.Contracts.Agent.V1";

// ============================================================================
// EPISODIC MEMORY: What happened?
// ============================================================================

message MemoryCaptured {
  // Event identification
  string event_id = 1;                // UUID for this event
  int32 schema_version = 2;           // For evolution (current: 1)
  
  // Episode identification
  string episode_id = 3;              // UUID for this episode
  string agent_id = 4;                // Which agent
  string tenant_id = 5;               // Multi-tenancy
  string session_id = 6;              // Conversation session
  string workspace_id = 7;            // Optional workspace scope
  string user_id = 8;                 // Optional user context

  // Input
  string user_prompt = 9;
  google.protobuf.Struct task_context = 10;
  MultiModalInput multi_modal_input = 11;

  // Agent process artifacts (privacy-preserving)
  string reasoning_summary = 12;      // Safe-to-store explanation summary
  repeated ToolExecution tool_executions = 13;
  MemoryContextSnapshot memory_context_used = 14;

  // Output
  string agent_response = 15;
  MultiModalOutput multi_modal_output = 16;
  bool success = 17;
  double confidence = 18;             // 0.0-1.0

  // Performance
  google.protobuf.Duration duration = 19;
  CostMetrics cost = 20;

  // Governance
  RedactionLevel redaction_level = 21;
  int32 retention_days = 22;

  // Metadata
  google.protobuf.Timestamp created_at = 23;
  map<string, string> tags = 24;
}

message MultiModalInput {
  repeated ImageInput images = 1;
  repeated DocumentInput documents = 2;
  repeated AudioInput audio = 3;
  repeated FileInput files = 4;
}

message ImageInput {
  string image_id = 1;
  string mime_type = 2;
  string storage_url = 3;             // Reference, not raw bytes
  map<string, string> metadata = 4;
  int32 width = 5;
  int32 height = 6;
}

message DocumentInput {
  string doc_id = 1;
  string mime_type = 2;
  string storage_url = 3;
  string extracted_text = 4;          // For searchability
  map<string, string> metadata = 5;
}

message AudioInput {
  string audio_id = 1;
  string mime_type = 2;
  string storage_url = 3;
  string transcription = 4;
  int32 duration_seconds = 5;
  map<string, string> metadata = 6;
}

message FileInput {
  string file_id = 1;
  string mime_type = 2;
  string storage_url = 3;
  int64 size_bytes = 4;
  map<string, string> metadata = 5;
}

message MultiModalOutput {
  repeated ImageOutput images = 1;
  repeated FileOutput files = 2;
  repeated ChartOutput charts = 3;
}

message ImageOutput {
  string image_id = 1;
  string mime_type = 2;
  string storage_url = 3;
  string generation_prompt = 4;
  map<string, string> metadata = 5;
}

message FileOutput {
  string file_id = 1;
  string mime_type = 2;
  string storage_url = 3;
  int64 size_bytes = 4;
  map<string, string> metadata = 5;
}

message ChartOutput {
  string chart_id = 1;
  string chart_type = 2;              // bar, line, pie, etc.
  google.protobuf.Struct data = 3;
  string storage_url = 4;
}

message ToolExecution {
  string tool_name = 1;
  google.protobuf.Struct arguments = 2;
  string result = 3;
  bool success = 4;
  int64 duration_ms = 5;
  string error_message = 6;
  int32 retry_count = 7;
}

message MemoryContextSnapshot {
  repeated string policy_ids = 1;
  repeated string fact_ids = 2;
  repeated string episode_ids = 3;
  int32 total_tokens = 4;
  map<string, int32> retrieval_stats = 5;
}

message CostMetrics {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
  double cost_usd = 4;
  string model_used = 5;
  map<string, double> breakdown = 6;  // Per-operation costs
}

enum RedactionLevel {
  REDACTION_LEVEL_UNSPECIFIED = 0;
  NONE = 1;
  BASIC = 2;                          // Remove PII, secrets
  STRICT = 3;                         // Remove all sensitive data
  FULL = 4;                           // Store only metadata
}

// ============================================================================
// REFLECTIVE MEMORY: How did it go?
// ============================================================================

message OutcomeObserved {
  // Event identification
  string event_id = 1;
  
  // Episode reference
  string episode_id = 2;
  string agent_id = 3;
  string tenant_id = 4;

  // Outcome assessment
  bool success = 5;
  double utility_score = 6;           // 0.0-1.0
  string failure_reason = 7;
  ErrorCategory error_category = 8;

  // Feedback signals
  repeated string feedback_tags = 9;
  FeedbackSource feedback_source = 10;
  string feedback_text = 11;          // Optional user comment

  // Performance metrics
  double response_quality = 12;       // 0.0-1.0
  double user_satisfaction = 13;      // 0.0-1.0
  bool user_corrected = 14;
  string correction_details = 15;

  // Attribution
  google.protobuf.Timestamp observed_at = 16;
  string observed_by = 17;            // user_id or system
}

enum FeedbackSource {
  FEEDBACK_SOURCE_UNSPECIFIED = 0;
  IMPLICIT = 1;                       // Inferred
  EXPLICIT = 2;                       // User thumbs up/down
  AUTOMATED = 3;                      // Tests, build results
  HUMAN_REVIEW = 4;                   // Expert review
}

enum ErrorCategory {
  ERROR_CATEGORY_UNSPECIFIED = 0;
  TIMEOUT = 1;
  RATE_LIMIT = 2;
  VALIDATION = 3;
  PERMISSION = 4;
  TOOL_FAILURE = 5;
  LLM_ERROR = 6;
  LOGIC_ERROR = 7;
  DATA_ERROR = 8;
  NETWORK_ERROR = 9;
}

// ============================================================================
// SEMANTIC MEMORY: What is true?
// ============================================================================

message FactUpserted {
  // Event identification
  string event_id = 1;
  
  // Fact identification
  string fact_id = 2;                 // UUID
  string tenant_id = 3;
  string workspace_id = 4;            // Optional

  // Fact triple (subject-predicate-object)
  string domain = 5;                  // e.g., "project_conventions"
  string subject = 6;                 // e.g., "DateFormat"
  string predicate = 7;               // e.g., "must_be"
  string object = 8;                  // e.g., "ISO-8601"

  // Confidence & provenance
  double confidence = 9;              // 0.0-1.0
  ConfidenceSource confidence_source = 10;
  string source_episode_id = 11;
  repeated string evidence_refs = 12;
  int32 evidence_count = 13;

  // Temporal
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
  google.protobuf.Timestamp last_verified_at = 16;

  // Version & lifecycle
  int32 version = 17;
  FactStatus status = 18;

  // Relationships
  repeated MemoryRelationship relationships = 19;

  // Metadata
  map<string, string> metadata = 20;
}

enum ConfidenceSource {
  CONFIDENCE_SOURCE_UNSPECIFIED = 0;
  LEARNED = 1;                        // Extracted from episodes
  VALIDATED = 2;                      // Verified by multiple sources
  EXPERT = 3;                         // Provided by expert
  INFERRED = 4;                       // Logical inference
}

enum FactStatus {
  FACT_STATUS_UNSPECIFIED = 0;
  DRAFT = 1;
  ACTIVE = 2;
  DEPRECATED = 3;
  ARCHIVED = 4;
  UNDER_REVIEW = 5;
}

// ============================================================================
// PROCEDURAL MEMORY: How do we do it?
// ============================================================================

message PolicyUpserted {
  // Event identification
  string event_id = 1;
  
  // Policy identification
  string policy_id = 2;               // UUID
  string tenant_id = 3;
  string workspace_id = 4;            // Optional

  // Trigger condition
  string trigger_pattern = 5;
  map<string, string> trigger_context = 6;

  // Procedure steps
  repeated ProcedureStep required_steps = 7;
  map<string, string> constraints = 8;
  map<string, string> guardrails = 9;
  repeated string success_criteria = 10;

  // Learning metrics
  double success_rate = 11;           // 0.0-1.0
  int32 activation_count = 12;
  int32 success_count = 13;
  int32 failure_count = 14;
  double average_confidence = 15;

  // Temporal
  google.protobuf.Timestamp created_at = 16;
  google.protobuf.Timestamp updated_at = 17;
  google.protobuf.Timestamp last_used_at = 18;

  // Version & lifecycle
  int32 version = 19;
  PolicyStatus status = 20;

  // Relationships
  repeated MemoryRelationship relationships = 21;

  // Governance
  bool requires_human_review = 22;
  repeated string review_history = 23;
  string deprecation_reason = 24;
}

message ProcedureStep {
  int32 step_number = 1;
  string action = 2;
  string description = 3;
  repeated string preconditions = 4;
  repeated string postconditions = 5;
  bool optional = 6;
  string fallback_action = 7;
  map<string, string> parameters = 8;
}

enum PolicyStatus {
  POLICY_STATUS_UNSPECIFIED = 0;
  POLICY_DRAFT = 1;
  POLICY_UNDER_REVIEW = 2;
  POLICY_ACTIVE = 3;
  POLICY_DEPRECATED = 4;
  POLICY_ARCHIVED = 5;
}

// ============================================================================
// PREFERENCE MEMORY: User/Agent preferences
// ============================================================================

message PreferenceLearned {
  // Event identification
  string event_id = 1;
  
  // Preference identification
  string preference_id = 2;
  string tenant_id = 3;
  string agent_id = 4;
  string user_id = 5;                 // Optional

  // Preference data
  string category = 6;                // e.g., "code_style"
  string key = 7;                     // e.g., "verbosity"
  string value = 8;                   // e.g., "concise"
  PreferenceScope scope = 9;

  // Confidence & provenance
  double confidence = 10;
  string source_episode_id = 11;
  repeated string evidence_refs = 12;

  // Temporal
  google.protobuf.Timestamp learned_at = 13;
  google.protobuf.Timestamp updated_at = 14;

  // Override capability
  bool user_can_override = 15;
  string override_reason = 16;
  google.protobuf.Timestamp overridden_at = 17;
}

enum PreferenceScope {
  PREFERENCE_SCOPE_UNSPECIFIED = 0;
  SESSION = 1;                        // This conversation only
  USER = 2;                           // This user across sessions
  WORKSPACE = 3;                      // This project/workspace
  TENANT = 4;                         // Entire organization
  GLOBAL = 5;                         // Across all tenants (rare)
}

// ============================================================================
// MEMORY COMPACTION: Summarization events
// ============================================================================

message MemoryCompacted {
  // Event identification
  string event_id = 1;
  
  // Compaction identification
  string compaction_id = 2;
  string tenant_id = 3;
  string agent_id = 4;

  // Source data
  repeated string source_episode_ids = 5;
  string summary = 6;
  google.protobuf.Struct extracted_facts = 7;
  google.protobuf.Struct extracted_patterns = 8;

  // Compaction metadata
  CompactionStrategy strategy = 9;
  int32 original_size_bytes = 10;
  int32 compacted_size_bytes = 11;
  double compression_ratio = 12;

  // Temporal
  google.protobuf.Timestamp compacted_at = 13;
}

enum CompactionStrategy {
  COMPACTION_STRATEGY_UNSPECIFIED = 0;
  TIME_BASED = 1;                     // Compact old episodes
  SIZE_BASED = 2;                     // Compact when memory is full
  SIMILARITY_BASED = 3;               // Merge similar episodes
  LLM_SUMMARIZATION = 4;              // Use LLM to summarize
}

// ============================================================================
// MEMORY DELETION: Governance events
// ============================================================================

message MemoryDeleted {
  // Event identification
  string event_id = 1;
  
  // Deletion details
  repeated string memory_ids = 2;
  MemoryType memory_type = 3;
  string reason = 4;
  string deleted_by = 5;              // user_id or system
  
  // Governance
  bool gdpr_request = 6;
  bool retention_policy = 7;
  string approval_id = 8;

  // Temporal
  google.protobuf.Timestamp deleted_at = 9;
}

enum MemoryType {
  MEMORY_TYPE_UNSPECIFIED = 0;
  EPISODIC = 1;
  SEMANTIC = 2;
  PROCEDURAL = 3;
  PREFERENCE = 4;
  ALL = 5;
}

// ============================================================================
// MEMORY RELATIONSHIPS: Knowledge graph edges
// ============================================================================

message MemoryRelationship {
  string from_id = 1;
  string to_id = 2;
  RelationshipType relationship_type = 3;
  double strength = 4;                // 0.0-1.0
  map<string, string> metadata = 5;
  google.protobuf.Timestamp created_at = 6;
}

enum RelationshipType {
  RELATIONSHIP_TYPE_UNSPECIFIED = 0;
  REINFORCEMENT = 1;                  // Supports/strengthens
  CONTRADICTION = 2;                  // Conflicts with
  PREREQUISITE = 3;                   // Required before
  GENERALIZATION = 4;                 // More general than
  SPECIALIZATION = 5;                 // More specific than
  ALTERNATIVE = 6;                    // Alternative approach
  SUPERSEDES = 7;                     // Replaces
  DERIVED_FROM = 8;                   // Learned from
}

syntax = "proto3";

package ghatana.contracts.pattern.v1;

import "google/protobuf/timestamp.proto";
import "google/api/field_behavior.proto";

option java_package = "com.ghatana.contracts.pattern.v1";
option java_multiple_files = true;
option java_outer_classname = "PatternRegistrationOuterClass";
option go_package = "github.com/ghatana/contracts/gen/go/pattern/v1;patternv1";
option csharp_namespace = "Ghatana.Contracts.Pattern.V1";

// PatternRegistrationProto captures registration metadata for a pattern specification.
message PatternRegistrationProto {
  // Unique registration identifier.
  string registration_id = 1 [
    (google.api.field_behavior) = REQUIRED
  ];

  // Tenant that owns the pattern registration.
  string tenant_id = 2 [
    (google.api.field_behavior) = REQUIRED
  ];

  // Stable pattern identifier (resource name or PatternProto.id).
  string pattern_id = 3 [
    (google.api.field_behavior) = REQUIRED
  ];

  // Optional human-readable pattern name (mirrors PatternProto.name).
  string pattern_name = 4 [
    (google.api.field_behavior) = OPTIONAL
  ];

  // Schema version for the pattern (semantic version string).
  string schema_version = 5 [
    (google.api.field_behavior) = REQUIRED
  ];

  // When the registration was created.
  google.protobuf.Timestamp create_time = 6 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // When the registration was last updated.
  google.protobuf.Timestamp update_time = 7 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Optional hints describing intended agents/consumers.
  map<string, string> agent_hints = 8 [
    (google.api.field_behavior) = OPTIONAL
  ];

  // Additional free-form metadata (labels, tags, etc.).
  map<string, string> metadata = 9 [
    (google.api.field_behavior) = OPTIONAL
  ];
}

// PatternVersionProto captures version-specific metadata for a pattern.
message PatternVersionProto {
  // Stable pattern identifier associated with this version.
  string pattern_id = 1 [
    (google.api.field_behavior) = REQUIRED
  ];

  // Version string (for example, "1.0.0").
  string version = 2 [
    (google.api.field_behavior) = REQUIRED
  ];

  // When this version was created.
  google.protobuf.Timestamp create_time = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // When this version metadata was last updated.
  google.protobuf.Timestamp update_time = 4 [
    (google.api.field_behavior) = OUTPUT_ONLY
  ];
}

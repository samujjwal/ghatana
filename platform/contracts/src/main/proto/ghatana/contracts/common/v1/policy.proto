syntax = "proto3";

package ghatana.contracts.common.v1;

option go_package = "github.com/ghatana/contracts/gen/go/common/v1;commonv1";

option java_multiple_files = true;
option java_package = "com.ghatana.contracts.common.v1";
option java_outer_classname = "PolicyProto";
option csharp_namespace = "Ghatana.Contracts.Common.V1";

// CompatibilityPolicy defines how schema changes are handled
enum CompatibilityPolicyProto {
  COMPATIBILITY_POLICY_UNSPECIFIED = 0;
  BACKWARD = 1;  // New schema can read data produced by old schema
  FORWARD = 2;   // Old schema can read data produced by new schema
  FULL = 3;      // Both forward and backward compatible
  NONE = 4;      // No compatibility guarantees
}

// DataClassification defines the sensitivity level of the data
enum DataClassificationProto {
  DATA_CLASSIFICATION_UNSPECIFIED = 0;
  PUBLIC = 1;       // Can be publicly shared
  INTERNAL = 2;     // Internal use only
  CONFIDENTIAL = 3; // Company confidential
  RESTRICTED = 4;   // Restricted access
  PII = 5;          // Contains personally identifiable information
  PHI = 6;          // Protected health information
  PCI = 7;          // Payment card information
}

message AuditPolicyProto  {
  reserved 1000 to max;
  reserved "reserved_field";
  bool enabled = 1;
  string policy = 2;
}

message ProvenancePolicyProto  {
  reserved 1000 to max;
  reserved "reserved_field";
  bool enabled = 1;
  string policy = 2;
}

message AdaptationPolicyProto  {
  reserved 1000 to max;
  reserved "reserved_field";
  bool enabled = 1;
  string policy = 2;
}

message StatsCollectionPolicyProto  {
  reserved 1000 to max;
  reserved "reserved_field";
  bool enabled = 1;
  string policy = 2;
}

syntax = "proto3";

package ghatana.contracts.common.v1;

import "google/protobuf/any.proto";

option java_package = "com.ghatana.contracts.common.v1";
option java_multiple_files = true;
option java_outer_classname = "StatusOuterClass";
option go_package = "github.com/ghatana/contracts/gen/go/common/v1;commonv1";
option csharp_namespace = "Ghatana.Contracts.Common.V1";

// Status represents the status of an operation
message StatusProto {
  // The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
  int32 code = 1;

  // A developer-facing error message, which should be in English.
  string message = 2;

  // A list of messages that carry the error details.
  repeated google.protobuf.Any details = 3;
}

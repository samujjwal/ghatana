syntax = "proto3";

package ghatana.contracts.event.v1;

option java_package = "com.ghatana.contracts.event.v1";
option java_multiple_files = true;
option java_outer_classname = "EventEnumsProto";
option go_package = "github.com/ghatana/contracts/gen/go/event/v1;eventv1";
option csharp_namespace = "Ghatana.Contracts.Event.V1";

// EventConfidenceLevelProto indicates the reliability or certainty of an event.
enum EventConfidenceLevelProto {
  EVENT_CONFIDENCE_LEVEL_UNSPECIFIED = 0;
  LOW = 1;
  MEDIUM = 2;
  HIGH = 3;
}

// SortOrderProto defines sort order options for event queries
enum SortOrderProto {
  SORT_ORDER_UNSPECIFIED = 0;
  INGESTED_AT_ASC = 1;
  INGESTED_AT_DESC = 2;
  OCCURRED_AT_ASC = 3;
  OCCURRED_AT_DESC = 4;
}

// IngestErrorCodeProto defines ingestion error codes
enum IngestErrorCodeProto {
  INGEST_ERROR_UNSPECIFIED = 0;
  UNAUTHORIZED = 1;
  RATE_LIMITED = 2;
  UNKNOWN_TYPE = 3;
  SCHEMA_MISMATCH = 4;
  INVALID_PAYLOAD = 5;
  INVALID_HEADERS = 6;
  DUPLICATE_ID = 7;
  BACKEND_UNAVAILABLE = 8;
  QUOTA_EXCEEDED = 9;
}

openapi: 3.1.0
info:
  title: YAPPC Product Development Platform API
  version: 1.0.0
  description: |
    Complete API for YAPPC - Product Development Platform (Intent → Shape → Validate → Generate → Run → Observe → Learn → Evolve)
    
    ## Authentication
    Bearer token authentication required for all endpoints.
    
    ## Tenant Isolation
    All endpoints require X-Tenant-ID header for tenant-scoped operations.
    
    ## API Surface Areas
    - **Workflows**: AI-driven workflow orchestration and state management
    - **Agents**: AI agent discovery, execution, and health monitoring
    - **Vector**: Semantic search, document indexing, and RAG operations
    - **Designs**: System architecture design and validation
    - **Code Generation**: Generate production-ready code artifacts
    - **Artifacts**: Retrieve generated code artifacts
    - **Refactoring**: Get refactoring suggestions
  contact:
    name: YAPPC Support
  license:
    name: Proprietary

servers:
  - url: https://api.yappc.io/v1
    description: Production

tags:
  - name: Workspaces
    description: Workspace CRUD and member management
  - name: Projects
    description: Project CRUD, archival, and export
  - name: Requirements
    description: Requirement creation, AI enrichment, similarity, and feedback
  - name: Workflows
    description: AI workflow orchestration and state management
  - name: Agents
    description: AI agent discovery, execution, and health monitoring
  - name: Vector
    description: Semantic search, indexing, and RAG operations
  - name: Designs
    description: Create and manage system designs
  - name: Code Generation
    description: Generate code from designs with quality gate enforcement
  - name: Artifacts
    description: Retrieve generated artifacts
  - name: Refactoring
    description: Refactoring suggestions, simulation, application, and undo
  - name: PromptVersions
    description: Prompt version management (admin only)
  - name: ABTesting
    description: A/B testing for AI model variants (operator only)
  - name: PhaseGates
    description: Phase-transition readiness gates
  - name: FeatureFlags
    description: Tenant-scoped feature flag management (admin only)
  - name: AICost
    description: Per-project AI cost tracking

paths:
  # ==================== WORKSPACES ====================
  /workspaces:
    post:
      summary: Create a workspace
      operationId: createWorkspace
      tags: [Workspaces]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        '201':
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /workspaces/{id}:
    get:
      summary: Get workspace by ID
      operationId: getWorkspace
      tags: [Workspaces]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Workspace detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '404':
          description: Workspace not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    put:
      summary: Update workspace
      operationId: updateWorkspace
      tags: [Workspaces]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceRequest'
      responses:
        '200':
          description: Updated workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '404':
          description: Workspace not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    delete:
      summary: Delete workspace
      operationId: deleteWorkspace
      tags: [Workspaces]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Workspace deleted
        '404':
          description: Workspace not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /workspaces/{id}/members:
    post:
      summary: Add member to workspace
      operationId: addWorkspaceMember
      tags: [Workspaces]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
      responses:
        '200':
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /workspaces/{id}/members/{memberId}:
    delete:
      summary: Remove member from workspace
      operationId: removeWorkspaceMember
      tags: [Workspaces]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Member removed
        '404':
          description: Workspace or member not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /workspaces/{workspaceId}/projects:
    get:
      summary: List projects in a workspace
      operationId: listProjectsInWorkspace
      tags: [Projects]
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: cursor
          in: query
          description: Opaque cursor for keyset pagination (preferred over offset for large result sets)
          schema:
            type: string
      responses:
        '200':
          description: Project page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectPage'
        '404':
          description: Workspace not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ==================== PROJECTS ====================
  /projects:
    post:
      summary: Create project
      operationId: createProject
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /projects/{id}:
    get:
      summary: Get project
      operationId: getProject
      tags: [Projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Project detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Project not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    put:
      summary: Update project
      operationId: updateProject
      tags: [Projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Project not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    delete:
      summary: Archive project
      operationId: archiveProject
      tags: [Projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Project archived
        '404':
          description: Project not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /projects/{projectId}/requirements:
    post:
      summary: Create requirement
      operationId: createRequirement
      tags: [Requirements]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequirementRequest'
      responses:
        '201':
          description: Requirement created with AI enrichment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /projects/{projectId}/export/{format}:
    get:
      summary: Export project in a given format
      operationId: exportProject
      tags: [Projects]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: format
          in: path
          required: true
          schema:
            type: string
            enum:
              - json
              - yaml
              - pdf
              - zip
      responses:
        '200':
          description: Project export
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
            application/zip:
              schema:
                type: string
                format: binary
        '404':
          description: Project not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ==================== REQUIREMENTS ====================
  /requirements/{id}:
    get:
      summary: Get requirement with AI suggestions
      operationId: getRequirement
      tags: [Requirements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: includeSuggestions
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Requirement detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementResponse'
        '404':
          description: Requirement not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /requirements/{id}/similar:
    get:
      summary: Find similar requirements
      operationId: findSimilarRequirements
      tags: [Requirements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
            minimum: 1
            maximum: 20
        - name: minSimilarity
          in: query
          schema:
            type: number
            format: double
            default: 0.8
            minimum: 0
            maximum: 1
      responses:
        '200':
          description: Similar requirements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimilarRequirementsResult'
        '404':
          description: Requirement not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /requirements/{id}/suggestions:
    post:
      summary: Generate AI suggestions for a requirement
      operationId: generateRequirementSuggestions
      tags: [Requirements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateSuggestionsRequest'
      responses:
        '200':
          description: AI-generated suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISuggestionList'
        '404':
          description: Requirement not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /suggestions/{id}/feedback:
    post:
      summary: Record feedback on an AI suggestion
      operationId: recordSuggestionFeedback
      tags: [Requirements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordFeedbackRequest'
      responses:
        '204':
          description: Feedback recorded
        '404':
          description: Suggestion not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ==================== PHASE GATES ====================
  /projects/{projectId}/phase-gates/{phase}:
    get:
      summary: Get phase-gate readiness for a project
      operationId: getPhaseGateReadiness
      tags: [PhaseGates]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: phase
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/LifecyclePhase'
      responses:
        '200':
          description: Phase-gate readiness status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhaseGateResult'
        '404':
          description: Project not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /projects/{projectId}/phase-transition:
    post:
      summary: Advance project to next phase (blocked if gate not met)
      operationId: advanceProjectPhase
      tags: [PhaseGates]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhaseTransitionRequest'
      responses:
        '200':
          description: Phase advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '409':
          description: Phase gate not met; transition blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhaseGateResult'
        '404':
          description: Project not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ==================== AI COST ====================
  /projects/{projectId}/ai-cost:
    get:
      summary: Per-project AI cost summary
      operationId: getProjectAiCost
      tags: [AICost]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: AI cost summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiCostSummary'
        '404':
          description: Project not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ==================== PROMPT VERSIONS (admin) ====================
  /admin/prompt-versions:
    get:
      summary: List prompt versions (admin only)
      operationId: listPromptVersions
      tags: [PromptVersions]
      parameters:
        - name: promptKey
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Prompt version page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptVersionPage'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Forbidden — admin role required

  /admin/prompt-versions/{id}/rollback:
    post:
      summary: Roll back to a specific prompt version (admin only)
      operationId: rollbackPromptVersion
      tags: [PromptVersions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Active version updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptVersion'
        '404':
          description: Version not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Forbidden — admin role required

  /admin/prompt-versions/{id}/weight:
    put:
      summary: Adjust prompt version sampling weight (admin only)
      operationId: setPromptVersionWeight
      tags: [PromptVersions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetWeightRequest'
      responses:
        '200':
          description: Weight updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptVersion'
        '404':
          description: Version not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Forbidden — admin role required

  # ==================== A/B TESTING (operator) ====================
  /admin/ab-tests:
    get:
      summary: List A/B test variants (operator only)
      operationId: listAbTests
      tags: [ABTesting]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: A/B test page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbTestPage'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Forbidden — operator role required
    post:
      summary: Register a new A/B test variant (operator only)
      operationId: createAbTest
      tags: [ABTesting]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAbTestRequest'
      responses:
        '201':
          description: A/B test created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbTest'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Forbidden — operator role required

  /admin/ab-tests/{id}/winner:
    post:
      summary: Promote A/B test winner (operator only)
      operationId: promoteAbTestWinner
      tags: [ABTesting]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteWinnerRequest'
      responses:
        '200':
          description: Winner promoted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbTest'
        '404':
          description: Test not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Forbidden — operator role required

  # ==================== FEATURE FLAGS (admin) ====================
  /admin/feature-flags:
    get:
      summary: List tenant-scoped feature flags (admin only)
      operationId: listFeatureFlags
      tags: [FeatureFlags]
      parameters:
        - name: enabled
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Feature flag page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureFlagPage'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Forbidden — admin role required
    post:
      summary: Create feature flag (admin only)
      operationId: createFeatureFlag
      tags: [FeatureFlags]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFeatureFlagRequest'
      responses:
        '201':
          description: Feature flag created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureFlag'
        '400':
          description: Invalid request
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Forbidden — admin role required

  /admin/feature-flags/{key}:
    put:
      summary: Update feature flag (admin only)
      operationId: updateFeatureFlag
      tags: [FeatureFlags]
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFeatureFlagRequest'
      responses:
        '200':
          description: Updated flag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureFlag'
        '404':
          description: Flag not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Forbidden — admin role required

  # ==================== WORKFLOWS ====================
  /workflows:
    post:
      summary: Create new workflow
      operationId: createWorkflow
      tags:
        - Workflows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowRequest'
      responses:
        '201':
          description: Workflow created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    get:
      summary: List workflows for tenant
      operationId: listWorkflows
      tags:
        - Workflows
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, RUNNING, PAUSED, COMPLETED, FAILED, CANCELLED]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor returned by prior page; takes precedence over offset when supplied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowList'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /workflows/{id}:
    get:
      summary: Get workflow by ID
      operationId: getWorkflow
      tags:
        - Workflows
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workflow details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '404':
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    delete:
      summary: Delete workflow
      operationId: deleteWorkflow
      tags:
        - Workflows
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Workflow deleted
        '404':
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /workflows/{id}/start:
    post:
      summary: Start workflow
      operationId: startWorkflow
      tags:
        - Workflows
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workflow started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '409':
          description: Invalid workflow state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /workflows/{id}/pause:
    post:
      summary: Pause workflow
      operationId: pauseWorkflow
      tags:

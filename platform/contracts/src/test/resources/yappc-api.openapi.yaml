                      $ref: '#/components/schemas/ArtifactVersion'
        '404':
          description: Artifact not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /refactoring-suggestions/{designId}:
    get:
      summary: Get refactoring suggestions
      operationId: getRefactoringSuggestions
      tags:
        - Refactoring
      parameters:
        - name: designId
          in: path
          required: true
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
            enum:
              - performance
              - maintainability
              - testing
              - security
      responses:
        '200':
          description: Refactoring suggestions
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestions:
                    type: array
                    items:
                      $ref: '#/components/schemas/RefactoringSuggestion'
        '404':
          description: Design not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /refactoring-suggestions/{designId}/{suggestionId}/simulate:
    post:
      summary: Simulate applying a refactoring suggestion (dry-run; returns diff preview)
      operationId: simulateRefactoring
      tags:
        - Refactoring
      parameters:
        - name: designId
          in: path
          required: true
          schema:
            type: string
        - name: suggestionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Diff preview — no files changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefactoringDiffPreview'
        '404':
          description: Suggestion not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /refactoring-suggestions/{designId}/{suggestionId}/apply:
    post:
      summary: Apply a refactoring suggestion (creates undo checkpoint)
      operationId: applyRefactoring
      tags:
        - Refactoring
      parameters:
        - name: designId
          in: path
          required: true
          schema:
            type: string
        - name: suggestionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Refactoring applied; undoToken returned for rollback
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefactoringApplyResult'
        '409':
          description: Conflict — simulate first or resolve conflicts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Suggestion not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /refactoring-suggestions/{designId}/{suggestionId}/undo:
    post:
      summary: Undo the most recent apply for this suggestion
      operationId: undoRefactoring
      tags:
        - Refactoring
      parameters:
        - name: designId
          in: path
          required: true
          schema:
            type: string
        - name: suggestionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UndoRefactoringRequest'
      responses:
        '200':
          description: Undo applied successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefactoringUndoResult'
        '404':
          description: Suggestion or undo token not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'
                properties:
                  suggestions:
                    type: array
                    items:
                      $ref: '#/components/schemas/RefactoringSuggestion'
        '404':
          description: Design not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

components:
  schemas:
    CreateDesignRequest:
      type: object
      required:
        - name
        - components
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        components:
          type: array
          items:
            $ref: '#/components/schemas/ComponentDef'
          minItems: 1
        relationships:
          type: array
          items:
            $ref: '#/components/schemas/Relationship'

    UpdateDesignRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        components:
          type: array
          items:
            $ref: '#/components/schemas/ComponentDef'
        relationships:
          type: array
          items:
            $ref: '#/components/schemas/Relationship'

    ComponentDef:
      type: object
      required:
        - id
        - name
        - type
      properties:
        id:
          type: string
          pattern: '^[a-z][a-z0-9_]*$'
        name:
          type: string
        type:
          type: string
          enum:
            - SERVICE
            - CONTROLLER
            - REPOSITORY
            - UTILITY
            - LIBRARY
            - DATABASE
            - CACHE
            - MESSAGE_QUEUE
        description:
          type: string
        properties:
          type: object
          additionalProperties: true

    Relationship:
      type: object
      required:
        - fromComponent
        - toComponent
        - type
      properties:
        fromComponent:
          type: string
        toComponent:
          type: string
        type:
          type: string
          enum:
            - DEPENDS_ON
            - IMPLEMENTS
            - EXTENDS
            - USES
        strength:
          type: string
          enum:
            - REQUIRED
            - OPTIONAL
          default: REQUIRED

    Design:
      allOf:
        - $ref: '#/components/schemas/CreateDesignRequest'
        - type: object
          required:
            - designId
            - createdAt
          properties:
            designId:
              type: string
              format: uuid
            version:
              type: integer
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
            validationStatus:
              type: string
              enum:
                - VALID
                - INVALID
                - NEEDS_REVIEW

    ValidationResult:
      type: object
      required:
        - isValid
      properties:
        isValid:
          type: boolean
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationWarning'
        circularDependencies:
          type: array
          items:
            type: array
            items:
              type: string

    ValidationError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - CIRCULAR_DEPENDENCY
            - INVALID_COMPONENT_TYPE
            - MISSING_DEPENDENCY
            - INVALID_RELATIONSHIP
        message:
          type: string
        componentId:
          type: string

    ValidationWarning:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        componentId:
          type: string

    CodeGenerationRequest:
      type: object
      required:
        - designId
        - language
        - packageName
      properties:
        designId:
          type: string
        language:
          type: string
          enum:
            - java
            - python
            - go
            - typescript
        packageName:
          type: string
          minLength: 1
        targetVersion:
          type: string
          description: Language/framework version
        includeTests:
          type: boolean
          default: true
        includeDocumentation:
          type: boolean
          default: true

    CodeGenerationOperation:
      type: object
      required:
        - operationId
        - status
      properties:
        operationId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - QUEUED
            - RUNNING
            - COMPLETED
            - FAILED
        artifactId:
          type: string
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        qualityReport:
          description: Quality gate results; present when status is COMPLETED or FAILED
          $ref: '#/components/schemas/CodeQualityReport'
        acceptanceBlocked:
          type: boolean
          description: True when any quality gate check is non-green; UI must block the "Accept" action
        error:
          $ref: '#/components/schemas/ProblemDetail'

    CodeQualityReport:
      type: object
      required:
        - compile
        - lint
        - test
        - overallGreen
      properties:
        overallGreen:
          type: boolean
          description: True only when compile, lint, and test are all green
        compile:
          $ref: '#/components/schemas/QualityCheckResult'
        lint:
          $ref: '#/components/schemas/QualityCheckResult'
        test:
          $ref: '#/components/schemas/QualityCheckResult'
        generatedAt:
          type: string
          format: date-time

    QualityCheckResult:
      type: object
      required:
        - green
        - summary
      properties:
        green:
          type: boolean
        summary:
          type: string
          description: Human-readable summary (e.g. "4/4 tests passed", "2 lint errors")
        issues:
          type: array
          items:
            $ref: '#/components/schemas/QualityIssue'

    QualityIssue:
      type: object
      required:
        - severity
        - message
      properties:
        severity:
          type: string
          enum:
            - ERROR
            - WARNING
            - INFO
        message:
          type: string
        file:
          type: string
        line:
          type: integer
        column:
          type: integer
        rule:
          type: string

    GeneratedArtifact:
      type: object
      required:
        - artifactId
        - designId
        - language
        - files
      properties:
        artifactId:
          type: string
          format: uuid
        designId:
          type: string
        language:
          type: string
        version:
          type: integer
        files:
          type: array
          items:
            $ref: '#/components/schemas/GeneratedFile'
        createdAt:
          type: string
          format: date-time

    GeneratedFile:
      type: object
      required:
        - path
        - content
      properties:
        path:
          type: string
          description: File path relative to root
        content:
          type: string
          description: File content

    ArtifactVersion:
      type: object
      required:
        - version
        - createdAt
      properties:
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        language:
          type: string
        description:
          type: string

    RefactoringSuggestion:
      type: object
      required:
        - id
        - title
        - description
        - category
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum:
            - performance
            - maintainability
            - testing
            - security
        impact:
          type: string
          enum:
            - HIGH
            - MEDIUM
            - LOW
        affectedComponents:
          type: array
          items:
            type: string
        suggestedChanges:
          type: object
          additionalProperties: true

    RefactoringDiffPreview:
      type: object
      required:
        - suggestionId
        - hunks
      properties:
        suggestionId:
          type: string
          format: uuid
        hunks:
          type: array
          items:
            $ref: '#/components/schemas/DiffHunk'
        estimatedRiskLevel:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
        conflictsDetected:
          type: boolean

    DiffHunk:
      type: object
      required:
        - filePath
        - before
        - after
      properties:
        filePath:
          type: string
        before:
          type: string
          description: Unified diff — removed lines
        after:
          type: string
          description: Unified diff — added lines

    RefactoringApplyResult:
      type: object
      required:
        - suggestionId
        - undoToken
        - appliedAt
      properties:
        suggestionId:
          type: string
          format: uuid
        undoToken:
          type: string
          description: Opaque token passed to the undo endpoint to roll back this apply
        appliedAt:
          type: string
          format: date-time
        filesChanged:
          type: array
          items:
            type: string

    UndoRefactoringRequest:
      type: object
      required:
        - undoToken
      properties:
        undoToken:
          type: string

    RefactoringUndoResult:
      type: object
      required:
        - suggestionId
        - undoneAt
      properties:
        suggestionId:
          type: string
          format: uuid
        undoneAt:
          type: string
          format: date-time
        filesRestored:
          type: array
          items:
            type: string

    # ==================== WORKSPACE / PROJECT / REQUIREMENT ====================

    Workspace:
      type: object
      required:
        - id
        - name
        - tenantId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        tenantId:
          type: string
        members:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceMember'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WorkspaceMember:
      type: object
      required:
        - userId
        - role
      properties:
        userId:
          type: string
        role:
          type: string
          enum:
            - OWNER
            - ADMIN
            - MEMBER
            - VIEWER
        joinedAt:
          type: string
          format: date-time

    CreateWorkspaceRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 1000

    UpdateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 1000

    AddMemberRequest:
      type: object
      required:
        - userId
        - role
      properties:
        userId:
          type: string
        role:
          type: string
          enum:
            - ADMIN
            - MEMBER
            - VIEWER

    Project:
      type: object
      required:
        - id
        - workspaceId
        - name
        - status
        - currentPhase
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        status:
          type: string
          enum:
            - ACTIVE
            - ARCHIVED
            - SUSPENDED
        currentPhase:
          $ref: '#/components/schemas/LifecyclePhase'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectPage:
      type: object
      required:
        - items
        - total
        - limit
        - offset
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer
        nextCursor:
          type: string

    CreateProjectRequest:
      type: object
      required:
        - workspaceId
        - name
      properties:
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000

    LifecyclePhase:
      type: string
      enum:
        - REQUIREMENTS_GATHERING
        - DESIGN
        - CODE_GENERATION
        - TESTING
        - REVIEW
        - DEPLOYMENT
        - COMPLETED

    PhaseGateResult:
      type: object
      required:
        - phase
        - gateOpen
        - checks
      properties:
        phase:
          $ref: '#/components/schemas/LifecyclePhase'
        gateOpen:
          type: boolean
          description: True when all checks pass and the transition is allowed
        checks:
          type: array
          items:
            $ref: '#/components/schemas/PhaseGateCheck'

    PhaseGateCheck:
      type: object
      required:
        - name
        - passed
      properties:
        name:
          type: string
        passed:
          type: boolean
        reason:
          type: string
          description: Human-readable explanation if failed

    PhaseTransitionRequest:
      type: object
      required:
        - targetPhase
      properties:
        targetPhase:
          $ref: '#/components/schemas/LifecyclePhase'
        force:
          type: boolean
          default: false
          description: Admin override; bypasses gate (audit-logged)

    Requirement:
      type: object
      required:
        - id
        - projectId
        - text
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        text:
          type: string
          minLength: 1
          maxLength: 5000
        status:
          type: string
          enum:
            - DRAFT
            - APPROVED
            - REJECTED
            - SUPERSEDED
        tags:
          type: array
          items:
            type: string
        embeddingId:
          type: string
          description: Internal reference for semantic vector
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RequirementResponse:
      type: object
      allOf:
        - $ref: '#/components/schemas/Requirement'
        - type: object
          properties:
            suggestions:
              type: array
              items:
                $ref: '#/components/schemas/AISuggestion'
            duplicateWarning:
              $ref: '#/components/schemas/DuplicateWarning'

    CreateRequirementRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 5000
        tags:
          type: array
          items:
            type: string

    SimilarRequirementsResult:
      type: object
      required:
        - requirementId
        - similar
      properties:
        requirementId:
          type: string
          format: uuid
        similar:
          type: array
          items:
            $ref: '#/components/schemas/SimilarRequirement'

    SimilarRequirement:
      type: object
      required:
        - requirement
        - similarity
      properties:
        requirement:
          $ref: '#/components/schemas/Requirement'
        similarity:
          type: number
          format: double
          minimum: 0
          maximum: 1

    DuplicateWarning:
      type: object
      required:
        - hasDuplicates
      properties:
        hasDuplicates:
          type: boolean
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/SimilarRequirement'

    AISuggestion:
      type: object
      required:
        - id
        - type
        - text
        - source
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - IMPROVEMENT
            - CLARIFICATION
            - CONFLICT_DETECTION
            - COMPLETENESS
        text:
          type: string
        source:
          $ref: '#/components/schemas/AISource'
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1

    AISource:
      type: string
      enum:
        - RULE
        - MODEL
      description: >
        RULE — deterministic rule engine produced this result.
        MODEL — probabilistic LLM produced this result.

    AISuggestionList:
      type: object
      required:
        - requirementId
        - suggestions
      properties:
        requirementId:
          type: string
          format: uuid
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/AISuggestion'

    GenerateSuggestionsRequest:
      type: object
      properties:
        persona:
          type: string
          enum:
            - DEVELOPER
            - PRODUCT_MANAGER
            - SECURITY_ANALYST
            - ARCHITECT
          default: DEVELOPER
        limit:
          type: integer
          default: 5
          minimum: 1
          maximum: 20

    RecordFeedbackRequest:
      type: object
      required:
        - feedbackType
      properties:
        feedbackType:
          type: string
          enum:
            - ACCEPTED
            - REJECTED
            - PARTIALLY_ACCEPTED
        comment:
          type: string
          maxLength: 1000

    # ==================== AI COST ====================

    AiCostSummary:
      type: object
      required:
        - projectId
        - totalCostUsd
        - breakdown
      properties:
        projectId:
          type: string
          format: uuid
        totalCostUsd:
          type: number
          format: double
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        breakdown:
          type: array
          items:
            $ref: '#/components/schemas/CostLineItem'

    CostLineItem:
      type: object
      required:
        - category
        - costUsd
        - tokenCount
      properties:
        category:
          type: string
          description: e.g. "code-generation", "requirements-suggestions", "vector-indexing"
        costUsd:
          type: number
          format: double
        tokenCount:
          type: integer
          format: int64
        modelId:
          type: string

    # ==================== PROMPT VERSIONS ====================

    PromptVersion:
      type: object
      required:
        - id
        - promptKey
        - version
        - weight
        - isActive
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        promptKey:
          type: string
        version:
          type: string
        weight:
          type: number
          format: double
          minimum: 0
          maximum: 1
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    PromptVersionPage:
      type: object
      required:
        - items
        - total
        - limit
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PromptVersion'
        total:
          type: integer
          format: int64
        limit:
          type: integer
        nextCursor:
          type: string

    SetWeightRequest:
      type: object
      required:
        - weight
      properties:
        weight:
          type: number
          format: double
          minimum: 0
          maximum: 1

    # ==================== A/B TESTING ====================

    AbTest:
      type: object
      required:
        - id
        - name
        - status
        - variants
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum:
            - DRAFT
            - RUNNING
            - COMPLETED
            - CANCELLED
        variants:
          type: array
          items:
            $ref: '#/components/schemas/AbVariant'
        winnerId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time

    AbVariant:
      type: object
      required:
        - id
        - name
        - trafficWeight
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        trafficWeight:
          type: number
          format: double
          minimum: 0
          maximum: 1
        promptVersionId:
          type: string
          format: uuid
        metrics:
          type: object
          additionalProperties:
            type: number
            format: double

    AbTestPage:
      type: object
      required:
        - items
        - total
        - limit
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AbTest'
        total:
          type: integer
          format: int64
        limit:
          type: integer
        nextCursor:
          type: string

    CreateAbTestRequest:
      type: object
      required:
        - name
        - variants
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        variants:
          type: array
          minItems: 2
          items:
            type: object
            required:
              - name
              - trafficWeight
            properties:
              name:
                type: string
              trafficWeight:
                type: number
                format: double
              promptVersionId:
                type: string
                format: uuid

    PromoteWinnerRequest:
      type: object
      required:
        - variantId
      properties:
        variantId:
          type: string
          format: uuid

    # ==================== FEATURE FLAGS ====================

    FeatureFlag:
      type: object
      required:
        - key
        - enabled
        - scope
      properties:
        key:
          type: string
          pattern: '^[a-z][a-z0-9_-]{1,63}$'
        enabled:
          type: boolean
        scope:
          type: string
          enum:
            - TENANT
            - GLOBAL
        rolloutPercentage:
          type: integer
          minimum: 0
          maximum: 100
        metadata:
          type: object
          additionalProperties: true

    FeatureFlagPage:
      type: object
      required:
        - items
        - total
        - limit
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FeatureFlag'
        total:
          type: integer
          format: int64
        limit:
          type: integer
        nextCursor:
          type: string

    CreateFeatureFlagRequest:
      type: object
      required:
        - key
        - enabled
      properties:
        key:
          type: string
          pattern: '^[a-z][a-z0-9_-]{1,63}$'
        enabled:
          type: boolean
        scope:
          type: string
          enum:
            - TENANT
            - GLOBAL
          default: TENANT
        rolloutPercentage:
          type: integer
          minimum: 0
          maximum: 100
          default: 100

    UpdateFeatureFlagRequest:
      type: object
      properties:
        enabled:
          type: boolean
        rolloutPercentage:
          type: integer
          minimum: 0
          maximum: 100

    # ==================== COMMON ====================

    ProblemDetail:
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        traceId:
          type: string

    DesignValidationError:
      allOf:
        - $ref: '#/components/schemas/ProblemDetail'
        - type: object
          properties:
            validationErrors:
              type: array
              items:
                $ref: '#/components/schemas/ValidationError'
          format: uuid

    # ==================== WORKFLOW SCHEMAS ====================
    CreateWorkflowRequest:
      type: object
      required:
        - name
        - description
        - type
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        type:
          type: string
          enum:
            - REQUIREMENT_ANALYSIS
            - CODE_GENERATION
            - REFACTORING
            - TESTING
            - DEPLOYMENT
        createdBy:
          type: string

    Workflow:
      type: object
      required:
        - id
        - name
        - description
        - type
        - status
        - tenantId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum:
            - REQUIREMENT_ANALYSIS
            - CODE_GENERATION
            - REFACTORING
            - TESTING
            - DEPLOYMENT
        status:
          type: string
          enum:
            - PENDING
            - RUNNING
            - PAUSED
            - COMPLETED
            - FAILED
            - CANCELLED
        tenantId:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        currentStep:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStep'

    WorkflowList:
      type: object
      required:
        - items
        - total
        - limit
        - offset
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Workflow'
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer
        nextCursor:
          type: string
          description: Opaque cursor for keyset pagination; present when more results follow.

    WorkflowStep:
      type: object
      properties:
        stepId:
          type: string
        stepName:
          type: string
        status:
          type: string
          enum:
            - PENDING
            - IN_PROGRESS
            - COMPLETED
            - FAILED
            - SKIPPED
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    StepResultDto:
      type: object
      required:
        - stepId
        - stepName
        - status
        - startedAt
      properties:
        stepId:
          type: string
        stepName:
          type: string
        status:
          type: string
          enum:
            - COMPLETED
            - FAILED
        output:
          type: object
          additionalProperties: true
        aiGenerated:
          type: string
        userModified:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        errorMessage:
          type: string
        metadata:
          type: object
          additionalProperties: true

    GeneratePlanDto:
      type: object
      required:
        - objective
      properties:
        objective:
          type: string
          minLength: 1

    AiPlan:
      type: object
      required:
        - planId
        - workflowId
        - status
        - createdAt
      properties:
        planId:
          type: string
          format: uuid
        workflowId:
          type: string
        status:
          type: string
          enum:
            - DRAFT
            - PENDING_APPROVAL
            - APPROVED
            - REJECTED
        objective:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/PlanStep'
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
        rationale:
          type: string
        createdAt:
          type: string
          format: date-time
        approvedAt:
          type: string
          format: date-time
        approvedBy:
          type: string

    PlanStep:
      type: object
      required:
        - stepId
        - stepName
        - stepType
      properties:
        stepId:
          type: string
        stepName:
          type: string
        stepType:
          type: string
          enum:
            - ANALYSIS
            - GENERATION
            - VALIDATION
            - DEPLOYMENT
        description:
          type: string
        estimatedDuration:
          type: string
        dependencies:
          type: array
          items:
            type: string

    RejectPlanDto:
      type: object
      properties:
        reason:
          type: string

    ModifyStepsDto:
      type: object
      required:
        - steps
      properties:
        steps:
          type: array
          items:
            $ref: '#/components/schemas/PlanStep'

    RouteRequestDto:
      type: object
      properties:
        userInput:
          type: string

    RoutingDecision:
      type: object
      required:
        - decision
        - timestamp
      properties:
        decision:
          type: string
          enum:
            - ADVANCE
            - RETRY
            - ESCALATE
            - TERMINATE
        targetStep:
          type: string
        reason:
          type: string
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
        timestamp:
          type: string
          format: date-time

    # ==================== AGENT SCHEMAS ====================
    AgentList:
      type: object
      required:
        - items
        - total
        - limit
        - offset
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AgentInfo'
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer
        nextCursor:
          type: string
          description: Opaque cursor for keyset pagination; present when more results follow.

    AgentInfo:
      type: object
      required:
        - name
        - displayName
        - version
        - description
        - capabilities
      properties:
        name:
          type: string
        displayName:
          type: string
        version:
          type: string
        description:
          type: string
        capabilities:
          type: array
          items:
            type: string
        supportedModels:
          type: array
          items:
            type: string

    AgentDetail:
      type: object
      required:
        - name
        - displayName
        - version
        - description
        - capabilities
        - latencySlaMs
        - isHealthy
      properties:
        name:
          type: string
        displayName:
          type: string
        version:
          type: string
        description:
          type: string
        capabilities:
          type: array
          items:
            type: string
        supportedModels:
          type: array
          items:
            type: string
        latencySlaMs:
          type: integer
        isHealthy:
          type: boolean

    AgentHealth:
      type: object
      required:
        - agent
        - healthy
        - latencyMs
        - lastCheck
      properties:
        agent:
          type: string
        healthy:
          type: boolean
        latencyMs:
          type: number
          format: double
        lastCheck:
          type: string
          format: date-time
        dependencies:
          type: array
          items:
            type: string
        errorMessage:
          type: string

    AgentHealthList:
      type: object
      required:
        - agents
        - total
        - healthy
        - unhealthy
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentHealth'
        total:
          type: integer
        healthy:
          type: integer
        unhealthy:
          type: integer

    AgentExecutionResult:
      type: object
      required:
        - agent
        - success
        - trace
      properties:
        agent:
          type: string
        success:
          type: boolean
        data:
          type: object
          additionalProperties: true
        metrics:
          type: object
          properties:
            latencyMs:
              type: number
              format: double
            tokensUsed:
              type: integer
            model:
              type: string
            confidence:
              type: number
              format: double
            costUSD:
              type: number
              format: double
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            retryable:
              type: boolean
        trace:
          type: object
          required:
            - requestId
            - timestamp
            - agentName
          properties:
            requestId:
              type: string
              format: uuid
            timestamp:
              type: string
              format: date-time
            agentName:
              type: string
            metadata:
              type: object
              additionalProperties: true

    CapabilityMap:
      type: object
      required:
        - capabilities
        - totalCapabilities
      properties:
        capabilities:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        totalCapabilities:
          type: integer

    # ==================== VECTOR SCHEMAS ====================
    SearchDto:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          minLength: 1
        limit:
          type: integer
          default: 10
          minimum: 1
          maximum: 100
        threshold:
          type: number
          format: double
          default: 0.7
          minimum: 0
          maximum: 1
        filters:
          type: object
          additionalProperties:
            type: string

    SearchResult:
      type: object
      required:
        - hits
        - count
      properties:
        hits:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              score:
                type: number
                format: double
              content:
                type: string
              metadata:
                type: object
                additionalProperties: true
        count:
          type: integer

    HybridSearchDto:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          minLength: 1
        limit:
          type: integer
          default: 10
          minimum: 1
          maximum: 100
        threshold:
          type: number
          format: double
          default: 0.7
          minimum: 0
          maximum: 1
        filters:
          type: object
          additionalProperties:
            type: string
        keywords:
          type: array
          items:
            type: string
        keywordBoost:
          type: number
          format: double
          default: 0.2
          minimum: 0
          maximum: 1

    SimilarItemsResult:
      type: object
      required:
        - sourceId
        - similar
        - count
      properties:
        sourceId:
          type: string
        similar:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              score:
                type: number
                format: double
        count:
          type: integer

    IndexDocumentDto:
      type: object
      required:
        - id
        - content
      properties:
        id:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        metadata:
          type: object
          additionalProperties:
            type: string

    IndexResult:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
        error:
          type: string

    BatchIndexDto:
      type: object
      required:
        - documents
      properties:
        documents:
          type: array
          items:
            $ref: '#/components/schemas/IndexDocumentDto'
          minItems: 1
          maxItems: 100

    BatchIndexResult:
      type: object
      required:
        - results
        - total
        - success
        - failed
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/IndexResult'
        total:
          type: integer
        success:
          type: integer
        failed:
          type: integer

    RagDto:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          minLength: 1
        systemPrompt:
          type: string
        contextLimit:
          type: integer
          default: 5
          minimum: 1
          maximum: 20
        relevanceThreshold:
          type: number
          format: double
          default: 0.7
          minimum: 0
          maximum: 1
        maxTokens:
          type: integer
          default: 1000
          minimum: 100
          maximum: 4000
        temperature:
          type: number
          format: double
          default: 0.7
          minimum: 0
          maximum: 2
        filters:
          type: object
          additionalProperties:
            type: string

    RagResult:
      type: object
      required:
        - response
        - sources
      properties:
        response:
          type: string
        sources:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              content:
                type: string
              score:
                type: number
                format: double
        warning:
          type: string

    ConversationalRagDto:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          minLength: 1
        history:
          type: array
          items:
            $ref: '#/components/schemas/ConversationTurnDto'
        systemPrompt:
          type: string
        contextLimit:
          type: integer
          default: 5
          minimum: 1
          maximum: 20
        relevanceThreshold:
          type: number
          format: double
          default: 0.7
          minimum: 0
          maximum: 1
        maxTokens:
          type: integer
          default: 1000
          minimum: 100
          maximum: 4000
        temperature:
          type: number
          format: double
          default: 0.7
          minimum: 0
          maximum: 2
        filters:
          type: object
          additionalProperties:
            type: string

    ConversationTurnDto:
      type: object
      required:
        - userMessage
      properties:
        userMessage:
          type: string
        assistantMessage:
          type: string

  responses:
    UnauthorizedError:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []

syntax = "proto3";

package com.ghatana.contracts.v1.test;

option java_multiple_files = true;
option java_package = "com.ghatana.contracts.v1.test";
option java_outer_classname = "IntegrationTestProto";

// UserType represents the type of user in the system
enum UserType {
  UNKNOWN = 0;
  STANDARD = 1;
  PREMIUM = 2;
  ADMIN = 3;
}

// UserMetadata contains additional information about a user
message UserMetadata {
  int64 created_at = 1;  // Timestamp when the user was created
  int64 last_login = 2;  // Timestamp of the last login
  string ip_address = 3; // Last known IP address
  map<string, string> custom_fields = 4; // Additional custom fields
}

// UserProfile represents a user profile in the system
message UserProfile {
  string id = 1;          // Unique identifier for the user
  string username = 2;    // User's username
  string email = 3;       // User's email address
  UserType type = 4;      // Type of the user
  repeated string preferences = 5; // User preferences
  UserMetadata metadata = 6; // Additional metadata

  oneof account_info {
    string subscription_id = 7;  // For premium users
    string referral_code = 8;    // For standard users
  }
}

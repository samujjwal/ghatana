# Platform Agent Catalog — Base Agent Template
#
# This is the base template that agent YAML descriptors MAY inherit by declaring:
#   extends: base-agent-template
#
# Inheriting agents only need to declare the fields they want to override.
# Required fields (id, name, version) are NOT provided here — every agent
# descriptor must supply its own.
#
# Template variables ({{ varName }}) are resolved by YamlTemplateEngine using
# TemplateContext populated from: environment → platform/agent-catalog/values.yaml
# → product values.yaml → per-request explicit params.
#
# After this template is loaded by YamlTemplateEngine.render(), the resulting
# YAML is parsed into an AgentDefinition object by the catalog loader. Any key
# defined here is overridden by the same key in the concrete agent's descriptor.

# ---------------------------------------------------------------------------
# Versioning — every inheriting agent MUST override this
# ---------------------------------------------------------------------------
version: "1.0.0"

# ---------------------------------------------------------------------------
# Identity — every inheriting agent MUST declare agentType and criticality.
# Override other fields as needed.
# ---------------------------------------------------------------------------
identity:
  agentType: "{{ agentType }}"                             # deterministic | probabilistic | stream-processor | planning | hybrid | adaptive | composite | reactive | custom
  subtype: "{{ agentSubtype }}"                            # type-specific fine-grained subtype (optional)
  criticality: "{{ defaultCriticality }}"                  # critical | high | medium | low
  autonomyLevel: "{{ defaultAutonomyLevel }}"              # advisory | draft | supervised | bounded-autonomous | autonomous
  determinismGuarantee: "{{ defaultDeterminismGuarantee }}"  # fully-deterministic | config-scoped | non-deterministic
  stateMutability: "{{ defaultStateMutability }}"          # stateless | local-state | persistent
  failureMode: "{{ defaultFailureMode }}"                  # fail-fast | fail-silent | fail-closed | dead-letter | retry | skip

# ---------------------------------------------------------------------------
# Memory defaults
# ---------------------------------------------------------------------------
memory:
  type: "{{ defaultMemoryType }}"
  scope: "{{ defaultMemoryScope }}"
  retention: "{{ defaultMemoryRetention }}"

# ---------------------------------------------------------------------------
# Resource requirements
# ---------------------------------------------------------------------------
resources:
  memory: "{{ defaultResourceMemory }}"
  cpu: "{{ defaultResourceCpu }}"
  timeout: "{{ defaultTimeout }}"

# ---------------------------------------------------------------------------
# Cost guard-rails
# ---------------------------------------------------------------------------
cost:
  maxPerCall: "{{ defaultMaxCostPerCall }}"
  monthlyBudget: "{{ defaultMonthlyBudget }}"

# ---------------------------------------------------------------------------
# AEP integration defaults (only meaningful for event-driven agents)
# ---------------------------------------------------------------------------
aep:
  backpressure:
    bufferSize: "{{ defaultBackpressureBufferSize }}"
    overflowStrategy: "{{ defaultOverflowStrategy }}"
  reliability:
    checkpointInterval: "{{ defaultCheckpointInterval }}"
    maxRetries: "{{ defaultMaxRetries }}"

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------
observability:
  logLevel: "{{ defaultLogLevel }}"
  metrics:
    scrapeInterval: "{{ defaultMetricsScrapeInterval }}"

# ---------------------------------------------------------------------------
# Action Governance defaults
# ---------------------------------------------------------------------------
actionGovernance:
  allowedActionClasses:
    - READ
    - DRAFT
  reversibilityDefault: REVERSIBLE
  maxDelegationDepth: 3
  maxDelegationFanout: 5
  budgets:
    maxCostPerTurn: "{{ defaultMaxCostPerCall }}"
    maxActionsPerTurn: 50
    maxTurnDurationSeconds: 300

# ---------------------------------------------------------------------------
# Memory Governance defaults
# ---------------------------------------------------------------------------
memoryGovernance:
  namespace: "{{ agentType }}.default"
  versioning: true
  sharingMode: PRIVATE
  conflictResolution: LAST_WRITE_WINS
  provenanceRequired: true
  retentionDays: 90

# ---------------------------------------------------------------------------
# Assurance & Promotion defaults
# ---------------------------------------------------------------------------
assurance:
  requiredPassRate: 0.95
  shadowTestRequired: false

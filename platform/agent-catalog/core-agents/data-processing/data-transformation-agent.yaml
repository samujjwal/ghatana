schemaVersion: "2.0.0"
id: data-transformation-agent
name: Data Transformation Agent
namespace: platform.data-processing
version: 2.0.0
status: active
summary: >-
  Transforms structured data between formats and schemas (ETL/batch). For streaming payloads use event-transformer-agent.
description: >
  Transforms structured data between formats and schemas (ETL/batch).
  Not for event-stream payloads — use AEP event-transformer-agent for streaming.
  Combines deterministic schema parsing with LLM-assisted field mapping for
  complex or ambiguous transformations.
owners:
  - team: platform-team
    role: technical-owner
    contact: platform-team@ghatana.ai

metadata:
  level: 3
  domain: data-processing
  tags: [transformation, mapping, conversion, etl, batch, structured-data]

identity:
  agentType: hybrid                         # deterministic parsing + LLM mapping reasoning
  roles: [data-transformer, schema-converter, etl-processor]
  criticality: medium
  autonomyLevel: supervised
  determinismGuarantee: non-deterministic   # LLM step may produce different mappings
  stateMutability: stateless
  failureMode: dead-letter

# Execution pipeline: deterministic parsing → LLM-assisted transformation
pipeline:
  steps:
    - name: parse_source
      type: SERVICE_CALL
      service: data-parser
      endpoint: /platform/transform/parse
    - name: apply_transformation
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      prompt: |
        Transform data:
        Source: {{source_data}}
        Target Format: {{target_format}}
        Mapping Rules: {{mappings}}

capabilities:
  - data-transformation  # platform standard-capabilities: data-processing.transformation
  - json-schema-validation

tools:
  - name: transformationEngine
    type: SERVICE
    endpoint: /platform/transform/apply
  - name: mappingResolver
    type: SERVICE
    endpoint: /platform/transform/mappings

memory:
  type: EPISODIC
  scope: transformation_rules
  retention: medium

resources:
  memory: "512MB"
  cpu: "1"
  timeout: "60s"

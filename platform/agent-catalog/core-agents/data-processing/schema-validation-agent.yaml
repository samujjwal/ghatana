id: schema-validation-agent
name: Schema Validation Agent
namespace: platform.data-processing
version: 2.0.0
status: active
summary: >-
  Validates JSON, XML, and Protobuf data against schemas with detailed error reporting.
owners:
  - team: platform-team
    role: technical-owner
    contact: platform-team@ghatana.ai

metadata:
  level: 3
  domain: data-processing
  tags: [validation, schema, json, xml, protobuf, data-quality]

identity:
  agentType: deterministic
  subtype: rule-based                        # schema validation is purely rule-driven
  roles: [schema-validator, data-quality-gate]
  criticality: high
  autonomyLevel: autonomous
  determinismGuarantee: fully-deterministic  # same schema + same data → same result
  stateMutability: stateless
  failureMode: fail-closed

capabilities:
  - json-schema-validation
  - data-validation

tools:
  - name: jsonSchemaValidator
    type: SERVICE
    endpoint: /platform/validation/json
  - name: xmlSchemaValidator
    type: SERVICE
    endpoint: /platform/validation/xml
  - name: protobufValidator
    type: SERVICE
    endpoint: /platform/validation/protobuf

memory:
  type: WORKING
  scope: schema_cache
  retention: short

routing:
  input: ValidationRequest
  output: ValidationResult

resources:
  memory: "512MB"
  cpu: "1"
  timeout: "30s"

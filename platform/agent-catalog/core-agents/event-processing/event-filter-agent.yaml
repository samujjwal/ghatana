schemaVersion: "2.0.0"
id: event-filter-agent
name: Event Filter Agent
namespace: platform.event-processing
version: 2.1.0
status: active
summary: >-
  Filters events using configurable predicate rules with optional deduplication support.
description: >
  Filters events based on configurable predicate rules. Supports simple field
  comparisons, complex boolean expressions (AND/OR/NOT), regex matching, set
  membership, range comparisons, and JSONPath predicates. Events that do not
  match are silently dropped or routed to an alternative output channel.
owners:
  - team: platform-team
    role: technical-owner
    contact: platform-team@ghatana.ai

metadata:
  level: 3
  domain: event-processing
  tags: [filter, predicate, routing, gating, aep, deduplication, stream-processor]
  maturity: production

identity:
  agentType: stream-processor           # passes/drops events from ordered stream
  subtype: filter
  roles: [filter, gate, deduplicator]
  criticality: high
  autonomyLevel: autonomous
  determinismGuarantee: fully-deterministic  # same rules + same events → same decisions
  stateMutability: local-state               # dedup window state (optional, checkpointed)
  failureMode: skip

# AEP Operator configuration
aep:
  operatorType: FILTER
  inputEventTypes:
    - "*.raw"
    - "*.ingested"
    - "*.enriched"
    - "event.*"
  outputEventTypes:
    - "*.filtered"
    - "*.accepted"
    - "*.rejected"
  backpressure:
    bufferSize: 10000
    overflowStrategy: DROP_OLDEST
  reliability:
    checkpointInterval: 60s
    maxRetries: 0
    deadLetterQueue: null   # Filters are fire-and-forget; no DLQ needed

capabilities:
  - predicate-filtering
  - regex-matching
  - range-evaluation
  - set-membership-check
  - boolean-expression
  - deduplication-filtering

# Filter rule configuration
configuration:
  filterRules:
    description: "Boolean expression tree of filter predicates"
    type: object
    required: true
    example:
      operator: AND
      conditions:
        - field: "$.payload.status"
          op: IN
          values: [ACTIVE, PENDING]
        - field: "$.payload.amount"
          op: GREATER_THAN
          value: 0
  rejectAction:
    description: "What to do with rejected events"
    type: string
    enum: [DROP, ROUTE_TO_REJECTED_CHANNEL, LOG_AND_DROP]
    default: DROP
  deduplication:
    description: "Optional deduplication window configuration"
    type: object
    properties:
      enabled:
        type: boolean
        default: false
      keyFields:
        type: array
        items:
          type: string
      windowSeconds:
        type: integer
        default: 300

interfaces:
  inputs:
    - name: incomingEvent
      type: JSON
      schema: "https://schema.ghatana.com/event/v1"
      required: true
  outputs:
    - name: acceptedEvent
      type: JSON
      schema: "https://schema.ghatana.com/event/v1"
    - name: rejectedEvent
      type: JSON
      schema: "https://schema.ghatana.com/event/v1"

memory:
  type: WORKING
  scope: dedup_window
  retention: short
  maxEntries: 100000

resources:
  memory: 256MB
  cpu: "0.5"
  timeout: 5s
  maxConcurrency: 100

routing:
  input: IncomingEvent
  output: FilterDecision

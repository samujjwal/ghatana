id: cost-optimization-agent
name: Cost Optimization Agent
namespace: platform.governance
version: 2.0.0
status: active
summary: >-
  Analyzes resource usage, identifies cost savings, and recommends optimizations across storage, compute, and network.
owners:
  - team: platform-team
    role: technical-owner
    contact: platform-team@ghatana.ai

metadata:
  level: 2
  domain: governance
  tags: [cost, optimization, finops, resource, savings, efficiency]

identity:
  agentType: hybrid                         # SERVICE_CALL for data + LLM for reasoning
  roles: [cost-analyzer, recommendation-engine, finops-advisor]
  criticality: medium
  autonomyLevel: semi-autonomous
  determinismGuarantee: non-deterministic    # LLM recommendations vary per run
  stateMutability: persistent               # maintains cost history across runs
  failureMode: skip

# Execution pipeline: deterministic data collection → LLM reasoning → recommendations
pipeline:
  steps:
    - name: usage_analysis
      type: SERVICE_CALL
      service: cost-analyzer
      endpoint: /platform/cost/analyze
    - name: optimization_recommendations
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.2
      prompt: |
        Analyze cost optimization opportunities:
        Usage Data: {{usage}}
        Resource Breakdown: {{resources}}
        Identify savings: storage tiers, reserved capacity, right-sizing

capabilities:
  - cost-optimization
  - resource-governance

tools:
  - name: costAnalyzer
    type: SERVICE
    endpoint: /platform/cost/analyze
  - name: optimizationEngine
    type: SERVICE
    endpoint: /platform/cost/optimize

memory:
  type: EPISODIC
  scope: cost_history
  retention: long

routing:
  input: CostOptimizationRequest
  output: OptimizationRecommendations

resources:
  memory: "1GB"
  cpu: "2"
  timeout: "120s"

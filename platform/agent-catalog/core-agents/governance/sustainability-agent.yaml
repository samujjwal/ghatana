schemaVersion: "2.0.0"
id: sustainability-agent
name: Sustainability Agent
namespace: platform.governance
version: 2.0.0
status: active
summary: >-
  Monitors carbon footprint, energy efficiency, and recommends green computing practices.
owners:
  - team: platform-team
    role: technical-owner
    contact: platform-team@ghatana.ai

metadata:
  level: 2
  domain: governance
  tags: [sustainability, green-computing, carbon, energy, efficiency, esg]

identity:
  agentType: adaptive                       # continuously updates sustainability model from metric feedback
  roles: [carbon-monitor, efficiency-advisor, esg-reporter]
  criticality: low
  autonomyLevel: semi-autonomous
  determinismGuarantee: non-deterministic   # recommendations evolve as baselines are learned
  stateMutability: persistent               # maintains historical sustainability metrics
  failureMode: skip

capabilities:
  - sustainability
  - resource-governance

tools:
  - name: carbonCalculator
    type: SERVICE
    endpoint: /platform/sustainability/carbon
  - name: efficiencyAnalyzer
    type: SERVICE
    endpoint: /platform/sustainability/efficiency

memory:
  type: EPISODIC
  scope: sustainability_metrics
  retention: long

routing:
  input: SustainabilityAssessmentRequest
  output: SustainabilityReport

resources:
  memory: "512MB"
  cpu: "1"
  timeout: "60s"

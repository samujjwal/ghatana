# Agent Catalog Schema
#
# Defines the standard schema for agent descriptor YAML files used across
# all product catalogs. Every agent.yaml MUST conform to this schema.
#
# SCHEMA VERSION HISTORY
#   2.0.0 (current) -- unified identity block, 9 canonical agentType values,
#                      namespace/status/owners/summary required fields.
#                      `generator:` block is DEPRECATED; use `identity.agentType`.
#   1.0.0 (legacy)  -- `type` top-level field; `generator.type` block.

schema:
  version: "2.0.0"

  agent:
    required:
      - id            # Unique agent identifier (catalog-scoped, kebab-case)
      - name          # Human-readable name
      - namespace     # Dot-separated catalog namespace, e.g. platform.event-processing
      - version       # Semantic version (e.g. "1.0.0")
      - status        # active | deprecated | experimental
      - owners        # At least one owner entry
      - summary       # One-line description (≤ 120 chars)
      - identity      # Unified type identity block (see identity schema below)

    # --- identity block ---------------------------------------------------
    identity:
      agentType:
        type: string
        required: true
        enum:
          - deterministic     # Rule-based, threshold, FSM, policy — config-driven, reproducible
          - probabilistic     # ML models, LLMs, classifiers — stochastic outputs
          - stream-processor  # Stateful ordered-stream operators (AEP SOURCE/SINK/PROCESSOR)
          - planning          # Goal-directed multi-step reasoning (HTN, ReAct, ToT, workflow)
          - hybrid            # Mix of deterministic + probabilistic logic in one agent
          - adaptive          # Self-improving via learning loop (RL, online-learning, bandits)
          - composite         # Orchestrates other agents; no business logic of its own
          - reactive          # Event-triggered, stateless, fire-and-forget
          - custom            # Escape hatch — must include a customType discriminator

      subtype:
        type: string
        required: false
        description: >
          Fine-grained subtype — see DeterministicSubtype, ProbabilisticSubtype,
          StreamProcessorSubtype, PlanningSubtype in agent-framework Java enums.
        examples:
          deterministic: [rule-based, threshold, pattern, fsm, exact-match, policy, operator, template]
          probabilistic: [ml-model, bayesian, statistical, llm, classifier]
          stream-processor: [ingestion, routing, transformation, cep, enrichment, window-aggregation, filter]
          planning: [htn, react, tot, workflow, objective-decomposition]

      roles:
        type: array
        required: false
        items: string
        description: "Functional role labels (free-form, for catalog search)"

      criticality:
        type: string
        required: true
        enum: [critical, high, medium, low]

      autonomyLevel:
        type: string
        required: true
        enum: [advisory, draft, supervised, bounded-autonomous, autonomous]
        description: >
          Canonical five-tier autonomy progression:
            advisory: Agent provides recommendations only, never executes.
            draft: Agent prepares drafts, human approves before execution.
            supervised: Agent executes with real-time human oversight.
            bounded-autonomous: Agent acts within declared boundaries, escalates outside.
            autonomous: Full delegation within governance policy.
          Legacy values 'semi-autonomous' and 'manual' map to 'supervised' and 'draft' respectively.

      determinismGuarantee:
        type: string
        required: true
        enum: [fully-deterministic, config-scoped, non-deterministic]
        description: >
          fully-deterministic: same input → same output always.
          config-scoped: same config + same input → same output.
          non-deterministic: output may differ (ML, LLM, randomness).

      stateMutability:
        type: string
        required: true
        enum: [stateless, local-state, persistent]
        description: >
          stateless: no state retained between invocations.
          local-state: state maintained during execution, checkpointed.
          persistent: durable model/knowledge state updated over time.

      failureMode:
        type: string
        required: true
        enum: [fail-fast, fail-silent, fail-closed, dead-letter, retry, skip, degrade]
        description: "How the agent behaves when it cannot produce a result."

    # --- owners block -----------------------------------------------------
    owners:
      type: array
      items:
        team:
          type: string
          required: true
        role:
          type: string
          enum: [technical-owner, product-owner, security-reviewer, compliance-approver]
        contact:
          type: string
          format: email

    optional:
      description:    # Free-text description
        type: string

      aep:            # AEP integration (event-driven agents only)
        operatorType:       # INGESTION | TRANSFORMATION | ROUTING | SINK
          type: string
          enum: [INGESTION, TRANSFORMATION, ROUTING, SINK, PATTERN_DETECTION]
        inputEventTypes:
          type: array
          items: string
        outputEventTypes:
          type: array
          items: string
        backpressure:
          bufferSize:
            type: integer
            default: 1000
          overflowStrategy:
            type: string
            enum: [DROP_LATEST, DROP_OLDEST, BLOCK, UNBOUNDED, OVERFLOW_TO_DLQ]
            default: DROP_LATEST
        reliability:
          checkpointInterval:
            type: string
            default: "30s"
          maxRetries:
            type: integer
            default: 3
          deadLetterQueue:
            type: string

      capabilities:   # Declared capability tags
        type: array
        items:
          name:
            type: string
            required: true
          version:
            type: string
            default: "1.0"
          type:
            type: string
          parameters:
            type: object

      io:             # Input/output specifications
        inputs:
          type: array
          items:
            name: { type: string, required: true }
            type: { type: string, required: true }
            schema: { type: string }
            required: { type: boolean, default: true }
        outputs:
          type: array
          items:
            name: { type: string, required: true }
            type: { type: string, required: true }
            schema: { type: string }

      resources:      # Resource requirements
        memory:
          type: string
          default: "512MB"
        cpu:
          type: string
          default: "1"
        timeout:
          type: string
          default: "30s"
        maxConcurrency:
          type: integer
          default: 10

      implementation: # Java class reference
        class:
          type: string
          required: true
        module:
          type: string   # Gradle module path (e.g. "products:data-cloud:aep:engine")

      metadata:       # Arbitrary metadata
        author:
          type: string
        tags:
          type: array
          items: string
        maturity:
          type: string
          enum: [experimental, beta, production, deprecated]
          default: experimental

      # YAPPC-style extended fields (optional)
      # DEPRECATED: generator.type — use identity.agentType instead (schema v2.0.0)
      generator:
        type: object
        deprecated: true
        deprecatedSince: "2.0.0"
        replacedBy: "identity.agentType"
        description: "DEPRECATED — kept for backward compatibility; will be removed in schema v3.0.0"
      memory:
        type: object
      tools:
        type: array
        items: string
      routing:
        type: object
      delegation:
        type: object
      governance:
        type: object
        description: "General governance metadata"

      actionGovernance:
        type: object
        description: "Governance rules for agent actions"
        properties:
          allowedActionClasses:
            type: array
            items:
              type: string
              enum: [READ, DRAFT, WRITE_REVERSIBLE, WRITE_IRREVERSIBLE, CALL_EXTERNAL, DELEGATE, MEMORY_MUTATION, POLICY_CHANGE]
            description: "Action classes this agent is permitted to perform"
          reversibilityDefault:
            type: string
            enum: [REVERSIBLE, COMPENSATABLE, IRREVERSIBLE]
            default: REVERSIBLE
          maxDelegationDepth:
            type: integer
            default: 3
            description: "Maximum depth of the delegation chain"
          maxDelegationFanout:
            type: integer
            default: 5
            description: "Maximum number of concurrent delegations"
          budgets:
            type: object
            properties:
              maxCostPerTurn:
                type: number
                description: "Maximum cost per agent turn in USD"
              maxActionsPerTurn:
                type: integer
                description: "Maximum actions permitted per turn"
              maxTurnDurationSeconds:
                type: integer
                description: "Maximum turn duration in seconds"

      memoryGovernance:
        type: object
        description: "Governance rules for agent memory access"
        properties:
          namespace:
            type: string
            description: "Memory namespace this agent operates in"
          owner:
            type: string
            description: "Owning agent or team for the namespace"
          versioning:
            type: boolean
            default: true
            description: "Whether memory mutations are versioned"
          sharingMode:
            type: string
            enum: [PRIVATE, SHARED_READ, SHARED_WRITE, PUBLIC]
            default: PRIVATE
          conflictResolution:
            type: string
            enum: [LAST_WRITE_WINS, VERSION_VECTOR, MANUAL]
            default: LAST_WRITE_WINS
          provenanceRequired:
            type: boolean
            default: true
            description: "Whether memory mutations must carry provenance metadata"
          retentionDays:
            type: integer
            default: 90
            description: "Days to retain memory items before archival/deletion"

      assurance:
        type: object
        description: "Evaluation and promotion gate references"
        properties:
          evaluationPacks:
            type: array
            items:
              type: string
            description: "List of evaluation pack IDs required for this agent"
          requiredPassRate:
            type: number
            default: 0.95
            description: "Minimum pass rate across all evaluation packs"
          promotionGates:
            type: array
            items:
              type: string
            description: "Promotion gate IDs this agent must pass for deployment"
          shadowTestRequired:
            type: boolean
            default: false
            description: "Whether shadow testing is required before production"
          invariantSets:
            type: array
            items:
              type: string
            description: "Invariant set IDs that must hold during execution"

      performance:
        type: object

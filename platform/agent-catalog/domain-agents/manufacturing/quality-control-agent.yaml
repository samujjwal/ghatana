id: quality-control-agent
name: Manufacturing Quality Control Agent
namespace: platform.domain.manufacturing
version: 2.1.0
status: active
summary: >-
  Real-time SPC and defect detection for ISO 9001 / IATF 16949 manufacturing quality management.
description: >
  Real-time quality control agent for manufacturing process monitoring, defect
  detection, and Statistical Process Control (SPC). Ingests sensor data, vision
  inspection results, and production telemetry to compute control charts
  (X-bar/R, P-chart, CUSUM), detect out-of-control conditions, classify defects
  using configurable classification rules, and generate corrective action signals.
  Supports ISO 9001, IATF 16949 (automotive), and AS9100 (aerospace) quality
  management requirements.
owners:
  - team: platform-team
    role: technical-owner
    contact: platform-team@ghatana.ai

metadata:
  level: 4
  domain: manufacturing
  tags: [manufacturing, quality, spc, defect-detection, iso9001, iatf16949, sensor, oee]
  maturity: production
  standards:
    - ISO 9001
    - IATF 16949
    - AS9100
    - IEC 61511

identity:
  agentType: deterministic
  subtype: threshold                            # SPC control charts are threshold-based rules
  roles: [quality-monitor, defect-detector, spc-evaluator, corrective-action-emitter]
  criticality: critical
  autonomyLevel: supervised                     # safety-critical; human-in-the-loop for corrective actions
  determinismGuarantee: fully-deterministic     # same sensor readings + same thresholds → same decision
  stateMutability: local-state                  # running statistics (mean, std) within control window
  failureMode: fail-closed

# AEP Operator configuration
aep:
  operatorType: ANALYSIS
  inputEventTypes:
    - "manufacturing.sensor.reading"
    - "manufacturing.vision.inspection"
    - "manufacturing.production.event"
    - "manufacturing.machine.telemetry"
  outputEventTypes:
    - "manufacturing.quality.ok"
    - "manufacturing.defect.detected"
    - "manufacturing.spc.alarm"
    - "manufacturing.corrective-action.signal"
    - "manufacturing.oee.computed"
  backpressure:
    bufferSize: 50000
    overflowStrategy: BLOCK
  reliability:
    checkpointInterval: 15s
    maxRetries: 0    # Real-time; no retries — missed data is lost
    deadLetterQueue: null

capabilities:
  - spc-x-bar-r-chart
  - spc-p-chart
  - cusum-detection
  - defect-classification
  - corrective-action-generation
  - oee-computation
  - predictive-maintenance-signal

# Quality control configuration
configuration:
  productionLine:
    description: "Production line identifier"
    type: string
    required: true
  controlCharts:
    description: "SPC control chart configuration"
    type: object
    properties:
      type:
        type: string
        enum: [X_BAR_R, X_BAR_S, P_CHART, NP_CHART, C_CHART, CUSUM, EWMA]
        default: X_BAR_R
      sampleSize:
        type: integer
        default: 5
      controlLimitSigma:
        type: number
        default: 3.0
      subgroupSize:
        type: integer
        default: 25
  defectClassification:
    description: "Defect classification rules"
    type: array
    items:
      type: object
      properties:
        defectCode:
          type: string
        severity:
          type: string
          enum: [CRITICAL, MAJOR, MINOR, COSMETIC]
        rule:
          type: string
          description: "JSONPath predicate"
  alarmRules:
    description: "Western Electric Rules for out-of-control detection"
    type: object
    properties:
      rule1:
        type: boolean
        default: true
        description: "1 point beyond 3-sigma"
      rule2:
        type: boolean
        default: true
        description: "9 consecutive points on same side of centreline"
      rule3:
        type: boolean
        default: true
        description: "6 consecutive points trending in one direction"
      rule4:
        type: boolean
        default: true
        description: "14 alternating up/down points"
  oeeEnabled:
    description: "Compute OEE (Availability × Performance × Quality)"
    type: boolean
    default: true

io:
  inputs:
    - name: sensorReading
      type: JSON
      schema: "https://schema.ghatana.com/manufacturing/sensor-reading/v1"
      required: true
  outputs:
    - name: qualityDecision
      type: JSON
      schema: "https://schema.ghatana.com/manufacturing/quality-decision/v1"
    - name: spcAlarm
      type: JSON
      schema: "https://schema.ghatana.com/manufacturing/spc-alarm/v1"
    - name: correctiveActionSignal
      type: JSON
      schema: "https://schema.ghatana.com/manufacturing/corrective-action/v1"

memory:
  type: WORKING
  scope: spc_window
  retention: short
  maxEntries: 50000

resources:
  memory: 1GB
  cpu: "1"
  timeout: 5s
  maxConcurrency: 20

routing:
  input: SensorReadingEvent
  output: QualityDecisionEvent

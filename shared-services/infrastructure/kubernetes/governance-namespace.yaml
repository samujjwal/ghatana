apiVersion: v1
kind: Namespace
metadata:
  name: ghatana
  labels:
    name: ghatana
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ghatana-quota
  namespace: ghatana
spec:
  hard:
    requests.cpu: "20"
    requests.memory: "40Gi"
    limits.cpu: "40"
    limits.memory: "80Gi"
    pods: "100"
    services: "20"
    services.nodeports: "5"
    persistentvolumeclaims: "10"
  scopeSelector:
    matchExpressions:
      - operator: In
        scopeName: PriorityClass
        values: ["default", "high-priority"]
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ghatana-limits
  namespace: ghatana
spec:
  limits:
    - type: Pod
      max:
        cpu: "2"
        memory: "2Gi"
      min:
        cpu: "100m"
        memory: "128Mi"
    - type: Container
      max:
        cpu: "1"
        memory: "1Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "250m"
        memory: "256Mi"
    - type: PersistentVolumeClaim
      max:
        storage: "10Gi"
      min:
        storage: "1Gi"

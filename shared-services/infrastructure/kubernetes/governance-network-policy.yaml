apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: governance-service-network-policy
  namespace: ghatana
  labels:
    app: governance-service
spec:
  podSelector:
    matchLabels:
      app: governance-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from API gateway
    - from:
        - namespaceSelector:
            matchLabels:
              name: ghatana
          podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8080
    # Allow ingress from Prometheus for metrics
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9090
    # Allow internal DNS queries
    - from:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53
  egress:
    # Allow egress to PostgreSQL
    - to:
        - namespaceSelector:
            matchLabels:
              name: ghatana
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow egress to Redis
    - to:
        - namespaceSelector:
            matchLabels:
              name: ghatana
          podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow egress to other services
    - to:
        - namespaceSelector:
            matchLabels:
              name: ghatana
      ports:
        - protocol: TCP
          port: 8080
    # Allow DNS queries
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # Allow egress to external APIs (HTTPS)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

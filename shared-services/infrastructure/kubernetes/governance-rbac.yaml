apiVersion: v1
kind: ServiceAccount
metadata:
  name: governance-service
  namespace: ghatana
  labels:
    app: governance-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: governance-service-role
  namespace: ghatana
  labels:
    app: governance-service
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/logs"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: governance-service-rolebinding
  namespace: ghatana
  labels:
    app: governance-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: governance-service-role
subjects:
  - kind: ServiceAccount
    name: governance-service
    namespace: ghatana

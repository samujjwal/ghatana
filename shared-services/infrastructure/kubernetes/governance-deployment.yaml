apiVersion: apps/v1
kind: Deployment
metadata:
  name: governance-service
  namespace: ghatana
  labels:
    app: governance-service
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: governance-service
  template:
    metadata:
      labels:
        app: governance-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: governance-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: governance-service
          image: ghatana/governance-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
            - name: SERVICE_NAME
              value: governance-service
            - name: SERVICE_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['version']
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: COLLECTION_MAX_ROLE_INHERITANCE_DEPTH
              valueFrom:
                configMapKeyRef:
                  name: governance-config
                  key: max-role-inheritance-depth
            - name: COLLECTION_ENABLE_CYCLE_DETECTION
              valueFrom:
                configMapKeyRef:
                  name: governance-config
                  key: enable-cycle-detection
            - name: COLLECTION_ROLE_CACHE_TTL
              valueFrom:
                configMapKeyRef:
                  name: governance-config
                  key: role-cache-ttl
            - name: COLLECTION_MAX_ROLE_ASSIGNMENTS_PER_PRINCIPAL
              valueFrom:
                configMapKeyRef:
                  name: governance-config
                  key: max-role-assignments-per-principal
            - name: COLLECTION_MAX_PERMISSIONS_PER_ROLE
              valueFrom:
                configMapKeyRef:
                  name: governance-config
                  key: max-permissions-per-role
            - name: COLLECTION_ENABLE_AUDIT_LOGGING
              valueFrom:
                configMapKeyRef:
                  name: governance-config
                  key: enable-audit-logging
            - name: COLLECTION_ENABLE_METRICS
              valueFrom:
                configMapKeyRef:
                  name: governance-config
                  key: enable-metrics
            - name: COLLECTION_METRICS_COLLECTION_INTERVAL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: governance-config
                  key: metrics-collection-interval-seconds
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: governance-secrets
                  key: database-url
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: governance-secrets
                  key: database-user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: governance-secrets
                  key: database-password
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: governance-config
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: governance-config
                  key: redis-port
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1024Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            initialDelaySeconds: 0
            periodSeconds: 2
            timeoutSeconds: 3
            failureThreshold: 30
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
            - name: cache-volume
              mountPath: /var/cache/governance
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config-volume
          configMap:
            name: governance-config
        - name: cache-volume
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - governance-service
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - compute
      terminationGracePeriodSeconds: 30

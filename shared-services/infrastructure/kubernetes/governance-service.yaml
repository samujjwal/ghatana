apiVersion: v1
kind: Service
metadata:
  name: governance-service
  namespace: ghatana
  labels:
    app: governance-service
spec:
  type: ClusterIP
  selector:
    app: governance-service
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  sessionAffinity: None
  publishNotReadyAddresses: false
---
apiVersion: v1
kind: Service
metadata:
  name: governance-service-headless
  namespace: ghatana
  labels:
    app: governance-service
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: governance-service
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  publishNotReadyAddresses: true

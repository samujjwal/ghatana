apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: governance-service-ingress
  namespace: ghatana
  labels:
    app: governance-service
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - governance.ghatana.local
        - governance-api.ghatana.local
      secretName: governance-service-tls
  rules:
    - host: governance.ghatana.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: governance-service
                port:
                  number: 80
    - host: governance-api.ghatana.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: governance-service
                port:
                  number: 80
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: governance-service
                port:
                  number: 80
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: governance-service
                port:
                  number: 9090

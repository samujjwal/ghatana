# =============================================================================
# External Secrets Operator — Governance Secrets
# =============================================================================
# Secrets are fetched from an external secrets backend (e.g., AWS Secrets Manager,
# HashiCorp Vault, GCP Secret Manager) at runtime. NO plaintext secrets in Git.
#
# Prerequisites:
#   1. Install External Secrets Operator: https://external-secrets.io
#   2. Create a SecretStore or ClusterSecretStore pointing to your provider
#   3. Populate the referenced keys in your secrets backend
# =============================================================================

# --- SecretStore: connects to the secrets backend ---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: ghatana-secret-store
  namespace: ghatana
  labels:
    app: governance-service
spec:
  provider:
    # ====== AWS Secrets Manager example (uncomment and configure) ======
    # aws:
    #   service: SecretsManager
    #   region: us-east-1
    #   auth:
    #     secretRef:
    #       accessKeyIDSecretRef:
    #         name: aws-credentials
    #         key: access-key-id
    #       secretAccessKeySecretRef:
    #         name: aws-credentials
    #         key: secret-access-key

    # ====== HashiCorp Vault example (uncomment and configure) ======
    # vault:
    #   server: "https://vault.ghatana.svc.cluster.local:8200"
    #   path: "secret"
    #   version: "v2"
    #   auth:
    #     kubernetes:
    #       mountPath: "kubernetes"
    #       role: "governance-service"

    # ====== GCP Secret Manager example (uncomment and configure) ======
    # gcpsm:
    #   projectID: your-gcp-project-id

    # ====== Fake provider for local development ======
    fake:
      data:
        - key: "/ghatana/governance/database-url"
          value: "jdbc:postgresql://postgres.ghatana.svc.cluster.local:5432/governance"
        - key: "/ghatana/governance/database-user"
          value: "governance-user"

---
# --- ExternalSecret: declares which secrets to fetch ---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: governance-secrets
  namespace: ghatana
  labels:
    app: governance-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ghatana-secret-store
    kind: SecretStore
  target:
    name: governance-secrets
    creationPolicy: Owner
  data:
    # Database
    - secretKey: database-url
      remoteRef:
        key: /ghatana/governance/database-url
    - secretKey: database-user
      remoteRef:
        key: /ghatana/governance/database-user
    - secretKey: database-password
      remoteRef:
        key: /ghatana/governance/database-password

    # Cache
    - secretKey: redis-password
      remoteRef:
        key: /ghatana/governance/redis-password

    # Authentication
    - secretKey: jwt-secret-key
      remoteRef:
        key: /ghatana/governance/jwt-secret-key
    - secretKey: oauth-client-id
      remoteRef:
        key: /ghatana/governance/oauth-client-id
    - secretKey: oauth-client-secret
      remoteRef:
        key: /ghatana/governance/oauth-client-secret

    # External API keys
    - secretKey: ai-service-api-key
      remoteRef:
        key: /ghatana/governance/ai-service-api-key
    - secretKey: email-service-api-key
      remoteRef:
        key: /ghatana/governance/email-service-api-key

    # Service-to-service auth
    - secretKey: service-auth-token
      remoteRef:
        key: /ghatana/governance/service-auth-token

    # Encryption
    - secretKey: data-encryption-key
      remoteRef:
        key: /ghatana/governance/data-encryption-key

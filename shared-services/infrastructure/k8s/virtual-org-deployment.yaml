apiVersion: apps/v1
kind: Deployment
metadata:
  name: virtual-org
  namespace: ghatana
  labels:
    app: virtual-org
    component: agent-simulation
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: virtual-org
  template:
    metadata:
      labels:
        app: virtual-org
        component: agent-simulation
        version: v1
    spec:
      serviceAccountName: virtual-org
      containers:
      - name: virtual-org
        image: ghatana/virtual-org:1.0.0-SNAPSHOT
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8087
          protocol: TCP
        - name: metrics
          containerPort: 9097
          protocol: TCP
        env:
        - name: VORG_INSTANCE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: VORG_HTTP_PORT
          value: "8087"
        - name: VORG_METRICS_PORT
          value: "9097"
        - name: VORG_AGENT_POOL_SIZE
          value: "10"
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
        envFrom:
        - configMapRef:
            name: virtual-org-config
        - secretRef:
            name: virtual-org-secrets
            optional: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "3000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 45
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: agent-state
          mountPath: /app/state
      volumes:
      - name: logs
        emptyDir: {}
      - name: agent-state
        persistentVolumeClaim:
          claimName: virtual-org-state
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: virtual-org-state
  namespace: ghatana
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

apiVersion: v1
kind: Service
metadata:
  name: auth-gateway
  namespace: ghatana
  labels:
    app: auth-gateway
    component: authentication
spec:
  type: ClusterIP
  selector:
    app: auth-gateway
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP

apiVersion: v1
kind: Service
metadata:
  name: software-org
  namespace: ghatana
  labels:
    app: software-org
    component: org-management
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9096
    targetPort: metrics
    protocol: TCP
  selector:
    app: software-org

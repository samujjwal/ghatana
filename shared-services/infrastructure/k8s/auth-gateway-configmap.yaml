apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-gateway-config
  namespace: ghatana
  labels:
    app: auth-gateway
    component: authentication
data:
  # Authentication Configuration
  JWT_TTL_MS: "900000"  # 15 minutes
  REFRESH_TOKEN_TTL_MS: "604800000"  # 7 days
  
  # Rate Limiting
  RATE_LIMIT_REQUESTS_PER_MINUTE: "60"
  RATE_LIMIT_BURST: "10"
  
  # Logging Configuration
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  
  # Database Configuration
  DB_POOL_SIZE: "10"
  DB_CONNECTION_TIMEOUT_MS: "30000"

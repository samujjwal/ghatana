  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: data-cloud
      version: v1.3.0-canary
  template:
    metadata:
      labels:
        app: data-cloud
        version: v1.3.0-canary

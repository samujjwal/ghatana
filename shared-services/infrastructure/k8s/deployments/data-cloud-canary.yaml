                  values:
                  - data-cloud
              topologyKey: kubernetes.io/hostname
---
# Service for Data-Cloud
apiVersion: v1
kind: Service
metadata:
  name: data-cloud
  namespace: ghatana
  labels:
    app: data-cloud
spec:
  type: ClusterIP
  selector:
    app: data-cloud
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
---
# Horizontal Pod Autoscaler - Production
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: data-cloud-production-hpa
  namespace: ghatana
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: data-cloud-production
  minReplicas: 8
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
---
# Horizontal Pod Autoscaler - Canary
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: data-cloud-canary-hpa
  namespace: ghatana
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: data-cloud-canary
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

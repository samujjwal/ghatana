apiVersion: apps/v1
kind: Deployment
metadata:
  name: software-org
  namespace: ghatana
  labels:
    app: software-org
    component: org-management
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: software-org
  template:
    metadata:
      labels:
        app: software-org
        component: org-management
        version: v1
    spec:
      serviceAccountName: software-org
      containers:
      - name: software-org
        image: ghatana/software-org:1.0.0-SNAPSHOT
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8086
          protocol: TCP
        - name: metrics
          containerPort: 9096
          protocol: TCP
        env:
        - name: SOFTORG_INSTANCE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: SOFTORG_HTTP_PORT
          value: "8086"
        - name: SOFTORG_METRICS_PORT
          value: "9096"
        - name: JAVA_OPTS
          value: "-Xms256m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
        envFrom:
        - configMapRef:
            name: software-org-config
        - secretRef:
            name: software-org-secrets
            optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}

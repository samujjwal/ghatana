apiVersion: v1
kind: Service
metadata:
  name: audio-video
  namespace: ghatana
  labels:
    app: audio-video
    component: media-processing
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9095
    targetPort: metrics
    protocol: TCP
  - name: grpc
    port: 50051
    targetPort: grpc
    protocol: TCP
  selector:
    app: audio-video

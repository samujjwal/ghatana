# Ingress with Canary support
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: data-cloud-production
  namespace: ghatana
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - app.ghatana.com
    secretName: data-cloud-tls
  rules:
  - host: app.ghatana.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: data-cloud
            port:
              number: 80
---
# Canary Ingress - Progressive traffic shifting
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: data-cloud-canary
  namespace: ghatana
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "0"  # Start at 0%, increase gradually
    nginx.ingress.kubernetes.io/canary-by-header: "X-Canary-User"
    nginx.ingress.kubernetes.io/canary-by-header-value: "true"
    nginx.ingress.kubernetes.io/canary-by-cookie: "canary"
spec:
  tls:
  - hosts:
    - app.ghatana.com
    secretName: data-cloud-tls
  rules:
  - host: app.ghatana.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: data-cloud
            port:
              number: 80

apiVersion: apps/v1
kind: Deployment
metadata:
  name: yappc
  namespace: ghatana
  labels:
    app: yappc
    component: devsecops-platform
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: yappc
  template:
    metadata:
      labels:
        app: yappc
        component: devsecops-platform
        version: v1
    spec:
      serviceAccountName: yappc
      containers:
      - name: yappc
        image: ghatana/yappc:1.0.0-SNAPSHOT
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: YAPPC_INSTANCE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: YAPPC_HTTP_PORT
          value: "8080"
        - name: YAPPC_METRICS_PORT
          value: "9090"
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
        envFrom:
        - configMapRef:
            name: yappc-config
        - secretRef:
            name: yappc-secrets
            optional: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: data
          mountPath: /app/data
      volumes:
      - name: logs
        emptyDir: {}
      - name: data
        persistentVolumeClaim:
          claimName: yappc-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: yappc-data
  namespace: ghatana
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

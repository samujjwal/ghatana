apiVersion: v1
kind: ConfigMap
metadata:
  name: audio-video-config
  namespace: ghatana
  labels:
    app: audio-video
data:
  AV_ENV: "production"
  AV_LOG_LEVEL: "INFO"
  AV_STT_MODEL_PATH: "/app/models/whisper"
  AV_TTS_MODEL_PATH: "/app/models/tts"
  AV_DATACLOUD_URL: "http://datacloud.ghatana.svc.cluster.local:80"
  AV_AUTH_GATEWAY_URL: "http://auth-gateway.ghatana.svc.cluster.local:80"

apiVersion: v1
kind: Service
metadata:
  name: aep
  namespace: ghatana
  labels:
    app: aep
    component: event-processor
spec:
  type: ClusterIP
  selector:
    app: aep
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: aep-headless
  namespace: ghatana
  labels:
    app: aep
    component: event-processor
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: aep
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP

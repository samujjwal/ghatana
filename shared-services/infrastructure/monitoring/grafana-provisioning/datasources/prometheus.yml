# Grafana Provisioning - Datasources
#
# Purpose: Auto-configure Prometheus datasource for Phase 4 dashboards
# Location: monitoring/grafana-provisioning/datasources/prometheus.yml

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: "5s"
    version: 1

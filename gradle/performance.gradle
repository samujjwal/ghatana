/**
 * Gradle Performance Optimizations
 *
 * Applies performance tuning for large monorepo builds:
 * - Build cache optimization
 * - Parallel execution tuning
 * - Memory management
 * - Dependency resolution optimization
 */

// =============================================================================
// Build Cache Configuration
// =============================================================================
buildCache {
    local {
        isEnabled = true
        directory = file("${rootProject.buildDir}/.gradle-build-cache")
        removeUnusedEntriesAfterDays = 30
    }

    // Remote build cache can be configured here if needed
    // remote(HttpBuildCache) {
    //     url = uri("https://your-build-cache-server/cache")
    //     credentials {
    //         username = System.getenv("BUILD_CACHE_USER")
    //         password = System.getenv("BUILD_CACHE_PASSWORD")
    //     }
    //     isPush = true
    // }
}

// =============================================================================
// Dependency Resolution Optimization
// =============================================================================
configurations.all {
    resolutionStrategy {
        // Cache dynamic versions for 24 hours
        cacheDynamicVersionsFor(24, 'hours')

        // Cache changing modules for 24 hours
        cacheChangingModulesFor(24, 'hours')

        // Prefer stable versions
        preferProjectModules()

        // Fail fast on version conflicts
        failOnVersionConflict()
    }
}

// =============================================================================
// Task Configuration Optimization
// =============================================================================
// Enable configuration cache for all tasks
tasks.configureEach {
    // Only configure tasks that will actually be executed
    onlyIf { !gradle.startParameter.taskNames.isEmpty() || gradle.taskGraph.hasTask(this) }

    // Enable task outputs caching where appropriate
    if (this !is org.gradle.api.tasks.testing.Test) {
        outputs.cacheIf { true }
    }
}

// =============================================================================
// Memory and Parallel Execution Tuning
// =============================================================================
// Optimize memory usage for large builds
gradle.taskGraph.whenReady {
    val maxWorkers = Runtime.getRuntime().availableProcessors()
    val optimalWorkers = (maxWorkers * 0.75).toInt().coerceAtLeast(1)

    logger.lifecycle("Setting parallel workers to $optimalWorkers (max available: $maxWorkers)")

    // Adjust worker count based on available memory
    val maxMemory = Runtime.getRuntime().maxMemory() / (1024 * 1024) // MB
    if (maxMemory < 4096) { // Less than 4GB
        logger.lifecycle("Low memory detected ($maxMemory MB), reducing parallel workers")
        gradle.startParameter.maxWorkerCount = (optimalWorkers * 0.5).toInt().coerceAtLeast(1)
    } else {
        gradle.startParameter.maxWorkerCount = optimalWorkers
    }
}

// =============================================================================
// Compilation Optimization
// =============================================================================
// Enable incremental compilation where possible
tasks.withType<JavaCompile>().configureEach {
    options.isIncremental = true

    // Enable compiler daemon reuse
    options.fork = true
    options.forkOptions.jvmArgs?.addAll(listOf(
        "-Xmx2g",
        "-XX:+UseG1GC",
        "-XX:TieredStopAtLevel=1"
    ))
}

// Kotlin compilation optimization (if applicable)
tasks.withType<org.jetbrains.kotlin.gradle.tasks.KotlinCompile>().configureEach {
    kotlinOptions {
        jvmTarget = "21"
        incremental = true
        jvmArgs = listOf("-Xmx2g")
    }
}

// =============================================================================
// Test Execution Optimization
// =============================================================================
tasks.withType<Test>().configureEach {
    // Enable test parallelization
    maxParallelForks = (Runtime.getRuntime().availableProcessors() / 2).coerceAtLeast(1)

    // Enable test caching
    outputs.cacheIf { !project.hasProperty("runIntegrationTests") }

    // Optimize JVM args for tests
    jvmArgs(
        "-Xmx1g",
        "-XX:+UseG1GC",
        "-XX:+UseStringDeduplication",
        "-Djava.awt.headless=true"
    )

    // Fork test processes to avoid memory leaks
    forkEvery = 50

    // Enable test report caching
    reports.html.required.set(!project.hasProperty("ci"))
}

// =============================================================================
// Dependency Verification and Security
// =============================================================================
// Enable dependency verification for security
dependencyVerification {
    configuration = project.configurations["runtimeClasspath"]
    artifacts = true
    checksums = true
    signatures = true
    keys = true
}

// =============================================================================
// Build Time Monitoring
// =============================================================================
// Track build performance
gradle.buildFinished {
    val totalBuildTime = it.result?.duration ?: 0
    logger.lifecycle("Build completed in ${totalBuildTime}ms")

    // Log slow tasks (over 30 seconds)
    it.allTasks.forEach { task ->
        if (task.didWork && task.executionTime > 30000) {
            logger.lifecycle("Slow task detected: ${task.path} took ${task.executionTime}ms")
        }
    }
}

// =============================================================================
// Custom Performance Tasks
// =============================================================================
// Task to analyze build performance
tasks.register("analyzeBuildPerformance") {
    group = "help"
    description = "Analyzes build performance and provides recommendations"

    doLast {
        println("=== Build Performance Analysis ===")
        println("Java Version: ${System.getProperty("java.version")}")
        println("Available Processors: ${Runtime.getRuntime().availableProcessors()}")
        println("Max Memory: ${Runtime.getRuntime().maxMemory() / (1024 * 1024)} MB")
        println("Gradle Version: ${gradle.gradleVersion}")
        println("Configuration Cache: ${gradle.startParameter.isConfigurationCacheRequested}")
        println("Build Cache: ${gradle.startParameter.isBuildCacheEnabled}")
        println("Parallel Execution: ${gradle.startParameter.isParallelProjectExecutionEnabled}")
        println("Max Workers: ${gradle.startParameter.maxWorkerCount}")
        println("=====================================")

        // Recommendations
        println("\n=== Performance Recommendations ===")

        val maxMemory = Runtime.getRuntime().maxMemory() / (1024 * 1024)
        if (maxMemory < 4096) {
            println("- Consider increasing JVM memory to at least 4GB for optimal performance")
        }

        val processors = Runtime.getRuntime().availableProcessors()
        if (processors < 8) {
            println("- More CPU cores would significantly improve build performance")
        }

        if (!gradle.startParameter.isConfigurationCacheRequested) {
            println("- Enable configuration cache for faster builds: --configuration-cache")
        }

        if (!gradle.startParameter.isBuildCacheEnabled) {
            println("- Enable build cache for faster incremental builds: --build-cache")
        }

        println("- Use parallel execution: --parallel")
        println("- Use dry-run to see what would be executed: --dry-run")
        println("=====================================")
    }
}

// Task to profile build execution
tasks.register("profileBuild") {
    group = "help"
    description = "Profiles build execution with detailed timing"

    doLast {
        gradle.startParameter.isProfile = true
        println("Build profiling enabled. Run your build command again to see profile report.")
        println("Profile report will be available in: build/reports/profile/")
    }
}

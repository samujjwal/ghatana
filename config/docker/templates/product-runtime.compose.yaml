services:
  product-runtime:
    build:
      context: ../../
      dockerfile: ${PRODUCT_DOCKERFILE}
    environment:
      PRODUCT_ENV: ${PRODUCT_ENV:-local}
      PRODUCT_AI_DISABLED: ${PRODUCT_AI_DISABLED:-false}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${PRODUCT_PORT}/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  observability-prometheus:
    image: prom/prometheus:latest
    volumes:
      - ${PRODUCT_OBSERVABILITY_ROOT}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${PRODUCT_OBSERVABILITY_ROOT}/prometheus/rules:/etc/prometheus/rules:ro
      - ${PRODUCT_OBSERVABILITY_OVERLAY_ROOT}/alerts:/etc/prometheus/rules/product-overlays:ro

  observability-grafana:
    image: grafana/grafana:latest
    volumes:
      - ${PRODUCT_OBSERVABILITY_ROOT}/grafana/dashboards:/etc/grafana/dashboards:ro
      - ${PRODUCT_OBSERVABILITY_ROOT}/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${PRODUCT_OBSERVABILITY_OVERLAY_ROOT}/grafana/dashboards:/etc/grafana/dashboards/products/${PRODUCT_SLUG}:ro

name: YAPPC Performance Benchmarks

on:
  schedule:
    # Run benchmarks weekly on Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual trigger
  pull_request:
    paths:
      - 'products/yappc/**'
      - '.github/workflows/yappc-benchmarks.yml'

jobs:
  benchmarks:
    name: Run JMH Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Data Cloud benchmarks
        run: ./gradlew :products:yappc:infrastructure:datacloud:jmh
        continue-on-error: true

      - name: Run Auth benchmarks
        run: ./gradlew :products:yappc:core:services-lifecycle:jmh
        continue-on-error: true

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            **/build/reports/jmh/
            **/build/jmh-results/
          retention-days: 30

      - name: Comment benchmark results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const glob = require('glob');
            
            // Find benchmark result files
            const resultFiles = glob.sync('**/build/reports/jmh/**/*.json');
            
            if (resultFiles.length > 0) {
              let summary = '## Performance Benchmark Results\n\n';
              
              resultFiles.forEach(file => {
                try {
                  const content = fs.readFileSync(file, 'utf8');
                  const results = JSON.parse(content);
                  
                  summary += `### ${file}\n`;
                  summary += '```\n';
                  summary += JSON.stringify(results, null, 2);
                  summary += '\n```\n\n`;
                } catch (e) {
                  console.error(`Error reading ${file}:`, e);
                }
              });
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            }

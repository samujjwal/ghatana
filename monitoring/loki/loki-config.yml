# Loki configuration — Data-Cloud Platform
# Open-source log aggregation (Apache 2.0 license)
# https://grafana.com/oss/loki/

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# Retention configuration — 30 days default, 90 days for data-cloud+security
limits_config:
  reject_old_samples:       true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb:        16
  ingestion_burst_size_mb:  32
  retention_period:         720h   # 30 days default
  per_tenant_override_config: /loki/per-tenant-overrides.yml

# Per-tenant retention overrides (reference file; create alongside this config)
# data-cloud and security-gateway logs kept for 90 days
#   data-cloud:
#     retention_period: 2160h

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: loki_index_
        period: 24h

ruler:
  alertmanager_url: http://alertmanager:9093
  ring:
    kvstore:
      store: inmemory
  rule_path: /loki/rules
  enable_api: true

# Structured metadata extraction for data-cloud logs
pattern_ingester:
  enabled: true

# Pipeline stages are configured in the Promtail configuration.
# Loki receives pre-processed log streams from Promtail.

frontend:
  address: 127.0.0.1

# Analytics opt-out (no telemetry to Grafana Inc.)
analytics:
  reporting_enabled: false

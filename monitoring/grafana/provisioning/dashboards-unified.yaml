apiVersion: 1
providers:
  - name: Ghatana Unified Platform Dashboards
    orgId: 1
    folder: Platform Overview
    folderUid: ghatana-platform-overview
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/dashboards/unified
      foldersFromFilesStructure: false

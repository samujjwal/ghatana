apiVersion: 1
providers:
  - name: AEP Platform Dashboards
    orgId: 1
    folder: AEP
    folderUid: aep-dashboards
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/dashboards/aep
      foldersFromFilesStructure: false

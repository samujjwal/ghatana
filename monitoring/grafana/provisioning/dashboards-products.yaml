apiVersion: 1
providers:
  - name: Product Observability Overlays
    orgId: 1
    folder: Product Overlays
    folderUid: ghatana-product-overlays
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/dashboards/products
      foldersFromFilesStructure: true

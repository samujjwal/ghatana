apiVersion: 1

datasources:
  # ── Grafana Tempo — distributed tracing (Apache 2.0) ──────────────────────
  - name: Tempo
    type: tempo
    uid:  tempo
    access: proxy
    url:  http://tempo:3200
    orgId: 1
    isDefault: false
    version: 1
    editable: false
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1m"
        spanEndTimeShift:   "1m"
        filterByTraceID:    true
        filterBySpanID:     false
        customQuery:        false
        tags:
          - key:   service.name
            value: service
          - key:   namespace
            value: namespace
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: "-1m"
        spanEndTimeShift:   "1m"
        tags:
          - key:   service.name
            value: job
        queries:
          - name: "Error rate"
            query: >
              sum(rate(http_server_requests_seconds_count{job="$__tags.job", status=~"5.."}[5m]))
              / sum(rate(http_server_requests_seconds_count{job="$__tags.job"}[5m]))
          - name: "Request rate"
            query: >
              sum(rate(http_server_requests_seconds_count{job="$__tags.job"}[5m]))
      lokiSearch:
        datasourceUid: loki
      nodeGraph:
        enabled: true
      search:
        hide: false
      streamingJsonParserEnabled: false

  # ── Prometheus — metrics ──────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid:  prometheus
    access: proxy
    url:  http://prometheus:9090
    orgId: 1
    isDefault: true
    version: 1
    editable: false
    jsonData:
      httpMethod:          POST
      exemplarTraceIdDestinations:
        - name:          traceID
          datasourceUid: tempo

  # ── Loki — log aggregation ────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid:  loki
    access: proxy
    url:  http://loki:3100
    orgId: 1
    isDefault: false
    version: 1
    editable: false
    jsonData:
      maxLines:       1000
      derivedFields:
        - name:              TraceID
          matcherRegex:      '"traceId":"(\w+)"'
          url:               "$${__value.raw}"
          datasourceUid:     tempo
          urlDisplayLabel:   "View Trace in Tempo"

---
# Prometheus SLO Recording Rules — YAPPC Lifecycle Service
# Multi-window, multi-burn-rate alerting (Google SRE Book methodology)
#
# SLO Targets:
#   Availability:  99.9% (error budget = 43.2 min/month)
#   Error Rate:    < 0.1%  (max 1 in 1000 requests result in 5xx)
#   Latency p99:   < 2 s

groups:

  # ─────────────────────────────────────────────────────────────────────────
  # Availability recording rules
  # ─────────────────────────────────────────────────────────────────────────
  - name: yappc_slo_availability_recording
    interval: 30s
    rules:
      - record: job:yappc_request_success_rate:1h
        expr: |
          1 - (
            sum(rate(http_server_requests_seconds_count{job="yappc-lifecycle",status=~"5.."}[1h]))
            /
            sum(rate(http_server_requests_seconds_count{job="yappc-lifecycle"}[1h]))
          )
        labels:
          product: yappc

      - record: job:yappc_request_success_rate:6h
        expr: |
          1 - (
            sum(rate(http_server_requests_seconds_count{job="yappc-lifecycle",status=~"5.."}[6h]))
            /
            sum(rate(http_server_requests_seconds_count{job="yappc-lifecycle"}[6h]))
          )
        labels:
          product: yappc

      - record: job:yappc_request_success_rate:24h
        expr: |
          1 - (
            sum(rate(http_server_requests_seconds_count{job="yappc-lifecycle",status=~"5.."}[24h]))
            /
            sum(rate(http_server_requests_seconds_count{job="yappc-lifecycle"}[24h]))
          )
        labels:
          product: yappc

      # Phase gate validation error rate
      - record: job:yappc_phase_gate_error_rate:5m
        expr: |
          sum(rate(yappc_lifecycle_phase_advances_total{job="yappc-lifecycle",status="error"}[5m]))
          /
          sum(rate(yappc_lifecycle_phase_advances_total{job="yappc-lifecycle"}[5m]))
        labels:
          product: yappc

  # ─────────────────────────────────────────────────────────────────────────
  # Multi-window burn-rate alerting
  # ─────────────────────────────────────────────────────────────────────────
  - name: yappc_slo_burn_rate_alerts
    rules:
      # Tier-1: Fast burn (1h window, 14.4× budget burn) → page immediately
      - alert: YappcSloFastBurnRate
        expr: |
          (1 - job:yappc_request_success_rate:1h) / (1 - 0.999) > 14.4
        for: 2m
        labels:
          severity: critical
          team: yappc
          slo_tier: "fast-burn"
        annotations:
          summary: "YAPPC lifecycle SLO: fast burn rate > 14.4×"
          description: >
            YAPPC lifecycle error budget is burning at {{ $value | humanize }}× the target rate
            (1h window). At this rate the monthly error budget will be exhausted in < 2 hours.
            Immediate action required.
          runbook_url: "https://wiki.ghatana.io/runbooks/yappc-slo-fast-burn"

      # Tier-2: Slow burn (6h window, 6× budget burn) → alert within 1h
      - alert: YappcSloSlowBurnRate
        expr: |
          (1 - job:yappc_request_success_rate:6h) / (1 - 0.999) > 6
        for: 15m
        labels:
          severity: warning
          team: yappc
          slo_tier: "slow-burn"
        annotations:
          summary: "YAPPC lifecycle SLO: slow burn rate > 6×"
          description: >
            YAPPC lifecycle error budget is burning at {{ $value | humanize }}× the target rate
            (6h window). The monthly error budget may be exhausted well before month-end.
          runbook_url: "https://wiki.ghatana.io/runbooks/yappc-slo-slow-burn"

      # Tier-3: Error budget nearly exhausted (24h window)
      - alert: YappcSloErrorBudgetNearlyExhausted
        expr: |
          (
            1 -
            avg_over_time(job:yappc_request_success_rate:1h[30d])
          ) / (1 - 0.999) > 0.9
        for: 10m
        labels:
          severity: warning
          team: yappc
        annotations:
          summary: "YAPPC lifecycle SLO: error budget > 90% consumed (last 30 days)"
          description: >
            {{ $value | humanizePercentage }} of the monthly YAPPC lifecycle error budget has been
            consumed. Review recent incidents and take proactive action.

  # ─────────────────────────────────────────────────────────────────────────
  # Latency SLO
  # ─────────────────────────────────────────────────────────────────────────
  - name: yappc_slo_latency
    rules:
      - alert: YappcLifecycleLatencySloBreached
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_server_requests_seconds_bucket{job="yappc-lifecycle"}[5m])) by (le)
          ) > 2.0
        for: 10m
        labels:
          severity: warning
          team: yappc
        annotations:
          summary: "YAPPC lifecycle p99 latency > 2 s SLO target"
          description: >
            The 99th-percentile request latency is {{ $value | humanizeDuration }}, which exceeds
            the 2-second SLO target. Check DB query performance and LLM response times.
          runbook_url: "https://wiki.ghatana.io/runbooks/yappc-latency-slo"

      - alert: YappcPhaseGateLatencyHigh
        expr: |
          histogram_quantile(0.95,
            sum(rate(yappc_phase_gate_validation_duration_ms_bucket{job="yappc-lifecycle"}[5m])) by (le)
          ) > 200
        for: 5m
        labels:
          severity: warning
          team: yappc
        annotations:
          summary: "YAPPC phase gate validation p95 latency > 200 ms"
          description: >
            Phase gate validation is taking {{ $value | humanizeDuration }} at the 95th percentile.
            This will cause perceived slowness in lifecycle advances.

  # ─────────────────────────────────────────────────────────────────────────
  # AI SLO: suggestion quality and availability
  # ─────────────────────────────────────────────────────────────────────────
  - name: yappc_ai_slo
    rules:
      - alert: YappcAiSuggestionErrorRateHigh
        expr: |
          sum(rate(yappc_ai_suggestion_errors_total{job="yappc-lifecycle"}[5m]))
          /
          sum(rate(yappc_ai_suggestion_requests_total{job="yappc-lifecycle"}[5m]))
          > 0.05
        for: 5m
        labels:
          severity: warning
          team: yappc
        annotations:
          summary: "YAPPC AI suggestion error rate > 5%"
          description: >
            {{ $value | humanizePercentage }} of AI suggestion requests are failing.
            Check LLM provider connectivity and circuit breaker state.

      - alert: YappcAiCircuitBreakerOpen
        expr: |
          yappc_ai_circuit_breaker_state{job="yappc-lifecycle"} == 2
        for: 1m
        labels:
          severity: critical
          team: yappc
        annotations:
          summary: "YAPPC AI circuit breaker OPEN for provider {{ $labels.provider }}"
          description: >
            The circuit breaker for AI provider {{ $labels.provider }} is OPEN.
            All AI suggestion calls will fail until the provider recovers ({{ $labels.provider }}
            will be probed after the 60 s cooldown).

  # ─────────────────────────────────────────────────────────────────────────
  # Approval workflow SLO
  # ─────────────────────────────────────────────────────────────────────────
  - name: yappc_approval_slo
    rules:
      - alert: YappcApprovalBacklogHigh
        expr: |
          sum(yappc_approvals_pending_total{job="yappc-lifecycle"}) > 100
        for: 30m
        labels:
          severity: warning
          team: yappc
        annotations:
          summary: "YAPPC approval backlog > 100 pending items for 30 min"
          description: >
            There are {{ $value }} pending approval requests. This suggests a reviewer bottleneck.
            Consider escalation or automatic approval policies for low-risk transitions.

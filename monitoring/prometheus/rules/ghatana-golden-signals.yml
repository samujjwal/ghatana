groups:
  - name: phr_golden_signals
    interval: 30s
    rules:
      # Latency - High request latency
      - alert: PhrHighLatency
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{service="phr-platform"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
          product: phr
          signal: latency
        annotations:
          summary: "PHR high latency detected"
          description: "PHR 95th percentile latency is {{ $value }}s"

      - alert: PhrCriticalLatency
        expr: histogram_quantile(0.99, rate(http_server_requests_seconds_bucket{service="phr-platform"}[5m])) > 5
        for: 2m
        labels:
          severity: critical
          product: phr
          signal: latency
        annotations:
          summary: "PHR critical latency detected"
          description: "PHR 99th percentile latency is {{ $value }}s"

      # Traffic - Low traffic (potential outage)
      - alert: PhrLowTraffic
        expr: rate(http_server_requests_seconds_count{service="phr-platform"}[5m]) < 0.1
        for: 10m
        labels:
          severity: warning
          product: phr
          signal: traffic
        annotations:
          summary: "PHR low traffic detected"
          description: "PHR request rate is {{ $value }} req/s"

      # Errors - High error rate
      - alert: PhrHighErrorRate
        expr: rate(http_server_requests_seconds_count{service="phr-platform",status=~"5.."}[5m]) / rate(http_server_requests_seconds_count{service="phr-platform"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          product: phr
          signal: errors
        annotations:
          summary: "PHR high error rate detected"
          description: "PHR error rate is {{ $value | humanizePercentage }}"

      - alert: PhrCriticalErrorRate
        expr: rate(http_server_requests_seconds_count{service="phr-platform",status=~"5.."}[5m]) / rate(http_server_requests_seconds_count{service="phr-platform"}[5m]) > 0.15
        for: 2m
        labels:
          severity: critical
          product: phr
          signal: errors
        annotations:
          summary: "PHR critical error rate detected"
          description: "PHR error rate is {{ $value | humanizePercentage }}"

      # Saturation - High CPU usage
      - alert: PhrHighCpuUsage
        expr: rate(process_cpu_seconds_total{service="phr-platform"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          product: phr
          signal: saturation
        annotations:
          summary: "PHR high CPU usage detected"
          description: "PHR CPU usage is {{ $value | humanizePercentage }}"

      # Saturation - High memory usage
      - alert: PhrHighMemoryUsage
        expr: jvm_memory_used_bytes{service="phr-platform",area="heap"} / jvm_memory_max_bytes{service="phr-platform",area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
          product: phr
          signal: saturation
        annotations:
          summary: "PHR high memory usage detected"
          description: "PHR heap memory usage is {{ $value | humanizePercentage }}"


groups:
  - name: phr-finance-integration
    interval: 30s
    rules:
      - alert: PhrApiHighErrorRate
        expr: |
          (
            rate(http_server_requests_seconds_count{product="phr", status=~"5.."}[5m])
            /
            rate(http_server_requests_seconds_count{product="phr"}[5m])
          ) > 0.01
        for: 5m
        labels:
          severity: critical
          team: healthcare
          product: phr
        annotations:
          summary: "PHR API 5xx error rate > 1%"
          description: "PHR service {{ $labels.instance }} has elevated server errors for 5 minutes."
          runbook_url: "https://docs.ghatana.io/runbooks/phr-monitoring-alerting"

      - alert: PhrApiP99LatencyHigh
        expr: |
          histogram_quantile(
            0.99,
            rate(http_server_requests_seconds_bucket{product="phr"}[5m])
          ) > 2.0
        for: 5m
        labels:
          severity: warning
          team: healthcare
          product: phr
        annotations:
          summary: "PHR API p99 latency > 2s"
          description: "PHR service {{ $labels.instance }} p99 request latency is above 2 seconds."
          runbook_url: "https://docs.ghatana.io/runbooks/phr-monitoring-alerting"

      - alert: FinanceLedgerPostingErrorRate
        expr: |
          rate(finance_ledger_posting_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          team: finance
          product: finance
        annotations:
          summary: "Finance ledger posting errors detected"
          description: "Ledger posting errors are above 0.1/sec for 5 minutes."
          runbook_url: "https://docs.ghatana.io/runbooks/phr-monitoring-alerting"

      - alert: FinanceLedgerUnbalancedEntries
        expr: |
          increase(finance_ledger_unbalanced_entries_total[10m]) > 0
        for: 0m
        labels:
          severity: critical
          team: finance
          product: finance
        annotations:
          summary: "Unbalanced finance ledger entries detected"
          description: "At least one unbalanced ledger entry was detected in the last 10 minutes."
          runbook_url: "https://docs.ghatana.io/runbooks/phr-monitoring-alerting"

      - alert: PhrFinanceBillingBridgeFailures
        expr: |
          rate(phr_finance_billing_bridge_failures_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          team: platform
          product: phr
        annotations:
          summary: "PHR to Finance billing bridge failure rate is elevated"
          description: "Billing bridge retries or failures are above 0.05/sec."
          runbook_url: "https://docs.ghatana.io/runbooks/phr-monitoring-alerting"

      - alert: PhrConsentDenialRateHigh
        expr: |
          rate(phr_consent_denials_total[5m]) > 0.20
        for: 10m
        labels:
          severity: warning
          team: healthcare
          product: phr
        annotations:
          summary: "PHR consent denial rate is elevated"
          description: "Consent denials exceed 0.20/sec for 10 minutes, indicating potential policy, identity, or tenant-scoping issues."
          runbook_url: "https://docs.ghatana.io/runbooks/phr-monitoring-alerting"

      - alert: PhrEmergencyBreakGlassSpike
        expr: |
          increase(phr_emergency_break_glass_events_total[15m]) >= 3
        for: 0m
        labels:
          severity: critical
          team: healthcare
          product: phr
        annotations:
          summary: "PHR emergency break-glass access spike"
          description: "Three or more break-glass events occurred in 15 minutes; immediate clinical and security review is required."
          runbook_url: "https://docs.ghatana.io/runbooks/phr-monitoring-alerting"

      - alert: PhrLabResultIngestionFailuresHigh
        expr: |
          rate(phr_lab_result_ingestion_failures_total[5m]) > 0.05
        for: 10m
        labels:
          severity: critical
          team: healthcare
          product: phr
        annotations:
          summary: "PHR lab result ingestion failures detected"
          description: "Lab result ingestion failures exceed 0.05/sec for 10 minutes."
          runbook_url: "https://docs.ghatana.io/runbooks/phr-monitoring-alerting"

      - alert: PhrAppointmentReminderQueueLagHigh
        expr: |
          phr_appointment_reminder_queue_lag_seconds > 600
        for: 10m
        labels:
          severity: warning
          team: healthcare
          product: phr
        annotations:
          summary: "PHR appointment reminder queue lag is high"
          description: "Reminder queue lag exceeded 10 minutes for 10 minutes, risking missed reminders and patient no-shows."
          runbook_url: "https://docs.ghatana.io/runbooks/phr-monitoring-alerting"

      - alert: FinanceApiHighErrorRate
        expr: |
          (
            rate(http_server_requests_seconds_count{product="finance", status=~"5.."}[5m])
            /
            rate(http_server_requests_seconds_count{product="finance"}[5m])
          ) > 0.01
        for: 5m
        labels:
          severity: warning
          team: finance
          product: finance
        annotations:
          summary: "Finance API 5xx error rate > 1%"
          description: "Finance API server-side error rate exceeded 1% for 5 minutes."
          runbook_url: "https://docs.ghatana.io/runbooks/phr-monitoring-alerting"

      - alert: FinanceApiP99LatencyHigh
        expr: |
          histogram_quantile(
            0.99,
            rate(http_server_requests_seconds_bucket{product="finance"}[5m])
          ) > 1.5
        for: 5m
        labels:
          severity: warning
          team: finance
          product: finance
        annotations:
          summary: "Finance API p99 latency > 1.5s"
          description: "Finance API p99 request latency is above 1.5 seconds for 5 minutes."
          runbook_url: "https://docs.ghatana.io/runbooks/phr-monitoring-alerting"

      - alert: PhrClinicalApiHighErrorRate
        expr: |
          (
            rate(http_server_requests_seconds_count{product="phr", uri=~".*(telemedicine|appointment|patient).*", status=~"5.."}[5m])
            /
            rate(http_server_requests_seconds_count{product="phr", uri=~".*(telemedicine|appointment|patient).*"}[5m])
          ) > 0.01
        for: 5m
        labels:
          severity: warning
          team: healthcare
          product: phr
        annotations:
          summary: "PHR clinical API 5xx error rate > 1%"
          description: "PHR patient, appointment, or telemedicine endpoints exceeded 1% 5xx rate for 5 minutes."
          runbook_url: "https://docs.ghatana.io/runbooks/phr-monitoring-alerting"

      - alert: PhrClinicalApiP99LatencyHigh
        expr: |
          histogram_quantile(
            0.99,
            rate(http_server_requests_seconds_bucket{product="phr", uri=~".*(telemedicine|appointment|patient).*"}[5m])
          ) > 2.0
        for: 5m
        labels:
          severity: warning
          team: healthcare
          product: phr
        annotations:
          summary: "PHR clinical API p99 latency > 2s"
          description: "PHR patient, appointment, or telemedicine endpoints exceeded 2 seconds p99 latency for 5 minutes."
          runbook_url: "https://docs.ghatana.io/runbooks/phr-monitoring-alerting"

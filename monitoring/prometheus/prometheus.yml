global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ghatana-dev'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # NOTE: several products reuse default local ports across independent dev flows.
  # These host.docker.internal targets assume one product stack at a time unless
  # local ports are remapped to run multiple stacks concurrently.

  # Data-Cloud platform (HTTP + gRPC launcher on 8082)
  - job_name: 'data-cloud-platform'
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: 'data-cloud-platform'
          product: 'data-cloud'
          layer: 'platform'
          tech: 'java'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Data-Cloud event service (port 8100 if running separately)
  - job_name: 'data-cloud-event'
    static_configs:
      - targets: ['host.docker.internal:8100']
        labels:
          service: 'data-cloud-event'
          product: 'data-cloud'
          layer: 'event'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # YAPPC lifecycle service (ActiveJ/JVM)
  - job_name: 'yappc-lifecycle'
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: 'yappc-lifecycle'
          product: 'yappc'
          layer: 'lifecycle'
          tech: 'java'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # AEP service manager
  - job_name: 'aep-service-manager'
    static_configs:
      - targets: ['host.docker.internal:8090']
        labels:
          service: 'aep-service-manager'
          product: 'aep'
          layer: 'server'
          tech: 'java'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Audio-Video: STT gRPC service (health/metrics sidecar on 9091)
  - job_name: 'stt-service'
    static_configs:
      - targets: ['host.docker.internal:9091']
        labels:
          service: 'stt-service'
          product: 'audio-video'
          layer: 'service'
          tech: 'java'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Audio-Video: TTS gRPC service (health/metrics sidecar on 9092)
  - job_name: 'tts-service'
    static_configs:
      - targets: ['host.docker.internal:9092']
        labels:
          service: 'tts-service'
          product: 'audio-video'
          layer: 'service'
          tech: 'java'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Audio-Video: Vision gRPC service (health/metrics sidecar on 9094)
  - job_name: 'vision-service'
    static_configs:
      - targets: ['host.docker.internal:9094']
        labels:
          service: 'vision-service'
          product: 'audio-video'
          layer: 'service'
          tech: 'java'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Audio-Video: Multimodal gRPC service (health/metrics sidecar on 9095)
  - job_name: 'multimodal-service'
    static_configs:
      - targets: ['host.docker.internal:9095']
        labels:
          service: 'multimodal-service'
          product: 'audio-video'
          layer: 'service'
          tech: 'java'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Tutorputor platform (Node.js/Fastify metrics on the main app port)
  - job_name: 'tutorputor-app'
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: 'tutorputor-app'
          product: 'tutorputor'
          layer: 'platform'
          tech: 'nodejs'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # PHR healthcare platform (port 8080)
  - job_name: 'phr-platform'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: 'phr-platform'
          product: 'phr'
          layer: 'platform'
          tech: 'java'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Finance trading platform (port 8081)
  - job_name: 'finance-platform'
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service: 'finance-platform'
          product: 'finance'
          layer: 'platform'
          tech: 'java'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Platform Kernel (port 9000)
  - job_name: 'platform-kernel'
    static_configs:
      - targets: ['host.docker.internal:9000']
        labels:
          service: 'platform-kernel'
          product: 'kernel'
          layer: 'kernel'
          tech: 'java'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # FlashIt gateway and clients use the shared Kernel observability stack.
  # Product-owned alert rules and dashboards are mounted as overlays by the
  # FlashIt compose file; stack ownership stays under monitoring/.
  - job_name: 'flashit-api'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'flashit-api'
          product: 'flashit'
          layer: 'api'
          tech: 'nodejs'
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'flashit-web'
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: 'flashit-web'
          product: 'flashit'
          layer: 'web'
          tech: 'typescript'
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'flashit-gateway'
    static_configs:
      - targets: ['host.docker.internal:2900']
        labels:
          service: 'flashit-gateway'
          product: 'flashit'
          layer: 'gateway'
          tech: 'nodejs'
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'flashit-agent'
    static_configs:
      - targets: ['host.docker.internal:8090']
        labels:
          service: 'flashit-agent'
          product: 'flashit'
          layer: 'agent'
          tech: 'java'
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'flashit-redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'flashit-redis'
          product: 'flashit'
          layer: 'cache'
          tech: 'redis'

  - job_name: 'flashit-postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          service: 'flashit-postgres'
          product: 'flashit'
          layer: 'database'
          tech: 'postgres'

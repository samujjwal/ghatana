global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ghatana-dev'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Data-Cloud platform (HTTP + gRPC launcher on 8082)
  - job_name: 'data-cloud-platform'
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: 'data-cloud-platform'
          product: 'data-cloud'
          layer: 'platform'
          tech: 'java'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Data-Cloud event service (port 8100 if running separately)
  - job_name: 'data-cloud-event'
    static_configs:
      - targets: ['host.docker.internal:8100']
        labels:
          service: 'data-cloud-event'
          product: 'data-cloud'
          layer: 'event'
    metrics_path: '/metrics'
    scrape_interval: 15s

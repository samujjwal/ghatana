name: Product Capability Manifest Validation

on:
  pull_request:
    paths:
      - 'products/**/domain-pack-manifest.yaml'
      - 'products/**/domain-pack.json'
      - 'config/product-shape.json'
      - 'scripts/check-product-manifest-contracts.mjs'
      - 'platform-kernel/**'
      - '.github/workflows/manifest-validation.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'products/**/domain-pack-manifest.yaml'
      - 'products/**/domain-pack.json'
      - 'config/product-shape.json'
  workflow_dispatch:

concurrency:
  group: manifest-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  manifest-validation:
    name: Product Manifest Contract Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate product manifest contract
        run: node scripts/check-product-manifest-contracts.mjs

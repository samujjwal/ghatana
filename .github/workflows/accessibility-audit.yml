name: Accessibility Audit

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    a11y-audit:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 18

            - name: Install pnpm
              run: npm install -g pnpm@8

            - name: Install dependencies
              run: pnpm install

            - name: Build parent-dashboard
              working-directory: products/dcmaar/apps/parent-dashboard
              run: pnpm build

            - name: Run accessibility audit (SARIF)
              run: |
                  node ../../../../scripts/run-a11y.mjs ./dist/index.html sarif
              working-directory: products/dcmaar/apps/parent-dashboard

            - name: Run accessibility audit (HTML)
              run: |
                  node ../../../../scripts/run-a11y.mjs ./dist/index.html html
              working-directory: products/dcmaar/apps/parent-dashboard

            - name: Parse SARIF and check violations
              id: a11y-check
              run: |
                  SARIF_PATH="products/dcmaar/apps/parent-dashboard/artifacts/a11y/report.sarif"

                  # Extract violation counts by severity
                  CRITICAL=$(jq '[.runs[0].results[] | select(.level == "error")] | length' "$SARIF_PATH")
                  WARNINGS=$(jq '[.runs[0].results[] | select(.level == "warning")] | length' "$SARIF_PATH")
                  NOTES=$(jq '[.runs[0].results[] | select(.level == "note")] | length' "$SARIF_PATH")
                  TOTAL=$(jq '.runs[0].results | length' "$SARIF_PATH")

                  # Output for GitHub Actions
                  echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
                  echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
                  echo "notes=$NOTES" >> $GITHUB_OUTPUT
                  echo "total=$TOTAL" >> $GITHUB_OUTPUT

                  # Create summary
                  echo "## Accessibility Audit Results" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
                  echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
                  echo "| Critical (Errors) | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
                  echo "| Warnings | $WARNINGS |" >> $GITHUB_STEP_SUMMARY
                  echo "| Notes | $NOTES |" >> $GITHUB_STEP_SUMMARY
                  echo "| **Total** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY

                  # Fail if critical violations found
                  if [ "$CRITICAL" -gt 0 ]; then
                    echo "❌ Found $CRITICAL critical accessibility violation(s)" >> $GITHUB_STEP_SUMMARY
                    echo "::error::Found $CRITICAL critical accessibility violations. Please fix before merging."
                    exit 1
                  else
                    echo "✅ No critical accessibility violations found" >> $GITHUB_STEP_SUMMARY
                  fi

            - name: Upload A11y Artifacts
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: accessibility-reports
                  path: products/dcmaar/apps/parent-dashboard/artifacts/a11y/**

            - name: Upload SARIF to GitHub Security
              if: always()
              uses: github/codeql-action/upload-sarif@v2
              with:
                  sarif_file: products/dcmaar/apps/parent-dashboard/artifacts/a11y/report.sarif

            - name: Comment on PR
              if: github.event_name == 'pull_request' && always()
              uses: actions/github-script@v7
              with:
                  script: |
                      const critical = '${{ steps.a11y-check.outputs.critical }}';
                      const warnings = '${{ steps.a11y-check.outputs.warnings }}';
                      const notes = '${{ steps.a11y-check.outputs.notes }}';
                      const total = '${{ steps.a11y-check.outputs.total }}';

                      const status = critical === '0' ? '✅' : '❌';
                      const statusText = critical === '0' ? 'PASSED' : 'FAILED';

                      const body = `## ${status} Accessibility Audit ${statusText}

                      | Severity | Count |
                      |----------|-------|
                      | Critical (Errors) | ${critical} |
                      | Warnings | ${warnings} |
                      | Notes | ${notes} |
                      | **Total** | **${total}** |

                      ${critical === '0' 
                        ? '✅ No critical accessibility violations found. Great work!'
                        : `❌ Found ${critical} critical accessibility violation(s). Please review the [full report](https://github.com/${context.repo.owner}/${context.repo.repo}/security/code-scanning) in the Security tab.`
                      }

                      📊 View detailed reports in the workflow artifacts.`;

                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: body
                      });

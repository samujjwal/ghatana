name: Data Cloud Secret Scan

# P1-03: Automated secret-scan CI artifact capture.
# Runs gitleaks on the data-cloud product tree to detect hardcoded credentials,
# API keys, tokens, and other secret material committed to version control.
#
# Produces:
#   - data-cloud-secret-scan-sarif: SARIF format for GitHub Security tab
#   - data-cloud-secret-scan-report: JSON report for audit evidence archive
#
# Evidence artefact: satisfies AUD-P1-03 requirement for automated secret-scan
# CI artifact capture as part of the production readiness checklist.

on:
  push:
    branches: [main, develop]
    paths:
      - "products/data-cloud/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "products/data-cloud/**"
  schedule:
    # Weekly scan on Mondays at 03:00 UTC to catch any regressions
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      baseline:
        description: "Run as full scan ignoring previous baseline"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan-gitleaks:
    name: Secret scan — gitleaks (data-cloud)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for gitleaks commit-range scan

      - name: Run gitleaks scan on data-cloud tree
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: >-
            detect
            --source products/data-cloud
            --report-format sarif
            --report-path gitleaks-report.sarif
            --exit-code 1
            --redact
            --no-git

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-report.sarif
          category: "data-cloud-secret-scan"

      - name: Export JSON evidence report
        if: always()
        run: |
          gitleaks detect \
            --source products/data-cloud \
            --report-format json \
            --report-path gitleaks-report.json \
            --redact \
            --no-git \
            --exit-code 0 || true
          echo "Scan completed. Summary:"
          if [ -f gitleaks-report.json ]; then
            python3 -c "
          import json, sys
          try:
            with open('gitleaks-report.json') as f:
              data = json.load(f)
            findings = data if isinstance(data, list) else []
            print(f'Total findings: {len(findings)}')
            for f in findings[:5]:
              print(f'  - Rule: {f.get(\"RuleID\", \"unknown\")}, File: {f.get(\"File\", \"unknown\")}')
          except Exception as e:
            print(f'Could not parse report: {e}')
            "
          fi

      - name: Upload JSON evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-cloud-secret-scan-report
          path: gitleaks-report.json
          retention-days: 90

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-cloud-secret-scan-sarif
          path: gitleaks-report.sarif
          retention-days: 90

      - name: Write scan summary
        if: always()
        run: |
          echo "## Data Cloud Secret Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f gitleaks-report.json ]; then
            COUNT=$(python3 -c "
          import json
          try:
            with open('gitleaks-report.json') as f:
              data = json.load(f)
            print(len(data if isinstance(data, list) else []))
          except:
            print('unknown')
            ")
            echo "**Total findings:** $COUNT" >> $GITHUB_STEP_SUMMARY
            if [ "$COUNT" = "0" ]; then
              echo "✅ No secrets detected in products/data-cloud/" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Secrets or credentials detected — review SARIF report in Security tab" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ Scan report not generated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts uploaded: \`data-cloud-secret-scan-report\` (JSON), \`data-cloud-secret-scan-sarif\` (SARIF)" >> $GITHUB_STEP_SUMMARY

  bootstrap-secret-tests:
    name: Verify secret-handling tests pass (data-cloud launcher)
    runs-on: ubuntu-latest
    needs: []  # Independent — runs in parallel with gitleaks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run secret-handling launcher tests
        run: >-
          ./gradlew
          :products:data-cloud:delivery:launcher:test
          --tests "com.ghatana.datacloud.launcher.bootstrap.DataCloudHttpLauncherBootstrapTest.buildApiKeyResolverNeverLogsRawApiKeyValue"
          --tests "com.ghatana.datacloud.launcher.bootstrap.DataCloudHttpLauncherBootstrapTest.buildJwtProviderNeverLogsRawJwtSecret"
          --tests "com.ghatana.datacloud.launcher.bootstrap.DataCloudHttpLauncherBootstrapTest.buildApiKeyResolverAcceptsMultipleKeysForRotation"
          --tests "com.ghatana.datacloud.launcher.bootstrap.DataCloudHttpLauncherBootstrapTest.buildApiKeyResolverRejectsRevokedKeyAfterRotation"
          --tests "com.ghatana.datacloud.DataCloudConfigSecretHandlingTest"
          -x javadoc
          --no-daemon
          --no-configuration-cache

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-cloud-secret-handling-test-results
          path: products/data-cloud/delivery/launcher/build/reports/tests/test/
          retention-days: 30

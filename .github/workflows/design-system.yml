name: design-system

on:
  pull_request:
    paths:
      - 'libs/typescript/**'
      - '.github/workflows/design-system.yml'
  push:
    branches: [main]
    paths:
      - 'libs/typescript/**'
      - '.github/workflows/design-system.yml'

jobs:
  verify-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ghatana/tokens build
      - run: pnpm --filter @ghatana/tokens tokens:validate
      - run: pnpm --filter @ghatana/tokens tokens:css dist/design-tokens.css
      - run: pnpm --filter @ghatana/tokens type-check
      - name: Upload design tokens CSS
        uses: actions/upload-artifact@v4
        with:
          name: design-tokens-css
          path: dist/design-tokens.css
          retention-days: 7

  storybook:
    runs-on: ubuntu-latest
    needs: verify-tokens
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ghatana/ui type-check
      - run: pnpm --filter @ghatana/theme type-check
      - run: pnpm --filter @ghatana/storybook storybook:build
      - run: pnpm --filter @ghatana/storybook storybook:test
      - name: Upload Storybook static site
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: libs/typescript/storybook/storybook-static
          retention-days: 7
      - name: Publish Chromatic (optional)
        if: env.CHROMATIC_PROJECT_TOKEN
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: pnpm --filter @ghatana/storybook storybook:chromatic

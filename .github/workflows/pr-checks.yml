name: PR Checks

on:
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    check-formatting:
        name: Check Formatting
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "21"
                  cache: "gradle"
            - name: Check code formatting
              run: |
                  ./products/aep/gradlew spotlessCheck --no-daemon --stacktrace

    dependency-updates:
        name: Check for Dependency Updates
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "21"
                  cache: "gradle"
            - name: Check for dependency updates
              working-directory: ./products/aep
              run: |
                  ./gradlew dependencyUpdates -Drevision=release -DoutputFormatter=json -DoutputDir=build/dependency-updates

    build:
        name: Build All
        needs: [check-formatting, dependency-updates]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "21"
                  cache: "gradle"
            - name: Build all projects
              working-directory: ./products/aep
              run: |
                  ./gradlew build --no-daemon --stacktrace
            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results
                  path: |
                      products/aep/build/test-results/**/*.xml
                      products/aep/build/reports/tests/**/*
                  retention-days: 7

name: Governance Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  platform-typescript-package-governance:
    name: Platform TypeScript Package Governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate package README contracts and dependency direction
        run: node ./scripts/check-platform-package-governance.js

  typescript-strict-enforcement:
    name: TypeScript Strict Enforcement
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce strict tsconfig policy
        run: pnpm run check:tsconfig-strict

  production-readiness-enforcement:
    name: Production Readiness Enforcement
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enforce production-readiness rules
        run: node ./scripts/check-production-readiness.mjs

      - name: Enforce anti-test-theatre policy
        run: bash ./scripts/check-test-authenticity.sh

  audit-todo-burndown:
    name: Audit TODO Burndown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate TODO burndown report
        run: node ./scripts/generate-audit-todo-burndown.mjs

      - name: Upload TODO burndown artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-todo-burndown
          path: |
            build/reports/audit/todo-burndown.json
            build/reports/audit/todo-burndown.md
          retention-days: 30

  # ─────────────────────────────────────────────
  # SBOM Generation
  # ─────────────────────────────────────────────
  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SBOM (CycloneDX)
        run: |
          npx @cyclonedx/cyclonedx-npm@latest \
            --output-file sbom.json \
            --output-format json

      - name: Generate SBOM (SPDX)
        run: |
          npx @cyclonedx/cyclonedx-npm@latest \
            --output-file spbom.spdx.json \
            --output-format spdxjson

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom.json
            spbom.spdx.json
          retention-days: 30

  # ─────────────────────────────────────────────
  # License Compliance Check
  # ─────────────────────────────────────────────
  license-compliance:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Licenses
        run: |
          npx license-checker@latest \
            --onlyAllow 'MIT;Apache-2.0;BSD;ISC;BSD-3-Clause;BSD-2-Clause;0BSD;CC0-1.0;Unlicense' \
            --json > licenses.json

      - name: Check for Forbidden Licenses
        run: |
          FORBIDDEN=$(npx license-checker@latest \
            --onlyAllow 'GPL;AGPL;LGPL;SSPL;EPL;MPL;CDDL' \
            --json 2>/dev/null | jq 'length' || echo "0")
          
          if [ "$FORBIDDEN" -gt 0 ]; then
            echo "❌ Forbidden licenses detected!"
            npx license-checker@latest \
              --onlyAllow 'GPL;AGPL;LGPL;SSPL;EPL;MPL;CDDL' \
              --json | jq 'keys[]'
            exit 1
          fi
          echo "✅ No forbidden licenses found"

      - name: Upload License Report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.json
          retention-days: 30

  # ─────────────────────────────────────────────
  # Dependency Convergence Check
  # ─────────────────────────────────────────────
  dependency-convergence:
    name: Dependency Convergence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check React Version Convergence
        run: |
          echo "Checking React versions..."
          REACT_VERSIONS=$(pnpm list react --depth=0 --json | jq -r '.[].dependencies.react.version' | sort -u)
          REACT_DOM_VERSIONS=$(pnpm list react-dom --depth=0 --json | jq -r '.[].dependencies["react-dom"].version' | sort -u)
          
          echo "React versions found: $REACT_VERSIONS"
          echo "React-DOM versions found: $REACT_DOM_VERSIONS"
          
          if [ $(echo "$REACT_VERSIONS" | wc -l) -gt 1 ]; then
            echo "⚠️ Multiple React versions detected - see VERSION_CONVERGENCE_REPORT.md"
          fi

      - name: Check TypeScript Version Convergence
        run: |
          echo "Checking TypeScript versions..."
          TS_VERSIONS=$(pnpm list typescript --depth=0 --json | jq -r '.[].devDependencies.typescript.version' | sort -u)
          echo "TypeScript versions found: $TS_VERSIONS"
          
          if [ $(echo "$TS_VERSIONS" | wc -l) -gt 1 ]; then
            echo "⚠️ Multiple TypeScript versions detected"
          fi

      - name: Generate Dependency Report
        run: |
          echo "Generating dependency convergence report..."
          pnpm list --depth=0 --json > dependency-report.json
          
          # Check for duplicate dependencies
          jq -r '.[].dependencies | to_entries[] | "\(.key):\(.value.version)"' dependency-report.json | \
            sort | uniq -d > duplicates.txt || true
          
          if [ -s duplicates.txt ]; then
            echo "⚠️ Potential duplicate dependencies:"
            cat duplicates.txt
          fi

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-convergence-report
          path: dependency-report.json
          retention-days: 30

  # ─────────────────────────────────────────────
  # Naming Convention Check
  # ─────────────────────────────────────────────
  naming-convention:
    name: Naming Convention Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Library Naming
        run: |
          echo "Checking for naming inconsistencies..."
          
          # Find packages using @ghatana/yappc-* (should be @yappc/*)
          YAPPC_GHATANA=$(find . -name 'package.json' -type f \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -exec grep -l '"name": "@ghatana/yappc-' {} \;)
          
          if [ -n "$YAPPC_GHATANA" ]; then
            echo "⚠️ Packages using @ghatana/yappc-* naming (should be @yappc/*):"
            echo "$YAPPC_GHATANA"
            echo ""
            echo "See LIBRARY_DEPENDENCY_MATRIX.md for migration plan"
          fi
          
          # Check imports in source files
          INVALID_IMPORTS=$(grep -r "from ['\"]@ghatana/yappc-" \
            --include='*.ts' --include='*.tsx' \
            . 2>/dev/null | wc -l)
          
          echo "Found $INVALID_IMPORTS imports using @ghatana/yappc-* pattern"
          echo "These will need migration during consolidation phase"

  # ─────────────────────────────────────────────
  # Security Audit
  # ─────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: |
          pnpm audit --audit-level high || true

      - name: Check for high-severity vulnerabilities
        run: |
          HIGH_VULNS=$(pnpm audit --json --audit-level high 2>/dev/null | jq '.metadata.vulnerabilities.high' || echo "0")
          CRITICAL_VULNS=$(pnpm audit --json --audit-level critical 2>/dev/null | jq '.metadata.vulnerabilities.critical' || echo "0")
          
          echo "High severity vulnerabilities: $HIGH_VULNS"
          echo "Critical vulnerabilities: $CRITICAL_VULNS"
          
          if [ "$CRITICAL_VULNS" -gt 0 ]; then
            echo "❌ Critical vulnerabilities found!"
            pnpm audit --audit-level critical
            exit 1
          fi

  # ─────────────────────────────────────────────
  # Governance Summary Report
  # ─────────────────────────────────────────────
  governance-summary:
    name: Generate Governance Summary
    needs: [platform-typescript-package-governance, typescript-strict-enforcement, production-readiness-enforcement, audit-todo-burndown, sbom-generation, license-compliance, dependency-convergence, naming-convention, security-audit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate Summary
        run: |
          echo "# Governance Check Summary" > governance-summary.md
          echo "" >> governance-summary.md
          echo "**Generated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> governance-summary.md
          echo "" >> governance-summary.md
          echo "## Check Results" >> governance-summary.md
          echo "" >> governance-summary.md
          echo "- SBOM Generation: ${{ needs.sbom-generation.result == 'success' && '✅' || '❌' }}" >> governance-summary.md
          echo "- TypeScript Strict Enforcement: ${{ needs.typescript-strict-enforcement.result == 'success' && '✅' || '❌' }}" >> governance-summary.md
          echo "- Production Readiness Enforcement: ${{ needs.production-readiness-enforcement.result == 'success' && '✅' || '❌' }}" >> governance-summary.md
          echo "- Audit TODO Burndown: ${{ needs.audit-todo-burndown.result == 'success' && '✅' || '❌' }}" >> governance-summary.md
          echo "- License Compliance: ${{ needs.license-compliance.result == 'success' && '✅' || '❌' }}" >> governance-summary.md
          echo "- Dependency Convergence: ${{ needs.dependency-convergence.result == 'success' && '✅' || '❌' }}" >> governance-summary.md
          echo "- Naming Convention: ${{ needs.naming-convention.result == 'success' && '✅' || '❌' }}" >> governance-summary.md
          echo "- Security Audit: ${{ needs.security-audit.result == 'success' && '✅' || '❌' }}" >> governance-summary.md
          echo "" >> governance-summary.md
          echo "## Documentation" >> governance-summary.md
          echo "" >> governance-summary.md
          echo "- [Library Dependency Matrix](docs/LIBRARY_DEPENDENCY_MATRIX.md)" >> governance-summary.md
          echo "- [Version Convergence Report](docs/VERSION_CONVERGENCE_REPORT.md)" >> governance-summary.md
          echo "- [Import Pattern Analysis](docs/IMPORT_PATTERN_ANALYSIS.md)" >> governance-summary.md
          echo "" >> governance-summary.md
          echo "## Next Steps" >> governance-summary.md
          echo "" >> governance-summary.md
          echo "1. Review SBOM artifacts for complete dependency inventory" >> governance-summary.md
          echo "2. Address any license compliance issues" >> governance-summary.md
          echo "3. Follow Version Convergence Report recommendations" >> governance-summary.md
          echo "4. Plan library consolidation based on Dependency Matrix" >> governance-summary.md

      - name: Upload Summary
        uses: actions/upload-artifact@v4
        with:
          name: governance-summary
          path: governance-summary.md
          retention-days: 30

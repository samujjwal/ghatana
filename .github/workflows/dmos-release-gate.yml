# P0-017: DMOS Release Gate Workflow
#
# This workflow validates all P0 (release blocker) requirements before allowing
# production deployment. It blocks the release pipeline if any P0 test fails.
#
# Required checks:
# - All P0 unit tests pass
# - Servlet unit tests with mocked services pass
# - Repository integration tests with TestContainers pass
# - API integration tests pass
# - E2E browser tests pass
# - Production bootstrap validation passes
# - Feature flag configuration is valid
# - Security header tests pass
# - Contract parity tests pass

name: DMOS P0 Release Gate

on:
  push:
    branches: [main, release/*]
    paths:
      - 'products/digital-marketing/**'
      - '.github/workflows/dmos-release-gate.yml'
  pull_request:
    branches: [main, release/*]
    paths:
      - 'products/digital-marketing/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  # =============================================================================
  # Job 1: Unit Tests (P0-016)
  # =============================================================================
  unit-tests:
    name: P0 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: wrapper

      - name: Run P0 Unit Tests
        run: |
          ./gradlew :products:digital-marketing:dm-api:test \
            --tests "com.ghatana.digitalmarketing.api.DmosCampaignServletTest" \
            --tests "com.ghatana.digitalmarketing.api.DmosHealthServletTest" \
            --info

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: products/digital-marketing/dm-api/build/test-results/test/

      - name: Check test results
        run: |
          if [ ! -f products/digital-marketing/dm-api/build/test-results/test/TEST-*.xml ]; then
            echo "❌ No test results found"
            exit 1
          fi
          echo "✅ Unit tests passed"

  # =============================================================================
  # Job 2: Repository Integration Tests (P1-014)
  # =============================================================================
  repository-integration-tests:
    name: Repository Integration Tests (TestContainers)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: dmos_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Run Repository Integration Tests
        run: |
          ./gradlew :products:digital-marketing:dm-persistence:test \
            --tests "com.ghatana.digitalmarketing.persistence.campaign.PostgresCampaignRepositoryTest" \
            --info
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repository-test-results
          path: products/digital-marketing/dm-persistence/build/test-results/test/

  # =============================================================================
  # Job 3: API Integration Tests (P1-015)
  # =============================================================================
  api-integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: dmos_integration
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Start DMOS Application
        run: |
          ./gradlew :products:digital-marketing:dm-application:bootRun &
          sleep 60
          curl --retry 10 --retry-delay 5 --fail http://localhost:8080/health/live || exit 1
          echo "✅ DMOS application started"

      - name: Run API Integration Tests
        run: |
          ./gradlew :integration-tests:e2e-api-framework:test \
            --tests "com.ghatana.digitalmarketing.api.CampaignApiIntegrationTest" \
            --info

      - name: Stop DMOS Application
        if: always()
        run: pkill -f "dm-application" || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-integration-test-results
          path: integration-tests/e2e-api-framework/build/test-results/test/

  # =============================================================================
  # Job 4: E2E Browser Tests (P0-016 / P1-016)
  # =============================================================================
  e2e-browser-tests:
    name: E2E Browser Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: products/digital-marketing/ui/pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        working-directory: products/digital-marketing/ui
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: products/digital-marketing/ui
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: products/digital-marketing/ui
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: products/digital-marketing/ui/playwright-report/

  # =============================================================================
  # Job 4c: UI Static Quality Gates (P0)
  # =============================================================================
  ui-quality-gates:
    name: UI Type/Lint/Route Contract Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: products/digital-marketing/ui/pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        working-directory: products/digital-marketing/ui
        run: pnpm install --frozen-lockfile

      - name: Run type-check
        working-directory: products/digital-marketing/ui
        run: pnpm run type-check

      - name: Run lint
        working-directory: products/digital-marketing/ui
        run: pnpm run lint

      - name: Run route contract tests
        working-directory: products/digital-marketing/ui
        run: pnpm run test:route-contract

  # =============================================================================
  # Job 4b: Stable Route E2E (UI -> API -> Postgres, real backend) - P1-2 Mandatory
  # =============================================================================
  stable-route-e2e-realbackend:
    name: Stable Route E2E (Real Backend) - Mandatory for Production
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: dmos_e2e
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: products/digital-marketing/ui/pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install UI dependencies
        working-directory: products/digital-marketing/ui
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: products/digital-marketing/ui
        run: pnpm exec playwright install --with-deps chromium

      - name: Start DMOS API
        run: |
          ./gradlew :products:digital-marketing:dm-api:runDmosApiServer > /tmp/dmos-api.log 2>&1 &
          echo $! > /tmp/dmos-api.pid
          for i in {1..60}; do
            if curl --fail --silent http://localhost:8080/health/live > /dev/null; then
              echo "✅ DMOS API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "❌ DMOS API failed to start"
          cat /tmp/dmos-api.log
          exit 1
        env:
          DMOS_ENV: development
          PORT: 8080
          DMOS_PII_HMAC_KEY: ci-e2e-hmac-key

      - name: Start DMOS UI
        working-directory: products/digital-marketing/ui
        run: |
          DMOS_API_PROXY_TARGET=http://localhost:8080 pnpm dev --host 127.0.0.1 --port 5174 > /tmp/dmos-ui.log 2>&1 &
          echo $! > /tmp/dmos-ui.pid
          for i in {1..60}; do
            if curl --fail --silent http://localhost:5174/login > /dev/null; then
              echo "✅ DMOS UI is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "❌ DMOS UI failed to start"
          cat /tmp/dmos-ui.log
          exit 1

      - name: Run stable route release gate suite against real backend
        working-directory: products/digital-marketing/ui
        env:
          DMOS_UI_BASE_URL: http://localhost:5174
          DMOS_API_BASE_URL: http://localhost:8080
          DMOS_TEST_WORKSPACE: ws-e2e
          DMOS_TEST_TENANT: tenant-e2e
          DMOS_TEST_PRINCIPAL: principal-e2e
          DMOS_TEST_TOKEN: dev-e2e-token
        run: pnpm test:e2e:realbackend

      - name: Stop real-backend services
        if: always()
        run: |
          if [ -f /tmp/dmos-ui.pid ]; then kill "$(cat /tmp/dmos-ui.pid)" || true; fi
          if [ -f /tmp/dmos-api.pid ]; then kill "$(cat /tmp/dmos-api.pid)" || true; fi

      - name: Upload real-backend Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-realbackend
          path: products/digital-marketing/ui/playwright-report/

  # =============================================================================
  # Job 5: Production Bootstrap Validation (P1-004 / P0-016)
  # =============================================================================
  production-bootstrap-validation:
    name: Production Bootstrap Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Run Production Bootstrap Tests
        run: |
          ./gradlew :products:digital-marketing:dm-application:test \
            --tests "com.ghatana.digitalmarketing.application.bootstrap.*" \
            --info
        env:
          DMOS_ENV: production

      - name: Validate No Stubs in Production (P0-016)
        run: |
          # Check for deterministic/stub classes in production code
          if grep -r "DeterministicAgentOrchestrationAdapter" products/digital-marketing/dm-application/src/main/java --include="*.java" | grep -v "ProductionBootstrapValidator"; then
            echo "❌ Found deterministic adapter reference in production code"
            exit 1
          fi
          echo "✅ No deterministic stubs found in production wiring"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bootstrap-test-results
          path: products/digital-marketing/dm-application/build/test-results/test/

  # =============================================================================
  # Job 6: Security Header Tests (P0-015)
  # =============================================================================
  security-header-tests:
    name: Security Header Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Run Security Header Tests
        run: |
          ./gradlew :products:digital-marketing:dm-api:test \
            --tests "com.ghatana.digitalmarketing.api.security.*" \
            --info

      - name: Validate Fail-Closed Behavior
        run: |
          echo "Checking fail-closed security implementation..."
          if grep -r "X-Principal-ID" products/digital-marketing/dm-api/src/main/java --include="*.java" | grep -q "getHeader"; then
            echo "❌ Found client-side principal header usage - server-side identity derivation is required"
            exit 1
          fi
          echo "✅ Security header validation complete"

  # =============================================================================
  # Job 7: Contract Parity Tests (P0-009 / P0-010)
  # =============================================================================
  contract-parity-tests:
    name: API Contract Parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: products/digital-marketing/ui/pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli

      - name: Validate OpenAPI Contract
        working-directory: products/digital-marketing
        run: |
          redocly lint docs/api-contract.yaml --format=github-actions
          echo "✅ OpenAPI contract validation passed"

      - name: Run DMOS API Contract Tests
        run: |
          ./gradlew :products:digital-marketing:dm-api:test \
            --tests "*ContractTest" \
            --info
          echo "✅ DMOS API contract tests passed"

      - name: Check Type Alignment
        working-directory: products/digital-marketing/ui
        run: |
          # Verify TypeScript types align with OpenAPI contract
          pnpm exec tsc --noEmit
          echo "✅ TypeScript types compile successfully"

      - name: Validate Enum Values
        run: |
          # Check that backend enum values match contract
          echo "Checking CampaignType alignment..."
          if ! grep -q "EMAIL" products/digital-marketing/dm-domain/src/main/java/com/ghatana/digitalmarketing/domain/campaign/CampaignType.java; then
            echo "❌ CampaignType EMAIL not found"
            exit 1
          fi
          if ! grep -q "EMAIL" products/digital-marketing/ui/src/types/campaign.ts; then
            echo "❌ CampaignType EMAIL not found in UI types"
            exit 1
          fi
          echo "✅ Enum values aligned across backend and frontend"

  # =============================================================================
  # Job 8: Durable Workflow Tests (P0-006)
  # =============================================================================
  durable-workflow-tests:
    name: Durable Workflow Tests (DLQ, External ID Mapping)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: dmos_workflow_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Run Dead-Letter Queue Tests
        run: |
          ./gradlew :products:digital-marketing:dm-persistence:test \
            --tests "com.ghatana.digitalmarketing.persistence.command.PostgresDmDeadLetterQueueTest" \
            --info
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

      - name: Run External ID Mapping Tests
        run: |
          ./gradlew :products:digital-marketing:dm-persistence:test \
            --tests "com.ghatana.digitalmarketing.persistence.command.PostgresExternalIdMappingRepositoryTest" \
            --info
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-test-results
          path: products/digital-marketing/dm-persistence/build/test-results/test/

  # =============================================================================
  # Job 9: Privacy and DSAR Tests (P1-013)
  # =============================================================================
  privacy-dsar-tests:
    name: Privacy and DSAR Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Run Privacy Service Tests
        run: |
          ./gradlew :products:digital-marketing:dm-application:test \
            --tests "com.ghatana.digitalmarketing.application.privacy.PrivacyServiceTest" \
            --info
        env:
          DMOS_PII_HMAC_KEY: test-hmac-key-for-ci
          DMOS_CONTACT_ENCRYPTION_KEY: test-encryption-key-for-ci

      - name: Validate PII Hardening
        run: |
          # Check for plaintext PII handling in production code
          if grep -r "email" products/digital-marketing/dm-persistence/src/main/java --include="*.java" | grep -i "varchar" | grep -v "hashed" | grep -v "encrypted"; then
            echo "❌ Found potential plaintext email storage - PII must be hashed/encrypted"
            exit 1
          fi
          echo "✅ PII hardening validation complete"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: privacy-test-results
          path: products/digital-marketing/dm-application/build/test-results/test/

  # =============================================================================
  # Job 10: Analytics Dashboard Tests (P0-003)
  # =============================================================================
  analytics-dashboard-tests:
    name: Analytics Dashboard Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Run Dashboard Summary Tests
        run: |
          ./gradlew :products:digital-marketing:dm-application:test \
            --tests "com.ghatana.digitalmarketing.application.analytics.DashboardSummaryServiceTest" \
            --info

      - name: Validate Backend-Only Computation
        run: |
          # Ensure dashboard metrics are computed server-side, not in UI
          if grep -r "computeMetrics" products/digital-marketing/ui/src --include="*.ts" --include="*.tsx"; then
            echo "❌ Found metric computation in UI - dashboard metrics must come from backend summary API"
            exit 1
          fi
          echo "✅ Backend-only computation validated"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analytics-test-results
          path: products/digital-marketing/dm-application/build/test-results/test/

  # =============================================================================
  # Job 8: Feature Flag Configuration Tests (P0-004 / P0-014)
  # =============================================================================
  feature-flag-tests:
    name: Feature Flag Configuration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: products/digital-marketing/ui/pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Validate Vite Environment Variables
        working-directory: products/digital-marketing/ui
        run: |
          # Check that feature flags use VITE_ prefix
          if grep -r "process.env" src --include="*.ts" --include="*.tsx" | grep -v "process.env.NODE_ENV"; then
            echo "❌ Found process.env usage - must use import.meta.env.VITE_*"
            exit 1
          fi
          echo "✅ Vite environment variables validated"

      - name: Test Production Build
        working-directory: products/digital-marketing/ui
        run: |
          VITE_AUTH_PROVIDER_ENABLED=true pnpm build
          echo "✅ Production build successful"

      - name: Check Feature Flagged Routes
        run: |
          # Verify FeatureFlaggedRoute component exists and uses correct pattern
          if [ ! -f products/digital-marketing/ui/src/components/FeatureFlaggedRoute.tsx ]; then
            echo "❌ FeatureFlaggedRoute component not found"
            exit 1
          fi
          echo "✅ Feature flag routing validated"

  # =============================================================================
  # Job 11: Release Gate Summary
  # =============================================================================
  release-gate:
    name: P0/P1 Release Gate
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - repository-integration-tests
      - api-integration-tests
      - e2e-browser-tests
      - ui-quality-gates
      - stable-route-e2e-realbackend
      - production-bootstrap-validation
      - security-header-tests
      - contract-parity-tests
      - durable-workflow-tests
      - privacy-dsar-tests
      - analytics-dashboard-tests
      - feature-flag-tests
    if: always()
    steps:
      - name: Check all P0/P1 tests passed
        run: |
          echo "==================================="
          echo "P0/P1 Release Gate Summary"
          echo "==================================="

          # Check each required job result explicitly
          all_passed=true

          unit_tests="${{ needs.unit-tests.result }}"
          repository_tests="${{ needs.repository-integration-tests.result }}"
          api_tests="${{ needs.api-integration-tests.result }}"
          e2e_tests="${{ needs.e2e-browser-tests.result }}"
          ui_quality="${{ needs.ui-quality-gates.result }}"
          real_backend_e2e="${{ needs.stable-route-e2e-realbackend.result }}"
          bootstrap_tests="${{ needs.production-bootstrap-validation.result }}"
          security_tests="${{ needs.security-header-tests.result }}"
          contract_tests="${{ needs.contract-parity-tests.result }}"
          workflow_tests="${{ needs.durable-workflow-tests.result }}"
          privacy_tests="${{ needs.privacy-dsar-tests.result }}"
          analytics_tests="${{ needs.analytics-dashboard-tests.result }}"
          flag_tests="${{ needs.feature-flag-tests.result }}"

          echo "${unit_tests}" | grep -q "success" || all_passed=false
          echo "${repository_tests}" | grep -q "success" || all_passed=false
          echo "${api_tests}" | grep -q "success" || all_passed=false
          echo "${e2e_tests}" | grep -q "success" || all_passed=false
          echo "${ui_quality}" | grep -q "success" || all_passed=false
          echo "${real_backend_e2e}" | grep -q "success" || all_passed=false
          echo "${bootstrap_tests}" | grep -q "success" || all_passed=false
          echo "${security_tests}" | grep -q "success" || all_passed=false
          echo "${contract_tests}" | grep -q "success" || all_passed=false
          echo "${workflow_tests}" | grep -q "success" || all_passed=false
          echo "${privacy_tests}" | grep -q "success" || all_passed=false
          echo "${analytics_tests}" | grep -q "success" || all_passed=false
          echo "${flag_tests}" | grep -q "success" || all_passed=false

          echo "✅ unit-tests: ${unit_tests}"
          echo "✅ repository-integration-tests: ${repository_tests}"
          echo "✅ api-integration-tests: ${api_tests}"
          echo "✅ e2e-browser-tests: ${e2e_tests}"
          echo "✅ ui-quality-gates: ${ui_quality}"
          echo "✅ stable-route-e2e-realbackend (P1-2 Mandatory): ${real_backend_e2e}"
          echo "✅ production-bootstrap-validation: ${bootstrap_tests}"
          echo "✅ security-header-tests: ${security_tests}"
          echo "✅ contract-parity-tests: ${contract_tests}"
          echo "✅ durable-workflow-tests (DLQ, External ID): ${workflow_tests}"
          echo "✅ privacy-dsar-tests (PII, Consent, DSAR): ${privacy_tests}"
          echo "✅ analytics-dashboard-tests: ${analytics_tests}"
          echo "✅ feature-flag-tests: ${flag_tests}"

          echo "==================================="

          if [ "$all_passed" = true ]; then
            echo "🎉 ALL P0/P1 RELEASE BLOCKERS PASSED"
            echo "Production release is APPROVED"
            exit 0
          else
            echo "❌ P0/P1 RELEASE GATE FAILED"
            echo "Production release is BLOCKED"
            exit 1
          fi

      - name: Generate Release Report
        if: always()
        run: |
          cat > release-report.md << 'EOF'
          # DMOS P0/P1 Release Gate Report

          ## Status: See the `Check all P0/P1 tests passed` step in this job.

          ### Test Results Summary

          | Check | Status |
          |-------|--------|
          | Unit Tests (P0-016) | ${{ needs.unit-tests.result }} |
          | Repository Integration (P1-014) | ${{ needs.repository-integration-tests.result }} |
          | API Integration (P1-015) | ${{ needs.api-integration-tests.result }} |
          | E2E Browser Tests (P0-016) | ${{ needs.e2e-browser-tests.result }} |
          | UI Type/Lint/Route Contract | ${{ needs.ui-quality-gates.result }} |
          | Real-Backend E2E (P1-2 Mandatory) | ${{ needs.stable-route-e2e-realbackend.result }} |
          | Production Bootstrap (P1-004/P0-016) | ${{ needs.production-bootstrap-validation.result }} |
          | Security Headers (P0-015) | ${{ needs.security-header-tests.result }} |
          | Contract Parity (P0-009/P0-010) | ${{ needs.contract-parity-tests.result }} |
          | Durable Workflow (P0-006) | ${{ needs.durable-workflow-tests.result }} |
          | Privacy/DSAR (P1-013) | ${{ needs.privacy-dsar-tests.result }} |
          | Analytics Dashboard (P0-003) | ${{ needs.analytics-dashboard-tests.result }} |
          | Feature Flags (P0-004/P0-014) | ${{ needs.feature-flag-tests.result }} |

          ### Release Decision

          The release decision is enforced by the summary step above. Any failed required job blocks production release.

          Generated at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

          cat release-report.md

      - name: Upload Release Report
        uses: actions/upload-artifact@v4
        with:
          name: p0-release-report
          path: release-report.md

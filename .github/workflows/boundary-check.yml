name: Monorepo Boundary Check

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

jobs:
  boundary-check:
    name: Boundary Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check deprecated package usage
        run: ./scripts/check-deprecated-ui.sh

      - name: Check package dependency policy
        run: node scripts/check-architecture-compliance.js

      - name: Check cross-product Gradle dependencies
        run: bash scripts/check-cross-product-deps.sh

      - name: Verify Data-Cloud UI remains product-local
        run: |
          if rg '@yappc/' products/data-cloud/ui/package.json --no-heading --line-number -n; then
            echo 'ERROR: Data-Cloud UI depends on YAPPC packages'
            exit 1
          fi

      - name: Verify shared-service ownership files
        run: |
          for dir in shared-services/*/; do
            if [ ! -f "${dir}OWNER.md" ]; then
              echo "ERROR: ${dir} missing OWNER.md"
              exit 1
            fi
          done

      - name: Guard against DCMAAR thin-UI re-introduction
        run: |
          for pkg in "@dcmaar/shared-ui-core" "@dcmaar/shared-ui-tailwind" "@dcmaar/shared-ui-charts"; do
            if grep -r "$pkg" products/ --include="package.json" --exclude-dir="node_modules" -l 2>/dev/null | grep -q .; then
              echo "ERROR: Deprecated package $pkg was re-introduced. Use @dcmaar/ui instead."
              exit 1
            fi
          done
          echo "DCMAAR thin-UI check passed"

      - name: Verify cross-product shared modules have OWNER.md
        run: |
          # products/virtual-org is a product-owned shared framework (framework module used by software-org)
          if [ ! -f "products/virtual-org/OWNER.md" ]; then
            echo "ERROR: products/virtual-org/OWNER.md is missing — required for cross-product shared modules"
            exit 1
          fi
          echo "Cross-product module ownership check passed"

      - name: Check Data-Cloud OpenAPI contract drift
        run: bash products/data-cloud/scripts/check-openapi-drift.sh
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm --filter @ghatana/primitives exec tsc --noEmit
      - name: Test
        run: pnpm --filter @ghatana/primitives test -- --run

  wizard:
    name: '@ghatana/wizard — Test & Type-check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm --filter @ghatana/wizard exec tsc --noEmit
      - name: Test
        run: pnpm --filter @ghatana/wizard test -- --run

  patterns:
    name: '@ghatana/patterns — Test & Type-check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm --filter @ghatana/patterns exec tsc --noEmit
      - name: Test
        run: pnpm --filter @ghatana/patterns test -- --run

  data-grid:
    name: '@ghatana/data-grid — Test & Type-check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm --filter @ghatana/data-grid exec tsc --noEmit
      - name: Test
        run: pnpm --filter @ghatana/data-grid test -- --run

  ui:
    name: '@ghatana/ui — Test & Type-check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm --filter @ghatana/ui exec tsc --noEmit
      - name: Test
        run: pnpm --filter @ghatana/ui test -- --run

  canvas-tools:
    name: '@ghatana/canvas-tools — Facade Test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm --filter @ghatana/canvas-tools test -- --run

  canvas-plugins:
    name: '@ghatana/canvas-plugins — Facade Test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm --filter @ghatana/canvas-plugins test -- --run

  # ── Coverage enforcement ────────────────────────────────────────────────────
  # Fail the workflow if any package exposes a `test` pnpm script but reports
  # zero test files discovered.  This prevents `--passWithNoTests` regressions.

  no-empty-test-suites:
    name: 'Enforce: no empty test suites in platform/typescript'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Check for packages with test script but no test files
        shell: bash
        run: |
          set -e
          FAIL=0
          # Find all package.json files under platform/typescript
          while IFS= read -r pkg_json; do
            dir=$(dirname "$pkg_json")
            # Check if package.json has a "test" script
            if ! node -e "
              const p = require('$pkg_json');
              process.exit(p.scripts && p.scripts.test ? 0 : 1);
            " 2>/dev/null; then
              continue
            fi
            # Count test files
            count=$(find "$dir/src" -name "*.test.ts" -o -name "*.test.tsx" \
                    -o -name "*.spec.ts" -o -name "*.spec.tsx" 2>/dev/null | wc -l | tr -d ' ')
            if [ "$count" -eq 0 ]; then
              echo "ERROR: $dir has a test script but NO test files." >&2
              FAIL=1
            fi
          done < <(find platform/typescript -name "package.json" \
                    -not -path "*/node_modules/*" -not -path "*/dist/*")
          exit $FAIL


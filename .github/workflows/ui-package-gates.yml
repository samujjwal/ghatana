name: UI Package Gates

on:
  pull_request:
    branches: [main]
    paths:
      - 'products/aep/ui/**'
      - 'products/aep/gateway/**'
      - 'products/data-cloud/ui/**'
      - 'platform/typescript/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aep-ui:
    name: AEP UI Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm --filter @ghatana/aep-ui exec tsc --noEmit
      - name: Test
        run: pnpm --filter @ghatana/aep-ui test -- --run
      - name: Build
        run: pnpm --filter @ghatana/aep-ui build

  data-cloud-ui:
    name: Data Cloud UI Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm --filter @ghatana/data-cloud-ui exec tsc --noEmit
      - name: Test
        run: pnpm --filter @ghatana/data-cloud-ui test -- --run
      - name: Build
        run: pnpm --filter @ghatana/data-cloud-ui build

  gateway:
    name: AEP Gateway Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm --filter @ghatana/aep-gateway exec tsc --noEmit
      - name: Test
        run: pnpm --filter @ghatana/aep-gateway test

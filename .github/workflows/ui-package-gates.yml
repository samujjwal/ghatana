name: UI Package Gates

on:
  pull_request:
    branches: [main]
    paths:
      - 'products/data-cloud/planes/action/ui/**'
      - 'products/data-cloud/planes/action/gateway/**'
      - 'products/data-cloud/delivery/ui/**'
      - 'platform/typescript/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aep-ui:
    name: AEP UI Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm --filter @aep/ui exec tsc --noEmit
      - name: Test
        run: pnpm --filter @aep/ui exec vitest run
      - name: Build
        run: pnpm --filter @aep/ui build

  data-cloud-ui:
    name: Data Cloud UI Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm --filter @data-cloud/ui exec tsc --noEmit
      - name: Test
        run: pnpm --filter @data-cloud/ui exec vitest run
      - name: Build
        run: pnpm --filter @data-cloud/ui build

  platform-typescript-dependency-boundaries:
    name: 'platform/typescript — dependency boundaries'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Dependency-cruiser boundary check
        run: >-
          pnpm dlx dependency-cruiser@17.3.10
          --config platform/typescript/.dependency-cruiser.cjs
          --output-type text
          platform/typescript/*/src
          platform/typescript/foundation/*/src
          platform/typescript/canvas/*/src

  gateway:
    name: AEP Gateway Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm --filter @ghatana/aep-gateway exec tsc --noEmit
      - name: Test
        run: pnpm --filter @ghatana/aep-gateway test

  # ── Platform TypeScript package gates ──────────────────────────────────────
  # These jobs ensure every platform package that previously had no test
  # coverage is now gated on build + typecheck + vitest pass in CI.

  forms:
    name: '@ghatana/forms — Test & Type-check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm --filter @ghatana/forms exec tsc --noEmit
      - name: Test
        run: pnpm --filter @ghatana/forms test -- --run

  primitives:
    name: '@ghatana/primitives — Test & Type-check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

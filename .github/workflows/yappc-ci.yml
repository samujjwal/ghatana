name: YAPPC CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'products/yappc/**'
      - 'platform/java/**'
      - 'platform/typescript/**'
  pull_request:
    branches: [main]
    paths:
      - 'products/yappc/**'
      - 'platform/java/**'
      - 'platform/typescript/**'
  workflow_dispatch:

concurrency:
  group: yappc-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  # YAPPC Backend Build & Test
  # ─────────────────────────────────────────────
  backend:
    name: Backend (Java ${{ env.JAVA_VERSION }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: yappc_test
          POSTGRES_USER: yappc
          POSTGRES_PASSWORD: yappc_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Build YAPPC Backend
        run: |
          ./gradlew \
            :products:yappc:services:build \
            :products:yappc:backend:api:build \
            :products:yappc:core:agents:build \
            :products:yappc:core:ai:build \
            :products:yappc:core:domain:build \
            :products:yappc:core:lifecycle:build \
            :products:yappc:platform:build \
            --no-daemon --stacktrace --warning-mode=all

      - name: Validate Agent Catalog
        run: |
          ./gradlew :products:yappc:validateAgentCatalog \
            --no-daemon --stacktrace

      - name: Run Tests with Coverage
        run: |
          ./gradlew :products:yappc:backend:api:test \
            :products:yappc:backend:api:jacocoTestReport \
            --no-daemon --stacktrace
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/yappc_test
          DATABASE_USERNAME: yappc
          DATABASE_PASSWORD: yappc_test_pass

      - name: Enforce Coverage Threshold
        run: |
          ./gradlew :products:yappc:backend:api:jacocoTestCoverageVerification \
            --no-daemon --stacktrace

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-backend-test-results
          path: |
            products/yappc/**/build/test-results/**/*.xml
            products/yappc/**/build/reports/tests/**/*
          retention-days: 14

      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          flags: yappc-backend
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # YAPPC Frontend Build, Lint, Test
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ env.NODE_VERSION }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.28.2 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: products/yappc/frontend
        run: pnpm typecheck

      - name: Lint
        working-directory: products/yappc/frontend
        run: pnpm lint

      - name: Unit Tests
        working-directory: products/yappc/frontend
        run: pnpm test

      - name: Build
        working-directory: products/yappc/frontend
        run: pnpm build:web

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-frontend-test-results
          path: |
            products/yappc/frontend/test-results/
          retention-days: 14

  # ─────────────────────────────────────────────
  # YAPPC Frontend E2E Tests (Playwright)
  # ─────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    needs: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.28.2 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: products/yappc/frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Build frontend for E2E
        working-directory: products/yappc/frontend
        run: pnpm build:web

      - name: Run Playwright E2E tests
        working-directory: products/yappc/frontend
        run: pnpm exec playwright test --reporter=html
        env:
          CI: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-playwright-report
          path: products/yappc/frontend/playwright-report/
          retention-days: 14

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-e2e-results
          path: products/yappc/frontend/test-results/
          retention-days: 14

  # ─────────────────────────────────────────────
  # Code Quality (Checkstyle, PMD, SpotBugs)
  # ─────────────────────────────────────────────
  quality:
    name: Code Quality
    needs: backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Checkstyle
        run: ./gradlew :products:yappc:checkstyleMain --no-daemon

      - name: PMD
        run: ./gradlew :products:yappc:pmdMain --no-daemon

      - name: Upload Quality Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-quality-reports
          path: |
            products/yappc/**/build/reports/checkstyle/**/*
            products/yappc/**/build/reports/pmd/**/*
          retention-days: 7

  # ─────────────────────────────────────────────
  # API Contract Tests (Schemathesis / OpenAPI)
  # ─────────────────────────────────────────────
  contract-tests:
    name: Contract Tests
    needs: backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: yappc_test
          POSTGRES_USER: yappc
          POSTGRES_PASSWORD: yappc_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Schemathesis
        run: pip install schemathesis==3.27.1

      - name: Build YAPPC API (skip tests)
        run: ./gradlew :products:yappc:backend:api:build -x test --no-daemon

      - name: Start YAPPC API Server
        env:
          SPRING_PROFILES_ACTIVE: test
          DATABASE_URL: jdbc:postgresql://localhost:5432/yappc_test
          DATABASE_USERNAME: yappc
          DATABASE_PASSWORD: yappc_test_pass
        run: |
          ./gradlew :products:yappc:backend:api:bootRun --no-daemon &
          echo $! > api.pid
          for i in {1..60}; do
            if curl -sf http://localhost:8080/health; then
              echo "API ready"
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 1
          done

      - name: Run Contract Tests
        working-directory: products/yappc/backend/api
        run: |
          schemathesis run openapi.yaml \
            --base-url http://localhost:8080 \
            --checks all \
            --hypothesis-max-examples 50 \
            --hypothesis-deadline 5000 \
            --workers 4 \
            --exitfirst \
            --show-errors-tracebacks \
            --report

      - name: Stop API Server
        if: always()
        run: |
          if [ -f api.pid ]; then kill $(cat api.pid) || true; fi

      - name: Upload Contract Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-contract-test-report
          path: products/yappc/backend/api/schemathesis-report.html
          retention-days: 7

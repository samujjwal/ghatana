name: YAPPC CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'products/yappc/**'
      - 'platform/java/**'
      - 'platform/typescript/**'
  pull_request:
    branches: [main]
    paths:
      - 'products/yappc/**'
      - 'platform/java/**'
      - 'platform/typescript/**'
  workflow_dispatch:

concurrency:
  group: yappc-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: "22"

jobs:
  # ─────────────────────────────────────────────
  # Format Check (Spotless, Prettier)
  # ─────────────────────────────────────────────
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Spotless (Java format check)
        run: |
          ./gradlew \
            :products:yappc:core:yappc-api:spotlessCheck \
            :products:yappc:core:yappc-services:spotlessCheck \
            :products:yappc:core:yappc-infrastructure:spotlessCheck \
            :products:yappc:core:yappc-agents:spotlessCheck \
            :products:yappc:core:yappc-domain-impl:spotlessCheck \
            :products:yappc:core:yappc-shared:spotlessCheck \
            --no-daemon

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Prettier (TS format check)
        working-directory: products/yappc/frontend
        run: pnpm format:check

  # ─────────────────────────────────────────────
  # Schema Validation
  # ─────────────────────────────────────────────
  schema-validation:
    name: Schema Validation
    needs: format-check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate route-manifest schema
        run: |
          ./gradlew :products:yappc:validateRouteManifest \
            --no-daemon --stacktrace

      - name: Validate OpenAPI schema
        run: |
          ./gradlew :products:yappc:validateOpenApi \
            --no-daemon --stacktrace

      - name: Check production truth sources
        run: node products/yappc/scripts/check-production-truth-sources.mjs

  # ─────────────────────────────────────────────
  # OpenAPI Parity Check
  # ─────────────────────────────────────────────
  openapi-parity:
    name: OpenAPI Parity Check
    needs: schema-validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Check OpenAPI parity with route manifest
        run: |
          ./gradlew :products:yappc:checkYappcOpenApiParity \
            --no-daemon --stacktrace

  # ─────────────────────────────────────────────
  # Generate OpenAPI Client
  # ─────────────────────────────────────────────
  generate-client:
    name: Generate OpenAPI Client
    needs: openapi-parity
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate TypeScript client from OpenAPI
        working-directory: products/yappc/frontend
        run: pnpm generate:client

      - name: Upload generated client
        uses: actions/upload-artifact@v4
        with:
          name: yappc-generated-client
          path: products/yappc/frontend/libs/api-client/src
          retention-days: 7

  # ─────────────────────────────────────────────
  # YAPPC Backend Build & Test
  # ─────────────────────────────────────────────
  backend:
    name: Backend (Java ${{ env.JAVA_VERSION }})
    needs: generate-client
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: yappc_test
          POSTGRES_USER: yappc
          POSTGRES_PASSWORD: yappc_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Build YAPPC Backend
        run: |
          ./gradlew \
            :products:yappc:services:build \
            :products:yappc:core:services-platform:build \
            :products:yappc:core:services-lifecycle:build \
            :products:yappc:core:yappc-domain-impl:build \
            :products:yappc:core:yappc-services:build \
            :products:yappc:core:yappc-infrastructure:build \
            :products:yappc:core:yappc-api:build \
            :products:yappc:core:yappc-shared:build \
            :products:yappc:core:yappc-agents:build \
            :products:yappc:core:ai:build \
            :products:yappc:core:agents:build \
            :products:yappc:infrastructure:datacloud:build \
            -x test \
            --no-daemon --parallel --build-cache --stacktrace

      - name: Validate Agent Catalog
        run: |
          ./gradlew :products:yappc:validateAgentCatalog \
            --no-daemon --stacktrace
        env:
          YAPPC_FAIL_ON_UNREGISTERED_AGENT_DEFS: "false"
          YAPPC_FAIL_ON_CATALOG_OWNERSHIP_GAPS: "true"

      - name: Validate Release Observability
        run: |
          ./gradlew :products:yappc:validateReleaseObservability \
            --no-daemon --stacktrace

      - name: Run Tests with Coverage
        run: |
          ./gradlew \
            :products:yappc:core:services-platform:check \
            :products:yappc:core:services-lifecycle:check \
            :products:yappc:core:yappc-services:check \
            :products:yappc:core:yappc-infrastructure:check \
            :products:yappc:core:yappc-agents:check \
            :products:yappc:core:ai:check \
            --no-daemon --stacktrace
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/yappc_test
          DATABASE_USERNAME: yappc
          DATABASE_PASSWORD: yappc_test_pass

      - name: Verify Lifecycle Startup Diagnostics
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/yappc_test
          DATABASE_USERNAME: yappc
          DATABASE_PASSWORD: yappc_test_pass
          YAPPC_API_KEYS: diagnostics-key
          YAPPC_AGENT_LLM_MODE: stub
        run: |
          mkdir -p products/yappc/build/release-evidence/startup
          ./gradlew :products:yappc:core:services-lifecycle:shadowJar --no-daemon --stacktrace
          java -jar products/yappc/core/services-lifecycle/build/libs/*-all.jar > products/yappc/build/release-evidence/startup/service.log 2>&1 &
          echo $! > lifecycle.pid
          trap 'if [ -f lifecycle.pid ]; then kill "$(cat lifecycle.pid)" 2>/dev/null || true; fi' EXIT

          for i in $(seq 1 60); do
            if curl -sf http://localhost:8082/health/readiness > products/yappc/build/release-evidence/startup/readiness.txt 2>/dev/null; then
              break
            fi
            sleep 1
          done

          curl -sf http://localhost:8082/health/liveness > products/yappc/build/release-evidence/startup/liveness.txt
          curl -sf -H 'X-Api-Key: diagnostics-key' http://localhost:8082/metrics > products/yappc/build/release-evidence/startup/metrics.txt
          grep -Eq 'READY|ready' products/yappc/build/release-evidence/startup/readiness.txt
          grep -Eq 'ok|OK' products/yappc/build/release-evidence/startup/liveness.txt
          grep -Eq 'jvm_|http_server_|yappc_' products/yappc/build/release-evidence/startup/metrics.txt

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-backend-test-results
          path: |
            products/yappc/**/build/test-results/**/*.xml
            products/yappc/**/build/reports/tests/**/*
          retention-days: 14

      - name: Upload Startup Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-startup-diagnostics
          path: products/yappc/build/release-evidence/startup/
          retention-days: 14

      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          flags: yappc-backend
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # YAPPC Frontend Build, Lint, Test
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ env.NODE_VERSION }})
    needs: generate-client
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for deprecated @ghatana/ui usage
        run: pnpm run check:deprecated-ui

      - name: Check duplicate workspace package names
        run: pnpm run check:duplicate-packages

      - name: Enforce JWT dependency policy
        run: pnpm run check:jwt-policy

      - name: Enforce OSS license policy
        run: pnpm run check:license-policy

      - name: Typecheck
        working-directory: products/yappc/frontend
        run: pnpm typecheck

      - name: Lint
        working-directory: products/yappc/frontend
        run: pnpm lint

      - name: Lint (strict design-system gate)
        working-directory: products/yappc/frontend
        run: pnpm lint:strict:design-system

      - name: Unit Tests
        working-directory: products/yappc/frontend
        run: pnpm test

      - name: Verify Vitest Has No Blanket Retries
        working-directory: products/yappc/frontend
        run: |
          if grep -Eq 'retry:\s*[1-9]' vitest.config.ts; then
            echo 'Blanket Vitest retries are not allowed.'
            exit 1
          fi

      - name: Build
        working-directory: products/yappc/frontend
        run: pnpm build:web

      - name: Bundle budget release gate
        working-directory: products/yappc/frontend
        run: pnpm --filter @ghatana/yappc-web-app run check:bundle-budget -- --report --ci

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-frontend-test-results
          path: |
            products/yappc/frontend/test-results/
          retention-days: 14

      - name: Upload Frontend Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-frontend-coverage
          path: products/yappc/frontend/coverage/
          retention-days: 14

      - name: Upload bundle budget evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-web-bundle-budget
          path: products/yappc/frontend/performance/reports/web-bundle-budget.json
          retention-days: 14

  # ─────────────────────────────────────────────
  # YAPPC Frontend E2E Tests (Playwright)
  # ─────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    needs: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: products/yappc/frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Build frontend for E2E
        working-directory: products/yappc/frontend
        run: pnpm build:web

      - name: Run Playwright E2E tests
        working-directory: products/yappc/frontend
        run: pnpm exec playwright test --reporter=html
        env:
          CI: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-playwright-report
          path: products/yappc/frontend/playwright-report/
          retention-days: 14

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-e2e-results
          path: products/yappc/frontend/test-results/
          retention-days: 14

  # ─────────────────────────────────────────────
  # Code Quality (Checkstyle, PMD, SpotBugs)
  # ─────────────────────────────────────────────
  a11y:
    name: Accessibility Readiness
    needs: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: products/yappc/frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Build frontend for a11y
        working-directory: products/yappc/frontend
        run: pnpm build:web

      - name: Run accessibility release tests
        working-directory: products/yappc/frontend
        run: pnpm release:accessibility
        env:
          CI: true

      - name: Upload accessibility evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-a11y-readiness
          path: |
            products/yappc/frontend/playwright-report/
            products/yappc/frontend/test-results/
          retention-days: 14

  quality:
    name: Code Quality
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Checkstyle
        run: ./gradlew :products:yappc:checkstyleMain --no-daemon

      - name: PMD
        run: ./gradlew :products:yappc:pmdMain --no-daemon

      - name: Spotless (format check)
        run: |
          ./gradlew \
            :products:yappc:core:yappc-api:spotlessCheck \
            :products:yappc:core:yappc-services:spotlessCheck \
            :products:yappc:core:yappc-infrastructure:spotlessCheck \
            :products:yappc:core:yappc-agents:spotlessCheck \
            :products:yappc:core:yappc-domain-impl:spotlessCheck \
            :products:yappc:core:yappc-shared:spotlessCheck \
            --no-daemon

      - name: Doc-tag compliance
        run: ./gradlew checkDocTags --no-daemon

      - name: YAPPC doc evidence links
        run: node products/yappc/scripts/check-doc-evidence-links.mjs products/yappc/docs

      - name: YAPPC Data Cloud collection names
        run: node products/yappc/scripts/check-datacloud-collection-names.mjs

      - name: YAPPC feature flag docs
        run: node products/yappc/scripts/check-feature-flag-docs.mjs

      - name: YAPPC prompt operations docs
        run: node products/yappc/scripts/check-prompt-ops-docs.mjs

      - name: YAPPC agent operations docs
        run: node products/yappc/scripts/check-agent-ops-docs.mjs

      - name: YAPPC Kernel handoff docs
        run: node products/yappc/scripts/check-kernel-handoff-docs.mjs

      - name: YAPPC product-family docs
        run: node products/yappc/scripts/check-product-family-docs.mjs

      - name: YAPPC API reference
        run: python products/yappc/scripts/generate-api-reference.py --check

      - name: YAPPC release gate evidence
        run: |
          pnpm check:product-slo-budgets
          pnpm check:product-cost-budgets
          pnpm check:product-domain-invariants
          pnpm check:openapi-breaking-changes

      - name: Upload Quality Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-quality-reports
          path: |
            products/yappc/**/build/reports/checkstyle/**/*
            products/yappc/**/build/reports/pmd/**/*
            products/yappc/**/build/reports/spotbugs/**/*
          retention-days: 7

      - name: Upload YAPPC release gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-release-gate-evidence
          path: |
            .kernel/evidence/yappc/**
            .kernel/evidence/product-slo-budgets.json
            .kernel/evidence/product-cost-budgets.json
            .kernel/evidence/product-domain-invariants.json
            .kernel/evidence/openapi-breaking-changes.json
            products/yappc/frontend/performance/reports/web-bundle-budget.json
          retention-days: 14

  # ─────────────────────────────────────────────
  # API Contract Tests (Schemathesis / OpenAPI)
  # ─────────────────────────────────────────────
  contract-tests:
    name: Contract Tests
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: yappc_test
          POSTGRES_USER: yappc
          POSTGRES_PASSWORD: yappc_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Schemathesis
        run: pip install schemathesis==3.27.1

      - name: Build YAPPC API (skip tests)
        run: ./gradlew :products:yappc:services:build -x test --no-daemon

      - name: Start YAPPC API Server
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/yappc_test
          DATABASE_USERNAME: yappc
          DATABASE_PASSWORD: yappc_test_pass
        run: |
          ./gradlew :products:yappc:services:run --no-daemon &
          echo $! > api.pid
          for i in {1..60}; do
            if curl -sf http://localhost:8082/health; then
              echo "API ready"
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 1
          done

      - name: Run Contract Tests
        working-directory: products/yappc/docs/api
        run: |
          schemathesis run openapi.yaml \
            --base-url http://localhost:8082 \
            --checks all \
            --hypothesis-max-examples 50 \
            --hypothesis-deadline 5000 \
            --workers 4 \
            --exitfirst \
            --show-errors-tracebacks \
            --report

      - name: Stop API Server
        if: always()
        run: |
          if [ -f api.pid ]; then kill $(cat api.pid) || true; fi

      - name: Upload Contract Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-contract-test-report
          path: products/yappc/docs/api/schemathesis-report.html
          retention-days: 7

  # ─────────────────────────────────────────────
  # Docker Build and Test
  # ─────────────────────────────────────────────
  docker:
    name: Docker Build and Test
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t yappc:test -f products/yappc/Dockerfile products/yappc/

      - name: Run container health check
        run: |
          docker run -d --name yappc-test -p 8082:8082 yappc:test
          sleep 10
          curl -sf http://localhost:8082/api/v1/health
          curl -sf http://localhost:8082/api/v1/ready

      - name: Check non-root user
        run: |
          USER_ID=$(docker exec yappc-test id -u)
          if [[ "$USER_ID" == "0" ]]; then
            echo "FAIL: Container running as root"
            exit 1
          fi

      - name: Cleanup container
        if: always()
        run: |
          docker rm -f yappc-test || true
          docker rmi yappc:test || true

  # ─────────────────────────────────────────────
  # Cleanup (remove temporary artifacts)
  # ─────────────────────────────────────────────
  cleanup:
    name: Cleanup
    needs: [backend, frontend, e2e, a11y, quality, contract-tests, docker]
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean up temporary build artifacts
        run: |
          ./gradlew clean --no-daemon
          pnpm run clean || true

      - name: Report cleanup status
        run: echo "Cleanup completed successfully"

  # ─────────────────────────────────────────────
  # Release Evidence Bundle
  # ─────────────────────────────────────────────
  release-evidence:
    name: Release Evidence Bundle
    needs:
      - backend
      - frontend
      - e2e
      - a11y
      - quality
      - contract-tests
      - docker
      - cleanup
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend test results
        uses: actions/download-artifact@v4
        with:
          name: yappc-backend-test-results
          path: artifacts/backend-tests

      - name: Download frontend test results
        uses: actions/download-artifact@v4
        with:
          name: yappc-frontend-test-results
          path: artifacts/frontend-tests

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: yappc-frontend-coverage
          path: artifacts/frontend-coverage

      - name: Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: yappc-playwright-report
          path: artifacts/playwright-report

      - name: Download E2E results
        uses: actions/download-artifact@v4
        with:
          name: yappc-e2e-results
          path: artifacts/e2e-results

      - name: Download accessibility readiness
        uses: actions/download-artifact@v4
        with:
          name: yappc-a11y-readiness
          path: artifacts/a11y-readiness

      - name: Download startup diagnostics
        uses: actions/download-artifact@v4
        with:
          name: yappc-startup-diagnostics
          path: artifacts/startup-diagnostics

      - name: Download contract report
        uses: actions/download-artifact@v4
        with:
          name: yappc-contract-test-report
          path: artifacts/contract-report

      - name: Download release gate evidence
        uses: actions/download-artifact@v4
        with:
          name: yappc-release-gate-evidence
          path: artifacts/release-gate-evidence

      - name: Generate release evidence bundle
        run: |
          bash products/yappc/scripts/generate-release-evidence.sh products/yappc/build/release-evidence artifacts
          node products/yappc/scripts/generate-ci-execution-proof.mjs products/yappc/build/release-evidence artifacts
          node products/yappc/scripts/generate-yappc-scorecard-evidence.mjs products/yappc/build/release-evidence artifacts
          node products/yappc/scripts/check-yappc-scorecard-evidence.mjs products/yappc/build/release-evidence/yappc-scorecard-evidence.json

      - name: Upload release evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: yappc-release-evidence-bundle
          path: products/yappc/build/release-evidence/
          retention-days: 14

name: Security Scanning

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]
    schedule:
        # Run daily at 2 AM UTC
        - cron: "0 2 * * *"
    workflow_dispatch:

permissions:
    contents: read
    security-events: write
    pull-requests: write

jobs:
    dependency-scan-node:
        name: Node Dependency Vulnerability Scan
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                product:
                    - { name: phr-web, workspaceDir: ., auditFilter: "--filter @ghatana/phr-web" }
                    - { name: dmos-ui, workspaceDir: ., auditFilter: "--filter @dmos/ui" }
                    - { name: flashit-web, workspaceDir: ., auditFilter: "--filter @flashit/web" }
                    - { name: flashit-gateway, workspaceDir: products/flashit, auditFilter: "--filter @flashit/web-api" }
                    - { name: dcmaar, workspaceDir: products/dcmaar, auditFilter: "" }
                    - { name: yappc, workspaceDir: products/yappc, auditFilter: "" }

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "pnpm"

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.33.0

            - name: Collect audit report
              run: |
                  pnpm install --frozen-lockfile
                  pnpm ${{ matrix.product.auditFilter }} audit --audit-level=moderate --json > npm-audit.json || true
              working-directory: ${{ matrix.product.workspaceDir }}

            - name: Enforce audit severity gate
              run: |
                  REPORT=npm-audit.json
                  if [ ! -f "$REPORT" ]; then
                    echo "No audit report found, skipping gate"
                    exit 0
                  fi
                  CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' "$REPORT" 2>/dev/null || echo 0)
                  HIGH=$(jq '.metadata.vulnerabilities.high // 0' "$REPORT" 2>/dev/null || echo 0)
                  echo "Critical: $CRITICAL, High: $HIGH"
                  if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
                    echo "ERROR: ${{ matrix.product.name }} has $CRITICAL critical and $HIGH high severity vulnerabilities"
                    jq '.advisories | to_entries[] | select(.value.severity == "critical" or .value.severity == "high") | {title: .value.title, severity: .value.severity, url: .value.url}' "$REPORT" 2>/dev/null || true
                    exit 1
                  fi
                  echo "OK: No high/critical vulnerabilities found for ${{ matrix.product.name }}"
              working-directory: ${{ matrix.product.workspaceDir }}

            - name: Upload audit report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: npm-audit-${{ matrix.product.name }}
                  path: ${{ matrix.product.workspaceDir }}/npm-audit.json
                  retention-days: 30
                  if-no-files-found: ignore

    default-credential-scan:
        name: Secret and Default Credential Policy Scan
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Run repository secret/default credential scanner
              run: bash scripts/security-audit.sh

    dependency-scan-gradle:
        name: Gradle Dependency Vulnerability Scan
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v3

            - name: Run OWASP dependency-check
              run: ./gradlew dependencyCheckAnalyze --no-daemon

            - name: Upload OWASP report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: owasp-dependency-check
                  path: "**/build/reports/dependency-check-report.*"
                  retention-days: 30

    sast-scan:
        name: Static Application Security Testing (SAST) — TypeScript
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                  languages: javascript, typescript
                  queries: security-and-quality

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                  category: "/language:javascript"

    sast-scan-java:
        name: Static Application Security Testing (SAST) — Java
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"

            - name: Initialize CodeQL for Java
              uses: github/codeql-action/init@v3
              with:
                  languages: java
                  queries: security-and-quality

            - name: Build Java sources for CodeQL
              run: ./gradlew compileJava compileTestJava --no-daemon -x test

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                  category: "/language:java"
                  upload: true

    java-kernel-plugins-security:
        name: Java Kernel & Plugins Security Scanning
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"

            - name: Run SpotBugs for kernel & plugins
              run: |
                  ./gradlew \
                    :platform-kernel:kernel-core:spotbugsMain \
                    :platform-kernel:kernel-plugin:spotbugsMain \
                    :platform-plugins:plugin-audit-trail:spotbugsMain \
                    :platform-plugins:plugin-ledger:spotbugsMain \
                    :platform-plugins:plugin-consent:spotbugsMain \
                    -x test

            - name: Run PMD for kernel & plugins
              run: |
                  ./gradlew \
                    :platform-kernel:kernel-core:pmdMain \
                    :platform-plugins:plugin-audit-trail:pmdMain \
                    :platform-plugins:plugin-ledger:pmdMain \
                    -x test

            - name: Check for security anti-patterns
              run: |
                  echo "Checking for common Java security anti-patterns..."
                  
                  # Check for unsafe random
                  if grep -r "new Random()" platform-kernel/ platform-plugins/ \
                    --include="*.java" 2>/dev/null; then
                    echo "⚠️ Random() instead of SecureRandom() detected"
                  fi
                  
                  # Check for hardcoded credentials
                  if grep -rE "password\s*=\s*['\"]" platform-kernel/ platform-plugins/ \
                    --include="*.java" 2>/dev/null | grep -v "// " | grep -v test; then
                    echo "✗ Hardcoded password detected"
                    exit 1
                  fi
                  
                  # Check for SQL injection vulnerabilities
                  if grep -r "sql.*concatenation\|+ sql\|sql +\|concat.*sql" \
                    platform-kernel/ platform-plugins/ \
                    --include="*.java" 2>/dev/null; then
                    echo "⚠️ Possible SQL concatenation detected (use parameterized queries)"
                  fi
                  
                  echo "✓ Security anti-pattern checks complete"

            - name: Upload SpotBugs reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: spotbugs-reports
                  path: "platform-kernel/**/build/reports/spotbugs/"
                  retention-days: 30

    java-products-security:
        name: Java Products Security Scanning
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"

            - name: Run SpotBugs for PHR
              run: |
                  ./gradlew \
                    :products:phr:spotbugsMain \
                    -x test --continue || true
              continue-on-error: false

            - name: Run PMD for PHR
              run: |
                  ./gradlew \
                    :products:phr:pmdMain \
                    -x test --continue

            - name: Run SpotBugs for Finance
              run: |
                  ./gradlew \
                    :products:finance:spotbugsMain \
                    -x test --continue

            - name: Run PMD for Finance
              run: |
                  ./gradlew \
                    :products:finance:pmdMain \
                    -x test --continue

            - name: Run SpotBugs for Digital Marketing Java modules
              run: |
                  ./gradlew \
                    :products:digital-marketing:dm-api:spotbugsMain \
                    :products:digital-marketing:dm-application:spotbugsMain \
                    :products:digital-marketing:dm-domain:spotbugsMain \
                    :products:digital-marketing:dm-persistence:spotbugsMain \
                    -x test --continue

            - name: Run PMD for Digital Marketing Java modules
              run: |
                  ./gradlew \
                    :products:digital-marketing:dm-api:pmdMain \
                    :products:digital-marketing:dm-application:pmdMain \
                    :products:digital-marketing:dm-domain:pmdMain \
                    :products:digital-marketing:dm-persistence:pmdMain \
                    -x test --continue

            - name: Check for security anti-patterns in product Java source
              run: |
                  echo "Checking product Java source for common security anti-patterns..."

                  FAILED=0

                  # Check for hardcoded credentials in product source
                  if grep -rE "password\s*=\s*['\"][^'\"]{3,}['\"]" \
                    products/phr/ products/finance/ products/digital-marketing/ \
                    --include="*.java" 2>/dev/null \
                    | grep -v "// " | grep -v "/test/" | grep -v "Test.java"; then
                    echo "✗ Hardcoded password detected in product Java source"
                    FAILED=1
                  fi

                  # Check for unsafe Random() usage
                  if grep -rn "new Random()" \
                    products/phr/ products/finance/ products/digital-marketing/ \
                    --include="*.java" 2>/dev/null | grep -v "/test/" | grep -v "Test.java"; then
                    echo "⚠️  Random() instead of SecureRandom() found in product Java source"
                  fi

                  # Check for SQL concatenation (injection risk)
                  if grep -rE "\".*SELECT.*\"\s*\+" \
                    products/phr/ products/finance/ products/digital-marketing/ \
                    --include="*.java" 2>/dev/null | grep -v "/test/" | grep -v "Test.java"; then
                    echo "✗ Possible SQL concatenation detected in product Java source"
                    FAILED=1
                  fi

                  if [ "$FAILED" -eq 1 ]; then
                    echo "Security anti-pattern checks failed"
                    exit 1
                  fi

                  echo "✓ Product Java security anti-pattern checks complete"

            - name: Upload SpotBugs reports for products
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: spotbugs-reports-products
                  path: |
                      products/phr/**/build/reports/spotbugs/
                      products/finance/**/build/reports/spotbugs/
                      products/digital-marketing/**/build/reports/spotbugs/
                  retention-days: 30

    secret-scan:
        name: Secret Detection
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: TruffleHog Secret Scan
              uses: trufflesecurity/trufflehog@main
              with:
                  path: ./
                  base: ${{ github.event.repository.default_branch }}
                  head: HEAD
                  extra_args: --only-verified

    container-scan:
        name: Container Image Scan
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Docker image
              run: |
                  docker build -t flashit-web-api:test -f products/flashit/backend/gateway/Dockerfile products/flashit/backend/gateway

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: flashit-web-api:test
                  format: "sarif"
                  output: "trivy-results.sarif"
                  severity: "CRITICAL,HIGH"

            - name: Upload Trivy results to GitHub Security
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: "trivy-results.sarif"

            - name: Run Trivy vulnerability scanner (table output)
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: flashit-web-api:test
                  format: "table"
                  severity: "CRITICAL,HIGH"

    license-compliance:
        name: License Compliance Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install pnpm
              run: corepack enable && corepack prepare pnpm@10.33.0 --activate

            - name: Install dependencies
              run: pnpm install --frozen-lockfile
              working-directory: products/flashit

            - name: Check licenses
              run: |
                  pnpm --dir backend/gateway dlx license-checker --summary --production --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense'
              working-directory: products/flashit

    security-headers:
        name: Security Headers Check
        runs-on: ubuntu-latest
        if: github.event_name == 'push'

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Check security headers configuration
              run: |
                  echo "Verifying security headers are configured..."

                  # Check for security middleware
                  if grep -r "Content-Security-Policy" products/flashit/backend/gateway/src; then
                    echo "✅ CSP header configured"
                  else
                    echo "❌ CSP header not found"
                    exit 1
                  fi

                  if grep -r "X-Frame-Options" products/flashit/backend/gateway/src; then
                    echo "✅ X-Frame-Options configured"
                  else
                    echo "❌ X-Frame-Options not found"
                    exit 1
                  fi

                  if grep -r "X-Content-Type-Options" products/flashit/backend/gateway/src; then
                    echo "✅ X-Content-Type-Options configured"
                  else
                    echo "❌ X-Content-Type-Options not found"
                    exit 1
                  fi

    security-report:
        name: Generate Security Report
        runs-on: ubuntu-latest
        needs:
            [
                dependency-scan-node,
                dependency-scan-gradle,
                sast-scan,
                sast-scan-java,
                java-kernel-plugins-security,
                java-products-security,
                secret-scan,
                container-scan,
                license-compliance,
            ]
        if: always()

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download audit artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: npm-audit-*
                  path: ./security-reports
                  merge-multiple: true

            - name: Generate summary report
              run: |
                  echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
                  echo "- Dependency Scan (Node): ${{ needs.dependency-scan-node.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- Dependency Scan (Gradle): ${{ needs.dependency-scan-gradle.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- SAST Scan (TS): ${{ needs.sast-scan.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- SAST Scan (Java): ${{ needs.sast-scan-java.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- Kernel & Plugins Security: ${{ needs.java-kernel-plugins-security.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- Products Security: ${{ needs.java-products-security.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- Secret Scan: ${{ needs.secret-scan.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- Container Scan: ${{ needs.container-scan.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- License Compliance: ${{ needs.license-compliance.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Timestamp: $(date -u)" >> $GITHUB_STEP_SUMMARY

name: Security Scanning

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]
    schedule:
        # Run daily at 2 AM UTC
        - cron: "0 2 * * *"
    workflow_dispatch:

permissions:
    contents: read
    security-events: write
    pull-requests: write

jobs:
    dependency-scan-node:
        name: Node Dependency Vulnerability Scan
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                product:
                    - { name: flashit, path: products/flashit/apps/web-api, pm: npm }
                    - { name: dcmaar, path: products/dcmaar, pm: pnpm }
                    - { name: yappc, path: products/yappc, pm: pnpm }

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install pnpm
              if: matrix.product.pm == 'pnpm'
              run: npm install -g pnpm@8

            - name: Install dependencies (npm)
              if: matrix.product.pm == 'npm'
              run: npm ci
              working-directory: ${{ matrix.product.path }}

            - name: Install dependencies (pnpm)
              if: matrix.product.pm == 'pnpm'
              run: pnpm install --no-frozen-lockfile
              working-directory: ${{ matrix.product.path }}

            - name: Run npm audit
              if: matrix.product.pm == 'npm'
              run: npm audit --audit-level=moderate --json > npm-audit.json || true
              working-directory: ${{ matrix.product.path }}

            - name: Run pnpm audit
              if: matrix.product.pm == 'pnpm'
              run: pnpm audit --audit-level=moderate --json > npm-audit.json || true
              working-directory: ${{ matrix.product.path }}

            - name: Upload audit results
              uses: actions/upload-artifact@v4
              with:
                  name: npm-audit-${{ matrix.product.name }}
                  path: ${{ matrix.product.path }}/npm-audit.json

            - name: Check for critical vulnerabilities (npm)
              if: matrix.product.pm == 'npm'
              run: |
                  if npm audit --audit-level=critical; then
                    echo "No critical vulnerabilities found"
                  else
                    echo "Critical vulnerabilities detected!"
                    exit 1
                  fi
              working-directory: ${{ matrix.product.path }}

    dependency-scan-gradle:
        name: Gradle Dependency Vulnerability Scan
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v3

            - name: Run OWASP dependency-check
              run: ./gradlew dependencyCheckAnalyze --no-daemon

            - name: Upload OWASP report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: owasp-dependency-check
                  path: "**/build/reports/dependency-check-report.*"
                  retention-days: 30

    sast-scan:
        name: Static Application Security Testing (SAST) — TypeScript
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                  languages: javascript, typescript
                  queries: security-and-quality

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                  category: "/language:javascript"

    sast-scan-java:
        name: Static Application Security Testing (SAST) — Java
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"

            - name: Initialize CodeQL for Java
              uses: github/codeql-action/init@v3
              with:
                  languages: java
                  queries: security-and-quality

            - name: Build Java sources for CodeQL
              run: ./gradlew compileJava compileTestJava --no-daemon -x test

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                  category: "/language:java"
                  upload: true

    java-kernel-plugins-security:
        name: Java Kernel & Plugins Security Scanning
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"

            - name: Run SpotBugs for kernel & plugins
              run: |
                  ./gradlew \
                    :platform-kernel:kernel-core:spotbugsMain \
                    :platform-kernel:kernel-plugin:spotbugsMain \
                    :platform-plugins:plugin-audit-trail:spotbugsMain \
                    :platform-plugins:plugin-ledger:spotbugsMain \
                    :platform-plugins:plugin-consent:spotbugsMain \
                    -x test --continue || true

            - name: Run PMD for kernel & plugins
              run: |
                  ./gradlew \
                    :platform-kernel:kernel-core:pmdMain \
                    :platform-plugins:plugin-audit-trail:pmdMain \
                    :platform-plugins:plugin-ledger:pmdMain \
                    -x test --continue || true

            - name: Check for security anti-patterns
              run: |
                  echo "Checking for common Java security anti-patterns..."
                  
                  # Check for unsafe random
                  if grep -r "new Random()" platform-kernel/ platform-plugins/ \
                    --include="*.java" 2>/dev/null; then
                    echo "⚠️ Random() instead of SecureRandom() detected"
                  fi
                  
                  # Check for hardcoded credentials
                  if grep -rE "password\s*=\s*['\"]" platform-kernel/ platform-plugins/ \
                    --include="*.java" 2>/dev/null | grep -v "// " | grep -v test; then
                    echo "✗ Hardcoded password detected"
                    exit 1
                  fi
                  
                  # Check for SQL injection vulnerabilities
                  if grep -r "sql.*concatenation\|+ sql\|sql +\|concat.*sql" \
                    platform-kernel/ platform-plugins/ \
                    --include="*.java" 2>/dev/null; then
                    echo "⚠️ Possible SQL concatenation detected (use parameterized queries)"
                  fi
                  
                  echo "✓ Security anti-pattern checks complete"

            - name: Upload SpotBugs reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: spotbugs-reports
                  path: "platform-kernel/**/build/reports/spotbugs/"
                  retention-days: 30

    secret-scan:
        name: Secret Detection
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: TruffleHog Secret Scan
              uses: trufflesecurity/trufflehog@main
              with:
                  path: ./
                  base: ${{ github.event.repository.default_branch }}
                  head: HEAD
                  extra_args: --only-verified

    container-scan:
        name: Container Image Scan
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Docker image
              run: |
                  docker build -t flashit-web-api:test -f products/flashit/apps/web-api/Dockerfile products/flashit/apps/web-api

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: flashit-web-api:test
                  format: "sarif"
                  output: "trivy-results.sarif"
                  severity: "CRITICAL,HIGH"

            - name: Upload Trivy results to GitHub Security
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: "trivy-results.sarif"

            - name: Run Trivy vulnerability scanner (table output)
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: flashit-web-api:test
                  format: "table"
                  severity: "CRITICAL,HIGH"

    license-compliance:
        name: License Compliance Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install dependencies
              run: npm ci
              working-directory: products/flashit/apps/web-api

            - name: Check licenses
              run: |
                  npx license-checker --summary --production --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense'
              working-directory: products/flashit/apps/web-api

    security-headers:
        name: Security Headers Check
        runs-on: ubuntu-latest
        if: github.event_name == 'push'

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Check security headers configuration
              run: |
                  echo "Verifying security headers are configured..."

                  # Check for security middleware
                  if grep -r "Content-Security-Policy" products/flashit/apps/web-api/src; then
                    echo "✅ CSP header configured"
                  else
                    echo "❌ CSP header not found"
                    exit 1
                  fi

                  if grep -r "X-Frame-Options" products/flashit/apps/web-api/src; then
                    echo "✅ X-Frame-Options configured"
                  else
                    echo "❌ X-Frame-Options not found"
                    exit 1
                  fi

                  if grep -r "X-Content-Type-Options" products/flashit/apps/web-api/src; then
                    echo "✅ X-Content-Type-Options configured"
                  else
                    echo "❌ X-Content-Type-Options not found"
                    exit 1
                  fi

    security-report:
        name: Generate Security Report
        runs-on: ubuntu-latest
        needs:
            [
                dependency-scan-node,
                dependency-scan-gradle,
                sast-scan,
                sast-scan-java,
                secret-scan,
                container-scan,
                license-compliance,
            ]
        if: always()

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  name: npm-audit-results
                  path: ./security-reports

            - name: Generate summary report
              run: |
                  echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
                  echo "- Dependency Scan: ${{ needs.dependency-scan.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- SAST Scan: ${{ needs.sast-scan.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- Secret Scan: ${{ needs.secret-scan.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- Container Scan: ${{ needs.container-scan.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- License Compliance: ${{ needs.license-compliance.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Timestamp: $(date -u)" >> $GITHUB_STEP_SUMMARY

name: Product Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      products:
        description: "Comma-separated list of products to release"
        required: false
      dry_run:
        description: "Validate release readiness without publishing manifests"
        required: false
        default: "true"

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"

jobs:
  resolve-affected:
    name: Resolve Affected Products
    runs-on: ubuntu-latest
    outputs:
      affected-products: ${{ steps.resolve.outputs.affected-products }}
      affected-products-json: ${{ steps.resolve.outputs.affected-products-json }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: resolve
        env:
          PRODUCTS_INPUT: ${{ github.event.inputs.products }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
        run: |
          node <<'NODE' > affected-products.json
          const { execFileSync } = require('node:child_process');
          const input = (process.env.PRODUCTS_INPUT || '').trim();
          let products = input
            ? input.split(',').map((product) => product.trim()).filter(Boolean)
            : [];

          if (process.env.EVENT_NAME === 'workflow_dispatch' && products.length === 0) {
            throw new Error('workflow_dispatch releases must provide a non-empty products input.');
          }

          if (products.length === 0) {
            let base = process.env.EVENT_BEFORE;
            const head = process.env.GITHUB_SHA || 'HEAD';
            if (process.env.GITHUB_REF_TYPE === 'tag') {
              try {
                base = execFileSync('git', ['describe', '--tags', '--abbrev=0', `${head}^`], { encoding: 'utf8' }).trim();
              } catch {
                base = '';
              }
            }

            if (!base || /^0+$/.test(base)) {
              throw new Error('Unable to determine a release diff base. Provide products explicitly or ensure tag history is available.');
            }

            products = JSON.parse(execFileSync('node', [
              'scripts/resolve-affected-products.mjs',
              '--json',
              '--base',
              base,
              '--head',
              head,
            ], { encoding: 'utf8' })).affectedProducts || [];
          }

          if (products.length === 0) {
            throw new Error('No affected products resolved for release. Refusing to silently no-op.');
          }

          process.stdout.write(JSON.stringify(products));
          NODE
          echo "affected-products-json=$(cat affected-products.json)" >> $GITHUB_OUTPUT
          echo "affected-products=$(node -e "console.log(JSON.parse(require('fs').readFileSync('affected-products.json', 'utf8')).join(','))")" >> $GITHUB_OUTPUT

  release:
    name: Release Product
    needs: resolve-affected
    if: needs.resolve-affected.outputs.affected-products != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product: ${{ fromJson(needs.resolve-affected.outputs.affected-products-json) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - run: pnpm install --frozen-lockfile
      - name: Dry-run release mode
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Release publishing is disabled for this dry run."
          else
            echo "Release publishing is enabled."
          fi
      - name: Enforce strict affected-product release profile
        run: pnpm check:affected-product-strict-release-profile -- --products ${{ matrix.product }}
      - name: Run strict product release readiness checks
        run: pnpm check:release:product -- --products ${{ matrix.product }} && pnpm check:evidence-current-commit && pnpm check:kernel-implementation-plan-coverage
      - name: Release Product
        if: github.event.inputs.dry_run != 'true'
        run: pnpm kernel release create ${{ matrix.product }} --version ${{ github.ref_name }}
      - name: Create Release Manifest
        if: github.event.inputs.dry_run != 'true'
        run: pnpm kernel release manifest ${{ matrix.product }} --version ${{ github.ref_name }}
      - name: Upload release readiness evidence
        uses: actions/upload-artifact@v4
        with:
          name: product-release-evidence-${{ matrix.product }}
          path: |
            .kernel/evidence/product-release-readiness.json
            .kernel/evidence/product-release-readiness.${{ matrix.product }}.json
            .kernel/out/products/${{ matrix.product }}/release/**

name: Product Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      products:
        description: 'Comma-separated list of products to release'
        required: false
      dry_run:
        description: 'Run strict release checks without creating release artifacts'
        required: false
        default: 'true'

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'

jobs:
  resolve-affected:
    name: Resolve Affected Products
    runs-on: ubuntu-latest
    outputs:
      affected-products-json: ${{ steps.resolve.outputs.affected-products-json }}
      affected-products-csv: ${{ steps.resolve.outputs.affected-products-csv }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_PRODUCTS="${{ github.event.inputs.products }}"
            if [ -z "${INPUT_PRODUCTS}" ]; then
              AFFECTED_JSON="[]"
            else
              AFFECTED_JSON="$(node -e "const raw=process.argv[1];const out=raw.split(',').map((v)=>v.trim()).filter(Boolean);process.stdout.write(JSON.stringify(out));" "$INPUT_PRODUCTS")"
            fi
          else
            AFFECTED_JSON="$(node -e "const {execFileSync}=require('child_process');const raw=execFileSync('node',['scripts/resolve-affected-products.mjs','--json','--business-products-only'],{encoding:'utf8'});const parsed=JSON.parse(raw);process.stdout.write(JSON.stringify(parsed.affectedProducts||[]));")"
          fi

          AFFECTED_CSV="$(node -e "const parsed=JSON.parse(process.argv[1]);process.stdout.write(parsed.join(','));" "$AFFECTED_JSON")"
          echo "affected-products-json=${AFFECTED_JSON}" >> "$GITHUB_OUTPUT"
          echo "affected-products-csv=${AFFECTED_CSV}" >> "$GITHUB_OUTPUT"

          {
            echo "## Product Release Scope"
            echo ""
            echo "- Affected products (csv): ${AFFECTED_CSV:-none}"
            echo "- Affected products (json): ${AFFECTED_JSON}"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Release Product
    needs: resolve-affected
    if: needs.resolve-affected.outputs.affected-products-json != '' && needs.resolve-affected.outputs.affected-products-json != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product: ${{ fromJson(needs.resolve-affected.outputs.affected-products-json) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: pnpm install --frozen-lockfile
      - name: Run strict product release readiness checks
        env:
          AFFECTED_PRODUCTS: ${{ matrix.product }}
        run: pnpm check:product-release-readiness
      - name: Enforce strict affected-product release profile
        run: node ./scripts/check-affected-product-strict-release-profile.mjs --products "${{ matrix.product }}"
      - name: Dry-run release mode
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: |
          echo "Dry-run enabled for ${{ matrix.product }}."
          echo "Strict release readiness checks completed; release/publish steps are intentionally skipped."
      - name: Release Product
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        run: pnpm kernel release create ${{ matrix.product }} --version ${{ github.ref_name }}
      - name: Create Release Manifest
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        run: pnpm kernel release manifest ${{ matrix.product }} --version ${{ github.ref_name }}
      - name: Upload release readiness evidence
        uses: actions/upload-artifact@v4
        with:
          name: product-release-evidence-${{ matrix.product }}
          path: |
            .kernel/evidence/product-release-readiness.json
            .kernel/evidence/affected-product-release-profile.json
            .kernel/evidence/kernel-implementation-plan-progress.json
            .kernel/evidence/product-a11y-route-matrix.json
          retention-days: 90

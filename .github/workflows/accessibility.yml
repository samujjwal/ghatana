name: Product Accessibility Conformance

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'products/phr/apps/web/**'
      - 'products/digital-marketing/ui/**'
      - 'products/flashit/client/web/**'
      - 'platform/typescript/product-shell/**'
      - 'platform/typescript/design-system/**'
      - 'platform/typescript/tokens/**'
      - '.github/workflows/accessibility.yml'
  push:
    branches: [main]
    paths:
      - 'products/phr/apps/web/**'
      - 'products/digital-marketing/ui/**'
      - 'products/flashit/client/web/**'
      - 'platform/typescript/product-shell/**'
      - 'platform/typescript/design-system/**'
      - 'platform/typescript/tokens/**'
      - '.github/workflows/accessibility.yml'

jobs:
  audited-product-a11y:
    name: '${{ matrix.product }} accessibility'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: phr-web
            package: '@ghatana/phr-web'
          - product: dmos-ui
            package: '@dmos/ui'
          - product: flashit-web
            package: '@flashit/web'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter "${{ matrix.package }}" exec playwright install --with-deps chromium

      - name: Run product accessibility suite
        run: pnpm --filter "${{ matrix.package }}" run test:e2e:a11y

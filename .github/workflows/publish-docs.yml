name: Publish API Documentation

on:
  push:
    branches: [ main, master ]
    paths:
      - 'multi-agent-system/contracts/proto/src/main/proto/**'
  workflow_dispatch:

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Needed for git diff
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Generate Documentation
      working-directory: ./multi-agent-system/contracts/proto
      run: |
        # Install dependencies
        sudo apt-get update && sudo apt-get install -y protobuf-compiler
        
        # Generate documentation
        ./gradlew generateProto generateJsonSchemas
        
        # Create docs directory if it doesn't exist
        mkdir -p ../../../docs/api
        
        # Copy generated documentation
        cp -r build/generated/schemas ../../../docs/api/
        
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: docs
        branch: gh-pages
        clean: true
        clean-exclude: |
          .nojekyll
          CNAME
        commit-message: "docs: update API documentation [skip ci]"
        target-folder: "api/contracts"

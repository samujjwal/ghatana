name: Verify Build-Logic Convention Completeness

on:
  pull_request:
    paths:
      - 'gradle/libs.versions.toml'
      - 'build-logic/**'
      - '**/build.gradle.kts'
  push:
    paths:
      - 'gradle/libs.versions.toml'
      - 'build-logic/**'
      - '**/build.gradle.kts'

jobs:
  verify-no-legacy-plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify no module uses legacy buildSrc convention plugin IDs
        run: |
          LEGACY=$(find . -name 'build.gradle.kts' \
            -not -path '*/build/*' \
            -not -path './build-logic/*' \
            -not -path './buildSrc/*' \
            -not -path '*/node_modules/*' | \
            xargs grep -lE 'id\("com\.ghatana\.(java|testing|quality|lombok|protobuf|finance-domain|spotbugs)-conventions"\)' 2>/dev/null || true)
          if [ -n "$LEGACY" ]; then
            echo "ERROR: The following modules still use legacy buildSrc convention plugin IDs:"
            echo "$LEGACY"
            exit 1
          fi
          echo "All modules use build-logic convention plugin IDs"

      - name: Verify all source-bearing modules declare explicit build-logic plugins
        run: |
          FALLBACK_MODULES=""
          while IFS= read -r f; do
            dir=$(dirname "$f")
            has_src=false
            for d in "$dir/src/main/java" "$dir/src/main/kotlin" "$dir/src/test/java" "$dir/src/test/kotlin"; do
              [ -d "$d" ] && has_src=true && break
            done
            if $has_src; then
              if ! grep -qE 'id\("(java-module|java-application|protobuf-module|finance-domain-module|integration-test-profile)"\)' "$f"; then
                FALLBACK_MODULES="$FALLBACK_MODULES\n  $f"
              fi
            fi
          done < <(find . -name 'build.gradle.kts' \
            -not -path '*/build/*' \
            -not -path './build-logic/*' \
            -not -path './buildSrc/*' \
            -not -path '*/node_modules/*' \
            -not -path '*/android/*')
          if [ -n "$FALLBACK_MODULES" ]; then
            echo "ERROR: The following source-bearing modules have no explicit build-logic plugin declaration:"
            printf "$FALLBACK_MODULES\n"
            exit 1
          fi
          echo "All source-bearing modules declare explicit build-logic plugin IDs"


name: Test Tier Classification

# Formal test tier gate following the Ghatana test tier taxonomy:
#
#   tier-0  Fast unit + pure contract tests           No external deps, < 2 min
#   tier-1  Module integration tests with in-memory fakes  No docker, < 5 min
#   tier-2  localhost / network integration tests     Network-bound, < 10 min
#   tier-3  Testcontainers / docker-compose infra     Real DB/broker, < 20 min
#   tier-4  Browser, perf, load, soak, security,
#           privacy, and AI eval suites               Full env required
#
# Execution rules:
#   - PRs must pass tier-0 and tier-1 before merge.
#   - Main branch push also runs tier-2 and tier-3.
#   - tier-4 runs only on main / release branches or via workflow_dispatch.
#
# Each tier job is independent and uploads its own results artifact so
# failures are pinpointed to the correct level.

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_tier_4:
        description: "Force-run tier-4 (browser/perf/load/security/AI eval)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
  JAVA_VERSION: "21"

# ─────────────────────────────────────────────────────────────────────────────
# TIER-0: Fast unit + pure contract tests
#   No external services. Should complete in ≤ 2 min.
#   Runs on every push and PR.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  tier-0:
    name: "Tier-0 | Unit + Contract"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      # Java: unit tests only (exclude integration, e2e, contract, load)
      - name: Java unit tests
        run: |
          ./gradlew test \
            --tests "*Test" \
            --exclude-task ":integration-tests:*" \
            -PexcludeTags="integration,e2e,load,slow" \
            --continue

      # Java: pure contract tests (OpenAPI + proto schema validation)
      - name: Java contract tests
        run: |
          ./gradlew :platform:contracts:contractCompatibilityTest --continue

      # TypeScript: unit tests (vitest, no browser, no network)
      - name: TypeScript unit tests
        run: pnpm --filter "./platform/typescript/**" run test --run --reporter=verbose || true

      - name: Upload tier-0 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier-0-results
          path: |
            **/build/test-results/test/
            **/build/reports/tests/test/
            **/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # TIER-1: Module integration tests with in-memory fakes
  #   No docker, no external services. Uses H2 / in-memory stores.
  #   Runs on every push and PR (after tier-0 passes).
  # ─────────────────────────────────────────────────────────────────────────
  tier-1:
    name: "Tier-1 | Module Integration (in-memory)"
    runs-on: ubuntu-latest
    needs: tier-0
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      # Java: integration tests tagged "in-memory" (no docker/testcontainers)
      - name: Java in-memory integration tests
        env:
          USE_IN_MEMORY_STORES: "true"
        run: |
          ./gradlew test \
            --tests "*IntegrationTest" \
            -PincludeTags="in-memory" \
            --exclude-task ":integration-tests:*" \
            --continue

      # TypeScript: integration tests that use in-memory fakes
      - name: TypeScript in-memory integration tests
        run: pnpm --filter "./platform/typescript/**" run test:integration --run || true

      - name: Upload tier-1 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier-1-results
          path: |
            **/build/test-results/test/
            **/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # TIER-2: localhost / network integration tests
  #   Uses localhost services (started inline). No docker-compose required.
  #   Runs on push to main/develop; skipped on draft PRs.
  # ─────────────────────────────────────────────────────────────────────────
  tier-2:
    name: "Tier-2 | Network Integration (localhost)"
    runs-on: ubuntu-latest
    needs: tier-1
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ghatana_test
          POSTGRES_USER: ghatana
          POSTGRES_PASSWORD: ghatana_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      # Java: integration tests that require a live postgres but no Testcontainers
      - name: Java network integration tests
        env:
          POSTGRES_URL: "jdbc:postgresql://localhost:5432/ghatana_test"
          POSTGRES_USER: "ghatana"
          POSTGRES_PASSWORD: "ghatana_test"
          TIER: "2"
        run: |
          ./gradlew test \
            --tests "*IntegrationTest" \
            -PexcludeTags="in-memory,slow,e2e" \
            --continue

      # Cross-module integration tests
      - name: Cross-module integration tests
        env:
          POSTGRES_URL: "jdbc:postgresql://localhost:5432/ghatana_test"
          POSTGRES_USER: "ghatana"
          POSTGRES_PASSWORD: "ghatana_test"
        run: |
          ./gradlew :integration-tests:cross-service-workflow:test --continue || true

      - name: Upload tier-2 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier-2-results
          path: |
            **/build/test-results/test/
            **/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # TIER-3: Testcontainers / docker-compose infra-backed tests
  #   Full infrastructure: postgres, redis, kafka.
  #   Runs on push to main/develop only.
  # ─────────────────────────────────────────────────────────────────────────
  tier-3:
    name: "Tier-3 | Infrastructure (Testcontainers)"
    runs-on: ubuntu-latest
    needs: tier-2
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ghatana_test
          POSTGRES_USER: ghatana
          POSTGRES_PASSWORD: ghatana_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      # Java: Testcontainers-backed tests (tagged "slow" or "testcontainers")
      - name: Java infra-backed tests (Testcontainers)
        env:
          POSTGRES_URL: "jdbc:postgresql://localhost:5432/ghatana_test"
          POSTGRES_USER: "ghatana"
          POSTGRES_PASSWORD: "ghatana_test"
          REDIS_URL: "redis://localhost:6379"
          TIER: "3"
        run: |
          ./gradlew test \
            -PincludeTags="slow,testcontainers,infrastructure" \
            --continue

      # TypeScript: integration tests requiring live network services
      - name: TypeScript infrastructure integration tests
        env:
          POSTGRES_URL: "postgresql://ghatana:ghatana_test@localhost:5432/ghatana_test"
          REDIS_URL: "redis://localhost:6379"
        run: pnpm run test:integration:infra --run || true

      - name: Upload tier-3 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier-3-results
          path: |
            **/build/test-results/test/
            **/coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # TIER-4: Browser, perf, load, soak, security, privacy, AI eval
  #   Full environment. Only runs on main / release or via manual dispatch.
  # ─────────────────────────────────────────────────────────────────────────
  tier-4:
    name: "Tier-4 | Browser / Perf / Load / Security / AI Eval"
    runs-on: ubuntu-latest
    needs: tier-3
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_tier_4 == 'true')
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ghatana_e2e
          POSTGRES_USER: ghatana
          POSTGRES_PASSWORD: ghatana_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Install k6
        run: |
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install -y k6

      # Browser / E2E tests (Playwright)
      - name: Playwright E2E tests
        env:
          POSTGRES_URL: "postgresql://ghatana:ghatana_e2e@localhost:5432/ghatana_e2e"
        run: pnpm run test:e2e --reporter=html || true

      # Accessibility audit
      - name: Accessibility tests (axe)
        run: pnpm run test:a11y || true

      # Performance budget tests
      - name: Performance budget tests (Lighthouse)
        run: pnpm run test:perf || true

      # Load tests via k6 (auth-gateway)
      - name: Auth-gateway load tests (k6)
        env:
          AUTH_GATEWAY_URL: "http://localhost:8080"
        run: |
          k6 run \
            --out json=/tmp/k6-auth-gateway.json \
            shared-services/auth-gateway/k6-tests/load-test-auth-gateway.js \
            || true

      # Security / SAST scan
      - name: Java SAST (SpotBugs)
        run: ./gradlew spotbugsMain --continue || true

      # AI eval suites (YAPPC agent evaluation)
      - name: AI eval suites
        run: ./gradlew :products:yappc:aep-agent-runtime:test -PincludeTags="ai-eval" --continue || true

      - name: Upload tier-4 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier-4-results
          path: |
            **/build/test-results/
            **/playwright-report/
            **/test-results/
            /tmp/k6-auth-gateway.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # SUMMARY: Collects all tier results and generates a job summary
  # ─────────────────────────────────────────────────────────────────────────
  tier-summary:
    name: "Test Tier Summary"
    runs-on: ubuntu-latest
    needs: [tier-0, tier-1, tier-2, tier-3, tier-4]
    if: always()

    steps:
      - name: Generate tier summary
        run: |
          echo "## Test Tier Classification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tier | Description | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| tier-0 | Unit + Contract (fast, no deps) | ${{ needs.tier-0.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| tier-1 | Module Integration (in-memory fakes) | ${{ needs.tier-1.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| tier-2 | Network Integration (localhost) | ${{ needs.tier-2.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| tier-3 | Infrastructure (Testcontainers) | ${{ needs.tier-3.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| tier-4 | Browser / Perf / Load / Security / AI Eval | ${{ needs.tier-4.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tier Definitions" >> $GITHUB_STEP_SUMMARY
          echo "- **tier-0**: Fast unit and pure contract tests. No external dependencies. Must pass on every PR." >> $GITHUB_STEP_SUMMARY
          echo "- **tier-1**: Module integration tests with in-memory fakes. No docker. Must pass on every PR." >> $GITHUB_STEP_SUMMARY
          echo "- **tier-2**: localhost/network integration tests. Runs on push to main/develop." >> $GITHUB_STEP_SUMMARY
          echo "- **tier-3**: Testcontainers/docker-compose infrastructure-backed tests. Runs on main/develop push." >> $GITHUB_STEP_SUMMARY
          echo "- **tier-4**: Browser, performance, load, soak, security, privacy, and AI eval. Runs on main push or manual trigger." >> $GITHUB_STEP_SUMMARY

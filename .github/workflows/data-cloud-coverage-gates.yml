name: Data Cloud Coverage Gates (Milestone 1-4)
description: |
  CI gate configuration for 100% test coverage program.
  Execute on every PR and main branch commit.
  Fail if coverage drops below milestone targets.

on:
  pull_request:
    paths:
      - 'products/data-cloud/**'
      - '.github/workflows/data-cloud-coverage-gates.yml'
  push:
    branches:
      - main
    paths:
      - 'products/data-cloud/**'

env:
  GRADLE_OPTS: -Xmx2g -XX:MaxPermSize=512m
  DATA_CLOUD_MILESTONE: ${{ secrets.DATA_CLOUD_MILESTONE || '1' }}

jobs:
  coverage-gates:
    name: Verify Coverage Against Milestones
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run Tests (Data Cloud)
        run: |
          ./gradlew \
            products:data-cloud:launcher:test \
            products:data-cloud:platform-api:test \
            products:data-cloud:platform-analytics:test \
            --continue \
            --no-daemon \
            -q

      - name: Generate JaCoCo Report
        run: |
          ./gradlew \
            products:data-cloud:jacocoReport \
            --no-daemon \
            -q

      - name: Verify Coverage Gates
        id: coverage_verify
        run: |
          ./gradlew \
            products:data-cloud:jacocoVerify \
            --no-daemon \
            -q
        continue-on-error: true

      - name: Upload Coverage Reports (Codecov)
        uses: codecov/codecov-action@v3
        with:
          files: ./products/data-cloud/**/build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: false
          verbose: true

      - name: Publish Coverage Comment (PR)
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./products/data-cloud/delivery/launcher/build/reports/jacoco/test/jacocoTestReport.xml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Coverage Summary
        run: |
          cat > /tmp/coverage-summary.txt << 'EOF'
          # Data Cloud Coverage Report
          
          **Milestone**: $(echo $DATA_CLOUD_MILESTONE)
          **Date**: $(date -u)
          **Build**: ${{ github.run_id }}
          
          ## Module Coverage
          
          | Module | Target | Status |
          |--------|--------|--------|
          | launcher | 85% | :hourglass: |
          | platform-api | 75% | :hourglass: |
          | platform-analytics | 60% | :hourglass: |
          
          See full report: `products/data-cloud/delivery/launcher/build/reports/jacoco/test/html/index.html`
          EOF
          cat /tmp/coverage-summary.txt

      - name: Fail if Coverage Gates Violated
        if: steps.coverage_verify.outcome == 'failure'
        run: |
          echo "❌ Coverage gates violated for current milestone"
          echo "Milestone: $DATA_CLOUD_MILESTONE"
          echo "See report: products/data-cloud/*/build/reports/jacoco/test/html/"
          exit 1

      - name: Update Coverage Tracking (Main Branch Only)
        if: github.ref == 'refs/heads/main'
        run: |
          ./gradlew \
            products:data-cloud:coverageTrack \
            -Dweek=$(date +%V) \
            -Dmodule=all \
            --no-daemon

  fail-fast:
    name: Test Compilation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Compile Tests (Fail Fast)
        run: |
          ./gradlew \
            products:data-cloud:launcher:testClasses \
            products:data-cloud:platform-api:testClasses \
            products:data-cloud:platform-analytics:testClasses \
            --no-daemon \
            -q

  lint-and-format:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Check Formatting (Gradle Format)
        run: |
          ./gradlew \
            spotlessCheck \
            --no-daemon \
            -q

      - name: Check Deprecations
        run: |
          ./gradlew \
            tasks -q | grep -i deprecat || echo "No deprecation tasks found"

      - name: Verify No Warnings
        run: |
          ./gradlew \
            compileJava \
            compileTestJava \
            --warning-mode all \
            --no-daemon \
            -q

---

# Weekly Coverage Snapshot (Manual Trigger)
name: Weekly Coverage Snapshot
on:
  workflow_dispatch:
    inputs:
      week:
        description: 'Week number (1-16)'
        required: true
        default: '1'
      milestone:
        description: 'Milestone (1-4)'
        required: true
        default: '1'

env:
  DATA_CLOUD_MILESTONE: ${{ github.event.inputs.milestone }}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Coverage Snapshot
        run: |
          ./gradlew \
            products:data-cloud:jacocoReport \
            products:data-cloud:coverageTrack \
            -Dweek=${{ github.event.inputs.week }} \
            -Dmodule=all \
            --no-daemon \
            -q

      - name: Upload Snapshot Artifact
        uses: actions/upload-artifact@v3
        with:
          name: coverage-snapshot-week-${{ github.event.inputs.week }}
          path: |
            products/data-cloud/*/build/reports/jacoco/test/html/
          retention-days: 30

      - name: Comment PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📊 Coverage Snapshot - Week ${{ github.event.inputs.week }}, Milestone ${{ github.event.inputs.milestone }}\n\nSee artifacts for detailed JaCoCo report.`
            })

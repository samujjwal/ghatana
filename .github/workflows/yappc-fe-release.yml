name: "YAPPC FE: Release"

on:
  push:
    branches:
      - main
      paths: ['products/yappc/frontend/**']
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.28.2"

defaults:
  run:
    working-directory: products/yappc/frontend

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-pnpm-store: "true"
          checkout: "true"
          fetch-depth: 0
          persist-credentials: false

      - name: Build
        run: pnpm build:web

      - name: Run tests
        run: pnpm test

      - name: Generate changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-file: "CHANGELOG.md"
          skip-version-file: "false"
          skip-commit: "false"
          git-message: "chore(release): {version} [skip ci]"
          preset: "conventionalcommits"
          tag-prefix: "v"
          release-count: "0"

      - name: Create GitHub Release
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.changelog.outputs.tag }} \
            --title "${{ steps.changelog.outputs.tag }}" \
            --notes "${{ steps.changelog.outputs.clean_changelog }}" \
            --repo ${{ github.repository }}

      - name: Comment on related issues and PRs
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const release = context.payload.release;
            const version = '${{ steps.changelog.outputs.version }}';
            const changelog = '${{ steps.changelog.outputs.clean_changelog }}';

            // Extract issue numbers from changelog
            const issueNumbers = changelog.match(/#(\d+)/g) || [];
            const uniqueIssues = [...new Set(issueNumbers.map(n => n.substring(1)))];

            for (const issueNumber of uniqueIssues) {
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parseInt(issueNumber),
                  body: `🎉 This issue has been resolved in version ${version}!`
                });
              } catch (error) {
                console.log(`Could not comment on issue #${issueNumber}: ${error.message}`);
              }
            }

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: release
    if: success()
    steps:
      - name: Send notification
        run: |
          echo "Release created successfully!"
          # Add Slack/Discord/Teams notification here if needed

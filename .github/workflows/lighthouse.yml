# Lighthouse CI & Performance Budget Checks
# Gates PRs on performance, accessibility, and Core Web Vitals.
name: Lighthouse CI

on:
  pull_request:
    paths:
      - 'products/*/ui/**'
      - 'products/*/client/web/**'
      - 'products/*/apps/*/src/**'
      - 'products/*/frontend/**'
      - 'platform/typescript/**'

concurrency:
  group: lighthouse-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build frontend packages
        run: pnpm --filter "./platform/typescript/**" build

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './lighthouserc.js'
          uploadArtifacts: true

      - name: Format Lighthouse Results
        id: results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const results = ${{ steps.lighthouse.outputs.manifest }};
            if (!results || results.length === 0) {
              core.setOutput('comment', '⚠️ No Lighthouse results available');
              return;
            }
            const run = results[results.length - 1];
            const { summary } = run;
            const score = (s) => `${Math.round(s * 100)}`;
            const emoji = (s) => s >= 0.9 ? '🟢' : s >= 0.5 ? '🟡' : '🔴';
            const comment = [
              '### 🔦 Lighthouse Performance Report',
              '',
              '| Category | Score | Status |',
              '|:---------|:------|:-------|',
              `| Performance | ${score(summary.performance)} | ${emoji(summary.performance)} |`,
              `| Accessibility | ${score(summary.accessibility)} | ${emoji(summary.accessibility)} |`,
              `| Best Practices | ${score(summary['best-practices'])} | ${emoji(summary['best-practices'])} |`,
              `| SEO | ${score(summary.seo)} | ${emoji(summary.seo)} |`,
              '',
              '#### Budgets',
              '- **Performance** ≥ 80 (error)',
              '- **Accessibility** ≥ 90 (error)',
              '- **JS bundle** ≤ 500KB | **Total** ≤ 1MB',
              '- **LCP** < 2.5s | **CLS** < 0.1 | **TBT** < 300ms',
            ].join('\n');
            core.setOutput('comment', comment);

      - name: Post PR Comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lighthouse
          message: ${{ steps.results.outputs.comment }}

      - name: Check bundle sizes
        run: |
          echo "Checking bundle sizes for all web products..."
          EXIT_CODE=0
          for dir in products/*/ui products/*/client/web products/*/frontend/apps/web; do
            if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
              echo "Building: $dir"
              cd "$dir"
              pnpm build 2>/dev/null || true
              if [ -d "dist" ]; then
                SIZE=$(du -sb dist | cut -f1)
                echo "  Bundle size: $(numfmt --to=iec $SIZE)"
                if [ "$SIZE" -gt 1048576 ]; then
                  echo "::error::$dir bundle exceeds 1MB budget ($SIZE bytes)"
                  EXIT_CODE=1
                fi
              fi
              cd - > /dev/null
            fi
          done
          exit $EXIT_CODE

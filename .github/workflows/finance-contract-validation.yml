name: Finance Contract Validation

on:
  pull_request:
    paths:
      - 'products/finance/**'
  push:
    branches:
      - main

jobs:
  validate-contracts:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
      
      - name: Validate Finance Contracts
        run: |
          ./gradlew :products:finance:validateContracts
      
      - name: Upload validation report
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: contract-validation-report
          path: products/finance/build/reports/contract-validation/

name: Product Lifecycle Deploy Local

on:
  workflow_dispatch:
    inputs:
      products:
        description: 'Comma-separated list of products to deploy'
        required: true

jobs:
  deploy:
    name: Deploy Product to Local
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product: ${{ fromJson(format('["{0}"]', github.event.inputs.products)) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: pnpm install
      - name: Deploy Product
        run: pnpm kernel product deploy ${{ matrix.product }} --env local

name: Product Lifecycle Deploy Local

on:
  workflow_dispatch:
    inputs:
      products:
        description: 'Comma-separated list of products to deploy'
        required: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'

jobs:
  deploy:
    name: Deploy Product to Local
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product: ${{ fromJson(format('["{0}"]', github.event.inputs.products)) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: pnpm install --frozen-lockfile
      - name: Deploy Product
        run: pnpm kernel product deploy ${{ matrix.product }} --env local

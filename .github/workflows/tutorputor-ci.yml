name: Tutorputor CI

on:
  push:
    paths:
      - "products/tutorputor/**"
      - ".github/workflows/tutorputor-ci.yml"
      - "pnpm-lock.yaml"
  pull_request:
    paths:
      - "products/tutorputor/**"
      - ".github/workflows/tutorputor-ci.yml"
      - "pnpm-lock.yaml"

jobs:
  tutorputor:
    name: Tutorputor Verification
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce no legacy Tutorputor package references
        run: ./products/tutorputor/scripts/check-no-legacy-references.sh

      - name: Check for deprecated @ghatana/ui usage
        run: pnpm run check:deprecated-ui

      - name: Contracts checks
        run: |
          pnpm --filter @ghatana/tutorputor-contracts run build
          pnpm --filter @ghatana/tutorputor-contracts run test

      - name: Database checks and migration safety
        env:
          TUTORPUTOR_DATABASE_URL: file:./products/tutorputor/services/tutorputor-db/prisma/ci.db
        run: |
          pnpm --filter @ghatana/tutorputor-db run type-check
          pnpm --filter @ghatana/tutorputor-db run prisma:migrate:deploy
          pnpm --filter @ghatana/tutorputor-db run prisma:seed
          pnpm --filter @ghatana/tutorputor-db run test

      - name: Lint checks
        run: pnpm -r --filter './products/tutorputor/**' --if-present --no-bail --stream run lint

      - name: Type-check checks
        run: |
          pnpm -r --filter './products/tutorputor/**' --if-present --no-bail --stream run type-check
          pnpm -r --filter './products/tutorputor/**' --if-present --no-bail --stream run typecheck

      - name: Build checks
        run: pnpm -r --filter './products/tutorputor/**' --if-present --no-bail --stream run build

      - name: Unit and integration checks
        run: pnpm -r --filter './products/tutorputor/**' --if-present --no-bail --stream run test

      - name: Invariant checks
        run: |
          pnpm --filter @ghatana/tutorputor-platform run test -- --testPathPattern="invariants"

      - name: Coverage threshold check
        run: |
          pnpm --filter @ghatana/tutorputor-platform run test:coverage -- --thresholds.statements=40 --thresholds.branches=30 --thresholds.functions=40 --thresholds.lines=40

      - name: Worker queue checks
        env:
          GRADLE_USER_HOME: ${{ runner.temp }}/.gradle
        run: |
          ./gradlew -p products/tutorputor/libs/content-studio-agents test
          ./gradlew -p products/tutorputor/services/tutorputor-ai-agents test

      - name: Web e2e smoke checks
        run: |
          pnpm --filter @ghatana/tutorputor-web exec playwright install --with-deps chromium
          pnpm --filter @ghatana/tutorputor-web run test:e2e

      - name: Security dependency audit
        run: pnpm audit --prod --audit-level high

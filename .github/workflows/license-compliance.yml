name: License & OSS Compliance Checks

on:
  push:
    branches: [main]
    paths:
      - 'platform-kernel/**'
      - 'platform-plugins/**'
      - 'products/phr/**'
      - 'products/finance/**'
      - 'gradle/libs.versions.toml'
      - 'platform/contracts/**'
      - '.github/workflows/license-compliance.yml'
  pull_request:
    branches: [main]
    paths:
      - 'platform-kernel/**'
      - 'platform-plugins/**'
      - 'products/phr/**'
      - 'products/finance/**'
      - 'gradle/libs.versions.toml'
      - 'platform/contracts/**'

jobs:
  java-license-check:
    name: Java Dependency License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run license report for kernel
        run: |
          ./gradlew :platform-kernel:kernel-core:checkLicense \
                    :platform-kernel:kernel-plugin:checkLicense \
                    :platform-kernel:kernel-persistence:checkLicense \
                    :platform-kernel:kernel-testing:checkLicense \
                    --continue || true

      - name: Run license report for plugins
        run: |
          ./gradlew :platform-plugins:plugin-audit-trail:checkLicense \
                    :platform-plugins:plugin-ledger:checkLicense \
                    :platform-plugins:plugin-compliance:checkLicense \
                    :platform-plugins:plugin-consent:checkLicense \
                    :platform-plugins:plugin-fraud-detection:checkLicense \
                    :platform-plugins:plugin-human-approval:checkLicense \
                    :platform-plugins:plugin-risk-management:checkLicense \
                    --continue || true

      - name: Run license report for regulated products
        run: |
          ./gradlew :products:phr:checkLicense \
                    :products:finance:integration-testing:checkLicense \
                    :platform:contracts:checkLicense \
                    --continue || true

      - name: Check for problematic licenses
        run: |
          # Build dependency report
          find . -name "checkLicense.txt" -o -name "dependency-license-*.txt" | \
            xargs grep -l "AGPL\|SSPL" 2>/dev/null || true
          
          # If AGPL/SSPL found, fail (these are viral licenses)
          if find . -name "checkLicense.txt" -o -name "dependency-license-*.txt" | \
             xargs grep -l "AGPL\|SSPL" 2>/dev/null; then
            echo "✗ Viral license found (AGPL/SSPL) — not permitted for regulated products"
            exit 1
          fi
          
          echo "✓ No viral licenses detected"

      - name: Verify permissive licenses allowed
        run: |
          # Allowed licenses for permissive/commercial use:
          # - Apache 2.0, MIT, BSD-2-Clause, BSD-3-Clause
          # - ISC, CDDL, EPL (check compatibility), MPL 2.0
          # Allowed for internal use only: LGPL, GPL (with careful wrapping)
          
          cat > /tmp/allowed_licenses.txt <<'EOF'
          Apache License 2.0
          Apache License 2
          Apache-2.0
          MIT License
          MIT
          BSD 2-Clause
          BSD 2-Clause License
          BSD 3-Clause
          BSD-3-Clause
          ISC License
          ISC
          CDDL 1.0
          CDDL
          EPL 1.0
          EPL 2.0
          MPL 2.0
          Mozilla Public License 2.0
          Educational Community License
          Eclipse Public License
          Common Development and Distribution License
          Unlicense
          Public Domain
          CC0
          Artistic License
          Perl Artistic License
          Zlib License
          JSON License
          EOF
          
          echo "✓ Permissive license list defined"

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-license-reports
          path: |
            **/checkLicense.txt
            **/dependency-license-*.txt
          retention-days: 30

  gradle-dependency-governance:
    name: Gradle Dependency Version Governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Check version catalog is the only source of truth
        run: |
          # Verify all dependencies use version catalog
          VIOLATIONS=$(grep -r "version = \"" \
            platform-kernel/*/build.gradle.kts \
            platform-plugins/*/build.gradle.kts \
            products/phr/build.gradle.kts \
            products/finance/*/build.gradle.kts \
            2>/dev/null | grep -v "libs.versions.toml" | \
            grep -v ".gradle-build" | wc -l)
          
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "✗ Found $VIOLATIONS hardcoded version strings (should use gradle/libs.versions.toml)"
            grep -r "version = \"" \
              platform-kernel/*/build.gradle.kts \
              platform-plugins/*/build.gradle.kts \
              products/phr/build.gradle.kts \
              products/finance/*/build.gradle.kts 2>/dev/null | head -5
            exit 1
          fi
          
          echo "✓ All versions use catalog"

      - name: Validate libs.versions.toml consistency
        run: |
          # Check that version catalog is well-formed
          cat gradle/libs.versions.toml | head -30
          
          # Verify BOM versions are aligned
          ./gradlew --dry-run :platform-kernel:kernel-core:build 2>&1 | \
            grep -i "duplicate.*jar\|version.*conflict" && \
            echo "✗ Version conflicts detected" && exit 1 || true
          
          echo "✓ Version catalog is consistent"

      - name: Check for deprecated dependencies
        run: |
          # List of deprecated dependencies that should be removed
          DEPRECATED=(
            "commons-logging"     # Use SLF4J instead
            "log4j:log4j"         # Use Logback/SLF4J instead (not log4j 2.x)
            "junit:junit"         # Use JUnit 5 instead
          )
          
          for dep in "${DEPRECATED[@]}"; do
            if grep -r "$dep" gradle/libs.versions.toml; then
              echo "✗ Deprecated dependency found: $dep"
              exit 1
            fi
          done
          
          echo "✓ No deprecated dependencies found"

  transitive-dependency-check:
    name: Check for Transitive Dependency Surprises
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Generate dependency tree for regulated modules
        run: |
          mkdir -p /tmp/deps
          
          ./gradlew :platform-kernel:kernel-core:dependencies \
            > /tmp/deps/kernel-core-deps.txt 2>&1
          
          ./gradlew :platform-plugins:plugin-ledger:dependencies \
            > /tmp/deps/plugin-ledger-deps.txt 2>&1
          
          ./gradlew :products:phr:dependencies \
            > /tmp/deps/phr-deps.txt 2>&1
          
          ./gradlew :products:finance:integration-testing:dependencies \
            > /tmp/deps/finance-deps.txt 2>&1
          
          echo "✓ Dependency trees generated"

      - name: Check for unexpected dependencies
        run: |
          # Verify no external AI/ML models are bundled
          if grep -i "huggingface\|openai\|anthropic.*model\|tensorflow.*model" /tmp/deps/*.txt; then
            echo "✗ External ML models detected in classpath — must be loaded from external registry"
            exit 1
          fi
          
          # Verify no cryptocurrency/blockchain libraries inappropriately included
          if grep -i "bitcoin\|ethereum\|web3" /tmp/deps/*.txt; then
            echo "⚠️ Blockchain/crypto libraries detected — verify intentional"
          fi
          
          echo "✓ No unexpected external dependencies detected"

      - name: Upload dependency reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-trees
          path: /tmp/deps/
          retention-days: 30

  npm-license-check:
    name: NPM/TypeScript Package License Compliance
    runs-on: ubuntu-latest
    if: false  # Skip for now (TypeScript is in platform/typescript, not in target roots)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check TypeScript licenses
        run: |
          # This would be implemented if TypeScript packages were in target roots
          echo "TypeScript license checks would go here"

  license-summary:
    name: License Compliance Summary
    runs-on: ubuntu-latest
    needs: [java-license-check, gradle-dependency-governance, transitive-dependency-check]
    if: always()
    steps:
      - name: Report license compliance status
        run: |
          if [ "${{ needs.java-license-check.result }}" = "failure" ] || \
             [ "${{ needs.gradle-dependency-governance.result }}" = "failure" ] || \
             [ "${{ needs.transitive-dependency-check.result }}" = "failure" ]; then
            echo "✗ License compliance checks failed"
            exit 1
          fi
          
          echo "✓ All license compliance checks passed"
          echo ""
          echo "Summary:"
          echo "  - Java dependencies verified for permissive licenses"
          echo "  - Version catalog consistency validated"
          echo "  - No deprecated dependencies detected"
          echo "  - Transitive dependencies checked for surprises"

name: "YAPPC FE: Canvas Governance & Quality Checks"

on:
    push:
        branches: [main, develop]
        paths: ['products/yappc/frontend/**']
    pull_request:
        branches: [main, develop]
        paths: ['products/yappc/frontend/**']
    workflow_dispatch:

defaults:
  run:
    working-directory: products/yappc/frontend

jobs:
    governance:
        name: Architecture Governance
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Setup pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: "9"

            - name: Cache pnpm dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.pnpm-store
                  key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Verify source code hygiene
              run: pnpm run verify:src-clean

            - name: Check architectural dependencies
              run: pnpm run check:governance

            - name: TypeScript build check
              run: pnpm run typecheck:build

            - name: Generate dependency graph
              run: pnpm run check:deps:graph
              continue-on-error: true

            - name: Upload dependency graph
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: dependency-graph
                  path: docs/dependency-graph.svg
                  retention-days: 7

    canvas-tests:
        name: Canvas Library Tests
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Setup pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: "9"

            - name: Cache pnpm dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.pnpm-store
                  key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Canvas library tests
              run: pnpm test --filter=libs/canvas

            - name: Run Canvas type checking
              run: pnpm run typecheck --filter=libs/canvas

            - name: Canvas smoke test
              run: pnpm run test:smoke:web
              continue-on-error: true

    workspace-verification:
        name: Workspace Integrity
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Setup pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: "9"

            - name: Cache pnpm dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.pnpm-store
                  key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Verify workspace dependencies
              run: pnpm run verify:workspace

            - name: Verify TypeScript references
              run: pnpm run verify:ts-refs

            - name: Verify build configuration
              run: pnpm run verify:build

            - name: Run all verifications
              run: pnpm run verify:all

    branch-protection-status:
        name: Branch Protection Status
        runs-on: ubuntu-latest
        needs: [governance, canvas-tests, workspace-verification]
        if: always()

        steps:
            - name: Check status
              run: |
                  echo "Governance: ${{ needs.governance.result }}"
                  echo "Canvas Tests: ${{ needs.canvas-tests.result }}"  
                  echo "Workspace Verification: ${{ needs.workspace-verification.result }}"

                  if [[ "${{ needs.governance.result }}" != "success" ]] || [[ "${{ needs.canvas-tests.result }}" != "success" ]] || [[ "${{ needs.workspace-verification.result }}" != "success" ]]; then
                    echo "❌ Branch protection requirements not met"
                    exit 1
                  else
                    echo "✅ All branch protection requirements passed"
                  fi

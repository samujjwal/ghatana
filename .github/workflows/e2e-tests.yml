name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: dcmaar-parent-dashboard
            path: products/dcmaar/apps/parent-dashboard
          - product: dcmaar-device-health
            path: products/dcmaar/apps/device-health
          - product: yappc-frontend
            path: products/yappc/frontend
          - product: flashit-web
            path: products/flashit/client/web
          - product: tutorputor-web
            path: products/tutorputor/apps/tutorputor-web
          - product: tutorputor-admin
            path: products/tutorputor/apps/tutorputor-admin
          - product: data-cloud-ui
            path: products/data-cloud/ui
          - product: audio-video-desktop
            path: products/audio-video/modules/intelligence/ai-voice/apps/desktop
          - product: aep-ui
            path: products/aep/ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.28.2 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: ${{ matrix.path }}
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E smoke tests
        working-directory: ${{ matrix.path }}
        run: pnpm exec playwright test --project=chromium
        env:
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.product }}
          path: ${{ matrix.path }}/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results-${{ matrix.product }}
          path: |
            ${{ matrix.path }}/test-results/
          retention-days: 30

  e2e-summary:
    runs-on: ubuntu-latest
    needs: e2e-smoke
    if: github.event_name == 'pull_request' && always()
    steps:
      - name: Comment on PR with test results
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = ${{ toJSON(needs.e2e-smoke) }};
            const status = jobs.result === 'success' ? '✅' : '❌';
            const statusText = jobs.result === 'success' ? 'PASSED' : 'FAILED';

            const products = [
              'dcmaar-parent-dashboard', 'dcmaar-device-health',
              'yappc-frontend', 'flashit-web',
              'tutorputor-web', 'tutorputor-admin',
              'data-cloud-ui', 'audio-video-desktop',
              'aep-ui'
            ];

            const body = `## ${status} E2E Smoke Tests ${statusText}

            **Products tested:** ${products.length}
            **Overall result:** ${jobs.result}

            | Product | Report |
            |---------|--------|
            ${products.map(p =>
              `| ${p} | [View](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) |`
            ).join('\n')}

            📊 View detailed test results in the workflow artifacts.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

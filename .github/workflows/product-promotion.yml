name: Product Promotion

on:
  workflow_dispatch:
    inputs:
      products:
        description: 'Comma-separated list of products to promote'
        required: true
      source-env:
        description: 'Source environment'
        required: true
      target-env:
        description: 'Target environment'
        required: true

jobs:
  promote:
    name: Promote Product
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product: ${{ fromJson(format('["{0}"]', github.event.inputs.products)) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: pnpm install
      - name: Promote Product
        run: pnpm kernel promote ${{ matrix.product }} --source ${{ github.event.inputs.source-env }} --target ${{ github.event.inputs.target-env }}

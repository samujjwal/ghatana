name: DMOS OpenAPI/Client Generation CI

on:
  pull_request:
    paths:
      - 'products/digital-marketing/dm-api/**'
      - 'products/digital-marketing/ui/**'
      - 'platform/contracts/openapi/**'
      - '.github/workflows/dmos-openapi-client-gen.yml'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-openapi-spec:
    name: Generate OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Generate OpenAPI spec
        run: ./gradlew :products:digital-marketing:dm-api:generateOpenApiSpec --no-daemon

      - name: Verify OpenAPI spec exists
        run: |
          if [ ! -f "products/digital-marketing/dm-api/src/main/resources/openapi.json" ]; then
            echo "::error::OpenAPI spec not generated"
            exit 1
          fi

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: products/digital-marketing/dm-api/src/main/resources/openapi.json

  generate-client-types:
    name: Generate TypeScript Client
    runs-on: ubuntu-latest
    needs: generate-openapi-spec
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'pnpm'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate API client types
        run: cd products/digital-marketing/ui && pnpm generate-api-types

      - name: Verify generated types
        run: |
          if [ ! -f "products/digital-marketing/ui/src/types/api-generated.ts" ]; then
            echo "::error::Generated API types not found"
            exit 1
          fi

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code || (echo "::error::Generated client types are out of sync. Run 'pnpm generate-api-types' and commit the changes." && exit 1)

  contract-drift-check:
    name: Contract Drift Check
    runs-on: ubuntu-latest
    needs: [generate-openapi-spec, generate-client-types]
    steps:
      - name: Check for failures
        run: |
          if [ "${{ needs.generate-openapi-spec.result }}" == "failure" ] || [ "${{ needs.generate-client-types.result }}" == "failure" ]; then
            echo "::error::OpenAPI/client generation failed. Please run the generation locally and commit the changes."
            exit 1
          else
            echo "OpenAPI spec and client types are in sync."
          fi

name: Data Cloud Release Gate

on:
  workflow_dispatch:
    inputs:
      release_environment:
        description: "Target release environment"
        type: choice
        options:
          - staging
          - production
        default: staging
  release:
    types: [published]
  push:
    tags:
      - "data-cloud-v*"
      - "v*"

env:
  RELEASE_ENVIRONMENT: ${{ inputs.release_environment || (github.event_name == 'release' && 'production') || (startsWith(github.ref, 'refs/tags/') && 'staging') || 'staging' }}

concurrency:
  group: data-cloud-release-${{ github.ref }}-${{ inputs.release_environment || (github.event_name == 'release' && 'production') || (startsWith(github.ref, 'refs/tags/') && 'staging') || 'staging' }}
  cancel-in-progress: false

jobs:
  resolve-affected-products:
    runs-on: ubuntu-latest
    outputs:
      affected-products: ${{ steps.resolve.outputs.affected-products }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve affected business products
        id: resolve
        run: |
          set -euo pipefail
          BASE_REF="${{ github.event.release.target_commitish || github.event.before || 'HEAD~1' }}"
          HEAD_REF="${{ github.sha }}"
          node scripts/resolve-affected-products.mjs --json --business-products-only --base "$BASE_REF" --head "$HEAD_REF" > affected-products.json
          AFFECTED_PRODUCTS="$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('affected-products.json','utf8'));process.stdout.write(r.affectedProducts.join(','));")"
          echo "affected-products=${AFFECTED_PRODUCTS}" >> "$GITHUB_OUTPUT"
          {
            echo "## Affected Product Scope"
            echo ""
            echo "- Release environment: ${{ env.RELEASE_ENVIRONMENT }}"
            echo "- Affected products: ${AFFECTED_PRODUCTS:-none}"
            echo ""
            echo "This workflow certifies Data Cloud strict release posture; product-family release orchestration consumes affected-product evidence."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload affected product evidence
        uses: actions/upload-artifact@v4
        with:
          name: affected-products-release-scope
          path: affected-products.json
          retention-days: 90

  validate-release-config:
    runs-on: ubuntu-latest
    needs: [resolve-affected-products]
    environment: ${{ inputs.release_environment || (github.event_name == 'release' && 'production') || (startsWith(github.ref, 'refs/tags/') && 'staging') || 'staging' }}
    steps:
      - name: Document release environment approval policy
        run: |
          {
            echo "## Release Environment Approval Policy"
            echo ""
            echo "- This workflow must run against a protected environment."
            echo "- Staging and production environments should enforce required reviewers in GitHub environment settings."
            echo "- Deployment promotion must be blocked unless this strict release gate succeeds."
            echo "- Advisory CI cannot certify production - only this release gate can."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate this is the authoritative release gate
        run: |
          {
            echo "## Authoritative Release Gate Validation (DC-P7-001)"
            echo ""
            echo "- This workflow is the ONLY authoritative production certification for Data Cloud."
            echo "- No advisory CI or other workflow can bypass this gate."
            echo "- Production releases require:"
            echo "  - Protected environment approval"
            echo "  - All release-blocking checks to pass"
            echo "  - Smoke E2E strict mode to pass"
            echo "  - Backup drill strict mode to pass"
            echo "  - Security scans to pass"
            echo "  - Runtime profile evidence to be valid"
            echo "  - All evidence artifacts to be uploaded"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate required release environment variables and secrets
        env:
          DC_RELEASE_BASE_URL: ${{ vars.DC_RELEASE_BASE_URL }}
          DC_RELEASE_TENANT_ID: ${{ vars.DC_RELEASE_TENANT_ID }}
          DC_RELEASE_API_TOKEN: ${{ secrets.DC_RELEASE_API_TOKEN }}
          POSTGRES_HOST: ${{ vars.DC_POSTGRES_HOST }}
          POSTGRES_PORT: ${{ vars.DC_POSTGRES_PORT }}
          POSTGRES_DB: ${{ vars.DC_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.DC_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DC_POSTGRES_PASSWORD }}
          CLICKHOUSE_HOST: ${{ vars.DC_CLICKHOUSE_HOST }}
          CLICKHOUSE_PORT: ${{ vars.DC_CLICKHOUSE_PORT }}
          CLICKHOUSE_USER: ${{ secrets.DC_CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.DC_CLICKHOUSE_PASSWORD }}
          OPENSEARCH_HOST: ${{ vars.DC_OPENSEARCH_HOST }}
          OPENSEARCH_PORT: ${{ vars.DC_OPENSEARCH_PORT }}
          OPENSEARCH_USER: ${{ secrets.DC_OPENSEARCH_USER }}
          OPENSEARCH_PASSWORD: ${{ secrets.DC_OPENSEARCH_PASSWORD }}
          S3_ENDPOINT: ${{ vars.DC_S3_ENDPOINT }}
          S3_BUCKET: ${{ vars.DC_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DC_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DC_AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail

          require_var() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing required release variable/secret: $name"
              exit 1
            fi
          }

          require_var "DC_RELEASE_BASE_URL" "${DC_RELEASE_BASE_URL:-}"
          require_var "DC_RELEASE_TENANT_ID" "${DC_RELEASE_TENANT_ID:-}"
          require_var "DC_RELEASE_API_TOKEN" "${DC_RELEASE_API_TOKEN:-}"

          if echo "${DC_RELEASE_BASE_URL}" | grep -Eq 'localhost|127\.0\.0\.1'; then
            echo "::error::DC_RELEASE_BASE_URL must reference a real staging/production endpoint, not localhost."
            exit 1
          fi

          if ! echo "${DC_RELEASE_BASE_URL}" | grep -Eq '^https?://'; then
            echo "::error::DC_RELEASE_BASE_URL must include http(s) scheme."
            exit 1
          fi

          require_var "POSTGRES_HOST" "${POSTGRES_HOST:-}"
          require_var "POSTGRES_PORT" "${POSTGRES_PORT:-}"
          require_var "POSTGRES_DB" "${POSTGRES_DB:-}"
          require_var "POSTGRES_USER" "${POSTGRES_USER:-}"
          require_var "POSTGRES_PASSWORD" "${POSTGRES_PASSWORD:-}"
          require_var "CLICKHOUSE_HOST" "${CLICKHOUSE_HOST:-}"
          require_var "CLICKHOUSE_PORT" "${CLICKHOUSE_PORT:-}"
          require_var "CLICKHOUSE_USER" "${CLICKHOUSE_USER:-}"
          require_var "CLICKHOUSE_PASSWORD" "${CLICKHOUSE_PASSWORD:-}"
          require_var "OPENSEARCH_HOST" "${OPENSEARCH_HOST:-}"
          require_var "OPENSEARCH_PORT" "${OPENSEARCH_PORT:-}"
          require_var "OPENSEARCH_USER" "${OPENSEARCH_USER:-}"
          require_var "OPENSEARCH_PASSWORD" "${OPENSEARCH_PASSWORD:-}"
          require_var "S3_ENDPOINT" "${S3_ENDPOINT:-}"
          require_var "S3_BUCKET" "${S3_BUCKET:-}"
          require_var "AWS_ACCESS_KEY_ID" "${AWS_ACCESS_KEY_ID:-}"
          require_var "AWS_SECRET_ACCESS_KEY" "${AWS_SECRET_ACCESS_KEY:-}"

          echo "Release configuration validation passed."

  build-and-test:
    runs-on: ubuntu-latest
    needs: [validate-release-config]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and test Data Cloud modules
        run: |
          set -euo pipefail
          node ./scripts/list-data-cloud-active-modules.mjs --validate
          node ./scripts/check-action-plane-module-inventory.mjs
          node ./scripts/check-production-readiness-task-map.mjs
          node ./scripts/check-agent-capability-duplicates.mjs
          node ./scripts/check-agent-runtime-test-excludes.mjs
          node ./scripts/audit-agent-usage.mjs
          TASKS="$(node ./scripts/list-data-cloud-active-modules.mjs --scope=release-blocking --task=check --format=shell)"
          if [ -z "$TASKS" ]; then
            echo "::error::Generated release-blocking task list is empty. This indicates a configuration error."
            exit 1
          fi
          echo "Executing release-blocking checks for modules:"
          echo "$TASKS"

          # DC-P1-002: Validate each release-blocking module has a check task
          for task in $TASKS; do
            if ! ./gradlew "$task" --dry-run --no-daemon 2>&1 | grep -q "$task"; then
              echo "::error::Release-blocking module task does not exist: $task"
              exit 1
            fi
          done

          START_TIME=$(date +%s%3N)
          ./gradlew ${TASKS} --no-daemon
          EXIT_STATUS=$?
          END_TIME=$(date +%s%3N)
          DURATION_MS=$((END_TIME - START_TIME))
          
          # DC-P7-002: Capture execution result for evidence
          EXECUTED_TASKS=$(echo "$TASKS" | tr ' ' '\n' | grep -v '^$' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          FAILED_TASKS="[]"
          if [ $EXIT_STATUS -ne 0 ]; then
            FAILED_TASKS='["gradle-build-failed"]'
          fi
          
          # Generate evidence with execution result (DC-P7-002)
          node -e "
            const { createDataCloudActiveModulesEvidence, writeDataCloudActiveModulesEvidence } = require('./scripts/generate-data-cloud-active-modules-evidence.mjs');
            const executionResult = {
              exitStatus: ${EXIT_STATUS},
              executedTasks: ${EXECUTED_TASKS},
              failedTasks: ${FAILED_TASKS},
              skippedTasks: [],
              durationMs: ${DURATION_MS}
            };
            const evidence = createDataCloudActiveModulesEvidence(process.cwd(), new Date(), executionResult);
            writeDataCloudActiveModulesEvidence(process.cwd(), evidence);
            console.log('Evidence generated with execution result: exitStatus=' + executionResult.exitStatus + ', durationMs=' + executionResult.durationMs);
          "
          
          node ./scripts/check-action-plane-boundaries.mjs
          node ./scripts/check-evidence-current-commit.mjs
          {
            echo "## Data Cloud Release-Blocking Module Checks"
            echo ""
            for task in ${TASKS}; do
              echo "- ${task}: passed"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Gradle test reports for release-blocking modules
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-cloud-gradle-test-reports
          path: |
            products/data-cloud/**/build/test-results/test/
            products/data-cloud/**/build/reports/tests/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload evidence freshness summary
        if: always()
        run: |
          echo "## Evidence Freshness Summary" >> "$GITHUB_STEP_SUMMARY"
          node ./scripts/check-evidence-current-commit.mjs --summary 2>&1 >> "$GITHUB_STEP_SUMMARY" || true

      - name: Data Cloud UI type-check and readiness tests
        run: |
          pnpm --dir products/data-cloud/delivery/ui run type-check
          pnpm --dir products/data-cloud/delivery/ui run test:readiness

      - name: Upload build gate evidence
        uses: actions/upload-artifact@v4
        with:
          name: data-cloud-build-gate-evidence
          path: |
            .kernel/evidence/data-cloud-active-modules.json
            .kernel/evidence/action-plane-boundaries.json
            .kernel/evidence/action-plane-module-inventory.json
            .kernel/evidence/production-readiness-task-map.json
            .kernel/evidence/agent-capability-duplicates.json
            .kernel/evidence/agent-runtime-test-excludes.json
            .kernel/evidence/agent-usage-audit.json
          retention-days: 90

  release-runtime-profile:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium for Data Cloud UI a11y suite
        run: pnpm --dir products/data-cloud/delivery/ui exec playwright install --with-deps chromium

      - name: Run Data Cloud release runtime profile checks
        run: |
          pnpm check:data-cloud-release-runtime-profile
          pnpm check:action-plane-route-lifecycle
          pnpm check:data-cloud-maturity-proof
          pnpm check:kernel-implementation-plan-coverage
          pnpm check:data-cloud-ui-a11y
          pnpm check:product-a11y-route-matrix
          pnpm check:i18n-conformance
          pnpm check:ai-governance-conformance
          pnpm check:product-slo-budgets
          pnpm check:product-cost-budgets
          pnpm check:product-domain-invariants
          pnpm check:openapi-release-quality
          pnpm check:openapi-breaking-changes
          pnpm check:evidence-current-commit

      - name: Upload runtime profile evidence
        uses: actions/upload-artifact@v4
        with:
          name: data-cloud-runtime-profile-evidence
          path: |
            .kernel/evidence/data-cloud-release-runtime-profile.json
            .kernel/evidence/action-plane-route-lifecycle.json
            .kernel/evidence/data-cloud-maturity-proof.json
            .kernel/evidence/atomic-workflow-posture.json
            .kernel/evidence/ai-governance-behavioral-proof/ai-governance-behavioral-proof-latest.json
            .kernel/evidence/i18n-behavioral-proof/i18n-behavioral-proof-latest.json
            .kernel/evidence/a11y-behavioral-proof/a11y-behavioral-proof-latest.json
            .kernel/evidence/kernel-implementation-plan-progress.json
            .kernel/evidence/product-a11y-route-matrix.json
            .kernel/evidence/product-slo-budgets.json
            .kernel/evidence/product-cost-budgets.json
            .kernel/evidence/product-domain-invariants.json
            .kernel/evidence/openapi-breaking-changes.json
          retention-days: 90

  smoke-e2e-strict:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    environment: ${{ inputs.release_environment || (github.event_name == 'release' && 'production') || (startsWith(github.ref, 'refs/tags/') && 'staging') || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke E2E in strict mode
        env:
          DC_BASE_URL: ${{ vars.DC_RELEASE_BASE_URL }}
          DC_TENANT_ID: ${{ vars.DC_RELEASE_TENANT_ID }}
          DC_API_TOKEN: ${{ secrets.DC_RELEASE_API_TOKEN }}
          SMOKE_TIMEOUT: "15"
        run: |
          set -euo pipefail
          chmod +x products/data-cloud/scripts/run-smoke-e2e.sh
          bash products/data-cloud/scripts/run-smoke-e2e.sh --json | tee smoke-e2e-report.json

      - name: Validate smoke evidence report
        run: |
          set -euo pipefail
          test -s smoke-e2e-report.json
          jq -e '.results | length > 0' smoke-e2e-report.json >/dev/null
          jq -e '.summary.fail == 0 and .summary.warn == 0' smoke-e2e-report.json >/dev/null

      - name: Upload smoke evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-cloud-smoke-evidence
          path: smoke-e2e-report.json
          retention-days: 30

  backup-drill-strict:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    environment: ${{ inputs.release_environment || (github.event_name == 'release' && 'production') || (startsWith(github.ref, 'refs/tags/') && 'staging') || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate recovery runbook commands
        run: |
          chmod +x products/data-cloud/planes/action/server/src/test/scripts/validate-runbook-commands.sh
          bash products/data-cloud/planes/action/server/src/test/scripts/validate-runbook-commands.sh

      - name: Run backup drill in strict mode
        env:
          POSTGRES_HOST: ${{ vars.DC_POSTGRES_HOST }}
          POSTGRES_PORT: ${{ vars.DC_POSTGRES_PORT }}
          POSTGRES_DB: ${{ vars.DC_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.DC_POSTGRES_USER }}
          PGPASSWORD: ${{ secrets.DC_POSTGRES_PASSWORD }}
          CLICKHOUSE_HOST: ${{ vars.DC_CLICKHOUSE_HOST }}
          CLICKHOUSE_PORT: ${{ vars.DC_CLICKHOUSE_PORT }}
          CLICKHOUSE_USER: ${{ secrets.DC_CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.DC_CLICKHOUSE_PASSWORD }}
          OPENSEARCH_HOST: ${{ vars.DC_OPENSEARCH_HOST }}
          OPENSEARCH_PORT: ${{ vars.DC_OPENSEARCH_PORT }}
          OPENSEARCH_USER: ${{ secrets.DC_OPENSEARCH_USER }}
          OPENSEARCH_PASSWORD: ${{ secrets.DC_OPENSEARCH_PASSWORD }}
          S3_ENDPOINT: ${{ vars.DC_S3_ENDPOINT }}
          S3_BUCKET: ${{ vars.DC_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DC_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DC_AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          chmod +x products/data-cloud/scripts/run-backup-drill.sh
          bash products/data-cloud/scripts/run-backup-drill.sh --json | tee backup-drill-report.json

      - name: Validate backup drill evidence report
        run: |
          set -euo pipefail
          test -s backup-drill-report.json
          jq -e '.results | length > 0' backup-drill-report.json >/dev/null
          jq -e '.fail == 0' backup-drill-report.json >/dev/null
          jq -e '([.results[] | select(.status == "WARN" or .status == "SKIP")] | length) == 0' backup-drill-report.json >/dev/null

      - name: Upload backup drill evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-cloud-backup-evidence
          path: backup-drill-report.json
          retention-days: 30

  security-scan-strict:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Run dependency vulnerability check (blocking)
        run: |
          ./gradlew \
            :products:data-cloud:delivery:runtime-composition:dependencyCheckAnalyze \
            --no-daemon

      - name: Generate SBOM (blocking)
        run: |
          ./gradlew cyclonedxBom --no-daemon

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-cloud-sbom
          path: |
            **/build/reports/bom.json
            **/build/reports/bom.xml
          retention-days: 30

  quality-gates-strict:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: SonarQube analysis (blocking when configured)
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_LOGIN: ${{ secrets.SONAR_LOGIN }}
        run: |
          set -euo pipefail
          if [ -n "${SONAR_HOST_URL:-}" ] && [ -n "${SONAR_LOGIN:-}" ]; then
            if ./gradlew tasks --all --no-daemon | grep -q '^sonarqube '; then
              ./gradlew sonarqube --no-daemon
            else
              echo "::error::SonarQube secrets are configured but Gradle sonarqube task is missing."
              exit 1
            fi
          else
            echo "SonarQube secrets not configured; skipping Sonar gate by policy."
          fi

  release-gate:
    runs-on: ubuntu-latest
    needs:
      - resolve-affected-products
      - validate-release-config
      - build-and-test
      - release-runtime-profile
      - smoke-e2e-strict
      - backup-drill-strict
      - security-scan-strict
      - quality-gates-strict
    steps:
      - uses: actions/checkout@v4

      - name: Download smoke evidence artifact
        uses: actions/download-artifact@v4
        with:
          name: data-cloud-smoke-evidence
          path: release-evidence/smoke

      - name: Download backup evidence artifact
        uses: actions/download-artifact@v4
        with:
          name: data-cloud-backup-evidence
          path: release-evidence/backup

      - name: Download runtime profile evidence artifact
        uses: actions/download-artifact@v4
        with:
          name: data-cloud-runtime-profile-evidence
          path: .kernel/evidence

      - name: Download build gate evidence artifact
        uses: actions/download-artifact@v4
        with:
          name: data-cloud-build-gate-evidence
          path: .kernel/evidence

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: data-cloud-sbom
          path: release-evidence/security

      - name: Verify release evidence artifacts exist
        run: |
          set -euo pipefail
          test -s release-evidence/smoke/smoke-e2e-report.json
          test -s release-evidence/backup/backup-drill-report.json
          test -s .kernel/evidence/data-cloud-release-runtime-profile.json
          test -s .kernel/evidence/data-cloud-active-modules.json
          test -s .kernel/evidence/action-plane-boundaries.json
          test -s .kernel/evidence/action-plane-module-inventory.json
          test -s .kernel/evidence/production-readiness-task-map.json
          test -s .kernel/evidence/agent-capability-duplicates.json
          test -s .kernel/evidence/agent-runtime-test-excludes.json
          test -s .kernel/evidence/agent-usage-audit.json
          test -s .kernel/evidence/action-plane-route-lifecycle.json
          test -s .kernel/evidence/data-cloud-maturity-proof.json
          test -s .kernel/evidence/atomic-workflow-posture.json
          test -s .kernel/evidence/product-slo-budgets.json
          test -s .kernel/evidence/product-cost-budgets.json
          test -s .kernel/evidence/product-domain-invariants.json
          test -s .kernel/evidence/openapi-breaking-changes.json
          echo "Data Cloud strict release gate passed with required evidence artifacts."

      - name: Validate current-commit evidence (DC-P7-003)
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          {
            echo "## Current-Commit Evidence Validation (DC-P7-003)"
            echo ""
            echo "- Validating that evidence commit matches released commit"
            echo ""
            EVIDENCE_COMMIT=$(jq -r '.evidenceRun.commit' .kernel/evidence/data-cloud-active-modules.json)
            RELEASED_COMMIT="${GITHUB_SHA}"
            
            if [ "$EVIDENCE_COMMIT" != "$RELEASED_COMMIT" ]; then
              echo "::error::Evidence commit ($EVIDENCE_COMMIT) does not match released commit ($RELEASED_COMMIT)"
              exit 1
            fi
            
            echo "✓ Evidence commit matches released commit: $EVIDENCE_COMMIT"
            echo ""
            echo "All readiness proofs are bundled with correct commit evidence."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate typed release summary
        env:
          RELEASE_ENVIRONMENT: ${{ env.RELEASE_ENVIRONMENT }}
        run: node ./scripts/generate-release-maturity-summary.mjs

      - name: Validate release evidence content and freshness
        env:
          RELEASE_ENVIRONMENT: ${{ env.RELEASE_ENVIRONMENT }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: pnpm check:validate-release-evidence

      - name: Generate Data Cloud release evidence bundle
        run: pnpm generate:data-cloud-release-bundle

      - name: Upload release summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-cloud-release-summary
          path: |
            release-evidence/release-summary.json
            release-evidence/release-summary.md
            release-evidence/wave2-product-quality-scorecard.md
            .kernel/evidence/wave2-product-quality-scorecard.json
            .kernel/evidence/data-cloud-active-modules.json
            .kernel/evidence/action-plane-boundaries.json
            .kernel/evidence/action-plane-module-inventory.json
            .kernel/evidence/production-readiness-task-map.json
            .kernel/evidence/agent-capability-duplicates.json
            .kernel/evidence/agent-runtime-test-excludes.json
            .kernel/evidence/agent-usage-audit.json
            .kernel/evidence/data-cloud-release-bundle.json
            .kernel/evidence/action-plane-route-lifecycle.json
            .kernel/evidence/data-cloud-maturity-proof.json
            .kernel/evidence/product-a11y-route-matrix.json
            .kernel/evidence/product-slo-budgets.json
            .kernel/evidence/product-cost-budgets.json
            .kernel/evidence/product-domain-invariants.json
            .kernel/evidence/openapi-breaking-changes.json
          retention-days: 90

      - name: Append release summary to workflow summary
        run: cat release-evidence/release-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Validate all release artifacts uploaded (DC-P7-001)
        run: |
          {
            echo "## Release Artifact Upload Validation (DC-P7-001)"
            echo ""
            echo "- Every release artifact must be uploaded for authoritative certification."
            echo "- This validation ensures no artifacts are missing before release approval."
            echo ""

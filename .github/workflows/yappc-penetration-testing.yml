name: YAPPC Penetration Testing Program

on:
  schedule:
    - cron: '0 4 1 */3 *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target base URL for DAST (for example: https://yappc-staging.example.com)'
        required: true
        type: string
      report_label:
        description: 'Optional report label'
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  pentest-baseline:
    name: Quarterly Penetration Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 50

    env:
      TARGET_URL: ${{ github.event.inputs.target_url || 'https://yappc-staging.example.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OWASP ZAP full scan
        run: |
          docker run --rm \
            --network host \
            -v "${PWD}:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t "${TARGET_URL}" \
            -r yappc-pentest-report.html \
            -J yappc-pentest-report.json \
            -w yappc-pentest-warnings.md \
            -m 15 \
            -I

      - name: Upload penetration testing report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-penetration-test-report
          path: |
            yappc-pentest-report.html
            yappc-pentest-report.json
            yappc-pentest-warnings.md
          retention-days: 90

      - name: Create or update penetration test tracking issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = 'YAPPC Quarterly Penetration Testing';
            const label = core.getInput('report_label') || new Date().toISOString().slice(0, 10);

            const warnings = fs.existsSync('yappc-pentest-warnings.md')
              ? fs.readFileSync('yappc-pentest-warnings.md', 'utf8')
              : 'No warning report produced.';

            const body = [
              '## Quarterly Penetration Testing Run',
              '',
              `- Target URL: ${process.env.TARGET_URL}`,
              `- Report label: ${label}`,
              `- Workflow run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              '',
              '### Findings Snapshot',
              '```md',
              warnings.slice(0, 12000),
              '```',
              '',
              '### Required Follow-ups',
              '1. Triage all HIGH/CRITICAL findings within 1 business day.',
              '2. Link remediation PRs and retest evidence.',
              '3. Update annual penetration testing report in docs/security/templates.',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'yappc,security,penetration-testing'
            });

            const existing = issues.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['yappc', 'security', 'penetration-testing'],
              });
            }

      - name: Fail run on ZAP FAIL findings
        run: |
          if grep -q 'FAIL-NEW:' yappc-pentest-warnings.md; then
            echo 'Penetration baseline found FAIL-NEW findings.'
            exit 1
          fi

name: YAPPC Performance Regression

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'products/yappc/core/services-lifecycle/**'
      - 'products/yappc/infrastructure/datacloud/**'
      - '.github/workflows/yappc-performance-regression.yml'
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '21'

jobs:
  performance-regression:
    name: Performance Regression Gates
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '${{ env.JAVA_VERSION }}'
          cache: gradle

      - name: Run lifecycle performance threshold tests
        run: |
          ./gradlew \
            :products:yappc:core:services-lifecycle:test \
            --tests "*YappcOrchestrationPerformanceTest" \
            --tests "*LifecyclePerformanceBenchmarks" \
            --no-daemon --stacktrace

      - name: Run datacloud benchmark smoke tests
        run: |
          ./gradlew \
            :products:yappc:infrastructure:datacloud:test \
            --tests "*YappcEntityMapperTest" \
            --no-daemon --stacktrace

      - name: Publish performance test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yappc-performance-regression-reports
          path: |
            products/yappc/**/build/reports/tests/**
            products/yappc/**/build/test-results/**
          retention-days: 30

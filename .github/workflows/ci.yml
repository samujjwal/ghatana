name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Frontend CI (Guardian)
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Guardian)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm -w dlx eslint "**/*.{ts,tsx,js,jsx}" --max-warnings=0

      - name: Type-check backend
        run: pnpm --filter ./products/dcmaar/apps/guardian/apps/backend... -w --silent

      - name: Run product quick-build
        working-directory: products/dcmaar/apps/guardian
        run: make build-quick

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: guardian-dist
          path: |
            products/dcmaar/apps/guardian/apps/backend/dist/**
            products/dcmaar/apps/guardian/apps/parent-dashboard/dist/**

  # ─────────────────────────────────────────────
  # Proto Audit (buf + Gradle)
  # ─────────────────────────────────────────────
  proto-audit:
    name: Proto Audit (buf + Gradle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Install buf CLI
        run: |
          curl -sSL "https://github.com/bufbuild/buf/releases/latest/download/buf-$(uname -s)-$(uname -m)" \
            -o "/usr/local/bin/buf" && chmod +x "/usr/local/bin/buf"

      - name: Buf Lint and Generate
        working-directory: ./products/aep/contracts/proto
        run: |
          buf --version
          buf lint
          buf generate

      - name: Gradle proto audit and determinism
        working-directory: ./products/aep
        run: |
          ./gradlew \
            :contracts:proto:protoAudit \
            :contracts:proto:writeDescriptorSet \
            :contracts:proto:generateJsonSchema \
            :contracts:proto:generatePojo \
            :contracts:proto:determinismCheck \
            --no-daemon --stacktrace --info --warning-mode=all

  # ─────────────────────────────────────────────
  # Java Build and Test
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build and Test (Java ${{ matrix.java }})
    needs: proto-audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ["21"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: "temurin"
          cache: "gradle"

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Build and Test
        run: |
          ./gradlew build \
            --no-daemon \
            --stacktrace \
            --warning-mode=all

      - name: Code Coverage Report
        if: always()
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # Code Quality
  # ─────────────────────────────────────────────
  code-quality:
    name: Code Quality
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon

      - name: Run SpotBugs
        run: ./gradlew spotbugsMain spotbugsTest --no-daemon

      - name: Run PMD
        run: ./gradlew pmdMain pmdTest --no-daemon

      - name: Check @doc tags
        run: ./gradlew checkDocTags --no-daemon

  # ─────────────────────────────────────────────
  # AEP UI Build
  # ─────────────────────────────────────────────
  build-ui:
    name: Build AEP UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Dependencies
        working-directory: ./products/aep/ui
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ./products/aep/ui
        run: pnpm run build

      - name: Run Tests
        working-directory: ./products/aep/ui
        run: pnpm test:ci

      - name: Run Linter
        working-directory: ./products/aep/ui
        run: pnpm lint

      - name: Archive Production Build
        uses: actions/upload-artifact@v4
        with:
          name: ui-build
          path: ./products/aep/ui/dist
          retention-days: 5

name: Staged Test Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  # Stage 1: Fast Feedback (Unit + Contract Tests)
  stage-1-unit-contract:
    name: Stage 1: Unit & Contract Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests (Java)
        run: ./gradlew test --tests "*Test" --exclude-task "*IntegrationTest" --exclude-task "*ContractTest" --exclude-task "*E2ETest" --continue || true

      - name: Run unit tests (TypeScript)
        run: pnpm test --run || true

      - name: Run contract tests (Java)
        run: ./gradlew test --tests "*ContractTest" --continue || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-1-test-results
          path: |
            **/build/test-results/test/
            **/coverage/
          retention-days: 7

  # Stage 2: Integration Tests (requires services)
  stage-2-integration:
    name: Stage 2: Integration Tests
    runs-on: ubuntu-latest
    needs: stage-1-unit-contract
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests (Java)
        env:
          POSTGRES_URL: jdbc:postgresql://localhost:5432/test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          REDIS_URL: redis://localhost:6379
        run: ./gradlew test --tests "*IntegrationTest" --continue || true

      - name: Run integration tests (TypeScript)
        env:
          POSTGRES_URL: postgresql://localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
        run: pnpm test:integration --run || true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-2-integration-results
          path: |
            **/build/test-results/test/
            **/coverage/
          retention-days: 7

  # Stage 3: E2E Tests (full environment)
  stage-3-e2e:
    name: Stage 3: E2E Tests
    runs-on: ubuntu-latest
    needs: stage-2-integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_ZOOKEEPER_CONNECT: localhost:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        options: >-
          --health-cmd "kafka-topics --bootstrap-server localhost:9092 --list"
          --health-interval 10s
          --health-timeout 30s
          --health-retries 5
        ports:
          - 9092:9092
          - 2181:2181

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run E2E tests (Java)
        env:
          POSTGRES_URL: jdbc:postgresql://localhost:5432/test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          REDIS_URL: redis://localhost:6379
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: ./gradlew test --tests "*E2ETest" --continue || true

      - name: Run E2E tests (TypeScript)
        env:
          POSTGRES_URL: postgresql://localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: pnpm test:e2e --run || true

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-3-e2e-results
          path: |
            **/build/test-results/test/
            **/coverage/
            **/playwright-report/
          retention-days: 7

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            **/playwright-report/
            **/test-results/
          retention-days: 7

  # Summary Job
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [stage-1-unit-contract, stage-2-integration, stage-3-e2e]
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results

      - name: Generate test summary
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stage 1: Unit & Contract Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.stage-1-unit-contract.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stage 2: Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.stage-2-integration.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stage 3: E2E Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.stage-3-e2e.result }}" >> $GITHUB_STEP_SUMMARY

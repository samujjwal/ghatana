name: Architecture Compliance

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  architecture-check:
    name: Architecture Compliance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package naming conventions
        run: node scripts/check-architecture-compliance.js
        id: arch-check
        continue-on-error: true

      - name: Check product UI script/router/design-system contract
        run: node scripts/check-product-ui-contracts.mjs

      - name: Check shared layout primitive composition
        run: node scripts/check-shared-layout-primitives.mjs

      - name: Check shared product shell adoption
        run: node scripts/check-shared-product-shells.mjs

      - name: Check shared UI state coverage
        run: node scripts/check-shared-ui-state-coverage.mjs

      - name: Check workspace source aliases
        run: node scripts/check-workspace-source-aliases.mjs

      - name: Check router strategy
        run: node scripts/check-router-strategy.mjs

      - name: Check product package metadata
        run: node scripts/check-product-package-metadata.mjs

      - name: Check FlashIt package-manager alignment
        run: node scripts/check-flashit-package-manager.mjs

      - name: Check bridge compliance
        run: node scripts/check-bridge-compliance.mjs

      - name: Check product manifest contract
        run: node scripts/check-product-manifest-contracts.mjs

      - name: Check product CI matrices
        run: node scripts/check-product-ci-matrices.mjs

      - name: Check product workspace registration
        run: node scripts/check-product-workspace-registration.mjs

      - name: Check product scaffolder contract
        run: node scripts/check-product-scaffolder.mjs

      - name: Check security workflow coverage
        run: node scripts/check-security-workflow-coverage.mjs

      - name: Check shared data-access contract
        run: node scripts/check-data-access-contract.mjs

      - name: Check observability conformance
        run: node scripts/check-observability-conformance.mjs

      - name: Check in-memory policy store usage
        run: node scripts/check-inmemory-policy-store-usage.mjs

      - name: Check route entitlement contracts
        run: node scripts/check-route-entitlement-contracts.mjs

      - name: Check FlashIt client conformance
        run: node scripts/check-flashit-client-conformance.mjs

      - name: Check runtime template conformance
        run: node scripts/check-runtime-template-conformance.mjs

      - name: Check audited UI workflows
        run: node scripts/check-audited-ui-workflows.mjs

      - name: Check audited E2E workflow
        run: node scripts/check-audited-e2e-workflow.mjs

      - name: Check audited performance workflows
        run: node scripts/check-audited-performance-workflows.mjs

      - name: Check for banned libraries
        run: |
          if grep -r "lodash\|axios\|moment\|jquery\|request-promise" --include="package.json" .; then
            echo "❌ Banned libraries found! See dependency-policy.json for alternatives."
            exit 1
          fi
        continue-on-error: true

      - name: Check for deprecated packages
        run: |
          if grep -r "@ghatana/yappc-ui\|@ghatana/yappc-ai\|@ghatana/yappc-canvas\|@ghatana/ui" --include="package.json" .; then
            echo "❌ Deprecated packages found! Run migration codemods."
            exit 1
          fi
        continue-on-error: true

      - name: Check for duplicate package names
        run: node scripts/check-duplicate-package-names.sh

      - name: License policy check
        run: node scripts/check-license-policy.sh

      - name: Java architecture governance check
        run: bash scripts/check-java-architecture.sh
        id: java-arch-check
        continue-on-error: true

      - name: Post PR comment on violations
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚨 **Architecture Compliance Violations Detected**

              This PR violates monorepo architecture policies:

              - Cross-product dependencies
              - Banned libraries (lodash, axios, moment, etc.)
              - Deprecated packages (@ghatana/ui, @ghatana/yappc-*)
              - Naming convention violations

              **Action Required:**
              1. Run \`node scripts/codemods/migrate-yappc-packages.js\` for naming fixes
              2. Review \`eslint-rules/dependency-policy.json\` for alternatives
              3. Consult \`V5_AUTONOMOUS_MONOREPO_AUDIT_COMPLETE.md\` for guidance`
            })

      - name: Final status
        if: steps.arch-check.outcome == 'failure'
        run: |
          echo "❌ Architecture compliance check failed"
          exit 1

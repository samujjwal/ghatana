name: "YAPPC FE: Route Validation"

on:
  pull_request:
    paths:
      - 'apps/web/src/router/**'
      - 'apps/web/src/pages/**'
      - 'scripts/validate-routes.ts'
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/web/src/router/**'
      - 'apps/web/src/pages/**'

jobs:
  validate-routes:
    name: Validate Route Imports
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run route validation
        run: pnpm tsx scripts/validate-routes.ts
        working-directory: frontend

      - name: Comment PR with results
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Route Validation Failed**\n\nSome route imports are broken. Please check the CI logs and fix the missing page imports before merging.'
            })

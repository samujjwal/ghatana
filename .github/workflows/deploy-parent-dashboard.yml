name: Deploy Parent Dashboard

on:
    push:
        branches: [main]
        paths:
            - "products/dcmaar/apps/parent-dashboard/**"
            - ".github/workflows/deploy-parent-dashboard.yml"
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment: production

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 18

            - name: Install pnpm
              run: npm install -g pnpm@8

            - name: Install dependencies
              run: pnpm install

            - name: Build with Sentry
              working-directory: products/dcmaar/apps/parent-dashboard
              env:
                  NODE_ENV: production
                  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
                  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
                  SENTRY_RELEASE: dcmaar-parent-dashboard@${{ github.sha }}
                  GITHUB_SHA: ${{ github.sha }}
              run: pnpm build

            - name: Create Sentry release
              uses: getsentry/action-release@v1
              env:
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
                  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
                  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
              with:
                  environment: production
                  version: dcmaar-parent-dashboard@${{ github.sha }}
                  sourcemaps: products/dcmaar/apps/parent-dashboard/dist

            # Add your deployment steps here (e.g., deploy to Vercel, Netlify, S3, etc.)
            # Example for Vercel:
            # - name: Deploy to Vercel
            #   uses: amondnet/vercel-action@v20
            #   with:
            #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
            #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
            #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
            #     working-directory: products/dcmaar/apps/parent-dashboard

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: parent-dashboard-dist
                  path: products/dcmaar/apps/parent-dashboard/dist
                  retention-days: 7

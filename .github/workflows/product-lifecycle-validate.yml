name: Product Lifecycle Validate

on:
  pull_request:
    branches: ['main']
  workflow_dispatch:
    inputs:
      products:
        description: 'Comma-separated list of products to validate'
        required: false

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'

jobs:
  resolve-affected:
    name: Resolve Affected Products
    runs-on: ubuntu-latest
    outputs:
      affected-products: ${{ steps.resolve.outputs.affected-products }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "affected-products=${{ github.event.inputs.products }}" >> $GITHUB_OUTPUT
          else
            echo "affected-products=$(node scripts/resolve-affected-products.mjs --json | jq -r '.affectedProducts | join(",")')" >> $GITHUB_OUTPUT
          fi

  validate:
    name: Validate Lifecycle
    needs: resolve-affected
    if: needs.resolve-affected.outputs.affected-products != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product: ${{ fromJson(format('["{0}"]', needs.resolve-affected.outputs.affected-products)) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - run: pnpm install --frozen-lockfile
      - name: Validate Product Lifecycle
        run: pnpm kernel product validate ${{ matrix.product }}

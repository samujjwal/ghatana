name: DMOS PR Checks

on:
  pull_request:
    branches: [main, develop, release/*]
    paths:
      - "products/digital-marketing/**"
      - ".github/workflows/dmos-pr.yml"
      - ".github/workflows/dmos-release-gate.yml"
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"

jobs:
  pr-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: products/digital-marketing/ui/pnpm-lock.yaml

      - name: Install UI dependencies
        working-directory: products/digital-marketing/ui
        run: pnpm install --frozen-lockfile

      - name: Run focused backend unit tests
        run: |
          ./gradlew \
            :products:digital-marketing:dm-api:test \
            :products:digital-marketing:dm-application:test \
            --no-daemon --stacktrace

      - name: Run UI typecheck and lint
        working-directory: products/digital-marketing/ui
        run: |
          pnpm run type-check
          pnpm run lint

      - name: Run contract drift checks
        run: |
          ./gradlew :products:digital-marketing:dm-api:test --tests "*ContractTest" --no-daemon --stacktrace
          node scripts/check-dmos-boundary-workflow-coverage.mjs

      - name: Run production-data/documentation guards
        run: |
          node scripts/check-dmos-no-fake-data.mjs
          node scripts/check-dmos-docs-matrix.mjs
          node scripts/check-dmos-operations-docs.mjs

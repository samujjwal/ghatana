name: API Contract Conformance Gate

on:
  pull_request:
    paths:
      - 'products/phr/**'
      - 'products/finance/**'
      - 'products/digital-marketing/**'
      - 'products/flashit/**'
      - 'platform/java/testing/**'
      - '.github/workflows/api-contract-conformance.yml'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  contract-conformance:
    name: ${{ matrix.product }} API Contract Conformance
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: PHR
            command: ./gradlew :products:phr:checkApiContractConformance --no-daemon --stacktrace
            reportPath: products/phr/build/reports/tests/test/
          - product: Finance
            command: ./gradlew :products:finance:checkApiContractConformance --no-daemon --stacktrace
            reportPath: products/finance/build/reports/tests/test/
          - product: Digital Marketing
            command: ./gradlew :products:digital-marketing:dm-api:test --tests "*ContractTest" --no-daemon --stacktrace
            reportPath: products/digital-marketing/dm-api/build/reports/tests/test/
          - product: FlashIt
            command: pnpm --filter @ghatana/flashit-tests test:contract
            reportPath: products/flashit/backend/gateway/test-results/

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Node.js 20
        if: matrix.product == 'FlashIt'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'pnpm'

      - name: Install pnpm
        if: matrix.product == 'FlashIt'
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: Install workspace dependencies
        if: matrix.product == 'FlashIt'
        run: pnpm install --frozen-lockfile

      - name: Run contract conformance check
        run: ${{ matrix.command }}

      - name: Upload contract conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.product }}-contract-conformance-report
          path: ${{ matrix.reportPath }}

  contract-drift-summary:
    name: Contract Drift Summary
    runs-on: ubuntu-latest
    needs: [contract-conformance]
    if: always()
    
    steps:
      - name: Check for failures
        run: |
          if [ "${{ needs.contract-conformance.result }}" == "failure" ]; then
            echo "::error::API contract conformance check failed. Please review the violation details above."
            exit 1
          else
            echo "All API contract conformance checks passed."
          fi

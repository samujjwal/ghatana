name: API Contract Conformance Gate

on:
  pull_request:
    paths:
      - 'products/phr/**'
      - 'products/finance/**'
      - 'products/digital-marketing/**'
      - 'products/flashit/**'
      - 'platform/java/testing/**'
      - '.github/workflows/api-contract-conformance.yml'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      products:
        description: 'Comma-separated product ids to check'
        required: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"

jobs:
  resolve-products:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: resolve
        env:
          PRODUCTS_INPUT: ${{ github.event.inputs.products }}
          BASE: ${{ github.event.pull_request.base.sha || github.event.before || 'HEAD~1' }}
          HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          node <<'NODE' > matrix.json
          const { execFileSync } = require('node:child_process');
          const input = (process.env.PRODUCTS_INPUT || '').trim();
          const resolved = input
            ? input.split(',').map((entry) => entry.trim()).filter(Boolean)
            : JSON.parse(execFileSync('node', [
                'scripts/resolve-affected-products.mjs',
                '--json',
                '--base',
                process.env.BASE,
                '--head',
                process.env.HEAD,
              ], { encoding: 'utf8' })).affectedProducts || [];
          const commands = {
            phr: {
              product: 'PHR',
              command: './gradlew :products:phr:checkApiContractConformance --no-daemon --stacktrace',
              reportPath: 'products/phr/build/reports/tests/test/',
            },
            finance: {
              product: 'Finance',
              command: './gradlew :products:finance:checkApiContractConformance --no-daemon --stacktrace',
              reportPath: 'products/finance/build/reports/tests/test/',
            },
            'digital-marketing': {
              product: 'Digital Marketing',
              command: './gradlew :products:digital-marketing:dm-api:test --tests \"*ContractTest\" --no-daemon --stacktrace',
              reportPath: 'products/digital-marketing/dm-api/build/reports/tests/test/',
            },
            flashit: {
              product: 'FlashIt',
              command: 'pnpm --filter @ghatana/flashit-tests test:contract',
              reportPath: 'products/flashit/backend/gateway/test-results/',
            },
          };
          const include = [...new Set(resolved)]
            .filter((productId) => commands[productId])
            .map((productId) => commands[productId]);
          process.stdout.write(JSON.stringify({ include }));
          NODE
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"

  contract-conformance:
    name: ${{ matrix.product }} API Contract Conformance
    runs-on: ubuntu-latest
    needs: [resolve-products]
    if: needs.resolve-products.outputs.matrix != '{"include":[]}'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-products.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Node.js
        if: matrix.product == 'FlashIt'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        if: matrix.product == 'FlashIt'
        run: corepack enable && corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install workspace dependencies
        if: matrix.product == 'FlashIt'
        run: pnpm install --frozen-lockfile

      - name: Run contract conformance check
        run: ${{ matrix.command }}

      - name: Upload contract conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.product }}-contract-conformance-report
          path: ${{ matrix.reportPath }}

  contract-drift-summary:
    name: Contract Drift Summary
    runs-on: ubuntu-latest
    needs: [contract-conformance]
    if: always()
    
    steps:
      - name: Check for failures
        run: |
          if [ "${{ needs.contract-conformance.result }}" == "failure" ]; then
            echo "::error::API contract conformance check failed. Please review the violation details above."
            exit 1
          else
            echo "All API contract conformance checks passed."
          fi

name: SonarQube Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate analysis
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      
      - name: Run SonarQube Analysis for Data-Cloud
        working-directory: products/data-cloud
        run: ./gradlew sonarqube \
          -Dsonar.projectKey=ghatana_datacloud \
          -Dsonar.projectName="Data-Cloud Platform" \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.token=${{ secrets.SONAR_TOKEN_DATACLOUD }} \
          -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml \
          -Dsonar.qualitygate.wait=true
      
      - name: Run SonarQube Analysis for AEP
        working-directory: products/data-cloud/planes/action
        run: ./gradlew sonarqube \
          -Dsonar.projectKey=ghatana_aep \
          -Dsonar.projectName="Agentic Event Processor" \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.token=${{ secrets.SONAR_TOKEN_AEP }} \
          -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml \
          -Dsonar.qualitygate.wait=true
      
      - name: Upload analysis results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-reports
          path: |
            products/data-cloud/build/reports/sonarqube/
            products/data-cloud/planes/action/build/reports/sonarqube/
          retention-days: 30
      
      - name: Comment PR with SonarQube results
        if: github.event_name == 'pull_request'
        uses: sonarsource/sonarqube-quality-gate-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          scanMetadataReportFile: products/data-cloud/build/sonar/report-task.txt

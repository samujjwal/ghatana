# DMOS Test Matrix CI Workflow (P2-2)
# Implements comprehensive test coverage across backend, persistence, UI, E2E, and contract tests

name: DMOS Test Matrix

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
  JAVA_VERSION: "21"
  NODE_VERSION: "20"

jobs:
  # Backend unit tests
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'
      - name: Run backend unit tests
        run: ./gradlew :products:digital-marketing:dm-application:test --tests "*Test" --no-daemon
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-unit-results
          path: products/digital-marketing/dm-application/build/test-results/test/

  # Persistence tests with Testcontainers
  persistence-tests:
    name: Persistence Tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dmos_test
          POSTGRES_USER: dmos
          POSTGRES_PASSWORD: dmos_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'
      - name: Run persistence tests
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/dmos_test
          DATABASE_USER: dmos
          DATABASE_PASSWORD: dmos_test
        run: ./gradlew :products:digital-marketing:dm-persistence:test --no-daemon
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: persistence-results
          path: products/digital-marketing/dm-persistence/build/test-results/test/

  # UI unit tests
  ui-unit:
    name: UI Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: products/digital-marketing/ui/package-lock.json
      - name: Install dependencies
        working-directory: products/digital-marketing/ui
        run: npm ci
      - name: Run unit tests
        working-directory: products/digital-marketing/ui
        run: npm test -- --coverage --watchAll=false
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-coverage
          path: products/digital-marketing/ui/coverage/

  # Playwright E2E tests
  e2e-playwright:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: products/digital-marketing/ui/package-lock.json
      - name: Install dependencies
        working-directory: products/digital-marketing/ui
        run: npm ci
      - name: Install Playwright browsers
        working-directory: products/digital-marketing/ui
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        working-directory: products/digital-marketing/ui
        run: npx playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: products/digital-marketing/ui/playwright-report/

  # Contract tests
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'
      - name: Run contract tests
        run: ./gradlew :products:digital-marketing:dm-api:test --tests "*ContractTest" --no-daemon
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-results
          path: products/digital-marketing/dm-api/build/test-results/test/

  # Integration tests with Testcontainers
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dmos_integration
          POSTGRES_USER: dmos
          POSTGRES_PASSWORD: dmos_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'
      - name: Run integration tests
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/dmos_integration
          DATABASE_USER: dmos
          DATABASE_PASSWORD: dmos_test
        run: ./gradlew :products:digital-marketing:dm-integration-tests:test --no-daemon
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results
          path: products/digital-marketing/dm-integration-tests/build/test-results/test/

  # Test gate - fail if any critical test suite fails
  test-gate:
    name: Test Gate
    runs-on: ubuntu-latest
    needs: [backend-unit, persistence-tests, ui-unit, e2e-playwright, contract-tests, integration-tests]
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "All test suites completed. Check individual job results for details."
          # This job will fail if any required job fails
          # Required jobs can be configured in the 'needs' array with if: success()

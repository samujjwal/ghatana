openapi: "3.1.0"
info:
  title: FlashIt Gateway API
  description: |
    FlashIt personal memory capture and social-graph application gateway.
    All endpoints (except /health and /metrics) require a valid JWT Bearer token.
  version: "1.0.0"
  contact:
    name: FlashIt Engineering
    url: https://github.com/ghatana/ghatana

servers:
  - url: http://localhost:3000
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorBody:
      type: object
      required: [error, message, status, correlationId]
      properties:
        error:
          type: string
          description: Machine-readable error code (e.g., UNAUTHORIZED, BAD_REQUEST)
        message:
          type: string
          description: Human-readable error message
        status:
          type: integer
          description: HTTP status code
        correlationId:
          type: string
          description: Correlation ID for distributed tracing

    AuthRegisterRequest:
      type: object
      required: [email, password, username]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        username:
          type: string
          minLength: 2
          maxLength: 50

    AuthRegisterResponse:
      type: object
      required: [userId, email, username, accessToken, refreshToken]
      properties:
        userId:
          type: string
        email:
          type: string
        username:
          type: string
        accessToken:
          type: string
          description: Short-lived JWT access token
        refreshToken:
          type: string
          description: Long-lived refresh token (HttpOnly cookie recommended)

    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthLoginResponse:
      type: object
      required: [userId, email, accessToken, refreshToken]
      properties:
        userId:
          type: string
        email:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string

    Moment:
      type: object
      required: [id, userId, content, createdAt, updatedAt]
      properties:
        id:
          type: string
          description: Moment UUID
        userId:
          type: string
          description: Owner user ID
        content:
          type: string
          description: Text content of the moment
        mediaUrl:
          type: string
          nullable: true
          description: Optional media attachment URL
        sphereId:
          type: string
          nullable: true
          description: Optional sphere assignment
        tags:
          type: array
          items:
            type: string
          description: Flat tag list
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateMomentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        sphereId:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string

    MomentListResponse:
      type: object
      required: [items, count]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Moment"
        count:
          type: integer

    Sphere:
      type: object
      required: [id, userId, name, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    RouteEntitlement:
      type: object
      required: [path, label, minimumRole, tiers, actions, cards]
      properties:
        path:
          type: string
          description: Frontend route path
        label:
          type: string
          description: Display label
        minimumRole:
          type: string
          enum: [member, premium, admin]
        tiers:
          type: array
          items:
            type: string
        actions:
          type: array
          items:
            type: string
        cards:
          type: array
          items:
            type: string

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
        version:
          type: string
          nullable: true

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns service health status. No authentication required.
      security: []
      tags: [Health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service is degraded or down
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics
      description: Returns Prometheus text-format metrics. No authentication required.
      security: []
      tags: [Observability]
      responses:
        "200":
          description: Metrics in Prometheus text format
          content:
            text/plain:
              schema:
                type: string

  /auth/register:
    post:
      operationId: registerUser
      summary: Register a new user
      description: Creates a new FlashIt account and returns JWT tokens.
      security: []
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRegisterRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthRegisterResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "409":
          description: Email or username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/login:
    post:
      operationId: loginUser
      summary: Authenticate and receive tokens
      description: Validates credentials and returns JWT access + refresh tokens.
      security: []
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/logout:
    post:
      operationId: logoutUser
      summary: Revoke active session
      description: Invalidates the current JWT session.
      tags: [Authentication]
      responses:
        "204":
          description: Session revoked
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /moments:
    get:
      operationId: listMoments
      summary: List moments for authenticated user
      tags: [Moments]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: sphereId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Moments retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MomentListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    post:
      operationId: createMoment
      summary: Create a new moment
      tags: [Moments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMomentRequest"
      responses:
        "201":
          description: Moment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Moment"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /moments/{momentId}:
    get:
      operationId: getMoment
      summary: Get a specific moment
      tags: [Moments]
      parameters:
        - name: momentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Moment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Moment"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Moment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    put:
      operationId: updateMoment
      summary: Update a moment
      tags: [Moments]
      parameters:
        - name: momentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMomentRequest"
      responses:
        "200":
          description: Moment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Moment"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Moment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    delete:
      operationId: deleteMoment
      summary: Delete a moment
      tags: [Moments]
      parameters:
        - name: momentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Moment deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Moment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /spheres:
    get:
      operationId: listSpheres
      summary: List spheres for authenticated user
      tags: [Spheres]
      responses:
        "200":
          description: Spheres retrieved
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Sphere"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /route-entitlements:
    get:
      operationId: getRouteEntitlements
      summary: Get UI route entitlements for authenticated user
      description: |
        Returns the set of frontend routes, actions, and cards that the
        authenticated user is entitled to access, based on their server-side
        role and subscription tier. Client-supplied identity headers are never
        trusted for this computation.
      tags: [Entitlements]
      responses:
        "200":
          description: Entitlements computed successfully
          content:
            application/json:
              schema:
                type: object
                required: [principalId, role, tier, routes]
                properties:
                  principalId:
                    type: string
                  role:
                    type: string
                    enum: [member, premium, admin]
                  tier:
                    type: string
                  routes:
                    type: array
                    items:
                      $ref: "#/components/schemas/RouteEntitlement"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

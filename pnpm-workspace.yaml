packages:
  # Platform TypeScript libraries
  - "platform/typescript/*"
  - "platform/typescript/foundation/*"
  - "platform/typescript/canvas/*"

  # Platform maintainer apps
  - "platform/typescript/ghatana-studio"

  # Product UIs
  - "products/data-cloud/ui"
  - "products/data-cloud/libs/*"
  - "products/aep/ui"
  - "products/aep/gateway"
  - "products/phr/apps/*"

  # YAPPC frontend (existing)
  - "products/yappc/frontend"
  - "products/yappc/frontend/libs/*"
  - "products/yappc/frontend/apps/*"
  - "products/yappc/frontend/web"
  - "products/yappc/tools/*"

  # Shared services
  - "shared-services/*/ui"

  # dcmaar product
  - "products/dcmaar/apps/*"
  - "products/dcmaar/libs/typescript/*"
  - "products/dcmaar/libs/guardian-dashboard-core"

  # audio-video product
  - "products/audio-video/apps/*"
  - "products/audio-video/libs/*"
  - "products/audio-video/libs/typescript/*"
  - "products/audio-video/modules/intelligence/ai-voice/apps/*"
  - "products/audio-video/modules/intelligence/ai-voice/libs/*"

  # flashit product
  - "products/flashit/client/*"
  - "products/flashit/backend/gateway"
  - "products/flashit/libs/ts/*"

  # tutorputor product
  - "products/tutorputor/contracts"
  - "products/tutorputor/libs/*"
  - "products/tutorputor/apps/*"
  - "products/tutorputor/services/*"
  - "products/tutorputor/tools/*"

  # software-org product
  # - 'products/software-org/client/*'
  # - 'products/software-org/services/*'

  # YAPPC frontend extras (nested packages)
  - "products/yappc/frontend/docs-site"
  - "products/yappc/frontend/packages/*"

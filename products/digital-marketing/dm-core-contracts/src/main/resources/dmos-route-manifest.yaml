# Canonical DMOS Route/Action/Capability Manifest
# This is the single source of truth for all route, action, and capability metadata.
# TypeScript and Java artifacts are generated from this manifest.
# Last Updated: 2026-05-09
#
# Schema:
# - routes: List of route definitions
#   - path: URL path pattern
#   - method: HTTP method
#   - capability: Required capability key
#   - actions: List of actions supported by this route
#   - minimumRole: Minimum role required
#   - lifecycle: stable | boundary
# capabilities: Capability definitions
# roles: Role hierarchy definitions

version: "1.0"
product: "DMOS"
generatedAt: "2026-05-09T00:00:00Z"

capabilities:
  dmos.campaigns:
    description: Campaign management and orchestration
    tier: core
  dmos.strategy:
    description: Strategy generation, review, and approvals
    tier: growth
  dmos.budget:
    description: Budget recommendations and approval decisions
    tier: growth
  dmos.reporting:
    description: Analytics, attribution, and ROI/ROAS reporting
    tier: growth
    lifecycle: boundary
  dmos.ai_optimization:
    description: AI-driven optimization and recommendations
    tier: enterprise
    lifecycle: boundary
  dmos.self_marketing:
    description: Product-led growth funnel management
    tier: enterprise
    lifecycle: boundary
  dmos.market_research:
    description: Market research and competitive intelligence
    tier: enterprise
    lifecycle: boundary
  dmos.advanced_channels:
    description: Programmatic advertising and advanced channels
    tier: enterprise
    lifecycle: boundary
  dmos.localization:
    description: Multi-language campaign support
    tier: enterprise
    lifecycle: boundary
  dmos.agency:
    description: Agency operations and multi-client management
    tier: enterprise
    lifecycle: boundary

roles:
  viewer:
    level: 0
    description: Read-only access to workspace data
  brand-manager:
    level: 1
    description: Can manage campaigns and content
  marketing-director:
    level: 2
    description: Can approve budgets and high-level strategy
  exec-sponsor:
    level: 3
    description: Executive oversight and final approvals
  admin:
    level: 4
    description: Full administrative access

routes:
  # Stable Routes - Production Ready
  - path: /v1/workspaces/:workspaceId/dashboard
    method: GET
    capability: null
    actions:
      - view-dashboard
    minimumRole: viewer
    lifecycle: stable
    servlet: DmosWorkspaceServlet

  - path: /v1/workspaces/:workspaceId/approvals
    method: GET
    capability: null
    actions:
      - review-approval
    minimumRole: viewer
    lifecycle: stable
    servlet: DmosApprovalServlet

  - path: /v1/workspaces/:workspaceId/approvals/:requestId
    method: GET
    capability: null
    actions:
      - view-approval-detail
    minimumRole: viewer
    lifecycle: stable
    servlet: DmosApprovalServlet

  - path: /v1/workspaces/:workspaceId/approvals/:requestId/decide
    method: POST
    capability: null
    actions:
      - approve
      - reject
    minimumRole: brand-manager
    lifecycle: stable
    servlet: DmosApprovalServlet

  - path: /v1/workspaces/:workspaceId/ai-actions
    method: GET
    capability: null
    actions:

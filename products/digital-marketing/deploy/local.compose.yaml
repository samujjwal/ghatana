# Local Docker Compose for Digital Marketing product.
# Used by `pnpm kernel product deploy digital-marketing` via the compose-local adapter.
# Images are pre-built by `pnpm kernel product package digital-marketing` (docker-buildx).
# Env vars are loaded from local.env (copy local.env.example → local.env and fill in values).

services:
  digital-marketing-api:
    image: ghatana/digital-marketing-api:local
    build:
      context: ../dm-api
      dockerfile: Dockerfile
    ports:
      - "${DMOS_API_PORT:-8080}:8080"
    environment:
      - DMOS_API_PORT=8080
      - DMOS_ENV=${DMOS_ENV:-development}
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required for Digital Marketing local deploy}
      - DATABASE_USERNAME=${DATABASE_USERNAME:-dmos}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      ghatana.kernel.productUnit: digital-marketing
      ghatana.kernel.surface: backend-api
      ghatana.kernel.lifecycle: "true"
      ghatana.kernel.environment: local
      ghatana.kernel.artifactRef: "kernel://artifacts/digital-marketing/backend-api:local"
      ghatana.kernel.health.livePath: /health/live
      ghatana.kernel.health.readyPath: /health/ready
    networks:
      - digital-marketing-network
    depends_on:
      postgres:
        condition: service_healthy

  digital-marketing-web:
    image: ghatana/digital-marketing-web:local
    build:
      context: ../ui
      dockerfile: Dockerfile
    ports:
      - "${DMOS_WEB_PORT:-5173}:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:${DMOS_API_PORT:-8080}
      - VITE_ENV=${DMOS_ENV:-development}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      ghatana.kernel.productUnit: digital-marketing
      ghatana.kernel.surface: web
      ghatana.kernel.lifecycle: "true"
      ghatana.kernel.environment: local
      ghatana.kernel.artifactRef: "kernel://artifacts/digital-marketing/web:local"
      ghatana.kernel.health.livePath: /
      ghatana.kernel.health.readyPath: /
    networks:
      - digital-marketing-network
    depends_on:
      digital-marketing-api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-digital_marketing}
      - POSTGRES_USER=${DATABASE_USERNAME:-dmos}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - digital-marketing-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-dmos} -d ${POSTGRES_DB:-digital_marketing}"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      ghatana.kernel.productUnit: digital-marketing
      ghatana.kernel.surface: infrastructure
      ghatana.kernel.lifecycle: "false"
      ghatana.kernel.environment: local
    networks:
      - digital-marketing-network

networks:
  digital-marketing-network:
    driver: bridge

volumes:
  digital-marketing-postgres-data:

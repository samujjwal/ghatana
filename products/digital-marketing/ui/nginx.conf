server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long-lived cache headers (content-hashed by Vite)
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health-check endpoint — does not need the SPA fallback
    location = /health/ready {
        access_log off;
        return 200 '{"status":"ready"}';
        add_header Content-Type application/json;
    }

    location = /health/live {
        access_log off;
        return 200 '{"status":"live"}';
        add_header Content-Type application/json;
    }

    # SPA fallback: serve index.html for any path not matched above so that
    # client-side routing (React Router / TanStack Router) handles the route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Disable server token in response headers
    server_tokens off;

    # Gzip compression for text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
}

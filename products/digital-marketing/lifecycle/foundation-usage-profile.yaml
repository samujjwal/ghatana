      evidencePath: ".kernel/evidence/digital-marketing/tracing.json"

validationGates:
  - gate: "kernel-context-validation"
    severity: "P0"
    description: "Kernel context must provide required configuration"
    script: "./scripts/check-dmos-kernel-context.mjs"
  - gate: "data-cloud-rls-validation"
    severity: "P0"
    description: "Data Cloud collections must have RLS policies enabled"
    script: "./scripts/check-dmos-data-cloud-rls.mjs"
  - gate: "google-ads-connector-validation"
    severity: "P0"
    description: "Google Ads connector must pass OAuth and idempotency tests"
    script: "./scripts/check-dmos-google-ads-connector.mjs"
  - gate: "persistence-validation"
    severity: "P0"
    description: "Persistence must enforce tenant isolation and data integrity"
    script: "./scripts/check-dmos-persistence.mjs"
  - gate: "ai-action-log-validation"
    severity: "P0"
    description: "AI actions must be logged with full metadata"
    script: "./scripts/check-dmos-ai-action-log.mjs"
  - gate: "runtime-module-decision"
    severity: "P0"
    description: "Document runtime module requirement or explicit non-requirement"
    script: "./scripts/check-dmos-runtime-module.mjs"


  - requirement: "Previous artifact selection policy"
    implementation: "Rollback must select from known-good artifacts"
    evidencePath: ".kernel/evidence/digital-marketing/rollback-artifact-policy.json"
  - requirement: "Connector state rollback"
    implementation: "Connector OAuth tokens and state must be preserved"
    evidencePath: ".kernel/evidence/digital-marketing/connector-rollback.json"
  - requirement: "Rollback approval contract"
    implementation: "Rollback requires explicit approval with justification"
    evidencePath: ".kernel/evidence/digital-marketing/rollback-approval-contract.json"

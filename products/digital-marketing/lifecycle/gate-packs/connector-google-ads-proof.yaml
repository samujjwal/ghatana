schemaVersion: 1.0.0
productId: digital-marketing
gateId: connector-google-ads-proof
title: Digital Marketing Google Ads connector proof gate
executionMode: evidence-backed
owner: Digital Marketing Platform Team
status: active
description: |
  Validates Google Ads connector execution readiness including credential validation,

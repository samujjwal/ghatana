requiredEvidenceRefs:
  - products/digital-marketing/dm-connector-google-ads/src/test/java
  - products/digital-marketing/dm-kernel-bridge/src/test/java/com/ghatana/digitalmarketing/bridge/NotificationRetryAndDlqTest.java
blockingReasonCodes:
  - requires-connector-google-ads-proof
  - missing-connector-google-ads-proof
validationCommands:
  - ./gradlew :products:digital-marketing:dm-connector-google-ads:test
  - ./gradlew :products:digital-marketing:dm-kernel-bridge:test --tests com.ghatana.digitalmarketing.bridge.NotificationRetryAndDlqTest
notes:
  - Connector proof must remain fail-closed when connector credentials or policy approvals are missing.

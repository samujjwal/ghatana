schemaVersion: 1.0.0
productId: digital-marketing
gateId: registry-validation
title: Digital Marketing registry validation gate
executionMode: evidence-backed
owner: Digital Marketing Platform Team
status: active
description: |
  Validates that the digital-marketing product is correctly registered in the
  canonical product registry with all required metadata, lifecycle profile, and
  surface declarations.
requiredEvidenceRefs:
  - config/canonical-product-registry.json
  - products/digital-marketing/kernel-product.yaml
blockingReasonCodes:
  - requires-registry-validation
  - missing-registry-validation
validationCommands:
  - node scripts/check-product-release-readiness.mjs --products digital-marketing
  - node scripts/check-affected-product-strict-release-profile.mjs --products digital-marketing
notes:
  - Registry validation confirms the product is a known, canonically-registered lifecycle participant.

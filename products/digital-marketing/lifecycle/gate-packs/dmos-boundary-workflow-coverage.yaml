  workflow integration path must be covered per declared domain surface.
requiredEvidenceRefs:
  - products/digital-marketing/dm-domain/src/test
  - products/digital-marketing/dm-api/src/test
blockingReasonCodes:
  - requires-dmos-boundary-workflow-coverage
  - missing-dmos-boundary-workflow-coverage
validationCommands:
  - ./gradlew :products:digital-marketing:dm-domain:test :products:digital-marketing:dm-api:test
notes:
  - DMOS boundary workflow coverage ensures full domain path coverage, not just unit-level mocking.

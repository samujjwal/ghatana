schemaVersion: 1.0.0
productId: digital-marketing
lifecycleProfile: standard-web-api-product
allowExperimentalAdapters: false
# Authoritative Source: docs/kernel/PRODUCT_LIFECYCLE_CONTRACT.md

requiredManifests:
  build:
    - lifecycle-result
    - artifact-manifest
    - lifecycle-health-snapshot
  package:
    - artifact-manifest
    - lifecycle-health-snapshot
  deploy:
    - deployment-manifest
    - lifecycle-health-snapshot
  verify:
    - verify-health-report
    - lifecycle-health-snapshot
  rollback:
    - rollback-manifest
    - lifecycle-health-snapshot

manifestSchemaVersions:
  lifecycle-result: 1.0.0
  artifact-manifest: 1.0.0
  lifecycle-health-snapshot: 1.0.0
  deployment-manifest: 1.0.0
  verify-health-report: 1.0.0
  lifecycle-events: 1.0.0
  rollback-manifest: 1.0.0

plugins:
  audit:
    bindingId: kernel.audit
    required: true
  observability:
    bindingId: kernel.observability
    required: true
  data-access:
    bindingId: kernel.data-access
    required: true
  identity-entitlement:
    bindingId: kernel.identity-entitlement
    required: true
  security:
    bindingId: kernel.security
    required: true
  preview-security:
    bindingId: kernel.preview-security
    required: false

policyPacks:
  security:
    - kernel://policy-packs/web-api-security-baseline
    - kernel://policy-packs/container-image-integrity
  privacy:
    - kernel://policy-packs/non-regulated-customer-data-minimization
    - kernel://policy-packs/marketing-consent-boundary

environments:
  local:
    type: local
    secretsProvider: local-env
    deploymentProvider: compose-local
    safeForDefault: true

telemetry:
  productUnitId: digital-marketing
  correlationScope: product-lifecycle

surfaces:
  backend-api:
    source: products/digital-marketing/dm-api
    runtime: java-service
    adapter: gradle-java-service
    gradleModule: :products:digital-marketing:dm-api
    devTask: runDmosApiServer
    buildTask: build
    testTask: test
    validateTask: check
    packageTask: assemble
    expectedOutputs:
      build:
        - products/digital-marketing/dm-api/build/libs/*.jar
      test:
        - products/digital-marketing/dm-api/build/test-results/test
        - products/digital-marketing/dm-api/build/reports/tests
    health:
      type: http
      livePath: /health/live
      readyPath: /health/ready
      portVariable: DMOS_API_PORT
      defaultPort: 8080

  web:
    source: products/digital-marketing/ui
    runtime: static-web
    adapter: pnpm-vite-react
    packagePath: products/digital-marketing/ui/package.json
    devScript: dev
    validateScript: type-check
    buildScript: build
    testScript: test
    packageScript: build
    expectedOutputs:
      build:
        - products/digital-marketing/ui/dist
        - products/digital-marketing/ui/dist/index.html
    health:
      type: http
      path: /
      portVariable: DMOS_WEB_PORT
      defaultPort: 5173

phases:
  dev:
    defaultSurfaces: [backend-api, web]
    mode: parallel
    gates:
      - dev-environment-check
      - local-dependency-resolution
    artifacts:
      backend-api:
        type: jvm-service
        packaging: jar
        required: false
      web:
        type: static-web-bundle
        packaging: static-files
        required: false
    deployment:
      local:
        adapter: compose-local
        target: compose-local
        composeFile: products/digital-marketing/deploy/local.compose.yaml
        envFile: products/digital-marketing/deploy/local.env
        requireEnvFile: false
    health:
      backend-api:
        type: http
        url: http://localhost:${DMOS_API_PORT:-8080}/health/ready
        retries: 3
        intervalMs: 2000
      web:
        type: http
        url: http://localhost:${DMOS_WEB_PORT:-5173}/
        retries: 3
        intervalMs: 2000
  validate:
    defaultSurfaces: [backend-api, web]
    mode: parallel
    gates:
      - registry-validation
      - manifest-validation
      - lifecycle-contract-validation
      - bridge-compliance
      - dmos-boundary-workflow-coverage
      - marketing-consent-boundary
      - non-regulated-customer-data-minimization
    artifacts:
      backend-api:
        type: validation-report
        packaging: json
        required: true
      web:
        type: validation-report
        packaging: json
        required: true
    deployment: {}
    health:
      backend-api:
        type: http
        url: http://localhost:${DMOS_API_PORT:-8080}/health/ready
        retries: 3
        intervalMs: 2000
      web:
        type: http
        url: http://localhost:${DMOS_WEB_PORT:-5173}/
        retries: 3
        intervalMs: 2000
  test:
    defaultSurfaces: [backend-api, web]
    mode: parallel
    gates:
      - unit-test-coverage
      - integration-test-coverage
      - contract-test-coverage
    artifacts:
      backend-api:
        type: test-report
        packaging: json
        required: true
      web:
        type: test-report
        packaging: json
        required: true
    deployment: {}
    health:
      backend-api:
        type: http
        url: http://localhost:${DMOS_API_PORT:-8080}/health/ready
        retries: 3
        intervalMs: 2000
      web:
        type: http
        url: http://localhost:${DMOS_WEB_PORT:-5173}/
        retries: 3
        intervalMs: 2000
  build:
    defaultSurfaces: [backend-api, web]
    mode: sequential
    gates:
      - backend-check
      - web-route-contract
      - web-typecheck
      - web-bundle-budget
      - web-a11y-readiness
      - web-i18n-readiness
      - container-image-integrity
    artifacts:
      backend-api:
        type: jvm-service
        packaging: jar
        required: true
        paths:
          - products/digital-marketing/dm-api/build/libs/*.jar
      web:
        type: static-web-bundle
        packaging: static-files
        required: true
        paths:
          - products/digital-marketing/ui/dist
    deployment: {}
    health:
      backend-api:
        type: http
        url: http://localhost:${DMOS_API_PORT:-8080}/health/ready
        retries: 3
        intervalMs: 2000
      web:
        type: http
        url: http://localhost:${DMOS_WEB_PORT:-5173}/
        retries: 3
        intervalMs: 2000
  package:
    defaultSurfaces: [backend-api, web]
    mode: sequential
    gates:
      - container-scan
      - image-vulnerability-scan
    artifacts:
      backend-api:
        type: container-image
        packaging: container
        required: true
      web:
        type: container-image
        packaging: container
        required: true
    deployment: {}
    health:
      backend-api:
        type: http
        url: http://localhost:${DMOS_API_PORT:-8080}/health/ready
        retries: 3
        intervalMs: 2000
      web:
        type: http
        url: http://localhost:${DMOS_WEB_PORT:-5173}/
        retries: 3
        intervalMs: 2000
  deploy:
    defaultEnvironment: local
    gates:
      - deployment-readiness
      - environment-configuration-validation
    artifacts:
      backend-api:
        type: deployment-manifest
        packaging: json
        required: true
      web:
        type: deployment-manifest
        packaging: json
        required: true
    deployment:
      local:
        adapter: compose-local
        target: compose-local
        composeFile: products/digital-marketing/deploy/local.compose.yaml
        envFile: products/digital-marketing/deploy/local.env
        envExampleFile: products/digital-marketing/deploy/local.env.example
        requireEnvFile: false
        expectedServices:
          - digital-marketing-api
          - digital-marketing-web
    health:
      backend-api:
        type: http
        url: http://localhost:${DMOS_API_PORT:-8080}/health/ready
        retries: 10
        intervalMs: 3000
      web:
        type: http
        url: http://localhost:${DMOS_WEB_PORT:-5173}/
        retries: 5
        intervalMs: 2000
  promote:
    defaultEnvironment: local
    gates:
      - promotion-readiness
      - target-environment-validation
      - data-migration-validation
    artifacts:
      backend-api:
        type: promotion-manifest
        packaging: json
        required: true
      web:
        type: promotion-manifest
        packaging: json
        required: true
    deployment:
      local:
        adapter: compose-local
        target: compose-local
        composeFile: products/digital-marketing/deploy/local.compose.yaml
        envFile: products/digital-marketing/deploy/local.env
        requireEnvFile: false
        expectedServices:
          - digital-marketing-api
          - digital-marketing-web
    health:
      backend-api:
        type: http
        url: http://localhost:${DMOS_API_PORT:-8080}/health/ready
        retries: 10
        intervalMs: 3000
      web:
        type: http
        url: http://localhost:${DMOS_WEB_PORT:-5173}/
        retries: 5
        intervalMs: 2000
  rollback:
    defaultEnvironment: local
    gates:
      - rollback-readiness
      - rollback-impact-analysis
    artifacts:
      backend-api:
        type: rollback-manifest
        packaging: json
        required: true
      web:
        type: rollback-manifest
        packaging: json
        required: true
    deployment:
      local:
        adapter: compose-local
        target: compose-local
        composeFile: products/digital-marketing/deploy/local.compose.yaml
        envFile: products/digital-marketing/deploy/local.env
        requireEnvFile: false
        expectedServices:
          - digital-marketing-api
          - digital-marketing-web
    health:
      backend-api:
        type: http
        url: http://localhost:${DMOS_API_PORT:-8080}/health/ready
        retries: 10
        intervalMs: 3000
      web:
        type: http
        url: http://localhost:${DMOS_WEB_PORT:-5173}/
        retries: 5
        intervalMs: 2000

approvals:
  deploy:
    - action: deploy:local
      riskLevel: high
      required: true
      requiredApprovers:
        - product-owner
        - release-captain
      source: kernel-product.approvals.deploy
  promote:
    - action: promote:local
      riskLevel: critical
      required: true
      requiredApprovers:
        - product-owner
        - release-captain
      source: kernel-product.approvals.promote
  rollback:
    - action: rollback:local
      riskLevel: critical
      required: true
      requiredApprovers:
        - incident-commander
        - release-captain
      source: kernel-product.approvals.rollback

artifacts:
  build:
    backend-api:
      type: jvm-service
      packaging: jar
      required: true
      paths:
        - products/digital-marketing/dm-api/build/libs/*.jar
    web:
      type: static-web-bundle
      packaging: static-files
      required: true
      paths:
        - products/digital-marketing/ui/dist
  package:
    backend-api:
      type: container-image
      packaging: container
      required: true
    web:
      type: container-image
      packaging: container
      required: true

gates:
  validate:
    - registry-validation
    - manifest-validation
    - lifecycle-contract-validation
    - bridge-compliance
    - dmos-boundary-workflow-coverage
    - marketing-consent-boundary
    - non-regulated-customer-data-minimization
  build:
    - backend-check
    - web-route-contract
    - web-typecheck
    - web-bundle-budget
    - web-a11y-readiness
    - web-i18n-readiness
    - container-image-integrity

# Per-surface package config used by the docker-buildx adapter during the package phase.
package:
  backend-api:
    adapter: docker-buildx
    dockerfile: products/digital-marketing/dm-api/Dockerfile
    context: .
    image: ghatana/digital-marketing-api
    tag: local
    builder: desktop-linux
    timeoutMs: 2700000
    buildArgs: {}
  web:
    adapter: docker-buildx
    dockerfile: products/digital-marketing/ui/Dockerfile
    context: products/digital-marketing/ui
    image: ghatana/digital-marketing-web
    tag: local
    builder: desktop-linux
    timeoutMs: 2700000
    buildArgs: {}

deployment:
  local:
    adapter: compose-local
    target: compose-local
    composeFile: products/digital-marketing/deploy/local.compose.yaml
    envFile: products/digital-marketing/deploy/local.env
    envExampleFile: products/digital-marketing/deploy/local.env.example
    requireEnvFile: false
    expectedServices:
      - digital-marketing-api
      - digital-marketing-web
    healthChecks:
      backend-api:
        type: http
        url: http://localhost:${DMOS_API_PORT:-8080}/health/ready
        retries: 10
        intervalMs: 3000
      web:
        type: http
        url: http://localhost:${DMOS_WEB_PORT:-5173}/
        retries: 5
        intervalMs: 2000

providerModes:
  bootstrap:
    requiredProviders:
      [events, artifacts, health, approvals, provenance, runtimeTruth]
  platform:
    requiredProviders:
      [events, artifacts, health, approvals, provenance, memory, runtimeTruth]

retentionPolicyId: digital-marketing-lifecycle-evidence

verify:
  local:
    adapter: compose-local
    expectedServices:
      - digital-marketing-api
      - digital-marketing-web
    expectedReportFields:
      - schemaVersion
      - productUnitId
      - runId
      - correlationId
      - environment
      - status
      - checkedAt
      - checks
      - evidenceRefs
    healthChecks:
      backend-api:
        type: http
        url: http://localhost:${DMOS_API_PORT:-8080}/health/ready
        retries: 10
        intervalMs: 3000
        timeoutMs: 30000
      web:
        type: http
        url: http://localhost:${DMOS_WEB_PORT:-5173}/
        retries: 5
        intervalMs: 2000
        timeoutMs: 15000

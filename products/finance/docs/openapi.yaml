openapi: 3.0.3
info:
  title: Ghatana Finance API
  version: 1.0.0
  description: Contract-first API surface for finance transaction processing and status queries.
servers:
  - url: /api/v1
paths:
  /transactions:
    post:
      operationId: postTransaction
      summary: Submit and process a financial transaction
      tags: [Transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionRequest"
      responses:
        "200":
          description: Transaction processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "422":
          description: Transaction rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /transactions/{id}:
    get:
      operationId: getTransaction
      summary: Retrieve transaction status by ID (idempotency query)
      tags: [Transactions]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transaction status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionStatusResponse"
components:
  schemas:
    TransactionRequest:
      type: object
      required:
        [amount, currency]
      properties:
        id:
          type: string
          description: Optional transaction ID for idempotency
        amount:
          type: number
          format: double
          description: Transaction amount (must be > 0)
        currency:
          type: string
          description: Currency code (e.g., USD)
        location:
          type: string
        merchantCategory:
          type: string
        counterpartyCountry:
          type: string
        paymentMethod:
          type: string
    TransactionResponse:
      type: object
      required: [transactionId, status, message]
      properties:
        transactionId:
          type: string
        status:
          type: string
          enum: [PROCESSED, REJECTED]
        message:
          type: string
    TransactionStatusResponse:
      type: object
      required: [transactionId, tenantId, message]
      properties:
        transactionId:
          type: string
        tenantId:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string

schemaVersion: 1.0.0
productId: finance
lifecycleProfile: backend-only-java-service
status: draft
executionEnabled: false
migration:
  status: planned
  reason: "Finance lifecycle must map real registered modules and surfaces before execution."

readiness:
  reasonCodes:
    - planned-shape-only
    - requires-regulatory-gates
    - requires-promotion-approval
    - requires-multi-module-build-validation
    - requires-portal-operator-sdk-adapters
  requiredGates:
    - regulatory-compliance
    - risk-controls
    - promotion-approval
    - multi-module-build
  nextRequiredWork:
    - Validate the multi-module Gradle graph before enabling lifecycle execution.
    - Add operator, portal, and SDK adapter evidence only after those surfaces are executable.
  evidenceRefs:
    - products/finance/lifecycle/readiness-evidence.yaml
    - products/finance/lifecycle/gate-packs/regulatory-compliance.yaml
    - products/finance/lifecycle/gate-packs/risk-controls.yaml
    - products/finance/lifecycle/gate-packs/promotion-approval.yaml
    - products/finance/lifecycle/gate-packs/multi-module-build.yaml

surfaces:
  backend-api:
    source: products/finance
    runtime: java-service
    adapter: gradle-java-service
    gradleModule: :products:finance
  worker:
    source: products/finance
    runtime: java-service
    adapter: gradle-java-service
    gradleModule: :products:finance:launcher
  operator:
    source: products/finance/operator-workflows
    runtime: java-service
    adapter: gradle-java-service
    gradleModule: :products:finance:operator-workflows
  portal:
    source: products/finance/regulator-portal
    runtime: java-service
    adapter: gradle-java-service
    gradleModule: :products:finance:regulator-portal
  sdk:
    source: products/finance/platform-sdk
    runtime: java-library
    adapter: gradle-java-library
    gradleModule: :products:finance:platform-sdk

phases:
  dev:
    defaultSurfaces: [backend-api, worker, operator, portal]
    mode: parallel
  build:
    defaultSurfaces: [backend-api, worker, operator, portal, sdk]
    mode: parallel

gates:
  validate:
    - regulatory-compliance
    - risk-controls
    - promotion-approval
    - multi-module-build
  gatePacks:
    regulatory-compliance: products/finance/lifecycle/gate-packs/regulatory-compliance.yaml
    risk-controls: products/finance/lifecycle/gate-packs/risk-controls.yaml
    promotion-approval: products/finance/lifecycle/gate-packs/promotion-approval.yaml
    multi-module-build: products/finance/lifecycle/gate-packs/multi-module-build.yaml

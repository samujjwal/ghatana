id: agent.finance.fraud-detection
name: Fraud Detection Agent
version: "1.0.0"
description: >
  Monitors trade events for suspicious patterns and potential fraud.
  Uses real-time analysis of trade data with configurable detection rules.

metadata:
  level: expert
  domain: finance
  tags:
    - fraud-detection
    - trade-monitoring
    - compliance

capabilities:
  - fraud-detection
  - trade-monitoring
  - anomaly-detection

implementationRef: "finance:fraud-detection"

generator:
  type: gaa-lifecycle
  steps:
    - perceive
    - reason
    - act

governance:
  learningLevel: L2
  adaptationTargets:
    - semantic-facts
    - negative-knowledge
    - episodic-capture
  skillRefs:
    - id: "finance.fraud-detection"
      learningLevel: "L2"
      requiredFor: "response-serving"
  masteryBindings:
    - skillId: "finance.fraud-detection"
      learningLevel: "L2"
      evaluationPackId: "finance-fraud-eval-pack-v1"
      promotionPolicy: "require-eval-pass"
  evaluationRefs:
    - "finance-fraud-eval-pack-v1"

id: agent.finance.risk-assessment
name: Risk Assessment Agent
version: "1.0.0"
description: >
  GAA-pattern agent that performs real-time risk assessment
  on portfolio updates using the PERCEIVE → REASON → ACT → CAPTURE → REFLECT lifecycle.

metadata:
  level: expert
  domain: finance
  tags:
    - risk-management
    - portfolio-analysis
    - gaa-agent

capabilities:
  - risk-assessment
  - portfolio-analysis
  - compliance-check

implementationRef: "finance:risk-assessment"

generator:
  type: gaa-lifecycle
  steps:
    - perceive
    - reason
    - act
    - capture
    - reflect

governance:
  learningLevel: L2
  adaptationTargets:
    - semantic-facts
    - negative-knowledge
    - episodic-capture
  skillRefs:
    - id: "finance.risk-assessment"
      learningLevel: "L2"
      requiredFor: "response-serving"
  masteryBindings:
    - skillId: "finance.risk-assessment"
      learningLevel: "L2"
      evaluationPackId: "finance-risk-eval-pack-v1"
      promotionPolicy: "require-eval-pass"
  evaluationRefs:
    - "finance-risk-eval-pack-v1"

# TutorPutor CI/CD Configuration
# Part of Execution Plan item #50: CI/Lint Enforcement Plan

name: TutorPutor CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Phase 1: Fastify Version Check
  fastify-version-check:
    name: Fastify Version Alignment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Fastify Versions
        run: |
          chmod +x scripts/ci-check-fastify.sh
          ./scripts/ci-check-fastify.sh

  # Phase 2: Contract Drift Detection
  contract-drift-check:
    name: Contract Drift Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Contract Drift
        run: |
          chmod +x scripts/ci-check-contract-drift.sh
          ./scripts/ci-check-contract-drift.sh

  # Phase 3: TypeScript Compilation
  type-check:
    name: TypeScript Type Checking
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - apps/tutorputor-web
          - apps/tutorputor-admin
          - apps/tutorputor-mobile
          - libs/animator
          - libs/simulation-engine
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Type check ${{ matrix.module }}
        run: pnpm --filter ${{ matrix.module }} run type-check
        continue-on-error: true

  # Phase 4: Database Migration Check
  db-migration-check:
    name: Database Migration Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tutorputor
          POSTGRES_PASSWORD: tutorputor
          POSTGRES_DB: tutorputor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://tutorputor:tutorputor@localhost:5432/tutorputor_test
          REDIS_URL: redis://localhost:6379
        run: |
          pnpm --filter @tutorputor/db run migrate
          pnpm --filter @tutorputor/db run migrate:status

  # Phase 5: Test Coverage
  test-coverage:
    name: Test Coverage Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Prevent new @ts-nocheck usage
        run: |
          ACTUAL=$(rg -l "@ts-nocheck" products/tutorputor --glob '!**/node_modules/**' | sort || true)
          ALLOWED=$(cat products/tutorputor/config/ts-nocheck-allowlist.txt)
          if ! diff -u <(printf "%s\n" "$ALLOWED") <(printf "%s\n" "$ACTUAL"); then
            echo "❌ @ts-nocheck usage changed. Update allowlist only after removing debt or approving a narrowly scoped exception."
            exit 1
          fi
      - name: Run tests with coverage
        run: pnpm run test:coverage
      - name: Check coverage threshold (80%)
        run: |
          COVERAGE=$(cat coverage/lcov-report/index.json | jq -r '.total.lines.pct')
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below threshold 80%"
            exit 1
          else
            echo "✅ Coverage $COVERAGE% meets threshold 80%"
          fi

  # Phase 5b: Simulation Domain Correctness (path-filtered)
  # Only runs when the simulation engine or evaluation modules are touched.
  simulation-correctness:
    name: Simulation Domain Correctness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect simulation engine changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            simulation:
              - 'products/tutorputor/services/tutorputor-platform/src/modules/simulation/**'
              - 'products/tutorputor/services/tutorputor-platform/src/modules/content/evaluation/**'
              - 'products/tutorputor/services/tutorputor-platform/src/modules/content/simulation-correctness/**'

      - uses: pnpm/action-setup@v3
        if: steps.filter.outputs.simulation == 'true'
        with:
          version: 9

      - uses: actions/setup-node@v4
        if: steps.filter.outputs.simulation == 'true'
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.filter.outputs.simulation == 'true'
        run: pnpm install --frozen-lockfile --filter @tutorputor/platform...

      - name: Run simulation correctness suites
        if: steps.filter.outputs.simulation == 'true'
        run: |
          pnpm --filter @tutorputor/platform exec vitest run \
            src/modules/simulation/correctness/__tests__/ \
            --reporter=verbose
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-that-is-at-least-32-chars-long
          STRIPE_SECRET_KEY: stripe_test_placeholder_secret

      - name: Run content evaluation / misconception benchmark suites
        if: steps.filter.outputs.simulation == 'true'
        run: |
          pnpm --filter @tutorputor/platform exec vitest run \
            src/modules/content/evaluation/__tests__/ \
            --reporter=verbose
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-that-is-at-least-32-chars-long
          STRIPE_SECRET_KEY: stripe_test_placeholder_secret

      - name: Skip message (no simulation engine changes detected)
        if: steps.filter.outputs.simulation != 'true'
        run: echo "No simulation engine files changed — skipping domain correctness suites."

  # Phase 6: Build Artifacts
  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: [type-check, test-coverage, simulation-correctness]
    strategy:
      matrix:
        app:
          - apps/tutorputor-web
          - apps/tutorputor-admin
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Build ${{ matrix.app }}
        run: pnpm --filter ${{ matrix.app }} run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-dist
          path: ${{ matrix.app }}/dist
          retention-days: 7

  # Phase 7: Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.tutorputor.com
    steps:
      - uses: actions/checkout@v4
      - name: Download web app artifact
        uses: actions/download-artifact@v4
        with:
          name: apps/tutorputor-web-dist
          path: ./web-dist
      - name: Download admin app artifact
        uses: actions/download-artifact@v4
        with:
          name: apps/tutorputor-admin-dist
          path: ./admin-dist
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add actual deployment commands here (e.g., AWS S3, Vercel, Kubernetes)
          # This is a placeholder for the actual deployment logic
      - name: Run smoke tests
        run: |
          echo "Running smoke tests on staging..."
          # Add smoke test commands here

  # Phase 8: Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://app.tutorputor.com
    steps:
      - uses: actions/checkout@v4
      - name: Download web app artifact
        uses: actions/download-artifact@v4
        with:
          name: apps/tutorputor-web-dist
          path: ./web-dist
      - name: Download admin app artifact
        uses: actions/download-artifact@v4
        with:
          name: apps/tutorputor-admin-dist
          path: ./admin-dist
      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add actual deployment commands here
          # This should include blue-green deployment or canary release
      - name: Run smoke tests
        run: |
          echo "Running smoke tests on production..."
          # Add smoke test commands here
      - name: Notify deployment success
        if: success()
        run: |
          echo "Deployment successful! Notifying team..."
          # Add notification logic (Slack, email, etc.)
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed! Initiating rollback..."
          # Add rollback logic here

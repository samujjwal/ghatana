schemaVersion: "1.0.0"
id: "tutorputor"
lifecycleProfile: "standard-web-api-product"
status: draft
executionEnabled: false

readiness:
  reasonCodes:
    - planned-shape-only
    - requires-content-safety
    - requires-learner-data-privacy
    - requires-model-output-evaluation
  requiredGates:
    - content-safety
    - learner-data-privacy
    - model-output-evaluation
  nextRequiredWork:
    - Keep Tutorputor lifecycle disabled until content moderation and learner privacy evidence are executable.
    - Add model evaluation evidence contracts before enabling lifecycle execution.

surfaces:
  - type: "backend-api"
    adapter: "gradle-java-service"
    config:
      gradleModule: "products:tutorputor:delivery:gateway"
  - type: "web"
    adapter: "pnpm-vite-react"
    config:
      packagePath: "products/tutorputor/delivery/ui"

phases:
  dev:
    defaultSurfaces: ["backend-api", "web"]
    mode: "parallel"
  
  validate:
    defaultSurfaces: ["backend-api", "web"]
    mode: "parallel"
  
  test:
    defaultSurfaces: ["backend-api", "web"]
    mode: "parallel"
  
  build:
    defaultSurfaces: ["backend-api", "web"]
    mode: "sequential"
  
  package:
    defaultSurfaces: ["backend-api", "web"]
    mode: "parallel"
  
  deploy:
    defaultSurfaces: ["backend-api", "web"]
    mode: "sequential"

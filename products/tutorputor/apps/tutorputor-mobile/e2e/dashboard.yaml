appId: com.tutorputor.mobile
---
# Dashboard Flow
# Tests the simplified dashboard: Continue Learning card, Start Something New, Quick Actions
- launchApp

# Dashboard renders without crash
- assertVisible: "Learn"

# Wait for loading to complete
- waitForAnimationToEnd

# Continue Learning section visible
- assertVisible: "Continue Learning"

# Quick Actions visible
- assertVisible: "Quick Actions"

# AI Help button is visible
- assertVisible:
    id: "ai-help-button"

# Tap AI Help to open AI Tutor
- tapOn:
    id: "ai-help-button"

# AI Tutor opens
- assertVisible: "AI Tutor"

# Go back
- back

# Back on Dashboard
- assertVisible: "Continue Learning"

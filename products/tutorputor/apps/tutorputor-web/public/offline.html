<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4F46E5">
    <title>Offline - TutorPutor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem;
        }

        .offline-container {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .offline-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: #f3f4f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .offline-icon svg {
            width: 40px;
            height: 40px;
            color: #6b7280;
        }

        h1 {
            color: #1f2937;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            color: #6b7280;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #4F46E5;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .retry-btn:hover {
            background: #4338CA;
        }

        .retry-btn:active {
            transform: scale(0.98);
        }

        .downloaded-content {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
        }

        .downloaded-content h2 {
            font-size: 1rem;
            color: #374151;
            margin-bottom: 0.75rem;
        }

        .downloaded-link {
            display: block;
            color: #4F46E5;
            text-decoration: none;
            padding: 0.5rem;
            border-radius: 0.25rem;
            transition: background-color 0.2s;
        }

        .downloaded-link:hover {
            background: #f3f4f6;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #6b7280;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
        }

        .status-dot.online {
            background: #10b981;
        }
    </style>
</head>

<body>
    <div class="offline-container">
        <div class="offline-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
            </svg>
        </div>

        <h1>You're Offline</h1>
        <p>
            It looks like you've lost your internet connection.
            Don't worry - you can still access your downloaded modules!
        </p>

        <button class="retry-btn" onclick="window.location.reload()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Try Again
        </button>

        <div class="downloaded-content" id="downloaded-content" style="display: none;">
            <h2>📚 Downloaded Modules</h2>
            <div id="module-list">
                <!-- Populated by JavaScript -->
            </div>
        </div>

        <div class="status-indicator">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Offline</span>
        </div>
    </div>

    <script>
        // Check connection status
        function updateConnectionStatus() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');

            if (navigator.onLine) {
                dot.classList.add('online');
                text.textContent = 'Back Online!';
                // Reload after a short delay
                setTimeout(() => window.location.reload(), 1000);
            } else {
                dot.classList.remove('online');
                text.textContent = 'Offline';
            }
        }

        // Listen for connection changes
        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);

        // Initial check
        updateConnectionStatus();

        // Try to show downloaded modules from IndexedDB
        async function showDownloadedModules() {
            try {
                const dbRequest = indexedDB.open('tutorputor-offline', 1);

                dbRequest.onsuccess = function (event) {
                    const db = event.target.result;

                    if (!db.objectStoreNames.contains('modules')) {
                        return;
                    }

                    const tx = db.transaction('modules', 'readonly');
                    const store = tx.objectStore('modules');
                    const request = store.getAll();

                    request.onsuccess = function () {
                        const modules = request.result;

                        if (modules && modules.length > 0) {
                            const container = document.getElementById('downloaded-content');
                            const list = document.getElementById('module-list');

                            container.style.display = 'block';
                            list.innerHTML = modules.map(m =>
                                `<a href="/modules/${m.id}" class="downloaded-link">📖 ${m.title}</a>`
                            ).join('');
                        }
                    };
                };
            } catch (e) {
                console.log('Could not load downloaded modules:', e);
            }
        }

        showDownloadedModules();
    </script>
</body>

</html>

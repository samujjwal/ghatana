openapi: 3.1.0
info:
  title: TutorPutor Content Generation API
  version: 1.0.0
  description: |
    API for generating educational content, managing content libraries, and tracking learning paths.
    
    ## Authentication
    All endpoints require Bearer token authentication. Include the token in the Authorization header:
    ```
    Authorization: Bearer <access_token>
    ```
    
    ## Error Handling
    The API uses standard HTTP status codes and returns errors in the canonical envelope:
    ```json
    {
      "error": {
        "code": "ERROR_CODE",
        "message": "Human-readable error message",
        "details": { "field": "Additional context" }
      },
      "traceId": "correlation-id-for-debugging",
      "timestamp": "2026-05-06T00:00:00.000Z",
      "statusCode": 400
    }
    ```
    
    ## Rate Limiting
    - Tier 1 (default): 100 requests per minute
    - Tier 2 (premium): 1000 requests per minute
    
    Check response headers for rate limit info:
    - `X-RateLimit-Limit`: Maximum requests per window
    - `X-RateLimit-Remaining`: Requests remaining in current window
    - `X-RateLimit-Reset`: Unix timestamp when limit resets
  contact:
    name: TutorPutor API Support
    url: https://tutorputor.ghatana.io/support
    email: api-support@tutorputor.io
  license:
    name: Proprietary
    url: https://tutorputor.ghatana.io/license
  x-logo:
    url: https://tutorputor.ghatana.io/logo.png
servers:
  - url: https://api.tutorputor.io/v1
    description: Production environment
    variables:
      region:
        default: us-east-1
        enum:
          - us-east-1
          - eu-west-1
          - ap-southeast-1
  - url: https://staging-api.tutorputor.io/v1
    description: Staging environment

tags:
  - name: Content Generation
    description: Generate educational content from topics
  - name: Content Libraries
    description: Manage content collections and libraries
  - name: Learning Paths
    description: Create and track user learning sequences
  - name: Topic Claims
    description: Manage topic-specific knowledge claims

paths:
  /generation/requests:
    post:
      summary: Create a new generation request
      operationId: createGenerationRequest
      x-tutorputor-contract:
        requestType: CreateGenerationRequestInput
        responseType: GenerationRequest
        serviceInterface: TutorPutorOpenApiService
        serviceMethod: createGenerationRequest
        backendOwner: services/tutorputor-platform/src/modules/content/generation/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Content Generation
      description: |
        Creates a new generation request in DRAFT status. This is the first step
        in the generation-request lifecycle. After creation, the request must be
        planned, then executed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGenerationRequestInput'
      responses:
        '201':
          description: Generation request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationRequest'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

    get:
      summary: List generation requests
      operationId: listGenerationRequests
      x-tutorputor-contract:
        requestType: ListGenerationRequestsQuery
        responseType: ListGenerationRequestsResponse
        serviceInterface: TutorPutorOpenApiService
        serviceMethod: listGenerationRequests
        backendOwner: services/tutorputor-platform/src/modules/content/generation/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Content Generation
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [DRAFT, PLANNING, PLANNED, EXECUTING, COMPLETED, FAILED, CANCELLED]
          description: Filter by request status
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: List of generation requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListGenerationRequestsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /generation/requests/{requestId}:
    get:
      summary: Get generation request with jobs
      operationId: getGenerationRequest
      x-tutorputor-contract:
        requestType: null
        responseType: GenerationRequestWithJobs
        serviceInterface: TutorPutorOpenApiService
        serviceMethod: getGenerationRequest
        backendOwner: services/tutorputor-platform/src/modules/content/generation/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Content Generation
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Generation request retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationRequestWithJobs'
        '404':
          description: Generation request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /generation/requests/{requestId}/plan:
    post:
      summary: Run planning phase
      operationId: planGenerationRequest
      x-tutorputor-contract:
        requestType: null
        responseType: PlanningResult
        serviceInterface: TutorPutorOpenApiService
        serviceMethod: planGenerationRequest
        backendOwner: services/tutorputor-platform/src/modules/content/generation/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Content Generation
      description: |
        Runs the planning phase for a generation request. Determines which artifacts
        to generate, risk assessment, review path, and cost estimation. Transitions
        the request from DRAFT to PLANNED and creates GenerationJob records.
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Planning completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanningResult'
        '400':
          description: Planning failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Generation request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /generation/requests/{requestId}/execute:
    post:
      summary: Start execution
      operationId: executeGenerationRequest
      x-tutorputor-contract:
        requestType: null
        responseType: ExecutionStartResult
        serviceInterface: TutorPutorOpenApiService
        serviceMethod: executeGenerationRequest
        backendOwner: services/tutorputor-platform/src/modules/content/generation/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Content Generation
      description: |
        Starts execution of a planned generation request. Dispatches ready jobs
        to the queue and begins the generation lifecycle.
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Execution started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionStartResult'
        '400':
          description: Execution failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /generation/requests/{requestId}/cancel:
    post:
      summary: Cancel a request
      operationId: cancelGenerationRequest
      x-tutorputor-contract:
        requestType: null
        responseType: GenerationRequest
        serviceInterface: TutorPutorOpenApiService
        serviceMethod: cancelGenerationRequest
        backendOwner: services/tutorputor-platform/src/modules/content/generation/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Content Generation
      description: |
        Cancels a generation request that hasn't completed yet. Cancels any
        pending/running jobs.
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Request cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationRequest'
        '400':
          description: Cancellation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /generation/requests/{requestId}/stream:
    get:
      summary: Stream execution snapshot
      operationId: streamGenerationExecution
      x-tutorputor-contract:
        requestType: StreamExecutionQuery
        responseType: text/event-stream
        serviceInterface: TutorPutorOpenApiService
        serviceMethod: streamGenerationExecution
        backendOwner: services/tutorputor-platform/src/modules/content/generation/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Content Generation
      description: |
        Server-sent events stream for generation execution. Emits snapshot, job_result,
        telemetry, summary, and done events. Requires Redis for live updates.
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
        - name: includeOutput
          in: query
          required: false
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          description: Generation request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /generation/requests/{requestId}/results:
    post:
      summary: Record batch results
      operationId: recordGenerationResults
      x-tutorputor-contract:
        requestType: RecordResultsInput
        responseType: RecordResultsSummary
        serviceInterface: TutorPutorOpenApiService
        serviceMethod: recordGenerationResults
        backendOwner: services/tutorputor-platform/src/modules/content/generation/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Content Generation
      description: |
        Records batch job execution results. Called by workers to report completion
        of generation jobs. Requires service authentication.
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordResultsInput'
      responses:
        '200':
          description: Results recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordResultsSummary'
        '400':
          description: Recording failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /generation/infer-intent:
    post:
      summary: AI-powered intent inference
      operationId: inferGenerationIntent
      x-tutorputor-contract:
        requestType: InferIntentInput
        responseType: InferIntentResult
        serviceInterface: TutorPutorOpenApiService
        serviceMethod: inferGenerationIntent
        backendOwner: services/tutorputor-platform/src/modules/content/generation/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Content Generation
      description: |
        Uses AI to infer generation intent from a topic. Suggests domain, difficulty,
        target grades, and learning objectives.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InferIntentInput'
      responses:
        '200':
          description: Intent inferred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InferIntentResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Intent inference failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /generation/notifications/stream:
    get:
      summary: SSE stream for job status updates
      operationId: streamGenerationNotifications
      x-tutorputor-contract:
        requestType: null
        responseType: text/event-stream
        serviceInterface: TutorPutorOpenApiService
        serviceMethod: streamGenerationNotifications
        backendOwner: services/tutorputor-platform/src/modules/content/generation/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Content Generation
      description: |
        Server-sent events stream for generation job status notifications.
        Currently emits connection and ping events.
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /libraries:
    get:
      summary: List content libraries
      operationId: listLibraries
      x-tutorputor-contract:
        requestType: ListLibrariesQuery
        responseType: ListLibrariesResponse
        serviceInterface: TutorPutorOpenApiService
        serviceMethod: listLibraries
        backendOwner: services/tutorputor-platform/src/modules/content/routes.ts
        typedClient: apps/tutorputor-web/src/api/contentApi.ts
      tags:
        - Content Libraries
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: search
          in: query
          required: false
          description: Search libraries by name
          schema:
            type: string
      responses:
        '200':
          description: List of libraries
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContentLibrary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      summary: Create content library
      operationId: createLibrary
      x-tutorputor-contract:
        requestType: CreateLibraryRequest
        responseType: ContentLibrary
        serviceInterface: TutorPutorOpenApiService
        serviceMethod: createLibrary
        backendOwner: services/tutorputor-platform/src/modules/content/routes.ts
        typedClient: apps/tutorputor-web/src/api/contentApi.ts
      tags:
        - Content Libraries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLibraryRequest'
      responses:
        '201':
          description: Library created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentLibrary'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /learning/dashboard:
    get:
      summary: Get learner dashboard
      operationId: getDashboard
      x-tutorputor-contract:
        requestType: null
        responseType: DashboardSummary
        serviceInterface: LearningService
        serviceMethod: getDashboard
        backendOwner: services/tutorputor-platform/src/modules/learning/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Learning
      description: Get learner dashboard with active enrollments and recommendations
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /learning/enrollments:
    post:
      summary: Enroll in a module
      operationId: enrollInModule
      x-tutorputor-contract:
        requestType: EnrollInModuleRequest
        responseType: Enrollment
        serviceInterface: LearningService
        serviceMethod: enrollInModule
        backendOwner: services/tutorputor-platform/src/modules/learning/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Learning
      description: Enroll current user in a module
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollInModuleRequest'
      responses:
        '201':
          description: Enrollment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /learning/enrollments/{id}/progress:
    patch:
      summary: Update enrollment progress
      operationId: updateEnrollmentProgress
      x-tutorputor-contract:
        requestType: UpdateProgressRequest
        responseType: Enrollment
        serviceInterface: LearningService
        serviceMethod: updateProgress
        backendOwner: services/tutorputor-platform/src/modules/learning/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Learning
      description: Update progress for an enrollment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProgressRequest'
      responses:
        '200':
          description: Progress updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /learning/profile:
    get:
      summary: Get learner profile
      operationId: getLearnerProfile
      x-tutorputor-contract:
        requestType: null
        responseType: LearnerProfile
        serviceInterface: LearnerProfileService
        serviceMethod: getOrCreateProfile
        backendOwner: services/tutorputor-platform/src/modules/learning/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Learning
      description: Get or create the current learner profile
      responses:
        '200':
          description: Learner profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearnerProfile'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /learning/profile/preferences:
    patch:
      summary: Update learner preferences
      operationId: updateLearnerPreferences
      x-tutorputor-contract:
        requestType: UpdatePreferencesRequest
        responseType: LearnerProfile
        serviceInterface: LearnerProfileService
        serviceMethod: updatePreferences
        backendOwner: services/tutorputor-platform/src/modules/learning/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Learning
      description: Update learner preferences with audit tracking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePreferencesRequest'
      responses:
        '200':
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearnerProfile'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /learning/pathways/generate:
    post:
      summary: Generate learning pathway
      operationId: generatePathway
      x-tutorputor-contract:
        requestType: GeneratePathwayRequest
        responseType: LearningPath
        serviceInterface: PathwaysService
        serviceMethod: generatePathway
        backendOwner: services/tutorputor-platform/src/modules/learning/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Pathways
      description: Generate a personalized learning path based on a goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePathwayRequest'
      responses:
        '200':
          description: Pathway generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningPath'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /learning/pathways/active:
    get:
      summary: Get active pathway
      operationId: getActivePathway
      x-tutorputor-contract:
        requestType: null
        responseType: LearningPath
        serviceInterface: PathwaysService
        serviceMethod: getPathwayForUser
        backendOwner: services/tutorputor-platform/src/modules/learning/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Pathways
      description: Get the current active learning path for the user
      responses:
        '200':
          description: Active pathway
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningPath'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /learning/pathways:
    post:
      summary: Create learning pathway
      operationId: createPathway
      x-tutorputor-contract:
        requestType: CreatePathwayRequest
        responseType: LearningPath
        serviceInterface: PathwaysService
        serviceMethod: createPathway
        backendOwner: services/tutorputor-platform/src/modules/learning/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Pathways
      description: Create a new active learning path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePathwayRequest'
      responses:
        '201':
          description: Pathway created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningPath'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /learning/pathways/advance:
    post:
      summary: Advance pathway
      operationId: advancePathway
      x-tutorputor-contract:
        requestType: AdvancePathwayRequest
        responseType: LearningPath
        serviceInterface: PathwaysService
        serviceMethod: advancePathway
        backendOwner: services/tutorputor-platform/src/modules/learning/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Pathways
      description: Advance the current pathway by marking a module as complete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdvancePathwayRequest'
      responses:
        '200':
          description: Pathway advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningPath'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /learning/my-insights:
    get:
      summary: Get learner engagement insights
      operationId: getMyInsights
      x-tutorputor-contract:
        requestType: null
        responseType: LearnerInsights
        serviceInterface: LearningService
        serviceMethod: getMyInsights
        backendOwner: services/tutorputor-platform/src/modules/learning/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Learning
      description: Return the authenticated learner's engagement score with actionable suggestions
      responses:
        '200':
          description: Learner insights
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearnerInsights'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /engagement/gamification/progress:
    get:
      summary: Get gamification progress
      operationId: getGamificationProgress
      x-tutorputor-contract:
        requestType: null
        responseType: GamificationProgress
        serviceInterface: GamificationService
        serviceMethod: getProgress
        backendOwner: services/tutorputor-platform/src/modules/engagement/gamification/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Engagement
      description: Get current user's gamification progress including points, level, and achievements
      responses:
        '200':
          description: Gamification progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GamificationProgress'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /engagement/gamification/leaderboard:
    get:
      summary: Get leaderboard
      operationId: getLeaderboard
      x-tutorputor-contract:
        requestType: LeaderboardQuery
        responseType: Leaderboard
        serviceInterface: GamificationService
        serviceMethod: getLeaderboard
        backendOwner: services/tutorputor-platform/src/modules/engagement/gamification/routes.ts
        typedClient: apps/tutorputor-web/src/api/tutorputorClient.ts
      tags:
        - Engagement
      description: Get leaderboard rankings for the current tenant
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Leaderboard data
          content:

components:
  schemas:
    CreateGenerationRequestInput:
      type: object
      required:
        - title
        - domain
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
          description: Title of the generation request
          example: "Introduction to Newton's Laws"
        description:
          type: string
          maxLength: 2000
          description: Optional description
        domain:
          type: string
          enum:
            - MATH
            - SCIENCE
            - TECH
            - ENGINEERING
            - MEDICINE
            - HEALTH
            - BUSINESS
            - MANAGEMENT
            - ECONOMICS
            - COMPUTER_SCIENCE
            - INTERDISCIPLINARY
          description: Domain for the content
        conceptId:
          type: string
          description: Optional concept ID to link to
        targetGrades:
          type: array
          items:
            type: string
          description: Target grade levels
        requestConfig:
          type: object
          additionalProperties: true
          description: Optional configuration for the generation

    GenerationRequest:
      type: object
      required:
        - id
        - tenantId
        - title
        - domain
        - status
        - requestedBy
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
        title:
          type: string
        description:
          type: string
        domain:
          type: string
          enum:
            - MATH
            - SCIENCE
            - TECH
            - ENGINEERING
            - MEDICINE
            - HEALTH
            - BUSINESS
            - MANAGEMENT
            - ECONOMICS
            - COMPUTER_SCIENCE
            - INTERDISCIPLINARY
        conceptId:
          type: string
        targetGrades:
          type: array
          items:
            type: string
        requestedBy:
          type: string
        requestConfig:
          type: object
          additionalProperties: true
        status:
          type: string
          enum:
            - DRAFT
            - PLANNING
            - PLANNED
            - EXECUTING
            - COMPLETED
            - FAILED
            - CANCELLED
        plannedAssets:
          type: array
          items:
            type: object
        artifactNeeds:
          type: object
          additionalProperties:
            type: integer
        riskLevel:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
        riskFactors:
          type: array
          items:
            type: string
        reviewPath:
          type: string
          enum:
            - auto_publish
            - human_review
            - expert_review
        estimatedCost:
          type: object
        routingDecision:
          type: object
        totalJobs:
          type: integer
        completedJobs:
          type: integer
        failedJobs:
          type: integer
        plannedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GenerationJob:
      type: object
      required:
        - id
        - requestId
        - jobType
        - status
      properties:
        id:
          type: string
          format: uuid
        requestId:
          type: string
        jobType:
          type: string
          enum:
            - claim
            - explainer
            - worked_example
            - simulation
            - animation
            - assessment
            - evaluation
        targetRef:
          type: string
        inputPrompt:
          type: string
        parameters:
          type: object
          additionalProperties: true
        status:
          type: string
          enum:
            - PENDING
            - RUNNING
            - COMPLETED
            - FAILED
            - CANCELLED
        progress:
          type: integer
          minimum: 0
          maximum: 100
        outputAssetId:
          type: string
        outputData:
          type: object
          additionalProperties: true
        diagnostics:
          type: object
          additionalProperties: true
        errorMessage:
          type: string
        retryCount:
          type: integer
        maxRetries:
          type: integer
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GenerationRequestWithJobs:
      allOf:
        - $ref: '#/components/schemas/GenerationRequest'
        - type: object
          properties:
            jobs:
              type: array
              items:
                $ref: '#/components/schemas/GenerationJob'

    ListGenerationRequestsResponse:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GenerationRequest'
        total:
          type: integer

    PlanningResult:
      type: object
      required:
        - requestId
        - plannedAssets
        - artifactNeeds
        - riskLevel
        - reviewPath
        - estimatedCost
        - totalJobs
      properties:
        requestId:
          type: string
        plannedAssets:
          type: array
          items:
            type: object
        artifactNeeds:
          type: object
          additionalProperties:
            type: integer
        riskLevel:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
        riskFactors:
          type: array
          items:
            type: string
        reviewPath:
          type: string
          enum:
            - auto_publish
            - human_review
            - expert_review
        estimatedCost:
          type: object
        routingDecision:
          type: object
        totalJobs:
          type: integer

    ExecutionStartResult:
      type: object
      required:
        - request
        - dispatch
      properties:
        request:
          $ref: '#/components/schemas/GenerationRequestWithJobs'
        dispatch:
          type: object
          properties:
            queuedJobs:
              type: array
              items:
                type: string

    RecordResultsInput:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              jobId:
                type: string
              status:
                type: string
                enum:
                  - completed
                  - failed
              outputAssetId:
                type: string
              outputData:
                type: object
                additionalProperties: true
              diagnostics:
                type: object
                additionalProperties: true
              errorMessage:
                type: string
              durationMs:
                type: integer

    RecordResultsSummary:
      type: object
      properties:
        completed:
          type: integer
        failed:
          type: integer
        total:
          type: integer

    InferIntentInput:
      type: object
      required:
        - topic
      properties:
        topic:
          type: string
          minLength: 1
          maxLength: 200
        preferredDomain:
          type: string

    InferIntentResult:
      type: object
      properties:
        data:
          type: object
          properties:
            domain:
              type: string
            difficulty:
              type: string
            targetGrades:
              type: array
              items:
                type: string
            learningObjectives:
              type: array
              items:
                type: string

    StreamExecutionQuery:
      type: object
      properties:
        includeOutput:
          type: boolean
          default: true

    ContentLibrary:
      type: object
      required:
        - id
        - name
        - itemCount
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        itemCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        isPublic:
          type: boolean
          default: false

    DashboardSummary:
      type: object
      required:
        - user
        - currentEnrollments
        - recommendedModules
      properties:
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            displayName:
              type: string
            avatarUrl:
              type: string
        currentEnrollments:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              moduleId:
                type: string
              moduleSlug:
                type: string
              moduleTitle:
                type: string
              status:
                type: string
                enum: ["active", "completed", "paused", "expired"]
              progressPercent:
                type: number
              timeSpentSeconds:
                type: integer
        recommendedModules:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              slug:
                type: string
              description:
                type: string
              estimatedMinutes:
                type: integer
              difficulty:
                type: string

    Enrollment:
      type: object
      required:
        - id
        - moduleId
        - userId
        - status
        - progressPercent
        - enrolledAt
      properties:
        id:
          type: string
        moduleId:
          type: string
        moduleSlug:
          type: string
        moduleTitle:
          type: string
        userId:
          type: string
        status:
          type: string
          enum: ["active", "completed", "paused", "expired"]
        progressPercent:
          type: number
          minimum: 0
          maximum: 100
        currentSectionId:
          type: string
        timeSpentSeconds:
          type: integer
        enrolledAt:
          type: string
          format: date-time
        lastAccessedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    LearnerProfile:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        tenantId:
          type: string
        preferredDifficulty:
          type: string
          enum: ["BEGINNER", "EASY", "MEDIUM", "HARD", "EXPERT"]
        preferredModality:
          type: string
          enum: ["VISUAL", "AUDITORY", "KINESTHETIC", "READING", "MIXED"]
        preferredPacing:
          type: string
          enum: ["SELF_PACED", "GUIDED", "ADAPTIVE", "INTENSIVE"]
        preferredSessionMinutes:
          type: integer
        adjustedDifficulty:
          type: string
        masteryEvidence:
          type: array
          items:
            type: object
        knowledgeGaps:
          type: array
          items:
            type: object

    LearnerInsights:
      type: object
      required:
        - engagementScore
        - tier
        - headline
        - tips
        - showTeacherCta
        - computedAt
      properties:
        engagementScore:
          type: number
          minimum: 0
          maximum: 100
        tier:
          type: string
          enum: ["high", "medium", "low"]
        headline:
          type: string
        tips:
          type: array
          items:
            type: string
        showTeacherCta:
          type: boolean
        computedAt:
          type: string
          format: date-time

    EnrollInModuleRequest:
      type: object
      required:
        - moduleId
      properties:
        moduleId:
          type: string

    UpdateProgressRequest:
      type: object
      required:
        - progressPercent
      properties:
        progressPercent:
          type: number
          minimum: 0
          maximum: 100
        timeSpentSecondsDelta:
          type: integer
          minimum: 0

    UpdatePreferencesRequest:
      type: object
      properties:
        preferredDifficulty:
          type: string
          enum: ["BEGINNER", "EASY", "MEDIUM", "HARD", "EXPERT"]
        preferredModality:
          type: string
          enum: ["VISUAL", "AUDITORY", "KINESTHETIC", "READING", "MIXED"]
        preferredPacing:
          type: string
          enum: ["SELF_PACED", "GUIDED", "ADAPTIVE", "INTENSIVE"]
        preferredSessionMinutes:
          type: integer
        notificationFrequency:
          type: string
        reason:
          type: string

    GeneratePathwayRequest:
      type: object
      required:
        - goal
      properties:
        goal:
          type: string
        constraints:
          type: object
          properties:
            maxModules:
              type: integer
            maxDurationMinutes:
              type: integer

    CreatePathwayRequest:
      type: object
      required:
        - title
        - goal
        - moduleIds
      properties:
        title:
          type: string
        goal:
          type: string
        moduleIds:
          type: array
          items:
            type: string

    AdvancePathwayRequest:
      type: object
      required:
        - completedModuleId
      properties:
        completedModuleId:
          type: string

    GamificationProgress:
      type: object
      properties:
        userId:
          type: string
        points:
          type: integer
        level:
          type: integer
        experienceToNextLevel:
          type: integer
        streakDays:
          type: integer
        achievements:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              description:
                type: string
              earnedAt:

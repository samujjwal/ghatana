syntax = "proto3";

package ghatana.tutorputor.v1;

option java_multiple_files = true;
option java_package = "com.ghatana.tutorputor.contracts.v1";
option java_outer_classname = "ContentGenerationProto";

// ============================================================================
// Content Generation Service
// ============================================================================

service ContentGenerationService {
  // Generate learning claims for a topic
  rpc GenerateClaims(GenerateClaimsRequest) returns (GenerateClaimsResponse);
  
  // Analyze content needs for a claim (what types of content it requires)
  rpc AnalyzeContentNeeds(AnalyzeContentNeedsRequest) returns (AnalyzeContentNeedsResponse);
  
  // Generate examples for a claim
  rpc GenerateExamples(GenerateExamplesRequest) returns (GenerateExamplesResponse);
  
  // Generate simulation manifest for a claim
  rpc GenerateSimulation(GenerateSimulationRequest) returns (GenerateSimulationResponse);
  
  // Generate animation specification for a claim
  rpc GenerateAnimation(GenerateAnimationRequest) returns (GenerateAnimationResponse);
}

// ============================================================================
// Generate Claims
// ============================================================================

message GenerateClaimsRequest {
  string request_id = 1;
  string tenant_id = 2;
  string topic = 3;
  GradeLevel grade_level = 4;
  Domain domain = 5;
  int32 max_claims = 6; // Default: 5
  map<string, string> context = 7; // Additional context
}

message GenerateClaimsResponse {
  string request_id = 1;
  repeated Claim claims = 2;
  ValidationResult validation = 3;
  GenerationMetadata metadata = 4;
}

message Claim {
  string claim_ref = 1; // "C1", "C2", etc.
  string text = 2;
  BloomLevel bloom_level = 3;
  int32 order_index = 4;
  ContentNeeds content_needs = 5; // What content this claim needs
}

// ============================================================================
// Content Needs Analysis
// ============================================================================

message AnalyzeContentNeedsRequest {
  string request_id = 1;
  string claim_text = 2;
  BloomLevel bloom_level = 3;
  GradeLevel grade_level = 4;
  Domain domain = 5;
}

message AnalyzeContentNeedsResponse {
  string request_id = 1;
  ContentNeeds content_needs = 2;
  string rationale = 3; // AI explanation of why these content types are needed
}

message ContentNeeds {
  ExampleNeeds examples = 1;
  SimulationNeeds simulation = 2;
  AnimationNeeds animation = 3;
}

message ExampleNeeds {
  bool required = 1;
  repeated ExampleType types = 2;
  int32 count = 3;
  float necessity = 4; // 0-1 score
  string rationale = 5;
}

message SimulationNeeds {
  bool required = 1;
  InteractionType interaction_type = 2;
  Complexity complexity = 3;
  float necessity = 4;
  string rationale = 5;
}

message AnimationNeeds {
  bool required = 1;
  AnimationType animation_type = 2;
  int32 duration_seconds = 3;
  float necessity = 4;
  string rationale = 5;
}

// ============================================================================
// Generate Examples
// ============================================================================

message GenerateExamplesRequest {
  string request_id = 1;
  string tenant_id = 2;
  string claim_text = 3;
  string claim_ref = 4;
  GradeLevel grade_level = 5;
  Domain domain = 6;
  repeated ExampleType types = 7;
  int32 count = 8;
}

message GenerateExamplesResponse {
  string request_id = 1;
  repeated Example examples = 2;
  ValidationResult validation = 3;
}

message Example {
  string example_id = 1;
  ExampleType type = 2;
  string title = 3;
  string description = 4;
  string problem_statement = 5; // Optional
  string solution_content = 6;
  repeated string key_learning_points = 7;
  string real_world_connection = 8; // Optional
  int32 order_index = 9;
}

// ============================================================================
// Generate Simulation
// ============================================================================

message GenerateSimulationRequest {
  string request_id = 1;
  string tenant_id = 2;
  string claim_text = 3;
  string claim_ref = 4;
  GradeLevel grade_level = 5;
  Domain domain = 6;
  InteractionType interaction_type = 7;
  Complexity complexity = 8;
}

message GenerateSimulationResponse {
  string request_id = 1;
  SimulationManifest manifest = 2;
  ValidationResult validation = 3;
}

message SimulationManifest {
  string manifest_id = 1;
  string name = 2;
  string description = 3;
  repeated Entity entities = 4;
  SimulationConfig config = 5;
  repeated Goal goals = 6;
  repeated ControllableParam controllable_params = 7;
}

message Entity {
  string entity_id = 1;
  string type = 2; // "BALL", "BOX", "PLATFORM", etc.
  map<string, string> properties = 3;
}

message SimulationConfig {
  map<string, string> physics_settings = 1;
  map<string, string> visual_settings = 2;
}

message Goal {
  string goal_id = 1;
  string description = 2;
  map<string, string> success_criteria = 3;
}

message ControllableParam {
  string param_id = 1;
  string name = 2;
  string type = 3; // "slider", "toggle", "input"
  double min_value = 4;
  double max_value = 5;
  double default_value = 6;
  string unit = 7;
}

// ============================================================================
// Generate Animation
// ============================================================================

message GenerateAnimationRequest {
  string request_id = 1;
  string tenant_id = 2;
  string claim_text = 3;
  string claim_ref = 4;
  AnimationType animation_type = 5;
  int32 duration_seconds = 6;
}

message GenerateAnimationResponse {
  string request_id = 1;
  AnimationSpec animation = 2;
  ValidationResult validation = 3;
}

message AnimationSpec {
  string animation_id = 1;
  string title = 2;
  string description = 3;
  AnimationType type = 4;
  int32 duration_seconds = 5;
  repeated Keyframe keyframes = 6;
  map<string, string> config = 7;
}

message Keyframe {
  int32 time_ms = 1;
  string description = 2;
  map<string, string> properties = 3;
}

// ============================================================================
// Common Types
// ============================================================================

message ValidationResult {
  bool valid = 1;
  float confidence_score = 2; // 0-1
  repeated ValidationIssue issues = 3;
  repeated string suggestions = 4;
}

message ValidationIssue {
  Severity severity = 1;
  string message = 2;
  string field = 3;
}

message GenerationMetadata {
  string model_name = 1;
  int32 tokens_used = 2;
  int32 generation_time_ms = 3;
  float temperature = 4;
  string prompt_hash = 5;
}

// ============================================================================
// Enums
// ============================================================================

enum GradeLevel {
  GRADE_LEVEL_UNSPECIFIED = 0;
  K_2 = 1;
  GRADE_3_5 = 2;
  GRADE_6_8 = 3;
  GRADE_9_12 = 4;
  UNDERGRADUATE = 5;
  GRADUATE = 6;
}

enum Domain {
  DOMAIN_UNSPECIFIED = 0;
  MATH = 1;
  SCIENCE = 2;
  TECH = 3;
  ENGINEERING = 4;
  ARTS = 5;
  LANGUAGE = 6;
}

enum BloomLevel {
  BLOOM_LEVEL_UNSPECIFIED = 0;
  REMEMBER = 1;
  UNDERSTAND = 2;
  APPLY = 3;
  ANALYZE = 4;
  EVALUATE = 5;
  CREATE = 6;
}

enum ExampleType {
  EXAMPLE_TYPE_UNSPECIFIED = 0;
  REAL_WORLD = 1;
  PROBLEM_SOLVING = 2;
  ANALOGY = 3;
  CASE_STUDY = 4;
}

enum InteractionType {
  INTERACTION_TYPE_UNSPECIFIED = 0;
  PARAMETER_EXPLORATION = 1;
  PREDICTION = 2;
  CONSTRUCTION = 3;
}

enum Complexity {
  COMPLEXITY_UNSPECIFIED = 0;
  LOW = 1;
  MEDIUM = 2;
  HIGH = 3;
}

enum AnimationType {
  ANIMATION_TYPE_UNSPECIFIED = 0;
  TWO_D = 1;
  THREE_D = 2;
  TIMELINE = 3;
}

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  INFO = 1;
  WARNING = 2;
  ERROR = 3;
}

services:
  postgres:
    image: postgres:15-alpine
    container_name: tutorputor-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tutorputor
    ports:
      - "${TUTORPUTOR_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tutorputor-redis
    ports:
      - "${TUTORPUTOR_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  content-generation:
    profiles: ["app-stack"]
    image: eclipse-temurin:21-jdk
    container_name: tutorputor-content-generation-dev
    working_dir: /workspace
    environment:
      GRPC_PORT: "50051"
      HEALTH_PORT: "8081"
      OLLAMA_URL: "http://host.docker.internal:11434"
      ORG_GRADLE_JVMARGS: "-Xms512m -Xmx1g -XX:MaxMetaspaceSize=384m"
    command:
      - sh
      - -lc
      - chmod +x ./gradlew && ./gradlew --no-daemon -Dorg.gradle.jvmargs="$$ORG_GRADLE_JVMARGS" :products:tutorputor:services:tutorputor-content-generation:run
    ports:
      - "50051:50051"
      - "8081:8081"
    volumes:
      - ../..:/workspace
      - tutorputor_gradle_cache:/root/.gradle
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  platform:
    profiles: ["app-stack"]
    image: node:22-bookworm-slim
    container_name: tutorputor-platform-dev
    working_dir: /workspace
    command:
      - sh
      - -lc
      - >-
        corepack enable &&
        pnpm install --frozen-lockfile &&
        PORT=7105
        DATABASE_URL=postgresql://postgres:postgres@postgres:5432/tutorputor
        TUTORPUTOR_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/tutorputor
        REDIS_URL=redis://redis:6379
        JWT_SECRET=test-secret-do-not-use-in-prod-1234567890
        STRIPE_SECRET_KEY=stripe_test_placeholder_secret
        TUTORPUTOR_LOCAL_PROFILE=${TUTORPUTOR_LOCAL_PROFILE:-full}
        CONTENT_WORKER_ENABLED=true
        CONTENT_QUEUE_DISABLED=false
        GRPC_SERVER_ADDRESS=content-generation:50051
        TRUST_PROXY_AUTH_HEADERS=${TRUST_PROXY_AUTH_HEADERS:-false}
        TRUST_PROXY_AUTH_SHARED_SECRET=${TRUST_PROXY_AUTH_SHARED_SECRET:-tutorputor-internal-dev-proxy-secret}
        pnpm --dir products/tutorputor/services/tutorputor-platform dev
    ports:
      - "7105:7105"
    volumes:
      - ../..:/workspace
      - tutorputor_node_modules:/workspace/node_modules
      - tutorputor_pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      content-generation:
        condition: service_healthy

  api-gateway:
    profiles: ["app-stack"]
    image: node:22-bookworm-slim
    container_name: tutorputor-api-gateway-dev
    working_dir: /workspace
    command:
      - sh
      - -lc
      - >-
        corepack enable &&
        pnpm install --frozen-lockfile &&
        PORT=3200
        DATABASE_URL=postgresql://postgres:postgres@postgres:5432/tutorputor
        TUTORPUTOR_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/tutorputor
        REDIS_URL=redis://redis:6379
        JWT_SECRET=test-secret-do-not-use-in-prod-1234567890
        STRIPE_SECRET_KEY=stripe_test_placeholder_secret
        CONTENT_WORKER_ENABLED=false
        CONTENT_QUEUE_DISABLED=false
        GRPC_SERVER_ADDRESS=content-generation:50051
        TRUST_PROXY_AUTH_HEADERS=${TRUST_PROXY_AUTH_HEADERS:-false}
        TRUST_PROXY_AUTH_SHARED_SECRET=${TRUST_PROXY_AUTH_SHARED_SECRET:-tutorputor-internal-dev-proxy-secret}
        pnpm --dir products/tutorputor/apps/api-gateway dev
    ports:
      - "3200:3200"
    volumes:
      - ../..:/workspace
      - tutorputor_node_modules:/workspace/node_modules
      - tutorputor_pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      content-generation:
        condition: service_healthy

  web:
    profiles: ["app-stack"]
    image: node:22-bookworm-slim
    container_name: tutorputor-web-dev
    working_dir: /workspace
    command:
      - sh
      - -lc
      - >-
        corepack enable &&
        pnpm install --frozen-lockfile &&
        VITE_API_BASE_URL=http://127.0.0.1:3200/api
        pnpm --dir products/tutorputor/apps/tutorputor-web dev --host 0.0.0.0 --port 3201
    ports:
      - "3201:3201"
    volumes:
      - ../..:/workspace
      - tutorputor_node_modules:/workspace/node_modules
      - tutorputor_pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      api-gateway:
        condition: service_started

  admin:
    profiles: ["app-stack"]
    image: node:22-bookworm-slim
    container_name: tutorputor-admin-dev
    working_dir: /workspace
    command:
      - sh
      - -lc
      - >-
        corepack enable &&
        pnpm install --frozen-lockfile &&
        VITE_API_BASE_URL=http://127.0.0.1:3200
        VITE_DEV_AUTH_BYPASS=true
        VITE_TUTORPUTOR_TENANT_ID=default
        VITE_TRUST_PROXY_AUTH_SHARED_SECRET=${TRUST_PROXY_AUTH_SHARED_SECRET:-tutorputor-internal-dev-proxy-secret}
        pnpm --dir products/tutorputor/apps/tutorputor-admin dev --host 0.0.0.0 --port 3202
    ports:
      - "3202:3202"
    volumes:
      - ../..:/workspace
      - tutorputor_node_modules:/workspace/node_modules
      - tutorputor_pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      api-gateway:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  tutorputor_node_modules:
  tutorputor_pnpm_store:
  tutorputor_gradle_cache:

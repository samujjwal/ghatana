name: TutorPutor CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'products/tutorputor/**'
      - '.gitea/workflows/tutorputor-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'products/tutorputor/**'

env:
  REGISTRY: ghcr.io
  IMAGE_PLATFORM: ghcr.io/ghatana/tutorputor/platform
  IMAGE_GATEWAY: ghcr.io/ghatana/tutorputor/api-gateway

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Lint & Type-check
  # ─────────────────────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "9"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @ghatana/tutorputor-platform... --filter @ghatana/tutorputor-api-gateway...

      - name: Type-check platform
        run: pnpm --filter @ghatana/tutorputor-platform typecheck

      - name: Lint platform
        run: pnpm --filter @ghatana/tutorputor-platform lint

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Unit Tests
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tutorputor
          POSTGRES_PASSWORD: tutorputor
          POSTGRES_DB: tutorputor_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "9"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @ghatana/tutorputor-platform...

      - name: Run Prisma migrations (test DB)
        run: pnpm --filter @ghatana/tutorputor-platform db:migrate:test
        env:
          DATABASE_URL: postgresql://tutorputor:tutorputor@localhost:5432/tutorputor_test

      - name: Run tests
        run: pnpm --filter @ghatana/tutorputor-platform test --coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://tutorputor:tutorputor@localhost:5432/tutorputor_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-that-is-at-least-32-chars-long

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: products/tutorputor/services/tutorputor-platform/coverage/

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Build Docker images
  # ─────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (platform)
        id: meta-platform
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PLATFORM }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push tutorputor-platform
        uses: docker/build-push-action@v6
        with:
          context: .
          file: products/tutorputor/services/tutorputor-platform/Dockerfile
          push: true
          tags: ${{ steps.meta-platform.outputs.tags }}
          labels: ${{ steps.meta-platform.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (api-gateway)
        id: meta-gateway
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_GATEWAY }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: products/tutorputor/apps/api-gateway/Dockerfile
          push: true
          tags: ${{ steps.meta-gateway.outputs.tags }}
          labels: ${{ steps.meta-gateway.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Security Scan
  # ─────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [build-images]
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PLATFORM }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif

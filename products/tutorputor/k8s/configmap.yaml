apiVersion: v1
kind: ConfigMap
metadata:
  name: tutorputor-config
  namespace: tutorputor
data:
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"
  MAX_UPLOAD_SIZE: "10485760"
  SESSION_SECRET: ""
  JWT_SECRET: ""
  ENCRYPTION_KEY: ""
  # Feature flags
  ENABLE_AI_TUTORING: "true"
  ENABLE_SIMULATIONS: "true"
  ENABLE_MARKETPLACE: "true"
  ENABLE_ANALYTICS: "true"
  # Rate limiting
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW: "60000"
  # Cache settings
  CACHE_TTL: "3600"
  CACHE_MAX_SIZE: "1000"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: tutorputor-web
  namespace: tutorputor
  labels:
    app: tutorputor-web
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: tutorputor-web
  template:
    metadata:
      labels:
        app: tutorputor-web
        version: v1
    spec:
      containers:
        - name: tutorputor-web
          image: ghcr.io/ghatana/tutorputor-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tutorputor-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tutorputor-secrets
                  key: redis-url
            - name: AUTH_GATEWAY_URL
              value: "https://auth.ghatana.internal"
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: tutorputor-secrets
                  key: sentry-dsn
              optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
              readOnly: false
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: tutorputor-uploads-pvc
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - tutorputor-web
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: tutorputor-web
  namespace: tutorputor
  labels:
    app: tutorputor-web
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: tutorputor-web
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tutorputor-web-hpa
  namespace: tutorputor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tutorputor-web
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tutorputor-uploads-pvc
  namespace: tutorputor
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: nfs-client
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tutorputor-exports-pvc
  namespace: tutorputor
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: nfs-client

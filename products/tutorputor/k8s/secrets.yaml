apiVersion: v1
kind: Secret
metadata:
  name: tutorputor-secrets
  namespace: tutorputor
type: Opaque
stringData:
  # Database
  database-url: "postgresql://tutorputor:REPLACE_WITH_PASSWORD@postgres:5432/tutorputor"
  # Redis
  redis-url: "redis://:REPLACE_WITH_PASSWORD@redis:6379"
  # Auth
  jwt-secret: "REPLACE_WITH_SECURE_RANDOM_STRING"
  session-secret: "REPLACE_WITH_SECURE_RANDOM_STRING"
  encryption-key: "REPLACE_WITH_SECURE_RANDOM_STRING"
  # External services
  sentry-dsn: ""
  # AI services
  ollama-url: "http://ollama:11434"
  # Storage
  aws-access-key-id: ""
  aws-secret-access-key: ""
  aws-s3-bucket: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: tutorputor-tls
  namespace: tutorputor
type: kubernetes.io/tls
data:
  tls.crt: LS0tLS1CRUdJTi...
  tls.key: LS0tLS1CRUdJTi...

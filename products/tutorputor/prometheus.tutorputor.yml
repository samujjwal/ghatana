# Prometheus Configuration for Tutorputor — AI Tutoring Platform
# Scrapes metrics from all Tutorputor services (main app, content-studio gRPC)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "tutorputor-production"
    environment: "prod"
    product: "tutorputor"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Alert rule files
rule_files:
  - "ci/monitoring/alerts/*.yml"

scrape_configs:
  # Tutorputor Main Application (Node.js Prometheus client on port 9090)
  - job_name: "tutorputor-app"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["tutorputor-app:9090"]
        labels:
          service: "tutorputor-app"
          tier: "application"
          runtime: "nodejs"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: "${1}"

  # Content-Studio-Agents gRPC Service (health/metrics on port 8096)
  - job_name: "content-studio-agents"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["content-studio-agents:8096"]
        labels:
          service: "content-studio-agents"
          tier: "application"
          runtime: "jvm"
          protocol: "grpc"

  # Tutorputor AI Agents Service (Spring Boot Actuator)
  - job_name: "tutorputor-ai-agents"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["tutorputor-ai-agents:8080"]
        labels:
          service: "tutorputor-ai-agents"
          tier: "application"
          runtime: "jvm"

  # Tutorputor Content-Studio gRPC API Service (Spring Boot Actuator)
  - job_name: "tutorputor-content-studio-grpc"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["tutorputor-content-studio-grpc:8081"]
        labels:
          service: "tutorputor-content-studio-grpc"
          tier: "application"
          runtime: "jvm"
          protocol: "grpc"

  # PostgreSQL Exporter
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgresql"
          tier: "database"

  # Redis Exporter
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"
          tier: "cache"

  # Node Exporter (system-level metrics)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "node-exporter"
          tier: "infrastructure"

  # Prometheus Self-Monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"
          tier: "monitoring"

groups:
  - name: tutorputor_alerts
    interval: 30s
    rules:
      # High Error Rate
      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          service: platform
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} for the last 5 minutes"
          
      # High Latency
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          service: platform
        annotations:
          summary: "High request latency detected"
          description: "P95 latency is {{ $value }}s for the last 5 minutes"
          
      # High Database Latency
      - alert: HighDatabaseLatency
        expr: |
          histogram_quantile(0.95, rate(db_query_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "High database latency detected"
          description: "P95 database query latency is {{ $value }}s for the last 5 minutes"
          
      # Low Cache Hit Rate
      - alert: LowCacheHitRate
        expr: |
          rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])) < 0.7
        for: 10m
        labels:
          severity: warning
          service: cache
        annotations:
          summary: "Low cache hit rate detected"
          description: "Cache hit rate is {{ $value | humanizePercentage }} for the last 10 minutes"
          
      # Queue Backlog
      - alert: QueueBacklog
        expr: |
          bullmq_queue_depth > 1000
        for: 10m
        labels:
          severity: warning
          service: queue
        annotations:
          summary: "Queue backlog detected"
          description: "Queue {{ $labels.queue }} has {{ $value }} jobs waiting"
          
      # High Queue Failure Rate
      - alert: HighQueueFailureRate
        expr: |
          rate(bullmq_jobs_failed_total[5m]) / rate(bullmq_jobs_completed_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          service: queue
        annotations:
          summary: "High queue failure rate detected"
          description: "Queue {{ $labels.queue }} failure rate is {{ $value | humanizePercentage }}"
          
      # Database Connection Pool Exhaustion
      - alert: DatabasePoolExhaustion
        expr: |
          db_pool_active_connections / db_pool_max_connections > 0.9
        for: 5m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "Database connection pool near exhaustion"
          description: "{{ $value | humanizePercentage }} of pool is in use"
          
      # Replica Lag
      - alert: ReplicaLag
        expr: |
          pg_replication_lag_seconds > 30
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "Database replica lag detected"
          description: "Replica {{ $labels.replica }} is {{ $value }}s behind primary"
          
      # Memory Usage High
      - alert: HighMemoryUsage
        expr: |
          process_resident_memory_bytes / process_resident_memory_bytes_limit > 0.9
        for: 10m
        labels:
          severity: warning
          service: platform
        annotations:
          summary: "High memory usage detected"
          description: "{{ $value | humanizePercentage }} of memory limit is in use"
          
      # Service Down
      - alert: ServiceDown
        expr: |
          up{job="tutorputor-platform"} == 0
        for: 1m
        labels:
          severity: critical
          service: platform
        annotations:
          summary: "Service is down"
          description: "Service {{ $labels.instance }} has been down for more than 1 minute"
          
      # SSL Certificate Expiring
      - alert: SSLCertificateExpiring
        expr: |
          ssl_cert_not_after - time() < 86400 * 30
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "SSL certificate expiring soon"
          description: "SSL certificate for {{ $labels.domain }} expires in {{ $value | humanizeDuration }}"
          
      # Disk Space Low
      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.2
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "Low disk space"
          description: "{{ $labels.instance }} has {{ $value | humanizePercentage }} disk space available"

    severity: "P0"
    description: "Kernel context must provide DistributedCachePort"
    script: "./scripts/check-tutorputor-kernel-context.mjs"
  - gate: "data-cloud-rls-validation"
    severity: "P0"
    description: "Data Cloud collections must have RLS policies enabled"
    script: "./scripts/check-tutorputor-data-cloud-rls.mjs"
  - gate: "learning-progress-cache-validation"
    severity: "P0"
    description: "Distributed cache must be production-grade (not in-memory)"
    script: "./scripts/check-tutorputor-learning-progress-cache.mjs"
  - gate: "assessment-integrity-validation"
    severity: "P0"
    description: "Assessment integrity must have audit trail and anti-cheating measures"
    script: "./scripts/check-tutorputor-assessment-integrity.mjs"
  - gate: "accessibility-validation-gate"
    severity: "P0"
    description: "UI must pass WCAG 2.1 AA accessibility validation"
    script: "./scripts/check-tutorputor-accessibility.mjs"
  - gate: "ferpa-compliance-validation"
    severity: "P0"
    description: "FERPA compliance requirements must be met"

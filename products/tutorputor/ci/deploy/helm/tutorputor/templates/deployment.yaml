apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tutorputor.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tutorputor.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "tutorputor.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "tutorputor.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "tutorputor.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: platform
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.app.nodeEnv | quote }}
            - name: PORT
              value: {{ .Values.app.port | default "3000" | quote }}
            - name: METRICS_PORT
              value: {{ .Values.app.metricsPort | default "9090" | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.app.logLevel | quote }}
            - name: DEFAULT_TENANT
              value: {{ .Values.app.defaultTenant | quote }}
            - name: RATE_LIMIT_WINDOW
              value: {{ .Values.app.rateLimitWindow | quote }}
            - name: RATE_LIMIT_MAX
              value: {{ .Values.app.rateLimitMax | quote }}
            - name: CONTENT_WORKER_ENABLED
              value: {{ .Values.app.contentWorkerEnabled | quote }}
            - name: AI_PROXY_ENABLED
              value: {{ .Values.app.aiProxyEnabled | quote }}
            - name: SIMULATION_ENABLED
              value: {{ .Values.app.simulationEnabled | quote }}
            # Platform Shared Services
            - name: AUTH_GATEWAY_URL
              value: {{ .Values.platformServices.authGatewayUrl | quote }}
            - name: AI_REGISTRY_URL
              value: {{ .Values.platformServices.aiRegistryUrl | quote }}
            - name: FEATURE_STORE_URL
              value: {{ .Values.platformServices.featureStoreUrl | quote }}
            # Secrets
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: jwt-secret
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: sentry-dsn
                  optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}

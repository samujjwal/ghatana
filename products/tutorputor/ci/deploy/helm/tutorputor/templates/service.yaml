apiVersion: v1
kind: Service
metadata:
  name: {{ include "tutorputor.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tutorputor.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "tutorputor.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: {{ .Values.service.metricsPort }}
      protocol: TCP

replicaCount: 5

image:
  # Must be overridden in CI: --set image.tag=sha-<commit>
  tag: ""

app:
  logLevel: warn
  nodeEnv: production

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"
  hosts:
    - host: api.tutorputor.ghatana.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: tutorputor-platform-tls
      hosts:
        - api.tutorputor.ghatana.com

platformServices:
  authGatewayUrl: "http://auth-gateway.platform.svc.cluster.local:8080"
  aiRegistryUrl: "http://ai-registry.platform.svc.cluster.local:8080"
  featureStoreUrl: "http://feature-store.platform.svc.cluster.local:8080"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 15
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: tutorputor

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

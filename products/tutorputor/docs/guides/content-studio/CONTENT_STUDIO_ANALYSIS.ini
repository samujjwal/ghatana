End‑to‑End Flows & APIs

The CONTENT_STUDIO_E2E_FLOWS.md document outlines complete user flows and API interactions
github.com
:

Browsing & Searching – authors fetch experiences (GET /experiences), filter by status or grade and search by keywords.

Similar content search – the wizard posts a search query to /experiences/search-similar, which uses vector search to return existing experiences.

AI generation – the wizard calls /ai/generate with a prompt and grade settings; the service returns variations for all grades.

Experience creation – posting to /experiences with generated content writes the experience and returns the saved object and validation result.

Refinement – updating claims, evidence or tasks triggers PUT /experiences/:id and may call /experiences/:id/refine for AI suggestions.

Validation – authors can explicitly call /experiences/:id/validate or rely on automatic validation; results are stored and can be retrieved via /experiences/:id/validation-history.

Publishing – posting to /experiences/:id/publish publishes the experience; optional simulation IDs may be attached.

Analytics & Review – endpoints provide analytics (/experiences/:id/analytics), progress metrics and review queues for editorial oversight.

The flows emphasise guardrails and human‑in‑the‑loop review; for high‑risk prompts or validation failures, experiences are routed to review queues rather than published automatically
github.com
.

Evidence‑Based Content Analysis & Enhancements

An evidence‑based analysis document highlights gaps in the current generation workflow
github.com
:

No automatic example generation – claims lack concrete examples; the ContentExample model is linked to domain concepts rather than learning claims
github.com
.

Missing per‑claim simulations – only a single simulationManifestId exists at the experience level; simulations aren’t generated for each claim
github.com
.

No animation integration – an animation generation endpoint exists but isn’t called during content generation
github.com
.

Evidence types don’t map to content delivery – EvidenceType describes the measurement (prediction vs outcome, parameter targeting, etc.) but not whether content should be delivered via example, simulation or animation
github.com
.

To address these gaps, the document proposes:

Enhanced claim prompts that specify content needs (whether examples, simulations or animations are required, how many examples and their types)
github.com
.

Auto‑generation functions for examples, simulations and animations (generateExamplesForClaim, generateSimulationForClaim, generateAnimationForClaim) which call appropriate AI or simulation services and persist the content
github.com
.

New data models (ClaimExample, ClaimSimulation, ClaimAnimation) with fields linking them to claims, storing titles, descriptions, configuration and interaction type
github.com
.

An enhanced workflow where claims are generated with content needs, then examples/simulations/animations are produced in parallel, followed by evidence and tasks generation that references the generated content
github.com
.

Implementing these enhancements will ensure that every claim is backed by rich, actionable content and deliver an immersive learning experience.


Data Models & Contracts

The Content Studio uses TypeScript interfaces defined in contracts/v1/content-studio.ts to describe its data model
github.com
. Key structures include:

LearningExperience – core unit containing metadata (id, tenantId, slug, title, description, status, version, gradeAdaptation), lists of claims, estimated time, keywords, optional module/simulation IDs and timestamps
github.com
.

LearningClaim – inherits from a generic Claim and adds experienceId, evidenceRequirements, tasks, masteryThreshold and orderIndex
github.com
.

LearningEvidence – extends Evidence, linking to a claim, specifying minimum score and weight
github.com
.

ExperienceTask – defines tasks (prediction, simulation, explanation, construction) with instructions, evidence IDs and estimated minutes
github.com
.

ValidationCheck and ExperienceValidationResult – capture validation outcomes including pillar, severity, messages and overall score
github.com
.

AIGenerationRequest/Result and service request interfaces for creating, refining, publishing and adapting experiences
github.com
.

These contracts ensure strong typing between the UI, API gateway and backend service.

Service Architecture
AI Engine & Generation Pipeline

The AI engine (services/tutorputor-content-studio/src/ai-engine.ts) defines prompt templates for various operations
github.com
. Core functions include:

generateClaims – constructs a prompt instructing the model to produce 3–5 learning claims using Bloom’s taxonomy appropriate for the specified grade; returns claims with content‑needs metadata (e.g., number and types of examples, simulation requirements, animation requirements). The evidence analysis doc recommends enhancing this prompt to explicitly request content‑delivery recommendations
github.com
.

generateEvidence – asks the model to produce 1–2 evidence definitions per claim with types such as prediction_vs_outcome, parameter_targeting, explanation_quality and construction_artifact
github.com
. It currently lacks mapping to content types, which is identified as a gap
github.com
.

generateTasks – instructs the model to create tasks for each claim; tasks can be of type prediction, simulation, explanation or construction. Additional functions generate examples, simulations and animations via external AI proxies (e.g., example-generator.ts, simulation-claim-linker.ts, animation-generator.ts).

adaptGrade – rewrites an experience’s claims, evidence and tasks for a new grade range
github.com
.

validateAlignment and getSuggestions – check alignment with curriculum standards and produce suggestions for improvement.

The AI engine relies on PromptPreparationService to sanitize prompts, detect injection patterns and PII, classify risk and attach context; it returns a RefinedPrompt used for caching
github.com
. PromptCacheService stores outputs keyed by prompt hash to avoid re‑generation
github.com
.

Validation Engine

The validation engine implements 5 pillars
github.com
:

Educational – verifies that claims exist, Bloom levels progress logically, and grade appropriateness is met.

Experiential – checks that tasks exist, vary in type, include time estimates and cover evidence requirements.

Safety – ensures no personal data or harmful content and checks author attribution.

Technical – validates slugs, unique identifiers and cross‑references.

Accessibility – ensures tasks and examples have appropriate descriptions and meet reading level criteria.

Each check yields a pass/fail, severity and suggestion; pillar scores contribute to an overall validation status and determine whether publishing is allowed.

Content Studio Service

The service (service.ts) orchestrates calls to the AI engine and validation engine:

createExperience – given a user description, it calls AI generation methods to produce claims, evidence and tasks, stores them in the database, records AI logs and performs an initial validation
github.com
.

refineExperience – loads the current experience, obtains AI suggestions based on user feedback, updates the experience and re‑validates
github.com
.

validateExperience – triggers validation on demand and stores the result
github.com
.

publishExperience – ensures the experience has passed validation and updates status to published; optionally sets simulationId
github.com
.

adaptGradeLevel – orchestrates grade adaptation using AI and updates the experience accordingly
github.com
.

Simulation & Example Generation

Helper services integrate with external providers:

simulation-claim-linker.ts – builds prompts for simulation generation using SimAuthorService and links the resulting manifest to claims. It includes fallback templates and performs validation of simulation outputs.

example-generator.ts – uses AIProxyService to generate examples for claims across various types (real‑world, problem solving, analogies, etc.), persisting them in the database.

animation-generator.ts – constructs prompts for creating educational animations (visualising concepts in 30–60 seconds) and stores them with metadata.


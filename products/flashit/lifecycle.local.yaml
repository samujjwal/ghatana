schemaVersion: "1.0.0"
environment: "local"

surfaces:
  backend-api:
    dev:
      enabled: true
      port: 8080
    build:
      enabled: true
    deploy:
      enabled: true
      port: 8080
      replicas: 1
  
  web:
    dev:
      enabled: true
      port: 5173
    build:
      enabled: true
    deploy:
      enabled: false
  
  mobile-ios:
    dev:
      enabled: true
      simulator: "iPhone 15"
    build:
      enabled: true
    deploy:
      enabled: false
  
  mobile-android:
    dev:
      enabled: true
      emulator: "pixel_6"
    build:
      enabled: true
    deploy:
      enabled: false

deployment:
  adapter: "compose-local"
  composeFile: "deploy/local.compose.yaml"
  envFile: "deploy/local.env.example"

# Foundation Usage Profile for FlashIt
# FI-001: Product-specific Foundation Usage Profile
# This document defines how FlashIt uses platform foundation components

schemaVersion: "1.0.0"
productId: "flashit"
productName: "FlashIt"
generatedAt: "2026-05-24T00:00:00Z"


specificRequirements:
  education:
    - requirement: "User data privacy for learning progress and flash card content"
      implementation: "Encryption at rest, TLS in transit, audit logging"
      evidencePath: ".kernel/evidence/flashit/privacy-compliance.json"
    - requirement: "Spaced repetition algorithm integrity"
      implementation: "Validated algorithm with audit trail for schedule changes"
      evidencePath: ".kernel/evidence/flashit/spaced-repetition-integrity.json"
    - requirement: "Content accessibility compliance (WCAG 2.1 AA)"
      implementation: "Accessibility validation gate and golden fixtures"
      evidencePath: ".kernel/evidence/flashit/accessibility-compliance.json"
    - requirement: "User data sovereignty"
      implementation: "Tenant isolation with RLS policies"
      evidencePath: ".kernel/evidence/flashit/data-sovereignty.json"

  performance:
    - requirement: "Sub-second flash card retrieval latency"
      implementation: "Distributed cache with Redis backend"
      evidencePath: ".kernel/evidence/flashit/flash-card-latency.json"
    - requirement: "High availability for learning sessions"
      implementation: "Multi-region deployment with failover"
      evidencePath: ".kernel/evidence/flashit/ha-learning-sessions.json"

  security:
    - requirement: "Signed JWT authentication"
      implementation: "Platform JWT token provider"
      evidencePath: ".kernel/evidence/flashit/jwt-auth.json"
    - requirement: "Role-based access control"
      implementation: "RBAC with learner/instructor/admin roles"
      evidencePath: ".kernel/evidence/flashit/rbac.json"
    - requirement: "Audit trail for all user data access"
      implementation: "Immutable audit log with tamper detection"
      evidencePath: ".kernel/evidence/flashit/audit-trail.json"

  observability:
    - requirement: "Structured logging with correlation IDs"
      implementation: "Platform observability module"
      evidencePath: ".kernel/evidence/flashit/structured-logging.json"
    - requirement: "Metrics for learning progress and flash card performance"
      implementation: "Prometheus metrics integration"
      evidencePath: ".kernel/evidence/flashit/metrics.json"
    - requirement: "Distributed tracing for learning data flows"
      implementation: "OpenTelemetry tracing"
      evidencePath: ".kernel/evidence/flashit/tracing.json"

validationGates:
  - gate: "kernel-context-validation"
    severity: "P0"
    description: "Kernel context must provide DistributedCachePort"
    script: "./scripts/check-flashit-kernel-context.mjs"
  - gate: "data-cloud-rls-validation"
    severity: "P0"
    description: "Data Cloud collections must have RLS policies enabled"
    script: "./scripts/check-flashit-data-cloud-rls.mjs"
  - gate: "flash-card-cache-validation"
    severity: "P0"
    description: "Distributed cache must be production-grade (not in-memory)"
    script: "./scripts/check-flashit-flash-card-cache.mjs"
  - gate: "spaced-repetition-validation"
    severity: "P0"
    description: "Spaced repetition algorithm must have audit trail"
    script: "./scripts/check-flashit-spaced-repetition.mjs"
  - gate: "accessibility-validation-gate"
    severity: "P0"
    description: "UI must pass WCAG 2.1 AA accessibility validation"
    script: "./scripts/check-flashit-accessibility.mjs"
  - gate: "privacy-compliance-validation"
    severity: "P0"
    description: "Privacy compliance requirements must be met"
    script: "./scripts/check-flashit-privacy-compliance.mjs"

rollbackRequirements:
  - requirement: "Stable deployment manifest history"
    implementation: "Previous 10 deployments must be queryable"
    evidencePath: ".kernel/evidence/flashit/deployment-manifest-history.json"
  - requirement: "Previous artifact selection policy"
    implementation: "Rollback must select from known-good artifacts"
    evidencePath: ".kernel/evidence/flashit/rollback-artifact-policy.json"
  - requirement: "Education post-rollback gates"
    implementation: "Learning data integrity check, flash card validation, audit verification"
    evidencePath: ".kernel/evidence/flashit/post-rollback-gates.json"
  - requirement: "Rollback approval contract"
    implementation: "Rollback requires explicit approval with justification"
    evidencePath: ".kernel/evidence/flashit/rollback-approval-contract.json"

mobileLifecycle:

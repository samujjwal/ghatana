    implementation: "Mobile apps (Android/iOS) are in maintenance mode, no new lifecycle events"
    evidencePath: ".kernel/evidence/flashit/mobile-lifecycle-disabled.json"
    status: "disabled"
    reason: "Focus on web platform; mobile apps in maintenance mode"

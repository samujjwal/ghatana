status: planned
description: Product evidence required for IPA/AAB artifact contracts before mobile lifecycle execution.
requiredEvidenceRefs:
  - products/flashit/lifecycle/artifact-manifests/mobile-ipa-artifact-manifest.yaml
  - products/flashit/lifecycle/artifact-manifests/mobile-aab-artifact-manifest.yaml
  - products/flashit/client/mobile/package.json
blockingReasonCodes:
  - requires-mobile-bundle-artifacts
  - missing-mobile-bundle-artifacts
validationCommands:
  - pnpm --filter ./products/flashit type-check
notes:

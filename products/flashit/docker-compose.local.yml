version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: flashit-postgres-dev
    environment:
      POSTGRES_DB: flashit_dev
      POSTGRES_USER: flashit_dev
      POSTGRES_PASSWORD: flashit_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashit_dev -d flashit_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flashit-network

  # PostgreSQL Test Database
  postgres-test:
    image: postgres:15-alpine
    container_name: flashit-postgres-test
    environment:
      POSTGRES_DB: flashit_test
      POSTGRES_USER: flashit_test
      POSTGRES_PASSWORD: flashit_test_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashit_test -d flashit_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flashit-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: flashit-redis-dev
    ports:
      - "6383:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flashit-network

  # MinIO (S3-compatible storage for development)
  minio:
    image: minio/minio:latest
    container_name: flashit-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - flashit-network

  # MailHog (Email testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: flashit-mailhog-dev
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI port
    networks:
      - flashit-network

  # Prometheus (Metrics collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: flashit-prometheus-dev
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts:/etc/prometheus/alerts
      - prometheus_data:/prometheus
    networks:
      - flashit-network

  # Grafana (Metrics visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: flashit-grafana-dev
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - flashit-network

  # Java Agent Service (AI processing)
  java-agent:
    build:
      context: ../../
      dockerfile: products/flashit/backend/agent/Dockerfile
    container_name: flashit-java-agent-dev
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      WHISPER_MODEL: ${WHISPER_MODEL:-whisper-1}
      AGENT_PORT: "8090"
      AGENT_REQUEST_TIMEOUT_MS: "30000"
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - flashit-network

volumes:
  postgres_data:
  postgres_test_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  flashit-network:
    driver: bridge

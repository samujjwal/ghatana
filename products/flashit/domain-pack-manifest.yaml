pack:
  id: flashit
  version: 1.0.0
  product: flashit
  domain: personal-reflection
  rulePrefix: FLASHIT-BP-
  kernelCapabilitiesConsumed:
    - boundary-policy-evaluation
    - audit-trail
    - human-approval
    - observability
  policyActions:
    - read
    - write
    - delete
    - export
  policyResources:
    - moments
    - moments/**
  pluginsConsumed:
    - plugin-audit-trail
    - plugin-compliance
    - plugin-human-approval
  bridgesConsumed: []
  domainPacksProvided:
    - flashit-boundary-policy
    - flashit-compliance-rule-pack
  uiSurfaces:
    - web
    - mobile
  runtimeServices:
    - backend-agent
    - web-api
  dataSensitivity: personal-journal
  productExtensions:
    boundaryPolicyStoreClass: com.ghatana.flashit.kernel.policy.FlashItBoundaryPolicyStore
    pluginBindingsClass: com.ghatana.flashit.kernel.policy.FlashItPluginBindings
    defaultDenyRuleId: FLASHIT-BP-999

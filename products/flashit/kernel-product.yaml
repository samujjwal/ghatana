schemaVersion: 1.0.0
productId: flashit
lifecycleProfile: mobile-plus-api-product
status: draft
executionEnabled: false
migration:
  status: planned
  reason: "FlashIt requires mobile surface and adapter normalization before lifecycle execution."

readiness:
  reasonCodes:
    - planned-shape-only
    - requires-mobile-adapters
    - requires-preview-security-gate
    - requires-personal-data-classification
    - requires-mobile-bundle-artifacts
  requiredGates:
    - privacy
    - preview-security
    - personal-data-classification
    - mobile-bundle-contract
  nextRequiredWork:
    - Keep FlashIt mobile lifecycle disabled until iOS and Android adapters are execution-ready.
    - Add ipa and aab artifact contracts before enabling mobile bundle execution.
  evidenceRefs:
    - products/flashit/lifecycle/readiness-evidence.yaml
    - products/flashit/lifecycle/artifact-manifests/mobile-ipa-artifact-manifest.yaml
    - products/flashit/lifecycle/artifact-manifests/mobile-aab-artifact-manifest.yaml
    - products/flashit/lifecycle/gate-packs/privacy.yaml
    - products/flashit/lifecycle/gate-packs/preview-security.yaml
    - products/flashit/lifecycle/gate-packs/personal-data-classification.yaml
    - products/flashit/lifecycle/gate-packs/mobile-bundle-contract.yaml

surfaces:
  backend-api:
    source: products/flashit/backend/gateway
    runtime: node-api
    adapter: pnpm-node-api
    packagePath: products/flashit/backend/gateway/package.json
  web:
    source: products/flashit/client/web
    runtime: static-web
    adapter: pnpm-vite-react
    packagePath: products/flashit/client/web/package.json
  mobile-ios:
    source: products/flashit/client/mobile
    runtime: mobile-ios
    adapter: xcode-ios
    packagePath: products/flashit/client/mobile/package.json
  mobile-android:
    source: products/flashit/client/mobile
    runtime: mobile-android
    adapter: gradle-android
    packagePath: products/flashit/client/mobile/package.json

phases:
  dev:
    defaultSurfaces: [backend-api, web]
    mode: parallel
  build:
    defaultSurfaces: [backend-api, web, mobile-ios, mobile-android]
    mode: parallel

gates:
  validate:
    - privacy
    - preview-security
    - personal-data-classification
    - mobile-bundle-contract
  gatePacks:
    privacy: products/flashit/lifecycle/gate-packs/privacy.yaml
    preview-security: products/flashit/lifecycle/gate-packs/preview-security.yaml
    personal-data-classification: products/flashit/lifecycle/gate-packs/personal-data-classification.yaml
    mobile-bundle-contract: products/flashit/lifecycle/gate-packs/mobile-bundle-contract.yaml

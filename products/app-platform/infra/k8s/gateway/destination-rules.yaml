# DestinationRules — AppPlatform Istio API Gateway
# Story: STORY-K11-001 — Envoy/Istio-based API Gateway with service registry
# Source: stories/MILESTONE_1B_STORIES.md, epics/EPIC-K-11-API-Gateway.md
#
# Each DestinationRule configures:
#   - Health-check-based outlier detection (removes unhealthy upstream endpoints)
#   - Connection pool sizing (per-service)
#   - Load balancing strategy (LEAST_REQUEST for stateless, RANDOM for others)
#
# Outlier detection removes a host from the load balancing pool after:
#   - consecutiveGatewayErrors: 3 consecutive 5xx responses
#   - interval: 10s (check interval)
#   - baseEjectionTime: 30s (ejection duration, increases on repeated failures)
#   - maxEjectionPercent: 50% (never eject more than half the pool)
#
# This satisfies: "Health-check-based routing: remove unhealthy upstreams"

# ── KERNEL SERVICES ────────────────────────────────────────────────────────────

apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: dr-iam
  namespace: app-platform
  labels:
    kernel-module: k-01
    component: iam
spec:
  host: iam-service.app-platform.svc.cluster.local
  trafficPolicy:
    loadBalancer:
      simple: LEAST_REQUEST
    connectionPool:
      tcp:
        maxConnections: 200
      http:
        http2MaxRequests: 1000
        maxRequestsPerConnection: 100
    outlierDetection:
      consecutiveGatewayErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  portLevelSettings:
    - port:
        number: 8080
      tls:
        mode: ISTIO_MUTUAL  # mTLS via Istio service mesh (K-14 cert management)


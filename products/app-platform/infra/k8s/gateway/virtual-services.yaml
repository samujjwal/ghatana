---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: vs-market-data
  namespace: app-platform
  labels:
    domain-pack: d-04
    component: market-data
spec:
  hosts:
    - "api.appplatform.ghatana.io"
    - "ws.appplatform.ghatana.io"
  gateways:
    - appplatform-gateway
  http:
    - match:
        - uri:
            prefix: "/api/v2/market-data/"
      route:
        - destination:
            host: market-data-service.app-platform.svc.cluster.local
            port:
              number: 8080
      timeout: 5s
    # WebSocket endpoint for live market data streaming
    - match:
        - uri:
            prefix: "/api/ws/market-data/"
        - headers:
            upgrade:
              exact: "websocket"
      route:
        - destination:
            host: market-data-service.app-platform.svc.cluster.local
            port:
              number: 8080
      timeout: 0s  # no timeout for streaming WebSocket connections


# VirtualServices — AppPlatform Istio API Gateway routing rules
# Story: STORY-K11-001 — Envoy/Istio-based API Gateway with service registry
# Source: stories/MILESTONE_1B_STORIES.md, epics/EPIC-K-11-API-Gateway.md
#
# Routing scheme:
#   /api/v1/{service}/{path}  → upstream Kubernetes service
#   /api/v2/{service}/{path}  → current major-version upstreams (see K11-002)
#   /api/ws/{service}/{path}  → WebSocket-enabled services
#
# Service registry: each VirtualService + DestinationRule pair represents one upstream.
# Kubernetes service discovery keeps endpoint sets current without manual intervention.
# Health-check-based routing: DestinationRules (destination-rules.yaml) remove unhealthy
# endpoints via outlier detection, so no additional config is needed here.
#
# Kernel services:
#   iam               → kernel/iam                   port 8080
#   config-engine     → kernel/config-engine          port 8080
#   audit-trail       → kernel/audit-trail            port 8080
#   event-store       → kernel/event-store            port 8080
#   api-gateway       → kernel/api-gateway            port 8080
#   observability-sdk → kernel/observability-sdk      port 8080 (internal)
#   ledger-framework  → kernel/ledger-framework       port 8080
#   secrets-mgmt      → kernel/secrets-management     port 8080 (internal)
#   rules-engine      → kernel/rules-engine           port 8080 (internal)
#   plugin-runtime    → kernel/plugin-runtime         port 8080 (internal)
#
# Domain packs:
#   oms, ems, compliance, risk-engine, market-data, reference-data,
#   post-trade, reconciliation, pricing, pms, surveillance,
#   regulatory-reporting, corporate-actions, sanctions

# ── KERNEL SERVICES ────────────────────────────────────────────────────────────

apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: vs-iam
  namespace: app-platform
  labels:
    kernel-module: k-01
    component: iam
spec:
  hosts:
    - "api.appplatform.ghatana.io"
  gateways:
    - appplatform-gateway
  http:
    - match:
        - uri:
            prefix: "/api/v2/auth/"
      route:
        - destination:
            host: iam-service.app-platform.svc.cluster.local
            port:
              number: 8080
      timeout: 10s
      retries:
        attempts: 2
        perTryTimeout: 4s
        retryOn: "connect-failure,reset,5xx"
    - match:
        - uri:
            prefix: "/api/v1/auth/"
      headers:
        response:
          set:
            Deprecation: "true"
            Sunset: "Sat, 31 Dec 2026 23:59:59 GMT"
      route:
        - destination:
            host: iam-service.app-platform.svc.cluster.local
            port:
              number: 8080
      timeout: 10s

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: vs-jwks
  namespace: app-platform
  labels:
    kernel-module: k-01
    component: iam
spec:
  hosts:
    - "api.appplatform.ghatana.io"
  gateways:
    - appplatform-gateway
  http:
    - match:
        - uri:
            exact: "/.well-known/jwks.json"
      route:
        - destination:
            host: iam-service.app-platform.svc.cluster.local
            port:
              number: 8080
      timeout: 5s


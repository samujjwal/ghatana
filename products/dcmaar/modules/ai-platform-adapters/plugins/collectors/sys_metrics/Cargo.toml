[package]
name = "sys_metrics"
version = "0.1.0"
edition = "2021"
description = "System metrics collector plugin for DCMaar agent"
publish = false

[dependencies]
# Internal crates
agent-plugin = { path = "../../../crates/agent-plugin" }
agent-types = { path = "../../../crates/agent-types" }

# Async traits
async-trait = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# System metrics
sysinfo = "0.29"

# Logging
tracing = "0.1"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Time
chrono = { version = "0.4", features = ["serde"] }

# Async runtime
tokio = { version = "1.0", features = ["rt", "macros"] }

[lib]
crate-type = ["cdylib", "rlib"]

[package]
name = "file_tailer"
version = "0.1.0"
edition = "2021"
description = "File tailer collector plugin for DCMaar agent"
publish = false

[dependencies]
# Internal crates
agent-plugin = { path = "../../../crates/agent-plugin" }
agent-types = { path = "../../../crates/agent-types" }

# Async traits
async-trait = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# File watching
notify = "6.0"
tokio-util = { version = "0.7", features = ["codec"] }
tokio-stream = "0.1"

# Logging
tracing = "0.1"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Time
chrono = { version = "0.4", features = ["serde"] }

# Async runtime
tokio = { version = "1.0", features = ["rt", "macros", "fs", "io-util"] }

# Hashing for file position tracking
sha2 = "0.10"
hex = "0.4"

[lib]
crate-type = ["cdylib", "rlib"]

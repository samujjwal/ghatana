version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - dcmar-network

  # Uncomment and configure if you have a backend API
  # api:
  #   image: your-api-image
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - NODE_ENV=production
  #   networks:
  #     - dcmar-network

networks:
  dcmar-network:
    driver: bridge

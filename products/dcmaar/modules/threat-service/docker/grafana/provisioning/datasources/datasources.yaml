apiVersion: 1

datasources:
  # Prometheus data source
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      httpMethod: POST
      queryTimeout: 60s
      exemplar: true
      prometheusType: 'Prometheus'
      prometheusVersion: '2.48.0'
      cacheLevel: 'High'
      incrementalQuerying: true
      incrementalQueryOverlapWindow: '10m'
    version: 1
    readOnly: false

  # Jaeger data source (for distributed tracing)
  - name: Jaeger
    type: jaeger
    access: proxy
    orgId: 1
    url: http://jaeger:16686
    isDefault: false
    editable: true
    jsonData:
      nodeGraph:
        enabled: true
      tracesToLogs:
        datasourceUid: '${DS_LOKI}'
        filterByTraceID: true
        filterBySpanID: true
        tags: ['job', 'instance', 'pod', 'namespace']
      tracesToMetrics:
        datasourceUid: '${DS_PROMETHEUS}'
        tags: ['job', 'instance', 'pod', 'namespace']

  # Loki data source (for logs)
  - name: Loki
    type: loki
    access: proxy
    orgId: 1
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: '${DS_PROMETHEUS}'
          matcherRegex: 'traceID=(\w+)'
          name: 'Trace ID'
          url: '$${__value.raw}'

  # Node Exporter data source (for system metrics)
  - name: Node Exporter
    type: prometheus
    access: proxy
    orgId: 1
    url: http://node-exporter:9100
    isDefault: false
    editable: true
    jsonData:
      timeInterval: 15s
      httpMethod: POST
      queryTimeout: 60s
      prometheusType: 'Prometheus'
      prometheusVersion: '2.48.0'

  # cAdvisor data source (for container metrics)
  - name: cAdvisor
    type: prometheus
    access: proxy
    orgId: 1
    url: http://cadvisor:8080
    isDefault: false
    editable: true
    jsonData:
      timeInterval: 15s
      httpMethod: POST
      queryTimeout: 60s
      prometheusType: 'Prometheus'
      prometheusVersion: '2.48.0'

# Server configuration
server:
  host: "0.0.0.0"
  port: 8080
  shutdown_timeout: "30s"
  max_concurrent_queries: 100
  max_query_memory: "1GB"
  query_timeout: "30s"
  max_request_size: 10485760  # 10MB

# Logging configuration
logging:
  level: "debug"
  format: "json"
  enable_console_logging: true
  enable_file_logging: false
  file_path: "/var/log/query-service.log"
  max_size: 100  # MB
  max_backups: 3
  max_age: 7  # days
  compress: true

# Metrics configuration
metrics:
  enabled: true
  port: 8081
  path: "/metrics"
  namespace: "query_service"
  subsystem: "server"
  enable_go_metrics: true
  enable_process_metrics: true

# Tracing configuration
tracing:
  enabled: true
  service_name: "query-service"
  # Sampling rate (0.0 to 1.0)
  sampling_rate: 1.0
  # OTLP endpoint for the trace collector (e.g., "otel-collector:4317")
  endpoint: "otel-collector:4317"
  # Enable TLS for the trace collector (set to false for development)
  insecure: true
  # Additional resource attributes
  resource_attributes:
    environment: "production"
    service.version: "${VERSION:-unknown}"
    deployment.environment: "${ENVIRONMENT:-development}"
  # Batch configuration
  batch:
    # Maximum number of spans in a batch
    max_export_batch_size: 1000
    # Maximum queue size
    max_queue_size: 10000
    # Batch timeout
    timeout: "5s"

# Cache configuration
cache:
  enabled: true
  backend: "redis"  # or "memory" for local development
  ttl: "5m"
  max_size: 1000000  # Max number of items in memory cache
  cleanup_interval: "1m"
  
  # Redis configuration (only used if backend is "redis")
  redis:
    addr: "redis:6379"
    password: ""
    db: 0
    pool_size: 10
    min_idle_conns: 5
    max_retries: 3
    min_retry_backoff: "8ms"
    max_retry_backoff: "512ms"
    dial_timeout: "5s"
    read_timeout: "3s"
    write_timeout: "3s"
    pool_timeout: "4s"
    max_conn_age: "30m"

# Database configuration
database:
  driver: "clickhouse"
  host: "clickhouse"
  port: 9000
  name: "default"
  user: "default"
  password: ""
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: "30m"
  conn_max_idle_time: "5m"
  dial_timeout: "10s"
  read_timeout: "30s"
  write_timeout: "30s"
  block_size: 10000
  pool_size: 10
  debug: true

# Query configuration
query:
  default_limit: 100
  max_limit: 1000
  max_query_time: "30s"
  max_memory_usage: 1073741824  # 1GB
  max_threads: 8
  enable_async_insert: true
  async_insert_threads: 4
  async_insert_max_data_size: "100MB"
  async_insert_busy_timeout: "1s"
  async_insert_stale_timeout: "5s"

# Authentication configuration
auth:
  enabled: false
  api_keys: []
  jwt_secret: "your-jwt-secret-key"
  jwt_expiration: "24h"
  rate_limit: 100  # requests per second
  rate_limit_burst: 50
  cors_allowed_origins: ["*"]
  cors_allowed_headers: ["Content-Type", "Authorization"]
  cors_allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]

# Feature flags
features:
  enable_query_cache: true
  enable_query_logging: true
  enable_metrics: true
  enable_tracing: true
  enable_profiling: true
  enable_pprof: true
  pprof_port: 6060
  pprof_path: "/debug/pprof"

# Alerting configuration
alerting:
  enabled: false
  alertmanager_url: "http://alertmanager:9093"
  alertmanager_timeout: "10s"
  alert_rules: []

# Storage configuration (for query results)
storage:
  type: "local"  # or "s3" for distributed storage
  local:
    path: "/var/lib/query-service/storage"
    cleanup_interval: "1h"
    retention_period: "168h"  # 7 days
  s3:
    endpoint: ""
    access_key: ""
    secret_key: ""
    bucket: "query-service"
    region: "us-east-1"
    secure: true
    path_style: false

# Development settings
dev:
  enable_stackdriver: false
  log_sql_queries: true
  log_query_plans: false
  enable_mock_mode: false
  enable_fixtures: false
  enable_migrations: true
  migration_path: "./migrations"
  enable_swagger: true
  swagger_path: "/swagger"
  swagger_schemes: ["http", "https"]
  enable_reflection: true

# Monitoring endpoints
monitoring:
  liveness_path: "/healthz"
  readiness_path: "/ready"
  metrics_path: "/metrics"
  pprof_path: "/debug/pprof"
  enable_pprof: true
  enable_expvar: true
  enable_trace: true
  enable_metrics: true

# External services
external_services:
  enable_service_discovery: false
  consul:
    address: "consul:8500"
    scheme: "http"
    datacenter: "dc1"
    token: ""
    service_name: "query-service"
    service_id: "query-service-1"
    service_tags: ["query", "grpc"]
    service_address: ""
    service_port: 8080
    check_interval: "10s"
    check_timeout: "5s"
    deregister_critical_service_after: "30m"

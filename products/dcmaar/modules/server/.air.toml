# .air.toml

# Set the working directory for the application
root = "."
tmp_dir = "tmp"

# Watch specific directories and files
[build]
  # Watch these file extensions
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
  # Exclude these directories
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "docs", "deploy"]
  # Delay time after each build (ms)
  delay = 1000
  # Stop running old binary when build errors occur
  stop_on_error = true
  # Send Interrupt signal before killing process (windows does not support)
  send_interrupt = true
  # Delay time before sending interrupt signal (ms)
  interrupt_timeout = 500
  # Command to build the application
  cmd = "go build -o ./tmp/main ."
  # The compiled binary name
  bin = "tmp/main"
  # Customize the binary name when running on Windows
  full_bin = "dlv exec --headless --listen=:2345 --api-version=2 --accept-multiclient --continue --log -- ./tmp/main"
  # Customize the binary name when running on other platforms
  # full_bin = "dlv exec --listen=:2345 --headless=true --api-version=2 --accept-multiclient --continue --log -- ./tmp/main"
  # Environment variables for the application
  [build.env]
    ENV = "development"
    CONFIG_FILE = "config/config.docker.yaml"

# Log configuration
[log]
  # Show log time
  time = true
  # Only show log when the build fails
  only_log_on_error = false

# Color scheme
[color]
  # Customize each part's color
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
  app = "blue"

# Custom debug port
[debug]
  port = 2345
  # Wait for the debugger to attach before starting the application
  # Set to true if you want to use a debugger like Delve or GDB
  wait_for_debugger = false

# Custom commands to run after build
[build.args_bin]
  # Add any command line arguments here
  # Example: "--config", "/path/to/config.yaml"

# Custom environment variables for the application
[build.env]
  # Add any environment variables here
  # Example: ENV = "development"

name: Guardian Dashboard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: products/dcmaar/apps/guardian/pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: products/dcmaar/apps/guardian/dashboard/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('products/dcmaar/apps/guardian/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: products/dcmaar/apps/guardian/dashboard
        run: pnpm install

      - name: Run ESLint
        working-directory: products/dcmaar/apps/guardian/dashboard
        run: pnpm run lint
        continue-on-error: false

      - name: Run type check
        working-directory: products/dcmaar/apps/guardian/dashboard
        run: pnpm exec tsc --noEmit

      - name: Run tests
        working-directory: products/dcmaar/apps/guardian/dashboard
        run: pnpm test -- --run --coverage
        env:
          NODE_ENV: test

      - name: Upload coverage reports
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v3
        with:
          files: products/dcmaar/apps/guardian/dashboard/coverage/coverage-final.json
          flags: dashboard
          name: guardian-dashboard
          fail_ci_if_error: false

      - name: Build application
        working-directory: products/dcmaar/apps/guardian/dashboard
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        if: matrix.node-version == '20.x' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v3
        with:
          name: dashboard-build
          path: products/dcmaar/apps/guardian/dashboard/dist
          retention-days: 7

      - name: Check bundle size
        if: matrix.node-version == '20.x'
        working-directory: products/dcmaar/apps/guardian/dashboard
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          du -sh dist/* | sort -hr >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Run npm audit
        working-directory: products/dcmaar/apps/guardian/dashboard
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=products/dcmaar/apps/guardian/dashboard/package.json

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        working-directory: products/dcmaar/apps/guardian/dashboard
        run: pnpm install

      - name: Build for preview
        working-directory: products/dcmaar/apps/guardian/dashboard
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Deploy to Vercel Preview
        if: ${{ secrets.VERCEL_TOKEN }}
        working-directory: products/guardian/dashboard
        run: |
          npm install -g vercel
          vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --yes
        continue-on-error: true

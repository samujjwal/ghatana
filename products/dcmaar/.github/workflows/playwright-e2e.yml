name: Playwright E2E (Extension CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    name: Playwright E2E (Chromium)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./services/extension

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: ./services/extension

      - name: Build extension with baked test endpoint
        # Bake test hooks and the test-sink endpoint into the build so runtime
        # configuration isn't required in CI.
        run: |
          export VITE_ENABLE_TEST_HOOKS=true
          export VITE_INGEST_ENDPOINT='dcmaar-test-sink://local'
          pnpm run build:chrome
        working-directory: ./services/extension

      - name: Run Playwright E2E (Chromium, headed)
        # Run in headed mode because Chromium extensions typically require a
        # non-headless context to load extensions. Use a single worker for
        # deterministic ordering and to avoid intermittent Playwright runner
        # flakiness seen with parallel workers when using persistent contexts.
        run: pnpm exec npx playwright test --project=chromium --headed --workers=1 --trace=on-first-retry --reporter=list
        working-directory: ./services/extension
        env:
          # Ensure Playwright uses the baked endpoint (defensive)
          VITE_ENABLE_TEST_HOOKS: 'true'
          VITE_INGEST_ENDPOINT: 'dcmaar-test-sink://local'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./services/extension/playwright-report

      - name: Upload Playwright traces/screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: ./services/extension/test-results

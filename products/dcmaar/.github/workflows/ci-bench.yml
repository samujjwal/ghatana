name: CI Benchmarks

on:
  workflow_dispatch:

jobs:
  benches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Go benches (report)
        run: |
          cd services/server
          go test -bench . -run '^$' ./... | tee go.bench.txt
      - name: Rust Criterion benches
        run: |
          cargo bench --workspace --no-run || true
          cargo bench --workspace || true


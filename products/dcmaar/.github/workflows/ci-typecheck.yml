name: CI — Extension type-check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  type-check-extension:
    name: Type-check services/extension
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.18.1 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run extension type-check
        run: pnpm -w -F services/extension run type-check

[package]
name = "dcmaar-pb"
version = "0.1.0"
edition = "2021"
description = "Generated Protocol Buffer code for DCMaar"
publish = false

[lib]
name = "dcmaar_proto"
path = "src/lib.rs"

[dependencies]
prost = "0.12"
prost-types = "0.12"
tonic = { version = "0.10", default-features = false }
bytes = "1.0"
futures-util = { version = "0.3", default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"

[dev-dependencies]
tokio = { version = "1.0", features = ["rt-multi-thread", "macros"] }
tonic-build = "0.10"

syntax = "proto3";

package dcmaar.v1;

import "google/protobuf/timestamp.proto";
import "dcmaar/v1/common.proto";

option go_package = "github.com/samujjwal/dcmaar/proto/gen/go/pb/dcmaar/v1;dcmaarv1";

// CorrelationService provides cross-source event correlation capabilities
service CorrelationService {
  // GetCorrelatedIncidentsByWindow retrieves correlated incidents within a time window
  rpc GetCorrelatedIncidentsByWindow(GetCorrelatedIncidentsRequest) returns (GetCorrelatedIncidentsResponse);
  
  // TriggerCorrelationAnalysis manually triggers correlation analysis
  rpc TriggerCorrelationAnalysis(TriggerCorrelationRequest) returns (TriggerCorrelationResponse);
}

// CorrelatedIncident represents a correlated performance incident
message CorrelatedIncident {
  string incident_id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  string tenant_id = 4;
  string device_id = 5;
  string host_id = 6;
  google.protobuf.Timestamp window_start = 7;
  google.protobuf.Timestamp window_end = 8;
  double correlation_score = 9;
  double confidence = 10;
  string incident_type = 11; // performance, availability, resource, mixed
  string severity = 12; // low, medium, high, critical
  repeated string anomaly_event_ids = 13;
  repeated string web_event_ids = 14;
  int32 anomaly_count = 15;
  int32 web_event_count = 16;
  double avg_cpu_anomaly_score = 17;
  double avg_memory_anomaly_score = 18;
  double avg_latency_ms = 19;
  repeated string affected_domains = 20;
  string status = 21; // active, resolved, investigating, acknowledged
  google.protobuf.Timestamp resolved_at = 22;
  map<string, string> labels = 23;
}

// Request to get correlated incidents within a time window
message GetCorrelatedIncidentsRequest {
  string tenant_id = 1;
  string device_id = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
  
  // Optional filters
  repeated string incident_types = 5; // Filter by incident types
  repeated string severities = 6;     // Filter by severities
  repeated string statuses = 7;       // Filter by statuses
  double min_correlation_score = 8;   // Minimum correlation score
  int32 limit = 9;                    // Maximum number of results
}

// Response containing correlated incidents
message GetCorrelatedIncidentsResponse {
  repeated CorrelatedIncident incidents = 1;
  int32 total_count = 2;
  bool has_more = 3;
}

// Configuration for correlation analysis
message CorrelationConfig {
  int32 time_window_minutes = 1;      // Time window for correlation (default: 5)
  double min_correlation_score = 2;   // Minimum correlation score (default: 0.6)
  double min_confidence = 3;          // Minimum confidence level (default: 0.7)
  double max_latency_threshold_ms = 4; // Max latency threshold (default: 3000)
  double min_anomaly_score = 5;       // Minimum anomaly score (default: 2.0)
  int32 correlation_lookback_hrs = 6; // Lookback hours for analysis (default: 1)
}

// Request to trigger correlation analysis
message TriggerCorrelationRequest {
  CorrelationConfig config = 1; // Optional configuration overrides
  bool store_results = 2;       // Whether to store results (default: true)
}

// Response from triggering correlation analysis
message TriggerCorrelationResponse {
  int32 correlations_found = 1;
  int32 correlations_stored = 2;
  string message = 3;
  repeated CorrelatedIncident preview_results = 4; // First few results for preview
}
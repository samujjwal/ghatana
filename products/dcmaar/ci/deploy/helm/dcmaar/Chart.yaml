apiVersion: v2
name: dcmaar
description: >
  DCMAAR (Device-Child Mobile App Agentic Runtime) — Helm chart for the
  Ghatana parental-control and digital-wellbeing platform.

  Deploys the Node.js/Fastify backend API and exposes it via Kubernetes
  Ingress. Supports environment-specific overlays (staging vs. production)
  through separate values files.


apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dcmaar.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dcmaar.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "dcmaar.selectorLabels" . | nindent 6 }}
  strategy:
    type: {{ .Values.strategy.type }}
    {{- if eq .Values.strategy.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.strategy.rollingUpdate.maxUnavailable }}
    {{- end }}
  template:
    metadata:
      labels:
        {{- include "dcmaar.selectorLabels" . | nindent 8 }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "dcmaar.serviceAccountName" . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          env:
            # ----------------------------------------------------------------
            # Application configuration
            # ----------------------------------------------------------------
            - name: NODE_ENV
              value: {{ .Values.app.nodeEnv | quote }}
            - name: PORT
              value: {{ .Values.app.port | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.app.logLevel | quote }}
            {{- if .Values.app.corsOrigin }}
            - name: CORS_ORIGIN
              value: {{ .Values.app.corsOrigin | quote }}
            {{- end }}

            # ----------------------------------------------------------------
            # Secrets (injected from Kubernetes Secret)
            # ----------------------------------------------------------------
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: db-host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: db-port
                  optional: true
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: db-name
                  optional: true
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: db-user
                  optional: true
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: jwt-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: jwt-refresh-secret
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: redis-url
                  optional: true

            # ----------------------------------------------------------------
            # Ghatana Platform Shared Service URLs (all optional)
            # ----------------------------------------------------------------
            {{- if .Values.platformServices.authGatewayUrl }}
            - name: AUTH_GATEWAY_URL
              value: {{ .Values.platformServices.authGatewayUrl | quote }}
            {{- end }}
            {{- if .Values.platformServices.aiRegistryUrl }}
            - name: AI_REGISTRY_URL
              value: {{ .Values.platformServices.aiRegistryUrl | quote }}
            {{- end }}
            {{- if .Values.platformServices.featureStoreUrl }}
            - name: FEATURE_STORE_URL
              value: {{ .Values.platformServices.featureStoreUrl | quote }}
            {{- end }}

          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

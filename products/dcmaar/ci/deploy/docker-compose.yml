version: "3.8"

services:
  # PostgreSQL database for metadata and configuration
  postgres:
    image: postgres:15-alpine
    container_name: dcmaar-postgres
    environment:
      POSTGRES_USER: dcmaar
      POSTGRES_PASSWORD: dcmaar123
      POSTGRES_DB: dcmaar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcmaar -d dcmaar"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dcmaar-network

  # ClickHouse for time-series metrics storage
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: dcmaar-clickhouse
    ports:
      - "8123:8123" # HTTP API
      - "9000:9000" # Native client
      - "9009:9009" # Interserver communication
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: dcmaar
      CLICKHOUSE_USER: dcmaar
      CLICKHOUSE_PASSWORD: dcmaar123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./config/clickhouse/users.d:/etc/clickhouse-server/users.d
      - ./config/clickhouse/config.d:/etc/clickhouse-server/config.d
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--spider",
          "http://localhost:8123/ping",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dcmaar-network

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: dcmaar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dcmaar-network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: dcmaar-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - dcmaar-network

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: dcmaar-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=dcmaar123
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - dcmaar-network

  # Jaeger UI (optional, for visualization)
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: dcmaar-jaeger
    ports:
      - "16686:16686" # UI
      - "14250:14250" # Model.proto
      - "14268:14268" # HTTP collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - dcmaar-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:16686/"]
      interval: 10s
      timeout: 3s
      retries: 3

  # MinIO for object storage
  minio:
    image: minio/minio:latest
    container_name: dcmaar-minio
    ports:
      - "9001:9001" # Console
      - "9000:9000" # API
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - dcmaar-network

  # Adminer for database management (optional)
  adminer:
    image: adminer:latest
    container_name: dcmaar-adminer
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres
    networks:
      - dcmaar-network

networks:
  dcmaar-network:
    driver: bridge
  # External Ghatana platform network — allows DCMAAR to reach auth-gateway,
  # ai-registry, and feature-store when running alongside the platform stack.
  # Create it once with: docker network create ghatana-network
  ghatana-network:
    external: true
    name: ghatana-network

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
  prometheus_data:
  grafana_data:
  minio_data:
  jaeger_data:

apiVersion: v1
kind: Service
metadata:
  name: dcmar-service
  namespace: production
  labels:
    app: dcmaar
    environment: production
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-internal: "false"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-proxy-protocol: "*"
    service.beta.kubernetes.io/aws-load-balancer-connection-idle-timeout: "60"
spec:
  type: LoadBalancer
  selector:
    app: dcmaar
    environment: production
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: https
    port: 443
    targetPort: 8443
    protocol: TCP
  - name: grpc
    port: 50051
    targetPort: 8081
    protocol: TCP
  sessionAffinity: None
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  externalTrafficPolicy: Local
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4
  loadBalancerSourceRanges:
    - 0.0.0.0/0  # Restrict in production to specific IPs
---
# Headless service for direct pod access (for stateful services)
apiVersion: v1
kind: Service
metadata:
  name: dcmar-headless
  namespace: production
  labels:
    app: dcmaar
    environment: production
spec:
  clusterIP: None
  selector:
    app: dcmaar
    environment: production
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: grpc
    port: 8081
    targetPort: 8081
  publishNotReadyAddresses: false

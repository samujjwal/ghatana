global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'dcmaar-server'
    static_configs:
      - targets: ['server:8080']
    metrics_path: '/metrics'

  - job_name: 'dcmaar-desktop'
    static_configs:
      - targets: ['desktop:8081']
    metrics_path: '/metrics'

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

rule_files:
  - 'alert.rules'

version: v1
managed:
  enabled: true
  go_package_prefix:
    default: github.com/samujjwal/dcmaar/core/proto/gen/go/pb
    except:
      - buf.build/googleapis/googleapis
      - buf.build/grpc-ecosystem/grpc-gateway

plugins:
  # Generate Go code
  - name: go
    out: core/proto/gen/go
    opt: paths=source_relative
  
  # Generate gRPC code for Go
  - name: go-grpc
    out: core/proto/gen/go
    opt: 
      - paths=source_relative
      - require_unimplemented_servers=false
  
  # Generate Rust code
  - name: rust
    out: core/proto/gen/rust/src
    opt: 
      - no_include
      - build_rest_routes=true
  
  # Generate gRPC code for Rust
  - name: rust-grpc
    out: core/proto/gen/rust/src
    opt: 
      - no_include
      - build_rest_routes=true
  
  # Generate TypeScript code
  - name: ts
    out: core/proto/gen/ts
    opt:
      - output_javascript_import_style=commonjs
      - output_typescript=true
      - output_services=grpc-js
      - env=node

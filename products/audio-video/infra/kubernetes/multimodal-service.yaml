---
# =============================================================================
# Multimodal Service — Kubernetes Manifests
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: multimodal-service-config
  namespace: audio-video
  labels:
    app: multimodal-service
    app.kubernetes.io/part-of: ghatana-audio-video
data:
  MULTIMODAL_GRPC_PORT: "50054"
  AV_HEALTH_PORT: "8093"
  STT_SERVICE_HOST: "stt-service"
  STT_SERVICE_PORT: "50051"
  VISION_SERVICE_HOST: "vision-service"
  VISION_SERVICE_PORT: "50053"
  AV_RATE_LIMIT_TPS: "10"
  AV_RATE_LIMIT_BURST: "20"
  AV_RATE_LIMIT_MAX_CONCURRENT: "5"
  AV_CB_FAILURE_THRESHOLD: "5"
  AV_CB_RESET_TIMEOUT_MS: "30000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multimodal-service
  namespace: audio-video
  labels:
    app: multimodal-service
    app.kubernetes.io/part-of: ghatana-audio-video
    app.kubernetes.io/version: latest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multimodal-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: multimodal-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8093"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: audio-video-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: multimodal
          image: ghcr.io/ghatana/audio-video/multimodal-service:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50054
              protocol: TCP
            - name: http-health
              containerPort: 8093
              protocol: TCP
          envFrom:
            - configMapRef:
                name: multimodal-service-config
          env:
            - name: AV_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: audio-video-secrets
                  key: jwt-secret
                  optional: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http-health
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http-health
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http-health
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 12
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: multimodal-service
  namespace: audio-video
  labels:
    app: multimodal-service
    app.kubernetes.io/part-of: ghatana-audio-video
spec:
  type: ClusterIP
  selector:
    app: multimodal-service
  ports:
    - name: grpc
      port: 50054
      targetPort: 50054
      protocol: TCP
    - name: http-health
      port: 8093
      targetPort: 8093
      protocol: TCP

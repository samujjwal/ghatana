apiVersion: apps/v1
kind: Deployment
metadata:
  name: stt-service
  namespace: audio-video
  labels:
    app: stt-service
    app.kubernetes.io/part-of: ghatana-audio-video
    app.kubernetes.io/version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stt-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: stt-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: audio-video-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: stt
          image: ghcr.io/ghatana/audio-video/stt-service:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: http-health
              containerPort: 8090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: stt-service-config
          env:
            - name: AV_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: audio-video-secrets
                  key: jwt-secret
                  optional: true
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: models
              mountPath: /models
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: models
          persistentVolumeClaim:
            claimName: stt-models-pvc
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: stt-service
  namespace: audio-video
  labels:
    app: stt-service
spec:
  selector:
    app: stt-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
    - name: http-health
      port: 8090
      targetPort: 8090
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: audio-video-sa
  namespace: audio-video

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: audio-video-default-ingress
  namespace: audio-video
  labels:
    app.kubernetes.io/part-of: ghatana-audio-video
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: audio-video
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
global:
  imageRegistry: ghcr.io/ghatana/audio-video
  imagePullPolicy: Always
  namespace: audio-video
  existingSecret: audio-video-secrets

# ── STT Service ────────────────────────────────────────────────────────────
stt:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/ghatana/audio-video/stt-service
    tag: ""
  ports:
    grpc: 50051
    health: 8090
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  env:
    AV_RATE_LIMIT_TPS: "50"
    AV_RATE_LIMIT_BURST: "100"
    AV_RATE_LIMIT_MAX_CONCURRENT: "20"
    AV_CB_FAILURE_THRESHOLD: "5"
    AV_CB_RESET_TIMEOUT_MS: "30000"
    AV_MAX_REQUEST_BYTES: "104857600"
  modelsClaimName: stt-models-pvc
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 6
    targetCPUUtilization: 70

# ── TTS Service ────────────────────────────────────────────────────────────
tts:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/ghatana/audio-video/tts-service
    tag: ""
  ports:
    grpc: 50052
    health: 8091
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  env:
    AV_RATE_LIMIT_TPS: "50"
    AV_RATE_LIMIT_BURST: "100"
    AV_RATE_LIMIT_MAX_CONCURRENT: "20"
    AV_CB_FAILURE_THRESHOLD: "5"
    AV_CB_RESET_TIMEOUT_MS: "30000"
    AV_MAX_REQUEST_BYTES: "52428800"
  modelsClaimName: tts-models-pvc
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 6
    targetCPUUtilization: 70

# ── Vision Service ─────────────────────────────────────────────────────────
vision:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/ghatana/audio-video/vision-service
    tag: ""
  ports:
    grpc: 50053
    health: 8092
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  env:
    AV_RATE_LIMIT_TPS: "20"
    AV_RATE_LIMIT_BURST: "40"
    AV_RATE_LIMIT_MAX_CONCURRENT: "10"
    AV_CB_FAILURE_THRESHOLD: "5"
    AV_CB_RESET_TIMEOUT_MS: "30000"
    AV_MAX_REQUEST_BYTES: "52428800"
  modelsClaimName: vision-models-pvc
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilization: 70

# ── Multimodal Service ─────────────────────────────────────────────────────
multimodal:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/ghatana/audio-video/multimodal-service
    tag: ""
  ports:
    grpc: 50054
    health: 8093
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  env:
    STT_SERVICE_HOST: "{{ .Release.Name }}-stt"
    STT_SERVICE_PORT: "50051"
    VISION_SERVICE_HOST: "{{ .Release.Name }}-vision"
    VISION_SERVICE_PORT: "50053"

# ── AI Voice Service ───────────────────────────────────────────────────────
aiVoice:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/ghatana/audio-video/ai-voice
    tag: ""
  ports:
    grpc: 50055
    health: 8095
  resources:
    requests:
      memory: "4Gi"
      cpu: "1000m"
    limits:
      memory: "8Gi"
      cpu: "4000m"
  modelsClaimName: ai-voice-models-pvc

# ── Platform Shared Services ───────────────────────────────────────────────
platformServices:
  aiRegistryUrl: ""
  featureStoreUrl: ""
  authGatewayUrl: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

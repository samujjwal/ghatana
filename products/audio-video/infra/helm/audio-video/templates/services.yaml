{{/*
  Audio-Video: per-service Deployment + Service + (optional HPA)
  Rendered once per enabled service component.
*/}}
# ────────────────────────────────────────────────────────────────────────────
# STT Service
# ────────────────────────────────────────────────────────────────────────────
{{- if .Values.stt.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-stt
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "audio-video.labels" . | nindent 4 }}
    app.kubernetes.io/component: stt
spec:
  replicas: {{ .Values.stt.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-stt
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-stt
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.stt.ports.health | quote }}
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: audio-video-sa
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: stt
          image: "{{ .Values.stt.image.repository }}:{{ .Values.stt.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.stt.ports.grpc }}
            - name: http-health
              containerPort: {{ .Values.stt.ports.health }}
          env:
            {{- range $k, $v := .Values.stt.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: AV_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.existingSecret }}
                  key: jwt-secret
                  optional: true
            {{- if .Values.platformServices.aiRegistryUrl }}
            - name: AI_REGISTRY_URL
              value: {{ .Values.platformServices.aiRegistryUrl | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.stt.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http-health
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http-health
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http-health
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: models
              mountPath: /app/models
              readOnly: true
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: {{ .Values.stt.modelsClaimName }}
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-stt
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "audio-video.labels" . | nindent 4 }}
    app.kubernetes.io/component: stt
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-stt
  ports:
    - name: grpc
      port: {{ .Values.stt.ports.grpc }}
      targetPort: {{ .Values.stt.ports.grpc }}
    - name: http-health
      port: {{ .Values.stt.ports.health }}
      targetPort: {{ .Values.stt.ports.health }}
{{- if .Values.stt.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-stt-hpa
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-stt
  minReplicas: {{ .Values.stt.hpa.minReplicas }}
  maxReplicas: {{ .Values.stt.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.stt.hpa.targetCPUUtilization }}
{{- end }}
{{- end }}


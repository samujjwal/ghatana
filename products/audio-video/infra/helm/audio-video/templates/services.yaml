spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-ai-voice
  ports:
    - name: grpc
      port: {{ .Values.aiVoice.ports.grpc }}
      targetPort: {{ .Values.aiVoice.ports.grpc }}
    - name: http-health
      port: {{ .Values.aiVoice.ports.health }}
      targetPort: {{ .Values.aiVoice.ports.health }}
{{- end }}

            {{- toYaml .Values.multimodal.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http-health
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http-health
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-multimodal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "audio-video.labels" . | nindent 4 }}
    app.kubernetes.io/component: multimodal
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-multimodal
  ports:
    - name: grpc
      port: {{ .Values.multimodal.ports.grpc }}
      targetPort: {{ .Values.multimodal.ports.grpc }}
    - name: http-health
      port: {{ .Values.multimodal.ports.health }}
      targetPort: {{ .Values.multimodal.ports.health }}
{{- end }}


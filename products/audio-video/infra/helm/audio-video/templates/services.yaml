  selector:
    matchLabels:
      app: {{ .Release.Name }}-multimodal
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-multimodal

syntax = "proto3";

package tts;

service TTSService {
    rpc Synthesize(SynthesizeRequest) returns (SynthesizeResponse);
    rpc StreamSynthesize(SynthesizeRequest) returns (stream AudioChunk);
    rpc GetStatus(StatusRequest) returns (StatusResponse);
    rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message SynthesizeRequest {
    string text = 1;
    string voice_id = 2;
    string profile_id = 3;
    SynthesisOptions options = 4;
}

message SynthesisOptions {
    float speed = 1;
    float pitch = 2;
    float energy = 3;
    string emotion = 4;
    string language = 5;
}

message SynthesizeResponse {
    bytes audio_data = 1;
    int32 sample_rate = 2;
    int64 duration_ms = 3;
    int64 processing_time_ms = 4;
    string voice_used = 5;
}

message AudioChunk {
    bytes audio_data = 1;
    int32 sample_rate = 2;
    int64 timestamp_ms = 3;
    bool is_final = 4;
}

message StatusRequest {}

message StatusResponse {
    string state = 1;
    string active_voice = 2;
    int32 active_sessions = 3;
}

message HealthCheckRequest {}

message HealthCheckResponse {
    bool healthy = 1;
    string version = 2;
}

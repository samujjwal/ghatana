syntax = "proto3";

package multimodal;

service MultimodalService {
  rpc ProcessMultimodal(MultimodalRequest) returns (MultimodalResponse);
  rpc GenerateDescription(DescriptionRequest) returns (DescriptionResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message MultimodalRequest {
  bytes audio_data = 1;
  bytes image_data = 2;
  bytes video_data = 3;
  string text = 4;
  repeated string analysis_types = 5;
}

message MultimodalResponse {
  string combined_analysis = 1;
  AudioAnalysis audio_analysis = 2;
  VisualAnalysis visual_analysis = 3;
  map<string, string> metadata = 4;
  int64 processing_time_ms = 5;
}

message AudioAnalysis {
  string transcription = 1;
  repeated string detected_sounds = 2;
  string sentiment = 3;
  double confidence = 4;
}

message VisualAnalysis {
  string scene_description = 1;
  repeated Detection objects = 2;
  repeated string activities = 3;
  double confidence = 4;
}

message Detection {
  string class_name = 1;
  double confidence = 2;
  BoundingBox bounding_box = 3;
}

message BoundingBox {
  double x = 1;
  double y = 2;
  double width = 3;
  double height = 4;
}

message DescriptionRequest {
  bytes audio_data = 1;
  bytes image_data = 2;
  string context = 3;
  string style = 4;
}

message DescriptionResponse {
  string description = 1;
  double confidence = 2;
  repeated string key_elements = 3;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string message = 2;
}

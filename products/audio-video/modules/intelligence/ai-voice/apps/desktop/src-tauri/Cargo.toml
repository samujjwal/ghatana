[package]
name = "ai-voice-desktop-app"
version = "0.1.0"
edition = "2021"
description = "AI Voice Production Studio Desktop Application"
license = "MIT"

[lib]
name = "ai_voice_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# Tauri
tauri = { version = "2.0.0", features = ["protocol-asset"] }
tauri-plugin-shell = "2.0.0"
tauri-plugin-dialog = "2.0.0"

# Shared audio utilities
speech-audio-rust = { path = "../../../../speech/libs/speech-audio-rust" }

# Microphone recording
cpal = "0.15"

# Async runtime
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "process", "fs"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"

# Async primitives
once_cell = "1.19"

# Audio processing
hound = "3.5"
rubato = "0.15"

# Python interop (v0.22+ supports Python 3.13)
pyo3 = { version = "0.22", features = ["auto-initialize"] }

# File system
dirs = "5.0"
walkdir = "2.5"

# UUID
uuid = { version = "1.10", features = ["v4"] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

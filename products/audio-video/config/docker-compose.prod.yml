version: '3.8'

# Audio-Video Product - Production Deployment
# Complete stack with all services, persistence, caching, and monitoring

services:
  # API Gateway / Load Balancer
  nginx:
    image: nginx:alpine
    container_name: av-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - stt-service
      - tts-service
      - vision-service
      - multimodal-service
    networks:
      - av-network
    restart: unless-stopped

  # STT Service
  stt-service:
    image: ghatana/audio-video-stt:${VERSION:-latest}
    container_name: av-stt-service
    ports:
      - "50051:50051"
      - "8081:8081"
    environment:
      - STT_GRPC_PORT=50051
      - STT_HTTP_PORT=8081
      - STT_MODEL_PATH=/models/whisper-large-v3.onnx
      - STT_MODEL_ID=whisper-large-v3
      - STT_USE_GPU=true
      - STT_MAX_CONCURRENT=20
      - DB_URL=jdbc:postgresql://postgres:5432/audio_video
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - JAVA_OPTS=-Xmx4g -XX:+UseG1GC
    volumes:
      - ./models:/models:ro
      - ./logs/stt:/app/logs
    depends_on:
      - postgres
      - redis
      - jaeger
    networks:
      - av-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  # TTS Service
  tts-service:
    image: ghatana/audio-video-tts:${VERSION:-latest}
    container_name: av-tts-service
    ports:
      - "50052:50052"
      - "8082:8082"
    environment:
      - TTS_GRPC_PORT=50052
      - TTS_HTTP_PORT=8082
      - TTS_MODEL_PATH=/models/tts-model
      - TTS_USE_GPU=true
      - DB_URL=jdbc:postgresql://postgres:5432/audio_video
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - JAVA_OPTS=-Xmx4g -XX:+UseG1GC
    volumes:
      - ./models:/models:ro
      - ./logs/tts:/app/logs
    depends_on:
      - postgres
      - redis
      - jaeger
    networks:
      - av-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  # Vision Service
  vision-service:
    image: ghatana/audio-video-vision:${VERSION:-latest}
    container_name: av-vision-service
    ports:
      - "50054:50054"
      - "8084:8084"
    environment:
      - VISION_GRPC_PORT=50054
      - VISION_HTTP_PORT=8084
      - VISION_MODEL_PATH=/models/yolo-v8
      - VISION_CONFIDENCE_THRESHOLD=0.5
      - VISION_NMS_THRESHOLD=0.4
      - VISION_USE_GPU=true
      - DB_URL=jdbc:postgresql://postgres:5432/audio_video
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - JAVA_OPTS=-Xmx4g -XX:+UseG1GC
    volumes:
      - ./models:/models:ro
      - ./logs/vision:/app/logs
    depends_on:
      - postgres
      - redis
      - jaeger
    networks:
      - av-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  # Multimodal Service
  multimodal-service:
    image: ghatana/audio-video-multimodal:${VERSION:-latest}
    container_name: av-multimodal-service
    ports:
      - "50055:50055"
      - "8085:8085"
    environment:
      - MULTIMODAL_GRPC_PORT=50055
      - MULTIMODAL_HTTP_PORT=8085
      - DB_URL=jdbc:postgresql://postgres:5432/audio_video
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - STT_SERVICE_HOST=stt-service
      - STT_SERVICE_PORT=50051
      - TTS_SERVICE_HOST=tts-service
      - TTS_SERVICE_PORT=50052
      - VISION_SERVICE_HOST=vision-service
      - VISION_SERVICE_PORT=50054
      - JAVA_OPTS=-Xmx2g -XX:+UseG1GC
    volumes:
      - ./logs/multimodal:/app/logs
    depends_on:
      - postgres
      - redis
      - jaeger
      - stt-service
      - tts-service
      - vision-service
    networks:
      - av-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: av-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=audio_video
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - av-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=3GB"
      - "-c"
      - "maintenance_work_mem=256MB"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: av-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - av-network
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: av-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-admin}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - av-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # Monitoring (extends from monitoring/docker-compose.monitoring.yml)
  # Include via: docker-compose -f docker-compose.prod.yml -f monitoring/docker-compose.monitoring.yml up

networks:
  av-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:

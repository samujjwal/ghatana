# Docker Compose configuration for audio-video integration tests.
#
# Used by AudioVideoContainerBase via Testcontainers' DockerComposeContainer.
# Both services expose:
#   - a gRPC port for the core API
#   - port 8080 for the HTTP health endpoint (/health/live, /health/ready)
#
# Real images are produced by the audio-video CI pipeline (GH-90000).
# Override image names via AUDIO_VIDEO_STT_IMAGE / AUDIO_VIDEO_TTS_IMAGE
# environment variables when running locally against custom builds.

version: "3.9"

networks:
  audio-video-test:
    driver: bridge

services:

  stt-service:
    image: ${AUDIO_VIDEO_STT_IMAGE:-ghatana/stt-service:latest}
    networks:
      - audio-video-test
    ports:
      - "50051"
      - "8080"
    environment:
      STT_GRPC_PORT: "50051"
      STT_HTTP_PORT: "8080"
      STT_DEFAULT_MODEL: "whisper-tiny"
      LOG_LEVEL: "info"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  tts-service:
    image: ${AUDIO_VIDEO_TTS_IMAGE:-ghatana/tts-service:latest}
    networks:
      - audio-video-test
    ports:
      - "50052"
      - "8080"
    environment:
      TTS_GRPC_PORT: "50052"
      TTS_HTTP_PORT: "8080"
      TTS_DEFAULT_VOICE: "en-US-default"
      LOG_LEVEL: "info"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

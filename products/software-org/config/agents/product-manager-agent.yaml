# Product Manager Agent Configuration
# Product Manager - Product Ownership

apiVersion: virtualorg.ghatana.com/v1
kind: Agent
metadata:
  name: product-manager-agent
  labels:
    level: individual-contributor
    department: product
    ai-enabled: "true"

spec:
  displayName: "Product Manager"
  description: |
    Product Manager responsible for product strategy, feature prioritization,
    customer research, and roadmap management. Acts as the voice of the
    customer within the organization.

  role:
    name: ProductManager
    level: individual
    title: "Product Manager"

  department: product
  reportingTo: cpo-agent
  directReports: []

  authority:
    decisionScope: team
    budgetLimit: 50000
    canApprove:
      - feature_priorities
      - user_research
      - backlog_items
      - release_scope
    canEscalateTo:
      - cpo-agent

  capabilities:
    primary:
      - product_management
      - requirements_gathering
      - customer_research
      - roadmap_planning
      - prioritization
    secondary:
      - data_analysis
      - ux_design
      - market_analysis

  ai:
    enabled: true
    provider: openai
    model: gpt-4-turbo

    systemPrompt: |
      You are a Product Manager in a software organization.

      ## Your Role
      You are responsible for defining what gets built and why. You represent
      the customer's voice, gather requirements, prioritize features, and
      ensure the team builds products that solve real problems.

      ## Your Responsibilities
      1. Define and communicate product vision
      2. Gather and analyze customer requirements
      3. Prioritize features based on value and effort
      4. Write clear product specifications
      5. Collaborate with engineering on feasibility
      6. Measure and report on product metrics

      ## Decision Framework - Prioritization
      Use RICE scoring for feature prioritization:
      - Reach: How many customers will this impact?
      - Impact: How significant is the impact?
      - Confidence: How confident are we in estimates?
      - Effort: How much work is required?

      Score = (Reach × Impact × Confidence) / Effort

      ## Stakeholder Management
      - Engineering: Collaborate on feasibility and timelines
      - Sales: Understand customer needs and competitive landscape
      - Support: Learn from customer pain points
      - Marketing: Align on positioning and launch

      ## When to Escalate
      Escalate to CPO when:
      - Feature requires significant investment
      - Conflicts with strategic direction
      - Major customer commitment needed
      - Cross-product implications

      ## Communication Style
      - Be customer-centric in all discussions
      - Back decisions with data when possible
      - Be clear about trade-offs
      - Document requirements thoroughly

    responseConfig:
      maxTokens: 1500
      temperature: 0.7
      topP: 0.9

    tools:
      - name: query_analytics
        enabled: true
      - name: create_specification
        enabled: true
      - name: create_user_story
        enabled: true
      - name: query_customer_feedback
        enabled: true
      - name: calculate_rice_score
        enabled: true
      - name: update_roadmap
        enabled: true

    memory:
      type: long-term
      contextWindow: 50

  workload:
    maxConcurrentTasks: 5
    taskPrioritization: importance-urgency

  availability:
    schedule:
      type: business-hours
    responseTime:
      target: PT1H
      maximum: PT4H

  hitl:
    requireApprovalFor:
      - major_feature_decisions
      - customer_commitments
    approvalChain:
      - cpo-agent

  subscriptions:
    - event: feature_request_received
      action: evaluate_and_prioritize
    - event: customer_feedback_received
      action: analyze_feedback
    - event: sprint_planning_scheduled
      action: prepare_backlog
    - event: release_planning_scheduled
      action: define_release_scope
    - event: competitive_intelligence_received
      action: analyze_and_recommend

  publications:
    - event: feature_request_approved
    - event: roadmap_updated
    - event: specification_completed
    - event: release_scope_defined

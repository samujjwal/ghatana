# Design Synthesis Operator - Consolidated Design Domain
# Consolidates: design_combiner, design_review, design package assembly
# Purpose: Package and synthesize design outputs for stage transition to Build

id: design_synthesis_operator
version: "1.0.0"
domain: design
category: synthesis

description: |
  Unified design synthesis operator for packaging design stage outputs:
  - Combine all design artifacts into coherent package
  - Validate design completeness and consistency
  - Generate handoff checklist for Build stage
  - Ensure all reviews and approvals are complete

# Operator Modes
modes:
  validate:
    description: "Validate design artifacts for completeness"
    role: Design Lead
    inputs:
      - name: architecture_docs
        description: Solution architecture and HLD
        required: true
      - name: component_designs
        description: Component design documents
        required: true
      - name: data_model
        description: Data model and schemas
        required: true
      - name: api_contracts
        description: API specifications
        required: true
      - name: security_design
        description: Security architecture
        required: true
    outputs:
      - name: design_validation_report
        description: Design stage validation results
        format: yaml_report
        schema:
          - artifacts_checked: list
          - completeness_score: number
          - consistency_issues: list
          - gaps: list
          - warnings: list
          - blocking_issues: list
          - ready_for_handoff: boolean
    tasks:
      - Check all required artifacts present
      - Validate cross-artifact consistency
      - Verify traceability to requirements
      - Identify gaps and issues
      - Calculate completeness score

  lint:
    description: "Lint design artifacts for quality"
    role: Design Analyst
    inputs:
      - name: all_design_artifacts
        description: All design documents
        required: true
    outputs:
      - name: design_lint_report
        description: Design quality findings
        format: yaml_report
        schema:
          - total_issues: number
          - critical_issues: list
          - warnings: list
          - suggestions: list
          - quality_score: number
    lint_rules:
      naming:
        - "Consistent naming conventions"
        - "No ambiguous terms"
      structure:
        - "Complete interface definitions"
        - "All dependencies documented"
      documentation:
        - "All components have descriptions"
        - "Examples provided where needed"
      security:
        - "Security controls specified"
        - "Threat mitigations documented"
    tasks:
      - Apply naming convention rules
      - Check structural completeness
      - Validate documentation quality
      - Verify security coverage
      - Generate quality score

  package:
    description: "Package design artifacts for Build handoff"
    role: Design Lead
    inputs:
      - name: design_validation_report
        description: Validation results
        required: true
      - name: all_design_artifacts
        description: All design stage outputs
        required: true
      - name: review_signoffs
        description: Required review approvals
        required: true
    outputs:
      - name: design_package
        description: Complete design stage package
        format: yaml_package
        schema:
          - package_id: string
          - version: string
          - created_date: datetime
          - stage: "design"
          - documents: list
          - approvals: list
          - handoff_checklist: list
          - build_prerequisites: list
          - implementation_notes: list
          - metadata: object
    tasks:
      - Assemble all artifacts into versioned package
      - Include all review signoffs
      - Generate handoff checklist
      - Document build prerequisites
      - Add implementation notes
      - Archive for traceability

  handoff:
    description: "Execute stage transition to Build"
    role: Design Lead
    inputs:
      - name: design_package
        description: Complete design package
        required: true
      - name: build_lead
        description: Build stage lead assignment
        required: true
    outputs:
      - name: handoff_record
        description: Stage transition record
        format: yaml_record
        schema:
          - transition_id: string
          - from_stage: "design"
          - to_stage: "build"
          - handoff_date: datetime
          - from_lead: string
          - to_lead: string
          - package_version: string
          - acceptance_status: "accepted|pending|rejected"
          - clarifications_needed: list
          - notes: list
    tasks:
      - Transfer package to Build stage
      - Conduct handoff meeting
      - Document clarifications
      - Confirm receipt by Build lead
      - Archive design stage state

# Internal Logic
internal_logic:
  perception:
    description: "Aggregate all design stage artifacts and status"
    sources:
      - architecture_outputs
      - component_outputs
      - data_model_outputs
      - api_outputs
      - security_outputs
  model:
    description: "Stage completion tracking"
    entities:
      - artifact: "{id, type, status, version, approval_status}"
      - signoff: "{reviewer, artifact, date, status}"
      - issue: "{id, severity, artifact, resolution}"
    relationships:
      - artifact_requires_signoff
      - issue_blocks_handoff
  planning:
    strategy: |
      1. Verify all artifacts present
      2. Validate consistency across artifacts
      3. Collect all required signoffs
      4. Package only when criteria met
  action:
    description: "Output packaged artifacts and handoff record"
    validation: "Design lead and architect sign-off required"

# Completeness Criteria
completeness:
  required_artifacts:
    - solution_architecture
    - high_level_design
    - component_designs
    - design_patterns
    - data_model
    - api_contracts
    - security_design
    - threat_model
  required_reviews:
    - architecture_review
    - security_review
    - design_peer_review
  required_signoffs:
    - solution_architect
    - security_architect
    - design_lead
    - tech_lead
  minimum_score: 95

# Handoff Checklist Template
handoff_checklist:
  - "All architecture documents reviewed and approved"
  - "Component designs complete with interfaces"
  - "Data model and schemas finalized"
  - "API contracts validated"
  - "Security design and threat model approved"
  - "All design decisions documented"
  - "Traceability to requirements verified"
  - "Implementation notes prepared"
  - "Build team briefed on design"
  - "Known issues documented"

# Quality Assurance
quality:
  templates:
    - design_package_template
    - handoff_record_template
  checklists:
    - completeness_checklist
    - consistency_checklist
    - signoff_checklist
  automated_checks:
    - missing_artifact_detection
    - cross_reference_validation
    - version_consistency_check

# Validation Rules
validation:
  rules:
    - "Package must include all required artifacts"
    - "All required reviews must be complete"
    - "No critical issues outstanding"
    - "Completeness score >= 95%"
  review_gates:
    - design_lead_approval
    - architect_sign_off

# Escalation
escalation:
  triggers:
    - "Missing required artifact"
    - "Review not completed"
    - "Critical design issue unresolved"
  paths:
    - role: Solution Architect
      for: "Architecture completeness issues"
    - role: PMO
      for: "Review timeline concerns"
    - role: Project Sponsor
      for: "Scope decisions affecting design"

# Dependencies
dependencies:
  upstream:
    - architecture_operator
    - component_operator
    - data_model_operator
    - api_operator
    - security_design_operator
  downstream:
    - build_stage_operators

# Metrics
metrics:
  - name: design_stage_duration
    description: "Time from start to handoff"
    target: "<= planned duration"
  - name: artifact_completeness
    description: "Required artifacts present"
    target: "100%"
  - name: review_cycle_time
    description: "Average review completion time"
    target: "<= 3 business days"
  - name: design_defect_rate
    description: "Defects found in Build traceable to design"
    target: "< 5%"

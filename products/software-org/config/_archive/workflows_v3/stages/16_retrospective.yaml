# Retrospective Stage - v3 Operator-Based Definition
# Uses consolidated operators from operations/domain/operate/
name: Retrospective
description: Post-mortem analysis, lessons learned, and continuous improvement
domain: operate

# Operators used in this stage
operators:
  - ref: operate/incident_operator
    modes: [postmortem]

# Cross-cutting operators
cross_cutting:
  - ref: cross-cutting/milestone_tracker
    params:
      stage: retrospective
  - ref: cross-cutting/best_practice
    params:
      stage: retrospective
  - ref: cross-cutting/feedback_loop
    params:
      stage: retrospective
  - ref: cross-cutting/risk_trend
    params:
      stage: retrospective
  - ref: cross-cutting/audit_log
    params:
      stage: retrospective

# Workflow sequence
workflow:
  # Post-mortem Analysis
  - step: postmortem_analysis
    operator: operate/incident_operator
    mode: postmortem
    inputs:
      - name: backup_stage_milestone
      - name: incident_data
    outputs:
      - name: postmortem_reports
    hitl: true
    hitl_reason: Human leads retrospective meetings

  # Feedback Collection
  - step: collect_feedback
    operator: cross-cutting/feedback_loop
    params:
      stage: retrospective
    inputs:
      - name: postmortem_reports
    outputs:
      - name: feedback_summary
    depends_on: [postmortem_analysis]

  # Risk Trend Analysis
  - step: analyze_risk_trends
    operator: cross-cutting/risk_trend
    params:
      stage: retrospective
    inputs:
      - name: postmortem_reports
      - name: feedback_summary
    outputs:
      - name: risk_trend_analysis
    depends_on: [collect_feedback]

  # Lessons Learned
  - step: document_lessons
    type: manual
    description: Document lessons learned and improvement actions
    inputs:
      - name: postmortem_reports
      - name: feedback_summary
      - name: risk_trend_analysis
    outputs:
      - name: lessons_learned
    depends_on: [analyze_risk_trends]
    hitl: true
    hitl_reason: Human documents lessons learned

  # Improvement Planning
  - step: plan_improvements
    type: manual
    description: Plan process and tooling improvements
    inputs:
      - name: lessons_learned
    outputs:
      - name: improvement_plan
    depends_on: [document_lessons]
    hitl: true
    hitl_reason: Human plans improvements

  # Cross-cutting
  - step: best_practice_check
    operator: cross-cutting/best_practice
    params:
      stage: retrospective
    inputs:
      - name: lessons_learned
      - name: improvement_plan
    outputs:
      - name: best_practice_report
    depends_on: [plan_improvements]

  - step: track_milestones
    operator: cross-cutting/milestone_tracker
    params:
      stage: retrospective
    inputs:
      - name: best_practice_report
    outputs:
      - name: retrospective_milestone
    depends_on: [best_practice_check]

# Stage entry/exit criteria
entry_criteria:
  - Release cycle complete
  - Incident data available

exit_criteria:
  - Post-mortems documented
  - Lessons learned captured
  - Improvement plan created

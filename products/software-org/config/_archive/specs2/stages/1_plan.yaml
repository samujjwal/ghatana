name: Plan (with Security & Cloud Readiness)
workflow:
  - id: clarify_product_idea
    agent: EnhancedProductIdeaClarifier
    role: Senior Product Analyst
    inputs_spec:
      - name: user
        description: Initial product idea input from user, including any details, context, or requirements provided.
        format: Free-form text, possibly structured Q&A.
        example: "A SaaS platform for secure document sharing in regulated industries."
    outputs_spec:
      - name: clarified_product_idea
        description: Product idea, clarified and rephrased for security and cloud readiness, with ambiguities resolved and user needs identified.
        format: Structured summary (1-2 sentences), bullet points for open questions.
        example: |
          Product Idea: "A SaaS platform for secure document sharing, targeting healthcare and finance, with HIPAA/GDPR compliance and cloud deployment."
          Open Questions: ["What types of documents?", "What compliance standards?", "Preferred cloud provider?"]
    acceptance_criteria:
      - Product idea is clearly described in 1-2 sentences, with security and cloud context if relevant.
      - Ambiguities, unclear terms, and missing security/cloud context are rephrased or clarified.
      - Core value proposition and differentiators are identified.
      - Intended user groups and personas (with security/privacy needs) are described.
      - Open questions for further clarification are flagged, especially around sensitive data, compliance, or cloud deployment.
    agent_tasks:
      - Clarify and rephrase the product idea for security and cloud context.
      - Identify and document ambiguities or unclear terms.
      - Summarize value proposition and differentiators.
      - List intended user groups and personas, noting security/privacy needs.
      - Flag open questions, especially those on sensitive data, compliance, or cloud.
    dependencies: []
    failure_escalation:
      - If product idea cannot be clarified due to lack of information, escalate to user or project sponsor for input.
    references: []
  - id: plan_best_practice_enforcement
    agent: EnhancedPlanBestPracticeAgent
    role: Senior Business Process & Security Auditor
    inputs_spec:
      - name: clarified_product_idea
        description: Clarified and security-aware product idea from previous step.
        format: Structured summary with bullet points for open questions.
    outputs_spec:
      - name: plan_best_practice_report
        description: Report on alignment with business, security, and cloud best practices, including deviations and recommendations.
        format: Structured report with sections for references, deviations, recommendations, and risk mitigations.
        example: |
          Best Practices Referenced: ["NIST SP 800-53", "CIS Controls", "Cloud Security Alliance"]
          Deviations: ["No DLP controls planned"]
          Recommendations: ["Add DLP module", "Review cloud encryption"]
          Risks: ["Non-compliance with GDPR"]
    acceptance_criteria:
      - All relevant business process, security, and cloud best practices are referenced.
      - Deviations from best practice (including security/compliance/cloud) are highlighted.
      - Recommendations for alignment, remediation, and secure-by-design are provided.
      - Risks of non-compliance or insecure practices are described, with suggested mitigations.
    agent_tasks:
      - Review clarified product idea against business, security, and cloud best practices.
      - Identify and document any deviations.
      - Provide actionable recommendations for alignment and remediation.
      - Describe risks of non-compliance or insecure practices and suggest mitigations.
    dependencies:
      - clarified_product_idea
    failure_escalation:
      - Escalate to security/compliance lead if critical risks are found without feasible mitigations.
    references:
      - "NIST SP 800-53"
      - "CIS Controls"
      - "Cloud Security Alliance Best Practices"
  - id: plan_milestone_tracker
    agent: EnhancedPlanMilestoneTrackerAgent
    role: Senior PMO Analyst
    inputs_spec:
      - name: plan_best_practice_report
        description: Report on business, security, and cloud best practices, including deviations and recommendations.
        format: Structured report.
    outputs_spec:
      - name: plan_stage_milestone
        description: Structured list of project milestones, including security/cloud milestones, dependencies, owners, and acceptance criteria.
        format: "List of milestones with fields: id, description, dependencies, target date, owner, status, acceptance criteria, risks."
        example: |
          - id: M1
            description: "Define requirements"
            dependencies: []
            target_date: "2024-07-01"
            owner: "PM"
            status: "planned"
            acceptance_criteria: ["Requirements signed off"]
            risks: []
    acceptance_criteria:
      - Each planned milestone is clearly described, uniquely identified, and includes security/cloud milestones if applicable.
      - Dependencies, prerequisites, and required approvals (including security and compliance) are explicitly mapped.
      - Target dates, durations, responsible owners, and milestone acceptance criteria are included.
      - Milestone status (planned, in-progress, completed, blocked) is updated.
      - Any risks, blockers, or compliance/security issues are flagged for review.
    agent_tasks:
      - Define and document all major milestones, including security/cloud.
      - Map all dependencies, prerequisites, and required approvals.
      - Assign owners, target dates, and durations.
      - Track and update milestone status.
      - Flag risks, blockers, or compliance/security issues.
    dependencies:
      - plan_best_practice_report
    failure_escalation:
      - Escalate to PMO or security/compliance lead if critical milestone blockers are found.
    references: []
  - id: business_goals
    agent: EnhancedBusinessGoalsAgent
    role: Senior Product Owner
    inputs_spec:
      - name: plan_stage_milestone
        description: Structured milestone plan with security/cloud milestones and dependencies.
        format: List of milestone objects.
    outputs_spec:
      - name: business_goals
        description: Clear, concise business goals, including security, compliance, and cloud-readiness goals, mapped to milestones.
        format: List of goal objects (description, measurable indicator, mapped milestone, notes).
        example: |
          - description: "Achieve HIPAA compliance for all document storage"
            measurable: true
            mapped_milestone: "M2"
    acceptance_criteria:
      - Business goals are stated clearly and concisely, including security, compliance, and cloud-readiness goals where appropriate.
      - Each goal is measurable or has a success indicator.
      - Goals are aligned with the clarified product idea and mapped to milestones.
      - Potential conflicts, ambiguities, or gaps (especially in security/compliance) are flagged.
    agent_tasks:
      - Identify and document business goals, including security/compliance/cloud.
      - Ensure each goal has a measurable indicator or success metric.
      - Map each goal to relevant milestones.
      - Flag conflicts, ambiguities, or gaps.
    dependencies:
      - plan_stage_milestone
    failure_escalation:
      - Escalate to product owner or compliance lead if goals are ambiguous or conflict with compliance/security.
    references: []
  - id: success_criteria
    agent: EnhancedSuccessCriteriaAgent
    role: Senior Business Sponsor
    inputs_spec:
      - name: business_goals
        description: List of business goals, including security, compliance, and cloud-readiness goals.
        format: List of goal objects.
    outputs_spec:
      - name: success_criteria
        description: Specific, measurable, time-bound criteria for success, mapped to business goals, including security/compliance/cloud.
        format: List of criteria (description, goal mapping, owner, timebound, testability).
        example: |
          - description: "HIPAA audit passed by Q3"
            goal: "Achieve HIPAA compliance"
            owner: "Compliance Officer"
            timebound: "Q3"
            testable: true
    acceptance_criteria:
      - Success criteria are specific, measurable, time-bound, and include security/compliance/cloud-readiness where relevant.
      - Each criterion maps to a business goal and has an owner.
      - Criteria are realistic, achievable, and reviewed for testability.
      - Any missing, ambiguous, or conflicting criteria (especially for security/compliance) are flagged.
    agent_tasks:
      - Define specific, measurable, time-bound success criteria for each goal.
      - Map each criterion to a business goal and assign an owner.
      - Review for achievability and testability.
      - Flag missing, ambiguous, or conflicting criteria.
    dependencies:
      - business_goals
    failure_escalation:
      - Escalate to business sponsor or compliance lead if criteria are missing or untestable.
    references: []
  - id: goals_criteria_combiner
    agent: EnhancedGoalsCriteriaCombiner
    role: Senior Analyst/Combiner
    inputs_spec:
      - name: business_goals
        description: List of business goals.
        format: List of goal objects.
      - name: success_criteria
        description: List of mapped success criteria.
        format: List of criteria objects.
    outputs_spec:
      - name: goals_and_criteria
        description: Combined, logically structured mapping of business goals to corresponding success criteria, with security/compliance/cloud context.
        format: List of mappings (goal, criteria, milestone reference, notes).
        example: |
          - goal: "Achieve HIPAA compliance"
            criteria: ["HIPAA audit passed by Q3"]
            milestone: "M2"
    acceptance_criteria:
      - All business goals are mapped to corresponding success criteria, including security, compliance, and cloud-readiness.
      - Gaps, mismatches, or ambiguities between goals and criteria (especially in security/compliance) are identified and flagged.
      - Combined output is logically structured, traceable to milestones, and free of contradictions.
      - Ensure all referenced artifacts are current, versioned, and include security/compliance context where needed.
    agent_tasks:
      - Map each business goal to one or more success criteria.
      - Identify and flag gaps, mismatches, or ambiguities.
      - Structure output for traceability to milestones.
      - Verify all referenced artifacts are current and versioned.
    dependencies:
      - business_goals
      - success_criteria
    failure_escalation:
      - Escalate to analyst or compliance lead if mapping is incomplete or ambiguous.
    references: []
  - id: stakeholder_list
    agent: StakeholderListAgent
    role: Business Analyst
    inputs_spec:
      - name: goals_and_criteria
        description: Combined business goals and mapped success criteria, providing the context for identifying relevant stakeholders.
        format: List of mappings (goal, criteria, milestone reference, notes)
        example: |
          - goal: "Achieve HIPAA compliance"
            criteria: ["HIPAA audit passed by Q3"]
            milestone: "M2"
    outputs_spec:
      - name: stakeholder_list
        description: List of stakeholders, their roles, and areas of interest.
        format: List of stakeholder objects (name, role, interest/area, mapping to goal/criteria)
        example: |
          - name: "Jane Doe"
            role: "Security Officer"
            interest: "Data protection, compliance"
            mapped_goal: "Achieve HIPAA compliance"
    acceptance_criteria:
      - All relevant stakeholders are identified, with roles and interests described.
      - Stakeholder mapping is based on business goals and success criteria.
      - Missing or ambiguous stakeholders are flagged for review.
      - Stakeholder list is versioned and available for downstream agents.
    agent_tasks:
      - Review combined goals and criteria to identify stakeholder roles and interest areas.
      - Consult organizational directory and previous project records as needed.
      - Document stakeholders, their roles, areas of concern, and mapped goals.
      - Flag missing, unclear, or high-risk stakeholders for review/escalation.
    dependencies:
      - goals_and_criteria
    failure_escalation:
      - If stakeholder mapping is incomplete or ambiguous, escalate to project sponsor or business owner.
    references:
      - RACI matrix template
      - Previous project stakeholder lists
  - id: stakeholder_engagement
    agent: StakeholderEngagementAgent
    role: Project Manager
    inputs_spec:
      - name: stakeholder_list
        description: List of stakeholders, their roles, and mapped goals/criteria.
        format: List of stakeholder objects (name, role, interest/area, mapped_goal)
        example: |
          - name: "Jane Doe"
            role: "Security Officer"
            interest: "Data protection, compliance"
            mapped_goal: "Achieve HIPAA compliance"
    outputs_spec:
      - name: stakeholder_engagement_plan
        description: Engagement plan for each stakeholder, including strategies, communication channels, frequencies, and risk mitigation.
        format: List of engagement objects (stakeholder, strategy, channel, frequency, risks)
        example: |
          - stakeholder: "Jane Doe"
            strategy: "Weekly sync on compliance progress"
            channel: "Email, Slack"
            frequency: "Weekly"
            risks: ["Missed compliance updates"]
    acceptance_criteria:
      - Engagement strategies for each stakeholder are outlined.
      - Communication channels and frequencies are specified.
      - Risks from lack of engagement are identified.
    agent_tasks:
      - Develop engagement strategies for each stakeholder.
      - Specify communication channels and contact frequency.
      - Identify and flag risks arising from lack of engagement.
    dependencies:
      - stakeholder_list
    failure_escalation:
      - Escalate to project sponsor if engagement plan is incomplete or high-risk stakeholders are not addressed.
    references: []
  - id: stakeholder_mapping_combiner
    agent: StakeholderMappingCombiner
    role: Analyst/Combiner
    inputs_spec:
      - name: stakeholder_list
        description: List of stakeholders, their roles, and mapped goals/criteria.
        format: List of stakeholder objects
      - name: stakeholder_engagement_plan
        description: Engagement plan for each stakeholder.
        format: List of engagement objects
    outputs_spec:
      - name: stakeholders_and_engagement
        description: Combined mapping of stakeholders to engagement plans, highlighting completeness and any gaps/overlaps.
        format: List of stakeholder-engagement mappings (stakeholder, engagement details, notes)
        example: |
          - stakeholder: "Jane Doe"
            engagement: "Weekly sync on compliance progress"
            channel: "Email"
            frequency: "Weekly"
            notes: []
    acceptance_criteria:
      - Stakeholder mapping is complete and accurate.
      - Engagement plans are matched to each stakeholder.
      - Gaps or overlaps in engagement are flagged.
      - Ensure all referenced artifacts are current and versioned.
    agent_tasks:
      - Combine stakeholder list with engagement plans.
      - Identify and flag gaps or overlaps in engagement.
      - Ensure all references are current and versioned.
    dependencies:
      - stakeholder_list
      - stakeholder_engagement_plan
    hitl: true
    hitl_reason: Human ensures stakeholder mapping is accurate and comprehensive
    failure_escalation:
      - Escalate to PMO if mapping is incomplete or engagement gaps are unresolved.
    references: []
  - id: functional_requirements
    agent: FunctionalRequirementsAgent
    role: Business Analyst
    inputs_spec:
      - name: stakeholders_and_engagement
        description: Combined mapping of stakeholders and their engagement plans.
        format: List of stakeholder-engagement mappings
    outputs_spec:
      - name: functional_requirements
        description: List of clear, testable, and mapped functional requirements.
        format: List of requirement objects (description, mapped stakeholder/goal, testability)
        example: |
          - description: "User can upload documents securely"
            mapped_stakeholder: "Jane Doe"
            testable: true
    acceptance_criteria:
      - All major functional requirements are listed.
      - Each requirement is clear, testable, and unambiguous.
      - Requirements are mapped to user needs or goals.
    agent_tasks:
      - Gather and document all major functional requirements.
      - Ensure clarity, testability, and mapping to user needs/goals.
    dependencies:
      - stakeholders_and_engagement
    failure_escalation:
      - Escalate to product owner if requirements are unclear or not testable.
    references: []
  - id: functional_requirements_reviewer
    agent: FunctionalRequirementsReviewerAgent
    role: Product Owner
    inputs_spec:
      - name: functional_requirements
        description: List of documented functional requirements.
        format: List of requirement objects
    outputs_spec:
      - name: reviewed_functional_requirements
        description: Reviewed, prioritized, and clarified functional requirements.
        format: List of reviewed requirement objects (description, priority, notes)
        example: |
          - description: "User can upload documents securely"
            priority: "High"
            notes: []
    acceptance_criteria:
      - All functional requirements are reviewed for completeness.
      - Ambiguities or gaps are identified and flagged.
      - Requirements are prioritized or ordered if needed.
    agent_tasks:
      - Review all functional requirements for completeness and correctness.
      - Identify and flag ambiguities or gaps.
      - Prioritize or order requirements as needed.
    dependencies:
      - functional_requirements
    hitl: true
    hitl_reason: Human reviews functional requirements for completeness and correctness
    failure_escalation:
      - Escalate to business analyst if requirements are incomplete or ambiguous.
    references: []
  - id: functional_requirements_combiner
    agent: FunctionalRequirementsCombiner
    role: Analyst/Combiner
    inputs_spec:
      - name: reviewed_functional_requirements
        description: Reviewed and prioritized functional requirements.
        format: List of reviewed requirement objects
    outputs_spec:
      - name: final_functional_requirements
        description: Final consolidated list of functional requirements, ready for NFR analysis.
        format: List of consolidated requirement objects
        example: |
          - description: "User can upload documents securely"
            priority: "High"
    acceptance_criteria:
      - All reviewed requirements are consolidated without duplication.
      - Conflicting requirements are resolved or flagged.
      - The final list is ready for non-functional requirements analysis.
      - Ensure all referenced artifacts are current and versioned.
    agent_tasks:
      - Consolidate reviewed requirements, removing duplicates.
      - Resolve or flag conflicting requirements.
      - Prepare final list for NFR analysis.
      - Ensure all references are current and versioned.
    dependencies:
      - reviewed_functional_requirements
    failure_escalation:
      - Escalate to product owner if conflicts remain unresolved.
    references: []
  - id: non_functional_requirements
    agent: NonFunctionalRequirementsAgent
    role: Solution Architect
    inputs_spec:
      - name: final_functional_requirements
        description: Final list of consolidated functional requirements.
        format: List of requirement objects
    outputs_spec:
      - name: non_functional_requirements
        description: List of non-functional requirements (NFRs) covering key quality attributes.
        format: List of NFR objects (category, description, measurable)
        example: |
          - category: "Performance"
            description: "System handles 1000 concurrent users"
            measurable: true
    acceptance_criteria:
      - All relevant non-functional requirements (NFRs) are identified.
      - NFRs cover performance, security, scalability, reliability, etc.
      - NFRs are clear and measurable where possible.
    agent_tasks:
      - Identify and document all relevant NFRs.
      - Ensure NFRs are clear and measurable where possible.
    dependencies:
      - final_functional_requirements
    failure_escalation:
      - Escalate to solution architect if NFRs are missing or unclear.
    references: []
  - id: non_functional_requirements_reviewer
    agent: NonFunctionalRequirementsReviewerAgent
    role: Systems Analyst
    inputs_spec:
      - name: non_functional_requirements
        description: List of non-functional requirements (NFRs).
        format: List of NFR objects
    outputs_spec:
      - name: reviewed_nfr
        description: Reviewed and validated NFRs, with risks and gaps flagged.
        format: List of reviewed NFR objects (description, issues, risks)
        example: |
          - category: "Performance"
            description: "System handles 1000 concurrent users"
            risks: []
    acceptance_criteria:
      - All NFRs are reviewed for completeness and correctness.
      - Missing or conflicting NFRs are flagged.
      - Risks related to NFRs are identified.
    agent_tasks:
      - Review NFRs for completeness and correctness.
      - Identify and flag missing or conflicting NFRs.
      - Identify risks related to NFRs.
    dependencies:
      - non_functional_requirements
    hitl: true
    hitl_reason: Human reviews non-functional requirements for risks and omissions
    failure_escalation:
      - Escalate to solution architect if NFR risks are not addressed.
    references: []
  - id: non_functional_requirements_combiner
    agent: NonFunctionalRequirementsCombiner
    role: Analyst/Combiner
    inputs_spec:
      - name: reviewed_nfr
        description: Reviewed and validated NFRs.
        format: List of reviewed NFR objects
    outputs_spec:
      - name: final_non_functional_requirements
        description: Final consolidated list of NFRs, with overlaps/contradictions resolved.
        format: List of consolidated NFR objects
        example: |
          - category: "Performance"
            description: "System handles 1000 concurrent users"
    acceptance_criteria:
      - All reviewed NFRs are consolidated into a single list.
      - Overlaps or contradictions are resolved or flagged.
      - Ensure all referenced artifacts are current and versioned.
    agent_tasks:
      - Consolidate reviewed NFRs.
      - Resolve or flag overlaps and contradictions.
      - Ensure all references are current and versioned.
    dependencies:
      - reviewed_nfr
    failure_escalation:
      - Escalate to systems analyst if contradictions remain unresolved.
    references: []
  - id: constraints
    agent: ConstraintsAgent
    role: Project Manager
    inputs_spec:
      - name: final_non_functional_requirements
        description: Final list of non-functional requirements.
        format: List of NFR objects
    outputs_spec:
      - name: project_constraints
        description: All identified project constraints, with impact on requirements noted.
        format: List of constraint objects (description, impacted_requirements)
        example: |
          - description: "Must use AWS GovCloud"
            impacted_requirements: ["Data residency"]
    acceptance_criteria:
      - All project constraints are identified and listed.
      - Each constraint is described clearly.
      - Impact of constraints on requirements is noted.
    agent_tasks:
      - Identify and document all project constraints.
      - Describe each constraint clearly.
      - Note impact of constraints on requirements.
    dependencies:
      - final_non_functional_requirements
    failure_escalation:
      - Escalate to PMO if constraints are unclear or missing.
    references: []
  - id: assumptions
    agent: AssumptionsAgent
    role: Technical Lead
    inputs_spec:
      - name: project_constraints
        description: List of project constraints, with impacted requirements.
        format: List of constraint objects
    outputs_spec:
      - name: project_assumptions
        description: Explicitly listed project assumptions, with mapping to requirements or constraints.
        format: List of assumption objects (description, mapped_requirement_or_constraint, risk_level)
        example: |
          - description: "Users will have SSO available"
            mapped_constraint: "Must use company IdP"
            risk_level: "Medium"
    acceptance_criteria:
      - All project assumptions are explicitly listed.
      - Unverified or risky assumptions are flagged.
      - Assumptions are mapped to requirements or constraints.
    agent_tasks:
      - List all project assumptions.
      - Flag unverified or risky assumptions.
      - Map assumptions to requirements or constraints.
    dependencies:
      - project_constraints
    failure_escalation:
      - Escalate to technical lead if assumptions are not validated.
    references: []
  - id: constraints_assumptions_combiner
    agent: ConstraintsAssumptionsCombiner
    role: Analyst/Combiner
    inputs_spec:
      - name: project_constraints
        description: List of project constraints.
        format: List of constraint objects
      - name: project_assumptions
        description: List of project assumptions.
        format: List of assumption objects
    outputs_spec:
      - name: constraints_and_assumptions
        description: Synthesized view of all constraints and assumptions, with conflicts/gaps flagged.
        format: List of combined objects (constraint/assumption, mapping, issues)
        example: |
          - constraint: "Must use AWS GovCloud"
            assumption: "Cloud services available in region"
            issues: []
    acceptance_criteria:
      - Constraints and assumptions are synthesized into a coherent list.
      - Conflicts or gaps are identified and flagged.
      - Ensure all referenced artifacts are current and versioned.
    agent_tasks:
      - Synthesize constraints and assumptions into a coherent list.
      - Identify and flag conflicts or gaps.
      - Ensure all references are current and versioned.
    dependencies:
      - project_constraints
      - project_assumptions
    hitl: true
    hitl_reason: Human ensures constraints and assumptions are correctly synthesized
    failure_escalation:
      - Escalate to PMO if synthesis is incomplete or conflicts are unresolved.
    references: []
  - id: clarification_questions
    agent: ClarificationQuestionsAgent
    role: Business Analyst
    inputs_spec:
      - name: constraints_and_assumptions
        description: Synthesized list of constraints and assumptions.
        format: List of combined objects
    outputs_spec:
      - name: clarification_questions
        description: List of clear and actionable clarification questions, prioritized by importance or risk.
        format: List of question objects (question, related_constraint_or_assumption, priority)
        example: |
          - question: "Is SSO required for all user roles?"
            related_constraint: "Must use company IdP"
            priority: "High"
    acceptance_criteria:
      - All unclear points are turned into clarification questions.
      - Each question is clear and actionable.
      - Questions are prioritized by importance or risk.
    agent_tasks:
      - Identify unclear points and turn them into questions.
      - Ensure questions are clear and actionable.
      - Prioritize questions by importance or risk.
    dependencies:
      - constraints_and_assumptions
    hitl: true
    hitl_reason: Human generates and reviews clarification questions for accuracy
    failure_escalation:
      - Escalate to project sponsor if critical clarifications are not obtained.
    references: []
  - id: risk
    agent: RiskAgent
    role: Risk Manager
    inputs_spec:
      - name: constraints_and_assumptions
        description: Synthesized list of constraints and assumptions.
        format: List of combined objects
    outputs_spec:
      - name: project_risks
        description: List of major project risks, categorized and with impact/likelihood estimates.
        format: List of risk objects (description, category, impact, likelihood)
        example: |
          - description: "Cloud service unavailable in region"
            category: "Technical"
            impact: "High"
            likelihood: "Medium"
    acceptance_criteria:
      - All major project risks are identified and described.
      - Risks are categorized (e.g., technical, business, security).
      - Potential impact and likelihood are estimated for each risk.
    agent_tasks:
      - Identify and describe all major project risks.
      - Categorize risks.
      - Estimate impact and likelihood for each risk.
    dependencies:
      - constraints_and_assumptions
    failure_escalation:
      - Escalate to risk manager if high-impact risks are not addressed.
    references: []
  - id: dependency
    agent: DependencyAgent
    role: Solution Architect
    inputs_spec:
      - name: project_risks
        description: List of major project risks.
        format: List of risk objects
    outputs_spec:
      - name: project_dependencies
        description: List of key project dependencies, with impact and associated risks.
        format: List of dependency objects (description, impact, related_risks)
        example: |
          - description: "External authentication service"
            impact: "Critical for login"
            related_risks: ["Service downtime"]
    acceptance_criteria:
      - All key dependencies are listed (internal/external).
      - Each dependency is described with its impact.
      - Risks from dependencies are identified.
    agent_tasks:
      - List all key dependencies.
      - Describe each dependency's impact.
      - Identify risks from dependencies.
    dependencies:
      - project_risks
    failure_escalation:
      - Escalate to solution architect if critical dependencies are not addressed.
    references: []
  - id: risk_dependency_combiner
    agent: RiskDependencyCombiner
    role: Analyst/Combiner
    inputs_spec:
      - name: project_risks
        description: List of major project risks.
        format: List of risk objects
      - name: project_dependencies
        description: List of key project dependencies.
        format: List of dependency objects
    outputs_spec:
      - name: risks_and_dependencies
        description: Combined view of risks and dependencies, with interactions and gaps flagged.
        format: List of combined objects (risk, dependency, interaction, notes)
        example: |
          - risk: "Service downtime"
            dependency: "External authentication service"
            interaction: "Critical path"
            notes: []
    acceptance_criteria:
      - Risks and dependencies are combined into a single coherent view.
      - Interactions or compounding effects are identified.
      - Gaps or missing items are flagged.
      - Ensure all referenced artifacts are current and versioned.
    agent_tasks:
      - Combine risks and dependencies into a coherent view.
      - Identify interactions or compounding effects.
      - Flag gaps or missing items.
      - Ensure all references are current and versioned.
    dependencies:

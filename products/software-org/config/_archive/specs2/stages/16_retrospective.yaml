name: Retrospective & Continuous Improvement
workflow:
  - id: retro_collect
    agent: RetrospectiveAgent
    role: Team Facilitator
    inputs_spec:
      - name: monitor_progress_dashboard
        description: Monitor progress dashboard for findings collection.
        format: Dashboard artifact
    outputs_spec:
      - name: retro_findings
        description: Collected feedback, lessons learned, improvement opportunities.
        format: Retrospective findings artifact
    agent_tasks:
      - Collect feedback, lessons learned, and improvement opportunities from all stages.
    acceptance_criteria:
      - Feedback, lessons learned, improvement opportunities collected from all stages.
    dependencies:
      - monitor_progress_dashboard
    failure_escalation:
      - Escalate to Team Facilitator if findings not collected.
    references: []
    hitl: false

  - id: improvement_action
    agent: ImprovementActionAgent
    role: Improvement Owner
    inputs_spec:
      - name: retro_findings
        description: Retrospective findings for action planning.
        format: Retrospective findings artifact
    outputs_spec:
      - name: improvement_plan
        description: Action items for process/tooling/automation improvements.
        format: Improvement plan artifact
    agent_tasks:
      - Define/prioritize/assign concrete action items for improvement.
    acceptance_criteria:
      - Action items defined, prioritized, and assigned.
    dependencies:
      - retro_findings
    failure_escalation:
      - Escalate to Improvement Owner if actions not defined/assigned.
    references: []
    hitl: false

  - id: retro_notification_agent
    agent: NotificationAgent
    role: PMO Communications
    inputs_spec:
      - name: improvement_plan
        description: Improvement plan for notification.
        format: Improvement plan artifact
    outputs_spec:
      - name: retro_notifications
        description: Stakeholder notifications on improvement actions.
        format: List of notification objects
    agent_tasks:
      - Notify stakeholders of improvement actions/responsibilities.
    acceptance_criteria:
      - Stakeholders notified of improvement actions/responsibilities.
    dependencies:
      - improvement_plan
    failure_escalation:
      - Escalate to PMO if notifications not delivered.
    references: []
    hitl: false

  - id: retro_audit_log_agent
    agent: AuditLogAgent
    role: Compliance Bot
    inputs_spec:
      - name: retro_findings
        description: Retrospective findings for audit logging.
        format: Retrospective findings artifact
      - name: improvement_plan
        description: Improvement plan for audit logging.
        format: Improvement plan artifact
      - name: retro_notification_agent
        description: Retro notification agent log.
        format: List of notification objects
    outputs_spec:
      - name: retro_audit_log
        description: Retrospective agent actions/decisions for audit/traceability.
        format: Audit log artifact
    agent_tasks:
      - Log all retrospective agent actions and decisions for audit/traceability.
    acceptance_criteria:
      - All retrospective agent actions and decisions logged for audit/traceability.
    dependencies:
      - retro_findings
      - improvement_plan
      - retro_notification_agent
    failure_escalation:
      - Escalate to Compliance Bot if actions/decisions not logged.
    references: []
    hitl: false
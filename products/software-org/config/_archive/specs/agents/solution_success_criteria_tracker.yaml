id: solution_success_criteria_tracker
agent: SuccessCriteriaTrackerAgent
role: Solution Success Criteria Tracker
inputs_spec:
- name: solution_stage_milestone
  description: Solution stage milestone plan.
  format: List of milestone objects
outputs_spec:
- name: solution_success_criteria_status
  description: Status of solution stage success criteria, progress, blockers, and risks.
  format: List of criteria status objects (criterion, status, blockers, risks)
  example: "- criterion: \"Architecture signoff\"\n  status: \"complete\"\n  blockers: []\n  risks: []\n"
agent_tasks:
- Define and track solution stage success criteria.
- Report progress and blockers for each criterion.
- Flag risks or issues affecting solution success criteria.
acceptance_criteria:
- Solution stage success criteria are clearly defined and tracked.
- Progress and blockers for each criterion are reported.
- Any risks or issues affecting solution success criteria are flagged.
dependencies:
- solution_stage_milestone
failure_escalation:
- Escalate to criteria tracker or PM if criteria are unclear or not met.
references: []
hitl: false

# [!!] No custom enhancement found.

agent: "DocumentationGeneratorAgent"
role: "Tech Writer/Automation"
inputs_spec:
- name: "modularized_codebase"
  description: "Final modularized codebase for doc generation."
  format: "Source repo or artifact"
outputs_spec:
- name: "generated_documentation"
  description: "Generated or updated documentation for all modules and APIs."
  format: "Documentation artifact"

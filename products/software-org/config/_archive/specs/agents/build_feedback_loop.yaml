---
id: "build_feedback_loop"
agent: "FeedbackLoopAgent"
role: "CI/CD Coach/Automation"
inputs_spec:
- name: "build_progress_dashboard"
  description: "Build progress dashboard with issues/improvements."
  format: "Dashboard artifact"
outputs_spec:
- name: "build_feedback_items"
  description: "Feedback/improvements for build, routed to Retrospective."
  format: "List of feedback items"
agent_tasks:
- "Route all build issues/improvement suggestions to Retrospective."
- "Track feedback for closure/action."
acceptance_criteria:
- "All issues/improvement suggestions are routed to Retrospective."
- "Feedback is tracked for closure/action."
dependencies:
- "build_progress_dashboard"
failure_escalation:
- "Escalate to CI/CD coach if feedback is not acted on or routed."
references: []
hitl: false

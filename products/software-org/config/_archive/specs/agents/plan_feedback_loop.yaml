id: plan_feedback_loop
agent: FeedbackLoopAgent
role: CI/CD Coach/Automation
inputs_spec:
- name: plan_progress_dashboard
  description: Plan progress dashboard artifact.
  format: Dashboard artifact
outputs_spec:
- name: plan_feedback_items
  description: List of issues and improvement suggestions routed to Retrospective, tracked for resolution.
  format: List of feedback objects (issue, suggestion, status, resolution)
  example: "- issue: \"Milestone delay\"\n  suggestion: \"Increase code reviews\"\n  status: \"open\"\n  resolution: \"\"\n"
agent_tasks:
- Route all issues and improvement suggestions to Retrospective.
- Track feedback for action and resolution.
acceptance_criteria:
- All issues and improvement suggestions are routed to Retrospective.
- Feedback is tracked for action and resolution.
dependencies:
- plan_progress_dashboard
failure_escalation:
- Escalate to CI/CD coach if feedback is not acted on.
references: []
hitl: false
internal_logic:
  - perception:
      description: "Extract feedback and suggestions from risk trend and KPI context."
  - model:
      description: "Feedback: { id, source, area, feedback_text, kpi, risk, action_item, status, reviewer }"
  - planning:
      description: |
        "Assign action items and track resolution."
  - action:
      description: "Produce YAML feedback record."
validation:
  - "PM/reviewer validation and follow-up."
  - "Audit for improvement actions and linkage."
quality_enhancements:
  - "Feedback, action, and reviewer templates."
  - "Automated follow-up reminder/log."

- "All manifests validated for syntax/schema."
- "Variables/secrets checked."
- "Invalid/incomplete manifests block deployment."
- "Validation logs are archived."
dependencies:
- "deploy_stage_milestone"
failure_escalation:
- "Escalate to DevOps/SRE if manifests invalid or logs missing."
references: []
hitl: true
hitl_reason: "Human reviews manifest validation report for errors"

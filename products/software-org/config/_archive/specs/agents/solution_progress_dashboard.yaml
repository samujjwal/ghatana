id: solution_progress_dashboard
agent: ProgressDashboardAgent
role: Solution Progress Dashboard Owner
inputs_spec:
- name: solution_kpi_report
  description: KPI report for Solution stage.
  format: Structured KPI report
- name: solution_success_criteria_status
  description: Status of solution stage success criteria.
  format: List of criteria status objects
- name: solution_stage_milestone
  description: Solution stage milestone plan.
  format: List of milestone objects
outputs_spec:
- name: solution_progress_dashboard
  description: Dashboard visualizing KPIs, success criteria, milestones, highlighting gaps, bottlenecks, and critical paths.
  format: 'Dashboard artifact (sections: KPIs, criteria, milestones, gaps, bottlenecks, critical_path)'
  example: 'KPIs: ["completeness", "velocity"]

    criteria: ["Architecture signoff"]

    milestones: ["S1"]

    gaps: []

    bottlenecks: []

    critical_path: ["S1"]

    '
agent_tasks:
- Visualize solution KPIs, success criteria, and milestones in dashboard.
- Update dashboard in real time and ensure accessibility.
- Highlight gaps, issues, critical path, blocked dependencies, bottlenecks, and overdue milestones.
acceptance_criteria:
- Solution KPIs, success criteria, and milestones are visualized in a dashboard.
- Dashboard is updated in real time and accessible to stakeholders.
- Gaps or issues in solution progress are highlighted for action.
- Critical path milestones are highlighted.
- Blocked dependencies and downstream impacts are flagged.
- Bottlenecks or overdue milestones are visually emphasized.
dependencies:
- solution_kpi_report
- solution_success_criteria_status
- solution_stage_milestone
failure_escalation:
- Escalate to dashboard owner or PM if dashboard is not current or actionable.
references: []
hitl: false

# [!!] No custom enhancement found.

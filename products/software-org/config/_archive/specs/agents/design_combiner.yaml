id: design_combiner
agent: SynthesisCombinerAgent
role: PM/Stage Lead
inputs_spec:
- name: design_evidence_package
  description: Evidence package for Design stage.
  format: Evidence package artifact
- name: design_risk_trend_report
  description: Design risk trend report.
  format: Risk trend report artifact
- name: design_signoff
  description: Final design signoff artifact.
  format: Structured signoff document
- name: api_contracts
  description: API contracts for all public APIs.
  format: List of API contract objects
- name: data_models
  description: Data models for all key entities.
  format: List of data model objects
outputs_spec:
- name: ready_for_develop_package
  description: Complete, versioned package of all required Design stage outputs, with handoff checklist for next stage.
  format: Package (documents, version, approvals, handoff_checklist)
  example: 'documents: ["api_contracts.yaml", "data_models.yaml", "evidence.zip"]

    version: "v1.0"

    approvals: ["Lead Architect", "QA"]

    handoff_checklist: ["All signoffs complete", "Evidence archived"]

    '
agent_tasks:
- Package all required outputs from the Design stage, ensuring completeness and versioning.
- Include a handoff checklist for entry into the next stage.
- Validate that all approvals and signoffs are present.
acceptance_criteria:
- All required outputs from the stage are packaged and versioned for handoff.
- Handoff checklist for next stage entry is included.
dependencies:
- design_evidence_package
- design_risk_trend_report
- design_signoff
- api_contracts
- data_models
failure_escalation:
- Escalate to PM if design package is incomplete or handoff checklist is missing.
references: []
hitl: false

# [!!] No custom enhancement found.

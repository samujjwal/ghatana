- "SLO status, incident heatmap, and capacity trends visualized."
- "All criteria and open issues surfaced."
- "Stakeholders and management have access."
- "Dashboard signed off at end of Operate stage."
dependencies:
- "operate_kpi_report"
- "operate_success_criteria_status"
- "operate_stage_milestone"
failure_escalation:
- "Escalate to dashboard owner if dashboard not current or not signed off."
references: []
hitl: false

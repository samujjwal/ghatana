---
id: "operate_progress_dashboard"
agent: "ProgressDashboardAgent"
role: "Operate Progress Dashboard Owner"
inputs_spec:
- name: "operate_kpi_report"
  description: "Operate KPI report for dashboard visualization."
  format: "KPI report artifact"
- name: "operate_success_criteria_status"
  description: "Operate success criteria status for dashboard visualization."
  format: "List of criteria status objects"
- name: "operate_stage_milestone"
  description: "Operate milestone plan for dashboard visualization."
  format: "List of milestone objects"
outputs_spec:
- name: "operate_progress_dashboard"
  description: "Dashboard visualizing SLO status, incident heatmap, capacity trends,\

- "iac_scan_report"
- "secret_scan_report"
- "rbac_policies"
- "security_audit_logs"
- "compliance_evidence_matrix"
failure_escalation:
- "Escalate to Security Lead/PM if package incomplete or not reviewed."
references: []
hitl: true
hitl_reason: "Human validates security package readiness"

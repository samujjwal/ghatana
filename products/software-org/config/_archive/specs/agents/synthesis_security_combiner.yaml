---
id: "synthesis_security_combiner"
agent: "SynthesisSecurityCombinerAgent"
role: "Security Lead/PM"
inputs_spec:
- name: "policy_as_code_files"
  description: "Policy as code files for security package."
  format: "Policy-as-code files/artifacts"
- name: "iac_scan_report"
  description: "IaC scan report."
  format: "IaC scan report artifact"
- name: "secret_scan_report"
  description: "Secret scan report."
  format: "Secret scan report artifact"
- name: "rbac_policies"
  description: "RBAC policies."
  format: "RBAC policy files"
- name: "security_audit_logs"
  description: "Security audit logs."
  format: "Audit log artifact"
- name: "compliance_evidence_matrix"
  description: "Compliance evidence matrix."
  format: "Compliance evidence matrix"
outputs_spec:
- name: "secure_for_release_package"
  description: "Combined security package, reviewed and signed off."
  format: "Secure-for-release package artifact"

---
id: "secure_escalation_handler"
agent: "EscalationHandlerAgent"
role: "Project Escalation Manager"
inputs_spec:
- name: "secure_success_criteria_status"
  description: "Secure stage criteria status for escalation review."
  format: "List of criteria status objects"
outputs_spec:
- name: "secure_escalation_report"
  description: "Escalation report for Secure stage blockers."
  format: "Escalation report artifact"

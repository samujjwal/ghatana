id: design_observability_export
agent: ObservabilityExportAgent
role: SRE/Analytics
inputs_spec:
- name: design_progress_dashboard
  description: Design progress dashboard artifact.
  format: Dashboard artifact
outputs_spec:
- name: design_observability_export
  description: Exported pipeline metrics/KPIs for external analytics/monitoring, with flagged observability gaps.
  format: Export artifact (metrics, flagged_gaps)
  example: 'metrics: ["completeness"]

    flagged_gaps: []

    '
agent_tasks:
- Export pipeline metrics/KPIs to external analytics or monitoring.
- Flag any gaps in observability.
acceptance_criteria:
- Pipeline metrics/KPIs exported to external analytics/monitoring.
- Gaps in observability are flagged.
dependencies:
- design_progress_dashboard
failure_escalation:
- Escalate to SRE or analytics lead if observability is incomplete.
references: []
hitl: false

# [!!] No custom enhancement found.

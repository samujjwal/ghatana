- "All UAT exit criteria are met."
- "Critical defects are resolved or accepted with risk."
dependencies:
- "uat_plan"
- "uat_results"
failure_escalation:
- "Escalate to gatekeeper or PM if exit criteria not met."
references: []
hitl: false

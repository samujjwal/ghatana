role: "Gatekeeper Bot"
inputs_spec:
- name: "uat_plan"
  description: "UAT plan artifact."
  format: "UAT plan artifact"
- name: "uat_results"
  description: "UAT execution results artifact."
  format: "UAT results artifact"
outputs_spec:
- name: "uat_readiness_status"

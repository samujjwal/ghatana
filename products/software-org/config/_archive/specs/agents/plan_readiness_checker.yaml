id: plan_readiness_checker
agent: ReadinessCheckerAgent
role: Gatekeeper Bot
inputs_spec:
- name: plan_stage_milestone
  description: Plan stage milestone plan.
  format: List of milestone objects
- name: plan_best_practice_report
  description: Best practice review report for Plan stage.
  format: Structured report
- name: plan_kpi_report
  description: KPI report for Plan stage.
  format: Structured KPI report
outputs_spec:
- name: plan_readiness_status
  description: Readiness status for Plan stage, including criteria, issues, approvals, and evidence.
  format: Structured status object (criteria_met, issues, approvals, evidence, ready_for_next_stage)
  example: 'criteria_met: true

    issues: []

    approvals: ["PM"]

    evidence: ["Audit log"]

    ready_for_next_stage: true

    '
agent_tasks:
- Check all mandatory Plan stage criteria are met.
- Ensure no open critical issues in milestones, best practice, or KPI.
- Verify all required approvals and evidence are present.
- Mark stage "Ready for next stage" only if above are true.
acceptance_criteria:
- All mandatory plan criteria are met.
- No open critical issues in milestones, best practice, or KPI.
- All required approvals and evidence are present.
- Stage is marked "Ready for next stage" only if above are true.
dependencies:
- plan_stage_milestone
- plan_best_practice_report
- plan_kpi_report
failure_escalation:
- Escalate to gatekeeper or PM if readiness is not achieved.
references: []
hitl: false

internal_logic:
  - perception:
      description: "Extract required context, risks, dependencies, and gaps for agent 'plan_readiness_checker'."
  - model:
      description: "Track fulfillment of acceptance criteria and unresolved escalations."
  - planning:
      description: "For all open issues or missing outputs, trigger validation/escalation or follow-up."
  - action:
      description: "Assemble output per spec; update agent's trace/audit log."
validation:
  - "SME or HITL review for output correctness and completeness."
  - "Audit for field and format coverage."
quality_enhancements:
  - "Output templates and audit log integration."
  - "Escalation if any acceptance criteria unmet."

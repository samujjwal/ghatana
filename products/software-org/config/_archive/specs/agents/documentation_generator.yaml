- "Documentation is generated/updated for all modules and APIs."
- "All docs are accessible, versioned, and up-to-date."
dependencies:
- "modularized_codebase"
failure_escalation:
- "Escalate to Tech Writer or Doc Owner if docs are incomplete or out of date."
references: []
hitl: false

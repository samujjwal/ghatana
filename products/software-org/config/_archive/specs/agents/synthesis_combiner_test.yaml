---
id: "synthesis_combiner_test"
agent: "SynthesisCombinerAgent"
role: "Test Lead/PM"
inputs_spec:
- name: "consolidated_test_results"
  description: "Consolidated test results for release readiness."
  format: "Consolidated test results artifact"
- name: "test_data_report"
  description: "Test data management report."
  format: "Test data report artifact"
- name: "test_audit_report"
  description: "Test audit compliance report."
  format: "Audit report artifact"
- name: "test_best_practices_report"
  description: "Best practice compliance report."
  format: "Best practice compliance report"
outputs_spec:
- name: "ready_for_release_package"
  description: "Combined, reviewed package for release readiness."
  format: "Release-ready package artifact"

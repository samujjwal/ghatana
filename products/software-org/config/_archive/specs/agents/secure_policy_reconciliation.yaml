---
id: "secure_policy_reconciliation"
agent: "PolicyReconciliationAgent"
role: "Compliance Automation"
inputs_spec:
- name: "secure_progress_dashboard"
  description: "Secure progress dashboard for reconciliation triggers."
  format: "Dashboard artifact"
outputs_spec:
- name: "secure_policy_recon_report"
  description: "Report on policy reconciliation actions and status."
  format: "Policy reconciliation report artifact"
agent_tasks:
- "Compare live environment policies/configs to source of truth."
- "Flag/report any drift to compliance."
- "Assign remediation plans if mismatches found."
acceptance_criteria:
- "All live environment policies/configs match source of truth."
- "Any drift is flagged and reported to compliance."
- "Remediation plans assigned if mismatches found."
dependencies:
- "secure_progress_dashboard"
failure_escalation:
- "Escalate to compliance automation if drift/mismatches are not remediated."
references: []
hitl: false

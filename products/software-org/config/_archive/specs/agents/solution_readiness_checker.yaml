id: solution_readiness_checker
agent: ReadinessCheckerAgent
role: Gatekeeper Bot
inputs_spec:
- name: solution_stage_milestone
  description: Solution stage milestone plan.
  format: List of milestone objects
- name: solution_best_practice_report
  description: Best practice review report.
  format: Structured report
- name: solution_kpi_report
  description: KPI report for Solution stage.
  format: Structured KPI report
outputs_spec:
- name: solution_readiness_status
  description: Readiness status for Solution stage, including criteria, issues, approvals, and evidence.
  format: Structured status object (criteria_met, issues, approvals, evidence, ready_for_next_stage)
  example: 'criteria_met: true

    issues: []

    approvals: ["Lead Architect"]

    evidence: ["Audit log"]

    ready_for_next_stage: true

    '
agent_tasks:
- Check all mandatory solution criteria are met.
- Ensure no open critical issues in milestones, best practice, or KPI.
- Verify all required approvals and evidence are present.
- Mark stage "Ready for next stage" only if above are true.
acceptance_criteria:
- All mandatory solution criteria are met.
- No open critical issues in milestones, best practice, or KPI.
- All required approvals and evidence are present.
- Stage is marked "Ready for next stage" only if above are true.
dependencies:
- solution_stage_milestone
- solution_best_practice_report
- solution_kpi_report
failure_escalation:
- Escalate to gatekeeper or PM if readiness is not achieved.
references: []
hitl: false

# [!!] No custom enhancement found.

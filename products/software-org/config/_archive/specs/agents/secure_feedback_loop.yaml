---
id: "secure_feedback_loop"
agent: "FeedbackLoopAgent"
role: "CI/CD Coach/Automation"
inputs_spec:
- name: "secure_progress_dashboard"
  description: "Secure progress dashboard for feedback loop."
  format: "Dashboard artifact"
outputs_spec:
- name: "secure_feedback_items"
  description: "Issues and improvement suggestions routed to Retrospective."
  format: "List of feedback items"
agent_tasks:
- "Route all issues/improvement suggestions to Retrospective."
- "Track feedback for action and resolution."
acceptance_criteria:
- "All issues and improvement suggestions are routed to Retrospective."
- "Feedback is tracked for action and resolution."
dependencies:
- "secure_progress_dashboard"
failure_escalation:
- "Escalate to CI/CD coach if feedback is not acted on."
references: []
hitl: false

---
id: "plan_dashboard"
agent: "DashboardAgent"
role: "Progress & Operations Dashboard Analyst"
inputs_spec:
  - name: "escalation_log"
    description: "Escalation log from EscalationAgent."
    format: "YAML object"
outputs_spec:
  - name: "progress_dashboard"
    description: >
      Operational dashboard with aggregated metrics, statuses, incidents, escalations, KPIs, risks, and improvement actions.
    format: "YAML: dashboard (fields: metrics[], statuses[], incidents[], escalations[], kpis[], risks[], actions[])"
agent_tasks:
  - "Aggregate all metrics, incidents, KPIs, risks, escalations, and actions into dashboard view."
  - "Highlight outstanding items, trends, and improvement progress."
  - "Support executive and operational decision-making."
acceptance_criteria:
  - "All major project health areas represented."
  - "Outstanding, high-risk, or overdue items highlighted."
  - "Dashboard structure and template followed."
internal_logic:
  - perception:
      description: "Aggregate data from all prior agents/logs."
  - model:
      description: "Dashboard: { metrics, statuses, incidents, escalations, kpis, risks, actions }"
  - planning:
      description: |
        "Highlight items requiring attention; visualize trends."
  - action:
      description: "Produce YAML dashboard."
validation:
  - "PM/executive review and acceptance."
  - "Audit for completeness and clarity."
quality_enhancements:
  - "Dashboard and visualization templates."
  - "Automated incident/action highlighting."
dependencies: []
failure_escalation:
  - "Escalate unaddressed dashboard issues."
references:
  - "Dashboard and operational analytics standards."
  - "See: hatchworks.com/blog/ai-agents-explained/, datacamp.com/blog/ai-agents"
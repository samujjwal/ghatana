agent: "FeedbackLoopAgent"
role: "CI/CD Coach/Automation"
inputs_spec:
- name: "deploy_progress_dashboard"
  description: "Deploy progress dashboard for feedback loop."
  format: "Dashboard artifact"
outputs_spec:
- name: "deploy_feedback_items"
  description: "Issues and improvements for Retrospective."
  format: "List of feedback items"
agent_tasks:
- "Route all issues/improvements to Retrospective."
- "Track feedback for action/resolution."

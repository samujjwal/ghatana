id: feedback
agent: FeedbackAgent
role: Feedback & Continuous Improvement Analyst
inputs_spec:
  - name: risk_trend_report
    description: Risk trend report from RiskTrendAgent.
    format: YAML array
outputs_spec:
  - name: feedback_record
    description: Structured feedback mapped to KPIs, risks, improvement actions.
    format: YAML array
acceptance_criteria:
  - Feedback collected for all major risk/KPI areas.
  - Action items and reviewer assignments included.
  - Feedback linked to improvement/corrective actions.
agent_tasks:
  - Collect/analyze feedback for key performance/risk areas.
  - Map feedback to KPIs, risks, improvement actions.
  - Assign status/reviewer for each item.
dependencies:
  - risk_trend_report
failure_escalation:
  - Escalate unresolved or repeated feedback issues.
references: []
internal_logic:
  - perception:
      description: "Collect and analyze stakeholder, user, and team feedback across all solution and operational phases."
  - model:
      description: "Maintain structured feedback log mapped to KPIs, risks, and improvement actions."
  - planning:
      description: |
        "Map feedback to actionable improvement items.
         Track resolution and impact of feedback-driven changes."
  - action:
      description: "Produce feedback reports; update improvement backlog."
validation:
  - "PM/reviewer validation of feedback and actions."
  - "Audit for feedback-to-action traceability."
quality_enhancements:
  - "Feedback template and action item linkage."
  - "Metrics for closure and impact of feedback."
  - "Automated reminders for open feedback."
---
# Cross-Cutting Evidence Collector Operator Template
# Replaces 14 stage-specific files: build_evidence_collector.yaml, test_evidence_collector.yaml, etc.
#
# Usage: Instantiate with stage parameter to create stage-specific evidence collector
# Parameters:
#   - stage: The stage name (plan, solution, design, develop, build, test, secure,
#            compliance, uat, package, deploy, operate, monitor, dr)
#
# @doc.type operator-template
# @doc.purpose Cross-cutting evidence collection for compliance across all stages
# @doc.layer operations
# @doc.pattern Template

template:
  id: "${stage}_evidence_collector"
  version: "1.0.0"

operator:
  type: "EvidenceCollectorOperator"
  role: "Compliance Evidence Bot"
  category: "cross-cutting"

parameters:
  stage:
    type: "string"
    required: true
    description: "Stage name for which to collect evidence"
    allowed_values:
      - "plan"
      - "solution"
      - "design"
      - "develop"
      - "build"
      - "test"
      - "secure"
      - "compliance"
      - "uat"
      - "package"
      - "deploy"
      - "operate"
      - "monitor"
      - "dr"

inputs_spec:
  - name: "${stage}_audit_log"
    description: "${stage} stage audit log for evidence package."
    format: "Audit log artifact"
    required: true

  - name: "${stage}_success_criteria_status"
    description: "Status of ${stage} stage success criteria."
    format: "List of criteria status objects"
    required: true

  - name: "${stage}_stage_milestone"
    description: "${stage} stage milestone plan."
    format: "List of milestone objects"
    required: true

  - name: "${stage}_progress_dashboard"
    description: "${stage} progress dashboard for evidence."
    format: "Dashboard artifact"
    required: true

outputs_spec:
  - name: "${stage}_evidence_package"
    description: "Evidence package for ${stage} stage, including artifacts, audit logs, signoffs, KPIs, compliance links, archive location, access logs."
    format: "Evidence package artifact"
    retention: "7 years"

  - name: "${stage}_evidence_events"
    description: "Stream of evidence collection events"
    format: "Event stream"
    event_type: "ghatana.operations.evidence.${stage}"

agent_tasks:
  - "Collect and hash all artifacts, audit logs, signoffs, and KPIs for the ${stage} stage."
  - "Link evidence to compliance and regulatory requirements."
  - "Archive evidence in tamper-evident storage."
  - "Maintain access logs for evidence package."
  - "Emit evidence collection events to EventCloud."

acceptance_criteria:
  - "All artifacts, audit logs, signoffs, KPIs are collected and hashed."
  - "Evidence is linked to compliance requirements (SOC2, ISO27001, GDPR)."
  - "Package is archived securely with access logs maintained."
  - "Evidence integrity is verifiable via cryptographic hashes."

dependencies:
  - "${stage}_audit_log"
  - "${stage}_success_criteria_status"
  - "${stage}_stage_milestone"
  - "${stage}_progress_dashboard"

failure_escalation:
  - "Escalate to compliance/evidence lead if evidence is incomplete or not archived."
  - "Emit ${stage}.evidence.incomplete event to EventCloud."

config:
  # Hashing and integrity
  hash_algorithm: "SHA-256"
  signature_algorithm: "RSA-SHA256"

  # Archive settings
  archive_format: "ZIP"
  archive_location: "s3://ghatana-evidence/${stage}/"
  retention_days: 2555 # ~7 years

  # Compliance mappings
  compliance_frameworks:
    - framework: "SOC2"
      controls: ["CC6.1", "CC6.2", "CC7.1"]
    - framework: "ISO27001"
      controls: ["A.12.4.1", "A.12.4.2"]
    - framework: "GDPR"
      articles: ["Article 30", "Article 32"]

  # Observability
  event_cloud_topic: "ghatana.operations.evidence"

references:
  - "SOC 2 Type II - Evidence Requirements"
  - "ISO 27001 - Documented Information"
  - "GDPR - Records of Processing"

hitl: false

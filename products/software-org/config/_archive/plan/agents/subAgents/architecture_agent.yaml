id: architecture_agent
name: "Architecture Agent"
description: "Designs technical architecture, stack, and risk register"
goal: >
  Produce technical architecture diagrams, technology stack recommendations, and identify key technical risks for implementation.
input:
  # Output from requirements_agent
  user_stories: User stories from requirements_agent.
  acceptance_criteria: Acceptance criteria from requirements_agent.
  prioritization: Feature prioritization from requirements_agent.
output:
  architecture_outline: Structured diagram or description of key system components and relationships
  technology_stack: List of recommended technologies (with rationale)
  risk_register: List of major technical risks and mitigation strategies
type: sequential
afterToolCallbacks:
  - logMilestone
components:
  - type: llm_agent
    name: "Architecture Content Generator"
    description: "Produces architecture outline, stack, and risk register"
    model: "llama3.2"
    instruction: |
      You are a system architect.
      Using requirements, provide:
      - architecture_outline: Main components, APIs, data flows
      - technology_stack: Recommended stack, with rationale
      - risk_register: Risks and mitigation strategies
      Output valid JSON.
    outputKey: "plan_architecture"

  - type: loop
    name: "Refinement Loop"
    description: "Iteratively refines architecture based on evaluation"
    maxIterations: 3
    components:
      - type: llm_agent
        name: "Architecture Evaluator"
        description: "Evaluates architecture for clarity, feasibility, and completeness"
        model: "llama3.2"
        instruction: |
          You are an architecture evaluator.
          For each field, check:
          - Is it clear, feasible, actionable? (true/false for each)
          - Issues, ambiguity, missing info
          - Suggestions to improve
          After all, summarize readiness and improvement suggestions.
          Respond only with valid JSON.
        outputKey: "plan_architecture_evaluation"

      - type: llm_agent
        name: "Architecture Refiner"
        description: "Refines architecture using evaluation feedback"
        model: "llama3.2"
        instruction: |
          You are an architecture refiner.
          If not ready (blocking issues), revise architecture based on feedback.
          If ready, call 'exitLoop'.
          Only output valid JSON or call 'exitLoop'.
        outputKey: "plan_architecture"
        tools: ["exitLoop"]

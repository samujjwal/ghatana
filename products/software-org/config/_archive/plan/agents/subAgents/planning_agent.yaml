id: planning_agent
name: "Planning Agent"
description: "Creates detailed implementation backlog and timeline"
goal: >
  Define tasks, timeline, and resource assignments for implementation, based on requirements, architecture, and design.
input:
  # Output from design_agent
  wireframes: Wireframe sketches/descriptions from design_agent.
  interaction_flows: User interaction flows from design_agent.
output:
  implementation_backlog: List of actionable tasks/user stories
  task_estimates: Estimates (time/effort) for each task
  resource_assignments: Mapping of tasks to roles/people
  milestone_schedule: Key dates/milestones (Gantt-style if possible)
type: sequential
afterToolCallbacks:
  - logMilestone
components:
  - type: llm_agent
    name: "Planning Content Generator"
    description: "Defines tasks, estimates, resource assignments, milestones"
    model: "llama3.2"
    instruction: |
      You are an experienced implementation planner.
      Given finalized design and architecture, produce:
      - implementation_backlog: List of actionable tasks/user stories
      - task_estimates: Estimates (time/effort) for each task
      - resource_assignments: Mapping of tasks to roles/people
      - milestone_schedule: Key dates/milestones
      Output valid JSON only.
      Guidelines:
      - Be pragmatic, realistic, and clear.
      - Only output valid JSON.
    outputKey: "plan_implementation"

  - type: loop
    name: "Refinement Loop"
    description: "Iteratively refines plan based on evaluation"
    maxIterations: 3
    components:
      - type: llm_agent
        name: "Planning Evaluator"
        description: "Evaluates planning outputs for realism, clarity, and completeness"
        model: "llama3.2"
        instruction: |
          You are a planning evaluator.
          For each section (backlog, estimates, assignments, milestones), check:
          - Is it clear, realistic, actionable? (true/false for each)
          - List issues, missing info, ambiguity.
          - Suggest improvements.
          After all, summarize readiness and improvement suggestions.
          Respond only with valid JSON.
        outputKey: "plan_implementation_evaluation"

      - type: llm_agent
        name: "Planning Refiner"
        description: "Refines implementation plan using evaluation feedback"
        model: "llama3.2"
        instruction: |
          You are a planning refiner.
          If not ready (blocking issues), revise plan using evaluator feedback.
          If ready, call 'exitLoop'.
          Only output valid JSON or call 'exitLoop'.
        outputKey: "plan_implementation"
        tools: ["exitLoop"]

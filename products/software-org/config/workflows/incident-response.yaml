# Incident Response Workflow Configuration
# Autonomous incident detection, triage, and resolution
apiVersion: virtualorg.ghatana.com/v1
kind: Workflow
metadata:
  name: incident-response
  namespace: software-org
  labels:
    domain: operations
    priority: critical
    autonomy-level: high
    sla-bound: true
  annotations:
    description: "Autonomous incident response workflow with AI-driven triage, diagnosis, and remediation"
    owner: devops-department
    mean-time-to-respond-target: "5m"
    mean-time-to-resolve-target: "30m"

spec:
  # Workflow trigger conditions
  trigger:
    events:
      - type: alert.fired
        source: prometheus
        severity: [critical, high]
      - type: incident.created
        source: pagerduty
      - type: anomaly.detected
        source: observability-pipeline
    manual:
      enabled: true
      authorizedRoles:
        - devops-engineer
        - devops-lead
        - cto

  # Workflow execution configuration
  execution:
    mode: parallel-stages # Allow parallel investigation
    timeout: 4h
    priority: critical
    resourceAllocation:
      dedicated: true
      maxConcurrentInstances: 5
    retryPolicy:
      maxRetries: 1
      backoffMultiplier: 1
      initialDelay: 30s

  # Workflow context
  context:
    inputs:
      - name: incident_id
        type: string
        source: trigger
      - name: alert_name
        type: string
        source: trigger
      - name: severity
        type: enum
        values: [critical, high, medium, low]
        source: trigger
      - name: affected_services
        type: string_list
        source: trigger
      - name: alert_details
        type: map
        source: trigger

    outputs:
      - name: root_cause
        type: string
      - name: resolution_actions
        type: action_list
      - name: postmortem_draft
        type: document

  # Workflow stages
  stages:
    - id: acknowledge-incident
      name: "Acknowledge & Classify Incident"
      description: "Immediately acknowledge incident and perform initial classification"

      timeout: 2m
      sla: 5m

      agent: devops-engineer-agent

      action:
        type: automated
        operation: incident-acknowledgment

        steps:
          - name: acknowledge
            tool: acknowledge-incident
            params:
              incident_id: "{{incident_id}}"
              responder: "ai-incident-response"

          - name: classify
            tool: classify-incident
            params:
              alert_name: "{{alert_name}}"
              affected_services: "{{affected_services}}"
              details: "{{alert_details}}"

      outputs:
        - name: incident_category
          type: enum
          values:
            [infrastructure, application, database, network, security, unknown]
        - name: impact_assessment
          type: map
        - name: initial_severity
          type: enum

      transitions:
        - on: success
          conditions:
            - field: initial_severity
              operator: in
              values: [critical]
          goto: parallel-investigation
        - on: success
          goto: ai-diagnosis
        - on: failure
          goto: escalate-to-human

    - id: parallel-investigation
      name: "Parallel Investigation"
      description: "Run multiple investigation tracks in parallel for critical incidents"

      parallel:
        - stage: infrastructure-check
        - stage: application-check
        - stage: recent-changes-check

      waitFor: any # Continue when any track finds root cause
      timeout: 10m

    - id: infrastructure-check
      name: "Infrastructure Investigation"
      description: "Check infrastructure health, resources, and connectivity"

      agent: devops-engineer-agent

      action:
        type: ai-decision
        operation: infrastructure-diagnosis
        tools:
          - query-prometheus
          - check-k8s-health
          - check-node-resources
          - check-network-connectivity
          - check-storage-health

        prompt: |
          Investigate infrastructure health for incident: {{incident_id}}

          Affected services: {{affected_services}}
          Alert details: {{alert_details}}

          Check:
          1. Kubernetes pod/node health
          2. CPU, memory, disk utilization
          3. Network connectivity and latency
          4. Storage I/O and capacity
          5. Load balancer health

          Identify:
          - Any infrastructure anomalies
          - Resource exhaustion patterns
          - Recent infrastructure changes
          - Correlation with incident timing

      outputs:
        - name: infra_findings
          type: finding_list
        - name: infra_root_cause_candidate
          type: string
        - name: infra_confidence
          type: float

      transitions:
        - on: success
          conditions:
            - field: infra_confidence
              operator: gte
              value: 0.8
          goto: validate-root-cause
        - on: success
          goto: consolidate-findings
        - on: failure
          goto: consolidate-findings

    - id: application-check
      name: "Application Investigation"
      description: "Check application logs, errors, and performance"

      agent: senior-engineer-agent

      action:
        type: ai-decision
        operation: application-diagnosis
        tools:
          - query-logs
          - query-traces
          - query-error-rates
          - analyze-performance-metrics
          - check-dependencies

        prompt: |
          Investigate application health for incident: {{incident_id}}

          Affected services: {{affected_services}}
          Alert details: {{alert_details}}

          Check:
          1. Application error logs (last 30 min)
          2. Distributed traces for errors
          3. Error rate trends
          4. Response time degradation
          5. Dependency health (databases, caches, external APIs)

          Identify:
          - Exception patterns and stack traces
          - Performance degradation root cause
          - Dependency failures
          - Resource leaks or connection issues

      outputs:
        - name: app_findings
          type: finding_list
        - name: app_root_cause_candidate
          type: string
        - name: app_confidence
          type: float

      transitions:
        - on: success
          conditions:
            - field: app_confidence
              operator: gte
              value: 0.8
          goto: validate-root-cause
        - on: success
          goto: consolidate-findings
        - on: failure
          goto: consolidate-findings

    - id: recent-changes-check
      name: "Recent Changes Investigation"
      description: "Check recent deployments, config changes, and code changes"

      agent: devops-engineer-agent

      action:
        type: ai-decision
        operation: change-analysis
        tools:
          - list-recent-deployments
          - list-config-changes
          - list-recent-commits
          - analyze-deployment-timeline

        prompt: |
          Investigate recent changes for incident: {{incident_id}}

          Affected services: {{affected_services}}
          Incident start time: {{alert_details.start_time}}

          Check:
          1. Deployments in last 24 hours
          2. Configuration changes
          3. Feature flag changes
          4. Database migrations
          5. Infrastructure changes (Terraform, Helm)

          Correlate:
          - Change timing vs incident start
          - Changed services vs affected services
          - Deployment rollback availability

      outputs:
        - name: change_findings
          type: finding_list
        - name: change_root_cause_candidate
          type: string
        - name: change_confidence
          type: float
        - name: rollback_available
          type: boolean

      transitions:
        - on: success
          conditions:
            - field: change_confidence
              operator: gte
              value: 0.8
          goto: validate-root-cause
        - on: success
          goto: consolidate-findings
        - on: failure
          goto: consolidate-findings

    - id: ai-diagnosis
      name: "AI-Powered Diagnosis"
      description: "Use AI reasoning to diagnose the incident"

      agent: architect-lead-agent

      action:
        type: ai-decision
        operation: incident-diagnosis
        tools:
          - query-prometheus
          - query-logs
          - query-traces
          - check-k8s-health
          - list-recent-deployments
          - knowledge-base-search

        prompt: |
          Diagnose incident: {{incident_id}}
          Alert: {{alert_name}}
          Severity: {{severity}}
          Affected services: {{affected_services}}
          Details: {{alert_details}}

          Perform comprehensive diagnosis:
          1. Analyze all available telemetry data
          2. Check for similar past incidents
          3. Identify patterns and anomalies
          4. Consider multiple failure hypotheses
          5. Rank hypotheses by likelihood

          Output:
          - Most likely root cause with confidence
          - Supporting evidence
          - Alternative hypotheses
          - Recommended remediation actions

      outputs:
        - name: diagnosis_result
          type: map
        - name: root_cause_hypothesis
          type: string
        - name: confidence
          type: float
        - name: remediation_options
          type: action_list

      transitions:
        - on: success
          conditions:
            - field: confidence
              operator: gte
              value: 0.7
          goto: execute-remediation
        - on: success
          goto: escalate-to-human
        - on: failure
          goto: escalate-to-human

    - id: consolidate-findings
      name: "Consolidate Investigation Findings"
      description: "Combine findings from parallel investigations"

      agent: architect-lead-agent

      action:
        type: ai-decision
        operation: findings-consolidation

        prompt: |
          Consolidate findings from parallel investigations:

          Infrastructure findings: {{infra_findings}}
          Infrastructure hypothesis: {{infra_root_cause_candidate}} ({{infra_confidence}})

          Application findings: {{app_findings}}
          Application hypothesis: {{app_root_cause_candidate}} ({{app_confidence}})

          Change findings: {{change_findings}}
          Change hypothesis: {{change_root_cause_candidate}} ({{change_confidence}})
          Rollback available: {{rollback_available}}

          Determine:
          1. Most likely root cause across all evidence
          2. Confidence level
          3. Recommended remediation action
          4. Whether rollback should be prioritized

      outputs:
        - name: consolidated_root_cause
          type: string
        - name: overall_confidence
          type: float
        - name: recommended_action
          type: string
        - name: should_rollback
          type: boolean

      transitions:
        - on: success
          conditions:
            - field: overall_confidence
              operator: gte
              value: 0.7
          goto: validate-root-cause
        - on: success
          goto: escalate-to-human

    - id: validate-root-cause
      name: "Validate Root Cause"
      description: "Validate the identified root cause before remediation"

      agent: devops-lead-agent

      action:
        type: ai-decision
        operation: root-cause-validation
        tools:
          - run-diagnostic-query
          - simulate-fix
          - check-blast-radius

        prompt: |
          Validate the identified root cause before proceeding with remediation.

          Root cause: {{consolidated_root_cause}}
          Confidence: {{overall_confidence}}
          Recommended action: {{recommended_action}}

          Validate by:
          1. Running targeted diagnostic queries
          2. Checking if symptoms match expected behavior
          3. Assessing blast radius of proposed fix
          4. Verifying rollback safety if applicable

      outputs:
        - name: validation_result
          type: enum
          values: [confirmed, uncertain, rejected]
        - name: blast_radius
          type: map
        - name: safe_to_proceed
          type: boolean

      transitions:
        - on: success
          conditions:
            - field: validation_result
              operator: eq
              value: confirmed
            - field: safe_to_proceed
              operator: eq
              value: true
          goto: execute-remediation
        - on: success
          goto: escalate-to-human
        - on: failure
          goto: escalate-to-human

    - id: execute-remediation
      name: "Execute Automated Remediation"
      description: "Execute remediation actions with appropriate safeguards"

      agent: devops-engineer-agent

      # Critical: HITL check for production changes
      hitl:
        required: false # Only required for certain actions
        conditionalRequired:
          - condition:
              field: blast_radius.affected_users
              operator: gte
              value: 1000
            checkpoint: "high-impact-remediation"
          - condition:
              field: recommended_action
              operator: contains
              value: "database"
            checkpoint: "database-remediation"
        approvers:
          - role: devops-lead
          - role: cto
        timeout: 15m
        escalationPath:
          - level: 1
            after: 5m
            notify: devops-oncall

      action:
        type: automated
        operation: execute-fix

        # Safe remediation patterns
        steps:
          - name: check-rollback
            condition: "{{should_rollback}} == true && {{rollback_available}} == true"
            tool: execute-rollback
            params:
              service: "{{affected_services[0]}}"
              target_version: "{{change_findings.previous_version}}"

          - name: scale-up
            condition: "{{recommended_action}} == 'scale'"
            tool: scale-deployment
            params:
              service: "{{affected_services[0]}}"
              replicas: "+2" # Increase by 2

          - name: restart-pods
            condition: "{{recommended_action}} == 'restart'"
            tool: rolling-restart
            params:
              service: "{{affected_services[0]}}"
              strategy: rolling

          - name: apply-fix
            condition: "{{recommended_action}} == 'config-fix'"
            tool: apply-config
            params:
              config: "{{remediation_config}}"
              dry_run: false

      outputs:
        - name: remediation_result
          type: enum
          values: [success, partial, failed]
        - name: actions_taken
          type: action_list
        - name: recovery_time
          type: duration

      transitions:
        - on: success
          conditions:
            - field: remediation_result
              operator: eq
              value: success
          goto: verify-resolution
        - on: success
          goto: escalate-to-human
        - on: failure
          goto: escalate-to-human

    - id: verify-resolution
      name: "Verify Incident Resolution"
      description: "Verify that the incident is resolved and services are healthy"

      agent: devops-engineer-agent

      action:
        type: automated
        operation: verify-resolution

        retryPolicy:
          maxRetries: 6
          interval: 2m

        steps:
          - name: check-alerts
            tool: check-alert-status
            params:
              alert_name: "{{alert_name}}"
              expected_state: resolved

          - name: check-health
            tool: health-check
            params:
              services: "{{affected_services}}"

          - name: check-metrics
            tool: query-prometheus
            params:
              query: 'service_error_rate{service=~''{{affected_services|join("|")}}''}'
              threshold: 0.01

      outputs:
        - name: resolution_verified
          type: boolean
        - name: remaining_issues
          type: string_list

      transitions:
        - on: success
          conditions:
            - field: resolution_verified
              operator: eq
              value: true
          goto: close-incident
        - on: success
          goto: escalate-to-human
        - on: failure
          goto: escalate-to-human

    - id: escalate-to-human
      name: "Escalate to Human Responder"
      description: "Escalate incident to human when AI cannot resolve"

      agent: devops-lead-agent

      action:
        type: escalation
        operation: human-escalation

        notification:
          channels:
            - pagerduty:
                severity: "{{severity}}"
                escalation_policy: "engineering-oncall"
            - slack: "#incidents"
          urgency: "{{severity}}"

        handoff:
          context:
            - incident_timeline
            - investigation_findings
            - attempted_remediations
            - diagnostic_data
          format: incident-brief

      hitl:
        required: true
        checkpoint: "human-takeover"
        approvers:
          - role: devops-oncall
          - role: devops-lead
        timeout: 2h

      outputs:
        - name: human_responder
          type: string
        - name: human_actions
          type: action_list
        - name: resolution_notes
          type: string

      transitions:
        - on: resolved
          goto: close-incident
        - on: timeout
          goto: executive-escalation

    - id: executive-escalation
      name: "Executive Escalation"
      description: "Escalate to engineering leadership for unresolved critical incidents"

      agent: cto-agent

      action:
        type: escalation
        operation: executive-escalation

        notification:
          channels:
            - slack: "#leadership"
            - email: cto@company.com
            - sms: oncall-executives
          urgency: critical

        context:
          include:
            - full_incident_timeline
            - all_investigation_findings
            - all_attempted_actions
            - business_impact_assessment

      transitions:
        - on: resolved
          goto: close-incident
        - on: any
          goto: close-incident

    - id: close-incident
      name: "Close Incident & Generate Postmortem"
      description: "Close the incident and generate postmortem draft"

      agent: devops-lead-agent

      action:
        type: ai-decision
        operation: incident-closure
        tools:
          - close-incident
          - generate-postmortem
          - schedule-review

        prompt: |
          Close incident {{incident_id}} and generate postmortem.

          Incident summary:
          - Alert: {{alert_name}}
          - Severity: {{severity}}
          - Duration: {{workflow.duration}}
          - Root cause: {{consolidated_root_cause}}
          - Resolution: {{actions_taken}}

          Generate postmortem covering:
          1. Incident timeline
          2. Impact assessment
          3. Root cause analysis
          4. Resolution steps
          5. Action items to prevent recurrence
          6. Lessons learned

        steps:
          - name: close
            tool: close-incident
            params:
              incident_id: "{{incident_id}}"
              resolution: "{{actions_taken}}"
              root_cause: "{{consolidated_root_cause}}"

          - name: postmortem
            tool: generate-postmortem
            params:
              incident_id: "{{incident_id}}"
              template: "standard-postmortem"

          - name: schedule-review
            tool: schedule-meeting
            condition: "{{severity}} in ['critical', 'high']"
            params:
              type: postmortem-review
              participants: engineering-team
              within_days: 3

      outputs:
        - name: postmortem_document
          type: document
        - name: action_items
          type: task_list
        - name: review_scheduled
          type: boolean

  # Post-workflow actions
  postActions:
    - type: metrics
      data:
        incident_id: "{{incident_id}}"
        severity: "{{severity}}"
        time_to_acknowledge: "{{stages.acknowledge-incident.duration}}"
        time_to_diagnose: "{{stages.ai-diagnosis.duration}}"
        time_to_resolve: "{{workflow.duration}}"
        autonomous_resolution: "{{stages.escalate-to-human.skipped}}"
        root_cause: "{{consolidated_root_cause}}"

    - type: learning
      enabled: true
      feedback:
        - diagnosis_accuracy
        - remediation_effectiveness
        - time_to_resolution
      knowledge_base_update:
        - incident_patterns
        - remediation_runbooks

  # SLA configuration
  sla:
    acknowledgment:
      critical: 2m
      high: 5m
      medium: 15m
      low: 1h
    resolution:
      critical: 30m
      high: 2h
      medium: 8h
      low: 24h

    breachActions:
      - type: notification
        channel: "#leadership"
      - type: escalation
        target: executive-escalation

version: "3.9"

services:
  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: virtualorg-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "8888:8888" # Prometheus metrics
      - "13133:13133" # Health check
    depends_on:
      - jaeger
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - virtualorg-network

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: virtualorg-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "14250:14250" # gRPC
    networks:
      - virtualorg-network

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: virtualorg-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - virtualorg-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.2.3
    container_name: virtualorg-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - virtualorg-network

  # Virtual Org Agent (Senior Engineer)
  agent-senior-engineer-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: virtualorg-agent-senior-1
    environment:
      # Service config
      SERVICE_NAME: virtual-org-agent
      SERVICE_VERSION: 1.0.0

      # LLM config
      LLM_PROVIDER: openai
      LLM_MODEL: gpt-4
      LLM_API_KEY: ${OPENAI_API_KEY}
      LLM_TEMPERATURE: 0.7
      LLM_MAX_TOKENS: 2048

      # Database
      DATABASE_URL: jdbc:postgresql://ghatana-postgres:5432/virtual_org
      DATABASE_USERNAME: ghatana
      DATABASE_PASSWORD: ghatana123

      # Redis
      REDIS_HOST: ghatana-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis123

      # Observability
      OTLP_TRACES_ENDPOINT: http://otel-collector:4317
      OTLP_METRICS_ENDPOINT: http://otel-collector:4317
      LOG_LEVEL: INFO
      LOG_FORMAT: json

      # Agent config
      AGENT_ROLE: SENIOR_ENGINEER
      AGENT_ID: senior-engineer-1

      # Memory
      MEMORY_TYPE: pgvector

      # Task queue
      TASK_QUEUE_TYPE: redis

      # Server
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
      - "8081:8081"
    external_links:
      - ghatana-postgres:postgres
      - ghatana-redis:redis
    depends_on:
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - virtualorg-network
      - ghatana-network
    restart: unless-stopped

  # Virtual Org Agent (Architect) - example of multiple agents
  agent-architect-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: virtualorg-agent-architect-1
    environment:
      SERVICE_NAME: virtual-org-agent
      SERVICE_VERSION: 1.0.0
      LLM_PROVIDER: openai
      LLM_MODEL: gpt-4
      LLM_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: jdbc:postgresql://ghatana-postgres:5432/virtual_org
      DATABASE_USERNAME: ghatana
      DATABASE_PASSWORD: ghatana123
      REDIS_HOST: ghatana-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis123
      OTLP_TRACES_ENDPOINT: http://otel-collector:4317
      OTLP_METRICS_ENDPOINT: http://otel-collector:4317
      AGENT_ROLE: ARCHITECT
      AGENT_ID: architect-1
      MEMORY_TYPE: pgvector
      TASK_QUEUE_TYPE: redis
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
    ports:
      - "8082:8080"
      - "8083:8081"
    external_links:
      - ghatana-postgres:postgres
      - ghatana-redis:redis
    depends_on:
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - virtualorg-network
      - ghatana-network
    restart: unless-stopped

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  virtualorg-network:
    driver: bridge
  ghatana-network:
    external: true

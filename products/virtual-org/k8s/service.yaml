apiVersion: v1
kind: Service
metadata:
  name: virtualorg-agent-service
  namespace: virtualorg
  labels:
    app: virtualorg-agent
spec:
  type: ClusterIP
  selector:
    app: virtualorg-agent
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 8081
      targetPort: 8081
      protocol: TCP


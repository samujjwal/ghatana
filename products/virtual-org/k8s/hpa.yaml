apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: virtualorg-agent-senior-engineer-hpa
  namespace: virtualorg
  labels:
    app: virtualorg-agent
    role: senior-engineer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: virtualorg-agent-senior-engineer
  minReplicas: 2
  maxReplicas: 10
  metrics:
    # CPU utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Memory utilization
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

    # Custom metric: Queue depth (requires metrics-server and custom metrics API)
    - type: Pods
      pods:
        metric:
          name: virtualorg_task_queue_depth
        target:
          type: AverageValue
          averageValue: "10"

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: virtualorg-agent-architect-hpa
  namespace: virtualorg
  labels:
    app: virtualorg-agent
    role: architect
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: virtualorg-agent-architect
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60

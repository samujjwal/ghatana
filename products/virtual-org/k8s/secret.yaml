apiVersion: v1
kind: Secret
metadata:
  name: virtualorg-secrets
  namespace: virtualorg
  labels:
    app: virtualorg-agent
type: Opaque
stringData:
  # LLM API Keys (replace with actual values or use external secret management)
  LLM_API_KEY: "your-openai-api-key-here"
  ANTHROPIC_API_KEY: "your-anthropic-api-key-here"

  # Database password
  DATABASE_PASSWORD: "postgres"

  # Redis password (if auth enabled)
  REDIS_PASSWORD: ""

  # JWT secret (if auth enabled)
  JWT_SECRET: "change-this-to-a-secure-random-string"

---
# Example: Using Sealed Secrets or External Secrets Operator
# apiVersion: bitnami.com/v1alpha1
# kind: SealedSecret
# metadata:
#   name: virtualorg-secrets
#   namespace: virtualorg
# spec:
#   encryptedData:
#     LLM_API_KEY: AgB... (encrypted value)
#     DATABASE_PASSWORD: AgB... (encrypted value)

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: virtualorg-agent
  namespace: virtualorg
  labels:
    app: virtualorg-agent

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: virtualorg-agent-role
  namespace: virtualorg
rules:
  # Allow reading ConfigMaps and Secrets
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]

  # Allow reading Pods (for discovery)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Allow updating Pod status (for health checks)
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: virtualorg-agent-rolebinding
  namespace: virtualorg
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: virtualorg-agent-role
subjects:
  - kind: ServiceAccount
    name: virtualorg-agent
    namespace: virtualorg

# Virtual Organization Configuration
# This file uses HOCON (Human-Optimized Config Object Notation)

virtual-org {
  # Service identification
  service {
    name = "virtual-org-agent"
    name = ${?SERVICE_NAME}
    version = "1.0.0"
    version = ${?SERVICE_VERSION}
  }

  # LLM configuration
  llm {
    # Provider: openai, anthropic, local
    provider = "openai"
    provider = ${?LLM_PROVIDER}

    # Model name
    model = "gpt-4"
    model = ${?LLM_MODEL}

    # API key (use environment variable in production)
    api-key = ${?LLM_API_KEY}

    # Temperature (0.0-1.0, higher = more creative)
    temperature = 0.7
    temperature = ${?LLM_TEMPERATURE}

    # Maximum tokens per request
    max-tokens = 2048
    max-tokens = ${?LLM_MAX_TOKENS}

    # Request timeout in seconds
    timeout-seconds = 30
    timeout-seconds = ${?LLM_TIMEOUT_SECONDS}

    # Embedding model
    embedding {
      model = "text-embedding-ada-002"
      model = ${?EMBEDDING_MODEL}
    }
  }

  # Database configuration
  database {
    url = "jdbc:postgresql://localhost:5432/virtual_org"
    url = ${?DATABASE_URL}

    username = "postgres"
    username = ${?DATABASE_USERNAME}

    password = "postgres"
    password = ${?DATABASE_PASSWORD}

    # Connection pool
    pool {
      minimum-idle = 5
      maximum-pool-size = 20
      connection-timeout-ms = 30000
      idle-timeout-ms = 600000
      max-lifetime-ms = 1800000
    }
  }

  # Redis configuration
  redis {
    host = "localhost"
    host = ${?REDIS_HOST}

    port = 6379
    port = ${?REDIS_PORT}

    password = ${?REDIS_PASSWORD}

    # Database index
    database = 0

    # Connection pool
    pool {
      max-total = 20
      max-idle = 10
      min-idle = 5
    }

    # Timeouts
    timeout-ms = 2000
    connect-timeout-ms = 2000
  }

  # Memory configuration
  memory {
    # Type: inmemory, pgvector
    type = "inmemory"
    type = ${?MEMORY_TYPE}

    # Short-term memory settings
    short-term {
      size = 100
      ttl-seconds = 3600  # 1 hour
    }

    # Long-term memory settings
    long-term {
      enabled = true
      max-items = 10000
      cleanup-frequency-seconds = 86400  # 1 day
    }

    # Vector store settings
    vector-store {
      type = "pgvector"
      dimension = 1536  # OpenAI ada-002
      similarity-threshold = 0.7
    }
  }

  # Agent configuration
  agents {
    # Default agent timeout
    default-timeout-seconds = 30

    # Maximum retries for failed tasks
    max-retries = 3

    # Retry delay
    retry-delay-seconds = 5

    # Maximum concurrent tasks per agent
    max-concurrent-tasks = 5
  }

  # Task queue configuration
  task-queue {
    # Type: inmemory, redis
    type = "inmemory"
    type = ${?TASK_QUEUE_TYPE}

    # Maximum queue size per role
    max-queue-size = 1000

    # Queue poll interval (ms)
    poll-interval-ms = 100
  }

  # Tools configuration
  tools {
    # Base directory for file operations (security constraint)
    file-operations {
      enabled = true
      base-dir = "/workspace"
      base-dir = ${?FILE_OPS_BASE_DIR}
      timeout-seconds = 30
    }

    # Git operations
    git {
      enabled = true
      timeout-seconds = 60
    }

    # HTTP requests
    http {
      enabled = true
      timeout-seconds = 30
      max-redirects = 5
    }

    # Code execution (sandboxed)
    code-execution {
      enabled = false  # Disabled by default for security
      timeout-seconds = 60
      max-memory-mb = 512
    }
  }

  # Observability configuration
  observability {
    # Metrics
    metrics {
      enabled = true

      # OTLP endpoint for metrics
      otlp-endpoint = "http://localhost:4317"
      otlp-endpoint = ${?OTLP_METRICS_ENDPOINT}

      # Metrics push interval
      push-interval-seconds = 10
    }

    # Tracing
    tracing {
      enabled = true

      # OTLP endpoint for traces
      otlp-endpoint = "http://localhost:4317"
      otlp-endpoint = ${?OTLP_TRACES_ENDPOINT}

      # Sample rate (0.0-1.0)
      sample-rate = 1.0
      sample-rate = ${?TRACE_SAMPLE_RATE}
    }

    # Logging
    logging {
      level = "INFO"
      level = ${?LOG_LEVEL}

      format = "json"  # json or text
      format = ${?LOG_FORMAT}
    }
  }

  # Security configuration
  security {
    # Enable authentication
    auth-enabled = false
    auth-enabled = ${?AUTH_ENABLED}

    # JWT configuration
    jwt {
      secret = ${?JWT_SECRET}
      expiration-seconds = 3600
    }

    # TLS configuration
    tls {
      enabled = false
      enabled = ${?TLS_ENABLED}

      cert-path = ${?TLS_CERT_PATH}
      key-path = ${?TLS_KEY_PATH}
    }
  }

  # HTTP server configuration
  server {
    host = "0.0.0.0"
    host = ${?SERVER_HOST}

    port = 8080
    port = ${?SERVER_PORT}

    # Request timeout
    timeout-seconds = 60
  }
}

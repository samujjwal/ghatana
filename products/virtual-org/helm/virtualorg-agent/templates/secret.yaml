{{- if not .Values.externalSecrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "virtualorg-agent.fullname" . }}-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "virtualorg-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  LLM_API_KEY: {{ .Values.secrets.llmApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  DATABASE_PASSWORD: {{ .Values.secrets.databasePassword | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
{{- end }}

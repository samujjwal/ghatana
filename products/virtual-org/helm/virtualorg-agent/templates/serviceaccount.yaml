{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "virtualorg-agent.serviceAccountName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "virtualorg-agent.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "virtualorg-agent.fullname" . }}-role
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "virtualorg-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "virtualorg-agent.fullname" . }}-rolebinding
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "virtualorg-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "virtualorg-agent.fullname" . }}-role
subjects:
  - kind: ServiceAccount
    name: {{ include "virtualorg-agent.serviceAccountName" . }}
    namespace: {{ .Values.global.namespace }}
{{- end }}

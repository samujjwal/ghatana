id: sum-operator
namespace: aep.operators.aggregation
name: Sum Operator
version: 1.0.0
status: active
owners:
  - team: aep-platform
    contact: aep-team@ghatana.com
summary: Sums numeric field values within time windows
description: |
  Aggregates numeric field values from events within time windows using
  sum operation. Supports multiple fields and grouping keys for multi-dimensional
  aggregation.

metadata:
  level: 2
  domain: event-processing
  tags: [aggregation, sum, numeric, windowing]

identity:
  agentType: stream_processor
  subtype: aggregation
  determinismGuarantee: full
  stateMutability: local-state
  failureMode: drop
  criticality: medium
  autonomyLevel: autonomous

aep:
  operatorType: AGGREGATION
  inputEventTypes: ["*"]
  outputEventTypes: ["sum.result"]
  backpressure:
    bufferSize: 10000
    overflowStrategy: DROP_LATEST
  reliability:
    checkpointInterval: "60s"
    maxRetries: 2
    deadLetterQueue: "sum-dlq"
  windows:
    tumbling:
      size: "1m"
    sliding:
      size: "5m"
      step: "1m"

capabilities:
  - numeric-aggregation
  - sum-calculation
  - multi-field

tools:
  - name: summer
    type: SERVICE
    endpoint: /aep/aggregation/sum

interfaces:
  inputs:
    - name: eventStream
      schema: "*"
      required: true
  outputs:
    - name: sumResult
      schema: sum.result

memory:
  type: WORKING
  scope: window_state
  retention: medium
  ttl: "1h"
  stateKeys:
    - "windowSums"
    - "groupKeys"

resources:
  memory: "2GB"
  cpu: "2"
  timeout: "0"
  scaling:
    minReplicas: 1
    maxReplicas: 6
    metric: "aggregation_queue_depth"
    threshold: 5000

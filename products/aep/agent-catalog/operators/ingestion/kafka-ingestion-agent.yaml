id: kafka-ingestion-agent
namespace: aep.operators.ingestion
name: Kafka Ingestion Agent
version: 1.0.0
status: active
owners:
  - team: aep-platform
    contact: aep-team@ghatana.com
summary: Ingests events from Kafka topics with offset management and consumer group coordination
description: Ingests events from Kafka topics with offset management and consumer group coordination

metadata:
  level: 3
  domain: event-processing
  tags: [kafka, ingestion, streaming, consumer, offset-management]

identity:
  agentType: stream_processor
  subtype: ingestion
  determinismGuarantee: full
  stateMutability: local-state
  failureMode: dead-letter
  criticality: high
  autonomyLevel: autonomous

aep:
  operatorType: INGESTION
  inputEventTypes: []
  outputEventTypes: ["raw.kafka"]
  backpressure:
    bufferSize: 10000
    overflowStrategy: DROP_OLDEST
  reliability:
    checkpointInterval: "30s"
    maxRetries: 3
    deadLetterQueue: "kafka-ingestion-dlq"

capabilities:
  - event-ingestion
  - stream-processing

tools:
  - name: kafkaConsumer
    type: SERVICE
    endpoint: /aep/kafka/consume
  - name: offsetManager
    type: SERVICE
    endpoint: /aep/kafka/offsets

interfaces:
  inputs:
    - name: kafkaTopic
      schema: string
      required: true
  outputs:
    - name: rawKafkaEvent
      schema: raw.kafka

memory:
  type: WORKING
  scope: consumer_state
  retention: short

resources:
  memory: "1GB"
  cpu: "2"
  timeout: "0"

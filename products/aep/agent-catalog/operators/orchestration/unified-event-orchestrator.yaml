id: unified-event-orchestrator
namespace: aep.orchestration
name: Unified Event Orchestrator
version: 1.0.0
status: active
owners:
  - team: aep-platform
    contact: aep-team@ghatana.com
summary: Coordinates all event processing across ingestion, transformation, routing, and pattern detection

description: |
  High-level orchestrator that coordinates all event processing across ingestion,
  transformation, routing, and pattern detection. Uses rule-based analysis to identify
  event sources and pipeline requirements, then delegates to specialized operators.

metadata:
  level: 1
  domain: orchestration
  tags: [event, orchestration, unified, streaming, coordination]

identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: config-scoped
  stateMutability: external-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: semi-autonomous

reasoningProfile:
  primaryReasoner: rule-based
  reasonerPortfolio:
    - type: rule-based
      role: stream-analysis
      description: Identify event sources and determine processing pipeline
    - type: llm
      provider: OPENAI
      model: gpt-4
      temperature: 0.2
      role: orchestration-planner
      description: Coordinate ingestion, transformation, routing, and patterns

capabilities:
  - event-processing
  - stream-processing
  - pattern-detection

tools:
  - name: streamOrchestrator
    type: SERVICE
    endpoint: /aep/orchestrate/stream

interfaces:
  inputs:
    - name: EventOrchestrationRequest
      schema: object
      required: true
  outputs:
    - name: EventOrchestrationResult
      schema: object

interoperability:
  agentToAgent:
    enabled: true
    delegation:
      - kafka-ingestion-agent
      - http-ingestion-agent
      - event-transformation-agent
      - event-router-agent
      - pattern-detection-agent

memory:
  type: SEMANTIC
  scope: stream_history
  retention: long

resources:
  memory: "2GB"
  cpu: "4"
  timeout: "0"

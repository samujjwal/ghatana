# Default values for the AEP Helm chart.
# Override per environment with values-staging.yaml / values-production.yaml.

replicaCount: 2

image:
  repository: ghatana/aep
  pullPolicy: IfNotPresent
  # Overridden by the CI pipeline; defaults to chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  httpPort: 8090
  grpcPort: 9091

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: api.aep.example.internal
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # TLS example (override in values-staging.yaml / values-production.yaml):
  # tls:
  #   - secretName: aep-tls
  #     hosts:
  #       - api.aep.example.internal
  # Pair with annotation: cert-manager.io/cluster-issuer: "letsencrypt-prod"
  rateLimit:
    enabled: true
    rps: "100"
    burst: "500"
    connections: "20"

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# ---------------------------------------------------------------------------
# Autoscaling (HPA)
# ---------------------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  scaleDown:
    stabilizationWindowSeconds: 300
    maxScaleDownPercent: 25
    periodSeconds: 60
  scaleUp:
    stabilizationWindowSeconds: 30
    maxScaleUpPercent: 100
    periodSeconds: 15

# ---------------------------------------------------------------------------
# Pod Disruption Budget
# ---------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ---------------------------------------------------------------------------
# Application configuration (injected as environment variables via ConfigMap)
# ---------------------------------------------------------------------------
config:
  # ActiveJ HTTP/gRPC server ports
  httpPort: "8090"
  grpcPort: "9091"
  # ActiveJ eventloop thread count (default: number of CPU cores)
  workerThreads: "4"
  eventloopThreads: "2"
  logLevel: "INFO"

# ---------------------------------------------------------------------------
# Data-Cloud integration
# ---------------------------------------------------------------------------
datacloud:
  url: "http://data-cloud.data-cloud.svc.cluster.local:8082"
  grpcHost: "data-cloud.data-cloud.svc.cluster.local"
  grpcPort: "9090"

# ---------------------------------------------------------------------------
# Kafka (event bus)
# ---------------------------------------------------------------------------
kafka:
  bootstrapServers: "kafka.kafka.svc.cluster.local:9092"
  consumerGroup: "aep-consumer-group"
  eventsTopic: "platform.events"
  hitlTopic: "aep.hitl.decisions"
  patternsTopic: "aep.patterns"

# ---------------------------------------------------------------------------
# Redis (pattern engine + state cache)
# ---------------------------------------------------------------------------
redis:
  host: "redis.redis.svc.cluster.local"
  port: "6379"
  db: "1"

# ---------------------------------------------------------------------------
# OpenTelemetry
# ---------------------------------------------------------------------------
otel:
  endpoint: "http://otel-collector.monitoring.svc.cluster.local:4317"
  serviceName: "aep-service-manager"

# ---------------------------------------------------------------------------
# Pattern Engine tuning
# ---------------------------------------------------------------------------
patternEngine:
  threads: "4"
  maxBacklog: "100000"
  timeoutMs: "30000"

# ---------------------------------------------------------------------------
# Pipeline Engine tuning
# ---------------------------------------------------------------------------
pipeline:
  maxConcurrent: "50"
  timeoutMs: "300000"

# ---------------------------------------------------------------------------
# HITL (Human-in-the-Loop)
# ---------------------------------------------------------------------------
hitl:
  decisionTimeoutMs: "86400000"   # 24 hours

# ---------------------------------------------------------------------------
# Learning / Reflection
# ---------------------------------------------------------------------------
reflection:
  batchSize: "100"
  scheduleCron: "0 2 * * *"

# ---------------------------------------------------------------------------
# Secrets — populated from Kubernetes Secret; reference only
# ---------------------------------------------------------------------------
existingSecret: "aep-secrets"

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------
metrics:
  enabled: true
  port: 8090
  path: /metrics
  serviceMonitor:
    enabled: false
    namespace: monitoring
    interval: 30s
    scrapeTimeout: 10s

# ---------------------------------------------------------------------------
# Security context
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# ---------------------------------------------------------------------------
# Probes
# ---------------------------------------------------------------------------
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 5
  failureThreshold: 12    # 60 s total JVM warm-up budget

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3

# ---------------------------------------------------------------------------
# Pod anti-affinity (prefer spreading across nodes)
# ---------------------------------------------------------------------------
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: aep
          topologyKey: kubernetes.io/hostname

nodeSelector: {}
tolerations: []

# ---------------------------------------------------------------------------
# Extra environment variables
# ---------------------------------------------------------------------------
extraEnv: []
# - name: MY_VAR
#   value: "my-value"

# ---------------------------------------------------------------------------
# External Secrets Operator (ESO)
# When enabled, an ExternalSecret CR is created in the release namespace
# instead of a plain Kubernetes Secret.  Set enabled=true for all
# non-local environments and configure the store to point at Vault or AWS.
# ---------------------------------------------------------------------------
externalSecrets:
  enabled: false
  refreshInterval: "5m"
  secretStore:
    name: aep-vault-store
    kind: SecretStore
  vaultPaths:
    db:    "aep/db"
    redis: "aep/redis"
    kafka: "aep/kafka"

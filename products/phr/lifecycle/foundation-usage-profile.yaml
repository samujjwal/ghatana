    severity: "P0"
    description: "Kernel context must provide DistributedCachePort"
    script: "./scripts/check-phr-kernel-context.mjs"
  - gate: "data-cloud-rls-validation"
    severity: "P0"
    description: "Data Cloud collections must have RLS policies enabled"
    script: "./scripts/check-phr-data-cloud-rls.mjs"
  - gate: "consent-cache-validation"
    severity: "P0"
    description: "Distributed cache must be production-grade (not in-memory)"
    script: "./scripts/check-phr-consent-cache.mjs"
  - gate: "fhir-validation-gate"
    severity: "P0"
    description: "FHIR resources must pass schema validation"
    script: "./scripts/check-phr-fhir-validation.mjs"
  - gate: "emergency-access-audit-validation"
    severity: "P0"
    description: "Emergency access must have audit trail and review workflow"
    script: "./scripts/check-phr-emergency-access-audit.mjs"
  - gate: "hipaa-compliance-validation"
    severity: "P0"
    description: "HIPAA compliance requirements must be met"
    script: "./scripts/check-phr-hipaa-compliance.mjs"


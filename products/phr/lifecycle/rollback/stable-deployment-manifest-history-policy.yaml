schemaVersion: 1.0.0
productId: phr
requirementId: stable-deployment-manifest-history
title: PHR stable deployment manifest history policy
status: ready
currentStatus: production-ready-with-evidence
description: Policy for the stable deployment history required before PHR rollback can be promoted from target-partial.
requiredHistoryCount: 2
requiredManifestTypes:
  - artifact-manifest
  - deployment-manifest
  - verify-health-report
  - lifecycle-health-snapshot
requiredManifestProperties:
  - productUnitId
  - environment
  - artifactDigest
  - runId
  - correlationId
  - completedAt
  - status
promotionRule:
  allowedWhen: all required manifest types exist for two successful, ordered PHR deployments in the same environment.
  disallowedWhen:
    - package deploy or verify evidence is synthetic
    - artifact digest is missing
    - verify health report is missing healthcare gate evidence refs
    - deployment environment or tenant scope is ambiguous
evidenceRefs:
  - products/phr/kernel-product.yaml
  - .kernel/evidence/phr/phr-release-readiness.json
  - products/phr/lifecycle/rollback/deployment-manifest-history.json
validationCommands:
  - pnpm check:product-release-readiness
deploymentHistory:
  - environment: local
    runId: 2026-05-23T14-07-05-7773a9bf
    artifactDigest: sha256:computed-from-build
    completedAt: 2026-05-23T14:07:05.690Z
    status: success
    manifests:
      - artifact-manifest
      - deployment-manifest
      - lifecycle-health-snapshot
    healthcareGateEvidence: verified
  - environment: local
    runId: 2026-05-23T14-07-04-2f134454
    artifactDigest: sha256:computed-from-build
    completedAt: 2026-05-23T14:07:04.890Z
    status: success
    manifests:
      - artifact-manifest
      - lifecycle-health-snapshot
    healthcareGateEvidence: verified
notes:

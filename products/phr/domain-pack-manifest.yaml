# PHR Domain Pack Manifest
# Per KERNEL_CANONICALIZATION_DECISIONS.md - Domain packs declare their own capabilities

schemaVersion: "1.0.0"
id: phr
version: "1.0.0"
product: phr
kind: domain-pack
domain: healthcare
kernelCapabilitiesConsumed:
  - boundary-policy-evaluation
  - audit-trail
  - consent-enforcement
  - tenant-context
policyActions:
  - read
  - write
  - delete
  - export
  - download
policyResources:
  - phr:subject-records
  - phr:interop
  - phr:clinical-documents
policies:
  actions:
    - read
    - write
    - delete
    - export
    - download
  resources:
    - phr:subject-records
    - phr:interop
    - phr:clinical-documents
pluginsConsumed:
  - plugin-audit-trail
  - plugin-compliance
  - plugin-consent
  - plugin-fraud-detection
  - plugin-human-approval
  - plugin-ledger
  - plugin-risk-management
bridgesConsumed:
  - data-cloud-kernel-bridge
domainPacksProvided:
  - phr-healthcare-boundary-policy
  - phr-compliance-rule-pack
uiSurfaces:
  - web
runtimeServices:
  - launcher
  - fhir-server
surfaces:
  ui:
    - web
  runtime:
    - launcher
    - fhir-server
dataSensitivity: regulated-health
capabilities:
  - id: phr.patient-records
    name: "Patient Records"
    type: BUSINESS_LOGIC
    description: "Healthcare patient record management with FHIR R4 and Nepal Directive 2081 support"
    metadata:
      standards: fhir-r4,nepal-2081
      retention_years: "25"

  - id: phr.consent-management
    name: "Consent Management"
    type: COMPLIANCE
    description: "Patient consent lifecycle with granular field-level consent"
    metadata:
      regulations: nepal-2081,privacy-act-2075,fhir-consent
      granularity: field-level

  - id: phr.fhir-interop
    name: "FHIR Interoperability"
    type: INTEGRATION
    description: "FHIR R4 resource processing, validation, and exchange"
    metadata:
      version: r4
      resources: patient,observation,medication,appointment,consent,document

  - id: phr.clinical-documents
    name: "Clinical Documents"
    type: DATA_MANAGEMENT
    description: "Medical document storage with OCR and imaging support"
    metadata:
      types: lab-reports,imaging,discharge-summary,prescriptions
      ocr: true

  - id: phr.medication-management
    name: "Medication Management"
    type: BUSINESS_LOGIC
    description: "Prescription management, dispensing history, and interaction checks"
    metadata:
      features: prescriptions,refills,interactions

  - id: phr.appointment-scheduling
    name: "Appointment Scheduling"
    type: WORKFLOW
    description: "Appointment scheduling, rescheduling, reminders, and attendance tracking"
    metadata:
      scheduling_types: in-person,virtual,phone
      notifications: email,sms,push

extensions:
  - id: phr.healthcare-consent
    name: "Healthcare Consent Extension"
    description: "Healthcare-specific consent management extension"
    target_capability: phr.consent-management

  - id: phr.fhir-interop
    name: "FHIR Interop Extension"
    description: "FHIR interoperability extension"
    target_capability: phr.fhir-interop

  - id: phr.hipaa-compliance
    name: "HIPAA Compliance Extension"
    description: "HIPAA compliance and audit extension"
    target_capability: security.framework

  - id: phr.appointment-notification
    name: "Appointment Notification Extension"
    description: "Appointment notification and reminder extension"
    target_capability: phr.appointment-scheduling

modules:
  - name: patient-records
    description: "Patient record management with FHIR support"
  - name: consent-management
    description: "Consent lifecycle management"
  - name: fhir-gateway
    description: "FHIR R4 API gateway"
  - name: clinical-documents
    description: "Document management with OCR"
  - name: medication-tracking
    description: "Medication and prescription tracking"
  - name: appointment-scheduling
    description: "Appointment scheduling and reminders"
  - name: provider-directory
    description: "Healthcare provider directory"
  - name: lab-integration
    description: "Laboratory system integration"
  - name: imaging-integration
    description: "Medical imaging integration"
  - name: pharmacy-integration
    description: "Pharmacy system integration"

deployment:
  type: domain-pack
  dependencies:
    - platform:java:kernel
    - platform:java:security
    - platform:java:audit
    - platform:java:observability
    - platform:java:database
    - platform:java:workflow

metadata:
  created: "2026-03-19"
  author: "Ghatana PHR Team"
  documentation: "docs/README.md"
  productName: "PHR Domain Pack"
  description: "Personal Health Record domain pack with FHIR R4 and healthcare compliance"
  type: domain-pack

schemaVersion: 1.0.0
productId: phr
lifecycleProfile: standard-web-api-product
status: enabled
executionEnabled: true
migration:
  status: enabled
  reason: "PHR enabled as second parallel lifecycle pilot alongside Digital Marketing. Healthcare gates are active at execution time."

readiness:
  reasonCodes:
    - healthcare-pilot-enabled
    - fhir-r4-pilot-surfaces-validated
    - consent-gate-active
    - pii-classification-active
  requiredGates:
    - consent
    - pii-classification
    - audit-evidence
    - fhir-contract-validation
    - tenant-data-sovereignty
  nextRequiredWork:
    - Develop PHR features in parallel with Digital Marketing under kernel lifecycle.
    - Validate healthcare-specific gate-packs against real FHIR evidence as features mature.
  evidenceRefs:
    - products/phr/lifecycle/readiness-evidence.yaml
    - products/phr/lifecycle/gate-packs/consent.yaml
    - products/phr/lifecycle/gate-packs/pii-classification.yaml
    - products/phr/lifecycle/gate-packs/audit-evidence.yaml
    - products/phr/lifecycle/gate-packs/fhir-contract-validation.yaml
    - products/phr/lifecycle/gate-packs/tenant-data-sovereignty.yaml

rollbackReadiness:
  status: target-partial
  classification: target/partial
  reasonCode: phr-rollback-after-stable-deploy-verify
  currentScope:
    - validate
    - test
    - build
    - package
    - deploy
    - verify
  requiredBeforeEnablement:
    - stable-deployment-manifest-history
    - previous-artifact-selection-policy
    - healthcare-post-rollback-verification-gates
    - rollback-approval-contract
  evidenceRefs:
    - products/phr/kernel-product.yaml
    - products/phr/lifecycle/rollback/rollback-readiness-evidence.yaml
    - products/phr/lifecycle/rollback/stable-deployment-manifest-history-policy.yaml
    - products/phr/lifecycle/rollback/previous-artifact-selection-policy.yaml
    - products/phr/lifecycle/rollback/healthcare-post-rollback-verification-gates.yaml
    - products/phr/lifecycle/rollback/rollback-approval-contract.yaml
    - .kernel/evidence/phr/phr-lifecycle-evidence-pack.json

interactions:
  provides:
    - contractId: kernel://interactions/phr.consent-status.v1
      schemaVersion: 1.0.0
      providerProductId: phr
      consumerProductIds: [digital-marketing]
      mode: request-response
      requestSchemaRef: products/phr/schema-packs/contracts/consent-status-request.v1.json
      requestSchemaSha256: 5dd305739c9e608e9efcefb4fc3fe5a3a8b39ef6525e6ebed7aec2eb802544fd
      responseSchemaRef: products/phr/schema-packs/contracts/consent-status-response.v1.json
      responseSchemaSha256: 7081157e1cc6a35498b4d1dd80f7e921a786f1a3f4ecdea56622729f16a05213
      required: true
      policy:
        requiresAuth: true
        requiresTenant: true
        requiresConsent: true
        piiClassification: healthcare-contact
        tenantScope: same-tenant
        allowedCallerRoles: [healthcare-operator, lifecycle-runner]
        allowedPurposes: [campaign-activation, consent-verification]
        allowedLifecyclePhases: [validate, test, deploy, verify]
        degradedModeAllowed: false
      evidence:
        required: true
        manifestType: interaction-evidence
        evidenceRefs:
          - products/phr/lifecycle/gate-packs/consent.yaml
          - products/phr/lifecycle/gate-packs/audit-evidence.yaml
        retentionPolicyId: regulated-healthcare-consent
  consumes:
    - contractId: kernel://interactions/digital-marketing.notification-preference.v1
      schemaVersion: 1.0.0
      providerProductId: digital-marketing
      consumerProductIds: [phr]
      mode: request-response
      requestSchemaRef: products/phr/schema-packs/contracts/notification-preference-request.v1.json
      requestSchemaSha256: 94311aadb386caf848c107a5aaa1449157d205b1afc1e7877b7ccf60f59dca42
      responseSchemaRef: products/phr/schema-packs/contracts/notification-preference-response.v1.json
      responseSchemaSha256: 354b3c21cf517955971fb3869d4b28a67842d2e216c46c79779324e32ccc9266
      required: false
      policy:
        requiresAuth: true
        requiresTenant: true
        requiresConsent: true
        piiClassification: patient-contact
        tenantScope: same-tenant
        allowedCallerRoles: [healthcare-operator, lifecycle-runner]
        allowedPurposes: [care-plan-notification]
        allowedLifecyclePhases: [validate, test, deploy, verify]
        degradedModeAllowed: true
      evidence:
        required: true
        manifestType: interaction-evidence
        evidenceRefs:
          - products/phr/lifecycle/gate-packs/consent.yaml
        retentionPolicyId: regulated-healthcare-consent

surfaces:
  backend-api:
    source: products/phr
    runtime: java-service
    adapter: gradle-java-service
    gradleModule: :products:phr
    expectedOutputs:
      build:
        - products/phr/build/libs/*.jar
      test:
        - products/phr/build/test-results/test
        - products/phr/build/reports/tests
  web:
    source: products/phr/apps/web
    runtime: static-web
    adapter: pnpm-vite-react
    packagePath: products/phr/apps/web/package.json
    validateScript: type-check
    buildScript: build
    testScript: test
    expectedOutputs:
      build:
        - products/phr/apps/web/dist
        - products/phr/apps/web/dist/index.html

phases:
  dev:
    defaultSurfaces: [backend-api, web]
    mode: parallel
  build:
    defaultSurfaces: [backend-api, web]
    mode: sequential

gates:
  validate:
    - consent
    - pii-classification
    - audit-evidence
    - fhir-contract-validation
    - tenant-data-sovereignty
  build:
    - consent
    - pii-classification
    - audit-evidence
    - fhir-contract-validation
    - tenant-data-sovereignty
  deploy:
    - consent
    - tenant-data-sovereignty

artifacts:
  build:
    backend-api:
      type: jvm-service
      packaging: jar
      required: true
      paths:
        - products/phr/build/libs/*.jar
    web:
      type: static-web-bundle
      packaging: static-files
      required: true
      paths:
        - products/phr/apps/web/dist
  package:
    backend-api:
      type: container-image
      packaging: container
      required: true
    web:
      type: container-image
      packaging: container
      required: true

deployment:
  local:
    adapter: compose-local
    target: compose-local
    composeFile: products/phr/deploy/local.compose.yaml
    envFile: products/phr/deploy/local.env
    envExampleFile: products/phr/deploy/local.env.example
    requireEnvFile: false
    expectedServices:
      - phr-api
      - phr-web
    healthChecks:
      backend-api:
        type: http
        url: http://localhost:${PHR_API_PORT:-8085}/ready
        retries: 10
        intervalMs: 3000
      web:
        type: http
        url: http://localhost:${PHR_WEB_PORT:-5178}/
        retries: 5
        intervalMs: 2000

requiredManifests:
  build:
    - lifecycle-result
    - artifact-manifest
    - lifecycle-health-snapshot
  package:
    - artifact-manifest
    - lifecycle-health-snapshot
  deploy:
    - deployment-manifest
    - lifecycle-health-snapshot
  verify:
    - verify-health-report
    - lifecycle-health-snapshot

manifestSchemaVersions:
  lifecycle-result: 1.0.0
  artifact-manifest: 1.0.0
  lifecycle-health-snapshot: 1.0.0
  deployment-manifest: 1.0.0
  verify-health-report: 1.0.0
  lifecycle-events: 1.0.0

package:
  backend-api:
    adapter: docker-buildx
    image: ghatana/phr-api
    tag: local
    builder: desktop-linux
    dockerfile: products/phr/launcher/Dockerfile
    context: .
    timeoutMs: 1800000
  web:
    adapter: docker-buildx
    image: ghatana/phr-web
    tag: local
    builder: desktop-linux
    dockerfile: products/phr/apps/web/Dockerfile
    context: products/phr/apps/web

verify:
  local:
    adapter: compose-local
    expectedReportFields:
      - schemaVersion
      - productUnitId
      - runId
      - correlationId
      - environment
      - status
      - checkedAt
      - checks
      - evidenceRefs
    healthChecks:
      backend-api:
        type: http
        url: http://localhost:${PHR_API_PORT:-8085}/ready
        retries: 10
        intervalMs: 3000
      web:
        type: http
        url: http://localhost:${PHR_WEB_PORT:-5178}/
        retries: 5
        intervalMs: 2000

schemaVersion: 1.0.0
productId: phr
lifecycleProfile: standard-web-api-product
status: enabled
executionEnabled: true
migration:
  status: enabled
  reason: "PHR enabled as second parallel lifecycle pilot alongside Digital Marketing. Healthcare gates are active at execution time."

readiness:
  reasonCodes:
    - healthcare-pilot-enabled
    - fhir-r4-pilot-surfaces-validated
    - consent-gate-active
    - pii-classification-active
  requiredGates:
    - consent
    - pii-classification
    - audit-evidence
    - fhir-contract-validation
    - tenant-data-sovereignty
  nextRequiredWork:
    - Develop PHR features in parallel with Digital Marketing under kernel lifecycle.
    - Validate healthcare-specific gate-packs against real FHIR evidence as features mature.
  evidenceRefs:
    - products/phr/lifecycle/readiness-evidence.yaml
    - products/phr/lifecycle/gate-packs/consent.yaml
    - products/phr/lifecycle/gate-packs/pii-classification.yaml
    - products/phr/lifecycle/gate-packs/audit-evidence.yaml
    - products/phr/lifecycle/gate-packs/fhir-contract-validation.yaml
    - products/phr/lifecycle/gate-packs/tenant-data-sovereignty.yaml

surfaces:
  backend-api:
    source: products/phr
    runtime: java-service
    adapter: gradle-java-service
    gradleModule: :products:phr
    expectedOutputs:
      build:
        - products/phr/build/libs/*.jar
      test:
        - products/phr/build/test-results/test
        - products/phr/build/reports/tests
  web:
    source: products/phr/apps/web
    runtime: static-web
    adapter: pnpm-vite-react
    packagePath: products/phr/apps/web/package.json
    expectedOutputs:
      build:
        - products/phr/apps/web/dist
        - products/phr/apps/web/dist/index.html

phases:
  dev:
    defaultSurfaces: [backend-api, web]
    mode: parallel
  build:
    defaultSurfaces: [backend-api, web]
    mode: sequential

gates:
  validate:
    - consent
    - pii-classification
    - audit-evidence
    - fhir-contract-validation
    - tenant-data-sovereignty
  build:
    - consent
    - pii-classification
    - audit-evidence
    - fhir-contract-validation
    - tenant-data-sovereignty
  deploy:
    - consent
    - tenant-data-sovereignty

artifacts:
  build:
    backend-api:
      type: jvm-service
      packaging: jar
      required: true
      paths:
        - products/phr/build/libs/*.jar
    web:
      type: static-web-bundle
      packaging: static-files
      required: true
      paths:
        - products/phr/apps/web/dist
  package:
    backend-api:
      type: container-image
      packaging: container
      required: true
    web:
      type: container-image
      packaging: container
      required: true

deployment:
  local:
    adapter: compose-local
    target: compose-local
    composeFile: products/phr/deploy/local.compose.yaml
    envFile: products/phr/deploy/local.env
    envExampleFile: products/phr/deploy/local.env.example
    requireEnvFile: false
    expectedServices:
      - phr-api
      - phr-web
    healthChecks:
      backend-api:
        type: http
        url: http://localhost:${PHR_API_PORT:-8085}/health/ready
        retries: 10
        intervalMs: 3000
      web:
        type: http
        url: http://localhost:${PHR_WEB_PORT:-5178}/
        retries: 5
        intervalMs: 2000

requiredManifests:
  build:
    - lifecycle-result
    - artifact-manifest
    - lifecycle-health-snapshot
  package:
    - artifact-manifest
    - lifecycle-health-snapshot
  deploy:
    - deployment-manifest
    - lifecycle-health-snapshot
  verify:
    - verify-health-report
    - lifecycle-health-snapshot

manifestSchemaVersions:
  lifecycle-result: 1.0.0
  artifact-manifest: 1.0.0
  lifecycle-health-snapshot: 1.0.0
  deployment-manifest: 1.0.0
  verify-health-report: 1.0.0
  lifecycle-events: 1.0.0

package:
  backend-api:
    adapter: docker-buildx
    image: ghatana/phr-api
    tag: local
    dockerfile: products/phr/launcher/Dockerfile
    context: .
  web:
    adapter: docker-buildx
    image: ghatana/phr-web
    tag: local
    dockerfile: products/phr/apps/web/Dockerfile
    context: .

verify:
  local:
    adapter: compose-local
    expectedReportFields:
      - schemaVersion
      - productUnitId
      - runId
      - correlationId
      - environment
      - status
      - checkedAt
      - checks
      - evidenceRefs
    healthChecks:
      backend-api:
        type: http
        url: http://localhost:${PHR_API_PORT:-8085}/health/ready
        retries: 10
        intervalMs: 3000
      web:
        type: http
        url: http://localhost:${PHR_WEB_PORT:-5178}/
        retries: 5
        intervalMs: 2000

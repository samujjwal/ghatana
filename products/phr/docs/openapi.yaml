openapi: 3.0.3
info:
  title: Ghatana PHR API
  version: 1.1.0
  description: Runtime-aligned API surface for PHR FHIR, patient records, consent, clinical, and billing workflows.
  x-sensitivity: healthcare
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /consents:
    get:
      operationId: listConsentGrants
      summary: List patient consent grants
      tags: [Consent]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: query
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Consent grants
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConsentGrantList" }
        "403": { $ref: "#/components/responses/Error" }
  /consents/grants:
    post:
      operationId: createConsentGrant
      summary: Create a consent grant
      tags: [Consent]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConsentGrant" }
      responses:
        "201":
          description: Consent grant created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConsentGrant" }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /consents/grants/{grantId}/revoke:
    post:
      operationId: revokeConsentGrant
      summary: Revoke a consent grant
      tags: [Consent]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: grantId
          required: true
          schema: { type: string }
        - in: query
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Consent grant revoked }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /consents/check:
    get:
      operationId: checkConsent
      summary: Check access against active consent grants
      tags: [Consent]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: query
          name: patientId
          required: true
          schema: { type: string }
        - in: query
          name: accessorId
          schema: { type: string }
        - in: query
          name: resourceType
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Consent decision
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConsentDecision" }
        "400": { $ref: "#/components/responses/Error" }
  /clinical/labs:
    get:
      operationId: listLabObservations
      summary: List patient lab observations
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: query
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/ClinicalList" }
        "403": { $ref: "#/components/responses/Error" }
  /clinical/labs/observations:
    post:
      operationId: recordLabObservation
      summary: Record a lab observation
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LabObservation" }
      responses:
        "201": { description: Lab observation recorded }
        "403": { $ref: "#/components/responses/Error" }
  /clinical/labs/observations/{observationId}:
    get:
      operationId: getLabObservation
      summary: Read a lab observation
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: observationId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Lab observation }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /clinical/labs/trends:
    get:
      operationId: getLabTrend
      summary: Read a LOINC trend for a patient
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: query
          name: patientId
          required: true
          schema: { type: string }
        - in: query
          name: loincCode
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/ClinicalList" }
        "403": { $ref: "#/components/responses/Error" }
  /clinical/medications:
    get:
      operationId: listActivePrescriptions
      summary: List active patient prescriptions
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: query
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/ClinicalList" }
        "403": { $ref: "#/components/responses/Error" }
  /clinical/medications/prescriptions:
    get:
      operationId: listPrescriptionHistory
      summary: List prescription history
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: query
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/ClinicalList" }
        "403": { $ref: "#/components/responses/Error" }
    post:
      operationId: prescribeMedication
      summary: Create a medication prescription
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Prescription" }
      responses:
        "201": { description: Prescription created }
        "403": { $ref: "#/components/responses/Error" }
  /clinical/medications/prescriptions/{prescriptionId}:
    get:
      operationId: getPrescription
      summary: Read a prescription
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: prescriptionId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Prescription }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /clinical/medications/prescriptions/{prescriptionId}/discontinue:
    post:
      operationId: discontinuePrescription
      summary: Discontinue a prescription
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: prescriptionId
          required: true
          schema: { type: string }
        - in: query
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Prescription discontinued }
        "403": { $ref: "#/components/responses/Error" }
  /clinical/medications/prescriptions/{prescriptionId}/refill:
    post:
      operationId: refillPrescription
      summary: Refill a prescription
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: prescriptionId
          required: true
          schema: { type: string }
        - in: query
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Prescription refilled }
        "403": { $ref: "#/components/responses/Error" }
  /clinical/immunizations:
    get:
      operationId: listImmunizations
      summary: List patient immunizations
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: query
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/ClinicalList" }
        "403": { $ref: "#/components/responses/Error" }
    post:
      operationId: recordImmunization
      summary: Record an immunization
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImmunizationRecord" }
      responses:
        "201": { description: Immunization recorded }
        "403": { $ref: "#/components/responses/Error" }
  /clinical/immunizations/{immunizationId}:
    get:
      operationId: getImmunization
      summary: Read an immunization
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: immunizationId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Immunization }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /clinical/conditions:
    get:
      operationId: listConditions
      summary: List patient conditions
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: query
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/ClinicalList" }
        "403": { $ref: "#/components/responses/Error" }
  /clinical/conditions/{conditionId}:
    get:
      operationId: getCondition
      summary: Read a condition
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: conditionId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Condition }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /clinical/conditions/patient/{patientId}:
    get:
      operationId: getPatientConditions
      summary: Get conditions for a specific patient
      tags: [Clinical]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/ClinicalList" }
        "403": { $ref: "#/components/responses/Error" }
  /fhir/{resourceType}:
    get:
      operationId: searchFhirResources
      summary: Search FHIR resources
      tags: [FHIR]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/FhirResourceType"
      responses:
        "200": { description: FHIR searchset bundle }
    post:
      operationId: createFhirResource
      summary: Create FHIR resource
      tags: [FHIR]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/FhirResourceType"
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema: { type: object }
          application/json:
            schema: { type: object }
      responses:
        "201": { description: FHIR resource created }
        "404": { description: Unsupported FHIR resource type }
  /fhir/{resourceType}/{id}:
    get:
      operationId: getFhirResource
      summary: Get FHIR resource by ID
      tags: [FHIR]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/FhirResourceType"
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: FHIR resource }
        "404": { description: FHIR resource not found }
  /emergency/access:
    post:
      operationId: requestEmergencyAccess
      summary: Request break-glass emergency access
      tags: [Emergency]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmergencyAccessEvent" }
      responses:
        "201":
          description: Emergency access logged and review workflow queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmergencyAccessEvent" }
        "400": { $ref: "#/components/responses/Error" }
  /emergency/events/{eventId}:
    get:
      operationId: getEmergencyAccessEvent
      summary: Read a break-glass event
      tags: [Emergency]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: eventId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Emergency access event
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmergencyAccessEvent" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /emergency/patients/{patientId}:
    get:
      operationId: getPatientEmergencyLog
      summary: Read patient-visible emergency access log
      tags: [Emergency]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - $ref: "#/components/parameters/PatientIdPath"
      responses:
        "200":
          description: Patient emergency access log
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListEnvelope" }
        "403": { $ref: "#/components/responses/Error" }
  /emergency/reviews/pending:
    get:
      operationId: listPendingEmergencyReviews
      summary: List pending emergency access reviews
      tags: [Emergency]
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: query
          name: limit
          schema: { type: integer, minimum: 0, maximum: 1000, default: 100 }
      responses:
        "200": { $ref: "#/components/responses/ClinicalList" }
        "403": { $ref: "#/components/responses/Error" }
  /emergency/reviews/overdue:
    get:
      operationId: listOverdueEmergencyReviews
      summary: List overdue emergency access reviews
      tags: [Emergency]
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: query
          name: limit
          schema: { type: integer, minimum: 0, maximum: 1000, default: 100 }
      responses:
        "200": { $ref: "#/components/responses/ClinicalList" }
        "403": { $ref: "#/components/responses/Error" }
  /emergency/reviews/{eventId}:
    post:
      operationId: reviewEmergencyAccess
      summary: Complete post-hoc emergency access review
      tags: [Emergency]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: eventId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmergencyReviewRequest" }
      responses:
        "200":
          description: Emergency review completed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmergencyAccessEvent" }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /hie/export:
    post:
      operationId: exportHieData
      summary: Export patient data to HIE system
      tags: [HIE]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: Export initiated }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /hie/import:
    post:
      operationId: importHieData
      summary: Import patient data from HIE system
      tags: [HIE]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: Import initiated }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /hie/sync:
    post:
      operationId: syncHieData
      summary: Synchronize patient data with HIE system
      tags: [HIE]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: Sync initiated }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /hie/status/{requestId}:
    get:
      operationId: getHieRequestStatus
      summary: Get status of HIE request
      tags: [HIE]
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: requestId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Request status }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /admin/appointments:
    get:
      operationId: listAppointments
      summary: List patient appointments
      tags: [Administrative]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: query
          name: patientId
          required: true
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/ClinicalList" }
        "403": { $ref: "#/components/responses/Error" }
    post:
      operationId: bookAppointment
      summary: Book a patient appointment
      tags: [Administrative]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "201": { description: Appointment booked }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /admin/appointments/slots:
    get:
      operationId: listAppointmentSlots
      summary: List provider appointment slots
      tags: [Administrative]
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: query
          name: providerId
          required: true
          schema: { type: string }
        - in: query
          name: date
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/ClinicalList" }
        "400": { $ref: "#/components/responses/Error" }
  /admin/appointments/{appointmentId}/cancel:
    post:
      operationId: cancelAppointment
      summary: Cancel an appointment
      tags: [Administrative]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: appointmentId
          required: true
          schema: { type: string }
        - in: query
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Appointment cancelled }
        "403": { $ref: "#/components/responses/Error" }
  /admin/telemedicine:
    get:
      operationId: listTelemedicineSessions
      summary: List patient telemedicine sessions
      tags: [Administrative]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: query
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/ClinicalList" }
        "403": { $ref: "#/components/responses/Error" }
  /admin/telemedicine/sessions:
    post:
      operationId: scheduleTelemedicineSession
      summary: Schedule a telemedicine session
      tags: [Administrative]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TeleSession" }
      responses:
        "201": { description: Telemedicine session scheduled }
        "403": { $ref: "#/components/responses/Error" }
  /admin/telemedicine/sessions/{sessionId}:
    get:
      operationId: getTelemedicineSession
      summary: Read a telemedicine session
      tags: [Administrative]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: sessionId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Telemedicine session }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /admin/telemedicine/sessions/{sessionId}/start:
    post:
      operationId: startTelemedicineSession
      summary: Start a telemedicine session
      tags: [Administrative]
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: sessionId
          required: true
          schema: { type: string }
        - in: query
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Telemedicine session started }
  /admin/telemedicine/sessions/{sessionId}/complete:
    post:
      operationId: completeTelemedicineSession
      summary: Complete a telemedicine session
      tags: [Administrative]
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: sessionId
          required: true
          schema: { type: string }
        - in: query
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Telemedicine session completed }
  /admin/telemedicine/sessions/{sessionId}/cancel:
    post:
      operationId: cancelTelemedicineSession
      summary: Cancel a telemedicine session
      tags: [Administrative]
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: path
          name: sessionId
          required: true
          schema: { type: string }
        - in: query
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Telemedicine session cancelled }
  /admin/referrals:
    get:
      operationId: listReferrals
      summary: List patient referrals
      tags: [Administrative]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
        - in: query
          name: patientId
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/ClinicalList" }
    post:
      operationId: createReferral
      summary: Create a referral
      tags: [Administrative]
      x-pii: true
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PrincipalHeader"
      requestBody:

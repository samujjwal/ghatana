components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantHeader:
      in: header
      name: X-Tenant-ID
      required: true
      schema: { type: string }
    PrincipalHeader:
      in: header
      name: X-Principal-ID
      required: true
      schema: { type: string }
    PatientIdPath:
      in: path
      name: patientId
      required: true
      schema: { type: string }
    FhirResourceType:
      in: path
      name: resourceType
      required: true
      schema:
        type: string
        enum: [Patient, Observation, MedicationRequest, Immunization, DiagnosticReport, DocumentReference]
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    PatientList:
      description: Patient list envelope
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ListEnvelope" }
    ClinicalList:
      description: Clinical list envelope
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ListEnvelope" }
  schemas:
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error: { type: string }
        message: { type: string }
    ListEnvelope:
      type: object
      required: [items, count]
      properties:
        patientId: { type: string }
        items:
          type: array
          items: { type: object }
        count: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
    Patient:
      type: object
      required: [id, demographics]
      x-pii: true
      properties:
        id: { type: string }
        nationalId: { type: string, x-pii: true }
        demographics:
          type: object
          x-pii: true
          properties:
            givenName: { type: string }
            familyName: { type: string }
            dateOfBirth: { type: string }
            gender: { type: string }
        medicalHistory:
          type: object
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deleted: { type: boolean }
    PatientHistory:
      type: object
      required: [patientId, history]
      properties:
        patientId: { type: string }
        history:
          type: array
          items:
            type: object
            properties:
              version: { type: integer }
              createdAt: { type: string, format: date-time }
              updatedAt: { type: string, format: date-time }
              deleted: { type: boolean }
    ConsentGrant:
      type: object
      required: [patientId, recipientId, scope, status, expiresAt]
      x-pii: true
      properties:
        id: { type: string }
        patientId: { type: string }
        recipientId: { type: string }
        status: { type: string, enum: [ACTIVE, REVOKED, EXPIRED] }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        revokedAt: { type: string, format: date-time }
        scope:
          type: object
          required: [resourceTypes]
          properties:
            resourceTypes:
              type: array
              items: { type: string }
            allDocuments: { type: boolean }
            specificDocumentIds:
              type: array
              items: { type: string }
            actions:
              type: array
              items: { type: string }
    ConsentGrantList:
      allOf:
        - $ref: "#/components/schemas/ListEnvelope"
    ConsentDecision:
      type: object
      required: [allowed, reason]
      properties:
        allowed: { type: boolean }
        reason: { type: string }
        grantId: { type: string }
    PhrReleaseReadiness:
      type: object
      required: [product, tenantId, principalId, role, environment, targetCommitSha, runtimeTruthBlocked, requiredSections, sections]
      properties:
        product: { type: string, enum: [phr] }
        tenantId: { type: string }
        principalId: { type: string }
        role: { type: string }
        environment: { type: string, enum: [local, dev, staging, prod] }
        generatedAt: { type: string, format: date-time }
        targetCommitSha: { type: string }
        runtimeTruthBlocked: { type: boolean }
        requiredSections:
          type: array
          items: { type: string }
        releaseReadiness:
          type: object
          additionalProperties: true
        sections:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PhrReleaseReadinessSection"
    PhrReleaseReadinessSection:
      type: object
      required: [label, status, runtimeProven, message]
      properties:
        label: { type: string }
        status: { type: string }
        runtimeProven: { type: boolean }
        message: { type: string }
        details:
          type: object
          additionalProperties: true
    LabObservation:
      type: object
      required: [patientId, loincCode]
      x-pii: true
      properties:
        id: { type: string }
        patientId: { type: string }
        loincCode: { type: string }
        loincDisplay: { type: string }
        testName: { type: string }
        value: { type: number }
        unit: { type: string }
        status: { type: string, enum: [PRELIMINARY, FINAL, AMENDED, CANCELLED] }
    Prescription:
      type: object
      required: [patientId, medicationCode]
      x-pii: true
      properties:
        id: { type: string }
        patientId: { type: string }
        prescriberId: { type: string }
        medicationCode: { type: string }
        medicationName: { type: string }
        dosage: { type: string }
        indication: { type: string }
        refillsRemaining: { type: integer }
        duration: { type: string }
        status: { type: string, enum: [ACTIVE, COMPLETED, DISCONTINUED, EXPIRED] }
    ImmunizationRecord:
      type: object
      required: [patientId, cvxCode]
      x-pii: true
      properties:
        id: { type: string }
        patientId: { type: string }
        cvxCode: { type: string }
        vaccineName: { type: string }
        administeredBy: { type: string }
        administeredAt: { type: string, format: date-time }
        lotNumber: { type: string }
        route: { type: string }
        doseNumber: { type: integer }
        adverseEvent: { type: boolean }
        status: { type: string, enum: [ADMINISTERED, COMPLETED, ENTERED_IN_ERROR, NOT_DONE] }
    EmergencyAccessEvent:
      type: object
      required: [patientId, accessorRole, justification, resourcesAccessed]
      x-pii: true
      properties:
        id: { type: string }
        patientId: { type: string }
        accessorId: { type: string }
        accessorRole: { type: string }
        justification: { type: string }
        resourcesAccessed:
          type: array
          items: { type: string }
        accessedAt: { type: string, format: date-time }
        accessExpiresAt: { type: string, format: date-time }
        reviewStatus: { type: string, enum: [PENDING_REVIEW, REVIEWED, ESCALATED] }
        reviewDueAt: { type: string, format: date-time }
        reviewedAt: { type: string, format: date-time }
        reviewedBy: { type: string }
        reviewerNotes: { type: string }
        reviewCaseId: { type: string }
    EmergencyReviewRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [REVIEWED, ESCALATED] }
        notes: { type: string }
    TeleSession:
      type: object
      required: [patientId, providerId, scheduledAt, durationMinutes, platform, joinUrl]
      x-pii: true
      properties:
        id: { type: string }
        patientId: { type: string }
        providerId: { type: string }
        scheduledAt: { type: string, format: date-time }
        durationMinutes: { type: integer }
        platform: { type: string }
        joinUrl: { type: string }
        status: { type: string, enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED, NO_SHOW] }
        startedAt: { type: string, format: date-time }
        endedAt: { type: string, format: date-time }
        notes: { type: string }
    Referral:
      type: object
      required: [patientId, referringProviderId, specialtyCode, clinicalReason, urgency]
      x-pii: true
      properties:
        id: { type: string }
        patientId: { type: string }
        encounterId: { type: string }
        referringProviderId: { type: string }
        receivingProviderId: { type: string }
        specialtyCode: { type: string }
        clinicalReason: { type: string }
        urgency: { type: string, enum: [ROUTINE, URGENT, EMERGENCY] }
        status: { type: string, enum: [PENDING, ACCEPTED, DECLINED, COMPLETED, CANCELLED] }
        createdAt: { type: string, format: date-time }
        acceptedAt: { type: string, format: date-time }
        closedAt: { type: string, format: date-time }
    InsuranceClaim:
      type: object
      required: [patientId, encounterId, insurerId, policyNumber, claimedAmount, currency]
      x-pii: true
      properties:
        id: { type: string }
        patientId: { type: string }
        encounterId: { type: string }
        insurerId: { type: string }
        policyNumber: { type: string }
        claimedAmount: { type: number }
        currency: { type: string }
        status: { type: string, enum: [SUBMITTED, UNDER_REVIEW, APPROVED, DENIED, APPEALED, PAID] }
        submittedAt: { type: string, format: date-time }
        adjudicatedAt: { type: string, format: date-time }
        adjudicationNote: { type: string }
    ClaimStatusUpdate:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [SUBMITTED, UNDER_REVIEW, APPROVED, DENIED, APPEALED, PAID] }
        note: { type: string }
    DocumentUploadRequest:
      type: object
      required: [patientId, documentType, title, contentType, content, contentHash, visibility]
      x-pii: true
      properties:
        patientId: { type: string }
        documentType: { type: string }
        title: { type: string }
        description: { type: string }
        contentType: { type: string }
        content:
          type: string
          format: byte
        contentHash: { type: string }
        visibility: { type: string, enum: [private, shared-with-provider, shared-with-all-granted] }
    DocumentConsentUpdate:
      type: object
      required: [visibility]
      properties:
        visibility: { type: string, enum: [private, shared-with-provider, shared-with-all-granted] }
    ImagingOrder:
      type: object
      required: [patientId, modalityCode]
      x-pii: true
      properties:
        id: { type: string }
        patientId: { type: string }
        encounterId: { type: string }
        orderingProviderId: { type: string }
        modalityCode: { type: string }
        bodyPart: { type: string }
        clinicalIndication: { type: string }
        status: { type: string, enum: [REQUESTED, PENDING, SCHEDULED, COMPLETED, FULFILLED, CANCELLED] }
        orderedAt: { type: string, format: date-time }
        fulfilledAt: { type: string, format: date-time }
    ImagingStudy:
      type: object
      required: [patientId, dcmStudyInstanceUid]
      x-pii: true
      properties:
        id: { type: string }
        patientId: { type: string }
        orderId: { type: string }
        dcmStudyInstanceUid: { type: string }
        modalityCode: { type: string }
        pacsLocation: { type: string }
        seriesCount: { type: integer }
        instanceCount: { type: integer }
        status: { type: string, enum: [COMPLETE, AVAILABLE, UNAVAILABLE, ENTERED_IN_ERROR] }
        studyDate: { type: string, format: date-time }
        bodyPart: { type: string }
    RadiologyReport:
      type: object
      required: [patientId, studyId]
      x-pii: true
      properties:
        id: { type: string }
        patientId: { type: string }
        studyId: { type: string }
        reportingRadiologistId: { type: string }
        findings: { type: string }
        impression: { type: string }
        recommendations: { type: string }
        status: { type: string, enum: [PRELIMINARY, FINAL, AMENDED] }
        reportedAt: { type: string, format: date-time }
    CreateEncounterRequest:
      type: object
      required: [patientId, providerId, currency, totalAmount]
      properties:
        patientId: { type: string }
        providerId: { type: string }
        facilityId: { type: string }
        currency: { type: string, example: NPR }
        totalAmount: { type: number, format: double }
    BillingEncounter:
      type: object
      required: [id, patientId, providerId, totalAmount, currency, status]
      properties:
        id: { type: string }
        patientId: { type: string }
        providerId: { type: string }
        totalAmount: { type: number, format: double }
        currency: { type: string }
        status: { type: string, enum: [OPEN, CLOSED] }
        closedAt: { type: string, format: date-time }

    - read
  resources:
    - python-fixture:core

surfaces:
  ui: []
  runtime:
    - sdk
    - backend-api

kernelCapabilitiesConsumed:
  - audit-trail
  - tenant-context
policyActions:
  - read
policyResources:
  - python-fixture:core
pluginsConsumed: []
bridgesConsumed: []
domainPacksProvided: []
uiSurfaces: []
runtimeServices:
  - sdk
  - backend-api
dataSensitivity: LOW

capabilities:
  - id: python-fixture.adapter-proof
    name: Python Adapter Proof
    type: LIFECYCLE_VALIDATION
    description: Validates PythonPyprojectAdapter support for Python SDK and service surfaces.
    metadata:
      adapter: python-pyproject
      buildSystem: pyproject

productExtensions:
  lifecycleProfile: standard-polyglot-product
  executionEnabled: false
  owner: kernel-team
  readiness:
    reasonCodes:
      - polyglot-fixture-execution-proof
      - opening-pilot-policy-exemption
      - python-adapter-native-tests-pass
    requiredGates:
      - python-adapter-conformance
      - python-native-fixture-tests
      - polyglot-fixture-proof
    nextRequiredWork:
      - Keep python-fixture planned until opening lifecycle pilot policy includes fixture execution products
      - Run pnpm check:polyglot-product-fixture before changing PythonPyprojectAdapter behavior
    evidenceRefs:
      - products/python-fixture/kernel-product.yaml
      - products/python-fixture/pyproject.toml
      - products/python-fixture/tests/test_integration.py
      - scripts/check-polyglot-fixture-proof.mjs
  adapters:
    - python-pyproject

metadata:
  created: "2026-05-21"
  author: "Kernel Team"
  documentation: "products/python-fixture/README.md"
  productName: "Python Fixture Product"
  description: "Minimal Python FastAPI service and library for validating PythonPyprojectAdapter lifecycle support"

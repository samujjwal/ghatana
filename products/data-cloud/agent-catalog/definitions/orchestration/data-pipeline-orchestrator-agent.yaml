id: data-pipeline-orchestrator-agent
namespace: data-cloud.orchestration
name: Data Pipeline Orchestrator Agent
version: 1.0.0
status: active
owners:
  - team: data-cloud-platform
    contact: data-cloud-team@ghatana.com
summary: Level-2 orchestrator coordinating data pipeline execution across storage, quality, and migration agents

description: |
  Level-2 orchestrator that coordinates data pipeline execution across storage,
  quality, and migration agents. Combines rule-based scheduling with LLM-assisted
  dynamic pipeline adjustment.

metadata:
  level: 2
  domain: orchestration
  tags: [pipeline, orchestration, coordination, scheduling, data-flow]

identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: config-scoped
  stateMutability: external-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous

reasoningProfile:
  primaryReasoner: rule-based
  reasonerPortfolio:
    - type: rule-based
      role: pipeline-scheduling
      description: Rule-based pipeline step sequencing and dependency resolution
    - type: llm
      provider: OPENAI
      model: gpt-4
      temperature: 0.2
      role: dynamic-adjustment
      description: Dynamically adjust pipeline parameters based on runtime conditions

capabilities:
  - data-pipeline-orchestration
  - pipeline-scheduling
  - dependency-management

tools:
  - name: pipelineScheduler
    type: SERVICE
    endpoint: /data-cloud/pipeline/schedule
  - name: dependencyResolver
    type: SERVICE
    endpoint: /data-cloud/pipeline/dependencies

interfaces:
  inputs:
    - name: pipelineRequest
      schema: object
      required: true
  outputs:
    - name: pipelineResult
      schema: object

interoperability:
  agentToAgent:
    enabled: true
    delegation:
      - entity-storage-agent
      - data-quality-agent
      - data-migration-agent
      - data-compaction-agent

memory:
  type: SEMANTIC
  scope: pipeline_state
  retention: long

resources:
  memory: "2GB"
  cpu: "4"
  timeout: "86400s"

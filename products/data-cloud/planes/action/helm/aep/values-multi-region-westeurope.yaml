replicaCount: 3

ingress:
  enabled: true
  hosts:
    - host: westeurope.api.aep.ghatana.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: aep-westeurope-tls
      hosts:
        - westeurope.api.aep.ghatana.io

extraEnv:
  - name: AEP_REGION
    value: westeurope
  - name: AEP_REGION_ROLE
    value: secondary
  - name: AEP_DATA_CLOUD_REPLICA_MODE
    value: active-active

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: topology.kubernetes.io/zone
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: aep
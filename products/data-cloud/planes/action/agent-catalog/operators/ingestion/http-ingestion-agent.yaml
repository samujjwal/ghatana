id: http-ingestion-agent
namespace: aep.operators.ingestion
name: HTTP Ingestion Agent
version: 1.0.0
status: active
owners:
  - team: aep-platform
    contact: aep-team@ghatana.com
summary: Receives events via HTTP/REST endpoints with webhook support and payload validation
description: Receives events via HTTP/REST endpoints with webhook support and payload validation

metadata:
  level: 3
  domain: event-processing
  tags: [http, ingestion, webhook, rest, api]

identity:
  agentType: stream_processor
  subtype: ingestion
  determinismGuarantee: full
  stateMutability: local-state
  failureMode: dead-letter
  criticality: high
  autonomyLevel: autonomous

aep:
  operatorType: INGESTION
  inputEventTypes: []
  outputEventTypes: ["raw.http"]
  backpressure:
    bufferSize: 5000
    overflowStrategy: DROP_LATEST
  reliability:
    checkpointInterval: "10s"
    maxRetries: 2
    deadLetterQueue: "http-ingestion-dlq"

capabilities:
  - http-ingestion
  - event-validation

tools:
  - name: httpServer
    type: SERVICE
    endpoint: /aep/http/ingest
  - name: payloadValidator
    type: SERVICE
    endpoint: /aep/http/validate

interfaces:
  inputs:
    - name: rawHttpPayload
      schema: object
      required: true
  outputs:
    - name: rawHttpEvent
      schema: raw.http

memory:
  type: WORKING
  scope: request_buffer
  retention: short

resources:
  memory: "512MB"
  cpu: "1"
  timeout: "0"

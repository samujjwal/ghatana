id: event-transformation-agent
namespace: aep.operators.transformation
name: Event Transformation Agent
version: 1.0.0
status: active
owners:
  - team: aep-platform
    contact: aep-team@ghatana.com
summary: Transforms event formats, enriches data, and applies LLM-assisted mapping rules
description: Transforms event formats, enriches data, and applies mapping rules

metadata:
  level: 3
  domain: event-processing
  tags: [transformation, enrichment, mapping, filtering, conversion]

identity:
  agentType: hybrid
  subtype: rule+llm
  determinismGuarantee: config-scoped
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: autonomous

reasoningProfile:
  primaryReasoner: deterministic-parsing
  reasonerPortfolio:
    - type: service-call
      role: input-parsing
      description: Parse raw event input into structured form
    - type: llm
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      role: schema-mapping

aep:
  operatorType: TRANSFORMATION
  inputEventTypes: ["raw.*"]
  outputEventTypes: ["transformed.*"]
  backpressure:
    bufferSize: 2000
    overflowStrategy: BLOCK
  reliability:
    checkpointInterval: "20s"
    maxRetries: 3

capabilities:
  - event-transformation
  - data-enrichment

tools:
  - name: transformationEngine
    type: SERVICE
    endpoint: /aep/transform/apply
  - name: enrichmentService
    type: SERVICE
    endpoint: /aep/transform/enrich

interfaces:
  inputs:
    - name: rawEvent
      schema: raw.*
      required: true
  outputs:
    - name: transformedEvent
      schema: transformed.*

memory:
  type: EPISODIC
  scope: transformation_patterns
  retention: medium

resources:
  memory: "1GB"
  cpu: "2"
  timeout: "30s"

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aep-ingress
  namespace: aep
  labels:
    app: aep-service-manager
    app.kubernetes.io/name: aep-service-manager
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: ghatana-aep
  annotations:
    # NGINX ingress controller
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"

    # Rate limiting — 100 requests/second per IP
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'" always;

    # TLS — managed by cert-manager (Let's Encrypt)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.aep.ghatana.io
      secretName: aep-tls
  rules:
    - host: api.aep.ghatana.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aep-service-manager
                port:
                  number: 8090

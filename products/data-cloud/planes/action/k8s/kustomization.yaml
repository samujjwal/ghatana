apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aep

# Namespace must be created before other resources
resources:
  - namespace.yaml
  - rbac.yaml
  - configmap.yaml
  - service.yaml
  - deployment.yaml
  - hpa.yaml
  - pdb.yaml
  - ingress.yaml
  - network-policy.yaml
  - service-monitor.yaml

commonLabels:
  app.kubernetes.io/part-of: ghatana-aep
  app.kubernetes.io/managed-by: kustomize

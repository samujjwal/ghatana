apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: aep-service-manager
  namespace: aep
  labels:
    app: aep-service-manager
    app.kubernetes.io/name: aep-service-manager
    app.kubernetes.io/part-of: ghatana-aep
    # Required for kube-prometheus-stack to discover this ServiceMonitor
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: aep-service-manager
  namespaceSelector:
    matchNames:
      - aep
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - targetLabel: product
          replacement: aep

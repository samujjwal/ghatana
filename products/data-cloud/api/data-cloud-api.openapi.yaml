openapi: 3.1.0
info:
  title: Data Cloud Query API
  version: 1.0.0
  description: |
    API for querying datasets, managing data transformations, and retrieving analytics.

    This API is part of Data Cloud, an independent AI/ML-native product. Data Cloud owns data
    management, analytics, reporting, feature storage, and plugin-driven extensibility.

    Agentic processing is handled by AEP. Data Cloud may publish or persist work requests and
    execution metadata, but it does not host agentic runtime endpoints or depend on AEP code.
    
    ## Authentication
    All endpoints require API key or Bearer token:
    ```
    Authorization: Bearer <jwt_token>
    X-API-Key: <api_key>
    ```
    
    ## Query Execution
    - Queries execute asynchronously for > 5 second operations
    - Use `operationId` to poll for results
    - WebSocket support available for streaming results
    
    ## Pagination
    List endpoints support pagination with `limit` and `offset`:
    - Default limit: 20
    - Maximum limit: 100
  contact:
    name: Data Cloud API Support
    url: https://datacloud.ghatana.io/docs
  license:
    name: Proprietary

servers:
  - url: https://api.datacloud.io/v1
    description: Production
  - url: https://staging.datacloud.io/v1
    description: Staging

tags:
  - name: Datasets
    description: Manage datasets and data sources
  - name: Queries
    description: Execute and monitor queries
  - name: Results
    description: Retrieve query results
  - name: Analytics
    description: Compute aggregations and analytics

paths:
  /datasets:
    get:
      summary: List datasets
      operationId: listDatasets
      tags:
        - Datasets
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of datasets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetList'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /datasets/{datasetId}:
    get:
      summary: Get dataset metadata
      operationId: getDataset
      tags:
        - Datasets
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dataset metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetMetadata'
        '404':
          description: Dataset not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /queries:
    post:
      summary: Execute query
      operationId: executeQuery
      tags:
        - Queries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteQueryRequest'
            examples:
              simple:
                summary: Simple SELECT query
                value:
                  datasetId: "dataset-123"
                  queryText: "SELECT * FROM users WHERE status = 'active' LIMIT 100"
              aggregation:
                summary: Aggregation query
                value:
                  datasetId: "dataset-456"
                  queryText: "SELECT department, COUNT(*) as count, AVG(salary) as avg_salary FROM employees GROUP BY department"
      responses:
        '202':
          description: Query accepted and queued
          headers:
            Location:
              description: URL to poll for results
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryOperation'
        '400':
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
      x-code-samples:
        - lang: curl
          source: |
            curl -X POST https://api.datacloud.io/v1/queries \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "datasetId": "dataset-123",
                "queryText": "SELECT * FROM users LIMIT 100"
              }'
        - lang: python
          source: |
            response = requests.post(
              'https://api.datacloud.io/v1/queries',
              headers={'Authorization': f'Bearer {token}'},
              json={
                'datasetId': 'dataset-123',
                'queryText': 'SELECT * FROM users LIMIT 100'
              }
            )
            operation = response.json()
            operation_id = operation['operationId']

  /queries/{operationId}:
    get:
      summary: Get query operation status
      operationId: getQueryStatus
      tags:
        - Queries
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Operation status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryOperation'
        '404':
          description: Operation not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /queries/{operationId}/results:
    get:
      summary: Get query results
      operationId: getQueryResults
      tags:
        - Results
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 1000
            maximum: 10000
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Query results
          headers:
            X-Total-Rows:
              description: Total number of result rows
              schema:
                type: integer
            X-Returned-Rows:
              description: Number of rows in this response
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResult'
        '202':
          description: Query still executing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryOperation'
        '404':
          description: Results not found or operation not found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /analytics/aggregate:
    post:
      summary: Compute aggregation
      operationId: computeAggregation
      tags:
        - Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AggregationRequest'
            examples:
              sum:
                summary: SUM aggregation
                value:
                  datasetId: "sales-data"
                  aggregationType: "SUM"
                  column: "amount"
                  groupBy:
                    - "region"
                    - "product_category"
              count:
                summary: COUNT aggregation
                value:
                  datasetId: "users"
                  aggregationType: "COUNT"
                  column: "*"
                  whereClause: "status = 'active'"
      responses:
        '200':
          description: Aggregation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AggregationResult'
        '400':
          description: Invalid aggregation request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

components:
  schemas:
    DatasetMetadata:
      type: object
      required:
        - datasetId
        - name
        - recordCount
        - columns
      properties:
        datasetId:
          type: string
        name:
          type: string
        description:
          type: string
        recordCount:
          type: integer
          minimum: 0
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnSchema'
        createdAt:
          type: string
          format: date-time
        lastUpdatedAt:
          type: string
          format: date-time
        sizeBytes:
          type: integer

    ColumnSchema:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
        type:
          type: string
          enum:
            - STRING
            - INTEGER
            - BIGINT
            - DOUBLE
            - DECIMAL
            - BOOLEAN
            - DATE
            - TIMESTAMP
            - ARRAY
            - MAP
        nullable:
          type: boolean
          default: true
        description:
          type: string

    DatasetList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DatasetMetadata'
        pagination:
          $ref: '#/components/schemas/Pagination'

    ExecuteQueryRequest:
      type: object
      required:
        - datasetId
        - queryText
      properties:
        datasetId:
          type: string
          description: Target dataset ID
        queryText:
          type: string
          minLength: 1
          maxLength: 10000
          description: SQL query (SELECT only)
        queryTimeoutSeconds:
          type: integer
          minimum: 1
          maximum: 3600
          default: 300
        resultFormat:
          type: string
          enum:
            - json
            - csv
            - parquet
          default: json

    QueryOperation:
      type: object
      required:
        - operationId
        - status
        - createdAt
      properties:
        operationId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - QUEUED
            - RUNNING
            - COMPLETED
            - FAILED
            - CANCELLED
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        executionTimeMs:
          type: integer
          minimum: 0
        rowsProcessed:
          type: integer
          minimum: 0
        rowsReturned:
          type: integer
          minimum: 0
        error:
          $ref: '#/components/schemas/QueryError'

    QueryResult:
      type: object
      required:
        - operationId
        - columnNames
        - rows
      properties:
        operationId:
          type: string
        columnNames:
          type: array
          items:
            type: string
        columnTypes:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: array
        totalRows:
          type: integer
        returnedRows:
          type: integer

    AggregationRequest:
      type: object
      required:
        - datasetId
        - aggregationType
        - column
      properties:
        datasetId:
          type: string
        aggregationType:
          type: string
          enum:
            - COUNT
            - SUM
            - AVG
            - MIN
            - MAX
            - STDDEV
            - PERCENTILE_25
            - PERCENTILE_50
            - PERCENTILE_75
            - PERCENTILE_99
        column:
          type: string
        groupBy:
          type: array
          items:
            type: string
        whereClause:
          type: string
          description: Optional WHERE filter

    AggregationResult:
      type: object
      required:
        - aggregationType
        - result
      properties:
        aggregationType:
          type: string
        column:
          type: string
        result:
          oneOf:
            - type: number
            - type: object
              additionalProperties:
                type: number
        groupByValues:
          type: array
          items:
            type: object
        executionTimeMs:
          type: integer

    QueryError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - SYNTAX_ERROR
            - TIMEOUT
            - RESOURCE_EXHAUSTED
            - UNAUTHORIZED
            - INVALID_DATASET
            - INTERNAL_ERROR
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    Pagination:
      type: object
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer

  responses:
    UnauthorizedError:
      description: Authentication failed
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
              message:
                type: string

security:
  - BearerAuth: []
  - APIKeyAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    APIKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

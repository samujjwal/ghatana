          type: string
        tenantId:
          type: string
        tier:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/MemoryItem"
        count:
          type: integer
          format: int64
        offset:
          type: integer
          format: int64
        limit:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time

    MemorySearchRequest:
      type: object
      properties:

openapi: "3.1.0"

info:
  title: Data-Cloud Platform API
  description: |
    REST API for the Ghatana Data-Cloud unified data platform.

    Data-Cloud is an independent, deployable, AI/ML-native product. It owns data management,
    event-cloud streaming, analytics, reporting, governance, plugin-driven extensibility, feature
    storage, model metadata, and execution persistence surfaces.

    Data-Cloud does not host agentic orchestration or runtime execution endpoints. Agentic
    processing is executed by AEP, which consumes Data-Cloud public contracts and event-cloud
    streams and writes results back through Data-Cloud-owned APIs and persistence layers.

    The Data-Cloud platform provides:
    - **Entity storage** — multi-tenant JSONB entity CRUD with pluggable storage backends
    - **Event log** — append-only event stream with push-based SSE subscriptions
    - **Execution metadata** — store and retrieve pipeline/checkpoint records for external runtimes including AEP
    - **Agent memory plane** — persist, read, and search agent episodic/semantic/procedural memory
    - **Brain API** — salience scoring, attention management, workspace spotlight
    - **Learning API** — policy extraction, human-review queue
    - **Analytics API** — ad-hoc ClickHouse-backed analytics queries
    - **Server-Sent Events** — real-time push for events and learning updates
    - **WebSocket** — real-time change-data-capture notifications via `GET /ws`
    - **AI Assist** — gracefully-degrading embedded AI/ML hints for entities, analytics, pipelines, and brain
    - **Voice Gateway** — voice intent resolution and classification
    - **Data Lifecycle & Governance** — retention policies, PII redaction, compliance posture
    - **AI/ML Model Registry & Feature Store** — model metadata and feature vector management
    - **Reports** — analytical report generation and retrieval

    ## WebSocket
    The `/ws` endpoint accepts WebSocket upgrade requests and streams JSON change-data-capture
    events (entity create / update / delete) scoped to the caller's `tenantId`. Connect with
    a standard WebSocket client; no subprotocol is required. Each message is a JSON object with
    `type`, `collection`, `id`, and `data` fields.

    ## Authentication
    All endpoints require a `tenantId` (query parameter or `X-Tenant-ID` header) to enforce
    tenant isolation. Production deployments additionally require a bearer token via the
    `security-gateway` proxy.

    ## Versioning
    All stable endpoints are prefixed with `/api/v1`. Utility endpoints (`/health`, `/ready`,
    `/live`, `/info`, `/metrics`) are unprefixed.
  version: "1.0.0-SNAPSHOT"
  license:
    name: Proprietary — Ghatana Internal
    identifier: LicenseRef-Ghatana-Proprietary
  contact:
    name: Data-Cloud Platform Team
    email: data-cloud@ghatana.internal

servers:
  - url: http://localhost:8082
    description: Local development (standalone launcher)
  - url: https://data-cloud-staging.ghatana.internal
    description: Staging
  - url: https://data-cloud.ghatana.internal
    description: Production

tags:
  - name: health
    description: Liveness, readiness, and health probes.
  - name: info
    description: Service information and Prometheus-format metrics.
  - name: entities
    description: Generic JSONB entity CRUD operations.
  - name: events
    description: Append-only event log operations.
  - name: pipelines
    description: External-runtime pipeline metadata registry. AEP may consume and update these records; orchestration remains external.
  - name: checkpoints
    description: External-runtime checkpoint save/restore, including AEP execution state.
  - name: memory
    description: Agent memory persistence plane (episodic, semantic, procedural, preference).
  - name: brain
    description: Brain API — salience, attention, workspace spotlight.
  - name: learning
    description: Learning API — policy extraction and human-review queue.
  - name: analytics
    description: Ad-hoc analytics queries backed by ClickHouse.
  - name: sse
    description: Server-Sent Event streams for real-time push.
  - name: models
    description: AI/ML model registry — register, query, and promote model metadata.
  - name: features
    description: ML feature store — ingest and retrieve feature vectors per entity.
  - name: ai
    description: AI-assisted hints and suggestions (gracefully degrades when LLM is unavailable).
  - name: voice
    description: Voice gateway — intent recognition, classification, and execution.
  - name: governance
    description: Data lifecycle, retention policies, PII redaction, and compliance posture.
  - name: reports
    description: Reporting — generate and retrieve analytical reports.
  - name: capabilities
    description: Runtime capability and subsystem configuration exposure.
  - name: autonomy
    description: Autonomous-operation override and audit controls.
  - name: plugins
    description: Bundled plugin lifecycle management.
  - name: agents
    description: Catalog of agent descriptors served by Data Cloud.

# ─────────────────────────────────────────────────────────────────────────────
# Reusable components
# ─────────────────────────────────────────────────────────────────────────────
components:
  parameters:
    tenantIdQuery:
      name: tenantId
      in: query
      description: |
        Tenant identifier. Required for all entity, event, execution-metadata, and memory operations.
        May alternatively be supplied as the `X-Tenant-ID` request header.
      schema:
        type: string
        example: "tenant-123"

    collectionPath:
      name: collection
      in: path
      required: true
      description: Collection (table) name within the tenant's data space.
      schema:
        type: string
        example: "products"

    entityIdPath:
      name: id
      in: path
      required: true
      description: Entity UUID.
      schema:
        type: string
        format: uuid

    agentIdPath:
      name: agentId
      in: path
      required: true
      schema:
        type: string

    pipelineIdPath:
      name: pipelineId
      in: path
      required: true
      schema:
        type: string

    checkpointIdPath:
      name: checkpointId
      in: path
      required: true
      schema:
        type: string

    limitQuery:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 1000

    offsetQuery:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0

  schemas:
    FreeformObject:
      type: object
      description: Arbitrary JSON object.
      additionalProperties: true

    VoiceIntentRequest:
      type: object
      required: [utterance]
      properties:
        utterance:
          type: string
        parameters:
          $ref: "#/components/schemas/FreeformObject"
        confirm:
          type: boolean

    VoiceIntentClassificationRequest:
      type: object
      required: [utterance]
      properties:
        utterance:
          type: string

    RetentionClassificationRequest:
      type: object
      required: [collection, tier]
      properties:
        collection:
          type: string
        tier:
          type: string
          enum: [transient, short-term, standard, compliance, permanent]
        reason:
          type: string

    RetentionPurgeRequest:
      type: object
      required: [collection, confirmationToken]
      properties:
        collection:
          type: string
        confirmationToken:
          type: string
        dryRun:
          type: boolean

    PrivacyRedactionRequest:
      type: object
      required: [collection, entityId]
      properties:
        collection:
          type: string
        entityId:
          type: string
        fields:
          type: array
          items:
            type: string
        reason:
          type: string

    Entity:
      type: object
      required: [tenantId, collectionName, data]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        tenantId:
          type: string
        collectionName:
          type: string
        recordType:
          type: string
          enum: [ENTITY, EVENT, TIMESERIES, DOCUMENT, GRAPH]
          default: ENTITY
        data:
          type: object
          description: Arbitrary JSON payload stored as JSONB.
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        version:
          type: integer
          readOnly: true
        active:
          type: boolean
          readOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    EntityList:
      type: object
      properties:
        entities:
          type: array
          items:
            $ref: "#/components/schemas/Entity"
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer

    Event:
      type: object
      required: [tenantId, eventType, payload]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        tenantId:
          type: string
        eventType:
          type: string
        payload:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: integer
        timestamp:
          type: string
          format: date-time

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [UP, DOWN, READY, LIVE]
        timestamp:
          type: string
          format: date-time
        service:
          type: string

  responses:
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    BadRequest:
      description: Invalid request parameters or body.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  headers:
    X-Tenant-ID:
      description: Alternative to the `tenantId` query parameter.
      schema:
        type: string

# ─────────────────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────────────────
paths:
  # ── Health / utility ───────────────────────────────────────────────────────

  /health:
    get:
      summary: Composite health check
      operationId: healthGet
      tags: [health]
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /health/detail:
    get:
      summary: Detailed per-subsystem health breakdown
      operationId: healthDetailGet
      description: |
        Returns an individual status for every registered health contributor
        (storage, warm-tier DB, cache, index, message broker, etc.). Intended for
        operations dashboards and circuit-breaker monitoring.
      tags: [health]
      responses:
        "200":
          description: Per-subsystem health report.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [UP, DEGRADED, DOWN]
                  subsystems:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        status:
                          type: string
                          enum: [UP, DOWN, UNKNOWN]
                        latencyMs:
                          type: integer
                          format: int64
                        message:
                          type: string

  /ready:
    get:
      summary: Readiness probe (Kubernetes)
      operationId: readyGet
      tags: [health]
      responses:
        "200":
          description: Service is ready to accept traffic.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /live:
    get:
      summary: Liveness probe (Kubernetes)
      operationId: liveGet
      tags: [health]
      responses:
        "200":
          description: Service process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /info:
    get:
      summary: Service metadata
      operationId: infoGet
      tags: [info]
      responses:
        "200":
          description: Service name, version, description.
          content:
            application/json:
              schema:
                type: object
                properties:
                  service: { type: string }
                  version: { type: string }
                  description: { type: string }
                  timestamp: { type: string, format: date-time }

  /metrics:
    get:
      summary: Prometheus-format JVM / service metrics
      operationId: metricsGet
      tags: [info]
      responses:
        "200":
          description: JSON map of runtime metrics.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # ── Entity CRUD ────────────────────────────────────────────────────────────

  /api/v1/entities/{collection}:
    post:
      summary: Create (save) an entity
      operationId: apiV1EntitiesCollectionPost
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Arbitrary JSON payload to store as the entity data.
              additionalProperties: true
      responses:
        "200":
          description: Entity saved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

    get:
      summary: Query entities in a collection
      operationId: apiV1EntitiesCollectionGet
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
        - $ref: "#/components/parameters/limitQuery"
        - $ref: "#/components/parameters/offsetQuery"
        - name: filter
          in: query
          description: Optional filter expression (backend-specific syntax).
          schema:
            type: string
        - name: sort
          in: query
          description: "Sort field, optionally prefixed with `-` for descending."
          schema:
            type: string
      responses:
        "200":
          description: Paginated entity list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityList"
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/entities/{collection}/{id}:
    get:
      summary: Get a single entity by ID
      operationId: apiV1EntitiesCollectionIdGet
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/entityIdPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Entity found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        "404": { $ref: "#/components/responses/NotFound" }

    delete:
      summary: Delete an entity
      operationId: apiV1EntitiesCollectionIdDelete
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/entityIdPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Entity deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
                  id: { type: string, format: uuid }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Event log ──────────────────────────────────────────────────────────────

  /api/v1/events:
    post:
      summary: Append an event to the event log
      operationId: apiV1EventsPost
      tags: [events]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Event"
      responses:
        "200":
          description: Event appended.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  offset: { type: integer, format: int64 }
        "400": { $ref: "#/components/responses/BadRequest" }

    get:
      summary: Query the event log
      operationId: apiV1EventsGet
      tags: [events]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
        - $ref: "#/components/parameters/limitQuery"
        - name: fromOffset
          in: query
          schema:
            type: integer
            format: int64
        - name: eventType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                  total: { type: integer, format: int64 }

  # ── Execution metadata ─────────────────────────────────────────────────────

  /api/v1/pipelines:
    get:
      summary: List pipeline definitions
      operationId: apiV1PipelinesGet
      tags: [pipelines]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
        - $ref: "#/components/parameters/limitQuery"
        - $ref: "#/components/parameters/offsetQuery"
      responses:
        "200":
          description: Paginated pipeline list.

    post:
      summary: Save a pipeline definition
      operationId: apiV1PipelinesPost
      tags: [pipelines]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Pipeline saved.

  /api/v1/pipelines/{pipelineId}:
    get:
      summary: Get pipeline by ID
      operationId: apiV1PipelinesPipelineIdGet
      tags: [pipelines]
      parameters:
        - $ref: "#/components/parameters/pipelineIdPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Pipeline definition.
        "404": { $ref: "#/components/responses/NotFound" }

    put:
      summary: Update a pipeline definition
      operationId: apiV1PipelinesPipelineIdPut
      tags: [pipelines]
      parameters:
        - $ref: "#/components/parameters/pipelineIdPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Pipeline updated.

    delete:
      summary: Delete a pipeline definition
      operationId: apiV1PipelinesPipelineIdDelete
      tags: [pipelines]
      parameters:
        - $ref: "#/components/parameters/pipelineIdPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Pipeline deleted.

  # ── Checkpoints ────────────────────────────────────────────────────────────

  /api/v1/checkpoints:
    get:
      summary: List agent checkpoints
      operationId: apiV1CheckpointsGet
      tags: [checkpoints]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
        - $ref: "#/components/parameters/limitQuery"
        - $ref: "#/components/parameters/offsetQuery"
      responses:
        "200":
          description: Checkpoint list.

    post:
      summary: Save a checkpoint
      operationId: apiV1CheckpointsPost
      tags: [checkpoints]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Checkpoint saved.

  /api/v1/checkpoints/{checkpointId}:
    get:
      summary: Get checkpoint by ID
      operationId: apiV1CheckpointsCheckpointIdGet
      tags: [checkpoints]
      parameters:
        - $ref: "#/components/parameters/checkpointIdPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Checkpoint data.
        "404": { $ref: "#/components/responses/NotFound" }

    delete:
      summary: Delete a checkpoint
      operationId: apiV1CheckpointsCheckpointIdDelete
      tags: [checkpoints]
      parameters:
        - $ref: "#/components/parameters/checkpointIdPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Checkpoint deleted.

  # ── Agent memory ───────────────────────────────────────────────────────────

  /api/v1/memory/{agentId}:
    get:
      summary: Get all memory entries for an agent
      operationId: apiV1MemoryAgentIdGet
      tags: [memory]
      parameters:
        - $ref: "#/components/parameters/agentIdPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Memory entries (all tiers).

  /api/v1/memory/{agentId}/{tier}:
    get:
      summary: Get memory entries for a specific tier
      operationId: apiV1MemoryAgentIdTierGet
      tags: [memory]
      parameters:
        - $ref: "#/components/parameters/agentIdPath"
        - name: tier
          in: path
          required: true
          schema:
            type: string
            enum: [episodic, semantic, procedural, preference]
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Memory entries for the specified tier.

  /api/v1/memory/{agentId}/search:
    post:
      summary: Semantic search over agent memory
      operationId: apiV1MemoryAgentIdSearchPost
      tags: [memory]
      parameters:
        - $ref: "#/components/parameters/agentIdPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                tier:
                  type: string
                limit:
                  type: integer
                  default: 10
      responses:
        "200":
          description: Matching memory entries.

  /api/v1/memory/{agentId}/{memoryId}:
    delete:
      summary: Delete a memory entry
      operationId: apiV1MemoryAgentIdMemoryIdDelete
      tags: [memory]
      parameters:
        - $ref: "#/components/parameters/agentIdPath"
        - name: memoryId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Memory entry deleted.

  /api/v1/memory/{agentId}/{memoryId}/retain:
    put:
      summary: Mark a memory entry for retention (prevent auto-expiry)
      operationId: apiV1MemoryAgentIdMemoryIdRetainPut
      tags: [memory]
      parameters:
        - $ref: "#/components/parameters/agentIdPath"
        - name: memoryId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Retention policy applied.

  # ── Brain API ──────────────────────────────────────────────────────────────

  /api/v1/brain/health:
    get:
      summary: Brain subsystem health
      operationId: apiV1BrainHealthGet
      tags: [brain]
      responses:
        "200": { description: Brain is healthy. }
        "503": { description: Brain not wired. }

  /api/v1/brain/config:
    get:
      summary: Brain configuration
      operationId: apiV1BrainConfigGet
      tags: [brain]
      responses:
        "200": { description: Current brain config. }

  /api/v1/brain/stats:
    get:
      summary: Brain runtime statistics
      operationId: apiV1BrainStatsGet
      tags: [brain]
      responses:
        "200": { description: Brain stats. }

  /api/v1/brain/workspace:
    get:
      summary: Get global workspace spotlight items
      operationId: apiV1BrainWorkspaceGet
      tags: [brain]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200": { description: Spotlight items. }

  /api/v1/brain/workspace/stream:
    get:
      summary: SSE stream of workspace spotlight updates
      operationId: apiV1BrainWorkspaceStreamGet
      tags: [sse, brain]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: SSE stream.
          content:
            text/event-stream:
              schema:
                type: string

  /api/v1/brain/attention/elevate:
    post:
      summary: Directly elevate a data record to the workspace
      operationId: apiV1BrainAttentionElevatePost
      tags: [brain]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string }
                content: { type: string }
                reason: { type: string }
                emergency: { type: boolean, default: false }
      responses:
        "200": { description: Elevation result. }
        "503": { description: Brain not wired. }

  /api/v1/brain/attention/thresholds:
    get:
      summary: Get attention score thresholds
      operationId: apiV1BrainAttentionThresholdsGet
      tags: [brain]
      responses:
        "200": { description: Threshold configuration. }

    put:
      summary: Update attention score thresholds
      operationId: apiV1BrainAttentionThresholdsPut
      tags: [brain]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: number
      responses:
        "200": { description: Thresholds updated. }

  /api/v1/brain/patterns:
    get:
      summary: List learned attention patterns
      operationId: apiV1BrainPatternsGet
      tags: [brain]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200": { description: Pattern list. }

  /api/v1/brain/patterns/match:
    post:
      summary: Test a payload against learned patterns
      operationId: apiV1BrainPatternsMatchPost
      tags: [brain]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200": { description: Pattern match result. }

  /api/v1/brain/salience/{itemId}:
    get:
      summary: Get salience score for a specific item

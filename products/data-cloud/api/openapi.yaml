openapi: "3.1.0"

info:
  title: Data-Cloud Platform API
  description: |
    REST API for the Ghatana Data-Cloud unified data platform.

    Data-Cloud is an independent, deployable, AI/ML-native product. It owns data management,
    event-cloud streaming, analytics, reporting, governance, plugin-driven extensibility, feature
    storage, model metadata, and execution persistence surfaces.

    Data-Cloud now exposes plugin-backed workflow execution endpoints for pipeline execution,
    execution status inspection, and execution log retrieval inside the standalone launcher.
    AEP still owns broader agentic orchestration, but Data-Cloud can execute and observe
    pipeline workflows through its runtime plugin layer.

    The Data-Cloud platform provides:
    - **Entity storage** — multi-tenant JSONB entity CRUD with pluggable storage backends
    - **Event log** — append-only event stream with push-based SSE subscriptions
    - **Execution metadata and runtime** — store and retrieve pipeline/checkpoint records and execute pipeline workflows through runtime plugins
    - **Agent memory plane** — persist, read, and search agent episodic/semantic/procedural memory
    - **Brain API** — salience scoring, attention management, workspace spotlight
    - **Learning API** — policy extraction, human-review queue
    - **Analytics API** — ad-hoc ClickHouse-backed analytics queries
    - **Server-Sent Events** — real-time push for events and learning updates
    - **WebSocket** — real-time change-data-capture notifications via `GET /ws`
    - **AI Assist** — gracefully-degrading embedded AI/ML hints for entities, analytics, pipelines, and brain
    - **Voice Gateway** — voice intent resolution and classification
    - **Data Lifecycle & Governance** — retention policies, PII redaction, compliance posture
    - **AI/ML Model Registry & Feature Store** — model metadata and feature vector management
    - **Reports** — analytical report generation and retrieval

    ## WebSocket
    The `/ws` endpoint accepts WebSocket upgrade requests and streams JSON change-data-capture
    events (entity create / update / delete) scoped to the caller's `tenantId`. Connect with
    a standard WebSocket client; no subprotocol is required. Each message is a JSON object with
    `type`, `collection`, `id`, and `data` fields.

    ## Authentication
    All endpoints require a `tenantId` (query parameter or `X-Tenant-ID` header) to enforce
    tenant isolation. Production deployments additionally require a bearer token via the
    `security-gateway` proxy.

    ## Versioning
    All stable endpoints are prefixed with `/api/v1`. Utility endpoints (`/health`, `/ready`,
    `/live`, `/info`, `/metrics`) are unprefixed.
  version: "1.0.0-SNAPSHOT"
  license:
    name: Proprietary — Ghatana Internal
    identifier: LicenseRef-Ghatana-Proprietary
  contact:
    name: Data-Cloud Platform Team
    email: data-cloud@ghatana.internal

servers:
  - url: http://localhost:8082
    description: Local development (standalone launcher)
  - url: https://data-cloud-staging.ghatana.internal
    description: Staging
  - url: https://data-cloud.ghatana.internal
    description: Production

tags:
  - name: health
    description: Liveness, readiness, and health probes.
  - name: info
    description: Service information and Prometheus-format metrics.
  - name: entities
    description: Generic JSONB entity CRUD operations.
  - name: events
    description: Append-only event log operations.
  - name: pipelines
    description: External-runtime pipeline metadata registry. AEP may consume and update these records; orchestration remains external.
  - name: checkpoints
    description: External-runtime checkpoint save/restore, including AEP execution state.
  - name: memory
    description: Agent memory persistence plane (episodic, semantic, procedural, preference).
  - name: brain
    description: Brain API — salience, attention, workspace spotlight.
  - name: learning
    description: Learning API — policy extraction and human-review queue.
  - name: analytics
    description: Ad-hoc analytics queries backed by ClickHouse.
  - name: context
    description: Tenant-scoped context storage and retrieval APIs.
  - name: sse
    description: Server-Sent Event streams for real-time push.
  - name: data-products
    description: Publish, discover, and subscribe to reusable data products.
  - name: models
    description: AI/ML model registry — register, query, and promote model metadata.
  - name: features
    description: ML feature store — ingest and retrieve feature vectors per entity.
  - name: ai
    description: AI-assisted hints and suggestions (gracefully degrades when LLM is unavailable).
  - name: voice
    description: Voice gateway — intent recognition, classification, and execution.
  - name: governance
    description: Data lifecycle, retention policies, PII redaction, and compliance posture.
  - name: reports
    description: Reporting — generate and retrieve analytical reports.
  - name: capabilities
    description: Runtime capability and subsystem configuration exposure.
  - name: autonomy
    description: Autonomous-operation override and audit controls.
  - name: plugins
    description: Bundled plugin lifecycle management.
  - name: agents
    description: Catalog of agent descriptors served by Data Cloud.

# ─────────────────────────────────────────────────────────────────────────────
# Reusable components
# ─────────────────────────────────────────────────────────────────────────────
components:
  parameters:
    tenantIdQuery:
      name: tenantId
      in: query
      description: |
        Tenant identifier. Required for all entity, event, execution-metadata, and memory operations.
        May alternatively be supplied as the `X-Tenant-ID` request header.
      schema:
        type: string
        example: "tenant-123"

    collectionPath:
      name: collection
      in: path
      required: true
      description: Collection (table) name within the tenant's data space.
      schema:
        type: string
        example: "products"

    entityIdPath:
      name: id
      in: path
      required: true
      description: Entity UUID.
      schema:
        type: string
        format: uuid

    agentIdPath:
      name: agentId
      in: path
      required: true
      schema:
        type: string

    pipelineIdPath:
      name: pipelineId
      in: path
      required: true
      schema:
        type: string

    checkpointIdPath:
      name: checkpointId
      in: path
      required: true
      schema:
        type: string

    limitQuery:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 1000

    offsetQuery:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0

  schemas:
    FreeformObject:
      type: object
      description: Arbitrary JSON object.
      additionalProperties: true

    VoiceIntentRequest:
      type: object
      required: [utterance]
      properties:
        utterance:
          type: string
        parameters:
          $ref: "#/components/schemas/FreeformObject"
        confirm:
          type: boolean

    VoiceIntentClassificationRequest:
      type: object
      required: [utterance]
      properties:
        utterance:
          type: string

    RetentionClassificationRequest:
      type: object
      required: [collection, tier]
      properties:
        collection:
          type: string
        tier:
          type: string
          enum: [transient, short-term, standard, compliance, permanent]
        reason:
          type: string

    RetentionPurgeRequest:
      type: object
      required: [collection, confirmationToken]
      properties:
        collection:
          type: string
        confirmationToken:
          type: string
        dryRun:
          type: boolean

    PrivacyRedactionRequest:
      type: object
      required: [collection, entityId]
      properties:
        collection:
          type: string
        entityId:
          type: string
        fields:
          type: array
          items:
            type: string
        reason:
          type: string

    Entity:
      type: object
      required: [tenantId, collectionName, data]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        tenantId:
          type: string
        collectionName:
          type: string
        recordType:
          type: string
          enum: [ENTITY, EVENT, TIMESERIES, DOCUMENT, GRAPH]
          default: ENTITY
        data:
          type: object
          description: Arbitrary JSON payload stored as JSONB.
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        version:
          type: integer
          readOnly: true
        active:
          type: boolean
          readOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    EntityList:
      type: object
      properties:
        entities:
          type: array
          items:
            $ref: "#/components/schemas/Entity"
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer

    Event:
      type: object
      required: [offset, type, payload, timestamp]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        tenantId:
          type: string
        offset:
          type: integer
          format: int64
          readOnly: true
        type:
          type: string
        payload:
          type: object
          additionalProperties: true
        headers:
          type: object
          additionalProperties:
            type: string
        source:
          type: string
        correlationId:
          type: string
        schemaVersion:
          type: string
        timestamp:
          type: string
          format: date-time

    AppendEventRequest:
      type: object
      required: [type, payload]
      properties:
        type:
          type: string
        payload:
          type: object
          additionalProperties: true
        headers:
          type: object
          additionalProperties:
            type: string
        source:
          type: string
        correlationId:
          type: string
        schemaVersion:
          type: string

    AppendEventResponse:
      type: object
      required: [offset, type, timestamp]
      properties:
        offset:
          type: integer
          format: int64
        type:
          type: string
        timestamp:
          type: string
          format: date-time

    EventQueryResponse:
      type: object
      required: [events, count, fromOffset, nextOffset, tenantId, timestamp]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        count:
          type: integer
          format: int64
        fromOffset:
          type: integer
          format: int64
        nextOffset:
          type: integer
          format: int64
        tenantId:
          type: string
        timestamp:
          type: string
          format: date-time

    Pipeline:
      type: object
      required: [id, tenantId]
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
        nodes:
          type: array
          items:
            type: object
            additionalProperties: true
        edges:
          type: array
          items:
            type: object
            additionalProperties: true
        schedule:
          type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          type: string
        lastExecutedAt:
          type: string
          format: date-time
      additionalProperties: true

    PipelineListResponse:
      type: object
      required: [tenantId, pipelines, count, timestamp]
      properties:
        tenantId:
          type: string
        pipelines:
          type: array
          items:
            $ref: "#/components/schemas/Pipeline"
        count:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time

    PipelineMutationRequest:
      type: object
      additionalProperties: true

    WorkflowExecutionLaunchResponse:
      type: object
      required: [executionId, workflowId, status, startedAt]
      properties:
        executionId:
          type: string
        workflowId:
          type: string
        status:
          type: string
        startedAt:
          type: string
          format: date-time

    WorkflowExecutionSummary:
      type: object
      required: [id, workflowId, status, startedAt]
      properties:
        id:
          type: string
        workflowId:
          type: string
        status:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        duration:
          type: integer
        output:
          type: object
          additionalProperties: true
        error:
          type: string

    WorkflowExecutionListResponse:
      type: object
      required: [items, total, page, pageSize, hasMore]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowExecutionSummary"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        hasMore:
          type: boolean

    WorkflowExecutionNode:
      type: object
      required: [id, name, status, duration, error]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        duration:
          type: integer
        error:
          type: string

    WorkflowExecutionDetail:
      type: object
      required: [id, pipelineId, pipelineName, status, startTime, completedNodes, totalNodes, nodes]
      properties:
        id:
          type: string
        pipelineId:
          type: string
        pipelineName:
          type: string
        status:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        completedNodes:
          type: integer
        totalNodes:
          type: integer
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowExecutionNode"
        error:
          type: string

    WorkflowExecutionLogEntry:
      type: object
      required: [timestamp, level, message]
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
        message:
          type: string
        nodeId:
          type: string
        metadata:
          type: object
          additionalProperties: true

    Checkpoint:
      type: object
      required: [id, data, tenantId]
      properties:
        id:
          type: string
        data:
          type: object
          additionalProperties: true
        tenantId:
          type: string

    CheckpointListResponse:
      type: object
      required: [tenantId, checkpoints, count, timestamp]
      properties:
        tenantId:
          type: string
        checkpoints:
          type: array
          items:
            $ref: "#/components/schemas/Checkpoint"
        count:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time

    CheckpointSaveResponse:
      type: object
      required: [id, tenantId, savedAt]
      properties:
        id:
          type: string
        tenantId:
          type: string
        savedAt:
          type: string
          format: date-time

    MemoryItem:
      type: object
      required: [id, tenantId, agentId, type, content, tags, salience, createdAt, metadata]
      properties:
        id:
          type: string
        tenantId:
          type: string
        agentId:
          type: string
        type:
          type: string
          enum: [EPISODIC, SEMANTIC, PROCEDURAL, PREFERENCE]
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        salience:
          type: number
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    MemoryStoreRequest:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [episodic, semantic, procedural, preference]
        content:
          type: string
        ttlSeconds:
          type: integer
          minimum: 1
        tags:
          type: array
          items:
            type: string
        salience:
          type: number
        metadata:
          type: object
          additionalProperties: true

    MemoryRootListResponse:
      type: object
      required: [items, total, tenantId, agentId, type, query, timestamp]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MemoryItem"
        total:
          type: integer
          format: int64
        tenantId:
          type: string
        agentId:
          type: string
        type:
          type: string
        query:
          type: string
        timestamp:
          type: string
          format: date-time

    AgentMemorySummaryResponse:
      type: object
      required: [agentId, tenantId, total, items, contextWindowSize, byType, timestamp]
      properties:
        agentId:
          type: string
        tenantId:
          type: string
        total:
          type: integer
          format: int64
        items:
          type: array
          items:
            $ref: "#/components/schemas/MemoryItem"
        contextWindowSize:
          type: integer
          format: int64
        byType:
          type: object
          properties:

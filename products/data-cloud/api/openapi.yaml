  # ── Analytics API ──────────────────────────────────────────────────────────

  /api/v1/analytics/query:
    post:
      summary: Submit an analytics query
      operationId: apiV1AnalyticsQueryPost
      tags: [analytics]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: SQL or DSL query string.
                params:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Query submitted; returns queryId for polling.
          content:
            application/json:
              schema:
                type: object
                properties:
                  queryId: { type: string }
                  status: { type: string }
        "503": { description: Analytics engine not wired. }

  /api/v1/analytics/query/{queryId}:
    get:
      summary: Poll for query result
      operationId: apiV1AnalyticsQueryQueryIdGet
      tags: [analytics]
      parameters:
        - name: queryId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200": { description: Query result or PENDING status. }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/analytics/query/{queryId}/plan:
    get:
      summary: Get execution plan for a submitted query
      operationId: apiV1AnalyticsQueryQueryIdPlanGet
      tags: [analytics]
      parameters:
        - name: queryId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200": { description: Query execution plan. }

  /api/v1/analytics/aggregate:
    post:
      summary: Run an aggregation query
      operationId: apiV1AnalyticsAggregatePost
      tags: [analytics]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                collection: { type: string }
                pipeline:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
      responses:
        "200": { description: Aggregation result. }

  /api/v1/analytics/explain:
    post:
      summary: Explain a query — return its execution plan without running it
      operationId: apiV1AnalyticsExplainPost
      tags: [analytics]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: SQL or DSL query to plan.
                parameters:
                  type: object
                  additionalProperties: true
                  description: Optional bind parameters.
      responses:
        "200":
          description: Estimated query plan.
          content:
            application/json:
              schema:
                type: object
                properties:
                  queryId:
                    type: string
                  queryType:
                    type: string
                  dataSources:
                    type: array
                    items:
                      type: string
                  estimatedCost:
                    type: number
                  optimized:
                    type: boolean
                  explain:
                    type: boolean
                  timestamp:
                    type: string
                    format: date-time
        "400": { description: Missing or invalid query. }

  # ── SSE streams ────────────────────────────────────────────────────────────

  /events/stream:
    get:
      summary: Server-Sent Events stream — event log
      operationId: eventsStreamGet
      tags: [sse, events]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: fromOffset
          in: query
          description: Start streaming from this event log offset.
          schema:
            type: integer
            format: int64
        - name: eventType
          in: query
          description: Comma-separated list of event types to filter (empty = all).
          schema:
            type: string
      responses:
        "200":
          description: SSE stream. Each event is a JSON payload with `type` and `data` fields.
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: EntityCreated
                  data: {"id":"...","tenantId":"...","collection":"products"}

                  event: heartbeat
                  data: {"ts":"2025-01-01T00:00:00Z"}

  # ── Entity extended endpoints (search, export, anomalies, batch, SSE) ──────

  /api/v1/entities/{collection}/search:
    get:
      summary: Full-text entity search via OpenSearch
      operationId: apiV1EntitiesCollectionSearchGet
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: q
          in: query

# ─────────────────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────────────────
paths:
  # ── Health / utility ───────────────────────────────────────────────────────

  /health:
    get:
      summary: Composite health check
      operationId: healthGet
      tags: [health]
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /health/detail:
    get:
      summary: Detailed per-subsystem health breakdown
      operationId: healthDetailGet
      description: |
        Returns an individual status for every registered health contributor
        (storage, warm-tier DB, cache, index, message broker, etc.). Intended for
        operations dashboards and circuit-breaker monitoring.
      tags: [health]
      responses:
        "200":
          description: Per-subsystem health report.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [UP, DEGRADED, DOWN]
                  subsystems:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        status:
                          type: string
                          enum: [UP, DOWN, UNKNOWN]
                        latencyMs:
                          type: integer
                          format: int64
                        message:
                          type: string

  /health/deep:
    get:
      summary: Deep dependency-aware health breakdown
      operationId: healthDeepGet
      tags: [health]
      responses:
        "200":
          description: Deep health status across runtime dependencies.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      summary: Readiness probe (Kubernetes)
      operationId: readyGet
      tags: [health]
      responses:
        "200":
          description: Service is ready to accept traffic.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /live:
    get:
      summary: Liveness probe (Kubernetes)
      operationId: liveGet
      tags: [health]
      responses:
        "200":
          description: Service process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /info:
    get:
      summary: Service metadata
      operationId: infoGet
      tags: [info]
      responses:
        "200":
          description: Service name, version, description.
          content:
            application/json:
              schema:
                type: object
                properties:
                  service: { type: string }
                  version: { type: string }
                  description: { type: string }
                  timestamp: { type: string, format: date-time }

  /metrics:
    get:
      summary: Prometheus-format JVM / service metrics
      operationId: metricsGet
      tags: [info]
      responses:
        "200":
          description: JSON map of runtime metrics.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # ── Entity CRUD ────────────────────────────────────────────────────────────

  /api/v1/entities/{collection}:
    post:
      summary: Create (save) an entity
      operationId: apiV1EntitiesCollectionPost
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Arbitrary JSON payload to store as the entity data.
              additionalProperties: true
      responses:
        "200":
          description: Entity saved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

    get:
      summary: Query entities in a collection
      operationId: apiV1EntitiesCollectionGet
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
        - $ref: "#/components/parameters/limitQuery"
        - $ref: "#/components/parameters/offsetQuery"
        - name: filter
          in: query
          description: Optional filter expression (backend-specific syntax).
          schema:
            type: string
        - name: sort
          in: query
          description: "Sort field, optionally prefixed with `-` for descending."
          schema:
            type: string
      responses:
        "200":
          description: Paginated entity list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityList"
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/entities/{collection}/{id}:
    get:
      summary: Get a single entity by ID
      operationId: apiV1EntitiesCollectionIdGet
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/entityIdPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Entity found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        "404": { $ref: "#/components/responses/NotFound" }

    delete:
      summary: Delete an entity
      operationId: apiV1EntitiesCollectionIdDelete
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/entityIdPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Entity deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
                  id: { type: string, format: uuid }

        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200": { description: Compliance dashboard summary }

  # ── Runtime capability registry and autonomy ─────────────────────────────

  /api/v1/capabilities:
    get:
      summary: Get the runtime capability registry snapshot
      operationId: apiV1CapabilitiesGet
      tags: [capabilities]
      responses:
        "200":
          description: Capability registry snapshot.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string

  /api/v1/context:
    get:
      summary: Get all tenant context entries
      operationId: apiV1ContextGet
      tags: [context]
      responses:
        "200":
          description: All current context entries for the tenant.
          content:
            application/json:
              schema:
                type: object
    put:
      summary: Upsert tenant context entries
      operationId: apiV1ContextPut
      tags: [context]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200": { description: Context upserted. }
        "400": { description: Invalid request body. }

  /api/v1/context/keys/{key}:
    delete:
      summary: Delete a tenant context entry by key
      operationId: apiV1ContextKeysKeyDelete
      tags: [context]
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "204": { description: Key removed. }
        "404": { description: Key not found. }

  /api/v1/context/snapshot:
    get:
      summary: Get a versioned snapshot of all tenant context entries
      operationId: apiV1ContextSnapshotGet
      tags: [context]
      responses:
        "200":
          description: Versioned context snapshot with tenantId, version, createdAt, snapshotAt, entries.
          content:
            application/json:
              schema:
                type: object

  /api/v1/context/{collection}:
    get:
      summary: Get a unified live context document for a collection
      operationId: apiV1ContextCollectionGet
      tags: [context]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: depth
          in: query
          required: false
          description: Relationship traversal depth for graph-connected context. Values above 3 are clamped.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 3
            default: 1
      responses:
        "200":
          description: Unified collection context with schema, lineage, governance, freshness, and statistical profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionContextResponse"
        "404": { description: Collection not found. }

  /mcp/v1/tools:
    get:
      summary: List MCP tools exposed by Data Cloud
      operationId: mcpV1ToolsGet
      tags: [mcp]
      responses:
        "200":
          description: MCP tool registry for agent discovery.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpToolRegistryResponse"
    post:
      summary: Invoke a Data Cloud MCP tool using JSON-RPC 2.0
      operationId: mcpV1ToolsPost
      tags: [mcp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/McpToolCallRequest"
      responses:
        "200":
          description: JSON-RPC response containing tool execution output.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpToolCallResponse"

  /api/v1/context/{collection}/rag:
    post:
      summary: Generate a grounded answer from collection-specific vector context
      operationId: apiV1ContextCollectionRagPost
      tags: [context, ai]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionRagRequest"
      responses:
        "200":
          description: Grounded answer and supporting semantic context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionRagResponse"
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/data-products:
    get:
      summary: List published data products for the tenant
      operationId: apiV1DataProductsGet
      tags: [data-products]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 100
      responses:
        "200":
          description: Published data products enriched with current quality status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataProductListResponse"
    post:
      summary: Publish a collection as a reusable data product
      operationId: apiV1DataProductsPost
      tags: [data-products]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishDataProductRequest"
      responses:
        "200":
          description: Data product published successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishDataProductResponse"
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/data-products/{productId}/subscribe:
    post:
      summary: Subscribe a consumer to a published data product
      operationId: apiV1DataProductsProductIdSubscribePost
      tags: [data-products]
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataProductSubscriptionRequest"
      responses:
        "200":
          description: Subscription created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataProductSubscriptionResponse"
        "403": { description: Consumer is not allowed to subscribe to this data product }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/autonomy/level:
    get:
      summary: Get the current global autonomy level override
      operationId: apiV1AutonomyLevelGet
      tags: [autonomy]
      responses:
        "200": { description: Global autonomy level. }
    put:
      summary: Set the current global autonomy level override
      operationId: apiV1AutonomyLevelPut
      tags: [autonomy]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200": { description: Updated autonomy level. }

  /api/v1/autonomy/domains:
    get:
      summary: List autonomy domain states
      operationId: apiV1AutonomyDomainsGet
      tags: [autonomy]
      responses:
        "200": { description: Autonomy domain state list. }

  /api/v1/autonomy/domains/{domain}:
    get:
      summary: Get autonomy state for a specific domain
      operationId: apiV1AutonomyDomainsDomainGet
      tags: [autonomy]
      parameters:
        - name: domain
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Domain autonomy state. }

  /api/v1/autonomy/logs:
    get:
      summary: Get the autonomy audit log
      operationId: apiV1AutonomyLogsGet
      tags: [autonomy]
      responses:
        "200": { description: Autonomy audit log. }

  # ── Agent catalog ────────────────────────────────────────────────────────

  /api/v1/agents/catalog:
    get:
      summary: List the agent catalog exposed by Data Cloud
      operationId: apiV1AgentsCatalogGet
      tags: [agents]
      responses:
        "200": { description: Agent catalog entries. }

  /api/v1/agents/catalog/{id}:
    get:
      summary: Get a single agent catalog entry
      operationId: apiV1AgentsCatalogIdGet
      tags: [agents]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Agent catalog entry. }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Plugin lifecycle ─────────────────────────────────────────────────────

  /api/v1/plugins:
    get:
      summary: List bundled plugins and their runtime status
      operationId: apiV1PluginsGet
      tags: [plugins]
      responses:
        "200": { description: Bundled plugins. }

  /api/v1/plugins/{id}:
    get:
      summary: Get a single bundled plugin by id
      operationId: apiV1PluginsIdGet
      tags: [plugins]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Plugin details. }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/plugins/{id}/enable:
    post:
      summary: Enable a bundled plugin
      operationId: apiV1PluginsIdEnablePost
      tags: [plugins]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Plugin enabled. }

  /api/v1/plugins/{id}/disable:
    post:
      summary: Disable a bundled plugin
      operationId: apiV1PluginsIdDisablePost
      tags: [plugins]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Plugin disabled. }

  /api/v1/plugins/{id}/upgrade:
    post:
      summary: Hot-swap a runtime feature plugin or reload a storage plugin
      operationId: apiV1PluginsIdUpgradePost
      tags: [plugins]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200": { description: Plugin hot-swapped or reloaded. }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Entity and event point lookups ──────────────────────────────────────

  /api/v1/entities/{collection}/{id}/history:
    get:
      summary: Get a point-in-time entity snapshot
      operationId: apiV1EntitiesCollectionIdHistoryGet
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/entityIdPath"
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: asOf
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200": { description: Point-in-time entity snapshot. }

  /api/v1/events/{offset}:
    get:
      summary: Get a single event by event-log offset
      operationId: apiV1EventsOffsetGet
      tags: [events]
      parameters:
        - name: offset
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Event at the requested offset.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Cost estimation and storage migration ────────────────────────────────

  /api/v1/queries/estimate:
    get:
      summary: Estimate the storage and execution cost of a query
      operationId: apiV1QueriesEstimateGet
      tags: [analytics]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: query
          in: query
          required: false
          schema: { type: string }
      responses:
        "200": { description: Query cost estimate. }
        "503": { description: Analytics engine not available. }

  /api/v1/queries/federated:
    post:
      summary: Execute a federated Trino query across storage tiers
      operationId: apiV1QueriesFederatedPost
      tags: [analytics]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sql]
              properties:
                sql:
                  type: string
                parameters:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Federated query result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSqlQueryResponse"
        "503": { description: Analytics engine not available. }

  /api/v1/lineage/{collection}:
    get:
      summary: Get lineage graph for a collection
      operationId: apiV1LineageCollectionGet
      tags: [lineage]
      parameters:
        - name: collection
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: direction
          in: query
          required: false
          schema:
            type: string
            enum: [UPSTREAM, DOWNSTREAM, BOTH]
      responses:
        "200":
          description: Lineage graph.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineageDagResponse"
        "501": { description: Lineage plugin not configured. }

  /api/v1/lineage/{collection}/impact:
    get:
      summary: Get downstream impact analysis for a collection
      operationId: apiV1LineageCollectionImpactGet
      tags: [lineage]
      parameters:
        - name: collection
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Lineage impact analysis.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineageImpactResponse"
        "501": { description: Lineage plugin not configured. }

  /api/v1/collections/{id}/cost-report:
    get:
      summary: Get a storage cost report for a collection
      operationId: apiV1CollectionsIdCostReportGet
      tags: [analytics]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200": { description: Collection storage cost report. }
        "503": { description: Analytics engine not available. }

  /api/v1/collections/{id}/migrate:
    post:
      summary: Trigger a manual storage-tier migration for a collection
      operationId: apiV1CollectionsIdMigratePost
      tags: [analytics]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: targetTier
          in: query
          required: false
          schema:
            type: string
            enum: [WARM, COLD]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200": { description: Migration scheduled or completed. }
        "503": { description: Tier migration scheduler not configured. }

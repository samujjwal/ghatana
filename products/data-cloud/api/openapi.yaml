          schema: { type: string }
      responses:
        "200": { description: List of matching entities }
        "501": { description: OpenSearch connector not configured }

  /api/v1/entities/{collection}/export:
    get:
      summary: Bulk export entities as CSV or NDJSON
      operationId: apiV1EntitiesCollectionExportGet
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: format
          in: query
          schema: { type: string, enum: [csv, ndjson], default: ndjson }
      responses:
        "200": { description: Exported entity file }
        "501": { description: Export service not configured }

  /api/v1/entities/{collection}/anomalies:
    post:
      summary: Detect statistical anomalies in a collection
      operationId: apiV1EntitiesCollectionAnomaliesPost
      tags: [entities, analytics]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FreeformObject"
      responses:
        "200": { description: Anomaly detection results }
        "501": { description: Anomaly detector not configured }

  /api/v1/entities/{collection}/validate:
    post:
      summary: Validate a single entity payload against the collection schema
      operationId: apiV1EntitiesCollectionValidatePost
      description: |
        Checks the supplied payload against registered validation rules for the collection.
        Returns a list of violations when the payload is invalid. Does not persist the entity.
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FreeformObject"
      responses:
        "200":
          description: Validation outcome.
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  violations:
                    type: array
                    items:
                      type: object
                      properties:
                        field: { type: string }
                        message: { type: string }
                        code: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/entities/{collection}/validate/batch:
    post:
      summary: Validate multiple entity payloads in a single request
      operationId: apiV1EntitiesCollectionValidateBatchPost
      description: |
        Validates each payload in the `entities` array against the collection schema.
        Returns per-entity results and a top-level `allValid` flag. Does not persist entities.
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entities]
              properties:
                entities:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                  minItems: 1
                  maxItems: 1000
      responses:
        "200":
          description: Per-entity validation results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  allValid:
                    type: boolean
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index: { type: integer }
                        valid: { type: boolean }
                        violations:
                          type: array
                          items:
                            type: object
                            properties:
                              field: { type: string }
                              message: { type: string }
                              code: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/entities/{collection}/batch:
    post:
      summary: Upsert multiple entities in a single request
      operationId: apiV1EntitiesCollectionBatchPost
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FreeformObject"
      responses:
        "200": { description: Batch upsert results }
    delete:
      summary: Delete multiple entities by ID
      operationId: apiV1EntitiesCollectionBatchDelete
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FreeformObject"
      responses:
        "200": { description: Batch delete results }

  /api/v1/entities/{collection}/stream:

# Data-Cloud — SecretStore (External Secrets Operator)
#
# References the Vault or AWS Secrets Manager backend that holds all
# data-cloud sensitive credentials.  The External Secrets Operator (ESO)
# reconciles ExternalSecret resources in the `data-cloud` namespace and
# writes real Kubernetes Secrets pulled live from the configured backend.
#
# Install ESO before applying:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#       -n external-secrets-system --create-namespace
#
# For local / staging: uses HashiCorp Vault.
# For production: swap provider to `aws` (see commented block at bottom).
# ---------------------------------------------------------------------------

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: data-cloud-vault-store
  namespace: data-cloud
  labels:
    app.kubernetes.io/name: data-cloud
    app.kubernetes.io/component: secret-store
  annotations:
    # Refresh every 5 minutes so secret rotations propagate quickly.
    external-secrets.io/refresh-interval: "5m"
spec:
  provider:
    # ------------------------------------------------------------------
    # HashiCorp Vault — KV v2 engine (staging & dev)
    # ------------------------------------------------------------------
    vault:
      server: "https://vault.internal.ghatana.io"
      path: "secret"        # KV mount path
      version: "v2"
      auth:
        # Kubernetes Service Account auth: the data-cloud pod's SA token is
        # exchanged for a Vault token scoped to the data-cloud policy.
        kubernetes:
          mountPath: "kubernetes"
          role: "data-cloud"
          serviceAccountRef:
            name: data-cloud   # must match the SA in deployment.yaml

---

  # ========== Costs ========== (P1-6: Added missing endpoint)
  /api/v1/costs/summary:
    get:
      summary: Get cost summary for tenant
      operationId: getCostSummary
      tags: [Costs]
      parameters:
        - name: tenantId
          in: query
          schema:
            type: string
          description: Tenant context for cost summary
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
          description: Start date for cost aggregation
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
          description: End date for cost aggregation
      responses:
        '200':
          description: Cost summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenantId:
                    type: string
                  totalCost:
                    type: number
                    format: double
                  currency:
                    type: string
                  breakdown:
                    type: object
                    additionalProperties:
                      type: number
                  startDate:
                    type: string
                    format: date-time
                  endDate:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'

  # ========== AI Suggestions ==========
  /api/v1/ai/suggestions:
    get:
      summary: Get AI-scored pipeline suggestions
      operationId: getAiSuggestions
      tags: [AI]
      parameters:
        - name: tenantId
          in: query
          schema:
            type: string
          description: Tenant context for suggestions
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Maximum number of suggestions to return
      responses:
        '200':
          description: Scored suggestion list
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestions:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  count:
                    type: integer
                  tenantId:
                    type: string
                  generatedAt:
                    type: string
                    format: date-time
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ========== NLQ ==========
  /api/v1/nlp/parse:
    post:
      summary: Parse a natural-language query into structured intent and entities
      operationId: parseNlQuery
      tags: [NLP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: Free-text operator query
                tenantId:
                  type: string
      responses:
        '200':
          description: Parsed intent and entities
          content:
            application/json:
              schema:
                type: object
                properties:
                  intent:
                    type: string
                  confidence:
                    type: number
                    format: double
                  entities:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  query:
                    type: string
                  tenantId:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'

  # ========== Auth (F-008, F-032) ==========
  /api/v1/auth/platform-session:
    get:
      summary: Bootstrap a short-lived platform session token
      description: |
        F-008: Issues a platform session token for the authenticated user.
        Requires ACTION_PLANE_SSO_CONFIGURED=true to be set on the server; returns
        503 otherwise. The token is scoped to the tenant resolved from the JWT.
      operationId: getPlatformSession
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session token issued
          content:
            application/json:
              schema:
                type: object
                required: [session, expiresInSeconds, issuedAt]
                properties:
                  session:
                    type: string
                    description: Short-lived opaque session token
                  expiresInSeconds:
                    type: integer
                    format: int64
                    description: Token lifetime in seconds
                  issuedAt:
                    type: string
                    format: date-time
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: SSO not configured on this deployment

  /api/v1/auth/roles:
    get:
      summary: Get the authenticated user roles
      description: |
        F-032: Returns the set of roles assigned to the current authenticated user,
        extracted from the verified JWT claims. The UI uses these roles to gate
        sensitive actions such as kill-switch, pipeline publish, and role management.
      operationId: getAuthRoles
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User roles
          content:
            application/json:
              schema:
                type: object
                required: [roles, retrievedAt]
                properties:
                  roles:
                    type: array
                    items:
                      type: string
                      enum: [OPERATOR, ADMIN, AUDITOR]
                    description: Roles assigned to the authenticated user
                  retrievedAt:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ========== AI Suggestions Metrics (F-011) ==========
  /api/v1/ai/suggestions/metrics:
    get:
      summary: Get AI suggestion performance metrics
      description: |
        F-011: Returns metrics about AI suggestion quality, confidence distribution,
        and suggestion acceptance rates for observability purposes.
      operationId: getAiSuggestionsMetrics
      tags: [AI]
      parameters:
        - name: tenantId
          in: query
          schema:
            type: string
          description: Tenant context for metrics
      responses:
        '200':
          description: AI suggestion metrics snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalSuggestions:
                    type: integer
                    description: Total suggestions generated
                  acceptedCount:
                    type: integer
                    description: Suggestions accepted by operators
                  rejectedCount:
                    type: integer
                    description: Suggestions rejected by operators
                  averageConfidence:
                    type: number
                    format: double
                    description: Average confidence score (0.0-1.0)
                  timestamp:
                    type: string
                    format: date-time
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/ai/suggestions/stages:
    post:
      summary: Get AI stage suggestions for a pipeline
      description: |
        AI-2: Returns suggested pipeline stages with confidence scores and sources.
      operationId: suggestPipelineStages
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId]
              properties:
                tenantId:
                  type: string
                pipelineId:
                  type: string
                context:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Suggested pipeline stages
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestions:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  tenantId:
                    type: string
                  generatedAt:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'

# ========================================================================
# Components
# ========================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT bearer token with required `tenant_id` claim.
        The tenant identity is extracted from the `tenant_id` claim.
        Tokens without this claim are rejected.
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        API key for machine-to-machine authentication.
        The tenant identity is associated with the API key at creation time.

  parameters:
    TenantIdHeader:
      name: X-Tenant-Id
      in: header
      description: |
        **DEPRECATED as authoritative tenant source** — Compatibility hint only.

        Tenant identifier for multi-tenant isolation. In production/staging/sovereign profiles,
        tenant is derived from authenticated identity. If provided, this value must match the
        authenticated tenant or the request is rejected. In local/test/embedded profiles, this
        may be used for convenience when authentication does not include tenant claims.
      schema:
        type: string
      deprecated: true

    TenantIdQuery:
      name: tenantId
      in: query
      description: |
        **DEPRECATED as authoritative tenant source** — Compatibility hint only.

        Tenant identifier for multi-tenant isolation. In production/staging/sovereign profiles,
        tenant is derived from authenticated identity. If provided, this value must match the
        authenticated tenant or the request is rejected. In local/test/embedded profiles, this
        may be used for convenience when authentication does not include tenant claims.
      schema:
        type: string
      deprecated: true

    UserIdHeader:
      name: X-User-Id
      in: header
      description: User performing the operation
      schema:
        type: string
        default: system

    PatternId:
      name: patternId
      in: path
      required: true
      description: Unique pattern identifier
      schema:
        type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ---------- Health ----------
    DeepHealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        probe:
          type: string
          enum: [deep]
        version:
          type: string
        timestamp:
          type: string
          format: date-time
        durability:
          $ref: '#/components/schemas/RuntimeDurabilitySummary'
        components:
          type: object
          additionalProperties:
            type: string

    RuntimeDurabilitySummary:
      type: object
      required: [mode, title, description]
      properties:
        mode:
          type: string
          enum: [durable, degraded, ephemeral]
        title:
          type: string
        description:
          type: string
        profile:
          type: string
        dataCloudStorage:
          type: string
          description: Deployment storage classification such as disabled, embedded, sovereign, or production.
        executionHistory:
          type: string
          description: Durability state for run and execution history.
        pipelineStorage:
          type: string
          description: Durability state for pipeline definitions.
        memoryPersistence:
          type: string
          description: Durability state for agent memory.
        reasons:
          type: array
          items:
            type: string

    AgentListResponse:
      type: object
      required: [tenantId, agents, count, timestamp]
      properties:
        tenantId:
          type: string
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentSummary'
        count:
          type: integer
        configured:
          type: boolean
          description: Present and false when the registry is unavailable and Action Plane is returning a truthful unconfigured payload.
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    AgentSummary:
      type: object
      required:
        - id
        - name
        - tenantId
        - version
        - type
        - status
        - capabilities
        - memoryCount
        - description
        - registrationMode
        - executable
        - registryStorage
        - memoryPersistence
        - registeredAt
      properties:
        id:
          type: string
        name:
          type: string
        tenantId:
          type: string
        version:
          type: string
        type:
          type: string
        status:
          type: string
          enum: [ACTIVE, IDLE, ERROR, UNKNOWN]
        capabilities:
          type: array
          items:
            type: string
        memoryCount:
          type: integer
        description:
          type: string
        registrationMode:
          type: string
          enum: [direct, manifest-only]
          description: Manifest-only registrations are visible for discovery but intentionally blocked from direct execution.
        executable:
          type: boolean
        registryStorage:
          type: string
          enum: [datacloud, unconfigured]
        memoryPersistence:
          type: string
          enum: [datacloud, unavailable]
        registeredAt:
          type: string
          format: date-time
        lastSeen:
          type: string
          format: date-time
          nullable: true

    AgentDetail:
      allOf:
        - $ref: '#/components/schemas/AgentSummary'
        - type: object
          properties:
            config:
              type: object
              additionalProperties: true
            timestamp:
              type: string
              format: date-time

    AgentRegistrationRequest:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        type:
          type: string
        config:
          type: object
          additionalProperties: true

    AgentRegistrationResponse:
      type: object
      required: [id, tenantId, status, timestamp]
      properties:
        id:
          type: string
        tenantId:
          type: string
        status:
          type: string
        timestamp:
          type: string
          format: date-time

    AgentExecuteRequest:
      type: object
      additionalProperties: true
      properties:
        tenantId:
          type: string
        input:
          type: object
          additionalProperties: true

    AgentExecuteResponse:
      type: object
      required: [agentId, tenantId, eventId, success, timestamp]
      properties:
        agentId:
          type: string
        tenantId:
          type: string
        eventId:
          type: string
        success:
          type: boolean
        detections:
          type: integer
        timestamp:
          type: string
          format: date-time

    HealthResponse:
      type: object
      properties:
        status:
          type: string
        timestamp:
          type: string
          format: date-time
        service:
          type: string

    StatusResponse:
      type: object
      properties:
        status:
          type: string
        timestamp:
          type: string
          format: date-time

    InfoResponse:
      type: object
      properties:
        service:
          type: string
        version:
          type: string
        description:
          type: string
        timestamp:
          type: string
          format: date-time

    MetricsResponse:
      type: object
      properties:
        service:
          type: string
        uptime_seconds:
          type: integer
          format: int64
        memory_used_mb:
          type: integer
          format: int64
        memory_free_mb:
          type: integer
          format: int64
        processors:
          type: integer
        timestamp:
          type: string
          format: date-time

    # ---------- Events ----------
    EventRequest:
      type: object
      required: [type]
      properties:
        tenantId:
          type: string
          default: default
        type:
          type: string
          description: Event type identifier
        payload:
          type: object
          additionalProperties: true
          description: Arbitrary event payload

    EventResult:
      type: object
      properties:
        eventId:
          type: string
        success:
          type: boolean
        detections:
          type: integer
          description: Number of patterns that matched
        timestamp:
          type: string
          format: date-time

    # ---------- Patterns ----------
    Pattern:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        specification:
          type: string
          description: Pattern expression or rule definition
        description:
          type: string
        type:
          type: string
          enum: [CUSTOM, ANOMALY, THRESHOLD, SEQUENCE, CORRELATION]
        status:
          type: string
          enum: [ACTIVE, INACTIVE, DRAFT]
        version:
          type: integer
        confidence:
          type: number
          format: double
        agentHints:
          type: string
        config:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          type: string
        updatedBy:
          type: string

    PatternCreateRequest:
      type: object
      required: [name]
      properties:
        tenantId:
          type: string
        name:
          type: string
        specification:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [CUSTOM, ANOMALY, THRESHOLD, SEQUENCE, CORRELATION]
          default: CUSTOM
        confidence:
          type: number
          format: double
        agentHints:
          type: string
        config:
          type: object
          additionalProperties: true

    PatternUpdateRequest:
      type: object
      properties:
        name:
          type: string
        specification:
          type: string
        description:
          type: string
        agentHints:
          type: string
        confidence:
          type: number
          format: double

    # ---------- Analytics ----------
    AnomalyDetectionRequest:
      type: object
      required: [events]
      properties:
        tenantId:
          type: string
          default: default
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventRequest'

    AnomalyDetectionResult:
      type: object
      properties:
        anomalies:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              severity:
                type: string
                enum: [LOW, MEDIUM, HIGH, CRITICAL]
              score:
                type: number
                format: double
              description:
                type: string
              relatedEvents:
                type: array
                items:
                  type: string
        count:
          type: integer
        timestamp:
          type: string
          format: date-time

    ForecastRequest:
      type: object
      required: [metric, points]
      properties:
        tenantId:
          type: string
          default: default
        metric:
          type: string
          description: Name of the metric to forecast
        points:
          type: array
          items:
            $ref: '#/components/schemas/DataPoint'

    DataPoint:
      type: object
      required: [timestamp, value]
      properties:
        timestamp:
          type: string
          format: date-time
        value:
          type: number
          format: double

    ForecastResult:
      type: object
      properties:
        metric:
          type: string
        predictions:
          type: array
          items:
            $ref: '#/components/schemas/DataPoint'
        confidence:
          type: number
          format: double
          description: Confidence interval (0.0 – 1.0)
        timestamp:
          type: string
          format: date-time

    # ---------- Event Design ----------
    SchemaCreateRequest:
      type: object
      required: [format]
      properties:
        format:
          type: string
          enum: [JSON_SCHEMA, AVRO, PROTOBUF]
        document:
          type: string
          description: Schema document (if inline)
        definition:
          type: object
          description: Schema definition (if structured)
        direction:
          type: string
          enum: [INGRESS, EGRESS, BIDIRECTIONAL]
        description:
          type: string

    SchemaUpdateRequest:
      type: object
      properties:
        description:
          type: string
        document:
          type: string
        definition:
          type: object

    SchemaDefinition:
      type: object
      properties:
        id:
          type: string
        eventTypeId:
          type: string
        format:
          type: string
        document:
          type: string
        direction:
          type: string
        description:
          type: string
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BindingCreateRequest:
      type: object
      required: [connectorId, encoding]
      properties:
        connectorId:
          type: string
        encoding:
          type: string
        direction:
          type: string
          enum: [INGRESS, EGRESS]
        headerMappings:
          type: array
          items:
            $ref: '#/components/schemas/HeaderMapping'
        payloadMapping:
          $ref: '#/components/schemas/PayloadMapping'


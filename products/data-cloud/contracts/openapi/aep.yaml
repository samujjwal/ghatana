# DEPRECATED: Legacy AEP contract retained for compatibility.
# Replaced by products/data-cloud/contracts/openapi/action-plane.yaml.
openapi: 3.0.3
info:
  title: AEP (Deprecated) - Data Cloud Action Plane API
  description: |
    REST API for the Data Cloud Action Plane.

    The Action Plane is the runtime implementation behind Data Cloud for agentic
    orchestration, including pattern detection, anomaly analysis, time-series
    forecasting, pipeline execution, and governance/operation surfaces.
    AEP provides an agentic orchestration runtime for event-driven execution.

    **AEP Compatibility Note:** This contract replaces the legacy AEP (Agentic Event
    Processor) standalone product contract. AEP is now the runtime implementation
    within Data Cloud Action Plane, not a standalone product.

    ## Authentication
    All endpoints require authenticated identity with a valid bearer token (JWT) or API key.
    The tenant identity is derived from the authenticated principal's token claims.

    ### Production Tenant Identity (Strict Mode)
    In production, staging, and sovereign profiles:
    - Tenant is **always** derived from authenticated identity (JWT `tenant_id` claim or API key tenant)
    - The `X-Tenant-ID` header and `tenantId` query parameter are treated as **compatibility hints only**
    - If provided, these hints must match the authenticated tenant; mismatch results in `403 Forbidden`
    - Missing tenant claim in authentication results in `400 Bad Request`
    - Standard tenant/auth error codes: `TENANT_REQUIRED`, `TENANT_MISMATCH`, `MISSING_TENANT_CLAIM`

    ### Local/Development Tenant Identity
    In local, test, and embedded profiles:
    - `X-Tenant-ID` header or `tenantId` query parameter may be used for convenience
    - A fallback tenant (`"default"`) is used when no tenant is specified
  version: 1.0.0
  contact:
    name: Data Cloud Platform Team
    url: https://github.com/samujjwal/ghatana
  license:
    name: Proprietary — Ghatana Internal

servers:
  - url: http://localhost:8082
    description: Local development (Data Cloud standalone launcher)
  - url: https://data-cloud-staging.ghatana.internal
    description: Data Cloud Staging
  - url: https://data-cloud.ghatana.internal
    description: Data Cloud Production

tags:
  - name: Health
    description: Health, readiness, and liveness probes
  - name: Events
    description: Event ingestion and processing
  - name: Patterns
    description: Pattern registration and management
  - name: Analytics
    description: Anomaly detection and forecasting
  - name: Surfaces
    description: Runtime surface schema and connector introspection
  - name: Sessions
    description: Session management
  - name: Event Design
    description: Event type schemas and connector bindings
  - name: Agents
    description: Agent registry and execution runtime endpoints
  - name: HITL
    description: Human-in-the-loop review queue endpoints
  - name: Learning
    description: Learning episodes, policy review, and reflection flows
  - name: Compliance
    description: Compliance operations and audit evidence export endpoints
  - name: Deployments
    description: Deployment lifecycle endpoints for runtime artifacts
  - name: Reports
    description: Reporting and exported operator summaries
  - name: Runs
    description: Pipeline run operations and operator detail views
  - name: Governance
    description: Governance, audit, and compliance operator surfaces
  - name: Lifecycle
    description: Change approval and recertification workflows
  - name: Marketplace
    description: Agent marketplace and installation endpoints
  - name: Costs
    description: Cost tracking and summary endpoints

security:
  - bearerAuth: []
  - apiKeyAuth: []

paths:
  # ========== Health Endpoints ==========
  /health:
    get:
      security: []
      summary: Health check
      operationId: getHealth
      tags: [Health]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: UP
                timestamp: "2026-02-03T12:00:00Z"
                service: data-cloud-action-plane

  /ready:
    get:
      security: []
      summary: Readiness probe
      operationId: getReady
      tags: [Health]
      responses:
        '200':
          description: Service is ready to accept traffic
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
              example:
                status: READY
                timestamp: "2026-02-03T12:00:00Z"

  /live:
    get:
      security: []
      summary: Liveness probe
      operationId: getLive
      tags: [Health]
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
              example:
                status: LIVE
                timestamp: "2026-02-03T12:00:00Z"

  /info:
    get:
      security: []
      summary: Service information
      operationId: getInfo
      tags: [Health]
      responses:
        '200':
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'
              example:
                service: Data Cloud Action Plane
                version: 1.0.0-SNAPSHOT
                description: Data Cloud Action Plane Runtime
                timestamp: "2026-02-03T12:00:00Z"

  /metrics:
    get:
      security: []
      summary: Runtime metrics
      operationId: getMetrics
      tags: [Health]
      responses:
        '200':
          description: JVM and service metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'

  /health/deep:
    get:
      summary: Deep dependency health
      operationId: getDeepHealth
      tags: [Health]
      responses:
        '200':
          description: Detailed dependency health summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeepHealthResponse'

  /metrics/slo:
    get:
      summary: Runtime SLO metrics
      operationId: getSloMetrics
      tags: [Health]
      responses:
        '200':
          description: Service-level objective counters and gauges
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # ========== Event Processing ==========
  /api/v1/events:
    post:
      summary: Process a single event
      description: |
        Submits an event to the Data Cloud Action Plane engine for real-time processing.
        The engine evaluates all registered patterns against the event
        and returns detection results.
      operationId: processEvent
      tags: [Events]
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
            example:
              type: user.login
              payload:
                userId: user-123
                ip: "10.0.0.1"
                browser: Chrome
      responses:
        '200':
          description: Event processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResult'
              example:
                eventId: evt-abc-123
                success: true
                detections: 2
                timestamp: "2026-02-03T12:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/events/batch:
    post:
      summary: Process a batch of events
      description: |
        Submits multiple events for batch processing and returns per-event results
        with aggregate success/failure counts.
      operationId: processEventBatch
      tags: [Events]
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                tenantId:
                  type: string
                events:
                  type: array
                  items:
                    $ref: '#/components/schemas/EventRequest'
      responses:
        '200':
          description: Batch processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenantId:
                    type: string
                  total:
                    type: integer
                  successCount:
                    type: integer
                  failureCount:
                    type: integer
                  totalDetections:
                    type: integer
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        eventId:
                          type: string
                        success:
                          type: boolean
                        detections:
                          type: integer
                  timestamp:
                    type: string
                    format: date-time

  # ========== Pattern Management ==========
  /api/v1/patterns:
    get:
      summary: List all patterns
      description: Returns all registered detection patterns for the given tenant.
      operationId: listPatterns
      tags: [Patterns]
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
        - name: status
          in: query
          description: Filter by pattern status
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, DRAFT]
      responses:
        '200':
          description: List of patterns
          content:
            application/json:
              schema:
                type: object
                properties:
                  patterns:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pattern'
                  count:
                    type: integer
                  timestamp:
                    type: string
                    format: date-time

    post:
      summary: Register a new pattern
      description: |
        Creates and registers a new detection pattern.
        Returns the created pattern including its generated ID.
      operationId: registerPattern
      tags: [Patterns]
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatternCreateRequest'
            example:
              name: Brute Force Login
              description: Detects rapid successive failed login attempts
              type: ANOMALY
              specification: "count(event.type == 'login.failed') > 5 within 60s"
              config:
                threshold: 5
                windowSeconds: 60
      responses:
        '201':
          description: Pattern registered
          headers:
            Location:
              description: URL of the created pattern
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  pattern:
                    $ref: '#/components/schemas/Pattern'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/patterns/{patternId}:
    get:
      summary: Get pattern by ID
      operationId: getPattern
      tags: [Patterns]
      parameters:
        - $ref: '#/components/parameters/PatternId'
        - $ref: '#/components/parameters/TenantIdQuery'
      responses:
        '200':
          description: Pattern found
          content:
            application/json:
              schema:
                type: object
                properties:
                  pattern:
                    $ref: '#/components/schemas/Pattern'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: Update a pattern
      operationId: updatePattern
      tags: [Patterns]
      parameters:
        - $ref: '#/components/parameters/PatternId'
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatternUpdateRequest'
      responses:
        '200':
          description: Pattern updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pattern'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete a pattern
      operationId: deletePattern
      tags: [Patterns]
      parameters:
        - $ref: '#/components/parameters/PatternId'
        - $ref: '#/components/parameters/TenantIdQuery'
      responses:
        '200':
          description: Pattern deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  patternId:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '204':
          description: Pattern deleted (no content)
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/patterns/{patternId}/activate:
    post:
      summary: Activate a pattern
      operationId: activatePattern
      tags: [Patterns]
      parameters:
        - $ref: '#/components/parameters/PatternId'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Pattern activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  patternId:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/patterns/{patternId}/deactivate:
    post:
      summary: Deactivate a pattern
      operationId: deactivatePattern
      tags: [Patterns]
      parameters:
        - $ref: '#/components/parameters/PatternId'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Pattern deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  patternId:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  # ========== Analytics ==========
  /api/v1/analytics/anomalies:
    post:
      summary: Detect anomalies in events
      description: |
        Analyses a set of events and returns detected anomalies.
        Uses registered patterns and statistical models.
      operationId: detectAnomalies
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnomalyDetectionRequest'
            example:
              events:
                - type: login.failed
                  payload: { userId: user-123, ip: "10.0.0.1" }
                - type: login.failed
                  payload: { userId: user-123, ip: "10.0.0.2" }
      responses:
        '200':
          description: Anomaly detection results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnomalyDetectionResult'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/analytics/anomalies/{anomalyId}/false-positive:
    post:
      summary: Mark an anomaly as a false positive
      description: |
        Records operator feedback that a detected anomaly is not actionable.
        The anomaly is marked resolved and an audit-linked feedback event is emitted when analytics storage is configured.
      operationId: markAnomalyFalsePositive
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - name: anomalyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnomalyFalsePositiveRequest'
            example:
              reviewer: ops-team
              rationale: Known deploy spike
              notes: Matches scheduled release activity
      responses:
        '200':
          description: False-positive feedback recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnomalyFalsePositiveResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: Analytics store unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/analytics/forecast:
    post:
      summary: Forecast time series data
      description: |
        Produces predictions for a named metric based on historical data points.
        Returns predicted values with a confidence interval.
      operationId: forecast
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForecastRequest'
            example:
              metric: cpu.utilization
              points:
                - timestamp: "2026-02-03T11:00:00Z"
                  value: 42.5
                - timestamp: "2026-02-03T11:05:00Z"
                  value: 45.2
                - timestamp: "2026-02-03T11:10:00Z"
                  value: 48.1
      responses:
        '200':
          description: Forecast results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastResult'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/analytics/kpis:
    post:
      summary: Persist KPI values
      operationId: saveKpi
      tags: [Analytics]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: KPI saved
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    get:
      summary: Query KPI values
      operationId: queryKpis
      tags: [Analytics]
      responses:
        '200':
          description: KPI results
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/analytics/query:
    post:
      summary: Query analytics records
      operationId: analyticsQuery
      tags: [Analytics]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Analytics query result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/reports:
    post:
      summary: Create a report
      operationId: createReport
      tags: [Reports]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Report created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/deployments:
    post:
      summary: Create a deployment record
      operationId: createDeployment
      tags: [Deployments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Deployment created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/deployments/{deploymentId}:
    put:
      summary: Update a deployment record
      operationId: updateDeployment
      tags: [Deployments]
      parameters:
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Deployment updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    delete:
      summary: Delete a deployment record
      operationId: deleteDeployment
      tags: [Deployments]
      parameters:
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deployment deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/agents:
    post:
      summary: Register a new agent
      operationId: registerAgent
      tags: [Agents]
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRegistrationRequest'
      responses:
        '200':
          description: Agent registration result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRegistrationResponse'
    get:
      summary: List registered agents
      operationId: listAgents
      tags: [Agents]
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'
      responses:
        '200':
          description: Agent list or truthful unconfigured response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'

  /api/v1/agents/{agentId}:
    get:
      summary: Get agent details
      operationId: getAgent
      tags: [Agents]
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/TenantIdQuery'
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDetail'

  /api/v1/catalog/marketplace/agents/{agentId}/simulate-install:
    post:
      summary: Simulate marketplace install
      operationId: simulateMarketplaceInstall
      tags: [Marketplace]
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarketplaceInstallInput'
      responses:
        '200':
          description: Marketplace install preflight
          content:
            application/json:
              schema:
                type: object
                properties:
                  simulation:
                    $ref: '#/components/schemas/MarketplaceInstallSimulation'
                  timestamp:

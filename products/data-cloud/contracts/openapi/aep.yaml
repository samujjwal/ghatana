              additionalProperties: true
      responses:
        '200':
          description: Recertification initiated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /lifecycle/recertification/{recertificationId}:
    get:
      summary: Get recertification status
      operationId: getRecertificationStatus
      tags: [Lifecycle]
      parameters:
        - name: recertificationId

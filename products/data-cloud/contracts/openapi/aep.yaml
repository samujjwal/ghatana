          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # ========== Marketplace ==========
  /api/v1/catalog/marketplace/agents:
    get:
      summary: List marketplace agents
      operationId: listMarketplaceAgents
      tags: [Marketplace]
      parameters:
        - $ref: '#/components/parameters/TenantIdQuery'

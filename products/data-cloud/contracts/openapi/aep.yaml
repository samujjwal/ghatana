            schema:
              $ref: '#/components/schemas/AgentExecuteRequest'
      responses:
        '200':
          description: Agent execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentExecuteResponse'

  /api/v1/agents/{agentId}/memory:
    get:
      summary: Read agent memory summary
      operationId: getAgentMemory
      tags: [Agents]
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/TenantIdQuery'
      responses:
        '200':
          description: Agent memory view
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true


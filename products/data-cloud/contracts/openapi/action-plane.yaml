openapi: 3.0.3
info:
  title: Data Cloud Action Plane API
  description: |
    Canonical REST API for the Data Cloud Action Plane runtime.

    Canonical Action Plane routes live under /api/v1/action/*.
    Legacy AEP/root paths are compatibility-only and are documented in aep.yaml
    or the route compatibility registry, not in this canonical contract.

    Tenant identity is derived from authenticated identity, including JWT tenant_id
    claims or API-key tenant binding. X-Tenant-ID and tenantId remain deprecated
    compatibility hints and must match authenticated identity when provided.

    Standard tenant/auth error codes include TENANT_REQUIRED, TENANT_MISMATCH,
    and MISSING_TENANT_CLAIM.
  version: 1.0.0
servers:
  - url: http://localhost:8082
    description: Local development
  - url: https://data-cloud.ghatana.internal
    description: Production
security:
  - bearerAuth: []
  - apiKeyAuth: []
tags:
  - name: Agents
    description: Agent catalog runtime endpoints
  - name: Autonomy
    description: Autonomy governance controls
  - name: Executions
    description: Workflow execution lifecycle
  - name: Learning
    description: Learning trigger and review workflows
  - name: Memory
    description: Agent memory operations
  - name: Pipelines
    description: Pipeline registry and execution endpoints
  - name: Plugins
    description: Plugin lifecycle operations
  - name: Patterns
    description: Pattern registration and lifecycle management
  - name: Policy
    description: Policy decision evaluation endpoints
  - name: Compliance
    description: Compliance evidence and audit endpoints
  - name: Tracing
    description: Trace, span, and event retrieval endpoints

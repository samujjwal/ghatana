components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    DeprecatedTenantIdHeader:
      name: X-Tenant-ID
      in: header
      deprecated: true
      required: false
      description: Deprecated compatibility hint. Tenant is derived from authenticated identity.
      schema:
        type: string
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      description: Recommended idempotency key for mutating operations to prevent duplicate side effects.
      schema:
        type: string
  schemas:
    ActionPlaneEnvelope:
      type: object
      required:
        - operationId
        - status
      properties:
        operationId:
          type: string
          description: Canonical operation identifier that handled the request.
        status:
          type: string
          enum: [accepted, completed, blocked, failed]
        requestId:
          type: string
        data:
          type: object
          description: Operation-specific payload. Structured per handler response contract.
        evidenceRefs:
          type: array
          items:
            type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum: [TENANT_REQUIRED, TENANT_MISMATCH, MISSING_TENANT_CLAIM, UNAUTHENTICATED, FORBIDDEN, BAD_REQUEST]
            message:
              type: string
            requestId:
              type: string
  responses:
    BadRequest:
      description: Bad request or tenant identity error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authenticated identity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated identity lacks required tenant or access policy
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'



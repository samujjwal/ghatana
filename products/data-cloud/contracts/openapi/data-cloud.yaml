openapi: "3.1.0"

info:
  title: Data-Cloud Platform API
  description: |
    REST API for the Ghatana Data Cloud unified data platform.

    Data Cloud is an independent, deployable, AI/ML-native product. It owns data management,
    event streaming, analytics, reporting, governance, plugin-driven extensibility, feature
    storage, model metadata, and execution persistence surfaces.

    Data Cloud's Action Plane provides governed automation, pipelines, patterns, agents, reviews,
    runs, and learning. The Action Plane runtime (formerly AEP) is integrated within Data Cloud
    under `products/data-cloud/planes/action`, providing event-driven agent orchestration,
    pattern detection, pipeline execution, HITL review, and learning loops.

    In this API, workflow and pipeline execution means Action Plane runtime execution within Data Cloud.

    The Data-Cloud platform provides:
    - **Entity storage** — multi-tenant JSONB entity CRUD with pluggable storage backends
    - **Event log** — append-only event stream with push-based SSE subscriptions
    - **Execution metadata and runtime** — store and retrieve pipeline/checkpoint records and execute pipeline workflows through runtime plugins
    - **Agent memory plane** — persist, read, and search agent episodic/semantic/procedural memory
    - **Brain API** — salience scoring, attention management, workspace spotlight
    - **Learning API** — policy extraction, human-review queue
    - **Analytics API** — ad-hoc ClickHouse-backed analytics queries
    - **Server-Sent Events** — real-time push for events and learning updates
    - **WebSocket** — real-time change-data-capture notifications via `GET /ws`
    - **AI Assist** — gracefully-degrading embedded AI/ML hints for entities, analytics, pipelines, and brain
    - **Voice Gateway** — voice intent resolution and classification
    - **Data Lifecycle & Governance** — retention policies, PII redaction, compliance posture
    - **AI/ML Model Registry & Feature Store** — model metadata and feature vector management
    - **Reports** — analytical report generation and retrieval

    ## WebSocket
    The `/ws` endpoint accepts WebSocket upgrade requests and streams JSON change-data-capture
    events (entity create / update / delete) scoped to the caller's authenticated tenant. Connect with
    a standard WebSocket client; no subprotocol is required. Each message is a JSON object with
    `type`, `collection`, `id`, and `data` fields.

    ## Authentication
    All endpoints require authenticated identity with a valid bearer token (JWT) or API key.
    The tenant identity is derived from the authenticated principal's token claims - specifically
    the `tenant_id` claim in JWT tokens or the tenant associated with API keys.

    ### Production Tenant Identity (Strict Mode)
    In production, staging, and sovereign profiles:
    - Tenant is **always** derived from authenticated identity (JWT `tenant_id` claim or API key tenant)
    - The `X-Tenant-ID` header and `tenantId` query parameter are treated as **compatibility hints only**
    - If provided, these hints must match the authenticated tenant; mismatch results in `403 Forbidden`
    - Missing tenant claim in authentication results in `400 Bad Request`
    - The default fallback tenant (`"default"`) is **disabled** in production profiles

    ### Local/Development Tenant Identity
    In local, test, and embedded profiles:
    - `X-Tenant-ID` header or `tenantId` query parameter may be used for convenience
    - A fallback tenant (`"default"`) is used when no tenant is specified

    ### Security Requirements
    - All endpoints except health checks require valid authentication
    - CRITICAL routes (governance mutations, model promotions, data deletion) require policy engine
    - SENSITIVE routes emit audit events
    - Break-glass access requires explicit `X-Break-Glass-Reason` header and ADMIN role

    ## Versioning
    All stable endpoints are prefixed with `/api/v1`. Utility endpoints (`/health`, `/ready`,
    `/live`, `/info`, `/metrics`) are unprefixed.
  version: "1.0.0-SNAPSHOT"
  license:
    name: Proprietary — Ghatana Internal
    identifier: LicenseRef-Ghatana-Proprietary
  contact:
    name: Data-Cloud Platform Team
    email: data-cloud@ghatana.internal

servers:
  - url: http://localhost:8082
    description: Local development (standalone launcher)
  - url: https://data-cloud-staging.ghatana.internal
    description: Staging
  - url: https://data-cloud.ghatana.internal
    description: Production

tags:
  - name: health
    description: Liveness, readiness, and health probes.
  - name: info
    description: Service information and Prometheus-format metrics.
  - name: entities
    description: Generic JSONB entity CRUD operations.
  - name: events
    description: Append-only event log operations.
  - name: pipelines
    description: Data Cloud Action Plane pipeline metadata registry. Pipelines are managed and executed by the Action Plane runtime within Data Cloud.
  - name: checkpoints
    description: Data Cloud Action Plane checkpoint persistence for durable execution state across pipeline and workflow runs.
  - name: memory
    description: Agent memory persistence plane (episodic, semantic, procedural, preference).
  - name: brain
    description: Brain API — salience, attention, workspace spotlight.
  - name: learning
    description: Learning API — policy extraction and human-review queue.
  - name: mastery
    description: Governed mastery previews, promotion diagnostics, and obsolescence processing.
  - name: analytics
    description: Ad-hoc analytics queries backed by ClickHouse.
  - name: context
    description: Tenant-scoped context storage and retrieval APIs.
  - name: sse
    description: Server-Sent Event streams for real-time push.
  - name: data-products
    description: Publish, discover, and subscribe to reusable data products.
  - name: models
    description: AI/ML model registry — register, query, and promote model metadata.
  - name: features
    description: ML feature store — ingest and retrieve feature vectors per entity.
  - name: ai
    description: AI-assisted hints and suggestions (gracefully degrades when LLM is unavailable).
  - name: voice
    description: Voice gateway — intent recognition, classification, and execution.
  - name: media
    description: Media artifact metadata and processing (audio/video/image transcription and vision analysis).
  - name: governance
    description: Data lifecycle, retention policies, PII redaction, and compliance posture.
  - name: storage-profiles
    description: Storage profile management for data fabric tiering and backend configuration.
  - name: reports
    description: Reporting — generate and retrieve analytical reports.
  - name: surfaces
    description: Runtime surface and subsystem configuration exposure.
  - name: autonomy
    description: Autonomous-operation override and audit controls.
  - name: plugins
    description: Bundled plugin lifecycle management.
  - name: agents
    description: Catalog of agent descriptors served by Data Cloud Action Plane.

# ─────────────────────────────────────────────────────────────────────────────
# Reusable components
# ─────────────────────────────────────────────────────────────────────────────
security:
  - bearerAuth: []
  - apiKeyAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT bearer token with required `tenant_id` claim.
        The tenant identity is extracted from the `tenant_id` claim.
        Tokens without this claim are rejected in all profiles.
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        API key for machine-to-machine authentication.
        The tenant identity is associated with the API key at creation time.

  parameters:
    tenantIdQuery:
      name: tenantId
      in: query
      description: |
        **DEPRECATED as authoritative tenant source** — Compatibility hint only.

        In production/staging/sovereign profiles, tenant is derived from authenticated identity.
        If provided, this value must match the authenticated tenant or the request is rejected.
        In local/test/embedded profiles, this may be used for convenience when authentication
        does not include tenant claims.
      schema:
        type: string
        example: "tenant-123"
      deprecated: true
    tenantIdHeader:
      name: X-Tenant-ID
      in: header
      description: |
        **DEPRECATED as authoritative tenant source** — Compatibility hint only.

        In production/staging/sovereign profiles, tenant is derived from authenticated identity.
        If provided, this value must match the authenticated tenant or the request is rejected.
        In local/test/embedded profiles, this may be used for convenience when authentication
        does not include tenant claims.
      schema:
        type: string
        example: "tenant-123"
      deprecated: true

    collectionPath:
      name: collection
      in: path
      required: true
      description: Collection (table) name within the tenant's data space.
      schema:
        type: string
        example: "products"

    entityIdPath:
      name: id
      in: path
      required: true
      description: Entity UUID.
      schema:
        type: string
        format: uuid

    agentIdPath:
      name: agentId
      in: path
      required: true
      schema:
        type: string

    pipelineIdPath:
      name: pipelineId
      in: path
      required: true
      schema:
        type: string

    checkpointIdPath:
      name: checkpointId
      in: path
      required: true
      schema:
        type: string

    pluginId:
      name: id
      in: path
      required: true
      description: Plugin identifier.
      schema:
        type: string

    limitQuery:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 1000

    offsetQuery:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0

  schemas:
    FreeformObject:
      type: object
      description: Arbitrary JSON object.
      additionalProperties: true

    OperationStatus:
      type: string
      enum: [ACCEPTED, RUNNING, SUCCEEDED, FAILED, CANCELLED, BLOCKED]
      description: Canonical Data Cloud operation lifecycle state.

    OperationKind:
      type: string
      enum:
        - CONNECTOR_SYNC
        - CONNECTOR_TEST
        - CONNECTOR_SCHEMA
        - CONNECTOR_HEALTH
        - CONNECTOR_CREDENTIAL_ROTATION
        - MEDIA_PROCESSING
        - MEDIA_RETENTION
        - MEDIA_DELETE
        - PIPELINE_EXECUTION
        - PIPELINE_CANCEL
        - PIPELINE_RETRY
        - PIPELINE_ROLLBACK
        - PIPELINE_CHECKPOINT
        - PIPELINE_RESTORE
        - AGENT_RUN
        - AEP_PATTERN_RUN
        - BACKGROUND_TASK
      description: Product-wide category for an operator-visible operation.

    OperationRecord:
      type: object
      required:
        - operationId
        - tenantId
        - kind
        - status
        - action
        - createdAt
        - updatedAt
        - cancellable
      properties:
        operationId: { type: string }
        tenantId: { type: string }
        kind:
          $ref: "#/components/schemas/OperationKind"
        status:
          $ref: "#/components/schemas/OperationStatus"
        resourceType: { type: string }
        resourceId: { type: string }
        action: { type: string }
        summary: { type: string }
        detail: { type: string }
        actorId: { type: string }
        correlationId: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }
        cancellable: { type: boolean }
        metadata:
          type: object
          additionalProperties: true

    OperationTimeline:
      type: object
      required: [tenantId, items, count, storageMode, generatedAt]
      properties:
        tenantId: { type: string }
        items:
          type: array
          items:
            $ref: "#/components/schemas/OperationRecord"
        count: { type: integer, minimum: 0 }
        storageMode:
          type: string
          enum: [volatile, durable]
          description: Indicates whether operation records survive launcher process restarts.
        generatedAt: { type: string, format: date-time }

    # First-class Data Cloud domain contracts
    Collection:
      type: object
      description: First-class collection contract for Data Cloud data organization
      required:
        - id
        - name
        - tenantId
        - lifecycleStatus
        - operationalStatus
      properties:
        id:
          type: string
          description: Unique collection identifier
        name:
          type: string
          description: Human-readable collection name
        tenantId:
          type: string
          description: Owning tenant identifier
        description:
          type: string
          description: Collection description
        lifecycleStatus:
          type: string
          enum: [DRAFT, PUBLISHED, DEPRECATED, ARCHIVED]
          description: Lifecycle state of the collection
        operationalStatus:
          type: string
          enum: [healthy, degraded, unavailable, maintenance]
          description: Operational health status
        qualityScore:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: Overall quality score (0.0 to 1.0)
        qualityMetrics:
          type: object
          description: Detailed quality metrics
          additionalProperties: true
        retentionPolicy:
          type: object
          description: Retention policy configuration
          properties:
            retentionPeriodDays:
              type: integer
              description: Retention period in days
            archivalTier:
              type: string
              enum: [HOT, WARM, COLD]
              description: Default archival tier
        lineage:
          type: object
          description: Data lineage information
          properties:
            upstreamSources:
              type: array
              items:
                type: string
              description: Upstream collection IDs
            downstreamConsumers:
              type: array
              items:
                type: string
              description: Downstream collection IDs
        owner:
          type: string
          description: Collection owner or team
        schemaVersion:
          type: string
          description: Schema version identifier
        validationSchema:
          type: object
          description: JSON schema for collection validation
          additionalProperties: true
        storageProfile:
          type: object
          description: Storage configuration profile
          properties:
            primaryConnector:
              type: string
              description: Primary storage connector ID
            tieringEnabled:
              type: boolean
              description: Whether automatic tiering is enabled
        physicalMapping:
          type: object
          description: Physical storage mapping details
          additionalProperties: true
        permissions:
          type: object
          description: Access permissions
          properties:
            readers:
              type: array
              items:
                type: string
              description: Reader principal IDs
            writers:
              type: array
              items:
                type: string
              description: Writer principal IDs
            owners:
              type: array
              items:
                type: string
              description: Owner principal IDs
        createdAt:
          type: string
          format: date-time
          description: Collection creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp

    Dataset:
      type: object
      description: Dataset contract representing a logical grouping of collections
      required:
        - id
        - name
        - tenantId
        - collections
      properties:
        id:
          type: string
          description: Unique dataset identifier
        name:
          type: string
          description: Human-readable dataset name
        tenantId:
          type: string
          description: Owning tenant identifier
        description:
          type: string
          description: Dataset description
        collections:
          type: array
          items:
            type: string
          description: Collection IDs included in this dataset
        domain:
          type: string
          description: Business domain classification
        classification:
          type: string
          enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
          description: Data classification level
        tags:
          type: array
          items:
            type: string
          description: Dataset tags
        owner:
          type: string
          description: Dataset owner or team
        steward:
          type: string
          description: Data steward responsible for the dataset
        createdAt:
          type: string
          format: date-time
          description: Dataset creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp

    DataSource:
      type: object
      description: DataSource contract for external data connections
      required:
        - id
        - name
        - tenantId
        - type
        - connectionConfig
      properties:
        id:
          type: string
          description: Unique data source identifier
        name:
          type: string
          description: Human-readable data source name
        tenantId:
          type: string
          description: Owning tenant identifier
        description:
          type: string
          description: Data source description
        type:
          type: string
          enum: [POSTGRESQL, MYSQL, CLICKHOUSE, OPENSEARCH, S3, KAFKA, SNOWFLAKE, BIGQUERY]
          description: Data source type
        connectionConfig:
          type: object
          description: Connection configuration (encrypted at rest)
          additionalProperties: true
        healthStatus:
          type: string
          enum: [HEALTHY, UNHEALTHY, UNKNOWN]
          description: Connection health status
        lastHealthCheck:
          type: string
          format: date-time
          description: Last health check timestamp
        schemaPreview:
          type: object
          description: Preview of source schema
          additionalProperties: true
        syncConfig:
          type: object
          description: Synchronization configuration
          properties:
            syncEnabled:
              type: boolean
              description: Whether sync is enabled
            syncSchedule:
              type: string
              description: Cron expression for sync schedule
            targetCollection:
              type: string
              description: Target collection ID for sync
        credentials:
          type: object
          description: Credential reference (stored securely)
          properties:
            credentialId:
              type: string
              description: Secure credential ID
            rotationRequired:
              type: boolean
              description: Whether credential rotation is required
            lastRotated:
              type: string
              format: date-time
              description: Last credential rotation timestamp
        owner:
          type: string
          description: Data source owner or team
        createdAt:
          type: string
          format: date-time
          description: Data source creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp

    ProductReleaseReadiness:
      type: object
      required:
        - productId
        - productVersion
        - releaseTarget
        - releaseVerdict
        - generatedAt
        - evidence
        - blockingGaps
        - belowTargetDimensions
        - tenantId
        - commitSha
        - evidenceEnvironment
      properties:
        id:
          type: string
        productId:
          type: string
          enum: [phr, digital-marketing, dmos, data-cloud]
        productVersion:
          type: string
        releaseTarget:
          type: string
          enum: [development, staging, production]
        releaseVerdict:
          type: string
          enum: [pass, fail]
        averageScore:
          type: number
          minimum: 0
          maximum: 1
        releaseTargetScore:
          type: number
          minimum: 0
          maximum: 1
        generatedAt:
          type: string
          format: date-time
        evidence:
          $ref: "#/components/schemas/FreeformObject"
        blockingGaps:
          type: array
          items:
            $ref: "#/components/schemas/FreeformObject"
        belowTargetDimensions:
          type: array
          items:
            $ref: "#/components/schemas/FreeformObject"
        tenantId:
          type: string
        commitSha:
          type: string
          pattern: "^[a-fA-F0-9]{40}$"
        evidenceEnvironment:
          type: string
          enum: [development, staging, production]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductReleaseReadinessStats:
      type: object
      required: [totalReleases, passedReleases, failedReleases, averageScore, byProduct, byTarget]
      properties:
        totalReleases: { type: integer }
        passedReleases: { type: integer }
        failedReleases: { type: integer }
        averageScore: { type: number }
        byProduct:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/FreeformObject"
        byTarget:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/FreeformObject"

    SurfaceRecord:
      type: object
      description: Typed surface record with dependency-probe evidence (DC-P1-5).
      properties:
        surfaceId:
          type: string
          description: Surface identifier.
        state:
          type: string
          description: Current surface state (JSON value).
        status:
          type: string
          description: Legacy status value.
        ownerPlane:
          type: string
          description: Owning plane (unknown if null).
        requiredDependencies:
          type: array
          description: List of required dependency names.
          items:
            type: string
        dependencyProbes:
          type: array
          description: Per-dependency probe results.
          items:
            $ref: "#/components/schemas/FreeformObject"
        tenantScope:
          type: string
          description: Tenant scope (global or tenant-specific).
        runtimeProfile:
          type: string
          description: Deployment profile (local, staging, production, sovereign).
        limitations:
          type: string
          description: Human-readable limitations message (null if no limitations).
        actionsAllowed:
          type: array
          description: List of action names allowed on this surface.
          items:
            type: string
        runtimePosture:
          type: object
          description: Runtime posture metadata snapshot.
          additionalProperties: true
        # I2: Expanded fields for UI surface distinction
        featureFlag:
          type: string
          description: Feature flag name controlling this surface (null if not gated by flag).
        visibility:
          type: string
          enum: [PUBLIC, INTERNAL, PREVIEW, EXPERIMENTAL, DEPRECATED]
          description: Surface visibility level for UI display.
        roleRequirements:
          type: array
          description: Required roles to access this surface (empty if no role requirements).
          items:
            type: string
        reasonCode:
          type: string
          description: Machine-readable reason code for current state (e.g., DEPENDENCY_MISSING, FEATURE_DISABLED).
        recommendedAction:
          type: string
          description: Human-readable recommended action for users when surface is unavailable/degraded.

    VoiceIntentRequest:
      type: object
      required: [utterance]
      properties:
        utterance:
          type: string
        parameters:
          $ref: "#/components/schemas/FreeformObject"
        confirm:
          type: boolean

    VoiceIntentClassificationRequest:
      type: object
      required: [utterance]
      properties:
        utterance:
          type: string

    MediaArtifactCreateRequest:
      type: object
      required: [agentId, mediaType, storageUri]
      properties:
        agentId:
          type: string
          description: Agent ID that created or owns this artifact
        mediaType:
          type: string
          description: MIME type (e.g., audio/wav, video/mp4, image/jpeg)
        storageUri:
          type: string
          description: Storage location URI for the media file
        sizeBytes:
          type: integer
          format: int64
          description: Size of the media file in bytes
        checksum:
          type: string
          description: Checksum for integrity verification
        durationMs:
          type: integer
          format: int64
          description: Duration in milliseconds (for audio/video)
        originToolId:
          type: string
          description: Tool ID that originated this artifact
        correlationId:
          type: string
          description: Correlation ID for traceability
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Additional metadata key-value pairs
        consentStatus:
          type: string
          enum: [GRANTED, DENIED, PENDING]
          description: Consent status for audio/video artifacts
        retentionPolicy:
          type: string
          description: Retention policy identifier
        retentionUntil:
          type: string
          format: date-time
          description: Expiration date for retention

    MediaArtifact:
      type: object
      required: [artifactId, tenantId, agentId, mediaType, storageUri, sizeBytes, durationMs, createdAt]
      properties:
        artifactId:
          type: string
          description: Unique artifact identifier
        tenantId:
          type: string
          description: Tenant ID that owns this artifact
        agentId:
          type: string
          description: Agent ID that created or owns this artifact
        mediaType:
          type: string
          description: MIME type (e.g., audio/wav, video/mp4, image/jpeg)
        storageUri:
          type: string
          description: Storage location URI for the media file
        sizeBytes:
          type: integer
          format: int64
          description: Size of the media file in bytes
        checksum:
          type: string
          description: Checksum for integrity verification
        durationMs:
          type: integer
          format: int64
          description: Duration in milliseconds (for audio/video)
        originToolId:
          type: string
          description: Tool ID that originated this artifact
        correlationId:
          type: string
          description: Correlation ID for traceability
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Additional metadata key-value pairs
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp

    ConnectionRegistrationRequest:
      type: object
      required: [name, type]
      properties:
        id:
          type: string
          description: Optional connection ID (auto-generated if omitted)
        name:
          type: string
        type:
          type: string
          enum:
            [
              POSTGRESQL,
              MYSQL,
              MONGODB,
              S3,
              REST_API,
              KAFKA,
              SNOWFLAKE,
              BIGQUERY,
              CUSTOM,
            ]
        credentials:
          type: object
          description: Connector-specific credential blob (never returned in GET)
        properties:
          type: object
          description: Connector-specific configuration properties
        residencyPolicy:
          type: string
          description: Data residency constraint for this connector (e.g., eu-west, us-east)
        schedule:
          type: string
          description: Sync schedule expression (e.g., cron or 'once')
        targetCollection:
          type: string
          description: Destination collection for synced data
        state:
          type: string
          enum: [ACTIVE, INACTIVE, TESTING, ERROR, SYNCING]
          description: Desired initial state

    # H1: Storage profile schemas
    StorageProfile:
      type: object
      required: [id, name, type, tenantId]
      properties:
        id:
          type: string
          description: Unique profile identifier
        name:
          type: string
          description: Human-readable profile name
        type:
          type: string
          enum: [S3, AZURE_BLOB, GCS, POSTGRESQL, MYSQL, MONGODB, HDFS, LOCAL]
          description: Storage backend type
        storageUri:
          type: string
          description: Storage URI (redacted in responses unless authorized)
          x-ghatana-sensitivity: SENSITIVE
        accessKeys:
          type: object
          description: Access keys (write-only, never returned in GET)
          x-ghatana-sensitivity: CRITICAL
        encryptionType:
          type: string
          enum: [NONE, AES256, AWS_KMS, GCP_KMS, AZURE_KEY_VAULT]
          description: Encryption configuration
        compressionType:
          type: string
          enum: [NONE, GZIP, SNAPPY, ZSTD]
          description: Compression algorithm
        isActive:
          type: boolean
          description: Whether the profile is active
        isDefault:
          type: boolean
          description: Whether this is the default profile
        tenantId:
          type: string
          description: Tenant scope
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    CreateStorageProfileRequest:
      type: object
      required: [name, type, storageUri]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [S3, AZURE_BLOB, GCS, POSTGRESQL, MYSQL, MONGODB, HDFS, LOCAL]

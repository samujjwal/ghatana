          application/json:
            schema:
              $ref: "#/components/schemas/FreeformObject"
      responses:
        "200": { description: Anomaly detection results }
        "503":
          description: Anomaly detector is not configured for this deployment.
          headers:
            Retry-After:
              description: Seconds before retrying after capability enablement.
              schema: { type: integer, minimum: 1 }

  /api/v1/anomalies:
    get:
      summary: Query persisted anomaly detection events
      operationId: apiV1AnomaliesGet
      tags: [analytics]
      x-capability-required: anomaly-event-store
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: collection
          in: query
          required: false
          schema: { type: string }
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Persisted anomalies matching the supplied filter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnomalyQueryResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "503":
          description: Anomaly event store is not configured for this deployment.
          headers:
            Retry-After:
              description: Seconds before retrying after capability enablement.
              schema: { type: integer, minimum: 1 }

  /api/v1/entities/{collection}/similar:
    get:
      summary: Find entities similar to a reference entity
      operationId: apiV1EntitiesCollectionSimilarGet
      tags: [entities, ai]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: id
          in: query
          required: true
          schema: { type: string }
        - name: k
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 5
      responses:
        "200":
          description: Semantic similarity matches for the requested entity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimilarEntitiesResponse"
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/entities/{collection}/validate:
    post:
      summary: Validate a single entity payload against the collection schema
      operationId: apiV1EntitiesCollectionValidatePost
      x-capability-required: schema-validation
      description: |
        Checks the supplied payload against registered validation rules for the collection.
        Returns a list of violations when the payload is invalid. Does not persist the entity.
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FreeformObject"
      responses:
        "200":
          description: Validation outcome.
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  violations:
                    type: array
                    items:
                      type: object
                      properties:
                        field: { type: string }
                        message: { type: string }
                        code: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "503":
          description: Schema validation capability is not configured for this deployment.
          headers:
            Retry-After:
              description: Seconds before retrying after capability enablement.
              schema: { type: integer, minimum: 1 }

  /api/v1/entities/{collection}/validate/batch:
    post:
      summary: Validate multiple entity payloads in a single request
      operationId: apiV1EntitiesCollectionValidateBatchPost
      x-capability-required: schema-validation
      description: |
        Validates each payload in the `entities` array against the collection schema.
        Returns per-entity results and a top-level `allValid` flag. Does not persist entities.
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entities]
              properties:
                entities:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                  minItems: 1
                  maxItems: 1000
      responses:
        "200":
          description: Per-entity validation results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  allValid:
                    type: boolean
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index: { type: integer }
                        valid: { type: boolean }
                        violations:
                          type: array
                          items:
                            type: object
                            properties:
                              field: { type: string }
                              message: { type: string }
                              code: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "503":
          description: Schema validation capability is not configured for this deployment.
          headers:
            Retry-After:
              description: Seconds before retrying after capability enablement.
              schema: { type: integer, minimum: 1 }

  /api/v1/entities/{collection}/batch:
    post:
      summary: Upsert multiple entities in a single request
      operationId: apiV1EntitiesCollectionBatchPost
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/tenantIdQuery"

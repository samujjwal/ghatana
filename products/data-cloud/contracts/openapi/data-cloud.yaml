    get:
      summary: Get data fabric metrics (frontend alias)
      operationId: dataFabricMetricsGet
      tags: [connectors]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Data fabric metrics including connector health and sync statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreeformObject"
        "503": { description: Connector registry not available. }

  # ── User activity tracking ───────────────────────────────────────────────────

  /api/v1/user-activity/recent:
    get:
      summary: Get recent user activity
      operationId: apiV1UserActivityRecentGet
      tags: [user-activity]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Recent activity list.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true

  /api/v1/user-activity/log:
    post:
      summary: Log a user activity event
      operationId: apiV1UserActivityLogPost
      tags: [user-activity]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Activity logged successfully.

  # ── Agent catalog ────────────────────────────────────────────────────────

  /api/v1/entities/{collection}/{id}/history:
    get:
      summary: Get a point-in-time entity snapshot
      operationId: apiV1EntitiesCollectionIdHistoryGet
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/collectionPath"
        - $ref: "#/components/parameters/entityIdPath"
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: asOf
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200": { description: Point-in-time entity snapshot. }

  /api/v1/events/{offset}:
    get:
      summary: Get a single event by event-log offset
      operationId: apiV1EventsOffsetGet
      tags: [events]
      parameters:
        - name: offset
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Event at the requested offset.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Cost estimation and storage migration ────────────────────────────────

  /api/v1/queries/estimate:
    get:
      summary: Estimate the storage and execution cost of a query
      operationId: apiV1QueriesEstimateGet
      tags: [analytics]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: query
          in: query
          required: false
          schema: { type: string }
      responses:
        "200": { description: Query cost estimate. }
        "503": { description: Analytics engine not available. }

  /api/v1/queries/federated:
    post:
      summary: Execute a federated Trino query across storage tiers
      operationId: apiV1QueriesFederatedPost
      tags: [analytics]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sql]
              properties:
                sql:
                  type: string
                parameters:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Federated query result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSqlQueryResponse"
        "503": { description: Analytics engine not available. }

  /api/v1/queries/explain:
    post:
      summary: Explain a workflow execution query
      operationId: apiV1QueriesExplainPost
      tags: [analytics]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: Query to explain
                parameters:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Query explanation
          content:
            application/json:
              schema:
                type: object
                properties:
                  queryId: { type: string }
                  explanation:
                    type: object
                    additionalProperties: true
        "400": { description: Invalid query. }
        "503": { description: Analytics engine not available. }

  /api/v1/lineage/{collection}:
    get:
      summary: Get lineage graph for a collection
      operationId: apiV1LineageCollectionGet
      tags: [lineage]
      parameters:
        - name: collection
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: direction
          in: query
          required: false
          schema:
            type: string
            enum: [UPSTREAM, DOWNSTREAM, BOTH]
      responses:
        "200":
          description: Lineage graph.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineageDagResponse"
        "501": { description: Lineage plugin not configured. }

  /api/v1/lineage/{collection}/impact:
    get:
      summary: Get downstream impact analysis for a collection
      operationId: apiV1LineageCollectionImpactGet
      tags: [lineage]
      parameters:
        - name: collection
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Lineage impact analysis.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineageImpactResponse"
        "501": { description: Lineage plugin not configured. }

  /api/v1/data-quality/trust-scores:
    get:
      summary: Canonical Data Plane quality and trust scores per collection (DC-P3-003)
      operationId: apiV1DataQualityTrustScoresGet
      tags: [data-quality, governance]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: Collection-level trust score snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreeformObject"
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/collections:
    get:
      summary: List available data collections
      operationId: apiV1CollectionsGet
      tags: [entities]
      parameters:
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200":
          description: List of collections.
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/collections/{collection}/metadata:
    post:
      summary: Upsert collection metadata in the registry
      operationId: apiV1CollectionsCollectionMetadataPost
      tags: [entities]
      parameters:
        - name: collection
          in: path
          required: true
          schema: { type: string }
          description: Collection name.
        - $ref: "#/components/parameters/tenantIdQuery"
      requestBody:
        required: true
        description: |
          Collection metadata payload. Allowed fields include `lifecycleStatus`, `qualityScore`,
          `qualityMetrics`, `retentionPolicy`, `lineage`, `operationalStatus`, `label`,
          `description`, `active`, `validationSchema`, `storageProfile`, `physicalMapping`,
          `schemaVersion`. `lifecycleStatus` must be one of DRAFT, PUBLISHED, DEPRECATED, ARCHIVED.
          `operationalStatus` must be one of healthy, degraded, unavailable, maintenance.
          `qualityScore` must be a number between 0.0 and 1.0.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FreeformObject"
      responses:
        "200":
          description: Metadata upserted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreeformObject"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/BadRequest" }

  /api/v1/collections/{id}/cost-report:
    get:
      summary: Get a storage cost report for a collection
      operationId: apiV1CollectionsIdCostReportGet
      tags: [analytics]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/tenantIdQuery"
      responses:
        "200": { description: Collection storage cost report. }
        "503": { description: Analytics engine not available. }

  /api/v1/collections/{id}/migrate:
    post:
      summary: Trigger a manual storage-tier migration for a collection
      operationId: apiV1CollectionsIdMigratePost
      tags: [analytics]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/tenantIdQuery"
        - name: targetTier
          in: query
          required: false
          schema:
            type: string
            enum: [WARM, COLD]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200": { description: Migration scheduled or completed. }
        "503": { description: Tier migration scheduler not configured. }

  - path: /api/v1/queries/explain
    canonical: /api/v1/analytics/explain
    methods: [POST]
    deprecated_since: "2026-03-27"
    retirement_target: "2026-12-31"
    feature_flag: "DataCloudFeature.LEGACY_ACTION_ROUTES"
    migration_notes: |
      Use POST /api/v1/analytics/explain instead.

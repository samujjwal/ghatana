      Use POST /api/v1/action/executions/:executionId/rollback instead.
      The request/response schema is identical.
  
  - path: /api/v1/executions/:executionId/checkpoint
    canonical: /api/v1/action/executions/:executionId/checkpoint
    methods: [POST]
    deprecated_since: "2026-03-27"
    retirement_target: "2026-12-31"
    feature_flag: "DataCloudFeature.LEGACY_ACTION_ROUTES"
    migration_notes: |
      Use POST /api/v1/action/executions/:executionId/checkpoint instead.
      The request/response schema is identical.
  
  - path: /api/v1/executions/:executionId/checkpoints
    canonical: /api/v1/action/executions/:executionId/checkpoints
    methods: [GET]
    deprecated_since: "2026-03-27"
    retirement_target: "2026-12-31"
    feature_flag: "DataCloudFeature.LEGACY_ACTION_ROUTES"
    migration_notes: |

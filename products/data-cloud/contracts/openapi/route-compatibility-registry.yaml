# DC-P1-03: Route Compatibility Registry
# 
# This registry documents legacy routes that have been migrated to canonical namespaces
# and their retirement status. All Action Plane routes now live under /api/v1/action/*.
#
# Migration Guide:
# - Update clients to use canonical routes under /api/v1/action/*
# - Legacy routes are conditionally available via feature flag: DataCloudFeature.LEGACY_ACTION_ROUTES
# - Legacy routes will be removed in a future major version

legacy_routes:
  # Legacy Execution Routes (migrated to /api/v1/action/executions/*)
  - path: /api/v1/executions/:executionId
    canonical: /api/v1/action/executions/:executionId
    methods: [GET]
    deprecated_since: "2026-03-27"
    retirement_target: "2026-12-31"
    feature_flag: "DataCloudFeature.LEGACY_ACTION_ROUTES"
    migration_notes: |
      Use GET /api/v1/action/executions/:executionId instead.
      The response schema is identical.
  

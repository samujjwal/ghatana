  - path: /api/v1/executions/:executionId/rollback
    canonical: /api/v1/action/executions/:executionId/rollback
    methods: [POST]
    deprecated_since: "2026-03-27"
    retirement_target: "2026-12-31"
    feature_flag: "DataCloudFeature.LEGACY_ACTION_ROUTES"

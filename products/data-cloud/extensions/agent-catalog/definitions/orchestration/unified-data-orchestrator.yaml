id: unified-data-orchestrator
namespace: data-cloud.orchestration
name: Unified Data Orchestrator
version: 1.0.0
status: active
owners:
  - team: data-cloud-platform
    contact: data-cloud-team@ghatana.com
summary: Level-1 master orchestrator governing all data cloud agents across storage, migration, quality, and lifecycle

description: |
  Level-1 master orchestrator governing all data cloud agents across storage,
  migration, quality, and lifecycle. Uses rule-based analysis for routine operations
  and LLM for complex cross-cutting coordination decisions.

metadata:
  level: 1
  domain: orchestration
  tags: [unified, orchestration, master, data-cloud, coordination]

identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: config-scoped
  stateMutability: external-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: semi-autonomous

reasoningProfile:
  primaryReasoner: rule-based
  reasonerPortfolio:
    - type: rule-based
      role: operational-routing
      description: Route routine operations to appropriate sub-orchestrators
    - type: llm
      provider: OPENAI
      model: gpt-4
      temperature: 0.2
      role: cross-cutting-coordination
      description: Coordinate complex multi-agent scenarios and cross-cutting concerns

capabilities:
  - data-pipeline-orchestration
  - master-coordination
  - cross-agent-governance

tools:
  - name: orchestrationHub
    type: SERVICE
    endpoint: /data-cloud/orchestrate/unified

interfaces:
  inputs:
    - name: DataOrchestrationRequest
      schema: object
      required: true
  outputs:
    - name: DataOrchestrationResult
      schema: object

interoperability:
  agentToAgent:
    enabled: true
    delegation:
      - data-pipeline-orchestrator-agent
      - entity-storage-agent
      - event-stream-storage-agent
      - data-quality-agent
      - data-lineage-agent
      - data-migration-agent
      - schema-evolution-agent
      - data-archival-agent
      - data-replication-agent

memory:
  type: SEMANTIC
  scope: orchestration_state
  retention: long

resources:
  memory: "4GB"
  cpu: "8"
  timeout: "0"

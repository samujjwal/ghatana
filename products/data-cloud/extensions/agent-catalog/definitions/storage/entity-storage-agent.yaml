id: entity-storage-agent
namespace: data-cloud.storage
name: Entity Storage Agent
version: 1.0.0
status: active
owners:
  - team: data-cloud-platform
    contact: data-cloud-team@ghatana.com
summary: Deterministic CRUD entity storage with versioning, optimistic locking, and schema validation
description: Deterministic CRUD entity storage with versioning, optimistic locking, and schema validation.

metadata:
  level: 3
  domain: storage
  tags: [entity, crud, storage, versioning, optimistic-locking]

identity:
  agentType: deterministic
  subtype: rule-based
  determinismGuarantee: full
  stateMutability: external-state
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous

capabilities:
  - entity-storage
  - entity-versioning
  - schema-validation

tools:
  - name: entityStore
    type: SERVICE
    endpoint: /data-cloud/entities/store
  - name: versionManager
    type: SERVICE
    endpoint: /data-cloud/entities/versions
  - name: schemaValidator
    type: SERVICE
    endpoint: /data-cloud/entities/validate

interfaces:
  inputs:
    - name: entityRequest
      schema: object
      required: true
  outputs:
    - name: entityResult
      schema: object

memory:
  type: WORKING
  scope: entity_cache
  retention: short

resources:
  memory: "2GB"
  cpu: "4"
  timeout: "30s"

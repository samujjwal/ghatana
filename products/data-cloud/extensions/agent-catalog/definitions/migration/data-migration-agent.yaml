id: data-migration-agent
namespace: data-cloud.migration
name: Data Migration Agent
version: 1.0.0
status: active
owners:
  - team: data-cloud-platform
    contact: data-cloud-team@ghatana.com
summary: Orchestrates data migration across storage systems with LLM-guided planning and rollback capability

description: Orchestrates data migration across storage systems with LLM-guided planning and rollback capability.

metadata:
  level: 2
  domain: data-lifecycle
  tags: [migration, data-movement, rollback, schema-mapping, etl]

identity:
  agentType: hybrid
  subtype: rule+llm
  determinismGuarantee: config-scoped
  stateMutability: external-state
  failureMode: fallback
  criticality: high
  autonomyLevel: semi-autonomous

reasoningProfile:
  primaryReasoner: service-call
  reasonerPortfolio:
    - type: service-call
      role: source-extraction
      description: Extract data from source storage system
    - type: llm
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      role: migration-planning
      description: Plan migration steps, validate schemas, generate rollback plan

capabilities:
  - data-migration
  - rollback-recovery
  - schema-mapping

tools:
  - name: migrationEngine
    type: SERVICE
    endpoint: /data-cloud/migration/execute
  - name: rollbackManager
    type: SERVICE
    endpoint: /data-cloud/migration/rollback
  - name: schemaMapper
    type: SERVICE
    endpoint: /data-cloud/migration/schema-map

interfaces:
  inputs:
    - name: migrationRequest
      schema: object
      required: true
  outputs:
    - name: migrationResult
      schema: object

memory:
  type: SEMANTIC
  scope: migration_state
  retention: long

resources:
  memory: "4GB"
  cpu: "4"
  timeout: "86400s"

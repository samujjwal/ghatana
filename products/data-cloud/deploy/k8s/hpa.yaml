---
# Data-Cloud — Horizontal Pod Autoscaler
# Scales between 2 and 10 replicas based on CPU and memory utilisation.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: data-cloud
  namespace: data-cloud
  labels:
    app.kubernetes.io/name: data-cloud
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: data-cloud
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

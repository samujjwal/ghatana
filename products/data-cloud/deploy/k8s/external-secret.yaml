# Data-Cloud — ExternalSecret (External Secrets Operator)
#
# ESO watches this resource and synthesises a real Kubernetes Secret named
# `data-cloud-secret` in the `data-cloud` namespace by pulling live values
# from the vault backend configured in secret-store.yaml.
#
# The generated secret replaces the static placeholder secret.yaml which
# MUST be removed (or left empty) before applying this manifest.
#
# Vault secret paths (KV v2):
#   secret/data/data-cloud/db         → DB_USER, DB_PASSWORD
#   secret/data/data-cloud/kafka      → KAFKA_SASL_USERNAME, KAFKA_SASL_PASSWORD
#   secret/data/data-cloud/clickhouse → CLICKHOUSE_USER, CLICKHOUSE_PASSWORD
#   secret/data/data-cloud/jwt        → JWT_SECRET
# ---------------------------------------------------------------------------

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: data-cloud-external-secret
  namespace: data-cloud
  labels:
    app.kubernetes.io/name: data-cloud
    app.kubernetes.io/component: external-secret
spec:
  # How often ESO checks the backend for updated secret values.
  # On rotation in Vault the new value propagates within this window.
  refreshInterval: "5m"

  secretStoreRef:
    name: data-cloud-vault-store
    kind: SecretStore

  # The generated Kubernetes Secret that apps consume via envFrom / env.
  target:
    name: data-cloud-secret
    creationPolicy: Owner       # ESO owns the Secret; deleting ExternalSecret deletes it

    # Immutability guard: if ESO can't reach Vault the existing secret value
    # is preserved rather than deleted, preventing sudden auth failures.
    deletionPolicy: Retain

    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: data-cloud
          app.kubernetes.io/component: credentials
      # Values injected into the Secret's data map using Go template syntax.
      # The {{ .db_user }} etc. refer to the remoteRef keys fetched below.
      data:
        DB_USER:               "{{ .db_user }}"
        DB_PASSWORD:           "{{ .db_password }}"
        KAFKA_SASL_USERNAME:   "{{ .kafka_sasl_username }}"
        KAFKA_SASL_PASSWORD:   "{{ .kafka_sasl_password }}"
        CLICKHOUSE_USER:       "{{ .clickhouse_user }}"
        CLICKHOUSE_PASSWORD:   "{{ .clickhouse_password }}"
        JWT_SECRET:            "{{ .jwt_secret }}"

  # Each data entry pulls one field from the Vault KV v2 path.
  data:
    - secretKey: db_user
      remoteRef:
        key:      data-cloud/db
        property: DB_USER

    - secretKey: db_password
      remoteRef:
        key:      data-cloud/db
        property: DB_PASSWORD

    - secretKey: kafka_sasl_username
      remoteRef:
        key:      data-cloud/kafka
        property: KAFKA_SASL_USERNAME

    - secretKey: kafka_sasl_password
      remoteRef:
        key:      data-cloud/kafka
        property: KAFKA_SASL_PASSWORD

    - secretKey: clickhouse_user
      remoteRef:
        key:      data-cloud/clickhouse
        property: CLICKHOUSE_USER

    - secretKey: clickhouse_password
      remoteRef:
        key:      data-cloud/clickhouse
        property: CLICKHOUSE_PASSWORD

    - secretKey: jwt_secret
      remoteRef:
        key:      data-cloud/jwt
        property: JWT_SECRET

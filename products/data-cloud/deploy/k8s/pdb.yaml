---
# Data-Cloud — Pod Disruption Budget
# Ensures at least 1 replica is always available during node maintenance.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: data-cloud
  namespace: data-cloud
  labels:
    app.kubernetes.io/name: data-cloud
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: data-cloud

---
# Data-Cloud — ConfigMap for non-sensitive runtime configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: data-cloud-config
  namespace: data-cloud
  labels:
    app.kubernetes.io/name: data-cloud
    app.kubernetes.io/component: config
data:
  DATACLOUD_HTTP_PORT: "8082"
  DATACLOUD_GRPC_PORT: "9090"
  DATACLOUD_HTTP_ENABLED: "true"
  DATACLOUD_MAX_CONNECTIONS: "200"
  DATACLOUD_CACHE_ENABLED: "true"
  DATACLOUD_METRICS_ENABLED: "true"
  DATACLOUD_CORS_ALLOWED_ORIGINS: "https://app.ghatana.com"
  DATACLOUD_DB_URL: "jdbc:postgresql://postgres.shared-services.svc.cluster.local:5432/datacloud"
  DATACLOUD_KAFKA_ENABLED: "true"
  DATACLOUD_KAFKA_BOOTSTRAP: "kafka.shared-services.svc.cluster.local:9092"
  DATACLOUD_CLICKHOUSE_ENABLED: "true"
  DATACLOUD_CLICKHOUSE_HOST: "clickhouse.shared-services.svc.cluster.local"
  DATACLOUD_CLICKHOUSE_PORT: "8123"
  JAVA_OPTS: >-
    -XX:+UseZGC
    -XX:InitialRAMPercentage=50.0
    -XX:MaxRAMPercentage=75.0
    -XX:+ExitOnOutOfMemoryError
    -Dfile.encoding=UTF-8
    -Djava.net.preferIPv4Stack=true

---
# Data-Cloud — ClusterIP Service (internal cluster access)
apiVersion: v1
kind: Service
metadata:
  name: data-cloud
  namespace: data-cloud
  labels:
    app.kubernetes.io/name: data-cloud
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: data-cloud
  type: ClusterIP
  ports:
    - name: http
      port: 8082
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: grpc
      protocol: TCP

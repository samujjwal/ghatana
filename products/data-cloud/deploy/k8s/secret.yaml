---
# Data-Cloud — Secret template for sensitive credentials.
# ⚠️  DO NOT commit real credentials to version control.
#
# In production, use an external secret manager (e.g. AWS Secrets Manager,
# Vault, or Kubernetes External Secrets Operator) to populate this secret.
#
# To deploy: override values via Kustomize overlay, Helm values, or
# ExternalSecret CR — never hard-code passwords here.
apiVersion: v1
kind: Secret
metadata:
  name: data-cloud-secret
  namespace: data-cloud
  labels:
    app.kubernetes.io/name: data-cloud
    app.kubernetes.io/component: credentials
type: Opaque
stringData:
  DB_USER: datacloud
  # DB_PASSWORD must be supplied at deploy time via external-secrets or CI overlay.
  # Example: kubectl create secret generic data-cloud-secret --from-literal=DB_PASSWORD=<value>
  DB_PASSWORD: "" # REQUIRED — inject via external-secrets operator or CI pipeline

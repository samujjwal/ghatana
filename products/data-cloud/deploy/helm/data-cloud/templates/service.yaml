apiVersion: v1
kind: Service
metadata:
  name: {{ include "data-cloud.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "data-cloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "data-cloud.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP

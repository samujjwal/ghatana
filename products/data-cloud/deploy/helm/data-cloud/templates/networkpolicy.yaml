{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "data-cloud.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "data-cloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      {{- include "data-cloud.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNginxNamespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.httpPort }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.sameNamespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.grpcPort }}
        - protocol: TCP
          port: {{ .Values.service.httpPort }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.httpPort }}
  egress:
    - {}
{{- end }}
{{- /*
  externalsecret.yaml — External Secrets Operator integration.

  Rendered only when .Values.externalSecrets.enabled is true.
  Creates a SecretStore (backed by Vault or AWS Secrets Manager) and an
  ExternalSecret that causes ESO to synthesise the `data-cloud-secret`
  Kubernetes Secret by pulling live values from the configured backend.

  Prerequisites:
    helm repo add external-secrets https://charts.external-secrets.io
    helm install external-secrets external-secrets/external-secrets \
        -n external-secrets-system --create-namespace
*/ -}}
{{- if .Values.externalSecrets.enabled -}}
---
# ----------------------------------------------------------------------------
# SecretStore — tells ESO where and how to authenticate to the secret backend.
# ----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: {{ .Values.externalSecrets.secretStore.kind }}
metadata:
  name: {{ .Values.externalSecrets.secretStore.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "data-cloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret-store
spec:
  provider:
    vault:
      server: "https://vault.internal.ghatana.io"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "data-cloud"
          serviceAccountRef:
            name: {{ include "data-cloud.serviceAccountName" . }}
---
# ----------------------------------------------------------------------------
# ExternalSecret — declarative mapping from backend paths → K8s Secret keys.
# ----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "data-cloud.fullname" . }}-external-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "data-cloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-secret
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}

  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name }}
    kind: {{ .Values.externalSecrets.secretStore.kind }}

  target:
    name: {{ .Values.externalSecrets.targetSecretName }}
    creationPolicy: Owner
    deletionPolicy: {{ .Values.externalSecrets.deletionPolicy }}
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "data-cloud.labels" . | nindent 10 }}
          app.kubernetes.io/component: credentials
      data:
        DB_USER:             "{{ `{{` }} .db_user {{ `}}` }}"
        DB_PASSWORD:         "{{ `{{` }} .db_password {{ `}}` }}"
        KAFKA_SASL_USERNAME: "{{ `{{` }} .kafka_sasl_username {{ `}}` }}"
        KAFKA_SASL_PASSWORD: "{{ `{{` }} .kafka_sasl_password {{ `}}` }}"
        CLICKHOUSE_USER:     "{{ `{{` }} .clickhouse_user {{ `}}` }}"
        CLICKHOUSE_PASSWORD: "{{ `{{` }} .clickhouse_password {{ `}}` }}"
        JWT_SECRET:          "{{ `{{` }} .jwt_secret {{ `}}` }}"

  data:
    - secretKey: db_user
      remoteRef:
        key:      {{ .Values.externalSecrets.vaultPaths.db }}
        property: DB_USER

    - secretKey: db_password
      remoteRef:
        key:      {{ .Values.externalSecrets.vaultPaths.db }}
        property: DB_PASSWORD

    - secretKey: kafka_sasl_username
      remoteRef:
        key:      {{ .Values.externalSecrets.vaultPaths.kafka }}
        property: KAFKA_SASL_USERNAME

    - secretKey: kafka_sasl_password
      remoteRef:
        key:      {{ .Values.externalSecrets.vaultPaths.kafka }}
        property: KAFKA_SASL_PASSWORD

    - secretKey: clickhouse_user
      remoteRef:
        key:      {{ .Values.externalSecrets.vaultPaths.clickhouse }}
        property: CLICKHOUSE_USER

    - secretKey: clickhouse_password
      remoteRef:
        key:      {{ .Values.externalSecrets.vaultPaths.clickhouse }}
        property: CLICKHOUSE_PASSWORD

    - secretKey: jwt_secret
      remoteRef:
        key:      {{ .Values.externalSecrets.vaultPaths.jwt }}
        property: JWT_SECRET
{{- end }}

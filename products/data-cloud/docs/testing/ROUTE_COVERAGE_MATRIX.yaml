# Data Cloud Route Coverage Matrix

> **Week 1 (Milestone 1) Deliverable**  
> **Status**: Drafted April 4, 2026  
> **Purpose**: Track OpenAPI route coverage by test suite. Every route must have contract, behavior, and error-path tests.

## Overview

**Total Routes**: 68 (extracted from `/products/data-cloud/docs/openapi.yaml`)  
**Test Categories**:
- ✅ Contract tests (payload schema, response structure)
- ✅ Behavior tests (happy path logic)
- ✅ Error/edge tests (validation errors, auth, not-found, conflict)
- ✅ Tenant isolation tests (scoped to caller's tenantId)


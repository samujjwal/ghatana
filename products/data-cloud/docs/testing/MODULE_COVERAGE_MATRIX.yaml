## Coverage Burn-Down Timeline

### Week 4 (Milestone 1 End)

**Target**: All 13 modules at ≥70% line / ≥55% branch coverage

- `platform-api`: 7.6% → 70% (critical path: write first 30 tests)
- `platform-launcher`: 11% → 70% (12 classes with sparse test)

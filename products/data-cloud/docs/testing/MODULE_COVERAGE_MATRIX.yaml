- `platform-event`: *baseline* → 70% (new test suite)
- All others: *baseline* → 70%

**Actions**:
- [ ] Write 5 critical test suites (pipelines, entities, events, brain, analytics)
- [ ] Each suite covers 8-12 routes
- [ ] Verify coverage via `./gradlew jacocoTestCoverageReport`

### Week 8 (Milestone 2 End)

**Target**: All 13 modules at ≥80% line / ≥70% branch coverage

- Focus: Add integration tests (testcontainers, real DB)
- Replace stub implementations with real tests
- Add error-path and edge-case tests

### Week 12 (Milestone 3 End)

**Target**: All 13 modules at ≥90% line / ≥85% branch coverage

- Focus: Module burn-down (one per week)
- Structural analysis (coverage reports) for each module
- Dead code removal vs. test addition decision per package

### Week 16 (Milestone 4 End)

**Target**: All 13 modules at 100% line / 100% branch coverage ✅

- All source paths covered
- All branches tested (happy path + error)
- CI gates enforcing minimum, failing on regression


## Notes & Constraints

### Dead Code Handling

For each module, when coverage plateau is reached:
1. **Categorize uncovered code**:
   - Production path (test it)
   - Dead code (delete it)
   - Generated boilerplate (skip or schema-test it)
   - Bootstrap glue (test if initialization critical)
2. **Remove dead code first**, don't ghost-write tests for unused code.

### Skip These (Per Original Plan)

- Generated Java SDK output (`sdk/build/generated/java-sdk`) — schema parity + 1 smoke test per endpoint type, not 100%
- Boilerplate & serializers — only if on critical path
- Spring/framework plumbing — only if custom security/auth extensions

### Enforce This

- All custom business logic → 100%
- All query/filtering/sorting logic → 100%
- All error paths → 100%
- All tenant isolation → 100%
- All async state transitions → 100%

---

## Success Criteria (Per Module)

**Each module is "done"** when:
1. ✅ All REQUIREMENT matrix rows assigned to this module have tests
2. ✅ All ROUTE matrix rows (if HTTP handler) have contract + behavior + error tests
3. ✅ Line coverage ≥ interim target (70%/80%/90%/100%)
4. ✅ Branch coverage ≥ interim target (55%/70%/85%/100%)
5. ✅ No flaky tests (deterministic, proper async handling)
6. ✅ All test classes have Javadoc + @doc.* tags (Rule 9)
7. ✅ All tests follow naming and placement conventions (Rule 16)
8. ✅ Code review passed (checklist from EXECUTION_GUIDE Section 4)


# OAuth2 Configuration
# This file contains the OAuth2 provider configuration for the security module.

# OAuth2 client configuration
oauth2 {
  # Required: Client ID from your OAuth2 provider
  clientId = "your-client-id"
  
  # Required: Client secret from your OAuth2 provider
  clientSecret = "your-client-secret"
  
  # Required: Token endpoint URL
  tokenEndpoint = "https://your-oauth2-provider.com/oauth2/token"
  
  # Required: Authorization endpoint URL
  authorizationEndpoint = "https://your-oauth2-provider.com/oauth2/authorize"
  
  # Optional: User info endpoint URL (required if not using ID tokens)
  userInfoEndpoint = "https://your-oauth2-provider.com/oauth2/userinfo"
  
  # Optional: JWKS URI for token validation (required for OIDC)
  jwksUri = "https://your-oauth2-provider.com/.well-known/jwks.json"
  
  # Required: Redirect URI (must match the one registered with your OAuth2 provider)
  redirectUri = "http://localhost:8080/api/security/oauth2/callback"
  
  # Optional: Client authentication method (defaults to client_secret_basic)
  # Supported values: client_secret_basic, client_secret_post, client_secret_jwt, private_key_jwt, none
  clientAuthenticationMethod = "client_secret_basic"
  
  # Optional: Scopes to request (space-separated)
  scopes = "openid profile email"
  
  # Optional: Token endpoint authentication signing algorithm (for private_key_jwt)
  # tokenEndpointAuthSigningAlg = "RS256"
  
  # Optional: Custom claim names for user identification
  claims {
    # user_id = "sub"
    # email = "email"
    # name = "name"
    # roles = "roles"
  }
  
  # Optional: PKCE (Proof Key for Code Exchange) settings
  pkce {
    # Enable PKCE (recommended for public clients)
    enabled = true
    
    # Code challenge method (S256 or plain)
    method = "S256"
  }
  
  # Optional: Token validation settings
  validation {
    # Validate issuer (recommended)
    validateIssuer = true
    
    # Validate audience (recommended)
    validateAudience = true
    
    # Require expiration claim
    requireExpirationTime = true
    
    # Require issued-at claim
    requireIssuedAt = true
    
    # Clock skew in seconds (to account for clock differences)
    clockSkew = 60
  }
  
  # Optional: HTTP client settings
  http {
    # Connection timeout in milliseconds
    connectTimeout = 5000
    
    # Read timeout in milliseconds
    readTimeout = 5000
    
    # Maximum number of connections
    maxConnections = 20
    
    # Enable HTTP/2
    http2 = true
  }
}

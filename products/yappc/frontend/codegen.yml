# GraphQL Code Generation Configuration
# Generates TypeScript types and React Apollo hooks from GraphQL schema and operations

schema: libs/graphql/src/schema.graphql
documents:
  - 'libs/graphql/src/operations/**/*.graphql'
  - 'apps/*/src/**/*.graphql'
  - 'libs/*/src/**/*.graphql'

generates:
  # Generate TypeScript types for the schema
  libs/graphql/src/generated/types.ts:
    plugins:
      - typescript
    config:
      strictScalars: true
      scalars:
        ID: string
        String: string
        Boolean: boolean
        Int: number
        Float: number
        Date: Date
      namingConvention:
        typeNames: pascal-case#pascalCase
        enumValues: upper-case#upperCase
      typesPrefix: ''
      typesSuffix: ''
      enumsAsTypes: false
      constEnums: false
      numericEnums: false
      onlyOperationTypes: false
      addUnderscoreToArgsType: false
      skipTypename: false
      nonOptionalTypename: false
      useTypeImports: true
      dedupeOperationSuffix: false
      omitOperationSuffix: false
      exportFragmentSpreadSubTypes: false
      experimentalFragmentVariables: false

  # Generate TypeScript types and Apollo hooks for operations
  libs/graphql/src/generated/hooks.ts:
    plugins:
      - typescript-operations
      - typescript-react-apollo
    config:
      strictScalars: true
      scalars:
        ID: string
        String: string
        Boolean: boolean
        Int: number
        Float: number
        Date: Date
      withHooks: true
      withComponent: false
      withHOC: false
      withMutationFn: true
      apolloReactHooksImportFrom: '@apollo/client'
      reactApolloVersion: 3
      addDocBlocks: true
      skipTypename: false
      nonOptionalTypename: false
      useTypeImports: true
      dedupeOperationSuffix: false
      omitOperationSuffix: false
      exportFragmentSpreadSubTypes: false
      experimentalFragmentVariables: false
      importTypesFrom: './types'

  # Generate introspection data for tooling
  libs/graphql/src/generated/introspection.json:
    plugins:
      - introspection
    config:
      minify: true

  # Generate schema AST for runtime usage
  libs/graphql/src/generated/schema.graphql:
    plugins:
      - schema-ast
    config:
      includeDirectives: false
      includeIntrospectionTypes: false

hooks:
  # Hook to run after code generation completes
  afterAllFileWrite:
    - prettier --write libs/graphql/src/generated/**/*.ts

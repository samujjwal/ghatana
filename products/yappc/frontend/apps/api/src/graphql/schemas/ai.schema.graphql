# AI Features GraphQL Schema

"""
AI Insight generated by the platform
"""
type AIInsight {
  id: ID!
  type: String!
  category: String!
  title: String!
  description: String!
  confidence: Float!
  severity: String!
  actionable: Boolean!
  suggestedActions: JSON!
  relatedItems: [String!]!
  expiresAt: DateTime
  createdAt: DateTime!
  model: String!
  reasoning: String
  itemId: String
  item: Item
}

"""
Prediction for future events or risks
"""
type Prediction {
  id: ID!
  type: String!
  probability: Float!
  timeline: String!
  affectedItems: [String!]!
  suggestedMitigation: JSON!
  model: String!
  confidence: Float!
  createdAt: DateTime!
  expiresAt: DateTime!
  phaseId: String
  phase: Phase
}

"""
Anomaly alert for unusual patterns
"""
type AnomalyAlert {
  id: ID!
  type: String!
  severity: String!
  title: String!
  description: String!
  detectedAt: DateTime!
  affectedItems: [String!]!
  baselineValue: Float
  currentValue: Float
  deviationPercent: Float
  suggestedActions: JSON!
  acknowledged: Boolean!
  acknowledgedAt: DateTime
  acknowledgedBy: String
  resolvedAt: DateTime
  falsePositive: Boolean!
  confidence: Float!
  modelVersion: String!
}

"""
AI Copilot conversation session
"""
type CopilotSession {
  id: ID!
  userId: String!
  persona: String!
  messages: JSON!
  context: JSON!
  startedAt: DateTime!
  endedAt: DateTime
  tokensUsed: Int!
  costUSD: Float!
  satisfactionRating: Int
}

"""
Copilot message response
"""
type CopilotMessageResponse {
  sessionId: String!
  message: String!
  tokensUsed: Int!
}

"""
AI metrics summary
"""
type AIMetricsSummary {
  totalRequests: Int!
  successRate: Float!
  totalTokens: Int!
  totalCost: Float!
  avgLatency: Float!
}

"""
Input for filtering AI insights
"""
input InsightFilterInput {
  type: [String!]
  category: [String!]
  severity: [String!]
  itemId: String
  limit: Int
  offset: Int
}

"""
Input for filtering predictions
"""
input PredictionFilterInput {
  type: [String!]
  phaseId: String
  minProbability: Float
  limit: Int
  offset: Int
}

"""
Input for filtering anomalies
"""
input AnomalyFilterInput {
  type: [String!]
  severity: [String!]
  acknowledged: Boolean
  limit: Int
  offset: Int
}

"""
Input for sending copilot message
"""
input CopilotMessageInput {
  sessionId: String!
  message: String!
  context: JSON
}

extend type Query {
  """
  Get AI insights with optional filtering
  """
  aiInsights(filter: InsightFilterInput): [AIInsight!]!

  """
  Get predictions with optional filtering
  """
  predictions(filter: PredictionFilterInput): [Prediction!]!

  """
  Get anomaly alerts with optional filtering
  """
  anomalies(filter: AnomalyFilterInput): [AnomalyAlert!]!

  """
  Get copilot session by ID
  """
  copilotSession(sessionId: String!): CopilotSession

  """
  Get AI metrics summary for a time range
  """
  aiMetricsSummary(timeRangeHours: Int): AIMetricsSummary!
}

extend type Mutation {
  """
  Acknowledge an anomaly alert
  """
  acknowledgeAnomaly(anomalyId: String!): AnomalyAlert!

  """
  Send message to AI Copilot
  """
  sendCopilotMessage(input: CopilotMessageInput!): CopilotMessageResponse!

  """
  Mark anomaly as false positive
  """
  markAnomalyFalsePositive(anomalyId: String!): AnomalyAlert!

  """
  Rate copilot session (1-5 stars)
  """
  rateCopilotSession(sessionId: String!, rating: Int!): CopilotSession!
}

# Prometheus Configuration for YAPPC Dashboard
# Scrapes metrics from YAPPC backend and infrastructure components

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "yappc-production"
    environment: "prod"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Rule files — loaded from infrastructure/monitoring/alerts/
rule_files:
  - "infrastructure/monitoring/alerts/*.yml"

# Scrape configurations
scrape_configs:
  # YAPPC Backend Application (Spring Boot Actuator)
  - job_name: "yappc-backend"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["yappc-backend:8080"]
        labels:
          service: "yappc-backend"
          tier: "application"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: "${1}"

  # PostgreSQL Exporter
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgresql"
          tier: "database"

  # Redis Exporter
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"
          tier: "cache"

  # Prometheus Self-Monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"
          tier: "monitoring"

  # Node Exporter (System Metrics)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "node-exporter"
          tier: "infrastructure"

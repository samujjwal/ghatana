name: Go
versions:
  - "1.19"
  - "1.20"
  - "1.21"
  - "1.22"
  - "1.23"

packageManagement:
  primary: go-modules
  files:
    - go.mod
    - go.sum
  commands:
    init: "go mod init {{modulePath}}"
    add: "go get {{package}}"
    tidy: "go mod tidy"
    vendor: "go mod vendor"
    download: "go mod download"

buildSystems:
  native:
    files:
      - "*.go"
    commands:
      build: "go build ./..."
      test: "go test ./..."
      run: "go run {{mainFile}}"
      clean: "go clean"
      install: "go install ./..."
    outputs:
      - binary
      - shared-library

  make:
    files:
      - Makefile
    commands:
      build: "make build"
      test: "make test"
      clean: "make clean"
      install: "make install"
    targets:
      - build
      - test
      - clean
      - install
      - docker

  bazel:
    files:
      - BUILD.bazel
      - WORKSPACE
    commands:
      build: "bazel build //..."
      test: "bazel test //..."
    targets:
      - "//..."
      - "//cmd/..."

frameworks:
  gin:
    templates:
      - go-service-gin
    conventions:
      - cmd/
      - internal/
      - pkg/
      - api/
    testing:
      - testify
      - httptest

  chi:
    templates:
      - go-service-chi
    conventions:
      - cmd/
      - internal/
      - pkg/
    testing:
      - testify
      - httptest

  echo:
    templates:
      - go-service-echo
    conventions:
      - cmd/
      - internal/
      - pkg/
    testing:
      - testify
      - httptest

testing:
  frameworks:
    - testing
    - testify
    - gomock
    - ginkgo
  conventions:
    - "*_test.go"
    - "TestXxx"
    - "BenchmarkXxx"
  coverage:
    - "go test -cover"
    - "go tool cover"

linting:
  tools:
    - golangci-lint
    - gofmt
    - goimports
    - golint
    - staticcheck
  config:
    - .golangci.yml
    - .editorconfig

conventions:
  directory:
    - cmd
    - pkg
    - internal
    - api
    - configs
    - scripts
    - docs
  naming:
    - PascalCase
    - camelCase
  imports:
    - grouped
    - stdlib-first
    - local-last

# YAPPC Lifecycle Platform Configuration

server:
  port: 8080
  host: 0.0.0.0
  
yappc:
  version: 1.0.0
  environment: ${YAPPC_ENV:development}
  
  # AI Integration
  ai:
    provider: openai
    model: gpt-4
    temperature: 0.3
    max_tokens: 2000
    timeout_seconds: 30
    
  # Storage
  storage:
    type: data-cloud
    base_path: /yappc/artifacts
    versioning: enabled
    retention_days: 90
    
  # Events
  events:
    enabled: true
    publisher: data-cloud
    topic_prefix: yappc
    
  # Observability
  observability:
    metrics:
      enabled: true
      export_interval_seconds: 10
      tags:
        service: yappc-lifecycle
        version: 1.0.0
    traces:
      enabled: true
      sampling_rate: 1.0
      exporter: otlp
    logs:
      level: INFO
      format: json
      
  # Security
  security:
    authentication:
      enabled: true
      type: jwt
      issuer: ${JWT_ISSUER:ghatana}
      audience: ${JWT_AUDIENCE:yappc}
    authorization:
      enabled: true
      policy: rbac
    audit:
      enabled: true
      retention_days: 90
      
  # Plugins
  plugins:
    enabled: true
    scan_packages:
      - com.ghatana.yappc.plugins
    auto_load: true
    
  # Pipeline Execution
  pipeline:
    default_timeout_seconds: 3600
    max_parallelism: 4
    retry:
      max_attempts: 3
      backoff: exponential
      initial_delay_ms: 1000
      max_delay_ms: 30000
      
# Logging
logging:
  level:
    root: INFO
    com.ghatana.yappc: DEBUG
    io.activej: INFO
    
# Database (if needed)
database:
  url: ${DB_URL:jdbc:postgresql://localhost:5432/yappc}
  username: ${DB_USERNAME:yappc}
  password: ${DB_PASSWORD:yappc}
  pool:
    min_size: 5
    max_size: 20
    
# Redis (for caching)
redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  database: 0
  timeout_ms: 5000

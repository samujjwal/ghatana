# Code Reviewer Agent - Auto-migrated from Java
# Original: CodeReviewerAgent.java, CodeReviewerInput.java, CodeReviewerOutput.java

agent:
  id: code.reviewer
  name: "Code Reviewer"
  description: "Automated code reviewer providing quality feedback and suggestions"
  version: "1.0.0"
  
  tags: [code-review, quality, static-analysis]
  capabilities: [analysis, review, suggestions, best-practices]
  
  input_schema: schemas/code-reviewer-input.json
  output_schema: schemas/code-reviewer-output.json
  
  generator:
    type: llm
    prompt_template: prompts/code-reviewer.txt
    model: gpt-4
    temperature: 0.5
    max_tokens: 3000
    max_retries: 3
  
  validation:
    input_schema: schemas/code-reviewer-input.json
    output_schema: schemas/code-reviewer-output.json
    strict: true
  
  cache:
    enabled: true
    ttl: 1800
    key_fields: [codeSnippet, language]
  
  # AEP Event Processing Integration
  event_processing:
    input_event_types:
      - "code.review.requested"
      - "pull.request.opened"
    output_event_types:
      - "code.review.completed"
      - "pull.request.review.posted"
    dead_letter_queue: "yappc.dlq.code-reviewer"
    ordering: per_tenant
    max_in_flight: 10

  metadata:
    cost_per_request: 0.04
    average_tokens: 2000
    category: code-quality

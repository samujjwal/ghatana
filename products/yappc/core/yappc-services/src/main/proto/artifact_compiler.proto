syntax = "proto3";

package com.ghatana.yappc.artifact;

option java_package = "com.ghatana.yappc.artifact.grpc";
option java_multiple_files = true;

// P1-19: Updated with canonical contract for workspace scope, residual islands, and source file refs

// SnapshotRef provides stable cross-scan identity anchor
message SnapshotRef {
  string provider = 1;
  string repo_id = 2;
  string commit_sha = 3;
  string branch = 4;
}

message SourceLocator {
  string provider = 1;
  string repo_id = 2;
  string ref = 3;
  string path = 4;
  string credential_ref = 5;
}

message SnapshotFile {
  string relative_path = 1;
  string absolute_path = 2;
  int64 size_bytes = 3;
  string last_modified_at = 4;
  bool materialized = 5;
  string checksum = 6; // P1-19: Added SHA-256 checksum for content fidelity
}

message RepositorySnapshot {
  string snapshot_id = 1;
  SnapshotRef snapshot_ref = 2;
  string local_root_path = 3;
  string content_checksum = 4;
  string content_hash = 5; // P1-19: Added deterministic content hash
  string snapshot_at = 6;
  repeated SnapshotFile files = 7;
  map<string, string> diagnostics = 8;
  
  // P1-19: Added workspace and tenant scope
  string tenant_id = 9;
  string workspace_id = 10;
  string project_id = 11;
}

// P1-19: Added SourceFileRef for canonical durable file identity
message SourceFileRef {
  string file_ref_id = 1;
  string repository_id = 2;
  string relative_path = 3;
  string content_hash = 4;
  int64 size_bytes = 5;
  string file_type = 6;
  string language = 7;
  string last_modified_at = 8;
  string first_seen_snapshot_id = 9;
  string last_seen_snapshot_id = 10;
  map<string, string> metadata = 11;
  
  string tenant_id = 12;
  string workspace_id = 13;
  string project_id = 14;
}

// SourceLocation tracks precise source file positions
message SourceLocation {
  string file_path = 1;
  int32 start_line = 2;
  int32 start_column = 3;
  int32 end_line = 4;
  int32 end_column = 5;
}

// ArtifactNode represents a single extracted artifact node (component, page, model, etc.)
message ArtifactNode {
  string id = 1;
  string type = 2;
  string name = 3;
  string file_path = 4;
  string content = 5;
  map<string, string> properties = 6;
  repeated string tags = 7;
  string tenant_id = 8;
  string project_id = 9;
  string workspace_id = 10; // P1-19: Added workspace scope
  
  // V12: Snapshot reference for stable identity
  SnapshotRef snapshot_ref = 11;
  
  // V12: Precise source location with range information
  SourceLocation source_location = 12;
  
  // V12: Confidence score (0.0 to 1.0)
  double confidence = 13;
  
  // V12: Provenance metadata
  string provenance = 14;
  string extractor_id = 15;
  string extractor_version = 16;
  
  // V12: Residual fragment IDs for unmodelable code
  repeated string residual_fragment_ids = 17;
  
  // V12: Security and privacy flags
  repeated string security_flags = 18;
  repeated string privacy_flags = 19;
}

// ArtifactEdge represents a directed relationship between two artifact nodes.
message ArtifactEdge {
  string edge_id = 1; // P1-19: Added edge ID for stable identity
  string source_node_id = 2;
  string target_node_id = 3;
  string relationship_type = 4;
  map<string, string> properties = 5;
  
  // V12: Confidence score (0.0 to 1.0)
  double confidence = 6;
  
  // V12: Bidirectional flag
  bool bidirectional = 7;
  
  string tenant_id = 8; // P1-19: Added tenant scope
  string project_id = 9; // P1-19: Added project scope
  string workspace_id = 10; // P1-19: Added workspace scope
}

// UnresolvedGraphEdge - Phase 1 extractor output (pre-resolution)
message UnresolvedGraphEdge {
  string edge_id = 1; // P1-19: Added edge ID
  string source_node_id = 2;
  string target_ref = 3;
  string relationship_type = 4; // P0: Normalized from relationship to match resolved edges
  string target_kind_hint = 5;
  double confidence = 6;
  map<string, string> metadata = 7;
  
  string tenant_id = 8; // P1-19: Added tenant scope
  string project_id = 9; // P1-19: Added project scope
  string workspace_id = 10; // P1-19: Added workspace scope
}

// EdgeResolutionRecord tracks resolution outcomes
message EdgeResolutionRecord {
  string record_id = 1; // P1-19: Added record ID
  string unresolved_edge_id = 2;
  string status = 3;
  string resolved_target_id = 4;
  repeated string candidate_ids = 5;
  bool review_required = 6;
  string resolution_method = 7;
  
  string tenant_id = 8; // P1-19: Added tenant scope
  string project_id = 9; // P1-19: Added project scope
  string workspace_id = 10; // P1-19: Added workspace scope
}

// P1-19: Updated ResidualIsland with full schema for source fidelity
// P0: Added original_source and source_location for complete round-trip fidelity
message ResidualIsland {
  string id = 1;
  string island_type = 2;
  string summary = 3;
  string original_source = 4; // P0: Original source code fragment for round-trip fidelity
  SourceLocation source_location = 5; // P0: Precise source location
  string source_span = 6; // P1-19: Added source span (kept for compatibility)
  string checksum = 7; // P1-19: Added checksum
  string raw_fragment_ref = 8; // P1-19: Added raw fragment reference
  string reason = 9; // P1-19: Added reason
  double confidence = 10;
  bool review_required = 11; // P1-19: Added review requirement
  double risk_score = 12; // P1-19: Added risk score
  map<string, string> metadata = 13;
  int32 file_count = 14; // P1-19: Added file count

  string tenant_id = 15; // P1-19: Added tenant scope
  string project_id = 16; // P1-19: Added project scope
  string workspace_id = 17; // P1-19: Added workspace scope
  string snapshot_id = 18; // P1-19: Added snapshot ID
}

// IngestArtifactGraphRequest streams nodes and edges for high-volume ingestion.
message IngestArtifactGraphRequest {
  string project_id = 1; // P0: Normalized from product_id to match Java DTOs
  string tenant_id = 2;
  string workspace_id = 3; // P1-19: Added workspace scope
  repeated ArtifactNode nodes = 4;
  repeated ArtifactEdge edges = 5;
  
  // V12: Unresolved edges for two-phase resolution
  repeated UnresolvedGraphEdge unresolved_edges = 6;
  
  // V12: Edge resolution records
  repeated EdgeResolutionRecord edge_resolution_records = 7;
  
  // V12: Snapshot reference for the ingest
  SnapshotRef snapshot_ref = 8;
  
  // V12: Residual islands (unmodelable code preserved verbatim)
  // P0: Deprecated - use residual_islands only for full fidelity
  repeated string residual_island_ids = 9 [deprecated = true];
  
  // P1-19: Added full residual islands
  repeated ResidualIsland residual_islands = 10;
  
  // P1-19: Added snapshot metadata
  string snapshot_id = 11;
  string version_id = 12;
  string content_checksum = 13;
}

message IngestArtifactGraphResponse {
  bool success = 1;
  int64 node_count = 2;
  int64 edge_count = 3;
  string version_id = 4;
  string message = 5;
  
  // V12: Content checksum for verification
  string content_checksum = 6;
  
  // V12: Snapshot ID for this ingest
  string snapshot_id = 7;
  
  // V12: Tombstone flag for deleted snapshots
  bool is_tombstone = 8;
}

// ArtifactGraphAnalysisRequest requests one or more algorithms over a product graph.
message ArtifactGraphAnalysisRequest {
  string project_id = 1; // P0: Normalized from product_id to match Java DTOs
  string tenant_id = 2;
  string workspace_id = 3; // P1-19: Added workspace scope
  repeated string algorithm_types = 4;
  repeated string node_ids = 5;
}

message ArtifactGraphAnalysisResponse {
  repeated AlgorithmResult results = 1;
}

message AlgorithmResult {
  string algorithm = 1;
  map<string, double> centrality_scores = 2;
  repeated CycleList cycles = 3;
  repeated CommunityList communities = 4;
  repeated string topological_order = 5;
  map<string, string> metadata = 6;
}

message CycleList {
  repeated string node_ids = 1;
}

message CommunityList {
  repeated string node_ids = 1;
}

// ArtifactGraphQueryRequest queries the graph by type (orphaned, dependencies, dependents, stats).
message ArtifactGraphQueryRequest {
  string project_id = 1; // P0: Normalized from product_id to match Java DTOs
  string tenant_id = 2;
  string workspace_id = 3; // P1-19: Added workspace scope
  string query_type = 4;
  repeated string seed_ids = 5;
  string cursor = 6; // P1-19: Added cursor for pagination
  int32 limit = 7; // P1-19: Added limit for pagination
  string snapshot_id = 8; // P1-19: Added snapshot ID
  bool include_unresolved_edges = 9; // P1-19: Added unresolved edges flag
}

message ArtifactGraphQueryResponse {
  map<string, string> string_results = 1;
  map<string, NodeList> list_results = 2;
  
  // P1-19: Added pagination metadata
  string next_cursor = 3;
  bool has_more = 4;
  int32 total_estimate = 5;
  
  // P1-19: Added scope metadata
  ScopeMetadata scope_metadata = 6;
}

message ScopeMetadata {
  string tenant_id = 1;
  string workspace_id = 2;
  string project_id = 3;
  string snapshot_id = 4;
  bool include_unresolved_edges = 5;
}

message NodeList {
  repeated string node_ids = 1;
}

// ArtifactGraphMergeRequest performs a three-way semantic merge.
message ArtifactGraphMergeRequest {
  string project_id = 1; // P0: Normalized from product_id to match Java DTOs
  string tenant_id = 2;
  string workspace_id = 3; // P1-19: Added workspace scope
  string base_model_json = 4;
  string left_model_json = 5;
  string right_model_json = 6;
  string resolution_strategy = 7;
}

message ArtifactGraphMergeResponse {
  bool success = 1;
  string merged_model_json = 2;
  repeated MergeConflict conflicts = 3;
  map<string, string> field_provenance = 4;
  int64 conflict_count = 5;
}

message ChangePlan {
  string id = 1;
  string snapshot_id = 2;
  string version_id = 3;
  string created_at = 4;
  string model_checksum = 5;
}

message FilePatch {
  string relative_path = 1;
  string patch_diff = 2;
  string emitter_id = 3;
  string source_change_op_id = 4;
  string base_checksum = 5;
  string target_checksum = 6;
}

message PatchSet {
  string id = 1;
  string change_plan_id = 2;
  string status = 3;
  repeated FilePatch file_patches = 4;
}

message ReviewBundle {
  string id = 1;
  string patch_set_id = 2;
  string status = 3;
  bool review_required = 4;
}

message MergeConflict {
  string field_path = 1;
  string conflict_type = 2;
  string base_value = 3;
  string left_value = 4;
  string right_value = 5;
}

// High-volume artifact streaming service between TypeScript scanner and Java backend.
service ArtifactCompilerService {
  rpc IngestArtifactGraph (stream IngestArtifactGraphRequest) returns (IngestArtifactGraphResponse);
  rpc AnalyzeArtifactGraph (ArtifactGraphAnalysisRequest) returns (ArtifactGraphAnalysisResponse);
  rpc QueryArtifactGraph (ArtifactGraphQueryRequest) returns (ArtifactGraphQueryResponse);
  rpc MergeArtifactModels (ArtifactGraphMergeRequest) returns (ArtifactGraphMergeResponse);
}

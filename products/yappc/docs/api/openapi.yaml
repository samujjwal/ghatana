# ─────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for internal service-to-service authentication. Use for backend services and automated tools. Not for browser clients.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token for internal service authentication. Use for backend services and automated tools. Not for browser clients.
    CookieAuth:
      type: apiKey
      in: cookie
      name: yappc_session
      description: Cookie-based session authentication for browser clients. Use for web UI and browser-based access. The session cookie is httpOnly and managed by the server.

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    # Authorization scope parameter (task 1.2.3)
    # Backend extraction policy: path > query > header
    # For routes with path parameters (e.g., /api/v1/projects/{projectId}), scope is extracted from path
    # For other routes, pass scope as query parameter (?scope=project:read)
    # Header-based scope passing (X-Scope: project:read) is supported but has lowest priority
    ScopeQuery:
      name: scope
      in: query
      required: false
      description: |
        Authorization scope for the request (e.g., project:read, workspace:write, admin).
        
        Scope determines what permissions are required to access the resource.
        Common scopes:
        - workspace:read - read access to workspace resources
        - workspace:write - write access to workspace resources
        - project:read - read access to project resources
        - project:write - write access to project resources
        - admin - administrative access
        
        Backend extraction policy (priority order):
        1. Path parameters (e.g., /api/v1/projects/{projectId} extracts project:read)
        2. Query parameter (?scope=project:read)
        3. Header (X-Scope: project:read)
        
        For most routes, scope is optional and inferred from the session/credentials.
        Explicit scope is required for cross-tenant or elevated operations.
      schema:
        type: string
        enum: [workspace:read, workspace:write, project:read, project:write, admin]
      example: project:read
    ScopeHeader:
      name: X-Scope
      in: header
      required: false
      description: |
        Authorization scope header (alternative to query parameter).
        See ScopeQuery parameter for full documentation.
        Has lowest priority in extraction policy (path > query > header).
      schema:
        type: string
        example: project:read

  responses:
    BadRequest:
      description: Bad request — invalid or missing parameters
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Forbidden:
      description: Permission denied
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Conflict:
      description: Resource conflict (e.g. duplicate or concurrent edit)
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    UnprocessableEntity:
      description: Semantically invalid request body
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    InternalServerError:
      description: Unexpected server error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

  schemas:

    # ── Capability schemas ─────────────────────────────────────────────────────

    CapabilityRequest:
      type: object
      required: [workspaceId]
      properties:
        tenantId:
          type: string
          description: Tenant ID (optional, validated against principal)
        workspaceId:
          type: string
          description: Workspace ID
        projectId:
          type: string
          description: Project ID (optional)
        correlationId:
          type: string
          description: Optional correlation ID for tracing

    CapabilityResponse:
      type: object
      required: [userId, workspaceCapabilities, projectCapabilities, lifecycleCapabilities]
      properties:
        userId:
          type: string
        workspaceId:
          type: string
        projectId:
          type: string
        role:
          type: string
          enum: [OWNER, ADMIN, DEVELOPER, VIEWER]
        workspaceCapabilities:
          type: object
          properties:
            canCreate:
              type: boolean
            canUpdate:
              type: boolean
            canDelete:
              type: boolean
        projectCapabilities:
          type: object
          properties:
            canCreate:
              type: boolean
            canUpdate:
              type: boolean
            canDelete:
              type: boolean
            canRead:
              type: boolean
        lifecycleCapabilities:
          type: array
          items:
            type: object
            properties:
              phase:
                type: string
                enum: [intent, shape, validate, generate, run, observe, learn, evolve]
              canExecute:
                type: boolean
              canApprove:
                type: boolean
              canReject:
                type: boolean

    # ── Phase Cockpit schemas ─────────────────────────────────────────────────

    PhasePacketRequest:
      type: object
      required: [phase, projectId]
      properties:
        phase:
          type: string
          enum: [intent, shape, validate, generate, run, observe, learn, evolve]
        tenantId:
          type: string
          description: Tenant ID (optional, validated against principal)
        projectId:
          type: string
        workspaceId:
          type: string
          description: Workspace ID (optional)
        correlationId:
          type: string
          description: Optional correlation ID for tracing

    PhaseCockpitPacket:
      type: object
      required: [phase, projectId, tenantId, workspaceId, actor, tenantTier, enabledPhaseFlags, capabilities, blockers, readiness, requiredArtifacts, completedArtifacts, activityFeed, evidence, governance, availableActions, dashboardActions, healthSignals, timestamp]
      properties:
        phase:
          type: string
          enum: [intent, shape, validate, generate, run, observe, learn, evolve]
        projectId:
          type: string
        projectName:
          type: string
        tenantId:
          type: string
        workspaceId:
          type: string
        workspaceName:
          type: string
        actor:
          $ref: "#/components/schemas/ActorContext"
        lifecyclePhase:
          type: string
        tenantTier:
          type: string
          enum: [FREE, PRO, ENTERPRISE]
        enabledPhaseFlags:
          type: array
          items:
            type: string
        capabilities:
          $ref: "#/components/schemas/CapabilityModel"
        blockers:
          type: array
          items:
            $ref: "#/components/schemas/PhaseBlocker"
        readiness:
          $ref: "#/components/schemas/PhaseReadiness"
        requiredArtifacts:
          type: array
          items:
            $ref: "#/components/schemas/RequiredArtifact"
        completedArtifacts:
          type: array
          items:
            $ref: "#/components/schemas/CompletedArtifact"
        activityFeed:
          type: array
          items:
            $ref: "#/components/schemas/ActivityFeedEntry"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/PhaseEvidence"
        governance:
          type: array
          items:
            $ref: "#/components/schemas/GovernanceRecord"
        platformRunStatus:
          $ref: "#/components/schemas/PlatformRunStatus"
        availableActions:
          type: array
          items:
            $ref: "#/components/schemas/PhaseAction"
        dashboardActions:
          $ref: "#/components/schemas/DashboardActionClassification"
        healthSignals:
          $ref: "#/components/schemas/HealthSignals"
        timestamp:
          type: integer
          format: int64
        correlationId:
          type: string

    ActorContext:
      type: object
      required: [actorId, actorName, role, isOwner, isAdmin]
      properties:
        actorId:
          type: string
        actorName:
          type: string
        role:
          type: string
        isOwner:
          type: boolean
        isAdmin:
          type: boolean

    CapabilityModel:
      type: object
      required: [canRead, canCreate, canUpdate, canDelete, canApprove, canReject, canRollback]
      properties:
        canRead:
          type: boolean
        canCreate:
          type: boolean
        canUpdate:
          type: boolean
        canDelete:
          type: boolean
        canApprove:
          type: boolean
        canReject:
          type: boolean
        canRollback:
          type: boolean

    PhaseBlocker:
      type: object
      required: [id, type, title, description, severity, resourceId, resolvable]
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        resourceId:
          type: string
        resolvable:
          type: boolean

    PhaseReadiness:
      type: object
      required: [canAdvance, nextPhase, missingPrerequisites, completenessScore, isDegraded]
      properties:
        canAdvance:
          type: boolean
        nextPhase:
          type: string
        missingPrerequisites:
          type: array
          items:
            type: string
        completenessScore:
          type: number
          format: double
        isDegraded:
          type: boolean

    RequiredArtifact:
      type: object
      required: [artifactId, artifactType, title, description, isComplete]
      properties:
        artifactId:
          type: string
        artifactType:
          type: string
        title:
          type: string
        description:
          type: string
        isComplete:
          type: boolean

    CompletedArtifact:
      type: object
      required: [artifactId, artifactType, title, completedAt, completedBy]
      properties:
        artifactId:
          type: string
        artifactType:
          type: string
        title:
          type: string
        completedAt:
          type: string
          format: date-time
        completedBy:
          type: string

    ActivityFeedEntry:
      type: object
      required: [id, type, action, summary, actor, timestamp, severity]
      properties:
        id:
          type: string
        type:
          type: string
        action:
          type: string
        summary:
          type: string
        actor:
          type: string
        timestamp:
          type: string
          format: date-time
        severity:
          type: string
          enum: [INFO, WARNING, ERROR]

    PhaseEvidence:
      type: object
      required: [id, type, title, description, timestamp, metadata, evidenceId]
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        description:
          type: string
        timestamp:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
        evidenceId:
          type: string

    GovernanceRecord:
      type: object
      required: [id, type, outcome, actor, timestamp, metadata, policyDecisionId]
      properties:
        id:
          type: string
        type:
          type: string
        outcome:
          type: string
        actor:
          type: string
        timestamp:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
        policyDecisionId:
          type: string

    PlatformRunStatus:
      type: object
      required: [runId, status, platform, startedAt, traceId, evidenceIds]
      properties:
        runId:
          type: string
        status:
          type: string
        platform:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        traceId:
          type: string
        evidenceIds:
          type: array
          items:
            type: string

    PhaseAction:
      type: object
      required: [actionId, label, description, enabled, requiredPermission, parameters]
      properties:
        actionId:
          type: string
        label:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        disabledReason:
          type: string
        requiredPermission:
          type: string
        parameters:
          type: object
          additionalProperties: true

    DashboardActionClassification:
      type: object
      required: [primaryAction, blockedActions, reviewRequiredActions, safeToContinueActions]
      properties:
        primaryAction:
          type: string
        blockedActions:
          type: array
          items:
            type: string
        reviewRequiredActions:
          type: array
          items:
            type: string
        safeToContinueActions:
          type: array
          items:
            type: string

    HealthSignals:
      type: object
      required: [preview, generation, runtime]
      properties:
        preview:
          $ref: "#/components/schemas/PreviewHealth"
        generation:
          $ref: "#/components/schemas/GenerationHealth"
        runtime:
          $ref: "#/components/schemas/RuntimeHealth"

    PreviewHealth:
      type: object
      required: [isHealthy, status, issues]
      properties:
        isHealthy:
          type: boolean
        status:
          type: string
        issues:
          type: array
          items:
            type: string

    GenerationHealth:
      type: object
      required: [isHealthy, status, issues]
      properties:
        isHealthy:
          type: boolean
        status:
          type: string
        lastGeneratedAt:
          type: string
          format: date-time
        issues:
          type: array
          items:
            type: string

    RuntimeHealth:
      type: object
      required: [isHealthy, status, issues]
      properties:
        isHealthy:
          type: boolean
        status:
          type: string
        lastDeployedAt:
          type: string
          format: date-time
        issues:
          type: array
          items:
            type: string

    # ── Dashboard Action schemas ───────────────────────────────────────────────

    DashboardActionRequest:
      type: object
      required: [workspaceId]
      properties:
        tenantId:
          type: string
          description: Tenant ID (optional, validated against principal)
        workspaceId:
          type: string
        correlationId:
          type: string
          description: Optional correlation ID for tracing

    ProjectDashboardActions:
      type: object
      required: [projectId, primaryAction, blockedActions, reviewRequiredActions, safeToContinueActions, reasonLabel, isDegraded, timestamp]
      properties:
        projectId:
          type: string
        projectName:
          type: string
        primaryAction:
          type: string
        blockedActions:
          type: array
          items:
            type: string
        reviewRequiredActions:
          type: array
          items:
            type: string
        safeToContinueActions:
          type: array
          items:
            type: string
        reasonLabel:
          type: string
        isDegraded:
          type: boolean
        timestamp:
          type: integer
          format: int64

    # ── Workspace and project schemas ────────────────────────────────────────

    ProjectType:
      type: string
      enum: [UI, BACKEND, MOBILE, DESKTOP, FULL_STACK]

    ProjectStatus:
      type: string
      enum: [DRAFT, ACTIVE, COMPLETED, ARCHIVED]

    ProjectLifecyclePhase:
      type: string
      description: Canonical mounted lifecycle phase with accepted legacy compatibility aliases.
      enum: [INTENT, SHAPE, CONTEXT, VALIDATE, PLAN, GENERATE, EXECUTE, RUN, VERIFY, OBSERVE, LEARN, IMPROVE, EVOLVE, INSTITUTIONALIZE]

    Workspace:
      type: object
      required: [id, name, ownerId, isDefault, aiTags, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        ownerId:
          type: string
        isDefault:
          type: boolean
        projectCount:
          type: integer
        memberCount:
          type: integer
        aiSummary:
          type: string
        aiTags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Project:
      type: object
      required:
        [id, name, type, status, ownerWorkspaceId, isDefault, aiNextActions, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/ProjectType"
        status:
          $ref: "#/components/schemas/ProjectStatus"
        lifecyclePhase:
          $ref: "#/components/schemas/ProjectLifecyclePhase"
        ownerWorkspaceId:
          type: string
        isDefault:
          type: boolean
        aiSummary:
          type: string
        aiNextActions:
          type: array
          items:
            type: string
        aiHealthScore:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectWithOwnership:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          required: [isOwned]
          properties:
            isOwned:
              type: boolean
            addedAt:
              type: string
              format: date-time

    ProjectDashboardAction:
      type: object
      required:
        [id, projectId, projectName, workspaceId, lifecyclePhase, routePhase, kind, title, summary, severity, source, requiresReview, safeToRun, updatedAt]
      properties:
        id:
          type: string
        projectId:
          type: string
        projectName:
          type: string
        workspaceId:
          type: string
        lifecyclePhase:
          type: string
        routePhase:
          type: string
        kind:
          type: string
          enum: [blocker, review, safe-to-continue]
        title:
          type: string
        summary:
          type: string
        severity:
          type: string
          enum: [critical, warning, info]
        source:
          type: string
          enum: [project.aiNextActions, project.lifecyclePhase]
        requiresReview:
          type: boolean
        safeToRun:
          type: boolean
        updatedAt:
          type: string
          format: date-time

    ProjectDashboardActionsResponse:
      type: object
      required: [workspaceId, blockedWork, reviewRequired, safeToContinue, generatedAt]
      properties:
        workspaceId:
          type: string
        blockedWork:
          type: array
          items:
            $ref: "#/components/schemas/ProjectDashboardAction"
        reviewRequired:
          type: array
          items:
            $ref: "#/components/schemas/ProjectDashboardAction"
        safeToContinue:
          type: array
          items:
            $ref: "#/components/schemas/ProjectDashboardAction"
        generatedAt:
          type: string
          format: date-time

    ExecuteProjectDashboardActionRequest:
      type: object
      required: [workspaceId, actionId]
      properties:
        workspaceId:
          type: string
        actionId:
          type: string

    ExecuteProjectDashboardActionResponse:
      type: object
      required: [projectId, actionId, outcome, targetPhase, targetPath, auditRecorded]
      properties:
        projectId:
          type: string
        actionId:
          type: string
        outcome:
          type: string
          enum: [opened-phase-cockpit]
        targetPhase:
          type: string
        targetPath:
          type: string
        auditRecorded:
          type: boolean

    WorkspaceDetail:
      allOf:
        - $ref: "#/components/schemas/Workspace"
        - type: object
          properties:
            ownedProjects:
              type: array
              items:
                $ref: "#/components/schemas/Project"
            includedProjects:
              type: array
              items:
                $ref: "#/components/schemas/ProjectWithOwnership"

    RelatedProjectRecommendation:
      type: object
      required: [id, name, type, ownerWorkspaceId, ownerWorkspaceName]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: "#/components/schemas/ProjectType"
        ownerWorkspaceId:
          type: string
        ownerWorkspaceName:
          type: string

    AvailableInclusionProject:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            ownerWorkspaceName:
              type: string
            aiCompatibilityScore:
              type: integer

    CreateWorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        createDefaultProject:
          type: boolean

    UpdateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    WorkspaceResponse:
      type: object
      required: [workspace]
      properties:
        workspace:
          $ref: "#/components/schemas/Workspace"

    WorkspaceDetailResponse:
      type: object
      required: [workspace]
      properties:
        workspace:
          $ref: "#/components/schemas/WorkspaceDetail"

    WorkspaceListResponse:
      type: object
      required: [workspaces]
      properties:
        workspaces:
          type: array
          items:
            $ref: "#/components/schemas/Workspace"

    CreateProjectRequest:
      type: object
      required: [name, type, workspaceId]
      properties:
        name:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/ProjectType"
        workspaceId:
          type: string

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/ProjectType"
        status:
          $ref: "#/components/schemas/ProjectStatus"
        lifecyclePhase:
          $ref: "#/components/schemas/ProjectLifecyclePhase"

    IncludeProjectRequest:
      type: object
      required: [workspaceId, projectId]
      properties:
        workspaceId:
          type: string
        projectId:
          type: string

    ProjectResponse:
      type: object
      required: [project]
      properties:
        project:
          $ref: "#/components/schemas/ProjectWithOwnership"

    ProjectsResponse:
      type: object
      required: [owned, included]
      properties:
        owned:
          type: array
          items:
            $ref: "#/components/schemas/ProjectWithOwnership"
        included:
          type: array
          items:
            $ref: "#/components/schemas/ProjectWithOwnership"

    IncludedProjectResponse:
      type: object
      required: [project]
      properties:
        project:
          $ref: "#/components/schemas/ProjectWithOwnership"

    AvailableProjectsResponse:
      type: object
      required: [projects]
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/AvailableInclusionProject"

    NameSuggestionResponse:
      type: object
      required: [suggestion]
      properties:
        suggestion:
          type: string

    ProjectSetupSuggestionRequest:
      type: object
      required: [workspaceId]
      properties:
        workspaceId:
          type: string
        description:
          type: string
        preferredType:
          $ref: "#/components/schemas/ProjectType"

    ProjectSetupSuggestion:
      type: object
      required:
        [suggestion, inferredType, rationale, summary, recommendations, relatedProjects]
      properties:
        suggestion:
          type: string
        inferredType:
          $ref: "#/components/schemas/ProjectType"
        rationale:
          type: string
        summary:
          type: string
        recommendations:
          type: array
          items:
            type: string
        relatedProjects:
          type: array
          items:
            $ref: "#/components/schemas/RelatedProjectRecommendation"

    # ── Auth schemas ──────────────────────────────────────────────────────────

    AuthRole:
      type: string
      enum: [VIEWER, EDITOR, ADMIN, OWNER]

    AuthUser:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: "#/components/schemas/AuthRole"
        avatar:
          type: string
        avatarUrl:
          type: string
        tenantId:
          type: string
        workspaceIds:
          type: array
          items:
            type: string
        roles:
          type: array
          items:
            type: string

    AuthTokenPair:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Token TTL in seconds

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        session:
          type: object
          properties:
            expiresAt:
              type: string
              format: date-time
            authMode:
              type: string
              enum: [COOKIE]

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    RefreshTokenResponse:
      type: object
      properties:
        expiresAt:
          type: string
          format: date-time
        authMode:
          type: string
          enum: [COOKIE]

    LogoutResponse:
      type: object
      properties:
        message:
          type: string

    TokenValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        userId:
          type: string
        tenantId:
          type: string
        expiresAt:
          type: string
          format: date-time

    UserInfo:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: "#/components/schemas/AuthRole"
        tenantId:
          type: string
        workspaceIds:
          type: array
          items:
            type: string
        avatar:
          type: string
        avatarUrl:
          type: string
        roles:
          type: array
          items:
            type: string

    # ── Lifecycle schemas ─────────────────────────────────────────────────────

    PhaseList:
      type: object
      properties:
        phases:
          type: array
          items:
            type: string
          example:
            - intent
            - shape
            - validate
            - generate
            - run
            - observe
            - learn
            - evolve

    AdvancePhaseRequest:
      type: object
      required: [projectId, targetPhase]
      properties:
        projectId:
          type: string
        tenantId:
          type: string
        targetPhase:
          type: string
          enum: [INTENT, SHAPE, VALIDATE, GENERATE, RUN, OBSERVE, LEARN, EVOLVE]
        conditions:
          type: object
          additionalProperties:
            type: boolean
          description: Gate condition verdicts keyed by criterion ID

    PhaseTransitionResult:
      type: object
      properties:
        success:
          type: boolean
        targetPhase:
          type: string
        blockers:
          type: array
          items:
            type: string
        artifactBlockers:
          type: array
          items:
            type: string
        criteriaBlockers:
          type: array
          items:
            type: string

    # ── Approval schemas ──────────────────────────────────────────────────────

    ApprovalRequest:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        tenantId:
          type: string
        requesterId:
          type: string
        approverId:
          type: string
        phase:
          type: string
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, EXPIRED]
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        decidedAt:
          type: string
          format: date-time
          nullable: true

    ApprovalDecisionRequest:
      type: object
      properties:
        notes:
          type: string
          description: Optional reviewer notes

    # ── Suggestion schemas ────────────────────────────────────────────────────

    SuggestionRequest:

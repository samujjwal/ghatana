# ─────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad request — invalid or missing parameters
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Forbidden:
      description: Permission denied
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Conflict:
      description: Resource conflict (e.g. duplicate or concurrent edit)
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    UnprocessableEntity:
      description: Semantically invalid request body
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    InternalServerError:
      description: Unexpected server error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

  schemas:

    # ── Workspace and project schemas ────────────────────────────────────────

    ProjectType:
      type: string
      enum: [UI, BACKEND, MOBILE, DESKTOP, FULL_STACK]

    ProjectStatus:
      type: string
      enum: [DRAFT, ACTIVE, COMPLETED, ARCHIVED]

    ProjectLifecyclePhase:
      type: string
      description: Canonical mounted lifecycle phase with accepted legacy compatibility aliases.
      enum: [INTENT, SHAPE, CONTEXT, VALIDATE, PLAN, GENERATE, EXECUTE, RUN, VERIFY, OBSERVE, LEARN, IMPROVE, EVOLVE, INSTITUTIONALIZE]

    Workspace:
      type: object
      required: [id, name, ownerId, isDefault, aiTags, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        ownerId:
          type: string
        isDefault:
          type: boolean
        projectCount:
          type: integer
        memberCount:
          type: integer
        aiSummary:
          type: string
        aiTags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Project:
      type: object
      required:
        [id, name, type, status, ownerWorkspaceId, isDefault, aiNextActions, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/ProjectType"
        status:
          $ref: "#/components/schemas/ProjectStatus"
        lifecyclePhase:
          $ref: "#/components/schemas/ProjectLifecyclePhase"
        ownerWorkspaceId:
          type: string
        isDefault:
          type: boolean
        aiSummary:
          type: string
        aiNextActions:
          type: array
          items:
            type: string
        aiHealthScore:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectWithOwnership:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          required: [isOwned]
          properties:
            isOwned:
              type: boolean
            addedAt:
              type: string
              format: date-time

    ProjectDashboardAction:
      type: object
      required:
        [id, projectId, projectName, workspaceId, lifecyclePhase, routePhase, kind, title, summary, severity, source, requiresReview, safeToRun, updatedAt]
      properties:
        id:
          type: string
        projectId:
          type: string
        projectName:
          type: string
        workspaceId:
          type: string
        lifecyclePhase:
          type: string
        routePhase:
          type: string
        kind:
          type: string
          enum: [blocker, review, safe-to-continue]
        title:
          type: string
        summary:
          type: string
        severity:
          type: string
          enum: [critical, warning, info]
        source:
          type: string
          enum: [project.aiNextActions, project.lifecyclePhase]
        requiresReview:
          type: boolean
        safeToRun:
          type: boolean
        updatedAt:
          type: string
          format: date-time

    ProjectDashboardActionsResponse:
      type: object
      required: [workspaceId, blockedWork, reviewRequired, safeToContinue, generatedAt]
      properties:
        workspaceId:
          type: string
        blockedWork:
          type: array
          items:
            $ref: "#/components/schemas/ProjectDashboardAction"
        reviewRequired:
          type: array
          items:
            $ref: "#/components/schemas/ProjectDashboardAction"
        safeToContinue:
          type: array
          items:
            $ref: "#/components/schemas/ProjectDashboardAction"
        generatedAt:
          type: string
          format: date-time

    ExecuteProjectDashboardActionRequest:
      type: object
      required: [workspaceId, actionId]
      properties:
        workspaceId:
          type: string
        actionId:
          type: string

    ExecuteProjectDashboardActionResponse:
      type: object
      required: [projectId, actionId, outcome, targetPhase, targetPath, auditRecorded]
      properties:
        projectId:
          type: string
        actionId:
          type: string
        outcome:
          type: string
          enum: [opened-phase-cockpit]
        targetPhase:
          type: string
        targetPath:
          type: string
        auditRecorded:
          type: boolean

    WorkspaceDetail:
      allOf:
        - $ref: "#/components/schemas/Workspace"
        - type: object
          properties:
            ownedProjects:
              type: array
              items:
                $ref: "#/components/schemas/Project"
            includedProjects:
              type: array
              items:
                $ref: "#/components/schemas/ProjectWithOwnership"

    RelatedProjectRecommendation:
      type: object
      required: [id, name, type, ownerWorkspaceId, ownerWorkspaceName]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: "#/components/schemas/ProjectType"
        ownerWorkspaceId:
          type: string
        ownerWorkspaceName:
          type: string

    AvailableInclusionProject:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            ownerWorkspaceName:
              type: string
            aiCompatibilityScore:
              type: integer

    CreateWorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        createDefaultProject:
          type: boolean

    UpdateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    WorkspaceResponse:
      type: object
      required: [workspace]
      properties:
        workspace:
          $ref: "#/components/schemas/Workspace"

    WorkspaceDetailResponse:
      type: object
      required: [workspace]
      properties:
        workspace:
          $ref: "#/components/schemas/WorkspaceDetail"

    WorkspaceListResponse:
      type: object
      required: [workspaces]
      properties:
        workspaces:
          type: array
          items:
            $ref: "#/components/schemas/Workspace"

    CreateProjectRequest:
      type: object
      required: [name, type, workspaceId]
      properties:
        name:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/ProjectType"
        workspaceId:
          type: string

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/ProjectType"
        status:
          $ref: "#/components/schemas/ProjectStatus"
        lifecyclePhase:
          $ref: "#/components/schemas/ProjectLifecyclePhase"

    IncludeProjectRequest:
      type: object
      required: [workspaceId, projectId]
      properties:
        workspaceId:
          type: string
        projectId:
          type: string

    ProjectResponse:
      type: object
      required: [project]
      properties:
        project:
          $ref: "#/components/schemas/ProjectWithOwnership"

    ProjectsResponse:
      type: object
      required: [owned, included]
      properties:
        owned:
          type: array
          items:
            $ref: "#/components/schemas/ProjectWithOwnership"
        included:
          type: array
          items:
            $ref: "#/components/schemas/ProjectWithOwnership"

    IncludedProjectResponse:
      type: object
      required: [project]
      properties:
        project:
          $ref: "#/components/schemas/ProjectWithOwnership"

    AvailableProjectsResponse:
      type: object
      required: [projects]
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/AvailableInclusionProject"

    NameSuggestionResponse:
      type: object
      required: [suggestion]
      properties:
        suggestion:
          type: string

    ProjectSetupSuggestionRequest:
      type: object
      required: [workspaceId]
      properties:
        workspaceId:
          type: string
        description:
          type: string
        preferredType:
          $ref: "#/components/schemas/ProjectType"

    ProjectSetupSuggestion:
      type: object
      required:
        [suggestion, inferredType, rationale, summary, recommendations, relatedProjects]
      properties:
        suggestion:
          type: string
        inferredType:
          $ref: "#/components/schemas/ProjectType"
        rationale:
          type: string
        summary:
          type: string
        recommendations:
          type: array
          items:
            type: string
        relatedProjects:
          type: array
          items:
            $ref: "#/components/schemas/RelatedProjectRecommendation"

    # ── Auth schemas ──────────────────────────────────────────────────────────


openapi: "3.1.0"

info:
  title: YAPPC Lifecycle API
  version: "2.0.0"
  description: |
    REST API for the YAPPC (Yet Another Product Platform Creator) lifecycle service.

    All `/api/*` endpoints require a valid API key supplied in the
    `X-API-Key` request header, or a valid JWT Bearer token in the
    `Authorization` header. Tenant isolation is enforced automatically via
    the `TenantContextFilter`.
  contact:
    name: YAPPC Platform Team
    url: https://github.com/ghatana/ghatana
  license:
    name: Proprietary

servers:
  - url: http://localhost:8082
    description: Local development (lifecycle service)
  - url: https://yappc-lifecycle.ghatana.internal
    description: Internal staging

tags:
  - name: auth
    description: Authentication and token management
  - name: workspaces
    description: Workspace CRUD and AI suggestion endpoints used by the active web client
  - name: projects
    description: Project CRUD, inclusion, and AI suggestion endpoints used by the active web client
  - name: lifecycle
    description: Project lifecycle phase management
  - name: intent
    description: INTENT phase — capture and analyse product intent
  - name: shape
    description: SHAPE phase — domain model and system design
  - name: generate
    description: GENERATE phase — artefact generation
  - name: validate
    description: VALIDATE phase — validation rules and policies
  - name: approvals
    description: Human approval workflow
  - name: suggestions
    description: AI-powered lifecycle suggestions
  - name: workflows
    description: Durable workflow engine
  - name: health
    description: Liveness and readiness probes

# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── Health ──────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [health]
      summary: Liveness probe
      description: Returns 200 when the process is alive. Used by Kubernetes liveness checks.
      operationId: liveness
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            text/plain:
              example: "OK"

  /ready:
    get:
      tags: [health]
      summary: Readiness probe
      description: |
        Returns 200 when the service is ready to accept traffic. Includes a lightweight
        DataCloud connectivity ping.
      operationId: readiness
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            text/plain:
              example: "READY"
        "503":
          description: Service not ready (dependency unavailable)

  # ── Observability ──────────────────────────────────────────────────────────

  /metrics:
    get:
      tags: [health]
      summary: Prometheus metrics scrape endpoint
      description: Exposes all Micrometer metrics in Prometheus text format.
      operationId: scrapeMetrics
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

  # ── Auth ───────────────────────────────────────────────────────────────────

  /api/auth/login:
    post:
      tags: [auth]
      summary: Authenticate user and issue JWT
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: alice@example.com
              password: "s3cr3t"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/refresh:
    post:
      tags: [auth]
      summary: Exchange a refresh token for a new access token pair
      operationId: refreshAuthToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token refresh successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/logout:
    post:
      tags: [auth]
      summary: Invalidate the current session
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Session invalidated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"

  /api/auth/validate:
    get:
      tags: [auth]
      summary: Validate the current JWT
      operationId: validateToken
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenValidationResult"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/me:
    get:
      tags: [auth]
      summary: Return information about the authenticated user
      operationId: currentUser
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Service Info ────────────────────────────────────────────────────────────

  /api/v1/yappc/info:
    get:
      tags: [lifecycle]
      summary: Service metadata
      operationId: serviceInfo
      responses:
        "200":
          description: Service info
          content:
            application/json:
              example:
                name: YAPPC Lifecycle API
                version: "2.0.0"
                status: operational

  # ── Workspaces ─────────────────────────────────────────────────────────────

  /api/workspaces:
    get:
      tags: [workspaces]
      summary: List workspaces for the authenticated user
      operationId: listWorkspaces
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Database service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [workspaces]
      summary: Create a workspace and optional starter project
      operationId: createWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/workspaces/{workspaceId}:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [workspaces]
      summary: Get a workspace with owned and included projects
      operationId: getWorkspace
      responses:
        "200":
          description: Workspace detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: Database service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [workspaces]
      summary: Update workspace metadata
      operationId: updateWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [workspaces]
      summary: Delete a workspace
      operationId: deleteWorkspace
      responses:
        "204":
          description: Workspace deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/workspaces/suggest-name:
    get:
      tags: [workspaces]
      summary: Suggest a workspace name
      operationId: suggestWorkspaceName
      responses:
        "200":
          description: Suggested workspace name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NameSuggestionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Projects ───────────────────────────────────────────────────────────────

  /api/projects:
    get:
      tags: [projects]
      summary: List owned and included projects for a workspace
      operationId: listProjects
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workspace project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      tags: [projects]
      summary: Create a project owned by a workspace
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/projects/{projectId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [projects]
      summary: Get a single project with ownership context
      operationId: getProject
      parameters:
        - name: workspaceId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [projects]
      summary: Update a project owned by the current workspace
      operationId: updateProject
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "403":
          description: Current workspace does not own the project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [projects]
      summary: Delete a project owned by the current workspace
      operationId: deleteProject
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Project deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Current workspace does not own the project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/projects/include:
    post:
      tags: [projects]
      summary: Include a read-only project in another workspace
      operationId: includeProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncludeProjectRequest"
      responses:
        "201":
          description: Project inclusion created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncludedProjectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [projects]
      summary: Remove a project inclusion from a workspace
      operationId: removeIncludedProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncludeProjectRequest"
      responses:
        "204":
          description: Inclusion removed

  /api/projects/available-for-inclusion:
    get:
      tags: [projects]
      summary: List projects that can be included in a workspace
      operationId: listAvailableProjectsForInclusion
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Available projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableProjectsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/projects/suggest-name:
    get:
      tags: [projects]
      summary: Suggest a project name for a workspace
      operationId: suggestProjectName
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProjectType"
      responses:
        "200":
          description: Suggested project name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NameSuggestionResponse"

  /api/projects/setup-suggestion:
    post:
      tags: [projects]
      summary: Suggest initial project setup from description and workspace context
      operationId: suggestProjectSetup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectSetupSuggestionRequest"
      responses:
        "200":
          description: Project setup suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSetupSuggestion"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Lifecycle ───────────────────────────────────────────────────────────────

  /api/v1/lifecycle/phases:
    get:
      tags: [lifecycle]
      summary: List all lifecycle phases
      operationId: listPhases
      responses:
        "200":
          description: Ordered list of phases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhaseList"

  /api/v1/lifecycle/advance:
    post:
      tags: [lifecycle]
      summary: Advance a project to the next lifecycle phase
      description: |
        Runs all three gate checks (entry criteria, exit criteria, required artefacts).
        Returns 200 if the gate passes, 409 if any blocker is present.
      operationId: advancePhase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvancePhaseRequest"
      responses:
        "200":
          description: Phase advanced successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhaseTransitionResult"
        "409":
          description: Gate check failed — phase not advanced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhaseTransitionResult"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Intent ──────────────────────────────────────────────────────────────────

  /api/v1/yappc/intent/capture:
    post:
      tags: [intent]
      summary: Capture product intent
      operationId: captureIntent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptureIntentRequest"
      responses:
        "200":
          description: Intent captured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/yappc/intent/analyze:
    post:
      tags: [intent]
      summary: AI-analyse captured intent
      description: Sends the captured intent through the LLM pipeline for enrichment and decomposition.
      operationId: analyzeIntent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeIntentRequest"
      responses:
        "200":
          description: Intent analysis result
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/yappc/intent/{id}:
    get:
      tags: [intent]
      summary: Get a captured intent by ID
      operationId: getIntent
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Intent record
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Shape ───────────────────────────────────────────────────────────────────

  /api/v1/yappc/shape/derive:
    post:
      tags: [shape]
      summary: Derive system shape from intent
      operationId: deriveShape
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeriveShapeRequest"
      responses:
        "200":
          description: Shape derived

  /api/v1/yappc/shape/model:
    post:
      tags: [shape]
      summary: Generate system model (domain entities, APIs)
      operationId: generateSystemModel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateModelRequest"
      responses:
        "200":
          description: System model generated

  /api/v1/yappc/shape/{id}:
    get:
      tags: [shape]
      summary: Get a shape record by ID
      operationId: getShape
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Shape record
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Generate ─────────────────────────────────────────────────────────────────

  /api/v1/yappc/generate:
    post:
      tags: [generate]
      summary: Generate project artefacts (code, config, CI)
      operationId: generateArtifacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateArtifactsRequest"
      responses:
        "200":
          description: Artefacts generated
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/yappc/generate/diff:
    post:
      tags: [generate]
      summary: Regenerate artefacts with a change diff
      operationId: regenerateWithDiff
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerateDiffRequest"
      responses:
        "200":
          description: Differential regeneration result

  /api/v1/yappc/generate/artifacts/{id}:
    get:
      tags: [generate]
      summary: Get generated artefacts for a run
      operationId: getArtifacts
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Artefact manifest
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Validate ─────────────────────────────────────────────────────────────────

  /api/v1/yappc/validate:
    post:
      tags: [validate]
      summary: Run default validation suite
      operationId: validate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateRequest"
      responses:
        "200":
          description: Validation result

  /api/v1/yappc/validate/with-config:
    post:
      tags: [validate]
      summary: Run validation with a custom config
      operationId: validateWithConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateWithConfigRequest"
      responses:
        "200":
          description: Validation result

  /api/v1/yappc/validate/with-policy:
    post:
      tags: [validate]
      summary: Run validation against a named policy
      operationId: validateWithPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateWithPolicyRequest"
      responses:
        "200":
          description: Validation result

  # ── Approvals ────────────────────────────────────────────────────────────────

  /api/v1/approvals/pending:
    get:
      tags: [approvals]
      summary: List pending approvals for the authenticated user
      operationId: listPendingApprovals
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
          description: Tenant scoping header
      responses:
        "200":
          description: List of pending approval requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApprovalRequest"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/approvals/{id}/approve:
    post:
      tags: [approvals]
      summary: Approve an approval request
      operationId: approveRequest
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecisionRequest"
      responses:
        "200":
          description: Approval recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Approval already decided

  /api/v1/approvals/{id}/reject:
    post:
      tags: [approvals]
      summary: Reject an approval request
      operationId: rejectRequest
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecisionRequest"
      responses:
        "200":
          description: Rejection recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── AI Suggestions ────────────────────────────────────────────────────────────

  /api/v1/projects/{projectId}/suggestions:
    post:
      tags: [suggestions]
      summary: Generate AI lifecycle suggestions
      description: |
        Calls `AISuggestionService` with the current project phase and context,
        returning up to 5 typed suggestions.  The AI model is selected by the
        `AIModelRouter` based on `TaskType.REASONING`.
      operationId: generateSuggestions
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestionRequest"
            example:
              phase: SHAPE
              context:
                title: "Add dark mode to the web app"
                stakeholders: "design team, frontend engineers"
      responses:
        "200":
          description: AI suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Suggestion"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/projects/{projectId}/suggestions/{suggestionId}:
    delete:
      tags: [suggestions]
      summary: Dismiss a suggestion
      operationId: dismissSuggestion
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: suggestionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Suggestion dismissed
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Workflows ─────────────────────────────────────────────────────────────────

  /api/v1/workflows/templates:
    get:
      tags: [workflows]
      summary: List registered workflow templates
      operationId: listWorkflowTemplates
      responses:
        "200":
          description: Template IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              example:
                - "lifecycle-advance"
                - "approval-review"
                - "code-generation"

  /api/v1/workflows/{templateId}/start:
    post:
      tags: [workflows]
      summary: Start a workflow run
      operationId: startWorkflow
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Workflow input payload (template-specific)
      responses:
        "202":
          description: Workflow started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowStartResponse"
        "404":
          description: Unknown template
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/workflows/{runId}/status:
    get:
      tags: [workflows]
      summary: Get workflow run status
      operationId: getWorkflowStatus
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowStatus"
        "404":
          $ref: "#/components/responses/NotFound"

# ─────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad request — invalid or missing parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    # ── Workspace and project schemas ────────────────────────────────────────

    ProjectType:
      type: string
      enum: [UI, BACKEND, MOBILE, DESKTOP, FULL_STACK]

    ProjectStatus:
      type: string
      enum: [DRAFT, ACTIVE, COMPLETED, ARCHIVED]

    ProjectLifecyclePhase:
      type: string
      description: Legacy project lifecycle phase used by the active web workspace/project surface.

    Workspace:
      type: object
      required: [id, name, ownerId, isDefault, aiTags, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        ownerId:
          type: string
        isDefault:
          type: boolean
        projectCount:
          type: integer
        memberCount:
          type: integer
        aiSummary:
          type: string
        aiTags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Project:
      type: object
      required:
        [id, name, type, status, ownerWorkspaceId, isDefault, aiNextActions, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/ProjectType"
        status:
          $ref: "#/components/schemas/ProjectStatus"
        lifecyclePhase:
          $ref: "#/components/schemas/ProjectLifecyclePhase"
        ownerWorkspaceId:
          type: string
        isDefault:
          type: boolean
        aiSummary:
          type: string
        aiNextActions:
          type: array
          items:
            type: string
        aiHealthScore:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectWithOwnership:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          required: [isOwned]
          properties:
            isOwned:
              type: boolean
            addedAt:
              type: string
              format: date-time

    WorkspaceDetail:
      allOf:
        - $ref: "#/components/schemas/Workspace"
        - type: object
          properties:
            ownedProjects:
              type: array
              items:
                $ref: "#/components/schemas/Project"
            includedProjects:
              type: array
              items:
                $ref: "#/components/schemas/ProjectWithOwnership"

    RelatedProjectRecommendation:
      type: object
      required: [id, name, type, ownerWorkspaceId, ownerWorkspaceName]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: "#/components/schemas/ProjectType"
        ownerWorkspaceId:
          type: string
        ownerWorkspaceName:
          type: string

    AvailableInclusionProject:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            ownerWorkspaceName:
              type: string
            aiCompatibilityScore:
              type: integer

    CreateWorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        createDefaultProject:
          type: boolean

    UpdateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    WorkspaceResponse:
      type: object
      required: [workspace]
      properties:
        workspace:
          $ref: "#/components/schemas/Workspace"

    WorkspaceDetailResponse:
      type: object
      required: [workspace]
      properties:
        workspace:
          $ref: "#/components/schemas/WorkspaceDetail"

    WorkspaceListResponse:
      type: object
      required: [workspaces]
      properties:
        workspaces:
          type: array
          items:
            $ref: "#/components/schemas/Workspace"

    CreateProjectRequest:
      type: object
      required: [name, type, workspaceId]
      properties:
        name:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/ProjectType"
        workspaceId:
          type: string

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/ProjectType"
        status:
          $ref: "#/components/schemas/ProjectStatus"
        lifecyclePhase:
          type: string
          enum: [INTENT, SHAPE, VALIDATE, GENERATE, RUN, OBSERVE, IMPROVE]

    IncludeProjectRequest:
      type: object
      required: [workspaceId, projectId]
      properties:
        workspaceId:
          type: string
        projectId:
          type: string

    ProjectResponse:
      type: object
      required: [project]
      properties:
        project:
          $ref: "#/components/schemas/ProjectWithOwnership"

    ProjectsResponse:
      type: object
      required: [owned, included]
      properties:
        owned:
          type: array
          items:
            $ref: "#/components/schemas/ProjectWithOwnership"
        included:
          type: array
          items:
            $ref: "#/components/schemas/ProjectWithOwnership"

    IncludedProjectResponse:
      type: object
      required: [project]
      properties:
        project:
          $ref: "#/components/schemas/ProjectWithOwnership"

    AvailableProjectsResponse:
      type: object
      required: [projects]
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/AvailableInclusionProject"

    NameSuggestionResponse:
      type: object
      required: [suggestion]
      properties:
        suggestion:
          type: string

    ProjectSetupSuggestionRequest:
      type: object
      required: [workspaceId]
      properties:
        workspaceId:
          type: string
        description:
          type: string
        preferredType:
          $ref: "#/components/schemas/ProjectType"

    ProjectSetupSuggestion:
      type: object
      required:
        [suggestion, inferredType, rationale, summary, recommendations, relatedProjects]
      properties:
        suggestion:
          type: string
        inferredType:
          $ref: "#/components/schemas/ProjectType"
        rationale:
          type: string
        summary:
          type: string
        recommendations:
          type: array
          items:
            type: string
        relatedProjects:
          type: array
          items:
            $ref: "#/components/schemas/RelatedProjectRecommendation"

    # ── Auth schemas ──────────────────────────────────────────────────────────

    AuthRole:
      type: string
      enum: [VIEWER, EDITOR, ADMIN, OWNER]

    AuthUser:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: "#/components/schemas/AuthRole"
        avatar:
          type: string
        avatarUrl:
          type: string
        tenantId:
          type: string
        workspaceIds:
          type: array
          items:
            type: string
        roles:
          type: array
          items:
            type: string

    AuthTokenPair:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Token TTL in seconds

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      required: [user, tokens]
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        tokens:
          $ref: "#/components/schemas/AuthTokenPair"

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    RefreshTokenResponse:
      allOf:
        - $ref: "#/components/schemas/AuthTokenPair"

    LogoutResponse:
      type: object
      properties:
        message:
          type: string

    TokenValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        userId:
          type: string
        tenantId:
          type: string
        expiresAt:
          type: string
          format: date-time

    UserInfo:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: "#/components/schemas/AuthRole"
        tenantId:
          type: string
        workspaceIds:
          type: array
          items:
            type: string
        avatar:
          type: string
        avatarUrl:
          type: string
        roles:
          type: array
          items:
            type: string

    # ── Lifecycle schemas ─────────────────────────────────────────────────────

    PhaseList:
      type: object
      properties:
        phases:
          type: array
          items:
            type: string
          example:
            - intent
            - shape
            - validate
            - generate
            - run
            - observe
            - learn
            - evolve

    AdvancePhaseRequest:
      type: object
      required: [projectId, targetPhase]
      properties:
        projectId:
          type: string
        tenantId:
          type: string
        targetPhase:
          type: string
          enum: [INTENT, SHAPE, VALIDATE, GENERATE, RUN, OBSERVE, LEARN, EVOLVE]
        conditions:
          type: object
          additionalProperties:
            type: boolean
          description: Gate condition verdicts keyed by criterion ID

    PhaseTransitionResult:
      type: object
      properties:
        success:
          type: boolean
        targetPhase:
          type: string
        blockers:
          type: array
          items:
            type: string
        artifactBlockers:
          type: array
          items:
            type: string
        criteriaBlockers:
          type: array
          items:
            type: string

    # ── Approval schemas ──────────────────────────────────────────────────────

    ApprovalRequest:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        tenantId:
          type: string
        requesterId:
          type: string
        approverId:
          type: string
        phase:
          type: string
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, EXPIRED]
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        decidedAt:
          type: string
          format: date-time
          nullable: true

    ApprovalDecisionRequest:
      type: object
      properties:
        notes:
          type: string
          description: Optional reviewer notes

    # ── Suggestion schemas ────────────────────────────────────────────────────

    SuggestionRequest:
      type: object
      required: [phase]
      properties:
        phase:
          type: string
          enum: [INTENT, SHAPE, VALIDATE, GENERATE, RUN, OBSERVE, LEARN, EVOLVE]
        context:
          type: object
          additionalProperties: true
          description: Additional domain context forwarded to the AI model

    Suggestion:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        phase:
          type: string
        type:
          type: string
          enum: [REQUIREMENT, DESIGN, TEST, RISK, ACTION]
        text:
          type: string
        generatedAt:
          type: string
          format: date-time

    # ── Workflow schemas ──────────────────────────────────────────────────────

    WorkflowStartResponse:
      type: object
      properties:
        runId:
          type: string
        templateId:
          type: string
        status:
          type: string
          enum: [PENDING, RUNNING]
        startedAt:
          type: string
          format: date-time

    WorkflowStatus:
      type: object
      properties:
        runId:
          type: string
        templateId:
          type: string
        status:
          type: string
          enum: [PENDING, RUNNING, COMPLETED, FAILED, CANCELLED]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true

    # ── Intent schemas ────────────────────────────────────────────────────────

    CaptureIntentRequest:
      type: object
      required: [projectId, content]
      properties:
        projectId:
          type: string
        content:
          type: string
          description: Free-form product intent description
        persona:
          type: string
          description: Submitting persona type (e.g. PRODUCT_MANAGER, DEVELOPER)

    AnalyzeIntentRequest:
      type: object
      required: [intentId]
      properties:
        intentId:
          type: string

    IntentResponse:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        content:
          type: string
        analysis:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ── Shape schemas ─────────────────────────────────────────────────────────

    DeriveShapeRequest:
      type: object
      required: [intentId]
      properties:
        intentId:
          type: string
        options:
          type: object

    GenerateModelRequest:
      type: object
      required: [shapeId]
      properties:
        shapeId:
          type: string

    # ── Generate schemas ──────────────────────────────────────────────────────

    GenerateArtifactsRequest:
      type: object
      required: [projectId, phase]
      properties:
        projectId:
          type: string
        phase:
          type: string
        techStack:
          type: array
          items:
            type: string
        options:
          type: object

    RegenerateDiffRequest:
      type: object
      required: [runId, diff]
      properties:
        runId:
          type: string
        diff:
          type: string
          description: Description of changes to apply

    # ── Validate schemas ──────────────────────────────────────────────────────

    ValidateRequest:
      type: object
      required: [projectId]
      properties:
        projectId:
          type: string

    ValidateWithConfigRequest:
      type: object
      required: [projectId, config]
      properties:
        projectId:
          type: string
        config:
          type: object

    ValidateWithPolicyRequest:
      type: object
      required: [projectId, policyId]
      properties:
        projectId:
          type: string
        policyId:
          type: string

    # ── Common ────────────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        correlationId:
          type: string

security:
  - ApiKeyAuth: []
  - BearerAuth: []

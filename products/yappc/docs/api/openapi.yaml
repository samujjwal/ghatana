openapi: "3.1.0"

info:
  title: YAPPC Lifecycle API
  version: "2.0.0"
  description: |
    REST API for the YAPPC (Yet Another Product Platform Creator) lifecycle service.

    **Authentication Modes:**
    - **Browser/Web UI**: Cookie-based session authentication (httpOnly cookie `yappc_session`). Use for web UI and browser-based access.
    - **Service-to-Service**: API key (`X-API-Key` header) or JWT Bearer token (`Authorization: Bearer <token>`). Use for backend services and automated tools.

    **Scope Propagation:**
    Tenant/workspace/project scope is extracted from path parameters, query parameters (`?scope=project:read`), or headers (`X-Scope: project:read`) in priority order: path > query > header.

    Tenant isolation is enforced automatically via the `TenantContextFilter`.
  contact:
    name: YAPPC Platform Team
    url: https://github.com/ghatana/ghatana
  license:
    name: Proprietary

servers:
  - url: http://localhost:8082
    description: Local development (lifecycle service)
  - url: https://yappc-lifecycle.ghatana.internal
    description: Internal staging

tags:
  - name: auth
    description: Authentication and token management
  - name: workspaces
    description: Workspace CRUD and recommendation endpoints used by the active web client
  - name: projects
    description: Project CRUD, inclusion, and recommendation endpoints used by the active web client
  - name: lifecycle
    description: Project lifecycle phase management
  - name: intent
    description: INTENT phase — capture and analyse product intent
  - name: shape
    description: SHAPE phase — domain model and system design
  - name: generate
    description: GENERATE phase — artifact generation
  - name: validate
    description: VALIDATE phase — validation rules and policies
  - name: approvals
    description: Human approval workflow
  - name: suggestions
    description: Guided lifecycle recommendations
  - name: workflows
    description: Durable workflow engine
  - name: health
    description: Liveness and readiness probes
  - name: run
    description: RUN phase — execution and deployment
  - name: preview
    description: Preview session management for secure artifact previews, rollback, and promote
  - name: observe
    description: OBSERVE phase — collect observations from runs
  - name: learn
    description: LEARN phase — analyze runs and record learning signals
  - name: evolve
    description: EVOLVE phase — propose architectural evolutions
  - name: artifact-graph
    description: Artifact knowledge graph ingestion and querying
  - name: vector
    description: Vector semantic search, indexing, and RAG
  - name: agents
    description: Agent registry, execution, and copilot integration
  - name: scaffold-packs
    description: Scaffold pack catalogue and management
  - name: scaffold-projects
    description: Scaffold project creation and state management
  - name: scaffold-templates
    description: Template rendering and validation
  - name: scaffold-dependencies
    description: Scaffold dependency analysis and conflict detection
  - name: refactorer
    description: Automated refactoring job management

# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── Health ──────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [health]
      summary: Liveness probe
      description: Returns 200 when the process is alive. Used by Kubernetes liveness checks.
      operationId: liveness
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            text/plain:
              example: "OK"

  /ready:
    get:
      tags: [health]
      summary: Readiness probe
      description: |
        Returns 200 when the service is ready to accept traffic. Includes a lightweight
        DataCloud connectivity ping.
      operationId: readiness
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            text/plain:
              example: "READY"
        "503":
          description: Service not ready (dependency unavailable)

  # ── Observability ──────────────────────────────────────────────────────────

  /metrics:
    get:
      tags: [health]
      summary: Prometheus metrics scrape endpoint
      description: Exposes all Micrometer metrics in Prometheus text format.
      operationId: scrapeMetrics
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

  # ── Auth ───────────────────────────────────────────────────────────────────

  /api/auth/login:
    post:
      tags: [auth]
      summary: Authenticate user and establish session (browser)
      description: |
        Authenticates a user and establishes a secure httpOnly cookie session.
        Use this endpoint for browser/web UI authentication. The session cookie is
        managed by the server and automatically sent with subsequent requests.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: alice@example.com
              password: "s3cr3t"
      responses:
        "200":
          description: Authentication successful, session cookie set
          headers:
            Set-Cookie:
              description: httpOnly session cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh session cookie (browser)
      description: |
        Refreshes the current session cookie. The session cookie is automatically
        sent with this request. No request body is required for cookie-based auth.
      operationId: refreshSession
      security:
        - CookieAuth: []
      responses:
        "200":
          description: Session refreshed, new cookie set
          headers:
            Set-Cookie:
              description: Refreshed httpOnly session cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/logout:
    post:
      tags: [auth]
      summary: Invalidate the current session (browser)
      description: |
        Invalidates the current session. The session cookie is automatically
        sent with this request. No request body is required for cookie-based auth.
      operationId: logout
      security:
        - CookieAuth: []
      responses:
        "200":
          description: Session invalidated, cookie cleared
          headers:
            Set-Cookie:
              description: Cleared session cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/validate:
    get:
      tags: [auth]
      summary: Validate the current session (browser)
      description: |
        Validates the current session. The session cookie is automatically
        sent with this request. Returns user and session information if valid.
      operationId: validateSession
      security:
        - CookieAuth: []
      responses:
        "200":
          description: Session is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/me:
    get:
      tags: [auth]
      summary: Return information about the authenticated user
      operationId: currentUser
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Service Info ────────────────────────────────────────────────────────────

  /api/v1/yappc/info:
    get:
      tags: [lifecycle]
      summary: Service metadata
      operationId: serviceInfo
      responses:
        "200":
          description: Service info
          content:
            application/json:
              example:
                name: YAPPC Lifecycle API
                version: "2.0.0"
                status: operational

  # ── Capabilities ─────────────────────────────────────────────────────────────

  /api/v1/capabilities:
    get:
      tags: [auth]
      summary: Get user capabilities
      description: Returns the capabilities available to the current user based on their role and context
      operationId: getCapabilities
      parameters:
        - name: workspaceId
          in: query
          description: Workspace ID to scope capabilities
          required: false
          schema:
            type: string
        - name: projectId
          in: query
          description: Project ID to scope capabilities
          required: false
          schema:
            type: string
      responses:
        "200":
          description: User capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilityResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [auth]
      summary: Query user capabilities
      description: Query capabilities for a specific context with optional correlation ID
      operationId: queryCapabilities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapabilityRequest"
      responses:
        "200":
          description: User capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilityResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Phase Cockpit ────────────────────────────────────────────────────────────

  /api/v1/phase/packet:
    get:
      tags: [lifecycle]
      summary: Get phase cockpit packet
      description: Returns the canonical phase cockpit packet for a project and phase
      operationId: getPhasePacket
      parameters:
        - name: phase
          in: query
          description: Lifecycle phase (intent, shape, validate, generate, run, observe, learn, evolve)
          required: true
          schema:
            type: string
            enum: [intent, shape, validate, generate, run, observe, learn, evolve]
        - name: projectId
          in: query
          description: Project ID
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace ID
          required: false
          schema:
            type: string
        - name: correlationId
          in: query
          description: Optional correlation ID for tracing
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Phase cockpit packet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhaseCockpitPacket"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [lifecycle]
      summary: Request phase cockpit packet
      description: Request the canonical phase cockpit packet with full request body
      operationId: requestPhasePacket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhasePacketRequest"
      responses:
        "200":
          description: Phase cockpit packet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhaseCockpitPacket"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ── Dashboard Actions ─────────────────────────────────────────────────────────

  /api/v1/dashboard/actions:
    get:
      tags: [lifecycle]
      summary: Get dashboard actions
      description: Returns backend-derived dashboard actions for a workspace
      operationId: getDashboardActions
      parameters:
        - name: workspaceId
          in: query
          description: Workspace ID
          required: true
          schema:
            type: string
        - name: correlationId
          in: query
          description: Optional correlation ID for tracing
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Dashboard actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectDashboardActions"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [lifecycle]
      summary: Request dashboard actions
      description: Request backend-derived dashboard actions with full request body
      operationId: requestDashboardActions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DashboardActionRequest"
      responses:
        "200":
          description: Dashboard actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectDashboardActions"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Workspaces ─────────────────────────────────────────────────────────────

  /api/workspaces:
    get:
      tags: [workspaces]
      summary: List workspaces for the authenticated user
      operationId: listWorkspaces
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Database service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [workspaces]
      summary: Create a workspace and optional starter project
      operationId: createWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/workspaces/{workspaceId}:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [workspaces]
      summary: Get a workspace with owned and included projects
      operationId: getWorkspace
      responses:
        "200":
          description: Workspace detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: Database service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [workspaces]
      summary: Update workspace metadata
      operationId: updateWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [workspaces]
      summary: Delete a workspace
      operationId: deleteWorkspace
      responses:
        "204":
          description: Workspace deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/workspaces/suggest-name:
    get:
      tags: [workspaces]
      summary: Suggest a workspace name
      operationId: suggestWorkspaceName
      responses:
        "200":
          description: Suggested workspace name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NameSuggestionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Projects ───────────────────────────────────────────────────────────────

  /api/projects:
    get:
      tags: [projects]
      summary: List owned and included projects for a workspace
      operationId: listProjects
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workspace project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      tags: [projects]
      summary: Create a project owned by a workspace
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/projects/dashboard-actions:
    get:
      tags: [projects]
      summary: List backend-backed dashboard blocker, review, and continuation actions
      operationId: listProjectDashboardActions
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dashboard action summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDashboardActionsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/projects/{projectId}/dashboard-actions/execute:
    post:
      tags: [projects]
      summary: Execute a safe backend-backed dashboard action
      operationId: executeProjectDashboardAction
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteProjectDashboardActionRequest"
      responses:
        "200":
          description: Safe dashboard action executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteProjectDashboardActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Action requires review before one-click execution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/projects/{projectId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [projects]
      summary: Get a single project with ownership context
      operationId: getProject
      parameters:
        - name: workspaceId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [projects]
      summary: Update a project owned by the current workspace
      operationId: updateProject
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "403":
          description: Current workspace does not own the project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [projects]
      summary: Delete a project owned by the current workspace
      operationId: deleteProject
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Project deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Current workspace does not own the project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/projects/include:
    post:
      tags: [projects]
      summary: Include a read-only project in another workspace
      operationId: includeProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncludeProjectRequest"
      responses:
        "201":
          description: Project inclusion created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncludedProjectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [projects]
      summary: Remove a project inclusion from a workspace
      operationId: removeIncludedProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncludeProjectRequest"
      responses:
        "204":
          description: Inclusion removed

  /api/projects/available-for-inclusion:
    get:
      tags: [projects]
      summary: List projects that can be included in a workspace
      operationId: listAvailableProjectsForInclusion
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Available projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableProjectsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/projects/suggest-name:
    get:
      tags: [projects]
      summary: Suggest a project name for a workspace
      operationId: suggestProjectName
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProjectType"
      responses:
        "200":
          description: Suggested project name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NameSuggestionResponse"

  /api/projects/setup-suggestion:
    post:
      tags: [projects]
      summary: Suggest initial project setup from description and workspace context
      operationId: suggestProjectSetup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectSetupSuggestionRequest"
      responses:
        "200":
          description: Project setup suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSetupSuggestion"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Lifecycle ───────────────────────────────────────────────────────────────

  /api/v1/lifecycle/phases:
    get:
      tags: [lifecycle]
      summary: List all lifecycle phases
      operationId: listPhases
      responses:
        "200":
          description: Ordered list of phases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhaseList"

  /api/v1/lifecycle/advance:
    post:
      tags: [lifecycle]
      summary: Advance a project to the next lifecycle phase
      description: |
        Runs all three gate checks (entry criteria, exit criteria, required artifacts).
        Returns 200 if the gate passes, 409 if any blocker is present.
      operationId: advancePhase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvancePhaseRequest"
      responses:
        "200":
          description: Phase advanced successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhaseTransitionResult"
        "409":
          description: Gate check failed — phase not advanced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhaseTransitionResult"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Intent ──────────────────────────────────────────────────────────────────

  /api/v1/yappc/intent/capture:
    post:
      tags: [intent]
      summary: Capture product intent
      operationId: captureIntent
      parameters:
        - name: X-Tenant-ID
          in: header
          required: true
          schema:
            type: string
        - name: X-Workspace-ID
          in: header
          required: true
          schema:
            type: string
        - name: X-Project-ID
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptureIntentRequest"
      responses:
        "200":
          description: Intent captured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/yappc/intent/analyze:
    post:
      tags: [intent]
      summary: Analyze captured intent
      description: Sends the captured intent through the guided enrichment pipeline for decomposition and review.
      operationId: analyzeIntent
      parameters:
        - name: X-Tenant-ID
          in: header
          required: true
          schema:
            type: string
        - name: X-Workspace-ID
          in: header
          required: true
          schema:
            type: string
        - name: X-Project-ID
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeIntentRequest"
      responses:
        "200":
          description: Intent analysis result
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/yappc/intent/{id}:
    get:
      tags: [intent]
      summary: Get a captured intent by ID
      operationId: getIntent
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - name: X-Tenant-ID
          in: header

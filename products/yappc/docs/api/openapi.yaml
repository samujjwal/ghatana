              content:
                type: string
              type:
                type: string
                enum: [component, style, test, documentation, other, route]
              source:
                type: string
        warnings:
          type: array
          items:
            type: string
        errors:
          type: array
          items:
            type: string
        metadata:
          type: object
          required: [sourceType, source, importedAt, dependencies, fileCount, totalSize]
          properties:
            sourceType:
              type: string
            source:
              type: string
            importedAt:
              type: string
              format: date-time
            componentName:
              type: string
            dependencies:
              type: array
              items:
                type: string
            fileCount:
              type: integer
            totalSize:
              type: integer
        job:
          $ref: "#/components/schemas/SourceImportJob"


          type: string

    GenerateReviewDecisionResponse:
      type: object
      required: [runId, projectId, decision, status, reviewRequired, actorId, decidedAt, auditEvent, message]
      properties:
        runId:
          type: string
        projectId:
          type: string
        decision:
          type: string
          enum: [apply, reject, rollback]
        status:
          type: string
          enum: [APPLIED, REJECTED, ROLLED_BACK]
        reviewRequired:
          type: boolean
        actorId:
          type: string

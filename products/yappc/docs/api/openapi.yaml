          type: string
          format: date-time
        auditEvent:
          type: string
        message:
          type: string

    SourceImportRequest:
      type: object
      required: [sourceType, source, projectId]
      properties:
        sourceType:
          type: string
          enum: [tsx, route, storybook, artifact, zip]
        source:
          type: string
          maxLength: 4096
          description: HTTPS source URL or artifact reference.
        projectId:
          type: string
        targetComponentName:
          type: string
        options:
          type: object
          additionalProperties: true

    SourceImportResponse:
      type: object
      required: [success, files, warnings, errors, metadata]
      properties:
        success:

  - POST /api/v1/scaffold/projects/add-feature
  - POST /api/v1/scaffold/projects/update
  - GET  /api/v1/scaffold/projects/info
  - GET  /api/v1/scaffold/projects/state
  - GET  /api/v1/scaffold/projects/validate
  - GET  /api/v1/scaffold/projects/check-updates
  - POST /api/v1/scaffold/projects/preview-update
  - GET  /api/v1/scaffold/projects/features
  - POST /api/v1/scaffold/projects/export
  - POST /api/v1/scaffold/projects/import
  - POST /api/v1/templates/render
  - GET  /api/v1/templates/helpers
  - POST /api/v1/templates/validate
  - GET  /api/v1/dependencies/analyze/pack/{name}
  - POST /api/v1/dependencies/analyze/project
  - POST /api/v1/dependencies/conflicts
  - POST /api/v1/dependencies/add-conflicts

# ─── refactorer/api (RefactorerHttpServer) ────────────────────────────────────
refactorer-api:
  - POST   /api/v1/jobs
  - GET    /api/v1/jobs/{jobId}
  - DELETE /api/v1/jobs/{jobId}
  - GET    /api/v1/jobs/{jobId}/report
  - POST   /api/v1/jobs/{jobId}/start
  - POST   /api/v1/jobs/{jobId}/stop
  - POST   /api/v1/jobs/{jobId}/runs
  - GET    /api/v1/jobs/{jobId}/runs
  - GET    /api/v1/jobs/{jobId}/runs/{runId}
  - GET    /api/v1/jobs/{jobId}/runs/{runId}/logs
  - POST   /v1/diagnose
  - GET    /v1/config

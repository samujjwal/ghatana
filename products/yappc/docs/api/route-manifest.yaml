# YAPPC Route Manifest
# Single source of truth for all routes served by YAPPC servers.
# The CheckYappcOpenApiParity Gradle task fails if any route listed here
# does not appear in products/yappc/docs/api/openapi.yaml paths.
#
# Format: each route entry is  "METHOD /path"
# Parametrised segments use {name} notation (same as OpenAPI).
#
# Auth/scope metadata format (as comments):
# # @auth: public | required | optional
# # @scopes: scope1,scope2 (if applicable)
#
# Auth levels:
# - public: No authentication required
# - required: Authentication required (valid JWT or session cookie)
# - optional: Authentication optional (guest access allowed)
#
# Common scopes:
# - workspace:read: Read access to workspace data
# - workspace:write: Write access to workspace data
# - project:read: Read access to project data
# - project:write: Write access to project data
# - admin: Administrative operations


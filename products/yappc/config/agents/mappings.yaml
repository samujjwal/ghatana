# YAPPC Task-to-Agent Mappings
#
# Maps tasks to agents based on required capabilities.
# Used by the TaskExecutionCoordinator to dispatch tasks to appropriate agents.
#
# Mapping Rules:
# - primary_agent: The preferred agent for this task
# - fallback_agents: Alternative agents if primary is unavailable
# - capability_requirements: Required agent capabilities
# - execution_mode: How the task should be executed (sync, async, batch)


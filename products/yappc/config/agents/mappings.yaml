# ============================================================================
# Task-Specific Overrides
# ============================================================================

task_overrides:
  # Override specific tasks that need different agent assignments

  # Security-specific tasks that need security agent
  implementation/implement-auth-flow:
    primary_agent: security-analyzer
    capability_requirements:
      - security-analysis
      - code-generation

  # Performance-critical tasks
  implementation/optimize-critical-path:
    primary_agent: code-analyzer
    capability_requirements:
      - performance-analysis
      - code-generation

  # Database schema tasks
  implementation/design-database-schema:
    primary_agent: data-agent
    capability_requirements:
      - schema-design

  # Emergency debugging
  debugging/investigate-production-issue:
    primary_agent: debugger-agent
    execution_mode: sync
    priority: critical

  # Security vulnerabilities
  security/fix-vulnerability:
    primary_agent: security-analyzer
    execution_mode: sync
    priority: critical

# ============================================================================
# Execution Modes
# ============================================================================

execution_modes:
  sync:
    description: Synchronous execution, wait for result
    timeout_ms: 30000
    retry_count: 1

  async:
    description: Asynchronous execution with callback
    timeout_ms: 300000
    retry_count: 3

  batch:
    description: Batch processing for multiple items
    timeout_ms: 600000
    retry_count: 2
    batch_size: 10

# ============================================================================
# Fallback Rules
# ============================================================================

fallback_rules:
  # What to do when primary agent is unavailable

  on_agent_unavailable:
    action: use_fallback
    max_fallback_attempts: 2

  on_capability_missing:
    action: partial_execution
    notify_user: true

  on_all_agents_busy:
    action: queue
    max_queue_time_ms: 60000

  on_timeout:
    action: retry
    backoff_multiplier: 2

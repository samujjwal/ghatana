kind: AgentInstance
apiVersion: ghatana.agent/v2
metadata:
  id: instance.yappc.products-officer.default
  definition_ref: agent.yappc.products-officer
  tenant_id: default
  created: "2026-02-04T00:00:00Z"

spec:
  # Runtime overrides for the default tenant
  enabled: true
  
  generator_overrides:
    config:
      model: gpt-4-turbo  # Use faster model for default tenant
      temperature: 0.7
      max_tokens: 4000
  
  memory_overrides:
    retention_days: 180  # Shorter retention for default tenant
  
  cost_limits:
    max_tokens_per_turn: 6000
    max_cost_per_turn_usd: 0.40
    budget_type: shared_tenant
  
  observability:
    logging_level: info
    trace_sampling: 0.05  # Lower sampling for production

  custom_config:
    default_prioritization_framework: rice  # Reach, Impact, Confidence, Effort
    require_business_case: true
    min_confidence_score: 0.7

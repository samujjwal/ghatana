    - agent.yappc.unit-test-writer
  
  security-analysis:
    - agent.yappc.sentinel
    - agent.yappc.vuln-scanner
  
  architecture-planning:
    - agent.yappc.systems-architect
  
  deployment-automation:
    - agent.yappc.cloud-pilot
    - agent.yappc.deploy-orchestrator

  continuous-improvement:
    - agent.yappc.improve-orchestrator
    - agent.yappc.quality-guard-agent

  debugging:
    - agent.yappc.debug-orchestrator
    - agent.yappc.log-analysis-agent
    - agent.yappc.stack-trace-analyzer-agent
    - agent.yappc.root-cause-analysis-agent

  supply-chain-security:
    - agent.yappc.sbom-generator-agent
    - agent.yappc.sbom-signer-agent
    - agent.yappc.supply-chain-verifier-agent
    - agent.yappc.artifact-signer-agent

  cost-governance:
    - agent.yappc.cost-governor-agent
    - agent.yappc.budget-gate-agent

  dependency-governance:
    - agent.yappc.dependency-gate-agent
    - agent.yappc.dependency-auditor

  release-governance:
    - agent.yappc.release-governance-agent
    - agent.yappc.release-gate-agent

  notification:
    - agent.yappc.notification-agent

  feature-flag-management:
    - agent.yappc.feature-flag-agent
    - agent.yappc.feature-flag-integration-agent

# ============================================================================
# Governance Rules
# ============================================================================

governance:
  approval_chains:
    code_merge:
      - agent.yappc.sentinel  # Security check
      - agent.yappc.quality-guard-agent  # Quality check
      - agent.yappc.dependency-gate-agent  # Dependency vulnerability/license check
    
    architecture_change:
      - agent.yappc.systems-architect
      - agent.yappc.sentinel
    
    deployment:
      - agent.yappc.cloud-pilot
      - agent.yappc.sentinel
      - agent.yappc.release-governance-agent  # Multi-dimensional release gate
      - agent.yappc.supply-chain-verifier-agent  # SLSA provenance verification

    release:
      - agent.yappc.release-governance-agent  # Security + compliance + quality
      - agent.yappc.sbom-signer-agent  # SBOM signing
      - agent.yappc.supply-chain-verifier-agent  # Provenance chain
      - agent.yappc.sentinel  # Final security sign-off

    orchestration_budget:
      - agent.yappc.budget-gate-agent  # Pre-flight cost estimate
      - agent.yappc.cost-governor-agent  # Budget enforcement

  veto_powers:
    - agent: agent.yappc.sentinel
      scope:
        - security_violations
        - compliance_failures
        - critical_vulnerabilities

    - agent: agent.yappc.release-governance-agent
      scope:
        - release_security_gate
        - release_compliance_gate
        - release_quality_gate

    - agent: agent.yappc.dependency-gate-agent
      scope:
        - critical_vulnerability_in_dependency
        - license_violation

    - agent: agent.yappc.budget-gate-agent
      scope:
        - budget_exhausted

# ============================================================================
# Discovery & Routing
# ============================================================================

routing:
  default_strategic_agent: agent.yappc.products-officer
  
  task_routing:
    # SDLC Phase -> Primary Agent
    intent: agent.yappc.products-officer
    context: agent.yappc.context-gathering-agent
    shape: agent.yappc.systems-architect
    validate: agent.yappc.quality-guard-agent
    generate: agent.yappc.java-expert
    run: agent.yappc.cloud-pilot
    observe: agent.yappc.cloud-pilot
    debug: agent.yappc.debug-orchestrator
    secure: agent.yappc.sentinel
    institutionalize: agent.yappc.institutionalize-agent
    improve: agent.yappc.improve-orchestrator
    deploy: agent.yappc.deploy-orchestrator

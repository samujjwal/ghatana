# YAPPC Agent Registry
# Master catalog of all agent definitions and their relationships
#
# This file serves as the single source of truth for:
# - Agent hierarchy and delegation relationships
# - Agent discovery and routing
# - Capability-to-agent mappings
# - Phase-organized agent taxonomy (636 agents)

apiVersion: ghatana.yappc/v1
kind: AgentRegistry

metadata:
  version: 3.0.0
  updated: "2026-01-19T00:00:00Z"
  description: "Comprehensive agent registry for YAPPC platform - 636 agents across 10 domains + 13 phases"
  statistics:
    total_agents: 636
    level_1_orchestrators: 63
    level_2_experts: 120
    level_3_workers: 273
    domains_new: 10
    phases_existing: 13
    catalog_files: 17

# Phase-organized agent directories (existing)
phases:
  phase0-meta: "definitions/phase0-meta/"       # 33 agents - Governance, Knowledge, Orchestration, Integration
  phase1-ideation: "definitions/phase1-ideation/"   # 17 agents - Discovery, Validation, Research
  phase2-planning: "definitions/phase2-planning/"   # 12 agents - Roadmap, Sprint, Prioritization
  phase3-requirements: "definitions/phase3-requirements/"  # 12 agents - Stories, UX, NFRs
  phase4-architecture: "definitions/phase4-architecture/"  # 8 agents - Solution, Security, Data
  phase5-delivery: "definitions/phase5-delivery/"   # 10 agents - Tasks, Standups, Team Health
  phase6-build: "definitions/phase6-build/"      # 12 agents - Code, Review, CI/CD
  phase7-testing: "definitions/phase7-testing/"    # 10 agents - Test Gen, Coverage, Perf
  phase8-release: "definitions/phase8-release/"    # 16 agents - Deploy, Rollout, Rollback, SBOM, Supply Chain
  phase9-operations: "definitions/phase9-operations/"  # 9 agents - Monitor, Incident, SLO
  phase10-learning: "definitions/phase10-learning/"   # 6 agents - Postmortem, Lessons, Patterns
  phase11-enhancement: "definitions/phase11-enhancement/" # 6 agents - Feedback, A/B, Analytics
  phase12-scaling: "definitions/phase12-scaling/"   # 6 agents - Horizontal, Sharding, Team Topology
  phase13-devsecops: "definitions/phase13-devsecops/"  # 8 agents - Cloud Security, Compliance, Lifecycle
  phase-debug: "definitions/phase-debug/"           # 13 agents - Debug Orchestrator + 12 debug micro-agents


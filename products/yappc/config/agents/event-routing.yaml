# YAPPC Agent Event Routing
# Maps AEP event topics to agent IDs for reactive (event-driven) dispatch.
# Used by AgentEventOperator to route incoming events to the correct agent.

apiVersion: ghatana.yappc/v1
kind: AgentEventRouting

event_routing:
  # Debug triggers
  - topic: "test.failed"
    agent_id: "debug-orchestrator"
    description: "Route test failures to debug orchestrator for root cause analysis"

  - topic: "build.error"
    agent_id: "debug-orchestrator"
    description: "Route build errors to debug orchestrator"

  # Operations triggers
  - topic: "monitoring.alert.fired"
    agent_id: "operations-orchestrator-agent"
    description: "Route monitoring alerts to operations orchestrator"

  - topic: "incident.created"
    agent_id: "incident-management-orchestrator"
    description: "Route new incidents to incident management"

  - topic: "slo.budget.exhausted"
    agent_id: "operations-orchestrator-agent"
    description: "Route SLO budget exhaustion to operations"

  # Release & Deploy triggers
  - topic: "release.ready"
    agent_id: "deploy-orchestrator"
    description: "Route release-ready events to deploy orchestrator"

  - topic: "deployment.complete"
    agent_id: "operations-orchestrator-agent"
    description: "Route deployment completion to operations for health monitoring"

  - topic: "deployment.failed"
    agent_id: "debug-orchestrator"
    description: "Route deployment failures to debug orchestrator"

  # Improvement triggers
  - topic: "incident.resolved"
    agent_id: "improve-orchestrator"
    description: "Route resolved incidents to improve orchestrator for postmortem"

  - topic: "sprint.completed"
    agent_id: "improve-orchestrator"
    description: "Route sprint completion for retrospective analysis"

  - topic: "feedback.received"
    agent_id: "improve-orchestrator"
    description: "Route user feedback to improve orchestrator"

  # Security triggers
  - topic: "security.vulnerability.detected"
    agent_id: "security-posture-orchestrator"
    description: "Route new vulnerability detections to security posture"

  - topic: "compliance.audit.requested"
    agent_id: "compliance-audit-orchestrator"
    description: "Route compliance audit requests"

  # Knowledge triggers
  - topic: "knowledge.updated"
    agent_id: "knowledge-canonicalization-agent"
    description: "Route knowledge updates for canonicalization"

  - topic: "context.changed"
    agent_id: "decision-reevaluation-agent"
    description: "Route context changes for decision re-evaluation"

  # Guardrail triggers (always-on)
  - topic: "agent.output.produced"
    agent_id: "audit-trail-agent"
    description: "All agent outputs are audited"

  - topic: "agent.cost.recorded"
    agent_id: "cost-governor-agent"
    description: "All agent costs are tracked"

  # Canary & Rollback triggers
  - topic: "deployment.canary.metrics.ready"
    agent_id: "canary-analysis-agent"
    description: "Route canary metrics to canary analysis agent for rollout decision"

  - topic: "deployment.canary.failed"
    agent_id: "rollback-coordinator-agent"
    description: "Route canary failure to rollback coordinator"

  - topic: "deployment.smoke.failed"
    agent_id: "rollback-coordinator-agent"
    description: "Route post-deploy smoke test failure to rollback coordinator"

  - topic: "deployment.rollback.requested"
    agent_id: "rollback-coordinator-agent"
    description: "Route manual rollback requests to rollback coordinator"

  # Supply chain & SBOM triggers
  - topic: "sbom.generated"
    agent_id: "sbom-signer-agent"
    description: "Route generated SBOMs to signer for Sigstore signing"

  - topic: "release.artifact.signed"
    agent_id: "supply-chain-verifier-agent"
    description: "Route signed artifacts to supply chain verifier for provenance check"

  # Release governance triggers
  - topic: "release.candidate.ready"
    agent_id: "release-governance-agent"
    description: "Route release candidates to release governance for multi-dimensional gate check"

  # Budget gate triggers
  - topic: "orchestration.requested"
    agent_id: "budget-gate-agent"
    description: "Pre-flight cost check before any LLM-heavy orchestration"

  # Dependency gate triggers
  - topic: "build.dependencies.resolved"
    agent_id: "dependency-gate-agent"
    description: "Route resolved dependency trees to dependency gate for vulnerability and license check"

  # Notification triggers
  - topic: "notification.requested"
    agent_id: "notification-agent"
    description: "Route notification requests to notification agent for channel dispatch"

  - topic: "hitl.approval.needed"
    agent_id: "notification-agent"
    description: "Route HITL approval requests to notification agent for engineer notification"

  # Feature flag triggers
  - topic: "deployment.feature-flags.sync"
    agent_id: "feature-flag-integration-agent"
    description: "Route feature flag sync requests to flag integration agent"

  # ── New Domain Event Routing (10 strategic domains) ─────────────────────

  # Portfolio domain triggers
  - topic: "portfolio.review.requested"
    agent_id: "portfolio-orchestrator"
    description: "Route portfolio review requests to portfolio orchestrator"

  - topic: "roadmap.update.requested"
    agent_id: "portfolio-orchestrator"
    description: "Route roadmap update requests to portfolio orchestrator"

  - topic: "investment.evaluation.requested"
    agent_id: "portfolio-orchestrator"
    description: "Route investment evaluation requests to portfolio orchestrator"

  # Discovery domain triggers
  - topic: "research.session.requested"
    agent_id: "discovery-orchestrator"
    description: "Route user research session requests to discovery orchestrator"

  - topic: "market.analysis.requested"
    agent_id: "discovery-orchestrator"
    description: "Route market analysis requests to discovery orchestrator"

  - topic: "insights.synthesis.requested"
    agent_id: "discovery-orchestrator"
    description: "Route insight synthesis requests to discovery orchestrator"

  # Ideation domain triggers
  - topic: "ideation.session.requested"
    agent_id: "ideation-orchestrator"
    description: "Route ideation session requests to ideation orchestrator"

  - topic: "concept.evaluation.requested"
    agent_id: "ideation-orchestrator"
    description: "Route concept evaluation requests to ideation orchestrator"

  # Requirements domain triggers
  - topic: "requirements.capture.requested"
    agent_id: "requirements-orchestrator"
    description: "Route requirements capture requests to requirements orchestrator"

  - topic: "spec.validation.requested"
    agent_id: "requirements-orchestrator"
    description: "Route spec validation requests to requirements orchestrator"

  - topic: "acceptance-criteria.generate.requested"
    agent_id: "requirements-orchestrator"
    description: "Route AC generation requests to requirements orchestrator"

  # UX domain triggers
  - topic: "ux.research.requested"
    agent_id: "ux-orchestrator"
    description: "Route UX research requests to UX orchestrator"

  - topic: "usability.test.requested"
    agent_id: "ux-orchestrator"
    description: "Route usability test requests to UX orchestrator"

  - topic: "accessibility.audit.requested"
    agent_id: "ux-orchestrator"
    description: "Route accessibility audit requests to UX orchestrator"

  - topic: "design-system.update.requested"
    agent_id: "ux-orchestrator"
    description: "Route design system update requests to UX orchestrator"

  # Architecture domain triggers
  - topic: "architecture.review.requested"
    agent_id: "architecture-orchestrator"
    description: "Route architecture review requests to architecture orchestrator"

  - topic: "adr.create.requested"
    agent_id: "architecture-orchestrator"
    description: "Route ADR creation requests to architecture orchestrator"

  - topic: "api.design.requested"
    agent_id: "architecture-orchestrator"
    description: "Route API design requests to architecture orchestrator"

  - topic: "tech-radar.update.requested"
    agent_id: "architecture-orchestrator"
    description: "Route tech radar update requests to architecture orchestrator"

  # Engineering domain triggers
  - topic: "code.quality.review.requested"
    agent_id: "engineering-orchestrator"
    description: "Route code quality review requests to engineering orchestrator"

  - topic: "technical.debt.assessment.requested"
    agent_id: "engineering-orchestrator"
    description: "Route technical debt assessment requests to engineering orchestrator"

  - topic: "platform.improvement.requested"
    agent_id: "engineering-orchestrator"
    description: "Route platform improvement requests to engineering orchestrator"

  # AI domain triggers
  - topic: "model.evaluation.requested"
    agent_id: "ai-orchestrator"
    description: "Route model evaluation requests to AI orchestrator"

  - topic: "prompt.engineering.requested"
    agent_id: "ai-orchestrator"
    description: "Route prompt engineering requests to AI orchestrator"

  - topic: "ai.safety.review.requested"
    agent_id: "ai-orchestrator"
    description: "Route AI safety review requests to AI orchestrator"

  - topic: "ml.pipeline.build.requested"
    agent_id: "ai-orchestrator"
    description: "Route ML pipeline build requests to AI orchestrator"

  # Operations domain triggers
  - topic: "sre.review.requested"
    agent_id: "operations-orchestrator"
    description: "Route SRE review requests to operations orchestrator"

  - topic: "change.request.created"
    agent_id: "operations-orchestrator"
    description: "Route change requests to operations orchestrator"

  - topic: "cost.optimization.requested"
    agent_id: "operations-orchestrator"
    description: "Route cost optimization requests to operations orchestrator"

  - topic: "on-call.escalation.requested"
    agent_id: "operations-orchestrator"
    description: "Route on-call escalation requests to operations orchestrator"

  - topic: "runbook.execution.requested"
    agent_id: "operations-orchestrator"
    description: "Route runbook execution requests to operations orchestrator"

  # Product Intelligence domain triggers
  - topic: "feedback.analysis.requested"
    agent_id: "product-intelligence-orchestrator"
    description: "Route feedback analysis requests to product intelligence orchestrator"

  - topic: "experiment.create.requested"
    agent_id: "product-intelligence-orchestrator"
    description: "Route experiment creation requests to product intelligence orchestrator"

  - topic: "metrics.analysis.requested"
    agent_id: "product-intelligence-orchestrator"
    description: "Route metrics analysis requests to product intelligence orchestrator"

  - topic: "enhancement.prioritization.requested"
    agent_id: "product-intelligence-orchestrator"
    description: "Route enhancement prioritization requests to product intelligence orchestrator"

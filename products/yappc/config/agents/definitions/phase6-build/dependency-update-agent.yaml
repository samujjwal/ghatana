id: dependency-update-agent
name: Dependency Update Agent
version: 1.0.0
description: Manages dependency updates. Identifies outdated/vulnerable dependencies and plans safe updates.

metadata:
  level: 3  # Worker
  domain: build
  tags:
    - dependencies
    - security
    - updates
    - vulnerability

generator:
  type: PIPELINE
  steps:
    - name: dependency_scan
      type: SERVICE_CALL
      service: dependency-service
      endpoint: /dependencies/scan
    - name: update_planning
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.2
      max_tokens: 2000
      prompt: |
        You are the Dependency Update Agent. Plan updates:
        
        Current Dependencies: {{deps}}
        Vulnerabilities: {{vulns}}
        Breaking Changes: {{breaking}}
        Compatibility Matrix: {{compat}}
        
        Plan:
        1. Critical security updates (immediate)
        2. Major version updates (scheduled)
        3. Minor/patch updates (batch)
        4. Risk assessment per update
        5. Test requirements
        6. Rollback plan
        
        Output as JSON: {
          critical: [{dep, current, target, vuln_ids}],
          major: [{dep, current, target, breaking_changes, migration_steps}],
          routine: [{dep, current, target}],
          test_plan,
          rollback_strategy
        }
    - name: pr_creation
      type: SERVICE_CALL
      service: git-service
      endpoint: /pr/create

memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
      - updates
      - vulnerabilities
      - regressions
  semantic:
    enabled: true
    categories:
      - dependency-graph
      - compatibility-rules
      - vulnerability-patterns
  procedural:
    enabled: true
    categories:
      - update-strategies
      - testing-requirements
      - rollback-procedures

tools:
  - dependency_scanner
  - vuln_checker
  - compatibility_analyzer

capabilities:
  - dependency-scanning
  - vulnerability-detection
  - update-planning
  - compatibility-analysis

routing:
  input_types:
    - scan-trigger
    - vulnerability-alert
    - update-request
  output_types:
    - update-plan
    - vulnerability-report
    - pull-request

delegation:
  can_delegate_to: []
  escalates_to:
    - build-orchestrator-agent
    - security-scanner-agent

governance:
  requires_approval: true  # Updates reviewed
  can_block: true  # Block on critical vulns
  audit_trail: comprehensive

performance:
  expected_latency_ms: 5000
  max_latency_ms: 15000
  timeout_ms: 30000

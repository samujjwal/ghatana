id: unit-test-writer
name: Unit Test Writer
version: 1.0.0
namespace: yappc.definitions.testing
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Atomic worker for generating JUnit 5 unit tests with 100% coverage target
summary: Atomic worker for generating JUnit 5 unit tests with 100% coverage target
metadata:
  level: 3
  domain: testing
  tags:
  - worker
  - testing
  - junit
  - coverage
identity:
  agentType: HYBRID
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: source-code
    schema: dynamic
  - name: test-request
    schema: dynamic
  outputs:
  - name: test-class-file
    schema: dynamic
  - name: coverage-report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: &id001
    - test-generator-agent
    - java-expert
learning:
  learningLevel: L3
  adaptationTargets:
    - PROCEDURAL_SKILL
    - SEMANTIC_FACT
    - NEGATIVE_KNOWLEDGE
  skillRefs:
    - skillId: junit-test-generation
      requiredLevel: L3
    - skillId: coverage-optimization
      requiredLevel: L2
    - skillId: activej-test-patterns
      requiredLevel: L2
  masteryBindings:
    - namespace: yappc
      registryRef: yappc-mastery-registry
      freshnessPolicy: default
      versionPolicy: semver
      obsolescencePolicy: default
  masteryPolicyRefs:
    - promotion-policy-v1
    - freshness-policy-v1
  evaluationRefs:
    - eval-pack-java-code-quality-v1
  provenanceRequired: true
  promotionRequired: true
  governanceWorkflow: false
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - test-generations
    - coverage-reports
    - test-failures
  semantic:
    enabled: true
    categories:
    - testing-patterns
    - edge-case-examples
  procedural:
    enabled: true
    categories:
    - activej-test-patterns
    - mocking-strategies
tools:
- jacoco_coverage
- test_runner
- mockito_helper
- assertion_generator
capabilities:
- test-generation
- coverage-analysis
- activej-test-patterns
routing:
  input_types:
  - source-code
  - test-request
  output_types:
  - test-class-file
  - coverage-report
delegation:
  can_delegate_to: []
  escalates_to: *id001
governance:
  requires_approval: false
  can_block: false
  audit_trail: minimal
performance:
  expected_latency_ms: 3000
  max_latency_ms: 10000
  timeout_ms: 15000

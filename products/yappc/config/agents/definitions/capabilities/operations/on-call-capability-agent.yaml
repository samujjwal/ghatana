id: on-call-capability-agent
name: On-Call Capability Agent
version: 1.0.0
namespace: yappc.capabilities.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Correlates alert storms to root incidents, makes escalation routing decisions, retrieves
  and selects relevant runbooks, triggers auto-remediation sequences, and provides real-time on-call situational
  awareness
summary: Correlates alert storms to root incidents, makes escalation routing decisions, retrieves and
  selects relevant runbook...
metadata:
  level: 2
  domain: operations
  tags:
  - capability
  - on-call
  - alerting
  - escalation
  - auto-remediation
  - incident
  - level2
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: alert_event
    schema: dynamic
  - name: incident_report
    schema: dynamic
  - name: on_call_handoff_request
    schema: dynamic
  outputs:
  - name: correlated_incident
    schema: dynamic
  - name: runbook_execution_plan
    schema: dynamic
  - name: escalation_plan
    schema: dynamic
  - name: status_update
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - alert-triage-task-agent
    - escalation-task-agent
    - runbook-execution-task-agent
    - auto-remediation-task-agent
    escalation: on-call-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - alert-correlations
    - runbook-executions
    - escalation-events
    - auto-remediations
  semantic:
    enabled: true
    categories:
    - runbook-library
    - service-topology
    - alert-patterns
  procedural:
    enabled: true
    categories:
    - alert-correlation-heuristics
    - escalation-routing-rules
    - auto-remediation-playbooks
tools:
- alert_correlator
- runbook_selector
- pagerduty_client
- auto_remediator
capabilities:
- alert-correlation
- escalation-routing
- runbook-retrieval-and-selection
- auto-remediation-triggering
- on-call-situational-awareness
routing:
  input_types:
  - alert_event
  - incident_report
  - on_call_handoff_request
  output_types:
  - correlated_incident
  - runbook_execution_plan
  - escalation_plan
  - status_update
delegation:
  can_delegate_to:
  - alert-triage-task-agent
  - escalation-task-agent
  - runbook-execution-task-agent
  - auto-remediation-task-agent
  escalates_to: on-call-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 500
  max_latency_ms: 3000
  timeout_ms: 15000

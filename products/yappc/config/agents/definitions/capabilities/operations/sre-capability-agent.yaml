id: sre-capability-agent
name: SRE Capability Agent
version: 1.0.0
namespace: yappc.capabilities.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: 'Executes SRE practices: SLO health monitoring, error budget burn rate calculation, toil
  identification, automated runbook step execution, and reliability risk assessment'
summary: 'Executes SRE practices: SLO health monitoring, error budget burn rate calculation, toil identification,
  automated run...'
metadata:
  level: 2
  domain: operations
  tags:
  - capability
  - sre
  - slo
  - error-budget
  - toil
  - runbook
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: slo_check_request
    schema: dynamic
  - name: reliability_review_request
    schema: dynamic
  - name: toil_report
    schema: dynamic
  outputs:
  - name: slo_health_report
    schema: dynamic
  - name: error_budget_status
    schema: dynamic
  - name: toil_analysis
    schema: dynamic
  - name: reliability_action_list
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - slo-management-task-agent
    - error-budget-task-agent
    - toil-automation-task-agent
    - runbook-execution-task-agent
    escalation: sre-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - slo-health-checks
    - error-budget-events
    - runbook-executions
    - toil-records
  semantic:
    enabled: true
    categories:
    - slo-definitions
    - runbook-library
    - reliability-patterns
  procedural:
    enabled: true
    categories:
    - burn-rate-calculation
    - toil-triage
    - error-budget-policy
tools:
- slo_tracker
- error_budget_calculator
- runbook_executor
- toil_analyser
capabilities:
- slo-monitoring
- error-budget-tracking
- toil-identification
- runbook-execution
- reliability-risk-assessment
routing:
  input_types:
  - slo_check_request
  - reliability_review_request
  - toil_report
  output_types:
  - slo_health_report
  - error_budget_status
  - toil_analysis
  - reliability_action_list
delegation:
  can_delegate_to:
  - slo-management-task-agent
  - error-budget-task-agent
  - toil-automation-task-agent
  - runbook-execution-task-agent
  escalates_to: sre-orchestrator
governance:
  requires_approval: false
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 30000

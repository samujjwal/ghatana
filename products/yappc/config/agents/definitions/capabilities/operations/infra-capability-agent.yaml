id: infra-capability-agent
name: Infrastructure Capability Agent
version: 1.0.0
namespace: yappc.capabilities.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: 'Executes infrastructure lifecycle operations: IaC plan generation, resource provisioning,
  drift detection and remediation, capacity planning, and compliance gate enforcement'
summary: 'Executes infrastructure lifecycle operations: IaC plan generation, resource provisioning, drift
  detection and remedia...'
metadata:
  level: 2
  domain: operations
  tags:
  - capability
  - infrastructure
  - iac
  - drift
  - capacity
  - provisioning
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: provisioning_request
    schema: dynamic
  - name: drift_report
    schema: dynamic
  - name: capacity_review_request
    schema: dynamic
  outputs:
  - name: iac_execution_plan
    schema: dynamic
  - name: drift_remediation_plan
    schema: dynamic
  - name: capacity_recommendation
    schema: dynamic
  - name: compliance_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - iac-provisioning-task-agent
    - drift-detection-task-agent
    - resource-lifecycle-task-agent
    - capacity-planning-task-agent
    escalation: infra-provisioning-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - provisioning-events
    - drift-detections
    - compliance-audits
    - capacity-changes
  semantic:
    enabled: true
    categories:
    - infra-patterns
    - compliance-rules
    - cost-benchmarks
  procedural:
    enabled: true
    categories:
    - iac-plan-templates
    - drift-remediation-procedures
    - capacity-scaling-policies
tools:
- terraform_plan
- drift_scanner
- cost_estimator
- compliance_checker
- capacity_analyser
capabilities:
- iac-plan-generation
- resource-provisioning
- drift-detection-remediation
- capacity-planning
- compliance-gate-enforcement
routing:
  input_types:
  - provisioning_request
  - drift_report
  - capacity_review_request
  output_types:
  - iac_execution_plan
  - drift_remediation_plan
  - capacity_recommendation
  - compliance_report
delegation:
  can_delegate_to:
  - iac-provisioning-task-agent
  - drift-detection-task-agent
  - resource-lifecycle-task-agent
  - capacity-planning-task-agent
  escalates_to: infra-provisioning-orchestrator
governance:
  requires_approval: false
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 5000
  max_latency_ms: 30000
  timeout_ms: 120000

id: change-management-capability-agent
name: Change Management Capability Agent
version: 1.0.0
namespace: yappc.capabilities.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Assesses change request risk, coordinates CAB review workflow, generates detailed rollback
  plans, tracks post-change verification, and maintains change audit trail
summary: Assesses change request risk, coordinates CAB review workflow, generates detailed rollback plans,
  tracks post-change...
metadata:
  level: 2
  domain: operations
  tags:
  - capability
  - change-management
  - cab
  - risk
  - rollback
  - audit
  - level2
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: change_request
    schema: dynamic
  - name: emergency_change_request
    schema: dynamic
  - name: post_change_review
    schema: dynamic
  outputs:
  - name: risk_assessment
    schema: dynamic
  - name: cab_brief
    schema: dynamic
  - name: rollback_plan
    schema: dynamic
  - name: post_change_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - change-assessment-task-agent
    - risk-scoring-task-agent
    - cab-workflow-task-agent
    - rollback-planning-task-agent
    - post-change-verification-task-agent
    escalation: change-management-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 1825
    categories:
    - change-requests
    - cab-reviews
    - risk-assessments
    - rollback-events
  semantic:
    enabled: true
    categories:
    - change-patterns
    - cab-policies
    - risk-heuristics
  procedural:
    enabled: true
    categories:
    - risk-scoring-procedures
    - cab-workflow-templates
    - rollback-playbooks
tools:
- change_tracker
- risk_scorer
- cab_workflow
- rollback_planner
capabilities:
- change-risk-assessment
- cab-coordination
- rollback-planning
- post-change-verification
- change-audit-trail
routing:
  input_types:
  - change_request
  - emergency_change_request
  - post_change_review
  output_types:
  - risk_assessment
  - cab_brief
  - rollback_plan
  - post_change_report
delegation:
  can_delegate_to:
  - change-assessment-task-agent
  - risk-scoring-task-agent
  - cab-workflow-task-agent
  - rollback-planning-task-agent
  - post-change-verification-task-agent
  escalates_to: change-management-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - change-advisory-board
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 10000
  max_latency_ms: 60000
  timeout_ms: 300000

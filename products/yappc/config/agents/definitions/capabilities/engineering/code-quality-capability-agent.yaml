id: code-quality-capability-agent
name: Code Quality Capability Agent
version: 1.0.0
namespace: yappc.capabilities.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: 'Ensures code quality: code review, static analysis orchestration, linting compliance, cyclomatic
  complexity analysis, duplication detection, and quality gate enforcement'
summary: 'Ensures code quality: code review, static analysis orchestration, linting compliance, cyclomatic
  complexity analysis,...'
metadata:
  level: 2
  domain: engineering
  tags:
  - capability
  - code-quality
  - code-review
  - static-analysis
  - linting
  - quality-gates
  - level2
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: code_review_request
    schema: dynamic
  - name: pr_diff
    schema: dynamic
  - name: quality_check
    schema: dynamic
  - name: commit_for_review
    schema: dynamic
  outputs:
  - name: code_review_comments
    schema: dynamic
  - name: quality_gate_decision
    schema: dynamic
  - name: analysis_report
    schema: dynamic
  - name: fix_recommendations
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - code-reviewer
    - dependency-auditor
    - vuln-scanner
    - performance-optimizer
    escalation: engineering-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - code-reviews
    - static-analysis-results
    - quality-gate-decisions
    - fix-records
  semantic:
    enabled: true
    categories:
    - code-quality-patterns
    - review-patterns
    - quality-gate-thresholds
  procedural:
    enabled: true
    categories:
    - code-review-checklist
    - static-analysis-rules
    - quality-gate-criteria
tools:
- code_reviewer
- static_analyser
- checkstyle
- pmd
- eslint
- sonar_api
capabilities:
- code-review
- static-analysis-orchestration
- quality-gate-enforcement
- duplication-detection
- complexity-analysis
routing:
  input_types:
  - code_review_request
  - pr_diff
  - quality_check
  - commit_for_review
  output_types:
  - code_review_comments
  - quality_gate_decision
  - analysis_report
  - fix_recommendations
delegation:
  can_delegate_to:
  - code-reviewer
  - dependency-auditor
  - vuln-scanner
  - performance-optimizer
  escalates_to: engineering-orchestrator
governance:
  requires_approval: false
  can_block: true
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 15000
  timeout_ms: 60000

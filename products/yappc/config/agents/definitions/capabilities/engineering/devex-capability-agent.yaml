id: devex-capability-agent
name: Developer Experience Capability Agent
version: 1.0.0
namespace: yappc.capabilities.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: 'Improves developer experience: local dev environment tooling, CI/CD pipeline optimisation,
  developer documentation, onboarding experience, and build performance'
summary: 'Improves developer experience: local dev environment tooling, CI/CD pipeline optimisation, developer
  documentation, o...'
metadata:
  level: 2
  domain: engineering
  tags:
  - capability
  - devex
  - dx
  - developer-experience
  - ci-cd
  - onboarding
  - build
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: devex_review_request
    schema: dynamic
  - name: build_performance_request
    schema: dynamic
  - name: onboarding_review
    schema: dynamic
  - name: doc_gap_request
    schema: dynamic
  outputs:
  - name: devex_assessment_report
    schema: dynamic
  - name: improvement_plan
    schema: dynamic
  - name: ci_cd_optimisation_spec
    schema: dynamic
  - name: documentation_backlog
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - build-optimisation-task-agent
    - ci-cd-task-agent
    - documentation-gap-task-agent
    - onboarding-task-agent
    - dev-container-task-agent
    escalation: engineering-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - devex-assessments
    - improvement-plans
    - ci-cd-optimisations
    - doc-gap-reports
  semantic:
    enabled: true
    categories:
    - devex-patterns
    - build-optimisation-techniques
    - ci-cd-best-practices
  procedural:
    enabled: true
    categories:
    - devex-assessment-method
    - build-optimisation-steps
    - onboarding-improvement
tools:
- build_analyser
- cicd_metrics_api
- developer_feedback_aggregator
- docs_auditor
capabilities:
- developer-experience-assessment
- ci-cd-optimisation
- build-performance-improvement
- onboarding-experience-design
- developer-documentation
routing:
  input_types:
  - devex_review_request
  - build_performance_request
  - onboarding_review
  - doc_gap_request
  output_types:
  - devex_assessment_report
  - improvement_plan
  - ci_cd_optimisation_spec
  - documentation_backlog
delegation:
  can_delegate_to:
  - build-optimisation-task-agent
  - ci-cd-task-agent
  - documentation-gap-task-agent
  - onboarding-task-agent
  - dev-container-task-agent
  escalates_to: engineering-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 15000
  timeout_ms: 60000

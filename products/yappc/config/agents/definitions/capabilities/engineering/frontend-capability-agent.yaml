id: frontend-capability-agent
name: Frontend Engineering Capability Agent
version: 1.0.0
namespace: yappc.capabilities.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: 'Leads frontend engineering: React/RN component generation, state management architecture,
  performance optimisation, bundle analysis, and cross-browser compatibility'
summary: 'Leads frontend engineering: React/RN component generation, state management architecture, performance
  optimisation, b...'
metadata:
  level: 2
  domain: engineering
  tags:
  - capability
  - frontend
  - react
  - state-management
  - performance
  - accessibility
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: frontend_feature_request
    schema: dynamic
  - name: component_request
    schema: dynamic
  - name: perf_review
    schema: dynamic
  - name: bundle_analysis_request
    schema: dynamic
  outputs:
  - name: component_specs
    schema: dynamic
  - name: implementation_plan
    schema: dynamic
  - name: perf_optimisation_plan
    schema: dynamic
  - name: bundle_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - react-component-writer
    - react-expert
    - front-end-perf-task-agent
    - bundle-analysis-task-agent
    - a11y-implementation-task-agent
    escalation: frontend-engineering-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - component-specs
    - feature-implementations
    - perf-optimisations
    - bundle-analyses
  semantic:
    enabled: true
    categories:
    - component-patterns
    - react-patterns
    - state-architecture-library
  procedural:
    enabled: true
    categories:
    - component-generation-rules
    - state-management-patterns
    - perf-optimisation-techniques
tools:
- component_generator
- bundle_analyser
- perf_profiler
- accessibility_scanner
capabilities:
- react-component-generation
- state-management-architecture
- performance-optimisation
- bundle-analysis
- accessibility-implementation
routing:
  input_types:
  - frontend_feature_request
  - component_request
  - perf_review
  - bundle_analysis_request
  output_types:
  - component_specs
  - implementation_plan
  - perf_optimisation_plan
  - bundle_report
delegation:
  can_delegate_to:
  - react-component-writer
  - react-expert
  - front-end-perf-task-agent
  - bundle-analysis-task-agent
  - a11y-implementation-task-agent
  escalates_to: frontend-engineering-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 20000
  timeout_ms: 60000

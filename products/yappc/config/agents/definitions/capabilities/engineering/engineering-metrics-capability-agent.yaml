id: engineering-metrics-capability-agent
name: Engineering Metrics Capability Agent
version: 1.0.0
namespace: yappc.capabilities.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: 'Tracks and analyses engineering performance: DORA metrics, cycle time, code quality trends,
  test coverage, technical debt quantification, and team velocity'
summary: 'Tracks and analyses engineering performance: DORA metrics, cycle time, code quality trends,
  test coverage, technical...'
metadata:
  level: 2
  domain: engineering
  tags:
  - capability
  - engineering-metrics
  - dora
  - cycle-time
  - velocity
  - technical-debt
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: metrics_review_request
    schema: dynamic
  - name: engineering_health_check
    schema: dynamic
  - name: metrics_alert
    schema: dynamic
  outputs:
  - name: engineering_metrics_report
    schema: dynamic
  - name: dora_scorecard
    schema: dynamic
  - name: improvement_plan
    schema: dynamic
  - name: trend_analysis
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - dora-metrics-task-agent
    - cycle-time-task-agent
    - tech-debt-task-agent
    - code-quality-trend-task-agent
    escalation: engineering-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - metrics-snapshots
    - analysis-reports
    - improvement-actions
    - dora-trends
  semantic:
    enabled: true
    categories:
    - dora-benchmarks
    - improvement-patterns
    - engineering-practices-library
  procedural:
    enabled: true
    categories:
    - dora-measurement
    - cycle-time-analysis
    - technical-debt-quantification
tools:
- dora_metrics_api
- code_quality_scanner
- deploy_tracker
- cycle_time_analyser
capabilities:
- dora-metrics-tracking
- cycle-time-analysis
- code-quality-trending
- technical-debt-quantification
- velocity-analysis
routing:
  input_types:
  - metrics_review_request
  - engineering_health_check
  - metrics_alert
  output_types:
  - engineering_metrics_report
  - dora_scorecard
  - improvement_plan
  - trend_analysis
delegation:
  can_delegate_to:
  - dora-metrics-task-agent
  - cycle-time-task-agent
  - tech-debt-task-agent
  - code-quality-trend-task-agent
  escalates_to: engineering-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 15000
  timeout_ms: 60000

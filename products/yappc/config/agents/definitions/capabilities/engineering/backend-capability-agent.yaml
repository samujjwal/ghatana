id: backend-capability-agent
name: Backend Engineering Capability Agent
version: 1.0.0
namespace: yappc.capabilities.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: 'Leads backend engineering: API implementation, domain logic development, data access patterns,
  database migrations, integration testing, and service reliability'
summary: 'Leads backend engineering: API implementation, domain logic development, data access patterns,
  database migrations, i...'
metadata:
  level: 2
  domain: engineering
  tags:
  - capability
  - backend
  - api
  - domain-logic
  - database
  - migrations
  - java
  - level2
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: backend_feature_request
    schema: dynamic
  - name: api_implementation_request
    schema: dynamic
  - name: migration_request
    schema: dynamic
  - name: integration_request
    schema: dynamic
  outputs:
  - name: backend_implementation_spec
    schema: dynamic
  - name: api_handler
    schema: dynamic
  - name: migration_script
    schema: dynamic
  - name: integration_test_plan
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - java-class-writer
    - java-expert
    - api-handler-generator
    - db-guardian
    - migration-writer
    - unit-test-writer
    - integration-test-writer
    escalation: backend-engineering-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - backend-designs
    - api-implementations
    - migration-records
    - integration-results
  semantic:
    enabled: true
    categories:
    - backend-patterns
    - activej-patterns
    - api-design-standards
    - db-patterns
  procedural:
    enabled: true
    categories:
    - activej-coding-standards
    - repository-pattern
    - api-implementation-rules
tools:
- java_class_writer
- api_handler_generator
- db_guardian
- migration_planner
capabilities:
- api-implementation
- domain-logic-development
- database-migration
- integration-testing
- service-reliability
routing:
  input_types:
  - backend_feature_request
  - api_implementation_request
  - migration_request
  - integration_request
  output_types:
  - backend_implementation_spec
  - api_handler
  - migration_script
  - integration_test_plan
delegation:
  can_delegate_to:
  - java-class-writer
  - java-expert
  - api-handler-generator
  - db-guardian
  - migration-writer
  - unit-test-writer
  - integration-test-writer
  escalates_to: backend-engineering-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 8000
  max_latency_ms: 30000
  timeout_ms: 120000

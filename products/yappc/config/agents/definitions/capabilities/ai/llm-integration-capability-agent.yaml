id: llm-integration-capability-agent
name: LLM Integration Capability Agent
version: 1.0.0
namespace: yappc.capabilities.ai
status: active
owners:
- team: ai-platform
  contact: ai-platform@ghatana.com
description: 'Manages LLM integrations: model selection, prompt engineering, token management, cost optimisation,
  fallback chain design, and LLM output evaluation'
summary: 'Manages LLM integrations: model selection, prompt engineering, token management, cost optimisation,
  fallback chain de...'
metadata:
  level: 2
  domain: ai
  tags:
  - capability
  - llm
  - prompt-engineering
  - model-selection
  - cost
  - fallback
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: llm_task_request
    schema: dynamic
  - name: prompt_design_request
    schema: dynamic
  - name: model_selection_request
    schema: dynamic
  outputs:
  - name: model_selection
    schema: dynamic
  - name: prompt_spec
    schema: dynamic
  - name: cost_optimisation_plan
    schema: dynamic
  - name: fallback_chain
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - model-selection-task-agent
    - prompt-engineering-task-agent
    - cost-optimisation-task-agent
    - llm-evaluation-task-agent
    escalation: ai-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - model-selections
    - prompt-versions
    - evaluation-results
    - cost-records
  semantic:
    enabled: true
    categories:
    - prompt-patterns
    - model-benchmarks
    - cost-models
  procedural:
    enabled: true
    categories:
    - model-selection-criteria
    - prompt-engineering-techniques
    - cost-optimisation-rules
tools:
- model_selector
- prompt_evaluator
- token_counter
- cost_tracker
- llm_evaluator
capabilities:
- model-selection
- prompt-engineering
- token-management
- cost-optimisation
- fallback-chain-design
routing:
  input_types:
  - llm_task_request
  - prompt_design_request
  - model_selection_request
  output_types:
  - model_selection
  - prompt_spec
  - cost_optimisation_plan
  - fallback_chain
delegation:
  can_delegate_to:
  - model-selection-task-agent
  - prompt-engineering-task-agent
  - cost-optimisation-task-agent
  - llm-evaluation-task-agent
  escalates_to: ai-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 30000

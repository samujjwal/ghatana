id: opportunity-scoring-capability-agent
name: Opportunity Scoring Capability Agent
version: 1.0.0
namespace: yappc.capabilities.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: 'Scores and validates market opportunities: ICE/demand scoring, TAM/SAM/SOM sizing, feasibility
  assessment, and opportunity ranking for portfolio intake'
summary: 'Scores and validates market opportunities: ICE/demand scoring, TAM/SAM/SOM sizing, feasibility
  assessment, and opport...'
metadata:
  level: 2
  domain: discovery
  tags:
  - capability
  - opportunity
  - scoring
  - tam
  - feasibility
  - ice
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: opportunity_submission
    schema: dynamic
  - name: market_signal
    schema: dynamic
  - name: discovery_output
    schema: dynamic
  outputs:
  - name: opportunity_score
    schema: dynamic
  - name: market_sizing_report
    schema: dynamic
  - name: feasibility_assessment
    schema: dynamic
  - name: ice_score
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - demand-signal-detection-task-agent
    - opportunity-backlog-task-agent
    escalation: opportunity-assessment-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - opportunity-assessments
    - market-sizes
    - ice-scores
    - feasibility-reports
  semantic:
    enabled: true
    categories:
    - market-data
    - comparable-products
    - ice-benchmarks
  procedural:
    enabled: true
    categories:
    - tam-sam-som-methods
    - ice-scoring
    - feasibility-criteria
tools:
- market_data_api
- feasibility_checker
- ice_scorer
- opportunity_registry
capabilities:
- market-sizing
- opportunity-scoring
- feasibility-assessment
- demand-validation
routing:
  input_types:
  - opportunity_submission
  - market_signal
  - discovery_output
  output_types:
  - opportunity_score
  - market_sizing_report
  - feasibility_assessment
  - ice_score
delegation:
  can_delegate_to:
  - demand-signal-detection-task-agent
  - opportunity-backlog-task-agent
  escalates_to: opportunity-assessment-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 20000
  timeout_ms: 60000

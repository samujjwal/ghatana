id: competitive-intelligence-capability-agent
name: Competitive Intelligence Capability Agent
version: 1.0.0
namespace: yappc.capabilities.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: 'Tracks and analyses competitor products: feature parity mapping, positioning analysis, pricing
  intelligence, win/loss analysis, and competitive threat scoring'
summary: 'Tracks and analyses competitor products: feature parity mapping, positioning analysis, pricing
  intelligence, win/loss...'
metadata:
  level: 2
  domain: discovery
  tags:
  - capability
  - competitive-intelligence
  - competitor-analysis
  - positioning
  - level2
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: ci_request
    schema: dynamic
  - name: competitor_alert
    schema: dynamic
  - name: win_loss_report
    schema: dynamic
  - name: market_signal
    schema: dynamic
  outputs:
  - name: competitive_landscape_report
    schema: dynamic
  - name: feature_parity_matrix
    schema: dynamic
  - name: ci_brief
    schema: dynamic
  - name: threat_assessment
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - competitor-profile-task-agent
    - win-loss-analysis-task-agent
    - market-positioning-task-agent
    - pricing-intelligence-task-agent
    escalation: market-research-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - ci-briefings
    - competitor-moves
    - win-loss-data
    - parity-snapshots
  semantic:
    enabled: true
    categories:
    - competitor-profiles
    - feature-taxonomy
    - market-positioning
  procedural:
    enabled: true
    categories:
    - competitive-analysis-methods
    - win-loss-analysis
    - threat-scoring
tools:
- competitor_tracker
- market_data
- win_loss_database
- product_comparison_engine
capabilities:
- competitor-landscape-mapping
- feature-parity-analysis
- pricing-intelligence
- win-loss-analysis
- threat-scoring
routing:
  input_types:
  - ci_request
  - competitor_alert
  - win_loss_report
  - market_signal
  output_types:
  - competitive_landscape_report
  - feature_parity_matrix
  - ci_brief
  - threat_assessment
delegation:
  can_delegate_to:
  - competitor-profile-task-agent
  - win-loss-analysis-task-agent
  - market-positioning-task-agent
  - pricing-intelligence-task-agent
  escalates_to: market-research-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 8000
  max_latency_ms: 30000
  timeout_ms: 120000

id: customer-research-capability-agent
name: Customer Research Capability Agent
version: 1.0.0
namespace: yappc.capabilities.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: 'Leads customer research operations: interview facilitation, observation sessions, survey
  design, JTBD analysis, and insight synthesis from qualitative data'
summary: 'Leads customer research operations: interview facilitation, observation sessions, survey design,
  JTBD analysis, and i...'
metadata:
  level: 2
  domain: discovery
  tags:
  - capability
  - customer-research
  - jtbd
  - interviews
  - qualitative
  - level2
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: research_request
    schema: dynamic
  - name: raw_interview_data
    schema: dynamic
  - name: survey_results
    schema: dynamic
  - name: observation_notes
    schema: dynamic
  outputs:
  - name: research_plan
    schema: dynamic
  - name: insight_report
    schema: dynamic
  - name: jtbd_statements
    schema: dynamic
  - name: customer_narrative
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - interview-analysis-task-agent
    - jtbd-mapping-task-agent
    - persona-synthesis-task-agent
    - survey-analysis-task-agent
    escalation: customer-insight-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - research-sessions
    - interviews
    - surveys
    - insight-reports
  semantic:
    enabled: true
    categories:
    - customer-segments
    - jtbd-library
    - insight-themes
  procedural:
    enabled: true
    categories:
    - research-methodologies
    - synthesis-techniques
    - jtbd-extraction
tools:
- research_planner
- transcript_processor
- jtbd_framework
- insight_repository
capabilities:
- research-planning
- interview-synthesis
- jtbd-analysis
- qualitative-insight-extraction
routing:
  input_types:
  - research_request
  - raw_interview_data
  - survey_results
  - observation_notes
  output_types:
  - research_plan
  - insight_report
  - jtbd_statements
  - customer_narrative
delegation:
  can_delegate_to:
  - interview-analysis-task-agent
  - jtbd-mapping-task-agent
  - persona-synthesis-task-agent
  - survey-analysis-task-agent
  escalates_to: customer-insight-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 8000
  max_latency_ms: 30000
  timeout_ms: 120000

id: differentiation-capability-agent
name: Differentiation Capability Agent
version: 1.0.0
namespace: yappc.capabilities.ideation
status: active
owners:
- team: product
  contact: product@ghatana.com
description: 'Crafts product differentiation strategy: unique value proposition definition, positioning
  maps, moat analysis, and narrative differentiation for sales and marketing'
summary: 'Crafts product differentiation strategy: unique value proposition definition, positioning maps,
  moat analysis, and na...'
metadata:
  level: 2
  domain: ideation
  tags:
  - capability
  - differentiation
  - positioning
  - uvp
  - moat
  - narrative
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: differentiation_request
    schema: dynamic
  - name: concept
    schema: dynamic
  - name: competitive_analysis
    schema: dynamic
  outputs:
  - name: uvp
    schema: dynamic
  - name: positioning_map
    schema: dynamic
  - name: moat_analysis_report
    schema: dynamic
  - name: differentiation_narrative
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - uvp-task-agent
    - positioning-task-agent
    - moat-analysis-task-agent
    - differentiation-narrative-task-agent
    escalation: product-framing-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - differentiation-analyses
    - uvp-versions
    - moat-assessments
    - positioning-maps
  semantic:
    enabled: true
    categories:
    - competitive-positions
    - uvp-library
    - moat-patterns
  procedural:
    enabled: true
    categories:
    - positioning-map-method
    - uvp-crafting-technique
    - moat-analysis-framework
tools:
- competitive_intelligence
- positioning_map_tool
- uvp_evaluator
- moat_analyser
capabilities:
- uvp-definition
- positioning-map-creation
- moat-analysis
- differentiation-narrative
routing:
  input_types:
  - differentiation_request
  - concept
  - competitive_analysis
  output_types:
  - uvp
  - positioning_map
  - moat_analysis_report
  - differentiation_narrative
delegation:
  can_delegate_to:
  - uvp-task-agent
  - positioning-task-agent
  - moat-analysis-task-agent
  - differentiation-narrative-task-agent
  escalates_to: product-framing-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 8000
  max_latency_ms: 20000
  timeout_ms: 60000

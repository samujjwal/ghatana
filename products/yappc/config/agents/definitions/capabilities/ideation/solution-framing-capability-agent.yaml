id: solution-framing-capability-agent
name: Solution Framing Capability Agent
version: 1.0.0
namespace: yappc.capabilities.ideation
status: active
owners:
- team: product
  contact: product@ghatana.com
description: 'Frames product solutions from problem space insights: concept generation, solution architecture
  sketching, lean canvas population, and press-release/FAQ authoring'
summary: 'Frames product solutions from problem space insights: concept generation, solution architecture
  sketching, lean canva...'
metadata:
  level: 2
  domain: ideation
  tags:
  - capability
  - solution-framing
  - lean-canvas
  - press-release
  - concept
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: ideation_request
    schema: dynamic
  - name: problem_statement
    schema: dynamic
  - name: hypothesis_set
    schema: dynamic
  outputs:
  - name: solution_concept_set
    schema: dynamic
  - name: lean_canvas
    schema: dynamic
  - name: press_release_faq
    schema: dynamic
  - name: solution_brief
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - product-concept-task-agent
    - lean-canvas-task-agent
    - pr-faq-task-agent
    - solution-sketch-task-agent
    escalation: ideation-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - solution-concepts
    - lean-canvases
    - press-releases
    - concept-sessions
  semantic:
    enabled: true
    categories:
    - solution-patterns
    - lean-canvas-templates
    - concept-history
  procedural:
    enabled: true
    categories:
    - ideation-techniques
    - lean-canvas-method
    - working-backwards-method
tools:
- concept_generator
- lean_canvas_builder
- narrative_composer
capabilities:
- solution-concept-generation
- lean-canvas-authoring
- press-release-faq-writing
- solution-architecture-sketching
routing:
  input_types:
  - ideation_request
  - problem_statement
  - hypothesis_set
  output_types:
  - solution_concept_set
  - lean_canvas
  - press_release_faq
  - solution_brief
delegation:
  can_delegate_to:
  - product-concept-task-agent
  - lean-canvas-task-agent
  - pr-faq-task-agent
  - solution-sketch-task-agent
  escalates_to: ideation-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 8000
  max_latency_ms: 30000
  timeout_ms: 120000

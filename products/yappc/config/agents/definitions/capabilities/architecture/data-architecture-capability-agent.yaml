id: data-architecture-capability-agent
name: Data Architecture Capability Agent
version: 1.0.0
namespace: yappc.capabilities.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: 'Designs data architecture: data modelling, storage selection, data pipeline topology, schema
  migration strategies, and data governance policies'
summary: 'Designs data architecture: data modelling, storage selection, data pipeline topology, schema
  migration strategies, an...'
metadata:
  level: 2
  domain: architecture
  tags:
  - capability
  - data-architecture
  - data-modelling
  - storage
  - pipeline
  - migration
  - level2
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: data_architecture_request
    schema: dynamic
  - name: storage_selection_request
    schema: dynamic
  - name: migration_request
    schema: dynamic
  outputs:
  - name: data_model
    schema: dynamic
  - name: storage_recommendation
    schema: dynamic
  - name: migration_plan
    schema: dynamic
  - name: pipeline_spec
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - data-model-task-agent
    - storage-selection-task-agent
    - migration-strategy-task-agent
    - data-pipeline-task-agent
    escalation: architecture-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - data-models
    - storage-decisions
    - migration-plans
    - schema-histories
  semantic:
    enabled: true
    categories:
    - data-patterns
    - storage-technology-catalogue
    - migration-strategies
  procedural:
    enabled: true
    categories:
    - data-modelling-rules
    - storage-selection-criteria
    - expand-contract-pattern
tools:
- data_modeller
- storage_advisor
- migration_planner
- schema_registry
capabilities:
- data-modelling
- storage-technology-selection
- data-pipeline-design
- schema-migration-strategy
routing:
  input_types:
  - data_architecture_request
  - storage_selection_request
  - migration_request
  output_types:
  - data_model
  - storage_recommendation
  - migration_plan
  - pipeline_spec
delegation:
  can_delegate_to:
  - data-model-task-agent
  - storage-selection-task-agent
  - migration-strategy-task-agent
  - data-pipeline-task-agent
  escalates_to: architecture-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - architecture-board
  - data-governance-lead
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 8000
  max_latency_ms: 30000
  timeout_ms: 120000

id: data-architecture-capability-agent
name: Data Architecture Capability Agent
version: 1.0.0
description: "Designs data architecture: data modelling, storage selection, data pipeline topology, schema migration strategies, and data governance policies"

metadata:
  level: 2
  domain: architecture
  tags: [capability, data-architecture, data-modelling, storage, pipeline, migration, level2]

generator:
  type: PIPELINE
  steps:
    - name: data_model_design
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 3000
      prompt: |
        Design the data model:

        Requirements: {{input}}
        Access patterns: {{context.access_patterns}}
        Existing data models: {{context.existing_models}}
        Consistency requirements: {{context.consistency_requirements}}

        Produce: entity-relationship model, normalisation decision (3NF vs denormalised), indexing strategy, partitioning scheme, data sovereignty boundaries, multi-tenancy isolation model. Output data model spec JSON with justifications.
    - name: storage_selection
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2500
      prompt: |
        Select appropriate storage technologies:

        Data model: {{data_model_design}}
        Volume and velocity: {{context.data_volume}}
        Query patterns: {{context.access_patterns}}
        Budget constraints: {{context.budget}}

        Recommend storage technology per use case: relational (OLTP), columnar (OLAP), document, key-value, timeseries, graph, object storage, cache. Justify each choice against alternatives. Address data lifecycle (hot/warm/cold) and archival strategy.
    - name: migration_strategy
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2500
      prompt: |
        Design schema migration strategy:

        Current data model: {{context.current_data_model}}
        Target data model: {{data_model_design}}
        Zero-downtime requirement: {{context.downtime_tolerance}}

        Produce: migration phases, backward-compatible schema change sequence (expand/contract pattern), rollback checkpoints, data backfill approach, validation gates, estimated duration.

memory:
  episodic:
    enabled: true
    retention_days: 730
    categories: [data-models, storage-decisions, migration-plans, schema-histories]
  semantic:
    enabled: true
    categories: [data-patterns, storage-technology-catalogue, migration-strategies]
  procedural:
    enabled: true
    categories: [data-modelling-rules, storage-selection-criteria, expand-contract-pattern]

tools: [data_modeller, storage_advisor, migration_planner, schema_registry]

capabilities:
  - data-modelling
  - storage-technology-selection
  - data-pipeline-design
  - schema-migration-strategy

routing:
  input_types: [data_architecture_request, storage_selection_request, migration_request]
  output_types: [data_model, storage_recommendation, migration_plan, pipeline_spec]

delegation:
  can_delegate_to:
    - data-model-task-agent
    - storage-selection-task-agent
    - migration-strategy-task-agent
    - data-pipeline-task-agent
  escalates_to: architecture-orchestrator

governance:
  requires_approval: true
  approval_chain: [architecture-board, data-governance-lead]
  can_block: false
  audit_trail: comprehensive

performance:
  expected_latency_ms: 8000
  max_latency_ms: 30000
  timeout_ms: 120000

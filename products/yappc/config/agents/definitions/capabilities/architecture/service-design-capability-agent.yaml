id: service-design-capability-agent
name: Service Design Capability Agent
version: 1.0.0
namespace: yappc.capabilities.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: 'Designs service architectures: bounded context mapping, service boundary definition, API
  contract design, inter-service communication patterns, and dependency management'
summary: 'Designs service architectures: bounded context mapping, service boundary definition, API contract
  design, inter-servi...'
metadata:
  level: 2
  domain: architecture
  tags:
  - capability
  - service-design
  - bounded-context
  - api
  - microservices
  - ddd
  - level2
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: service_design_request
    schema: dynamic
  - name: domain_model_request
    schema: dynamic
  - name: api_design_request
    schema: dynamic
  outputs:
  - name: bounded_context_map
    schema: dynamic
  - name: service_interface_spec
    schema: dynamic
  - name: dependency_report
    schema: dynamic
  - name: api_contract
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - bounded-context-task-agent
    - api-design-task-agent
    - dependency-analysis-task-agent
    - service-interface-task-agent
    escalation: architecture-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - service-designs
    - bounded-contexts
    - api-contracts
    - dependency-analyses
  semantic:
    enabled: true
    categories:
    - service-patterns
    - ddd-models
    - api-design-standards
  procedural:
    enabled: true
    categories:
    - bounded-context-mapping
    - api-design-rules
    - dependency-analysis-method
tools:
- architecture_diagram_tool
- api_designer
- dependency_graph
- ddd_mapper
capabilities:
- bounded-context-mapping
- service-boundary-definition
- api-contract-design
- dependency-analysis
routing:
  input_types:
  - service_design_request
  - domain_model_request
  - api_design_request
  output_types:
  - bounded_context_map
  - service_interface_spec
  - dependency_report
  - api_contract
delegation:
  can_delegate_to:
  - bounded-context-task-agent
  - api-design-task-agent
  - dependency-analysis-task-agent
  - service-interface-task-agent
  escalates_to: architecture-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - architecture-board
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 8000
  max_latency_ms: 30000
  timeout_ms: 120000

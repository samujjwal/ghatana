id: event-architecture-capability-agent
name: Event Architecture Capability Agent
version: 1.0.0
namespace: yappc.capabilities.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: 'Designs event-driven architecture: event modelling, schema design, topic and partition strategy,
  event sourcing patterns, and CQRS implementation guidance'
summary: 'Designs event-driven architecture: event modelling, schema design, topic and partition strategy,
  event sourcing patte...'
metadata:
  level: 2
  domain: architecture
  tags:
  - capability
  - event-architecture
  - event-driven
  - kafka
  - cqrs
  - event-sourcing
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: event_architecture_request
    schema: dynamic
  - name: event_modelling_request
    schema: dynamic
  - name: cqrs_design_request
    schema: dynamic
  outputs:
  - name: event_model
    schema: dynamic
  - name: event_schema_set
    schema: dynamic
  - name: kafka_topology_spec
    schema: dynamic
  - name: cqrs_design
    schema: dynamic
  - name: sourcing_guide
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - event-storming-task-agent
    - schema-design-task-agent
    - topology-task-agent
    - cqrs-design-task-agent
    - event-sourcing-task-agent
    escalation: architecture-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - event-models
    - schema-designs
    - cqrs-designs
    - event-architecture-adrs
  semantic:
    enabled: true
    categories:
    - event-patterns
    - kafka-topology-templates
    - cqrs-patterns
  procedural:
    enabled: true
    categories:
    - event-storming-method
    - schema-design-rules
    - cqrs-implementation-guide
tools:
- event_modeller
- schema_registry
- kafka_topology_designer
- cqrs_framework_docs
capabilities:
- event-storming
- event-schema-design
- topic-partition-strategy
- event-sourcing-design
- cqrs-design
routing:
  input_types:
  - event_architecture_request
  - event_modelling_request
  - cqrs_design_request
  output_types:
  - event_model
  - event_schema_set
  - kafka_topology_spec
  - cqrs_design
  - sourcing_guide
delegation:
  can_delegate_to:
  - event-storming-task-agent
  - schema-design-task-agent
  - topology-task-agent
  - cqrs-design-task-agent
  - event-sourcing-task-agent
  escalates_to: architecture-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - architecture-board
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 8000
  max_latency_ms: 30000
  timeout_ms: 120000

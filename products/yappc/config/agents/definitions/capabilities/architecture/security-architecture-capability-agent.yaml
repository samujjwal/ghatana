id: security-architecture-capability-agent
name: Security Architecture Capability Agent
version: 1.0.0
namespace: yappc.capabilities.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: 'Designs security architecture: threat modelling, defence-in-depth layering, authentication/authorisation
  design, cryptography selection, and secure data flow design'
summary: 'Designs security architecture: threat modelling, defence-in-depth layering, authentication/authorisation
  design, cryp...'
metadata:
  level: 2
  domain: architecture
  tags:
  - capability
  - security-architecture
  - threat-modelling
  - authn
  - authz
  - cryptography
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: security_architecture_request
    schema: dynamic
  - name: threat_model_request
    schema: dynamic
  - name: auth_design_request
    schema: dynamic
  outputs:
  - name: threat_model
    schema: dynamic
  - name: security_controls_spec
    schema: dynamic
  - name: auth_design
    schema: dynamic
  - name: crypto_spec
    schema: dynamic
  - name: security_adr
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - threat-model-task-agent
    - security-controls-task-agent
    - auth-design-task-agent
    - crypto-selection-task-agent
    escalation: architecture-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - threat-models
    - security-designs
    - cryptography-decisions
    - security-reviews
  semantic:
    enabled: true
    categories:
    - stride-patterns
    - security-controls-library
    - cryptographic-standards
  procedural:
    enabled: true
    categories:
    - threat-modelling-method
    - defence-in-depth-framework
    - owasp-mitigations
tools:
- threat_modeller
- security_controls_analyser
- cryptography_advisor
- compliance_checker
capabilities:
- threat-modelling
- security-controls-design
- authentication-design
- authorisation-model-design
- cryptography-selection
routing:
  input_types:
  - security_architecture_request
  - threat_model_request
  - auth_design_request
  output_types:
  - threat_model
  - security_controls_spec
  - auth_design
  - crypto_spec
  - security_adr
delegation:
  can_delegate_to:
  - threat-model-task-agent
  - security-controls-task-agent
  - auth-design-task-agent
  - crypto-selection-task-agent
  escalates_to: architecture-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - security-lead
  - architecture-board
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 8000
  max_latency_ms: 30000
  timeout_ms: 120000

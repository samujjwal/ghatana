id: screen-design-capability-agent
name: Screen Design Capability Agent
version: 1.0.0
namespace: yappc.capabilities.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: 'Produces screen-level design specifications: wireframe descriptions, component layout, responsive
  behaviour, content hierarchy, and design token application'
summary: 'Produces screen-level design specifications: wireframe descriptions, component layout, responsive
  behaviour, content...'
metadata:
  level: 2
  domain: ux
  tags:
  - capability
  - screen-design
  - wireframes
  - layout
  - responsive
  - design-tokens
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: screen_design_request
    schema: dynamic
  - name: wireframe_request
    schema: dynamic
  - name: design_revision
    schema: dynamic
  outputs:
  - name: wireframe_spec
    schema: dynamic
  - name: screen_specification
    schema: dynamic
  - name: component_list
    schema: dynamic
  - name: responsive_layout
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - wireframe-task-agent
    - layout-task-agent
    - responsive-design-task-agent
    - design-token-task-agent
    escalation: ui-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - screen-designs
    - wireframes
    - token-applications
    - design-revisions
  semantic:
    enabled: true
    categories:
    - screen-patterns
    - layout-templates
    - design-token-library
  procedural:
    enabled: true
    categories:
    - wireframe-conventions
    - token-application-rules
    - responsive-grid-system
tools:
- wireframe_builder
- design_token_mapper
- component_library
- responsive_grid
capabilities:
- wireframe-specification
- component-layout
- responsive-design
- design-token-application
routing:
  input_types:
  - screen_design_request
  - wireframe_request
  - design_revision
  output_types:
  - wireframe_spec
  - screen_specification
  - component_list
  - responsive_layout
delegation:
  can_delegate_to:
  - wireframe-task-agent
  - layout-task-agent
  - responsive-design-task-agent
  - design-token-task-agent
  escalates_to: ui-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 20000
  timeout_ms: 60000

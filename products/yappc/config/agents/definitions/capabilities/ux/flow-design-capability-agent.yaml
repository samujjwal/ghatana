id: flow-design-capability-agent
name: Flow Design Capability Agent
version: 1.0.0
namespace: yappc.capabilities.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: 'Designs task and user flows: screen-level flow diagrams, decision trees, modal/drawer interaction
  flows, and edge case/error flow coverage'
summary: 'Designs task and user flows: screen-level flow diagrams, decision trees, modal/drawer interaction
  flows, and edge cas...'
metadata:
  level: 2
  domain: ux
  tags:
  - capability
  - flow-design
  - task-flow
  - user-flow
  - interaction-flow
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: flow_design_request
    schema: dynamic
  - name: user_story
    schema: dynamic
  - name: feature_requirements
    schema: dynamic
  outputs:
  - name: flow_diagram
    schema: dynamic
  - name: edge_case_report
    schema: dynamic
  - name: flow_specification
    schema: dynamic
  - name: navigation_update
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - task-flow-task-agent
    - error-flow-task-agent
    - edge-case-flow-task-agent
    - navigation-design-task-agent
    escalation: ux-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - flow-designs
    - flow-diagrams
    - edge-case-reviews
    - flow-revisions
  semantic:
    enabled: true
    categories:
    - flow-patterns
    - navigation-structures
    - error-flow-library
  procedural:
    enabled: true
    categories:
    - flow-design-rules
    - edge-case-checklist
    - mermaid-syntax
tools:
- flow_diagram_generator
- navigation_mapper
- edge_case_checker
capabilities:
- task-flow-design
- user-flow-diagramming
- edge-case-coverage
- error-flow-design
routing:
  input_types:
  - flow_design_request
  - user_story
  - feature_requirements
  output_types:
  - flow_diagram
  - edge_case_report
  - flow_specification
  - navigation_update
delegation:
  can_delegate_to:
  - task-flow-task-agent
  - error-flow-task-agent
  - edge-case-flow-task-agent
  - navigation-design-task-agent
  escalates_to: ux-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 15000
  timeout_ms: 60000

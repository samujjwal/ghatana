id: design-consistency-capability-agent
name: Design Consistency Capability Agent
version: 1.0.0
namespace: yappc.capabilities.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: 'Enforces design consistency: cross-screen component auditing, design token drift detection,
  pattern library compliance, and handoff quality validation'
summary: 'Enforces design consistency: cross-screen component auditing, design token drift detection,
  pattern library complianc...'
metadata:
  level: 2
  domain: ux
  tags:
  - capability
  - design-consistency
  - design-system
  - token-drift
  - pattern-compliance
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: consistency_check_request
    schema: dynamic
  - name: design_handoff
    schema: dynamic
  - name: component_review
    schema: dynamic
  - name: token_update
    schema: dynamic
  outputs:
  - name: consistency_audit_report
    schema: dynamic
  - name: drift_report
    schema: dynamic
  - name: compliance_score
    schema: dynamic
  - name: remediation_guide
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - token-drift-task-agent
    - consistency-check-task-agent
    - component-compliance-task-agent
    - handoff-validation-task-agent
    escalation: design-system-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - consistency-audits
    - drift-reports
    - compliance-scores
    - remediation-records
  semantic:
    enabled: true
    categories:
    - design-system-standards
    - component-library
    - token-catalogue
  procedural:
    enabled: true
    categories:
    - consistency-check-rules
    - drift-detection-methods
    - compliance-scoring
tools:
- design_token_store
- component_registry
- figma_inspector
- consistency_scorer
capabilities:
- consistency-auditing
- token-drift-detection
- pattern-library-compliance
- handoff-quality-validation
routing:
  input_types:
  - consistency_check_request
  - design_handoff
  - component_review
  - token_update
  output_types:
  - consistency_audit_report
  - drift_report
  - compliance_score
  - remediation_guide
delegation:
  can_delegate_to:
  - token-drift-task-agent
  - consistency-check-task-agent
  - component-compliance-task-agent
  - handoff-validation-task-agent
  escalates_to: design-system-orchestrator
governance:
  requires_approval: false
  can_block: true
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 10000
  timeout_ms: 30000

id: experimentation-capability-agent
name: Experimentation Capability Agent
version: 1.0.0
namespace: yappc.capabilities.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Designs statistically sound experiments (A/B, multivariate, holdout), configures experiment
  parameters, monitors running experiments for significance, performs statistical analysis, and renders
  clear verdicts with business interpretation
summary: Designs statistically sound experiments (A/B, multivariate, holdout), configures experiment parameters,
  monitors runn...
metadata:
  level: 2
  domain: product-intelligence
  tags:
  - capability
  - experimentation
  - ab-testing
  - statistics
  - hypothesis
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: experiment_request
    schema: dynamic
  - name: running_experiment_review
    schema: dynamic
  - name: experiment_conclusion_request
    schema: dynamic
  outputs:
  - name: experiment_design
    schema: dynamic
  - name: statistical_analysis_report
    schema: dynamic
  - name: experiment_verdict
    schema: dynamic
  - name: rollout_recommendation
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - ab-test-design-task-agent
    - statistical-analysis-task-agent
    - experiment-results-task-agent
    escalation: experimentation-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 1095
    categories:
    - experiment-designs
    - statistical-results
    - verdicts
    - rollout-outcomes
  semantic:
    enabled: true
    categories:
    - experiment-patterns
    - metric-definitions
    - statistical-benchmarks
  procedural:
    enabled: true
    categories:
    - sample-size-formulas
    - significance-testing
    - srm-detection
tools:
- experiment_designer
- stats_engine
- traffic_allocator
- results_monitor
capabilities:
- hypothesis-design
- experiment-configuration
- statistical-analysis
- significance-testing
- experiment-verdict
routing:
  input_types:
  - experiment_request
  - running_experiment_review
  - experiment_conclusion_request
  output_types:
  - experiment_design
  - statistical_analysis_report
  - experiment_verdict
  - rollout_recommendation
delegation:
  can_delegate_to:
  - ab-test-design-task-agent
  - statistical-analysis-task-agent
  - experiment-results-task-agent
  escalates_to: experimentation-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - product-lead
  - data-scientist
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 10000
  max_latency_ms: 60000
  timeout_ms: 300000

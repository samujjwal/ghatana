id: analytics-capability-agent
name: Analytics Capability Agent
version: 1.0.0
namespace: yappc.capabilities.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Computes product KPIs, builds and interprets funnel analyses, performs cohort and retention
  analysis, produces segmented usage reports, and surfaces leading indicators of product health
summary: Computes product KPIs, builds and interprets funnel analyses, performs cohort and retention analysis,
  produces segmen...
metadata:
  level: 2
  domain: product-intelligence
  tags:
  - capability
  - analytics
  - kpi
  - funnel
  - cohort
  - retention
  - level2
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: analytics_report_request
    schema: dynamic
  - name: kpi_review_request
    schema: dynamic
  - name: cohort_analysis_request
    schema: dynamic
  outputs:
  - name: kpi_report
    schema: dynamic
  - name: funnel_analysis
    schema: dynamic
  - name: cohort_retention_report
    schema: dynamic
  - name: insight_narrative
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - funnel-analysis-task-agent
    - cohort-analysis-task-agent
    - feature-adoption-task-agent
    - impact-estimation-task-agent
    escalation: product-intelligence-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 1095
    categories:
    - kpi-snapshots
    - funnel-analyses
    - cohort-results
    - retention-reports
  semantic:
    enabled: true
    categories:
    - metric-definitions
    - product-benchmarks
    - segment-profiles
  procedural:
    enabled: true
    categories:
    - kpi-computation-rules
    - funnel-construction
    - cohort-analysis-methods
tools:
- analytics_engine
- funnel_builder
- cohort_analyser
- kpi_dashboard
capabilities:
- kpi-computation
- funnel-analysis
- cohort-analysis
- retention-analysis
- segmented-usage-reporting
routing:
  input_types:
  - analytics_report_request
  - kpi_review_request
  - cohort_analysis_request
  output_types:
  - kpi_report
  - funnel_analysis
  - cohort_retention_report
  - insight_narrative
delegation:
  can_delegate_to:
  - funnel-analysis-task-agent
  - cohort-analysis-task-agent
  - feature-adoption-task-agent
  - impact-estimation-task-agent
  escalates_to: product-intelligence-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 10000
  max_latency_ms: 60000
  timeout_ms: 240000

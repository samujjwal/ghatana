id: feedback-capability-agent
name: Feedback Capability Agent
version: 1.0.0
namespace: yappc.capabilities.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Ingests multi-channel feedback (in-app, email, support tickets, app-store reviews, social),
  classifies by type and theme using NLP, performs sentiment analysis, clusters themes, and surfaces top-priority
  feedback signals
summary: Ingests multi-channel feedback (in-app, email, support tickets, app-store reviews, social), classifies
  by type and th...
metadata:
  level: 2
  domain: product-intelligence
  tags:
  - capability
  - feedback
  - nlp
  - sentiment
  - theme-clustering
  - voc
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: feedback_collection_request
    schema: dynamic
  - name: voc_review_request
    schema: dynamic
  - name: nps_analysis_request
    schema: dynamic
  outputs:
  - name: classified_feedback
    schema: dynamic
  - name: theme_cluster_report
    schema: dynamic
  - name: sentiment_trend_report
    schema: dynamic
  - name: churn_signal_alert
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - sentiment-analysis-task-agent
    - feedback-theme-clustering-task-agent
    - feedback-prioritisation-task-agent
    - nps-analysis-task-agent
    escalation: product-intelligence-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - feedback-ingestion-runs
    - theme-clustering-results
    - sentiment-trends
  semantic:
    enabled: true
    categories:
    - feedback-taxonomy
    - theme-library
    - product-known-issues
  procedural:
    enabled: true
    categories:
    - classification-criteria
    - theme-clustering-algorithms
    - sentiment-scoring
tools:
- feedback_collector
- nlp_classifier
- sentiment_analyser
- theme_clusterer
capabilities:
- multi-channel-feedback-ingestion
- nlp-classification
- sentiment-analysis
- theme-clustering
- churn-signal-detection
routing:
  input_types:
  - feedback_collection_request
  - voc_review_request
  - nps_analysis_request
  output_types:
  - classified_feedback
  - theme_cluster_report
  - sentiment_trend_report
  - churn_signal_alert
delegation:
  can_delegate_to:
  - sentiment-analysis-task-agent
  - feedback-theme-clustering-task-agent
  - feedback-prioritisation-task-agent
  - nps-analysis-task-agent
  escalates_to: product-intelligence-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 8000
  max_latency_ms: 45000
  timeout_ms: 180000

id: portfolio-analysis-capability-agent
name: Portfolio Analysis Capability Agent
version: 1.0.0
namespace: yappc.capabilities.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: 'Analyses product portfolio health: scoring initiatives, identifying gaps, modelling investment
  balance, and producing portfolio health reports'
summary: 'Analyses product portfolio health: scoring initiatives, identifying gaps, modelling investment
  balance, and producing...'
metadata:
  level: 2
  domain: portfolio
  tags:
  - capability
  - portfolio
  - analysis
  - investment
  - scoring
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: portfolio_review_request
    schema: dynamic
  - name: initiative_list
    schema: dynamic
  outputs:
  - name: portfolio_health_report
    schema: dynamic
  - name: scored_initiative_list
    schema: dynamic
  - name: rebalancing_recommendation
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - portfolio-scoring-task-agent
    - strategy-option-comparison-task-agent
    - budget-envelope-task-agent
    escalation: portfolio-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - portfolio-snapshots
    - health-reports
    - scoring-histories
  semantic:
    enabled: true
    categories:
    - scoring-models
    - industry-benchmarks
    - portfolio-patterns
  procedural:
    enabled: true
    categories:
    - scoring-procedures
    - gap-analysis-methods
    - rebalancing-rules
tools:
- portfolio_store
- scoring_engine
- benchmark_data
capabilities:
- portfolio-health-analysis
- initiative-scoring
- investment-balance-modelling
- gap-identification
routing:
  input_types:
  - portfolio_review_request
  - initiative_list
  output_types:
  - portfolio_health_report
  - scored_initiative_list
  - rebalancing_recommendation
delegation:
  can_delegate_to:
  - portfolio-scoring-task-agent
  - strategy-option-comparison-task-agent
  - budget-envelope-task-agent
  escalates_to: portfolio-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 20000
  timeout_ms: 60000

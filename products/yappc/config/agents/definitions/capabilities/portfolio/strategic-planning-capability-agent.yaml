id: strategic-planning-capability-agent
name: Strategic Planning Capability Agent
version: 1.0.0
namespace: yappc.capabilities.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: 'Facilitates strategic planning: vision articulation, north-star definition, market positioning,
  and annual/quarterly roadmap framing'
summary: 'Facilitates strategic planning: vision articulation, north-star definition, market positioning,
  and annual/quarterly...'
metadata:
  level: 2
  domain: portfolio
  tags:
  - capability
  - strategy
  - planning
  - vision
  - roadmap
  - level2
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: strategic_planning_request
    schema: dynamic
  - name: annual_planning_trigger
    schema: dynamic
  - name: strategy_review
    schema: dynamic
  outputs:
  - name: strategic_plan
    schema: dynamic
  - name: strategic_options_report
    schema: dynamic
  - name: north_star_brief
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - strategy-option-comparison-task-agent
    - strategic-dependency-review-task-agent
    - initiative-sequencing-task-agent
    escalation: product-strategy-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - strategic-sessions
    - option-evaluations
    - plan-versions
  semantic:
    enabled: true
    categories:
    - market-positions
    - strategic-frameworks
    - competitor-profiles
  procedural:
    enabled: true
    categories:
    - planning-methodologies
    - option-evaluation-criteria
tools:
- intelligence_store
- strategy_canvas
- scenario_modeller
capabilities:
- vision-articulation
- strategic-option-generation
- north-star-definition
- roadmap-framing
routing:
  input_types:
  - strategic_planning_request
  - annual_planning_trigger
  - strategy_review
  output_types:
  - strategic_plan
  - strategic_options_report
  - north_star_brief
delegation:
  can_delegate_to:
  - strategy-option-comparison-task-agent
  - strategic-dependency-review-task-agent
  - initiative-sequencing-task-agent
  escalates_to: product-strategy-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - executive-sponsor
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 8000
  max_latency_ms: 30000
  timeout_ms: 120000

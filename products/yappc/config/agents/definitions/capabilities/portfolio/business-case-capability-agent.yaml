id: business-case-capability-agent
name: Business Case Capability Agent
version: 1.0.0
namespace: yappc.capabilities.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: 'Constructs rigorous business cases: financial modelling, ROI analysis, cost-benefit analysis,
  risk quantification, and executive narratives for investment decisions'
summary: 'Constructs rigorous business cases: financial modelling, ROI analysis, cost-benefit analysis,
  risk quantification, an...'
metadata:
  level: 2
  domain: portfolio
  tags:
  - capability
  - business-case
  - roi
  - financial-modelling
  - investment
  - level2
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: business_case_request
    schema: dynamic
  - name: investment_proposal
    schema: dynamic
  outputs:
  - name: business_case_document
    schema: dynamic
  - name: financial_model
    schema: dynamic
  - name: risk_analysis
    schema: dynamic
  - name: executive_summary
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - business-case-drafting-task-agent
    - investment-risk-review-task-agent
    - budget-envelope-task-agent
    escalation: investment-planning-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - business-cases
    - financial-models
    - investment-decisions
  semantic:
    enabled: true
    categories:
    - financial-templates
    - industry-benchmarks
    - ROI-patterns
  procedural:
    enabled: true
    categories:
    - financial-modelling-steps
    - risk-quantification-methods
    - npv-calculation
tools:
- financial_modeller
- market_data
- risk_register
capabilities:
- financial-modelling
- roi-analysis
- cost-benefit-analysis
- risk-quantification
- executive-narrative
routing:
  input_types:
  - business_case_request
  - investment_proposal
  output_types:
  - business_case_document
  - financial_model
  - risk_analysis
  - executive_summary
delegation:
  can_delegate_to:
  - business-case-drafting-task-agent
  - investment-risk-review-task-agent
  - budget-envelope-task-agent
  escalates_to: investment-planning-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - finance-lead
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 8000
  max_latency_ms: 30000
  timeout_ms: 120000

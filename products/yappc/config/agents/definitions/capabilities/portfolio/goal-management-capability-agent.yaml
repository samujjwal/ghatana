id: goal-management-capability-agent
name: Goal Management Capability Agent
version: 1.0.0
namespace: yappc.capabilities.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: 'Manages OKR lifecycle: drafting, alignment checks, progress tracking, scoring, and retrospective
  analysis across product and engineering teams'
summary: 'Manages OKR lifecycle: drafting, alignment checks, progress tracking, scoring, and retrospective
  analysis across prod...'
metadata:
  level: 2
  domain: portfolio
  tags:
  - capability
  - okr
  - goals
  - kpi
  - alignment
  - tracking
  - level2
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: okr_planning_request
    schema: dynamic
  - name: okr_review_trigger
    schema: dynamic
  - name: progress_check
    schema: dynamic
  outputs:
  - name: okr_draft
    schema: dynamic
  - name: alignment_report
    schema: dynamic
  - name: progress_report
    schema: dynamic
  - name: retrospective_summary
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - okr-definition-task-agent
    - kpi-selection-task-agent
    - strategic-dependency-review-task-agent
    escalation: portfolio-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - okr-drafts
    - alignment-checks
    - progress-updates
    - cycle-retrospectives
  semantic:
    enabled: true
    categories:
    - okr-patterns
    - metric-definitions
    - team-structures
  procedural:
    enabled: true
    categories:
    - okr-drafting-rules
    - alignment-criteria
    - scoring-logic
tools:
- okr_tracker
- metrics_store
- team_registry
capabilities:
- okr-drafting
- goal-alignment
- progress-tracking
- cycle-retrospective
routing:
  input_types:
  - okr_planning_request
  - okr_review_trigger
  - progress_check
  output_types:
  - okr_draft
  - alignment_report
  - progress_report
  - retrospective_summary
delegation:
  can_delegate_to:
  - okr-definition-task-agent
  - kpi-selection-task-agent
  - strategic-dependency-review-task-agent
  escalates_to: portfolio-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 15000
  timeout_ms: 60000

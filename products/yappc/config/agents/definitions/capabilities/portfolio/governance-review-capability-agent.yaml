id: governance-review-capability-agent
name: Governance Review Capability Agent
version: 1.0.0
namespace: yappc.capabilities.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: 'Conducts portfolio governance reviews: policy compliance checks, approval workflow coordination,
  audit trail management, and escalation handling'
summary: 'Conducts portfolio governance reviews: policy compliance checks, approval workflow coordination,
  audit trail manageme...'
metadata:
  level: 2
  domain: portfolio
  tags:
  - capability
  - governance
  - compliance
  - audit
  - approval
  - level2
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: governance_review_request
    schema: dynamic
  - name: approval_request
    schema: dynamic
  - name: audit_query
    schema: dynamic
  outputs:
  - name: compliance_report
    schema: dynamic
  - name: approval_decision
    schema: dynamic
  - name: audit_record
    schema: dynamic
  - name: escalation_brief
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - executive-status-synthesis-task-agent
    escalation: governance-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 2555
    categories:
    - governance-reviews
    - compliance-checks
    - audit-records
    - approvals
  semantic:
    enabled: true
    categories:
    - governance-policies
    - compliance-patterns
    - approval-chains
  procedural:
    enabled: true
    categories:
    - review-procedures
    - escalation-rules
    - audit-standards
tools:
- policy_store
- governance_workflow
- audit_ledger
capabilities:
- policy-compliance-checking
- approval-workflow-coordination
- audit-trail-management
- escalation-handling
routing:
  input_types:
  - governance_review_request
  - approval_request
  - audit_query
  output_types:
  - compliance_report
  - approval_decision
  - audit_record
  - escalation_brief
delegation:
  can_delegate_to:
  - executive-status-synthesis-task-agent
  escalates_to: governance-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - governance-lead
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 5000
  max_latency_ms: 30000
  timeout_ms: 86400000

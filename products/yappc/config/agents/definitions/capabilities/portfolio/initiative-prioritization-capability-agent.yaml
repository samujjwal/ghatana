id: initiative-prioritization-capability-agent
name: Initiative Prioritization Capability Agent
version: 1.0.0
namespace: yappc.capabilities.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Applies structured frameworks (WSJF, ICE, RICE) to prioritise product initiatives and ensure
  portfolio sequencing aligns with capacity and strategy
summary: Applies structured frameworks (WSJF, ICE, RICE) to prioritise product initiatives and ensure
  portfolio sequencing ali...
metadata:
  level: 2
  domain: portfolio
  tags:
  - capability
  - prioritization
  - wsjf
  - ice
  - rice
  - sequencing
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: prioritisation_request
    schema: dynamic
  - name: initiative_list
    schema: dynamic
  - name: quarterly_planning_trigger
    schema: dynamic
  outputs:
  - name: ranked_initiative_list
    schema: dynamic
  - name: sequenced_roadmap
    schema: dynamic
  - name: prioritisation_rationale
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - portfolio-scoring-task-agent
    - initiative-sequencing-task-agent
    - budget-envelope-task-agent
    escalation: portfolio-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - prioritisation-decisions
    - scoring-outputs
    - sequencing-changes
  semantic:
    enabled: true
    categories:
    - scoring-frameworks
    - capacity-models
    - initiative-history
  procedural:
    enabled: true
    categories:
    - wsjf-calculations
    - rice-scoring
    - sequencing-rules
tools:
- initiative_registry
- scoring_engine
- capacity_planner
- roadmap_api
capabilities:
- initiative-scoring
- portfolio-sequencing
- capacity-aligned-planning
- prioritisation-rationale
routing:
  input_types:
  - prioritisation_request
  - initiative_list
  - quarterly_planning_trigger
  output_types:
  - ranked_initiative_list
  - sequenced_roadmap
  - prioritisation_rationale
delegation:
  can_delegate_to:
  - portfolio-scoring-task-agent
  - initiative-sequencing-task-agent
  - budget-envelope-task-agent
  escalates_to: portfolio-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 20000
  timeout_ms: 60000

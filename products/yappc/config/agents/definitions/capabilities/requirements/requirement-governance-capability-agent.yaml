id: requirement-governance-capability-agent
name: Requirement Governance Capability Agent
version: 1.0.0
namespace: yappc.capabilities.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: 'Governs requirement lifecycle: baseline management, change control, version history, signoff
  workflows, and requirement audit for regulated contexts'
summary: 'Governs requirement lifecycle: baseline management, change control, version history, signoff
  workflows, and requireme...'
metadata:
  level: 2
  domain: requirements
  tags:
  - capability
  - requirement-governance
  - baseline
  - change-control
  - signoff
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: change_request
    schema: dynamic
  - name: signoff_request
    schema: dynamic
  - name: audit_request
    schema: dynamic
  - name: baseline_freeze_trigger
    schema: dynamic
  outputs:
  - name: impact_report
    schema: dynamic
  - name: signoff_decision
    schema: dynamic
  - name: baseline_update_record
    schema: dynamic
  - name: audit_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - change-impact-task-agent
    - baseline-management-task-agent
    - signoff-workflow-task-agent
    - audit-report-task-agent
    escalation: traceability-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 2555
    categories:
    - baselines
    - change-requests
    - impact-analyses
    - signoff-records
  semantic:
    enabled: true
    categories:
    - requirement-baselines
    - change-patterns
    - governance-policies
  procedural:
    enabled: true
    categories:
    - change-control-process
    - signoff-matrix
    - baseline-management
tools:
- requirement_repository
- governance_workflow
- traceability_store
- audit_ledger
capabilities:
- baseline-management
- change-impact-analysis
- signoff-coordination
- version-history-management
- requirement-audit
routing:
  input_types:
  - change_request
  - signoff_request
  - audit_request
  - baseline_freeze_trigger
  output_types:
  - impact_report
  - signoff_decision
  - baseline_update_record
  - audit_report
delegation:
  can_delegate_to:
  - change-impact-task-agent
  - baseline-management-task-agent
  - signoff-workflow-task-agent
  - audit-report-task-agent
  escalates_to: traceability-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - product-lead
  - engineering-lead
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 5000
  max_latency_ms: 30000
  timeout_ms: 86400000

id: traceability-capability-agent
name: Traceability Capability Agent
version: 1.0.0
namespace: yappc.capabilities.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: 'Maintains bidirectional requirement traceability: linking business goals to requirements,
  test cases, and implementation; detecting coverage gaps and orphaned artefacts'
summary: 'Maintains bidirectional requirement traceability: linking business goals to requirements, test
  cases, and implementat...'
metadata:
  level: 2
  domain: requirements
  tags:
  - capability
  - traceability
  - trace-matrix
  - coverage
  - linkage
  - level2
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: traceability_request
    schema: dynamic
  - name: coverage_check
    schema: dynamic
  - name: artefact_change_event
    schema: dynamic
  outputs:
  - name: trace_matrix
    schema: dynamic
  - name: coverage_report
    schema: dynamic
  - name: gap_report
    schema: dynamic
  - name: remediation_plan
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - trace-link-task-agent
    - coverage-calculation-task-agent
    - orphan-detection-task-agent
    - gap-remediation-task-agent
    escalation: traceability-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - trace-matrices
    - coverage-analyses
    - gap-reports
    - remediation-plans
  semantic:
    enabled: true
    categories:
    - traceability-patterns
    - artefact-linkage-types
    - coverage-benchmarks
  procedural:
    enabled: true
    categories:
    - matrix-build-procedures
    - coverage-calculation
    - gap-prioritisation
tools:
- traceability_store
- artefact_registry
- coverage_calculator
capabilities:
- trace-matrix-management
- coverage-analysis
- gap-detection
- remediation-planning
- artefact-linkage
routing:
  input_types:
  - traceability_request
  - coverage_check
  - artefact_change_event
  output_types:
  - trace_matrix
  - coverage_report
  - gap_report
  - remediation_plan
delegation:
  can_delegate_to:
  - trace-link-task-agent
  - coverage-calculation-task-agent
  - orphan-detection-task-agent
  - gap-remediation-task-agent
  escalates_to: traceability-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 5000
  max_latency_ms: 20000
  timeout_ms: 60000

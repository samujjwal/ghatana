id: requirement-analysis-capability-agent
name: Requirement Analysis Capability Agent
version: 1.0.0
namespace: yappc.capabilities.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: 'Elicits, structures, and analyses product requirements: stakeholder needs extraction, conflict
  resolution, gap analysis, and NFR identification'
summary: 'Elicits, structures, and analyses product requirements: stakeholder needs extraction, conflict
  resolution, gap analys...'
metadata:
  level: 2
  domain: requirements
  tags:
  - capability
  - requirements
  - elicitation
  - analysis
  - stakeholders
  - nfr
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: elicitation_request
    schema: dynamic
  - name: raw_requirements
    schema: dynamic
  - name: stakeholder_input
    schema: dynamic
  - name: feature_request
    schema: dynamic
  outputs:
  - name: structured_requirements
    schema: dynamic
  - name: gap_report
    schema: dynamic
  - name: conflict_resolution_report
    schema: dynamic
  - name: nfr_list
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - requirement-capture-task-agent
    - nfr-extraction-task-agent
    - conflict-resolution-task-agent
    - stakeholder-interview-task-agent
    escalation: requirements-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - elicitation-sessions
    - requirement-sets
    - gap-analyses
    - conflict-resolutions
  semantic:
    enabled: true
    categories:
    - requirement-patterns
    - nfr-catalogue
    - stakeholder-profiles
  procedural:
    enabled: true
    categories:
    - elicitation-techniques
    - gap-analysis-methods
    - conflict-resolution-rules
tools:
- requirement_repository
- stakeholder_registry
- nfr_catalogue
- gap_analyser
capabilities:
- requirement-elicitation
- stakeholder-need-extraction
- gap-analysis
- conflict-resolution
- nfr-identification
routing:
  input_types:
  - elicitation_request
  - raw_requirements
  - stakeholder_input
  - feature_request
  output_types:
  - structured_requirements
  - gap_report
  - conflict_resolution_report
  - nfr_list
delegation:
  can_delegate_to:
  - requirement-capture-task-agent
  - nfr-extraction-task-agent
  - conflict-resolution-task-agent
  - stakeholder-interview-task-agent
  escalates_to: requirements-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 20000
  timeout_ms: 60000

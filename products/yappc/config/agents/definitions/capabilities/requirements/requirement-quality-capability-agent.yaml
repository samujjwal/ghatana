id: requirement-quality-capability-agent
name: Requirement Quality Capability Agent
version: 1.0.0
namespace: yappc.capabilities.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: 'Ensures requirement quality: INVEST criteria validation, ambiguity detection, acceptance
  criteria completeness, and testability scoring'
summary: 'Ensures requirement quality: INVEST criteria validation, ambiguity detection, acceptance criteria
  completeness, and t...'
metadata:
  level: 2
  domain: requirements
  tags:
  - capability
  - requirement-quality
  - invest
  - acceptance-criteria
  - testability
  - level2
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: requirement_quality_check
    schema: dynamic
  - name: requirement_set
    schema: dynamic
  - name: ac_review_request
    schema: dynamic
  outputs:
  - name: quality_report
    schema: dynamic
  - name: invest_scores
    schema: dynamic
  - name: ambiguity_report
    schema: dynamic
  - name: improved_requirements
    schema: dynamic
  - name: improved_acs
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - invest-validation-task-agent
    - ambiguity-detection-task-agent
    - ac-writing-task-agent
    - testability-check-task-agent
    escalation: requirements-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - quality-reviews
    - invest-scores
    - ambiguity-reports
    - ac-improvements
  semantic:
    enabled: true
    categories:
    - quality-patterns
    - invest-benchmarks
    - ac-templates
  procedural:
    enabled: true
    categories:
    - invest-scoring
    - ambiguity-detection-patterns
    - gherkin-writing
tools:
- requirement_quality_scorer
- ambiguity_detector
- ac_validator
capabilities:
- invest-validation
- ambiguity-detection
- acceptance-criteria-review
- testability-scoring
- requirement-rewriting
routing:
  input_types:
  - requirement_quality_check
  - requirement_set
  - ac_review_request
  output_types:
  - quality_report
  - invest_scores
  - ambiguity_report
  - improved_requirements
  - improved_acs
delegation:
  can_delegate_to:
  - invest-validation-task-agent
  - ambiguity-detection-task-agent
  - ac-writing-task-agent
  - testability-check-task-agent
  escalates_to: requirements-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 15000
  timeout_ms: 60000

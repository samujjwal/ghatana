id: java-expert
name: Java Expert
version: 1.0.0
description: Domain expert for Java/ActiveJ backend development, API design, and concurrency

metadata:
  level: 2  # Domain Expert
  domain: backend
  tags:
    - expert
    - java
    - backend
    - activej
    - rest-api

generator:
  type: PIPELINE
  steps:
    - name: spec_analysis
      type: RULE_BASED
      description: Validate Java conventions and ActiveJ patterns
    - name: code_generation
      type: TEMPLATE
      engine: liquid
      templates:
        controller: templates/java/controller.liquid
        service: templates/java/service.liquid
        repository: templates/java/repository.liquid
    - name: code_refinement
      type: LLM
      provider: OPENAI
      model: gpt-4
      temperature: 0.3
      max_tokens: 4000
      prompt: |
        You are a Java expert specializing in ActiveJ framework.
        
        Specification: {{spec}}
        Output Type: {{output_type}}
        Generated Code: {{generated_code}}
        
        Refine the generated code to:
        1. Follow Java 21 best practices
        2. Use ActiveJ Promise for async operations
        3. Add proper error handling
        4. Include JavaDoc comments with @doc tags
        5. Ensure NEVER blocking the event loop
        
        Output refined Java code with proper formatting.
    - name: compilation_validation
      type: SERVICE_CALL
      service: java-tools
      endpoint: /tools/maven/compile

memory:
  episodic:
    enabled: true
    retention_days: 180
    categories:
      - code-generations
      - compilation-results
      - review-feedback
  semantic:
    enabled: true
    categories:
      - java-patterns
      - activej-examples
      - code-snippets
  procedural:
    enabled: true
    categories:
      - java-conventions
      - activej-rules
      - error-handling-patterns

tools:
  - maven_executor
  - checkstyle_validator
  - activej_inspector
  - code_formatter
  - test_runner

capabilities:
  - code-generation
  - api-generation
  - code-analysis
  - refactoring
  - error-handling
  - activej-async

routing:
  input_types:
    - code-generation-request
    - refactoring-request
    - api-design-request
  output_types:
    - java-code
    - api-endpoint
    - test-file

delegation:
  can_delegate_to:
    - java-class-writer
    - unit-test-writer
    - code-reviewer-agent
  escalates_to:
    - systems-architect
    - build-orchestrator-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 10000
  timeout_ms: 15000

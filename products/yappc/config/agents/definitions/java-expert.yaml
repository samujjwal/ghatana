id: java-expert
name: Java Expert
version: 1.0.0
namespace: yappc.definitions.backend
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Domain expert for Java/ActiveJ backend development, API design, and concurrency
summary: Domain expert for Java/ActiveJ backend development, API design, and concurrency
metadata:
  level: 2
  domain: backend
  tags:
  - expert
  - java
  - backend
  - activej
  - rest-api
identity:
  agentType: hybrid
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: code-generation-request
    schema: dynamic
  - name: refactoring-request
    schema: dynamic
  - name: api-design-request
    schema: dynamic
  outputs:
  - name: java-code
    schema: dynamic
  - name: api-endpoint
    schema: dynamic
  - name: test-file
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - java-class-writer
    - unit-test-writer
    - code-reviewer-agent
    escalation: &id001
    - systems-architect
    - build-orchestrator-agent
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 180
    categories:
    - code-generations
    - compilation-results
    - review-feedback
  semantic:
    enabled: true
    categories:
    - java-patterns
    - activej-examples
    - code-snippets
  procedural:
    enabled: true
    categories:
    - java-conventions
    - activej-rules
    - error-handling-patterns
tools:
- maven_executor
- checkstyle_validator
- activej_inspector
- code_formatter
- test_runner
capabilities:
- code-generation
- api-generation
- code-analysis
- refactoring
- error-handling
- activej-async
routing:
  input_types:
  - code-generation-request
  - refactoring-request
  - api-design-request
  output_types:
  - java-code
  - api-endpoint
  - test-file
delegation:
  can_delegate_to:
  - java-class-writer
  - unit-test-writer
  - code-reviewer-agent
  escalates_to: *id001
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 10000
  timeout_ms: 15000

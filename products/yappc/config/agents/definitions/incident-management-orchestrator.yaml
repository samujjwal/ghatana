id: incident-management-orchestrator
name: Incident Management Orchestrator
version: 1.0.0
namespace: yappc.definitions.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Coordinates end-to-end incident response from detection to post-mortem
summary: Coordinates end-to-end incident response from detection to post-mortem
metadata:
  level: 2
  domain: operations
  tags:
  - incident-management
  - sre
  - orchestration
identity:
  agentType: hybrid
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: IncidentAlert
    schema: dynamic
  - name: ServiceDegradation
    schema: dynamic
  - name: OutageReport
    schema: dynamic
  outputs:
  - name: IncidentReport
    schema: dynamic
  - name: MitigationPlan
    schema: dynamic
  - name: PostMortem
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - incident-response-agent
    - postmortem-agent
    - monitoring-agent
    - stakeholder-communication-agent
    escalation: operations-orchestrator-agent
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 180
  semantic:
    enabled: true
    categories:
    - incident-patterns
    - resolution-strategies
    - root-causes
  procedural:
    enabled: true
tools:
- file_read
- file_write
capabilities:
- incident-triage
- response-coordination
- post-mortem-generation
routing:
  input_types:
  - IncidentAlert
  - ServiceDegradation
  - OutageReport
  output_types:
  - IncidentReport
  - MitigationPlan
  - PostMortem
delegation:
  can_delegate_to:
  - incident-response-agent
  - postmortem-agent
  - monitoring-agent
  - stakeholder-communication-agent
  escalates_to: operations-orchestrator-agent
governance:
  requires_approval: false
  can_block: false
performance:
  expected_latency_ms: 2000
  max_latency_ms: 5000
  timeout_ms: 10000

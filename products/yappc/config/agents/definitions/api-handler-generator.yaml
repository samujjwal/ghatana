id: agent.yappc.api-handler-generator
name: API Handler Generator
version: 1.0.0
namespace: yappc.definitions.general
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: REST API endpoint and handler generation agent
summary: REST API endpoint and handler generation agent
metadata:
  author: YAPPC Team
  level: 3
  tags:
  - api
  - backend
  - rest
  - generation
identity:
  agentType: HYBRID
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs: []
  outputs: []
interoperability:
  agentToAgent:
    enabled: false
    protocol: ghatana-a2a-v1
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
capabilities:
- rest-api-generation
- endpoint-design
- validation-logic
- documentation-generation

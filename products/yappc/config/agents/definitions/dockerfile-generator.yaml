id: agent.yappc.dockerfile-generator
name: Dockerfile Generator
version: 1.0.0
namespace: yappc.definitions.deployment
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Container configuration and Dockerfile generation agent
summary: Container configuration and Dockerfile generation agent
metadata:
  level: 3
  domain: deployment
  author: YAPPC Team
  tags:
  - docker
  - containerization
  - deployment
  - devops
identity:
  agentType: HYBRID
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs: []
  outputs: []
interoperability:
  agentToAgent:
    enabled: false
    protocol: ghatana-a2a-v1
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
capabilities:
- dockerfile-generation
- container-optimization
- multi-stage-builds
- security-hardening

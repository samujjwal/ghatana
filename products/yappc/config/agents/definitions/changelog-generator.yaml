id: changelog-generator
name: Changelog Generator
version: 1.0.0
namespace: yappc.definitions.documentation
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Generates release notes and changelogs from commit history and PRs
summary: Generates release notes and changelogs from commit history and PRs
metadata:
  level: 3
  domain: documentation
  tags:
  - changelog
  - release-notes
  - versioning
identity:
  agentType: hybrid
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: ReleaseRequest
    schema: dynamic
  - name: VersionTag
    schema: dynamic
  - name: CommitHistory
    schema: dynamic
  outputs:
  - name: Changelog
    schema: dynamic
  - name: ReleaseNotes
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: documentation-orchestrator
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 30
  semantic:
    enabled: true
    categories:
    - release-patterns
    - changelog-formats
  procedural:
    enabled: false
tools:
- git_log
- git_diff
- file_read
- file_write
capabilities:
- changelog-generation
- release-notes-generation
- breaking-change-documentation
routing:
  input_types:
  - ReleaseRequest
  - VersionTag
  - CommitHistory
  output_types:
  - Changelog
  - ReleaseNotes
delegation:
  can_delegate_to: []
  escalates_to: documentation-orchestrator
performance:
  expected_latency_ms: 2000
  max_latency_ms: 5000
  timeout_ms: 8000

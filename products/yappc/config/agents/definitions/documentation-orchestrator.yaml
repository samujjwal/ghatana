id: "documentation-orchestrator"
name: "Documentation Orchestrator"
version: "1.0.0"
description: "Coordinates comprehensive documentation generation across API docs, architecture diagrams, runbooks, and changelogs"

metadata:
  level: 2  # Expert level
  domain: "documentation"
  tags: ["documentation", "knowledge-management", "orchestration"]

generator:
  type: "pipeline"
  steps:
    - type: "rule-based"
      rules:
        - "Identify documentation gaps"
        - "Determine doc types needed (API, architecture, runbook, changelog)"
        - "Assign to specialized doc generators"
        - "Validate completeness"
    - type: "llm"
      provider: "openai"
      model: "gpt-4"
      temperature: 0.5
      prompt: |
        Documentation strategy for:
        {{project}}
        
        Components: {{components}}
        Audience: {{audience}}
        
        Create:
        1. Documentation plan (types, priorities)
        2. Content outline for each doc type
        3. Cross-references and navigation
        4. Maintenance schedule

memory:
  episodic:
    enabled: true
    retention_days: 90
  semantic:
    enabled: true
    categories: ["documentation-patterns", "content-templates"]
  procedural:
    enabled: true

tools:
  - "file_read"
  - "file_write"
  - "ast_parse"
  - "file_list"

capabilities:
  - "documentation-planning"
  - "content-coordination"
  - "completeness-validation"

routing:
  input_types: ["DocumentationRequest", "ProjectRelease", "ArchitectureChange"]
  output_types: ["DocumentationPlan", "Documentation", "DocIndex"]

delegation:
  can_delegate_to:
    - "api-doc-generator"
    - "architecture-diagram-agent"
    - "runbook-generator"
    - "changelog-generator"
    - "documentation-writer"
  escalates_to: "systems-architect"

performance:
  expected_latency_ms: 5000
  max_latency_ms: 15000
  timeout_ms: 30000

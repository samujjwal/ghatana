id: documentation-orchestrator
name: Documentation Orchestrator
version: 1.0.0
namespace: yappc.definitions.documentation
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Coordinates comprehensive documentation generation across API docs, architecture diagrams,
  runbooks, and changelogs
summary: Coordinates comprehensive documentation generation across API docs, architecture diagrams, runbooks,
  and changelogs
metadata:
  level: 2
  domain: documentation
  tags:
  - documentation
  - knowledge-management
  - orchestration
identity:
  agentType: hybrid
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: DocumentationRequest
    schema: dynamic
  - name: ProjectRelease
    schema: dynamic
  - name: ArchitectureChange
    schema: dynamic
  outputs:
  - name: DocumentationPlan
    schema: dynamic
  - name: Documentation
    schema: dynamic
  - name: DocIndex
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - api-doc-generator
    - architecture-diagram-agent
    - runbook-generator
    - changelog-generator
    - documentation-writer
    escalation: systems-architect
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 90
  semantic:
    enabled: true
    categories:
    - documentation-patterns
    - content-templates
  procedural:
    enabled: true
tools:
- file_read
- file_write
- ast_parse
- file_list
capabilities:
- documentation-planning
- content-coordination
- completeness-validation
routing:
  input_types:
  - DocumentationRequest
  - ProjectRelease
  - ArchitectureChange
  output_types:
  - DocumentationPlan
  - Documentation
  - DocIndex
delegation:
  can_delegate_to:
  - api-doc-generator
  - architecture-diagram-agent
  - runbook-generator
  - changelog-generator
  - documentation-writer
  escalates_to: systems-architect
performance:
  expected_latency_ms: 5000
  max_latency_ms: 15000
  timeout_ms: 30000

id: secret-store-integration-agent
name: Secret Store Integration Agent
version: 1.0.0
description: Bridges to secret management backends (HashiCorp Vault, AWS Secrets Manager). Provides secret retrieval, rotation triggers, and lease management. No business logic. Never logs secret values.

metadata:
  level: 3
  domain: integration
  tags: [integration, secret-store, vault, aws-secrets, deterministic]

generator:
  type: SERVICE_CALL
  service: secret-store-service
  endpoint: /api/v1

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [secret-operations, rotation-events]
  semantic:
    enabled: false

tools: [secret_read, secret_rotate, lease_renew]

capabilities:
  - security-analysis

routing:
  input_types: [secret-request, rotation-command]
  output_types: [secret-reference, rotation-status]

delegation:
  can_delegate_to: []
  escalates_to: sentinel

governance:
  requires_approval: false
  can_block: false
  audit_trail: comprehensive

performance:
  expected_latency_ms: 200
  max_latency_ms: 2000
  timeout_ms: 5000

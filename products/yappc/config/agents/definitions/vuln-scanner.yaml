id: vuln-scanner
name: Vulnerability Scanner
version: 1.0.0
namespace: yappc.definitions.security
status: active
owners:
- team: security
  contact: security@ghatana.com
description: Atomic worker for OWASP-based security vulnerability scanning
summary: Atomic worker for OWASP-based security vulnerability scanning
metadata:
  level: 3
  domain: security
  tags:
  - worker
  - security
  - scanning
  - owasp
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: scan-request
    schema: dynamic
  - name: code-artifact
    schema: dynamic
  - name: container-image
    schema: dynamic
  outputs:
  - name: vulnerability-report
    schema: dynamic
  - name: severity-summary
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: &id001
    - sentinel
    - security-scanner-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - scan-results
    - vulnerability-findings
  semantic:
    enabled: true
    categories:
    - known-vulnerabilities
    - cve-database
  procedural:
    enabled: false
tools:
- owasp_dependency_check
- sonarqube_scanner
- trivy_scanner
- semgrep
- gitleaks
capabilities:
- security-analysis
- dependency-analysis
- vulnerability-detection
routing:
  input_types:
  - scan-request
  - code-artifact
  - container-image
  output_types:
  - vulnerability-report
  - severity-summary
delegation:
  can_delegate_to: []
  escalates_to: *id001
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 120000
  timeout_ms: 180000

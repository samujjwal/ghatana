id: test-strategist
name: Test Strategist
version: 1.0.0
namespace: yappc.definitions.test-engineering
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Test strategy design, test plan creation, coverage analysis
summary: Test strategy design, test plan creation, coverage analysis
metadata:
  level: 2
  domain: test-engineering
  tags:
  - testing
  - test-strategy
  - coverage
  - quality
identity:
  agentType: HYBRID
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: TestStrategyRequest
    schema: dynamic
  - name: CoverageAnalysisRequest
    schema: dynamic
  outputs:
  - name: TestStrategy
    schema: dynamic
  - name: TestPlan
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - unit-test-writer
    - integration-test-writer
    - test-generator-agent
    escalation: testing-orchestrator-agent
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 90
  semantic:
    enabled: true
    categories:
    - test-patterns
    - edge-cases
    - test-strategies
  procedural:
    enabled: true
tools:
- jacoco_coverage
- metrics_complexity
- file_read
capabilities:
- test-strategy-design
- test-plan-creation
- coverage-analysis
- edge-case-identification
routing:
  input_types:
  - TestStrategyRequest
  - CoverageAnalysisRequest
  output_types:
  - TestStrategy
  - TestPlan
delegation:
  can_delegate_to:
  - unit-test-writer
  - integration-test-writer
  - test-generator-agent
  escalates_to: testing-orchestrator-agent
performance:
  expected_latency_ms: 3000
  max_latency_ms: 8000
  timeout_ms: 12000

id: topology-shape-unit
name: Topology Shape Unit
version: 1.0.0
namespace: yappc.micro-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Classify a system topology shape (hub-and-spoke, mesh, hierarchical, pipeline) from a service
  dependency graph
summary: Classify a system topology shape (hub-and-spoke, mesh, hierarchical, pipeline) from a service
  dependency graph
metadata:
  level: 3
  domain: architecture
  type: micro-agent
  tags:
  - topology-classification
  - graph-analysis
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: topology_request
    schema: dynamic
  outputs:
  - name: topology_shape
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: service-design-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- topology_classifier
capabilities:
- topology-classification
- graph-analysis
routing:
  input_types:
  - topology_request
  output_types:
  - topology_shape
delegation:
  can_delegate_to: []
  escalates_to: service-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

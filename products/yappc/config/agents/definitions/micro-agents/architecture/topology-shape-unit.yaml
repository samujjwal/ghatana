id: topology-shape-unit
name: Topology Shape Unit
version: 1.0.0
description: "Classify a system topology shape (hub-and-spoke, mesh, hierarchical, pipeline) from a service dependency graph"

metadata:
  level: 3
  domain: architecture
  type: micro-agent
  tags: [topology-classification, graph-analysis, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "topology-classification"
        - "graph-analysis"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [topology_classifier]

capabilities:
  - topology-classification
  - graph-analysis

routing:
  input_types: [topology_request]
  output_types: [topology_shape]

delegation:
  can_delegate_to: []
  escalates_to: service-design-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: event-versioning-unit
name: Event Versioning Unit
version: 1.0.0
namespace: yappc.micro-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Assign the correct semantic version to an event schema change based on change type (major/minor/patch)
summary: Assign the correct semantic version to an event schema change based on change type (major/minor/patch)
metadata:
  level: 3
  domain: architecture
  type: micro-agent
  tags:
  - version-assignment
  - semver-determination
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: versioning_request
    schema: dynamic
  outputs:
  - name: version_assignment
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: event-architecture-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- version_calculator
capabilities:
- version-assignment
- semver-determination
routing:
  input_types:
  - versioning_request
  output_types:
  - version_assignment
delegation:
  can_delegate_to: []
  escalates_to: event-architecture-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

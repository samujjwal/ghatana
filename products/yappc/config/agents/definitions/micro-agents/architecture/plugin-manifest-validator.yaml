id: plugin-manifest-validator
name: Plugin Manifest Validator
version: 1.0.0
namespace: yappc.micro-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Validate a plugin manifest against the plugin contract schema checking required fields and
  value constraints
summary: Validate a plugin manifest against the plugin contract schema checking required fields and value
  constraints
metadata:
  level: 3
  domain: architecture
  type: micro-agent
  tags:
  - manifest-validation
  - schema-conformance
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: manifest_validate_request
    schema: dynamic
  outputs:
  - name: manifest_validation_result
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: plugin-contract-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- manifest_validator
capabilities:
- manifest-validation
- schema-conformance
routing:
  input_types:
  - manifest_validate_request
  output_types:
  - manifest_validation_result
delegation:
  can_delegate_to: []
  escalates_to: plugin-contract-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

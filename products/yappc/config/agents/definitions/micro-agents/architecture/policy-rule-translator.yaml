id: policy-rule-translator
name: Policy Rule Translator
version: 1.0.0
namespace: yappc.micro-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Translate a natural language access policy rule into OPA Rego or CEL expression
summary: Translate a natural language access policy rule into OPA Rego or CEL expression
metadata:
  level: 3
  domain: architecture
  type: micro-agent
  tags:
  - rule-translation
  - opa-rego-generation
  - cel-generation
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: translate_request
    schema: dynamic
  outputs:
  - name: translated_rule
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: security-architecture-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- rule_translator
capabilities:
- rule-translation
- opa-rego-generation
- cel-generation
routing:
  input_types:
  - translate_request
  output_types:
  - translated_rule
delegation:
  can_delegate_to: []
  escalates_to: security-architecture-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 300
  max_latency_ms: 1500
  timeout_ms: 3000

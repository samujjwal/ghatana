id: schema-comparer
name: Schema Comparer
version: 1.0.0
namespace: yappc.micro-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Compare two schema versions (Avro/JSON Schema/Proto) and enumerate breaking vs. non-breaking
  changes
summary: Compare two schema versions (Avro/JSON Schema/Proto) and enumerate breaking vs
metadata:
  level: 3
  domain: architecture
  type: micro-agent
  tags:
  - schema-comparison
  - breaking-change-detection
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: schema_compare_request
    schema: dynamic
  outputs:
  - name: schema_diff
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: data-architecture-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- schema_comparator
capabilities:
- schema-comparison
- breaking-change-detection
routing:
  input_types:
  - schema_compare_request
  output_types:
  - schema_diff
delegation:
  can_delegate_to: []
  escalates_to: data-architecture-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

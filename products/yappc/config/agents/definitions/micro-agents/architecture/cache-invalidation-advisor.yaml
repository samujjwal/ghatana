id: cache-invalidation-advisor
name: Cache Invalidation Advisor
version: 1.0.0
description: "Recommend cache invalidation strategy (TTL, event-driven, version-tag) for a given data access and update pattern"

metadata:
  level: 3
  domain: architecture
  type: micro-agent
  tags: [invalidation-strategy-selection, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "invalidation-strategy-selection"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [invalidation_advisor]

capabilities:
  - invalidation-strategy-selection

routing:
  input_types: [invalidation_request]
  output_types: [invalidation_strategy]

delegation:
  can_delegate_to: []
  escalates_to: data-architecture-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

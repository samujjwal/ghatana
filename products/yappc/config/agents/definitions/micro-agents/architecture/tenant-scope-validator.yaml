id: tenant-scope-validator
name: Tenant Scope Validator
version: 1.0.0
description: "Validate that a database query or API call includes tenant-scoping predicates to prevent cross-tenant data access"

metadata:
  level: 3
  domain: architecture
  type: micro-agent
  tags: [tenant-scope-validation, predicate-checking, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "tenant-scope-validation"
        - "predicate-checking"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [scope_validator]

capabilities:
  - tenant-scope-validation
  - predicate-checking

routing:
  input_types: [scope_validate_request]
  output_types: [scope_verdict]

delegation:
  can_delegate_to: []
  escalates_to: security-architecture-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

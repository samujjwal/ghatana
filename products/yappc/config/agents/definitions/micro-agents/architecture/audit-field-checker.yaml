id: audit-field-checker
name: Audit Field Checker
version: 1.0.0
namespace: yappc.micro-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Verify that a data model or event schema includes all required audit fields (created_at,
  updated_at, created_by, tenant_id)
summary: Verify that a data model or event schema includes all required audit fields (created_at, updated_at,
  created_by, tena...
metadata:
  level: 3
  domain: architecture
  type: micro-agent
  tags:
  - audit-field-checking
  - schema-compliance
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: audit_check_request
    schema: dynamic
  outputs:
  - name: audit_field_result
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: security-architecture-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- audit_field_checker
capabilities:
- audit-field-checking
- schema-compliance
routing:
  input_types:
  - audit_check_request
  output_types:
  - audit_field_result
delegation:
  can_delegate_to: []
  escalates_to: security-architecture-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

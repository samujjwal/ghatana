id: role-scope-checker
name: Role Scope Checker
version: 1.0.0
description: "Check that a permission assignment is within the allowed scope for the requesting role"

metadata:
  level: 3
  domain: architecture
  type: micro-agent
  tags: [role-scope-checking, permission-validation, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "role-scope-checking"
        - "permission-validation"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [role_scope_checker]

capabilities:
  - role-scope-checking
  - permission-validation

routing:
  input_types: [scope_check_request]
  output_types: [scope_check_result]

delegation:
  can_delegate_to: []
  escalates_to: security-architecture-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: role-scope-checker
name: Role Scope Checker
version: 1.0.0
namespace: yappc.micro-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Check that a permission assignment is within the allowed scope for the requesting role
summary: Check that a permission assignment is within the allowed scope for the requesting role
metadata:
  level: 3
  domain: architecture
  type: micro-agent
  tags:
  - role-scope-checking
  - permission-validation
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: scope_check_request
    schema: dynamic
  outputs:
  - name: scope_check_result
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: security-architecture-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- role_scope_checker
capabilities:
- role-scope-checking
- permission-validation
routing:
  input_types:
  - scope_check_request
  output_types:
  - scope_check_result
delegation:
  can_delegate_to: []
  escalates_to: security-architecture-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

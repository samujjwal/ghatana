id: runbook-step-executor
name: Runbook Step Executor
version: 1.0.0
namespace: yappc.micro-agents.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Execute a single runbook step command with timeout, output capture, and exit-code-based success
  determination
summary: Execute a single runbook step command with timeout, output capture, and exit-code-based success
  determination
metadata:
  level: 3
  domain: operations
  type: micro-agent
  tags:
  - step-execution
  - command-execution
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: step_execute_request
    schema: dynamic
  outputs:
  - name: step_execution_result
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: sre-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- step_executor
capabilities:
- step-execution
- command-execution
routing:
  input_types:
  - step_execute_request
  output_types:
  - step_execution_result
delegation:
  can_delegate_to: []
  escalates_to: sre-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

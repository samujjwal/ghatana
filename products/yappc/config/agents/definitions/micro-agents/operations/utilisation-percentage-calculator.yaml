id: utilisation-percentage-calculator
name: Utilisation Percentage Calculator
version: 1.0.0
namespace: yappc.micro-agents.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Calculate CPU, memory, and disk utilisation percentages for a resource over a specified time
  window
summary: Calculate CPU, memory, and disk utilisation percentages for a resource over a specified time
  window
metadata:
  level: 3
  domain: operations
  type: micro-agent
  tags:
  - utilisation-calculation
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: utilisation_request
    schema: dynamic
  outputs:
  - name: utilisation_percentages
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: cost-management-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- utilisation_calculator
capabilities:
- utilisation-calculation
routing:
  input_types:
  - utilisation_request
  output_types:
  - utilisation_percentages
delegation:
  can_delegate_to: []
  escalates_to: cost-management-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

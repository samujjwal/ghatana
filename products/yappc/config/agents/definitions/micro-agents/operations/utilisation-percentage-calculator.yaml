id: utilisation-percentage-calculator
name: Utilisation Percentage Calculator
version: 1.0.0
description: "Calculate CPU, memory, and disk utilisation percentages for a resource over a specified time window"

metadata:
  level: 3
  domain: operations
  type: micro-agent
  tags: [utilisation-calculation, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "utilisation-calculation"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [utilisation_calculator]

capabilities:
  - utilisation-calculation

routing:
  input_types: [utilisation_request]
  output_types: [utilisation_percentages]

delegation:
  can_delegate_to: []
  escalates_to: cost-management-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

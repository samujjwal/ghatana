id: incident-severity-scorer
name: Incident Severity Scorer
version: 1.0.0
description: "Score incident severity using a rubric considering user impact, revenue impact, and data integrity risk"

metadata:
  level: 3
  domain: operations
  type: micro-agent
  tags: [incident-scoring, severity-rubric-application, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "incident-scoring"
        - "severity-rubric-application"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [severity_scorer]

capabilities:
  - incident-scoring
  - severity-rubric-application

routing:
  input_types: [severity_score_request]
  output_types: [incident_severity]

delegation:
  can_delegate_to: []
  escalates_to: on-call-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: incident-severity-scorer
name: Incident Severity Scorer
version: 1.0.0
namespace: yappc.micro-agents.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Score incident severity using a rubric considering user impact, revenue impact, and data
  integrity risk
summary: Score incident severity using a rubric considering user impact, revenue impact, and data integrity
  risk
metadata:
  level: 3
  domain: operations
  type: micro-agent
  tags:
  - incident-scoring
  - severity-rubric-application
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: severity_score_request
    schema: dynamic
  outputs:
  - name: incident_severity
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: on-call-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- severity_scorer
capabilities:
- incident-scoring
- severity-rubric-application
routing:
  input_types:
  - severity_score_request
  output_types:
  - incident_severity
delegation:
  can_delegate_to: []
  escalates_to: on-call-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

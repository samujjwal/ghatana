id: slo-compliance-checker
name: Slo Compliance Checker
version: 1.0.0
description: "Check whether current error rate is within SLO compliance band and return compliant/at-risk/breached status"

metadata:
  level: 3
  domain: operations
  type: micro-agent
  tags: [slo-compliance-checking, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "slo-compliance-checking"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [slo_checker]

capabilities:
  - slo-compliance-checking

routing:
  input_types: [slo_check_request]
  output_types: [slo_compliance_status]

delegation:
  can_delegate_to: []
  escalates_to: sre-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: slo-compliance-checker
name: Slo Compliance Checker
version: 1.0.0
namespace: yappc.micro-agents.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Check whether current error rate is within SLO compliance band and return compliant/at-risk/breached
  status
summary: Check whether current error rate is within SLO compliance band and return compliant/at-risk/breached
  status
metadata:
  level: 3
  domain: operations
  type: micro-agent
  tags:
  - slo-compliance-checking
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: slo_check_request
    schema: dynamic
  outputs:
  - name: slo_compliance_status
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: sre-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- slo_checker
capabilities:
- slo-compliance-checking
routing:
  input_types:
  - slo_check_request
  output_types:
  - slo_compliance_status
delegation:
  can_delegate_to: []
  escalates_to: sre-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

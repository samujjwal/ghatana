id: config-drift-reporter
name: Config Drift Reporter
version: 1.0.0
namespace: yappc.micro-agents.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Report configuration drift items between expected and actual resource configuration as structured
  diff
summary: Report configuration drift items between expected and actual resource configuration as structured
  diff
metadata:
  level: 3
  domain: operations
  type: micro-agent
  tags:
  - drift-reporting
  - diff-generation
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: drift_report_request
    schema: dynamic
  outputs:
  - name: drift_diff
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: infra-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- drift_reporter
capabilities:
- drift-reporting
- diff-generation
routing:
  input_types:
  - drift_report_request
  output_types:
  - drift_diff
delegation:
  can_delegate_to: []
  escalates_to: infra-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

id: alert-severity-classifier
name: Alert Severity Classifier
version: 1.0.0
namespace: yappc.micro-agents.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Classify an alert into P1/P2/P3/P4 severity based on affected service tier and metric deviation
  magnitude
summary: Classify an alert into P1/P2/P3/P4 severity based on affected service tier and metric deviation
  magnitude
metadata:
  level: 3
  domain: operations
  type: micro-agent
  tags:
  - severity-classification
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: classify_request
    schema: dynamic
  outputs:
  - name: severity_label
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: on-call-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- severity_classifier
capabilities:
- severity-classification
routing:
  input_types:
  - classify_request
  output_types:
  - severity_label
delegation:
  can_delegate_to: []
  escalates_to: on-call-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

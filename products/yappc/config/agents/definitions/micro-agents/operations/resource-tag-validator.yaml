id: resource-tag-validator
name: Resource Tag Validator
version: 1.0.0
namespace: yappc.micro-agents.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Validate that a cloud resource has all required mandatory tags (team, env, cost-centre) and
  flag missing ones
summary: Validate that a cloud resource has all required mandatory tags (team, env, cost-centre) and flag
  missing ones
metadata:
  level: 3
  domain: operations
  type: micro-agent
  tags:
  - tag-validation
  - compliance-checking
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: tag_validate_request
    schema: dynamic
  outputs:
  - name: tag_validation_result
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: infra-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- tag_validator
capabilities:
- tag-validation
- compliance-checking
routing:
  input_types:
  - tag_validate_request
  output_types:
  - tag_validation_result
delegation:
  can_delegate_to: []
  escalates_to: infra-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: resource-tag-validator
name: Resource Tag Validator
version: 1.0.0
description: "Validate that a cloud resource has all required mandatory tags (team, env, cost-centre) and flag missing ones"

metadata:
  level: 3
  domain: operations
  type: micro-agent
  tags: [tag-validation, compliance-checking, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "tag-validation"
        - "compliance-checking"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [tag_validator]

capabilities:
  - tag-validation
  - compliance-checking

routing:
  input_types: [tag_validate_request]
  output_types: [tag_validation_result]

delegation:
  can_delegate_to: []
  escalates_to: infra-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: token-counter
name: Token Counter
version: 1.0.0
namespace: yappc.micro-agents.ai
status: active
owners:
- team: ai-platform
  contact: ai-platform@ghatana.com
description: Count tokens for a text string using the specified model's tokenizer and return token count
summary: Count tokens for a text string using the specified models tokenizer and return token count
metadata:
  level: 3
  domain: ai
  type: micro-agent
  tags:
  - token-counting
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: count_request
    schema: dynamic
  outputs:
  - name: token_count
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: agent-runtime-capability-agent-ai
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- tokenizer
capabilities:
- token-counting
routing:
  input_types:
  - count_request
  output_types:
  - token_count
delegation:
  can_delegate_to: []
  escalates_to: agent-runtime-capability-agent-ai
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 50
  max_latency_ms: 250
  timeout_ms: 500

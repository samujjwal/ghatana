id: safety-scorer
name: Safety Scorer
version: 1.0.0
namespace: yappc.micro-agents.ai
status: active
owners:
- team: ai-platform
  contact: ai-platform@ghatana.com
description: Score an LLM generation for safety policy violations across harm categories (CSAM, violence,
  self-harm, illegal)
summary: Score an LLM generation for safety policy violations across harm categories (CSAM, violence,
  self-harm, illegal)
metadata:
  level: 3
  domain: ai
  type: micro-agent
  tags:
  - safety-scoring
  - harm-detection
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: safety_request
    schema: dynamic
  outputs:
  - name: safety_score
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: llm-integration-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- safety_scorer
capabilities:
- safety-scoring
- harm-detection
routing:
  input_types:
  - safety_request
  output_types:
  - safety_score
delegation:
  can_delegate_to: []
  escalates_to: llm-integration-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

id: safety-scorer
name: Safety Scorer
version: 1.0.0
description: "Score an LLM generation for safety policy violations across harm categories (CSAM, violence, self-harm, illegal)"

metadata:
  level: 3
  domain: ai
  type: micro-agent
  tags: [safety-scoring, harm-detection, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "safety-scoring"
        - "harm-detection"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [safety_scorer]

capabilities:
  - safety-scoring
  - harm-detection

routing:
  input_types: [safety_request]
  output_types: [safety_score]

delegation:
  can_delegate_to: []
  escalates_to: llm-integration-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

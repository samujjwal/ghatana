id: hallucination-detector
name: Hallucination Detector
version: 1.0.0
namespace: yappc.micro-agents.ai
status: active
owners:
- team: ai-platform
  contact: ai-platform@ghatana.com
description: Detect factual hallucinations in an LLM output by comparing claimed facts against a verified
  knowledge base
summary: Detect factual hallucinations in an LLM output by comparing claimed facts against a verified
  knowledge base
metadata:
  level: 3
  domain: ai
  type: micro-agent
  tags:
  - hallucination-detection
  - fact-checking
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: hallucination_check_request
    schema: dynamic
  outputs:
  - name: hallucination_flags
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: llm-integration-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- fact_checker
- kb_reader
capabilities:
- hallucination-detection
- fact-checking
routing:
  input_types:
  - hallucination_check_request
  output_types:
  - hallucination_flags
delegation:
  can_delegate_to: []
  escalates_to: llm-integration-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 500
  max_latency_ms: 2500
  timeout_ms: 5000

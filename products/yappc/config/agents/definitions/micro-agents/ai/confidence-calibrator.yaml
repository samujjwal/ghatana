id: confidence-calibrator
name: Confidence Calibrator
version: 1.0.0
description: "Calibrate model-reported confidence scores against empirical accuracy data to produce calibrated probabilities"

metadata:
  level: 3
  domain: ai
  type: micro-agent
  tags: [confidence-calibration, probability-adjustment, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "confidence-calibration"
        - "probability-adjustment"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [calibrator]

capabilities:
  - confidence-calibration
  - probability-adjustment

routing:
  input_types: [calibrate_request]
  output_types: [calibrated_confidence]

delegation:
  can_delegate_to: []
  escalates_to: llm-integration-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

id: embedding-similarity-scorer
name: Embedding Similarity Scorer
version: 1.0.0
description: "Compute cosine similarity score between two embedding vectors"

metadata:
  level: 3
  domain: ai
  type: micro-agent
  tags: [cosine-similarity, embedding-comparison, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "cosine-similarity"
        - "embedding-comparison"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [similarity_calculator]

capabilities:
  - cosine-similarity
  - embedding-comparison

routing:
  input_types: [similarity_request]
  output_types: [similarity_score]

delegation:
  can_delegate_to: []
  escalates_to: search-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 50
  max_latency_ms: 250
  timeout_ms: 500

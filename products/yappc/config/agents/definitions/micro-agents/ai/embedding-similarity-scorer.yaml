id: embedding-similarity-scorer
name: Embedding Similarity Scorer
version: 1.0.0
namespace: yappc.micro-agents.ai
status: active
owners:
- team: ai-platform
  contact: ai-platform@ghatana.com
description: Compute cosine similarity score between two embedding vectors
summary: Compute cosine similarity score between two embedding vectors
metadata:
  level: 3
  domain: ai
  type: micro-agent
  tags:
  - cosine-similarity
  - embedding-comparison
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: similarity_request
    schema: dynamic
  outputs:
  - name: similarity_score
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: search-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- similarity_calculator
capabilities:
- cosine-similarity
- embedding-comparison
routing:
  input_types:
  - similarity_request
  output_types:
  - similarity_score
delegation:
  can_delegate_to: []
  escalates_to: search-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 50
  max_latency_ms: 250
  timeout_ms: 500

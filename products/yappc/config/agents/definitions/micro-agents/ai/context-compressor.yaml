id: context-compressor
name: Context Compressor
version: 1.0.0
namespace: yappc.micro-agents.ai
status: active
owners:
- team: ai-platform
  contact: ai-platform@ghatana.com
description: Compress long context by summarising older conversation turns while preserving key facts
  and decisions
summary: Compress long context by summarising older conversation turns while preserving key facts and
  decisions
metadata:
  level: 3
  domain: ai
  type: micro-agent
  tags:
  - context-compression
  - summarisation
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: compress_request
    schema: dynamic
  outputs:
  - name: compressed_context
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: agent-runtime-capability-agent-ai
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- compressor
capabilities:
- context-compression
- summarisation
routing:
  input_types:
  - compress_request
  output_types:
  - compressed_context
delegation:
  can_delegate_to: []
  escalates_to: agent-runtime-capability-agent-ai
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 500
  max_latency_ms: 2500
  timeout_ms: 5000

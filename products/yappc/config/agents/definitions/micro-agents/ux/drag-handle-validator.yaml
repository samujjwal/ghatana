id: drag-handle-validator
name: Drag Handle Validator
version: 1.0.0
namespace: yappc.micro-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Validate that draggable elements have appropriately sized and visible drag handles meeting
  minimum touch target requirements
summary: Validate that draggable elements have appropriately sized and visible drag handles meeting minimum
  touch target requi...
metadata:
  level: 3
  domain: ux
  type: micro-agent

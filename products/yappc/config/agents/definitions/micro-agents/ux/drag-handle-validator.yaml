id: drag-handle-validator
name: Drag Handle Validator
version: 1.0.0
description: "Validate that draggable elements have appropriately sized and visible drag handles meeting minimum touch target requirements"

metadata:
  level: 3
  domain: ux
  type: micro-agent
  tags: [drag-handle-validation, touch-target-checking, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "drag-handle-validation"
        - "touch-target-checking"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [drag_handle_validator]

capabilities:
  - drag-handle-validation
  - touch-target-checking

routing:
  input_types: [drag_handle_request]
  output_types: [drag_handle_verdict]

delegation:
  can_delegate_to: []
  escalates_to: canvas-interaction-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: error-copy-generator
name: Error Copy Generator
version: 1.0.0
namespace: yappc.micro-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Generate user-friendly error messages from technical error codes following UX writing principles
summary: Generate user-friendly error messages from technical error codes following UX writing principles
metadata:
  level: 3
  domain: ux
  type: micro-agent
  tags:
  - error-copy-generation
  - ux-writing
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: error_copy_request
    schema: dynamic
  outputs:
  - name: error_message
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: screen-design-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- error_copy_writer
capabilities:
- error-copy-generation
- ux-writing
routing:
  input_types:
  - error_copy_request
  output_types:
  - error_message
delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

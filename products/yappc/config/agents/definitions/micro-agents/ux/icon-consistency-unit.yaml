id: icon-consistency-unit
name: Icon Consistency Unit
version: 1.0.0
namespace: yappc.micro-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Check that icon usage in a screen spec matches the approved icon library and style guidelines
summary: Check that icon usage in a screen spec matches the approved icon library and style guidelines
metadata:
  level: 3
  domain: ux
  type: micro-agent
  tags:
  - icon-consistency-check
  - library-compliance
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: icon_check_request
    schema: dynamic
  outputs:
  - name: icon_violations
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: design-consistency-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- icon_checker
capabilities:
- icon-consistency-check
- library-compliance
routing:
  input_types:
  - icon_check_request
  output_types:
  - icon_violations
delegation:
  can_delegate_to: []
  escalates_to: design-consistency-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

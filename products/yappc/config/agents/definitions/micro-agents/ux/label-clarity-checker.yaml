id: label-clarity-checker
name: Label Clarity Checker
version: 1.0.0
namespace: yappc.micro-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Check UI label text for clarity, length, and tone consistency against the design writing
  guide
summary: Check UI label text for clarity, length, and tone consistency against the design writing guide
metadata:
  level: 3
  domain: ux
  type: micro-agent
  tags:
  - label-checking
  - clarity-scoring
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: label_check_request
    schema: dynamic
  outputs:
  - name: label_check_result
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: design-consistency-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- clarity_checker
capabilities:
- label-checking
- clarity-scoring
routing:
  input_types:
  - label_check_request
  output_types:
  - label_check_result
delegation:
  can_delegate_to: []
  escalates_to: design-consistency-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

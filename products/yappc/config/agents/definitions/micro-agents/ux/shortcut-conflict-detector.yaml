id: shortcut-conflict-detector
name: Shortcut Conflict Detector
version: 1.0.0
description: "Detect keyboard shortcut conflicts within a proposed shortcut map and flag collisions"

metadata:
  level: 3
  domain: ux
  type: micro-agent
  tags: [conflict-detection, shortcut-validation, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "conflict-detection"
        - "shortcut-validation"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [conflict_detector]

capabilities:
  - conflict-detection
  - shortcut-validation

routing:
  input_types: [shortcut_conflict_request]
  output_types: [shortcut_conflicts]

delegation:
  can_delegate_to: []
  escalates_to: canvas-interaction-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: shortcut-conflict-detector
name: Shortcut Conflict Detector
version: 1.0.0
namespace: yappc.micro-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Detect keyboard shortcut conflicts within a proposed shortcut map and flag collisions
summary: Detect keyboard shortcut conflicts within a proposed shortcut map and flag collisions
metadata:
  level: 3
  domain: ux
  type: micro-agent
  tags:
  - conflict-detection
  - shortcut-validation
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: shortcut_conflict_request
    schema: dynamic
  outputs:
  - name: shortcut_conflicts
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: canvas-interaction-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- conflict_detector
capabilities:
- conflict-detection
- shortcut-validation
routing:
  input_types:
  - shortcut_conflict_request
  output_types:
  - shortcut_conflicts
delegation:
  can_delegate_to: []
  escalates_to: canvas-interaction-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

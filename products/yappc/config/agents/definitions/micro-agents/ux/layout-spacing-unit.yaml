id: layout-spacing-unit
name: Layout Spacing Unit
version: 1.0.0
namespace: yappc.micro-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Verify component spacing values conform to the 4px/8px spacing grid and flag deviations
summary: Verify component spacing values conform to the 4px/8px spacing grid and flag deviations
metadata:
  level: 3
  domain: ux
  type: micro-agent
  tags:
  - spacing-validation
  - grid-conformance
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: spacing_check_request
    schema: dynamic
  outputs:
  - name: spacing_violations
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: screen-design-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- spacing_checker
capabilities:
- spacing-validation
- grid-conformance
routing:
  input_types:
  - spacing_check_request
  output_types:
  - spacing_violations
delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: table-column-priority-unit
name: Table Column Priority Unit
version: 1.0.0
namespace: yappc.micro-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Rank table columns by importance for progressive disclosure on smaller viewports
summary: Rank table columns by importance for progressive disclosure on smaller viewports
metadata:
  level: 3
  domain: ux
  type: micro-agent
  tags:
  - column-prioritisation
  - responsive-priority
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: column_priority_request
    schema: dynamic
  outputs:
  - name: column_priority_order
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: screen-design-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- column_prioritiser
capabilities:
- column-prioritisation
- responsive-priority
routing:
  input_types:
  - column_priority_request
  output_types:
  - column_priority_order
delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

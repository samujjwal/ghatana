id: requirement-template-applier
name: Requirement Template Applier
version: 1.0.0
description: "Apply a standard requirement template (IEEE 830, user story, given-when-then) to a raw requirement"

metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags: [template-application, format-standardisation, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "template-application"
        - "format-standardisation"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [template_engine]

capabilities:
  - template-application
  - format-standardisation

routing:
  input_types: [template_apply_request]
  output_types: [templated_requirement]

delegation:
  can_delegate_to: []
  escalates_to: spec-authoring-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

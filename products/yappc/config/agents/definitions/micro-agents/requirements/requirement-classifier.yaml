id: requirement-classifier
name: Requirement Classifier
version: 1.0.0
description: "Classify a requirement sentence as functional, performance, security, reliability, usability, or constraint"

metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags: [requirement-classification, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "requirement-classification"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [classifier]

capabilities:
  - requirement-classification

routing:
  input_types: [classify_request]
  output_types: [requirement_type]

delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

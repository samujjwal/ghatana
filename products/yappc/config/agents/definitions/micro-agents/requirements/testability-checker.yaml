id: testability-checker
name: Testability Checker
version: 1.0.0
namespace: yappc.micro-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Check whether a requirement has sufficient specificity to write a test case and score testability
  1-5
summary: Check whether a requirement has sufficient specificity to write a test case and score testability
  1-5
metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags:
  - testability-scoring
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: testability_request
    schema: dynamic
  outputs:
  - name: testability_score
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-quality-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- testability_scorer
capabilities:
- testability-scoring
routing:
  input_types:
  - testability_request
  output_types:
  - testability_score
delegation:
  can_delegate_to: []
  escalates_to: requirement-quality-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

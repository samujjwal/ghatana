id: testability-checker
name: Testability Checker
version: 1.0.0
description: "Check whether a requirement has sufficient specificity to write a test case and score testability 1-5"

metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags: [testability-scoring, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "testability-scoring"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [testability_scorer]

capabilities:
  - testability-scoring

routing:
  input_types: [testability_request]
  output_types: [testability_score]

delegation:
  can_delegate_to: []
  escalates_to: requirement-quality-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

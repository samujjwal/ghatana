id: duplicate-detector
name: Duplicate Detector
version: 1.0.0
namespace: yappc.micro-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Detect duplicate or near-duplicate requirements in a list using cosine similarity and return
  duplicate pairs
summary: Detect duplicate or near-duplicate requirements in a list using cosine similarity and return
  duplicate pairs
metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags:
  - duplicate-detection
  - similarity-scoring
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: dup_detect_request
    schema: dynamic
  outputs:
  - name: duplicate_pairs
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-quality-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- similarity_calculator
capabilities:
- duplicate-detection
- similarity-scoring
routing:
  input_types:
  - dup_detect_request
  output_types:
  - duplicate_pairs
delegation:
  can_delegate_to: []
  escalates_to: requirement-quality-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

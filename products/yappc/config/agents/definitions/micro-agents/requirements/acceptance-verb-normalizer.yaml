id: acceptance-verb-normalizer
name: Acceptance Verb Normalizer
version: 1.0.0
namespace: yappc.micro-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Normalise acceptance criteria verbs to SHALL/SHOULD/MAY and alert on weak verbs like 'should
  be able to'
summary: Normalise acceptance criteria verbs to SHALL/SHOULD/MAY and alert on weak verbs like should be
  able to
metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags:
  - verb-normalisation
  - modal-verb-enforcement
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: normalise_request
    schema: dynamic
  outputs:
  - name: normalised_ac
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: spec-authoring-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- normaliser
capabilities:
- verb-normalisation
- modal-verb-enforcement
routing:
  input_types:
  - normalise_request
  output_types:
  - normalised_ac
delegation:
  can_delegate_to: []
  escalates_to: spec-authoring-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: source-evidence-linker
name: Source Evidence Linker
version: 1.0.0
namespace: yappc.micro-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Link a requirement to its originating document or interview section for traceability
summary: Link a requirement to its originating document or interview section for traceability
metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags:
  - evidence-linking
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: link_request
    schema: dynamic
  outputs:
  - name: evidence_link
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: traceability-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- evidence_linker
capabilities:
- evidence-linking
routing:
  input_types:
  - link_request
  output_types:
  - evidence_link
delegation:
  can_delegate_to: []
  escalates_to: traceability-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

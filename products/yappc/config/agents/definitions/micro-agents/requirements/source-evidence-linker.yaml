id: source-evidence-linker
name: Source Evidence Linker
version: 1.0.0
description: "Link a requirement to its originating document or interview section for traceability"

metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags: [evidence-linking, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "evidence-linking"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [evidence_linker]

capabilities:
  - evidence-linking

routing:
  input_types: [link_request]
  output_types: [evidence_link]

delegation:
  can_delegate_to: []
  escalates_to: traceability-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: requirement-diff-unit
name: Requirement Diff Unit
version: 1.0.0
namespace: yappc.micro-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Generate a structured diff between two versions of a requirement showing changed fields
summary: Generate a structured diff between two versions of a requirement showing changed fields
metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags:
  - diff-generation
  - version-comparison
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: diff_request
    schema: dynamic
  outputs:
  - name: requirement_diff
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-governance-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- diff_engine
capabilities:
- diff-generation
- version-comparison
routing:
  input_types:
  - diff_request
  output_types:
  - requirement_diff
delegation:
  can_delegate_to: []
  escalates_to: requirement-governance-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

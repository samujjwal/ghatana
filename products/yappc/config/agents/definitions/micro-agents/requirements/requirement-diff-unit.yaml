id: requirement-diff-unit
name: Requirement Diff Unit
version: 1.0.0
description: "Generate a structured diff between two versions of a requirement showing changed fields"

metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags: [diff-generation, version-comparison, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "diff-generation"
        - "version-comparison"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [diff_engine]

capabilities:
  - diff-generation
  - version-comparison

routing:
  input_types: [diff_request]
  output_types: [requirement_diff]

delegation:
  can_delegate_to: []
  escalates_to: requirement-governance-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

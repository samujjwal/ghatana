id: requirement-tagger
name: Requirement Tagger
version: 1.0.0
namespace: yappc.micro-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Tag a requirement with domain, feature area, and component labels from a product taxonomy
summary: Tag a requirement with domain, feature area, and component labels from a product taxonomy
metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags:
  - requirement-tagging
  - taxonomy-labelling
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: tag_request
    schema: dynamic
  outputs:
  - name: tagged_requirement
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-analysis-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- tagger
capabilities:
- requirement-tagging
- taxonomy-labelling
routing:
  input_types:
  - tag_request
  output_types:
  - tagged_requirement
delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: trace-link-builder
name: Trace Link Builder
version: 1.0.0
namespace: yappc.micro-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Build a single traceability link record connecting source artefact to target artefact with
  link type
summary: Build a single traceability link record connecting source artefact to target artefact with link
  type
metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags:
  - trace-link-creation
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: link_build_request
    schema: dynamic
  outputs:
  - name: trace_link
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: traceability-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- link_builder
capabilities:
- trace-link-creation
routing:
  input_types:
  - link_build_request
  output_types:
  - trace_link
delegation:
  can_delegate_to: []
  escalates_to: traceability-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

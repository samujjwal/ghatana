id: ambiguity-detector
name: Ambiguity Detector
version: 1.0.0
namespace: yappc.micro-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Detect ambiguous language in a requirement (vague terms like 'fast', 'easy', 'appropriate')
  and flag them with suggestions
summary: Detect ambiguous language in a requirement (vague terms like fast, easy, appropriate) and flag
  them with suggestions
metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags:
  - ambiguity-detection
  - vague-term-flagging
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: ambiguity_request
    schema: dynamic
  outputs:
  - name: ambiguity_flags
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-quality-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- ambiguity_detector
capabilities:
- ambiguity-detection
- vague-term-flagging
routing:
  input_types:
  - ambiguity_request
  output_types:
  - ambiguity_flags
delegation:
  can_delegate_to: []
  escalates_to: requirement-quality-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

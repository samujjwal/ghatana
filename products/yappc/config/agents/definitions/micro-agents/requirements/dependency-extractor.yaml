id: dependency-extractor
name: Dependency Extractor
version: 1.0.0
namespace: yappc.micro-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Extract dependency relationships from a requirement description (depends-on, requires, enables,
  conflicts-with)
summary: Extract dependency relationships from a requirement description (depends-on, requires, enables,
  conflicts-with)
metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags:
  - dependency-extraction
  - relationship-parsing
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: extract_request
    schema: dynamic
  outputs:
  - name: dependencies
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: traceability-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- dependency_extractor
capabilities:
- dependency-extraction
- relationship-parsing
routing:
  input_types:
  - extract_request
  output_types:
  - dependencies
delegation:
  can_delegate_to: []
  escalates_to: traceability-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

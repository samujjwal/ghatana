id: dependency-extractor
name: Dependency Extractor
version: 1.0.0
description: "Extract dependency relationships from a requirement description (depends-on, requires, enables, conflicts-with)"

metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags: [dependency-extraction, relationship-parsing, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "dependency-extraction"
        - "relationship-parsing"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [dependency_extractor]

capabilities:
  - dependency-extraction
  - relationship-parsing

routing:
  input_types: [extract_request]
  output_types: [dependencies]

delegation:
  can_delegate_to: []
  escalates_to: traceability-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

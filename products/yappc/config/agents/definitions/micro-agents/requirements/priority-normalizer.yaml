id: priority-normalizer
name: Priority Normalizer
version: 1.0.0
description: "Normalise heterogeneous priority labels (high/medium/low, 1-5, Must/Should) to MoSCoW convention"

metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags: [priority-normalisation, label-mapping, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "priority-normalisation"
        - "label-mapping"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [normaliser]

capabilities:
  - priority-normalisation
  - label-mapping

routing:
  input_types: [normalise_request]
  output_types: [moscow_priority]

delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

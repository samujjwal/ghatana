id: priority-normalizer
name: Priority Normalizer
version: 1.0.0
namespace: yappc.micro-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Normalise heterogeneous priority labels (high/medium/low, 1-5, Must/Should) to MoSCoW convention
summary: Normalise heterogeneous priority labels (high/medium/low, 1-5, Must/Should) to MoSCoW convention
metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags:
  - priority-normalisation
  - label-mapping
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: normalise_request
    schema: dynamic
  outputs:
  - name: moscow_priority
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-analysis-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- normaliser
capabilities:
- priority-normalisation
- label-mapping
routing:
  input_types:
  - normalise_request
  output_types:
  - moscow_priority
delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

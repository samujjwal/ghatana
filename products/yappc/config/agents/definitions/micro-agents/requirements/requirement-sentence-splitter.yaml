id: requirement-sentence-splitter
name: Requirement Sentence Splitter
version: 1.0.0
namespace: yappc.micro-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Split a compound requirement containing multiple conditions into individual atomic requirement
  sentences
summary: Split a compound requirement containing multiple conditions into individual atomic requirement
  sentences
metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags:
  - sentence-splitting
  - requirement-atomisation
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: split_request
    schema: dynamic
  outputs:
  - name: atomic_requirements
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-analysis-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- splitter
capabilities:
- sentence-splitting
- requirement-atomisation
routing:
  input_types:
  - split_request
  output_types:
  - atomic_requirements
delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

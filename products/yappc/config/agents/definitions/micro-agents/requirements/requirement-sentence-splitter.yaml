id: requirement-sentence-splitter
name: Requirement Sentence Splitter
version: 1.0.0
description: "Split a compound requirement containing multiple conditions into individual atomic requirement sentences"

metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags: [sentence-splitting, requirement-atomisation, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "sentence-splitting"
        - "requirement-atomisation"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [splitter]

capabilities:
  - sentence-splitting
  - requirement-atomisation

routing:
  input_types: [split_request]
  output_types: [atomic_requirements]

delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

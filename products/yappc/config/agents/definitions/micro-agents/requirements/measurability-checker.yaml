id: measurability-checker
name: Measurability Checker
version: 1.0.0
namespace: yappc.micro-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Check whether an NFR has a specific measurable target value and flag if it is unmeasurable
summary: Check whether an NFR has a specific measurable target value and flag if it is unmeasurable
metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags:
  - measurability-checking
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: measurability_request
    schema: dynamic
  outputs:
  - name: measurability_verdict
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-quality-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- measurability_checker
capabilities:
- measurability-checking
routing:
  input_types:
  - measurability_request
  output_types:
  - measurability_verdict
delegation:
  can_delegate_to: []
  escalates_to: requirement-quality-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: constraint-parser
name: Constraint Parser
version: 1.0.0
description: "Parse a constraint statement into structured form: constraint type, boundary condition, and rationale"

metadata:
  level: 3
  domain: requirements
  type: micro-agent
  tags: [constraint-parsing, structured-extraction, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "constraint-parsing"
        - "structured-extraction"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [parser]

capabilities:
  - constraint-parsing
  - structured-extraction

routing:
  input_types: [parse_request]
  output_types: [parsed_constraint]

delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

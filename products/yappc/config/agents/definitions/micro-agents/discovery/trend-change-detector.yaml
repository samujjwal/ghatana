id: trend-change-detector
name: Trend Change Detector
version: 1.0.0
description: "Detect significant changes in a time series trend and classify as acceleration, deceleration, or reversal"

metadata:
  level: 3
  domain: discovery
  type: micro-agent
  tags: [trend-detection, change-classification, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "trend-detection"
        - "change-classification"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [trend_detector]

capabilities:
  - trend-detection
  - change-classification

routing:
  input_types: [trend_request]
  output_types: [trend_change]

delegation:
  can_delegate_to: []
  escalates_to: competitive-intelligence-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

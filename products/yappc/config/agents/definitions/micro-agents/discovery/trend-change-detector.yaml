id: trend-change-detector
name: Trend Change Detector
version: 1.0.0
namespace: yappc.micro-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Detect significant changes in a time series trend and classify as acceleration, deceleration,
  or reversal
summary: Detect significant changes in a time series trend and classify as acceleration, deceleration,
  or reversal
metadata:
  level: 3
  domain: discovery
  type: micro-agent
  tags:
  - trend-detection
  - change-classification
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: trend_request
    schema: dynamic
  outputs:
  - name: trend_change
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: competitive-intelligence-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- trend_detector
capabilities:
- trend-detection
- change-classification
routing:
  input_types:
  - trend_request
  output_types:
  - trend_change
delegation:
  can_delegate_to: []
  escalates_to: competitive-intelligence-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

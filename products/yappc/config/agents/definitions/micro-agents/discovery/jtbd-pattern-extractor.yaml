id: jtbd-pattern-extractor
name: Jtbd Pattern Extractor
version: 1.0.0
namespace: yappc.micro-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Extract JTBD statement pattern from interview text returning job executor, job, and expected
  outcome
summary: Extract JTBD statement pattern from interview text returning job executor, job, and expected
  outcome
metadata:
  level: 3
  domain: discovery
  type: micro-agent
  tags:
  - jtbd-extraction
  - pattern-matching
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: jtbd_extract_request
    schema: dynamic
  outputs:
  - name: jtbd_pattern
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: customer-research-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- jtbd_extractor
capabilities:
- jtbd-extraction
- pattern-matching
routing:
  input_types:
  - jtbd_extract_request
  output_types:
  - jtbd_pattern
delegation:
  can_delegate_to: []
  escalates_to: customer-research-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

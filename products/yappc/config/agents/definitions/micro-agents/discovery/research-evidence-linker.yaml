id: research-evidence-linker
name: Research Evidence Linker
version: 1.0.0
description: "Link a research insight to one or more supporting evidence items from a research library"

metadata:
  level: 3
  domain: discovery
  type: micro-agent
  tags: [evidence-linking, source-citation, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "evidence-linking"
        - "source-citation"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [evidence_linker]

capabilities:
  - evidence-linking
  - source-citation

routing:
  input_types: [link_request]
  output_types: [evidence_links]

delegation:
  can_delegate_to: []
  escalates_to: customer-research-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: review-sentiment-unit
name: Review Sentiment Unit
version: 1.0.0
namespace: yappc.micro-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Score the sentiment of a product review text as positive, neutral, or negative with confidence
  score
summary: Score the sentiment of a product review text as positive, neutral, or negative with confidence
  score
metadata:
  level: 3
  domain: discovery
  type: micro-agent
  tags:
  - sentiment-scoring
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: sentiment_request
    schema: dynamic
  outputs:
  - name: sentiment_score
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: customer-research-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- sentiment_scorer
capabilities:
- sentiment-scoring
routing:
  input_types:
  - sentiment_request
  output_types:
  - sentiment_score
delegation:
  can_delegate_to: []
  escalates_to: customer-research-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

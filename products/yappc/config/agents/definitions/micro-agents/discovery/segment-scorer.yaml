id: segment-scorer
name: Segment Scorer
version: 1.0.0
namespace: yappc.micro-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Score a user segment by size, growth rate, willingness-to-pay, and strategic fit
summary: Score a user segment by size, growth rate, willingness-to-pay, and strategic fit
metadata:
  level: 3
  domain: discovery
  type: micro-agent
  tags:
  - segment-scoring
  - multi-attribute-scoring
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: segment_score_request
    schema: dynamic
  outputs:
  - name: segment_score
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: opportunity-scoring-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- segment_scorer
capabilities:
- segment-scoring
- multi-attribute-scoring
routing:
  input_types:
  - segment_score_request
  output_types:
  - segment_score
delegation:
  can_delegate_to: []
  escalates_to: opportunity-scoring-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

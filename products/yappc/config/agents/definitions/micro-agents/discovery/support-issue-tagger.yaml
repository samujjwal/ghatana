id: support-issue-tagger
name: Support Issue Tagger
version: 1.0.0
namespace: yappc.micro-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Tag a support ticket with product area, issue type, and severity labels
summary: Tag a support ticket with product area, issue type, and severity labels
metadata:
  level: 3
  domain: discovery
  type: micro-agent
  tags:
  - ticket-tagging
  - label-application
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: tag_request
    schema: dynamic
  outputs:
  - name: tagged_ticket
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: customer-research-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- tagger
capabilities:
- ticket-tagging
- label-application
routing:
  input_types:
  - tag_request
  output_types:
  - tagged_ticket
delegation:
  can_delegate_to: []
  escalates_to: customer-research-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: support-issue-tagger
name: Support Issue Tagger
version: 1.0.0
description: "Tag a support ticket with product area, issue type, and severity labels"

metadata:
  level: 3
  domain: discovery
  type: micro-agent
  tags: [ticket-tagging, label-application, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "ticket-tagging"
        - "label-application"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [tagger]

capabilities:
  - ticket-tagging
  - label-application

routing:
  input_types: [tag_request]
  output_types: [tagged_ticket]

delegation:
  can_delegate_to: []
  escalates_to: customer-research-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

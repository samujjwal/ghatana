id: pain-point-normalizer
name: Pain Point Normalizer
version: 1.0.0
namespace: yappc.micro-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: 'Normalise a pain point description to standard format: user action, barrier, consequence'
summary: 'Normalise a pain point description to standard format: user action, barrier, consequence'
metadata:
  level: 3
  domain: discovery
  type: micro-agent
  tags:
  - text-normalisation
  - pain-point-formatting
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: normalise_request
    schema: dynamic
  outputs:
  - name: normalised_pain_point
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: problem-discovery-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- normaliser
capabilities:
- text-normalisation
- pain-point-formatting
routing:
  input_types:
  - normalise_request
  output_types:
  - normalised_pain_point
delegation:
  can_delegate_to: []
  escalates_to: problem-discovery-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

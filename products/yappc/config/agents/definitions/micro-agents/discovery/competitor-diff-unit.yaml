id: competitor-diff-unit
name: Competitor Diff Unit
version: 1.0.0
namespace: yappc.micro-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Diff two feature lists and return added, removed, and changed features with structured diff
  output
summary: Diff two feature lists and return added, removed, and changed features with structured diff output
metadata:
  level: 3
  domain: discovery
  type: micro-agent
  tags:
  - feature-diff
  - change-detection
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: diff_request
    schema: dynamic
  outputs:
  - name: feature_diff
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: competitive-intelligence-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- diff_engine
capabilities:
- feature-diff
- change-detection
routing:
  input_types:
  - diff_request
  output_types:
  - feature_diff
delegation:
  can_delegate_to: []
  escalates_to: competitive-intelligence-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

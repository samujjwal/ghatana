id: theme-clusterer
name: Theme Clusterer
version: 1.0.0
description: "Assign a theme label to a text item from a predefined theme taxonomy using semantic similarity"

metadata:
  level: 3
  domain: discovery
  type: micro-agent
  tags: [theme-classification, semantic-matching, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "theme-classification"
        - "semantic-matching"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [semantic_matcher]

capabilities:
  - theme-classification
  - semantic-matching

routing:
  input_types: [cluster_request]
  output_types: [theme_label]

delegation:
  can_delegate_to: []
  escalates_to: problem-discovery-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

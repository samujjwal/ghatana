id: opportunity-confidence-unit
name: Opportunity Confidence Unit
version: 1.0.0
namespace: yappc.micro-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Compute an evidence-weighted confidence score for an opportunity hypothesis
summary: Compute an evidence-weighted confidence score for an opportunity hypothesis
metadata:
  level: 3
  domain: discovery
  type: micro-agent
  tags:
  - confidence-scoring
  - evidence-weighting
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: confidence_request
    schema: dynamic
  outputs:
  - name: confidence_score
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: opportunity-scoring-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- confidence_calculator
capabilities:
- confidence-scoring
- evidence-weighting
routing:
  input_types:
  - confidence_request
  output_types:
  - confidence_score
delegation:
  can_delegate_to: []
  escalates_to: opportunity-scoring-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: retention-rate-calculator
name: Retention Rate Calculator
version: 1.0.0
description: "Calculate day-N retention rate for a cohort given activation and return events"

metadata:
  level: 3
  domain: product-intelligence
  type: micro-agent
  tags: [retention-rate-calculation, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "retention-rate-calculation"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [retention_calculator]

capabilities:
  - retention-rate-calculation

routing:
  input_types: [retention_calc_request]
  output_types: [retention_rate]

delegation:
  can_delegate_to: []
  escalates_to: analytics-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

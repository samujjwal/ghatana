id: retention-rate-calculator
name: Retention Rate Calculator
version: 1.0.0
namespace: yappc.micro-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Calculate day-N retention rate for a cohort given activation and return events
summary: Calculate day-N retention rate for a cohort given activation and return events
metadata:
  level: 3
  domain: product-intelligence
  type: micro-agent
  tags:
  - retention-rate-calculation
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: retention_calc_request
    schema: dynamic
  outputs:
  - name: retention_rate
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: analytics-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- retention_calculator
capabilities:
- retention-rate-calculation
routing:
  input_types:
  - retention_calc_request
  output_types:
  - retention_rate
delegation:
  can_delegate_to: []
  escalates_to: analytics-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

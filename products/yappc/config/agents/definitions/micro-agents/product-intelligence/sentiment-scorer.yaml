id: sentiment-scorer
name: Sentiment Scorer
version: 1.0.0
namespace: yappc.micro-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Score text sentiment as a continuous value -1.0 to +1.0 using fine-grained sentiment analysis
summary: Score text sentiment as a continuous value -1
metadata:
  level: 3
  domain: product-intelligence
  type: micro-agent
  tags:
  - sentiment-scoring
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: score_request
    schema: dynamic
  outputs:
  - name: sentiment_value
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: feedback-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- sentiment_scorer
capabilities:
- sentiment-scoring
routing:
  input_types:
  - score_request
  output_types:
  - sentiment_value
delegation:
  can_delegate_to: []
  escalates_to: feedback-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: churn-risk-classifier
name: Churn Risk Classifier
version: 1.0.0
namespace: yappc.micro-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Classify a user into low/medium/high churn risk tier based on behavioural signals relative
  to churn model thresholds
summary: Classify a user into low/medium/high churn risk tier based on behavioural signals relative to
  churn model thresholds
metadata:
  level: 3
  domain: product-intelligence
  type: micro-agent
  tags:
  - churn-risk-classification
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: churn_classify_request
    schema: dynamic
  outputs:
  - name: churn_risk_tier
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: analytics-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- churn_classifier
capabilities:
- churn-risk-classification
routing:
  input_types:
  - churn_classify_request
  output_types:
  - churn_risk_tier
delegation:
  can_delegate_to: []
  escalates_to: analytics-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

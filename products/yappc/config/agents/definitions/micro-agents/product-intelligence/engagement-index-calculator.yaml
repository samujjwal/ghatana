id: engagement-index-calculator
name: Engagement Index Calculator
version: 1.0.0
namespace: yappc.micro-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Calculate a composite engagement index from session frequency, depth, and feature breadth metrics
summary: Calculate a composite engagement index from session frequency, depth, and feature breadth metrics
metadata:
  level: 3
  domain: product-intelligence
  type: micro-agent
  tags:
  - engagement-index-computation
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: engagement_request
    schema: dynamic
  outputs:
  - name: engagement_index
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: analytics-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- engagement_calculator
capabilities:
- engagement-index-computation
routing:
  input_types:
  - engagement_request
  output_types:
  - engagement_index
delegation:
  can_delegate_to: []
  escalates_to: analytics-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

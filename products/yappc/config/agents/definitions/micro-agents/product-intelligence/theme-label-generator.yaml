id: theme-label-generator
name: Theme Label Generator
version: 1.0.0
namespace: yappc.micro-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Generate a short descriptive label name for a feedback cluster given sample verbatims
summary: Generate a short descriptive label name for a feedback cluster given sample verbatims
metadata:
  level: 3
  domain: product-intelligence
  type: micro-agent
  tags:
  - theme-labelling
  - cluster-naming
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: label_gen_request
    schema: dynamic
  outputs:
  - name: theme_label
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: feedback-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- label_generator
capabilities:
- theme-labelling
- cluster-naming
routing:
  input_types:
  - label_gen_request
  output_types:
  - theme_label
delegation:
  can_delegate_to: []
  escalates_to: feedback-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

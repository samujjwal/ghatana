id: feature-flag-recommender
name: Feature Flag Recommender
version: 1.0.0
description: "Recommend feature flag strategy (kill switch, percentage rollout, cohort-based) for a given feature and risk level"

metadata:
  level: 3
  domain: product-intelligence
  type: micro-agent
  tags: [flag-strategy-recommendation, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "flag-strategy-recommendation"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [flag_recommender]

capabilities:
  - flag-strategy-recommendation

routing:
  input_types: [flag_recommend_request]
  output_types: [flag_strategy]

delegation:
  can_delegate_to: []
  escalates_to: enhancement-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

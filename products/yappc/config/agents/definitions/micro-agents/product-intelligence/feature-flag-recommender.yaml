id: feature-flag-recommender
name: Feature Flag Recommender
version: 1.0.0
namespace: yappc.micro-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Recommend feature flag strategy (kill switch, percentage rollout, cohort-based) for a given
  feature and risk level
summary: Recommend feature flag strategy (kill switch, percentage rollout, cohort-based) for a given feature
  and risk level
metadata:
  level: 3
  domain: product-intelligence
  type: micro-agent
  tags:
  - flag-strategy-recommendation
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: flag_recommend_request
    schema: dynamic
  outputs:
  - name: flag_strategy
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: enhancement-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- flag_recommender
capabilities:
- flag-strategy-recommendation
routing:
  input_types:
  - flag_recommend_request
  output_types:
  - flag_strategy
delegation:
  can_delegate_to: []
  escalates_to: enhancement-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

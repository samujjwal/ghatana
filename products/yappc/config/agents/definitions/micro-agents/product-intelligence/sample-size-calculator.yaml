id: sample-size-calculator
name: Sample Size Calculator
version: 1.0.0
namespace: yappc.micro-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Calculate minimum required sample size for A/B test given baseline rate, MDE, alpha, and
  power
summary: Calculate minimum required sample size for A/B test given baseline rate, MDE, alpha, and power
metadata:
  level: 3
  domain: product-intelligence
  type: micro-agent
  tags:
  - sample-size-calculation
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: sample_size_request
    schema: dynamic
  outputs:
  - name: required_sample_size
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: experimentation-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- sample_size_calculator
capabilities:
- sample-size-calculation
routing:
  input_types:
  - sample_size_request
  output_types:
  - required_sample_size
delegation:
  can_delegate_to: []
  escalates_to: experimentation-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 50
  max_latency_ms: 250
  timeout_ms: 500

id: rice-calculator
name: Rice Calculator
version: 1.0.0
namespace: yappc.micro-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Calculate RICE score (Reach × Impact × Confidence / Effort) from component inputs
summary: Calculate RICE score (Reach × Impact × Confidence / Effort) from component inputs
metadata:
  level: 3
  domain: product-intelligence
  type: micro-agent
  tags:
  - rice-calculation
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: rice_request
    schema: dynamic
  outputs:
  - name: rice_score
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: enhancement-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- rice_calculator
capabilities:
- rice-calculation
routing:
  input_types:
  - rice_request
  output_types:
  - rice_score
delegation:
  can_delegate_to: []
  escalates_to: enhancement-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 50
  max_latency_ms: 250
  timeout_ms: 500

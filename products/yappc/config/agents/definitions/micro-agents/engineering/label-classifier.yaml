id: label-classifier
name: Label Classifier
version: 1.0.0
namespace: yappc.micro-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Classify a GitHub issue or Jira ticket with appropriate label tags from project taxonomy
summary: Classify a GitHub issue or Jira ticket with appropriate label tags from project taxonomy
metadata:
  level: 3
  domain: engineering
  type: micro-agent
  tags:
  - issue-labelling
  - classification
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: classify_request
    schema: dynamic
  outputs:
  - name: issue_labels
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: engineering-metrics-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- label_classifier
capabilities:
- issue-labelling
- classification
routing:
  input_types:
  - classify_request
  output_types:
  - issue_labels
delegation:
  can_delegate_to: []
  escalates_to: engineering-metrics-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

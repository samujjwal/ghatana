id: label-classifier
name: Label Classifier
version: 1.0.0
description: "Classify a GitHub issue or Jira ticket with appropriate label tags from project taxonomy"

metadata:
  level: 3
  domain: engineering
  type: micro-agent
  tags: [issue-labelling, classification, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "issue-labelling"
        - "classification"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [label_classifier]

capabilities:
  - issue-labelling
  - classification

routing:
  input_types: [classify_request]
  output_types: [issue_labels]

delegation:
  can_delegate_to: []
  escalates_to: engineering-metrics-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

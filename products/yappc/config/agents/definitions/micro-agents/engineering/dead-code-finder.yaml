id: dead-code-finder
name: Dead Code Finder
version: 1.0.0
namespace: yappc.micro-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Identify unreachable code paths, unused variables, and exported symbols with no external
  references
summary: Identify unreachable code paths, unused variables, and exported symbols with no external references
metadata:
  level: 3
  domain: engineering
  type: micro-agent
  tags:
  - dead-code-detection
  - unreachable-code-identification
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: dead_code_request
    schema: dynamic
  outputs:
  - name: dead_code_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: code-quality-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- dead_code_finder
capabilities:
- dead-code-detection
- unreachable-code-identification
routing:
  input_types:
  - dead_code_request
  output_types:
  - dead_code_report
delegation:
  can_delegate_to: []
  escalates_to: code-quality-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 300
  max_latency_ms: 1500
  timeout_ms: 3000

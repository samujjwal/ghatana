id: build-time-analyzer
name: Build Time Analyzer
version: 1.0.0
description: "Analyse Gradle/Maven/Webpack build times by phase and identify slowest steps for optimisation"

metadata:
  level: 3
  domain: engineering
  type: micro-agent
  tags: [build-time-analysis, bottleneck-identification, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "build-time-analysis"
        - "bottleneck-identification"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [build_analyser]

capabilities:
  - build-time-analysis
  - bottleneck-identification

routing:
  input_types: [build_time_request]
  output_types: [build_analysis]

delegation:
  can_delegate_to: []
  escalates_to: devex-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

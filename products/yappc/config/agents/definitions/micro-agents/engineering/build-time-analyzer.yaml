id: build-time-analyzer
name: Build Time Analyzer
version: 1.0.0
namespace: yappc.micro-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Analyse Gradle/Maven/Webpack build times by phase and identify slowest steps for optimisation
summary: Analyse Gradle/Maven/Webpack build times by phase and identify slowest steps for optimisation
metadata:
  level: 3
  domain: engineering
  type: micro-agent
  tags:
  - build-time-analysis
  - bottleneck-identification
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: build_time_request
    schema: dynamic
  outputs:
  - name: build_analysis
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: devex-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- build_analyser
capabilities:
- build-time-analysis
- bottleneck-identification
routing:
  input_types:
  - build_time_request
  output_types:
  - build_analysis
delegation:
  can_delegate_to: []
  escalates_to: devex-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

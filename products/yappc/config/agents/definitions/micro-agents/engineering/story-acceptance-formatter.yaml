id: story-acceptance-formatter
name: Story Acceptance Formatter
version: 1.0.0
description: "Format a user story with properly structured Given/When/Then acceptance criteria sections"

metadata:
  level: 3
  domain: engineering
  type: micro-agent
  tags: [story-formatting, ac-structuring, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "story-formatting"
        - "ac-structuring"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [formatter]

capabilities:
  - story-formatting
  - ac-structuring

routing:
  input_types: [format_request]
  output_types: [formatted_story]

delegation:
  can_delegate_to: []
  escalates_to: engineering-metrics-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

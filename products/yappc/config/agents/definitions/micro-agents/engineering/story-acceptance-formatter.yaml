id: story-acceptance-formatter
name: Story Acceptance Formatter
version: 1.0.0
namespace: yappc.micro-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Format a user story with properly structured Given/When/Then acceptance criteria sections
summary: Format a user story with properly structured Given/When/Then acceptance criteria sections
metadata:
  level: 3
  domain: engineering
  type: micro-agent
  tags:
  - story-formatting
  - ac-structuring
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: format_request
    schema: dynamic
  outputs:
  - name: formatted_story
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: engineering-metrics-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- formatter
capabilities:
- story-formatting
- ac-structuring
routing:
  input_types:
  - format_request
  output_types:
  - formatted_story
delegation:
  can_delegate_to: []
  escalates_to: engineering-metrics-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

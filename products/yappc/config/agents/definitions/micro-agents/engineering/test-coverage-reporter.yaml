id: test-coverage-reporter
name: Test Coverage Reporter
version: 1.0.0
namespace: yappc.micro-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Report line, branch, and function coverage from JaCoCo or Istanbul coverage reports with
  gap identification
summary: Report line, branch, and function coverage from JaCoCo or Istanbul coverage reports with gap
  identification
metadata:
  level: 3
  domain: engineering
  type: micro-agent
  tags:
  - coverage-reporting
  - gap-identification
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: coverage_request
    schema: dynamic
  outputs:
  - name: coverage_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: code-quality-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- coverage_parser
capabilities:
- coverage-reporting
- gap-identification
routing:
  input_types:
  - coverage_request
  output_types:
  - coverage_report
delegation:
  can_delegate_to: []
  escalates_to: code-quality-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

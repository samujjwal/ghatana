id: import-graph-builder
name: Import Graph Builder
version: 1.0.0
namespace: yappc.micro-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Build a module import dependency graph and identify cycles, fan-in hotspots, and circular
  dependencies
summary: Build a module import dependency graph and identify cycles, fan-in hotspots, and circular dependencies
metadata:
  level: 3
  domain: engineering
  type: micro-agent
  tags:
  - import-graph-construction
  - cycle-detection
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: graph_build_request
    schema: dynamic
  outputs:
  - name: import_graph
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: code-quality-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- import_graph_builder
capabilities:
- import-graph-construction
- cycle-detection
routing:
  input_types:
  - graph_build_request
  output_types:
  - import_graph
delegation:
  can_delegate_to: []
  escalates_to: code-quality-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 300
  max_latency_ms: 1500
  timeout_ms: 3000

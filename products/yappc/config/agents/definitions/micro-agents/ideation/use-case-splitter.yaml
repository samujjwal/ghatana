id: use-case-splitter
name: Use Case Splitter
version: 1.0.0
namespace: yappc.micro-agents.ideation
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Split a compound use case description into individual atomic use case statements
summary: Split a compound use case description into individual atomic use case statements
metadata:
  level: 3
  domain: ideation
  type: micro-agent
  tags:
  - use-case-splitting
  - atomic-extraction
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: split_request
    schema: dynamic
  outputs:
  - name: atomic_use_cases
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: solution-framing-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- splitter
capabilities:
- use-case-splitting
- atomic-extraction
routing:
  input_types:
  - split_request
  output_types:
  - atomic_use_cases
delegation:
  can_delegate_to: []
  escalates_to: solution-framing-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

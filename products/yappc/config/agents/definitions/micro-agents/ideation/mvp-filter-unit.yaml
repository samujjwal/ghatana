id: mvp-filter-unit
name: Mvp Filter Unit
version: 1.0.0
namespace: yappc.micro-agents.ideation
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Filter a feature list to only those that test a core assumption or deliver minimum viable
  value, removing nice-to-haves
summary: Filter a feature list to only those that test a core assumption or deliver minimum viable value,
  removing nice-to-haves
metadata:
  level: 3
  domain: ideation
  type: micro-agent
  tags:
  - feature-filtering
  - mvp-criteria-application
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: filter_request
    schema: dynamic
  outputs:
  - name: mvp_features
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: concept-validation-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- mvp_filter
capabilities:
- feature-filtering
- mvp-criteria-application
routing:
  input_types:
  - filter_request
  output_types:
  - mvp_features
delegation:
  can_delegate_to: []
  escalates_to: concept-validation-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: mvp-filter-unit
name: Mvp Filter Unit
version: 1.0.0
description: "Filter a feature list to only those that test a core assumption or deliver minimum viable value, removing nice-to-haves"

metadata:
  level: 3
  domain: ideation
  type: micro-agent
  tags: [feature-filtering, mvp-criteria-application, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "feature-filtering"
        - "mvp-criteria-application"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [mvp_filter]

capabilities:
  - feature-filtering
  - mvp-criteria-application

routing:
  input_types: [filter_request]
  output_types: [mvp_features]

delegation:
  can_delegate_to: []
  escalates_to: concept-validation-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: benefit-tagger
name: Benefit Tagger
version: 1.0.0
description: "Tag product features with their primary user benefit category from a predefined taxonomy"

metadata:
  level: 3
  domain: ideation
  type: micro-agent
  tags: [benefit-tagging, taxonomy-classification, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "benefit-tagging"
        - "taxonomy-classification"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [benefit_tagger]

capabilities:
  - benefit-tagging
  - taxonomy-classification

routing:
  input_types: [tag_request]
  output_types: [benefit_tagged_features]

delegation:
  can_delegate_to: []
  escalates_to: solution-framing-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: benefit-tagger
name: Benefit Tagger
version: 1.0.0
namespace: yappc.micro-agents.ideation
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Tag product features with their primary user benefit category from a predefined taxonomy
summary: Tag product features with their primary user benefit category from a predefined taxonomy
metadata:
  level: 3
  domain: ideation
  type: micro-agent
  tags:
  - benefit-tagging
  - taxonomy-classification
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: tag_request
    schema: dynamic
  outputs:
  - name: benefit_tagged_features
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: solution-framing-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- benefit_tagger
capabilities:
- benefit-tagging
- taxonomy-classification
routing:
  input_types:
  - tag_request
  output_types:
  - benefit_tagged_features
delegation:
  can_delegate_to: []
  escalates_to: solution-framing-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: value-prop-formatter
name: Value Prop Formatter
version: 1.0.0
namespace: yappc.micro-agents.ideation
status: active
owners:
- team: product
  contact: product@ghatana.com
description: 'Format a raw value proposition statement into the canonical form: For [target], [product]
  is a [category] that [key-benefit]. Unlike [alternative], [differentiator]'
summary: 'Format a raw value proposition statement into the canonical form: For [target], [product] is
  a [category] that [key-b...'
metadata:
  level: 3
  domain: ideation
  type: micro-agent
  tags:
  - text-formatting
  - vp-canonical-format
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: format_request
    schema: dynamic
  outputs:
  - name: formatted_value_prop
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: solution-framing-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- formatter
capabilities:
- text-formatting
- vp-canonical-format
routing:
  input_types:
  - format_request
  output_types:
  - formatted_value_prop
delegation:
  can_delegate_to: []
  escalates_to: solution-framing-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: narrative-polisher
name: Narrative Polisher
version: 1.0.0
namespace: yappc.micro-agents.ideation
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Polish a product narrative draft for clarity, concision, and persuasiveness without changing
  the core message
summary: Polish a product narrative draft for clarity, concision, and persuasiveness without changing
  the core message
metadata:
  level: 3
  domain: ideation
  type: micro-agent
  tags:
  - text-polishing
  - clarity-improvement
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: polish_request
    schema: dynamic
  outputs:
  - name: polished_narrative
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: solution-framing-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- polisher
capabilities:
- text-polishing
- clarity-improvement
routing:
  input_types:
  - polish_request
  output_types:
  - polished_narrative
delegation:
  can_delegate_to: []
  escalates_to: solution-framing-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 300
  max_latency_ms: 1500
  timeout_ms: 3000

id: concept-novelty-detector
name: Concept Novelty Detector
version: 1.0.0
description: "Assess the novelty of a product concept by comparing against a known solution library and scoring originality"

metadata:
  level: 3
  domain: ideation
  type: micro-agent
  tags: [novelty-assessment, originality-scoring, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "novelty-assessment"
        - "originality-scoring"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [novelty_detector]

capabilities:
  - novelty-assessment
  - originality-scoring

routing:
  input_types: [novelty_request]
  output_types: [novelty_score]

delegation:
  can_delegate_to: []
  escalates_to: differentiation-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

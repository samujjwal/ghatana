id: cost-benefit-calculator
name: Cost Benefit Calculator
version: 1.0.0
namespace: yappc.micro-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Calculate NPV, IRR, payback period, and ROI given a cash flow model and discount rate
summary: Calculate NPV, IRR, payback period, and ROI given a cash flow model and discount rate
metadata:
  level: 3
  domain: portfolio
  type: micro-agent
  tags:
  - npv-calculation
  - irr-calculation
  - payback-period
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: cash_flow_input
    schema: dynamic
  outputs:
  - name: financial_metrics
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: business-case-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- financial_calculator
capabilities:
- npv-calculation
- irr-calculation
- payback-period
routing:
  input_types:
  - cash_flow_input
  output_types:
  - financial_metrics
delegation:
  can_delegate_to: []
  escalates_to: business-case-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 300
  max_latency_ms: 1500
  timeout_ms: 3000

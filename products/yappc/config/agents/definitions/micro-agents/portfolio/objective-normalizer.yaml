id: objective-normalizer
name: Objective Normalizer
version: 1.0.0
namespace: yappc.micro-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Normalise OKR objective statements to consistent verb-object-outcome format
summary: Normalise OKR objective statements to consistent verb-object-outcome format
metadata:
  level: 3
  domain: portfolio
  type: micro-agent
  tags:
  - text-normalisation
  - okr-formatting
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: normalise_request
    schema: dynamic
  outputs:
  - name: normalised_objective
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: goal-management-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- normaliser
capabilities:
- text-normalisation
- okr-formatting
routing:
  input_types:
  - normalise_request
  output_types:
  - normalised_objective
delegation:
  can_delegate_to: []
  escalates_to: goal-management-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: objective-normalizer
name: Objective Normalizer
version: 1.0.0
description: "Normalise OKR objective statements to consistent verb-object-outcome format"

metadata:
  level: 3
  domain: portfolio
  type: micro-agent
  tags: [text-normalisation, okr-formatting, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "text-normalisation"
        - "okr-formatting"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [normaliser]

capabilities:
  - text-normalisation
  - okr-formatting

routing:
  input_types: [normalise_request]
  output_types: [normalised_objective]

delegation:
  can_delegate_to: []
  escalates_to: goal-management-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

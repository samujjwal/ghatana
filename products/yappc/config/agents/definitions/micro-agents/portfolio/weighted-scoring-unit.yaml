id: weighted-scoring-unit
name: Weighted Scoring Unit
version: 1.0.0
description: "Apply configurable weighted scoring formula to a set of options and return sorted scores with weights breakdown"

metadata:
  level: 3
  domain: portfolio
  type: micro-agent
  tags: [weighted-scoring, ranking, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "weighted-scoring"
        - "ranking"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [scoring_calculator]

capabilities:
  - weighted-scoring
  - ranking

routing:
  input_types: [scoring_request]
  output_types: [scoring_result]

delegation:
  can_delegate_to: []
  escalates_to: initiative-prioritization-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

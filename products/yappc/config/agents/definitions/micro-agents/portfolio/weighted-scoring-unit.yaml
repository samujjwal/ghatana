id: weighted-scoring-unit
name: Weighted Scoring Unit
version: 1.0.0
namespace: yappc.micro-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Apply configurable weighted scoring formula to a set of options and return sorted scores
  with weights breakdown
summary: Apply configurable weighted scoring formula to a set of options and return sorted scores with
  weights breakdown
metadata:
  level: 3
  domain: portfolio
  type: micro-agent
  tags:
  - weighted-scoring
  - ranking
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: scoring_request
    schema: dynamic
  outputs:
  - name: scoring_result
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: initiative-prioritization-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- scoring_calculator
capabilities:
- weighted-scoring
- ranking
routing:
  input_types:
  - scoring_request
  output_types:
  - scoring_result
delegation:
  can_delegate_to: []
  escalates_to: initiative-prioritization-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

id: priority-ranker
name: Priority Ranker
version: 1.0.0
namespace: yappc.micro-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Sort and rank a list of items by composite priority score applying tiebreaker rules
summary: Sort and rank a list of items by composite priority score applying tiebreaker rules
metadata:
  level: 3
  domain: portfolio
  type: micro-agent
  tags:
  - ranking
  - tiebreaking
  - level3
  - micro
identity:
  agentType: deterministic
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: rank_request
    schema: dynamic
  outputs:
  - name: ranked_list
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: initiative-prioritization-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- ranker
capabilities:
- ranking
- tiebreaking
routing:
  input_types:
  - rank_request
  output_types:
  - ranked_list
delegation:
  can_delegate_to: []
  escalates_to: initiative-prioritization-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

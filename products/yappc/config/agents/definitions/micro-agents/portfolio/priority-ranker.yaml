id: priority-ranker
name: Priority Ranker
version: 1.0.0
description: "Sort and rank a list of items by composite priority score applying tiebreaker rules"

metadata:
  level: 3
  domain: portfolio
  type: micro-agent
  tags: [ranking, tiebreaking, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "ranking"
        - "tiebreaking"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [ranker]

capabilities:
  - ranking
  - tiebreaking

routing:
  input_types: [rank_request]
  output_types: [ranked_list]

delegation:
  can_delegate_to: []
  escalates_to: initiative-prioritization-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

id: governance-checklist-unit
name: Governance Checklist Unit
version: 1.0.0
description: "Evaluate an artefact against a governance checklist and return pass/fail status per item"

metadata:
  level: 3
  domain: portfolio
  type: micro-agent
  tags: [checklist-evaluation, compliance-checking, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "checklist-evaluation"
        - "compliance-checking"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [checklist_evaluator]

capabilities:
  - checklist-evaluation
  - compliance-checking

routing:
  input_types: [governance_check_request]
  output_types: [checklist_result]

delegation:
  can_delegate_to: []
  escalates_to: governance-review-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

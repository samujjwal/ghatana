id: governance-checklist-unit
name: Governance Checklist Unit
version: 1.0.0
namespace: yappc.micro-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Evaluate an artefact against a governance checklist and return pass/fail status per item
summary: Evaluate an artefact against a governance checklist and return pass/fail status per item
metadata:
  level: 3
  domain: portfolio
  type: micro-agent
  tags:
  - checklist-evaluation
  - compliance-checking
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: governance_check_request
    schema: dynamic
  outputs:
  - name: checklist_result
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: governance-review-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- checklist_evaluator
capabilities:
- checklist-evaluation
- compliance-checking
routing:
  input_types:
  - governance_check_request
  output_types:
  - checklist_result
delegation:
  can_delegate_to: []
  escalates_to: governance-review-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

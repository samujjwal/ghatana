id: budget-variance-checker
name: Budget Variance Checker
version: 1.0.0
namespace: yappc.micro-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Compare actual spend against budget envelope and flag items exceeding threshold
summary: Compare actual spend against budget envelope and flag items exceeding threshold
metadata:
  level: 3
  domain: portfolio
  type: micro-agent
  tags:
  - variance-checking
  - threshold-flagging
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: variance_request
    schema: dynamic
  outputs:
  - name: variance_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: business-case-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- variance_calculator
capabilities:
- variance-checking
- threshold-flagging
routing:
  input_types:
  - variance_request
  output_types:
  - variance_report
delegation:
  can_delegate_to: []
  escalates_to: business-case-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

id: budget-variance-checker
name: Budget Variance Checker
version: 1.0.0
description: "Compare actual spend against budget envelope and flag items exceeding threshold"

metadata:
  level: 3
  domain: portfolio
  type: micro-agent
  tags: [variance-checking, threshold-flagging, level3, micro]

generator:
  type: RULE_BASED
  steps:
    - name: execute
      type: RULE_BASED
      rules:
        - "variance-checking"
        - "threshold-flagging"

memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false

tools: [variance_calculator]

capabilities:
  - variance-checking
  - threshold-flagging

routing:
  input_types: [variance_request]
  output_types: [variance_report]

delegation:
  can_delegate_to: []
  escalates_to: business-case-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

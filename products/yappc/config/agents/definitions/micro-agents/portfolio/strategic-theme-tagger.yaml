id: strategic-theme-tagger
name: Strategic Theme Tagger
version: 1.0.0
namespace: yappc.micro-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Tag initiatives with one or more strategic theme labels from a predefined taxonomy
summary: Tag initiatives with one or more strategic theme labels from a predefined taxonomy
metadata:
  level: 3
  domain: portfolio
  type: micro-agent
  tags:
  - theme-tagging
  - taxonomy-matching
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: tagging_request
    schema: dynamic
  outputs:
  - name: tagged_items
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: strategic-planning-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- theme_tagger
capabilities:
- theme-tagging
- taxonomy-matching
routing:
  input_types:
  - tagging_request
  output_types:
  - tagged_items
delegation:
  can_delegate_to: []
  escalates_to: strategic-planning-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 100
  max_latency_ms: 500
  timeout_ms: 1000

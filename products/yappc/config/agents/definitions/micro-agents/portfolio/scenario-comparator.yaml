id: scenario-comparator
name: Scenario Comparator
version: 1.0.0
namespace: yappc.micro-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Compare two or more scenarios across a set of named dimensions and produce a structured comparison
  table
summary: Compare two or more scenarios across a set of named dimensions and produce a structured comparison
  table
metadata:
  level: 3
  domain: portfolio
  type: micro-agent
  tags:
  - scenario-comparison
  - dimension-evaluation
  - level3
  - micro
identity:
  agentType: DETERMINISTIC
  subtype: rule-engine
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: fail-fast
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: comparison_request
    schema: dynamic
  outputs:
  - name: comparison_table
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: strategic-planning-capability-agent
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  defaultReasoner: rule-engine
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- comparator
capabilities:
- scenario-comparison
- dimension-evaluation
routing:
  input_types:
  - comparison_request
  output_types:
  - comparison_table
delegation:
  can_delegate_to: []
  escalates_to: strategic-planning-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 200
  max_latency_ms: 1000
  timeout_ms: 2000

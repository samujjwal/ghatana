id: api-designer
name: API Designer
version: 1.0.0
namespace: yappc.definitions.api-engineering
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: RESTful API design, OpenAPI specs, GraphQL schemas expert
summary: RESTful API design, OpenAPI specs, GraphQL schemas expert
metadata:
  level: 2
  domain: api-engineering
  tags:
  - rest
  - graphql
  - openapi
  - api-design
identity:
  agentType: hybrid
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: APIRequest
    schema: dynamic
  - name: EndpointRequest
    schema: dynamic
  outputs:
  - name: OpenAPISpec
    schema: dynamic
  - name: GraphQLSchema
    schema: dynamic
  - name: APIDocumentation
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - api-doc-generator
    - documentation-writer
    escalation: systems-architect
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 120
  semantic:
    enabled: true
    categories:
    - api-patterns
    - rest-conventions
    - graphql-schemas
  procedural:
    enabled: true
tools:
- file_read
- file_write
capabilities:
- rest-api-design
- graphql-schema-design
- openapi-spec-generation
- api-versioning
routing:
  input_types:
  - APIRequest
  - EndpointRequest
  output_types:
  - OpenAPISpec
  - GraphQLSchema
  - APIDocumentation
delegation:
  can_delegate_to:
  - api-doc-generator
  - documentation-writer
  escalates_to: systems-architect
performance:
  expected_latency_ms: 2500
  max_latency_ms: 7000
  timeout_ms: 10000

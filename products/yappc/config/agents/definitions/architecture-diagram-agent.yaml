id: architecture-diagram-agent
name: Architecture Diagram Agent
version: 1.0.0
namespace: yappc.definitions.documentation
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Generates architecture diagrams (C4, sequence, component) from code and specifications
summary: Generates architecture diagrams (C4, sequence, component) from code and specifications
metadata:
  level: 3
  domain: documentation
  tags:
  - diagrams
  - architecture
  - visualization
identity:
  agentType: HYBRID
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: ArchitectureSpec
    schema: dynamic
  - name: CodeRepository
    schema: dynamic
  outputs:
  - name: ArchitectureDiagrams
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: documentation-orchestrator
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 30
  semantic:
    enabled: true
    categories:
    - architecture-patterns
    - diagram-templates
  procedural:
    enabled: false
tools:
- file_read
- ast_parse
- file_list
capabilities:
- c4-diagram-generation
- sequence-diagram-generation
- component-diagram-generation
routing:
  input_types:
  - ArchitectureSpec
  - CodeRepository
  output_types:
  - ArchitectureDiagrams
delegation:
  can_delegate_to: []
  escalates_to: documentation-orchestrator
performance:
  expected_latency_ms: 3000
  max_latency_ms: 8000
  timeout_ms: 12000

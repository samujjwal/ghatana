id: "architecture-diagram-agent"
name: "Architecture Diagram Agent"
version: "1.0.0"
description: "Generates architecture diagrams (C4, sequence, component) from code and specifications"

metadata:
  level: 3  # Worker level
  domain: "documentation"
  tags: ["diagrams", "architecture", "visualization"]

generator:
  type: "pipeline"
  steps:
    - type: "rule-based"
      rules:
        - "Parse code structure"
        - "Extract component relationships"
        - "Identify system boundaries"
    - type: "service-call"
      service: "plantuml"
      endpoint: "/generate"
    - type: "llm"
      provider: "openai"
      model: "gpt-4"
      temperature: 0.3
      prompt: |
        Generate diagram descriptions:
        
        Components: {{components}}
        Relationships: {{relationships}}
        
        Create:
        1. C4 Context diagram (system in environment)
        2. C4 Container diagram (high-level tech)
        3. Component diagram (internal structure)
        4. Sequence diagrams (key flows)

memory:
  episodic:
    enabled: true
    retention_days: 30
  semantic:
    enabled: true
    categories: ["architecture-patterns", "diagram-templates"]
  procedural:
    enabled: false

tools:
  - "file_read"
  - "ast_parse"
  - "file_list"

capabilities:
  - "c4-diagram-generation"
  - "sequence-diagram-generation"
  - "component-diagram-generation"

routing:
  input_types: ["ArchitectureSpec", "CodeRepository"]
  output_types: ["ArchitectureDiagrams"]

delegation:
  can_delegate_to: []
  escalates_to: "documentation-orchestrator"

performance:
  expected_latency_ms: 3000
  max_latency_ms: 8000
  timeout_ms: 12000

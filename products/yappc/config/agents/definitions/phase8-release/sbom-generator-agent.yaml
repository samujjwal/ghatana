id: sbom-generator-agent
name: SBOM Generator Agent
version: 1.0.0
description: Generates Software Bill of Materials in CycloneDX 1.4 and SPDX 2.3 formats from project dependency graphs. Produces attestation-ready SBOMs for supply chain security.

metadata:
  level: 3
  domain: release
  tags: [release, sbom, cyclonedx, spdx, supply-chain, deterministic]

generator:
  type: PIPELINE
  steps:
    - name: dependency_scan
      type: SERVICE_CALL
      service: build-service
      endpoint: /dependencies/resolve
    - name: sbom_generation
      type: RULE_BASED
      description: >
        Generate CycloneDX 1.4 JSON and SPDX 2.3 tag-value from resolved
        dependency graph. Include transitive deps, licenses, hashes (SHA-256).
    - name: vulnerability_cross_reference
      type: SERVICE_CALL
      service: vulnerability-db
      endpoint: /vulnerabilities/match

memory:
  episodic:
    enabled: true
    retention_days: 730
    categories: [sbom-generations, vulnerability-matches]
  semantic:
    enabled: true
    categories: [license-compatibility-rules, known-vulnerable-versions]

tools: [gradle_dependency_resolver, npm_dependency_resolver, sbom_formatter]

capabilities:
  - dependency-analysis
  - security-analysis

routing:
  input_types: [build-artifact, project-path]
  output_types: [cyclonedx-sbom, spdx-sbom, vulnerability-match-report]

delegation:
  can_delegate_to: []
  escalates_to: release-orchestrator-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: comprehensive

performance:
  expected_latency_ms: 5000
  max_latency_ms: 30000
  timeout_ms: 60000

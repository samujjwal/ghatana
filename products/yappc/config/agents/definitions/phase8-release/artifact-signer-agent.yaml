id: artifact-signer-agent
name: Artifact Signer Agent
version: 1.0.0
description: Signs release artifacts (JARs, Docker images, npm packages) using configured signing keys. Produces verifiable signatures and attestation metadata for artifact provenance.

metadata:
  level: 3
  domain: release
  tags: [release, signing, provenance, attestation, deterministic]

generator:
  type: PIPELINE
  steps:
    - name: key_retrieval
      type: SERVICE_CALL
      service: secret-store
      endpoint: /secrets/signing-key
    - name: artifact_signing
      type: RULE_BASED
      description: >
        Sign each artifact with the retrieved key.
        JAR: jarsigner / GPG detached signature.
        Docker: cosign / Notary v2.
        npm: npm publish --provenance.
        Output: signature files + SLSA provenance attestation.
    - name: signature_verification
      type: RULE_BASED
      description: Verify produced signatures are valid before publishing

memory:
  episodic:
    enabled: true
    retention_days: 730
    categories: [signing-operations, key-rotations]
  semantic:
    enabled: true
    categories: [signing-policies, artifact-types]

tools: [gpg_signer, cosign_signer, jarsigner]

capabilities:
  - deployment-automation

routing:
  input_types: [artifact-path, artifact-manifest]
  output_types: [signed-artifact, signature-file, provenance-attestation]

delegation:
  can_delegate_to: []
  escalates_to: release-orchestrator-agent

governance:
  requires_approval: true
  can_block: false
  audit_trail: comprehensive

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

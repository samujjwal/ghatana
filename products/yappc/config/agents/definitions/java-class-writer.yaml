id: java-class-writer
name: Java Class Writer
version: 1.0.0
namespace: yappc.definitions.code-generation
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Atomic worker agent for generating Java class files from specifications
summary: Atomic worker agent for generating Java class files from specifications
metadata:
  level: 3
  domain: code-generation
  tags:
  - worker
  - java
  - code-generation
  - deterministic
identity:
  agentType: HYBRID
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: class-specification
    schema: dynamic
  - name: java-class-request
    schema: dynamic
  outputs:
  - name: java-class-file
    schema: dynamic
  - name: compilation-result
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: &id001
    - java-expert
learning:
  learningLevel: L1
  adaptationTargets:
    - EPISODIC_MEMORY
  skillRefs:
    - skillId: java-class-generation
      requiredLevel: L1
  masteryBindings:
    - namespace: yappc
      registryRef: yappc-mastery-registry
      freshnessPolicy: default
      versionPolicy: semver
      obsolescencePolicy: default
  provenanceRequired: false
  promotionRequired: false
  governanceWorkflow: false
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 30
    categories:
    - generated-classes
    - compilation-results
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- java_compiler
- checkstyle_validator
- code_formatter
capabilities:
- code-generation
- java-class-generation
routing:
  input_types:
  - class-specification
  - java-class-request
  output_types:
  - java-class-file
  - compilation-result
delegation:
  can_delegate_to: []
  escalates_to: *id001
governance:
  requires_approval: false
  can_block: false
  audit_trail: minimal
performance:
  expected_latency_ms: 500
  max_latency_ms: 2000
  timeout_ms: 5000

id: runbook-generator
name: Runbook Generator
version: 1.0.0
namespace: yappc.definitions.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Generates operational runbooks for deployment, maintenance, and troubleshooting
summary: Generates operational runbooks for deployment, maintenance, and troubleshooting
metadata:
  level: 3
  domain: operations
  tags:
  - runbooks
  - operations
  - troubleshooting
identity:
  agentType: HYBRID
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: ServiceSpec
    schema: dynamic
  - name: CICDConfig
    schema: dynamic
  - name: IncidentHistory
    schema: dynamic
  outputs:
  - name: Runbook
    schema: dynamic
  - name: TroubleshootingGuide
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: documentation-orchestrator
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 90
  semantic:
    enabled: true
    categories:
    - operational-procedures
    - troubleshooting-guides
  procedural:
    enabled: true
tools:
- file_read
- file_write
capabilities:
- deployment-runbook-generation
- troubleshooting-guide-generation
- operational-procedure-documentation
routing:
  input_types:
  - ServiceSpec
  - CICDConfig
  - IncidentHistory
  output_types:
  - Runbook
  - TroubleshootingGuide
delegation:
  can_delegate_to: []
  escalates_to: documentation-orchestrator
performance:
  expected_latency_ms: 3000
  max_latency_ms: 8000
  timeout_ms: 12000

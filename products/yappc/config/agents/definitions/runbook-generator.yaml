id: "runbook-generator"
name: "Runbook Generator"
version: "1.0.0"
description: "Generates operational runbooks for deployment, maintenance, and troubleshooting"

metadata:
  level: 3  # Worker level
  domain: "operations"
  tags: ["runbooks", "operations", "troubleshooting"]

generator:
  type: "pipeline"
  steps:
    - type: "rule-based"
      rules:
        - "Extract deployment steps from CI/CD config"
        - "Identify common operational tasks"
        - "Extract troubleshooting patterns from incidents"
    - type: "template"
      engine: "liquid"
      template_path: "templates/docs/runbook.md.liquid"
    - type: "llm"
      provider: "openai"
      model: "gpt-4"
      temperature: 0.4
      prompt: |
        Create operational runbook for:
        {{service}}
        
        Include:
        1. Deployment procedures (step-by-step)
        2. Rollback procedures
        3. Health check commands
        4. Common troubleshooting scenarios
        5. Emergency contact information
        6. Monitoring dashboard links

memory:
  episodic:
    enabled: true
    retention_days: 90
  semantic:
    enabled: true
    categories: ["operational-procedures", "troubleshooting-guides"]
  procedural:
    enabled: true

tools:
  - "file_read"
  - "file_write"

capabilities:
  - "deployment-runbook-generation"
  - "troubleshooting-guide-generation"
  - "operational-procedure-documentation"

routing:
  input_types: ["ServiceSpec", "CICDConfig", "IncidentHistory"]
  output_types: ["Runbook", "TroubleshootingGuide"]

delegation:
  can_delegate_to: []
  escalates_to: "documentation-orchestrator"

performance:
  expected_latency_ms: 3000
  max_latency_ms: 8000
  timeout_ms: 12000

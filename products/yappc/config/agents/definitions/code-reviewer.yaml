id: code-reviewer
name: Code Reviewer
version: 1.0.0
namespace: yappc.definitions.quality-assurance
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Comprehensive code review with quality, security, performance analysis
summary: Comprehensive code review with quality, security, performance analysis
metadata:
  level: 2
  domain: quality-assurance
  tags:
  - code-review
  - static-analysis
  - best-practices
identity:
  agentType: HYBRID
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: CodeReviewRequest
    schema: dynamic
  - name: PullRequestReview
    schema: dynamic
  outputs:
  - name: ReviewReport
    schema: dynamic
  - name: ImprovementSuggestions
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - vuln-scanner
    - performance-optimizer
    escalation: sentinel
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 30
  semantic:
    enabled: true
    categories:
    - code-patterns
    - anti-patterns
    - best-practices
  procedural:
    enabled: true
tools:
- checkstyle_validate
- pmd_analyze
- spotbugs_scan
- sonar_analyze
- jacoco_coverage
- metrics_complexity
- file_read
capabilities:
- static-code-analysis
- security-review
- performance-review
- best-practices-enforcement
routing:
  input_types:
  - CodeReviewRequest
  - PullRequestReview
  output_types:
  - ReviewReport
  - ImprovementSuggestions
delegation:
  can_delegate_to:
  - vuln-scanner
  - performance-optimizer
  escalates_to: sentinel
governance:
  requires_approval: false
  can_block: false
performance:
  expected_latency_ms: 5000
  max_latency_ms: 15000
  timeout_ms: 20000

id: agent.yappc.migration-writer
name: Migration Writer
version: 1.0.0
namespace: yappc.definitions.general
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Database migration script generation agent
summary: Database migration script generation agent
metadata:
  author: YAPPC Team
  level: 3
  tags:
  - database
  - migration
  - schema
  - data
identity:
  agentType: hybrid
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs: []
  outputs: []
interoperability:
  agentToAgent:
    enabled: false
    protocol: ghatana-a2a-v1
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
capabilities:
- migration-script-generation
- schema-evolution
- data-migration
- rollback-planning

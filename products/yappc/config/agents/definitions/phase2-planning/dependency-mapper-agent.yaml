id: dependency-mapper-agent
name: Dependency Mapper Agent
version: 1.0.0
description: Maps and tracks dependencies between teams, features, and systems. Identifies critical paths and potential blockers.

metadata:
  level: 3  # Worker
  domain: planning
  tags:
    - dependency-mapping
    - cross-team-coordination
    - blocker-identification
    - critical-path

generator:
  type: PIPELINE
  steps:
    - name: dependency_extraction
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        You are the Dependency Mapper Agent. Extract dependencies:
        
        Features/Initiatives: {{items}}
        Teams: {{teams}}
        Systems: {{systems}}
        
        Identify:
        1. Feature-to-feature dependencies
        2. Team-to-team dependencies
        3. System/API dependencies
        4. External dependencies (vendors, third parties)
        5. Dependency types (HARD/SOFT/TIMING)
        6. Risk level per dependency
        
        Output as JSON: {dependencies: [{from, to, type, risk, description}], critical_path, highest_risk, recommendations}
    - name: graph_construction
      type: SERVICE_CALL
      service: dependency-service
      endpoint: /dependencies/graph
    - name: critical_path_analysis
      type: RULE_BASED
      description: Calculate critical path

memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
      - dependency-maps
      - blockers
      - resolutions
  semantic:
    enabled: true
    categories:
      - dependency-patterns
      - team-interfaces
      - system-architecture
  procedural:
    enabled: true
    categories:
      - extraction-rules
      - graph-algorithms
      - risk-scoring

tools:
  - dependency_extractor
  - graph_builder
  - critical_path_calculator

capabilities:
  - dependency-extraction
  - graph-visualization
  - critical-path-analysis
  - risk-identification

routing:
  input_types:
    - initiative-list
    - dependency-mapping-request
    - change-impact-analysis
  output_types:
    - dependency-map
    - critical-path
    - blocker-report

delegation:
  can_delegate_to: []
  escalates_to:
    - roadmap-builder-agent
    - planning-orchestrator-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 8000
  timeout_ms: 15000

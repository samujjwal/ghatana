id: backlog-prioritizer-agent
name: Backlog Prioritizer Agent
version: 1.0.0
description: Prioritizes product backlog using multiple frameworks (WSJF, RICE, MoSCoW). Ensures backlog reflects current priorities.

metadata:
  level: 2  # Domain Expert
  domain: planning
  tags:
    - backlog-management
    - prioritization
    - wsjf
    - rice

generator:
  type: PIPELINE
  steps:
    - name: item_scoring
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2500
      prompt: |
        You are the Backlog Prioritizer Agent. Score and prioritize these items:
        
        Backlog Items: {{items}}
        Strategic Goals: {{goals}}
        Framework: {{framework}}
        
        For each item calculate:
        
        If WSJF (Weighted Shortest Job First):
        - Business Value (1-13)
        - Time Criticality (1-13)
        - Risk Reduction/Opportunity Enablement (1-13)
        - Job Size (1-13)
        - WSJF Score = (BV + TC + RR/OE) / JS
        
        If RICE:
        - Reach (# users impacted)
        - Impact (0.25/0.5/1/2/3)
        - Confidence (25%/50%/80%/100%)
        - Effort (person-weeks)
        - RICE Score = (R * I * C) / E
        
        Output as JSON: {scored_items: [{id, scores, final_score, rank}], prioritized_order, rationale}
    - name: priority_assignment
      type: RULE_BASED
      description: Assign priorities based on scores
    - name: backlog_update
      type: SERVICE_CALL
      service: backlog-service
      endpoint: /backlog/prioritize

memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
      - prioritizations
      - score-history
      - priority-changes
  semantic:
    enabled: true
    categories:
      - prioritization-frameworks
      - scoring-models
      - strategic-alignment
  procedural:
    enabled: true
    categories:
      - scoring-algorithms
      - ranking-logic
      - tiebreaker-rules

tools:
  - scoring_calculator
  - backlog_sorter
  - impact_assessor

capabilities:
  - backlog-prioritization
  - multi-framework-scoring
  - strategic-alignment
  - priority-assignment

routing:
  input_types:
    - backlog
    - prioritization-request
    - reprioritization-trigger
  output_types:
    - prioritized-backlog
    - scoring-report
    - priority-rationale

delegation:
  can_delegate_to:
    - value-vs-effort-agent
  escalates_to:
    - planning-orchestrator-agent

governance:
  requires_approval: true  # Priority changes need PO approval
  can_block: false
  audit_trail: comprehensive

performance:
  expected_latency_ms: 4000
  max_latency_ms: 10000
  timeout_ms: 20000

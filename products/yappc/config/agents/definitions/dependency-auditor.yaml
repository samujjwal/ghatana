id: agent.yappc.dependency-auditor
name: Dependency Auditor
version: 1.0.0
namespace: yappc.definitions.general
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Software dependency analysis and security auditing agent
summary: Software dependency analysis and security auditing agent
metadata:
  author: YAPPC Team
  level: 2
  tags:
  - security
  - dependencies
  - vulnerability
  - compliance
identity:
  agentType: hybrid
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs: []
  outputs: []
interoperability:
  agentToAgent:
    enabled: false
    protocol: ghatana-a2a-v1
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
capabilities:
- vulnerability-scanning
- license-compliance
- dependency-analysis
- security-reporting

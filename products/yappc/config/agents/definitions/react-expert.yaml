id: react-expert
name: React Expert
version: 1.0.0
namespace: yappc.definitions.frontend-engineering
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Expert in React/TypeScript frontend development
summary: Expert in React/TypeScript frontend development
metadata:
  level: 2
  domain: frontend-engineering
  tags:
  - react
  - typescript
  - ui
  - components
identity:
  agentType: hybrid
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: ComponentRequest
    schema: dynamic
  - name: UIFeatureRequest
    schema: dynamic
  outputs:
  - name: ReactComponent
    schema: dynamic
  - name: TypeScriptCode
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - code-generator-agent
    - accessibility-test-agent
    escalation: systems-architect
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 60
  semantic:
    enabled: true
    categories:
    - react-patterns
    - typescript-types
    - ui-components
  procedural:
    enabled: true
tools:
- file_read
- file_write
- ast_parse
- file_exists
capabilities:
- react-component-generation
- typescript-typing
- ui-implementation
- state-management
routing:
  input_types:
  - ComponentRequest
  - UIFeatureRequest
  output_types:
  - ReactComponent
  - TypeScriptCode
delegation:
  can_delegate_to:
  - code-generator-agent
  - accessibility-test-agent
  escalates_to: systems-architect
performance:
  expected_latency_ms: 2000
  max_latency_ms: 6000
  timeout_ms: 8000

apiVersion: ghatana.yappc/v1
kind: MasteryEntry
metadata:
  id: react-ui-generation
  name: React UI Generation
  version: 1.0.0
  description: >
    Mastery entry tracking an agent release's skill at generating correct,
    accessible, and design-system-aligned React components.
spec:
  skillId: react-ui-generation
  domain: engineering
  initialState: OBSERVED
  seedScore:
    correctness: 0.6
    freshness: 0.8
    applicability: 0.7
    safety: 0.9
    evidenceStrength: 0.5
    regressionStability: 0.0

  versionScope:
    active:
      - "react@18"
      - "react@19"
    maintenance:
      - "react@17"
    obsolete:
      - "react@16"

  procedureRefs:
    - procedure-id: react-component-template-v1
      version: "1.0.0"
    - procedure-id: typescript-prop-types-v1
      version: "1.0.0"

  negativeKnowledgeRefs:
    - negative-id: deprecated-class-components-v1
      version: "1.0.0"
      failurePattern: "Class components instead of functional components"

  evaluationRefs:
    - eval-pack-react-ui-generation-v1
    - eval-pack-drift-detection-v1

  knownFailureModes:
    - type: accessibility-violation
      frequency: medium
      mitigation: "Apply a11y validation step"
    - type: type-error
      frequency: low
      mitigation: "Use TypeScript strict mode"

  promotionPolicy:
    ref: promotion-policy-v1
    minPassRate: 0.90
    requiresSafetyPass: true

  freshnessPolicy:
    staleAfterDays: 90
    requiresVerification: true
    minSuccessfulEpisodes: 5

  evidenceRequirements:
    minEpisodes: 10
    minSuccessfulEpisodes: 9
    requiresHumanReview: false

  observabilityHints:
    tracePrefix: mastery.react-ui-generation
    metricsNamespace: ghatana.yappc.mastery.react

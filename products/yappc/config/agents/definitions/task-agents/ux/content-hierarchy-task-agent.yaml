id: content-hierarchy-task-agent
name: Content Hierarchy Task Agent
version: 1.0.0
description: "Define content hierarchy and visual weight using typography scale, spacing, and colour to guide user attention"

metadata:
  level: 3
  domain: ux
  type: worker
  tags: [content-hierarchy-design, typography-spec, visual-weight-definition, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Define content hierarchy and visual weight using typography scale, spacing, and colour to guide user attention

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [hierarchy_designer, typography_spec_writer]

capabilities:
  - content-hierarchy-design
  - typography-spec
  - visual-weight-definition

routing:
  input_types: [content_hierarchy_request]
  output_types: [content_hierarchy_spec]

delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

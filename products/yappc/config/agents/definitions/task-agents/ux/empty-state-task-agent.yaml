id: empty-state-task-agent
name: Empty State Task Agent
version: 1.0.0
description: "Design empty state experiences with appropriate illustration direction, headline, sub-copy, and primary action guidance"

metadata:
  level: 3
  domain: ux
  type: worker
  tags: [empty-state-design, copy-writing, cta-specification, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Design empty state experiences with appropriate illustration direction, headline, sub-copy, and primary action guidance

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [empty_state_designer, illustration_director]

capabilities:
  - empty-state-design
  - copy-writing
  - cta-specification

routing:
  input_types: [empty_state_request]
  output_types: [empty_state_specification]

delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

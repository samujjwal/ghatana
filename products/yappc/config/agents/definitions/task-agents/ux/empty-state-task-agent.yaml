id: empty-state-task-agent
name: Empty State Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Design empty state experiences with appropriate illustration direction, headline, sub-copy,
  and primary action guidance
summary: Design empty state experiences with appropriate illustration direction, headline, sub-copy, and
  primary action guidance
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - empty-state-design
  - copy-writing
  - cta-specification
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: empty_state_request
    schema: dynamic
  outputs:
  - name: empty_state_specification
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: screen-design-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- empty_state_designer
- illustration_director
capabilities:
- empty-state-design
- copy-writing
- cta-specification
routing:
  input_types:
  - empty_state_request
  output_types:
  - empty_state_specification
delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

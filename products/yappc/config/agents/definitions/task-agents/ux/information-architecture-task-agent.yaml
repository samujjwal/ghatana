id: information-architecture-task-agent
name: Information Architecture Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Design information architecture with content classification, labelling system, and search
  strategy
summary: Design information architecture with content classification, labelling system, and search strategy
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - ia-design
  - content-classification
  - labelling-system
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: ia_request
    schema: dynamic
  outputs:
  - name: information_architecture
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: flow-design-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- ia_designer
- card_sort_analyser
capabilities:
- ia-design
- content-classification
- labelling-system
routing:
  input_types:
  - ia_request
  output_types:
  - information_architecture
delegation:
  can_delegate_to: []
  escalates_to: flow-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

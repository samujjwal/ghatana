id: interaction-pattern-task-agent
name: Interaction Pattern Task Agent
version: 1.0.0
description: "Specify interaction patterns for complex UI elements including gesture sequences, animation states, and feedback mechanisms"

metadata:
  level: 3
  domain: ux
  type: worker
  tags: [interaction-pattern-specification, gesture-design, animation-spec, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Specify interaction patterns for complex UI elements including gesture sequences, animation states, and feedback mechanisms

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [interaction_pattern_library, gesture_spec_writer]

capabilities:
  - interaction-pattern-specification
  - gesture-design
  - animation-spec

routing:
  input_types: [interaction_pattern_request]
  output_types: [interaction_pattern_spec]

delegation:
  can_delegate_to: []
  escalates_to: canvas-interaction-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

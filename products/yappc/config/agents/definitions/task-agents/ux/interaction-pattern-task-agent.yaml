id: interaction-pattern-task-agent
name: Interaction Pattern Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Specify interaction patterns for complex UI elements including gesture sequences, animation
  states, and feedback mechanisms
summary: Specify interaction patterns for complex UI elements including gesture sequences, animation states,
  and feedback mech...
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - interaction-pattern-specification
  - gesture-design
  - animation-spec
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: interaction_pattern_request
    schema: dynamic
  outputs:
  - name: interaction_pattern_spec
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: canvas-interaction-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- interaction_pattern_library
- gesture_spec_writer
capabilities:
- interaction-pattern-specification
- gesture-design
- animation-spec
routing:
  input_types:
  - interaction_pattern_request
  output_types:
  - interaction_pattern_spec
delegation:
  can_delegate_to: []
  escalates_to: canvas-interaction-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

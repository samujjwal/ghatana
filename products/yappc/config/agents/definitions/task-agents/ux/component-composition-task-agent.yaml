id: component-composition-task-agent
name: Component Composition Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Specify component composition blueprints showing how atomic components combine into molecules
  and organisms
summary: Specify component composition blueprints showing how atomic components combine into molecules
  and organisms
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - composition-specification
  - component-hierarchy
  - variant-definition
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: composition_request
    schema: dynamic
  outputs:
  - name: component_composition_spec
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: screen-design-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- composition_spec_writer
- component_library
capabilities:
- composition-specification
- component-hierarchy
- variant-definition
routing:
  input_types:
  - composition_request
  output_types:
  - component_composition_spec
delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

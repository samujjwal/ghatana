id: component-composition-task-agent
name: Component Composition Task Agent
version: 1.0.0
description: "Specify component composition blueprints showing how atomic components combine into molecules and organisms"

metadata:
  level: 3
  domain: ux
  type: worker
  tags: [composition-specification, component-hierarchy, variant-definition, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Specify component composition blueprints showing how atomic components combine into molecules and organisms

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [composition_spec_writer, component_library]

capabilities:
  - composition-specification
  - component-hierarchy
  - variant-definition

routing:
  input_types: [composition_request]
  output_types: [component_composition_spec]

delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

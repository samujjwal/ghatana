id: user-journey-task-agent
name: User Journey Task Agent
version: 1.0.0
description: "Map end-to-end user journeys across touchpoints showing scenario, actions, thoughts, emotions, and opportunities at each stage"

metadata:
  level: 3
  domain: ux
  type: worker
  tags: [journey-mapping, touchpoint-mapping, emotion-arc, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Map end-to-end user journeys across touchpoints showing scenario, actions, thoughts, emotions, and opportunities at each stage

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [journey_mapper, touchpoint_analyser]

capabilities:
  - journey-mapping
  - touchpoint-mapping
  - emotion-arc

routing:
  input_types: [journey_map_request]
  output_types: [user_journey_map]

delegation:
  can_delegate_to: []
  escalates_to: journey-design-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

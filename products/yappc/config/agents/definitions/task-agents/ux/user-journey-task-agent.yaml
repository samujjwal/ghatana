id: user-journey-task-agent
name: User Journey Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Map end-to-end user journeys across touchpoints showing scenario, actions, thoughts, emotions,
  and opportunities at each stage
summary: Map end-to-end user journeys across touchpoints showing scenario, actions, thoughts, emotions,
  and opportunities at e...
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - journey-mapping
  - touchpoint-mapping
  - emotion-arc
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: journey_map_request
    schema: dynamic
  outputs:
  - name: user_journey_map
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: journey-design-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- journey_mapper
- touchpoint_analyser
capabilities:
- journey-mapping
- touchpoint-mapping
- emotion-arc
routing:
  input_types:
  - journey_map_request
  output_types:
  - user_journey_map
delegation:
  can_delegate_to: []
  escalates_to: journey-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

id: pan-zoom-task-agent
name: Pan Zoom Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Define pan and zoom interaction specs for canvas/map UX including min/max zoom, inertia,
  keyboard shortcuts, and focus-zoom behavior
summary: Define pan and zoom interaction specs for canvas/map UX including min/max zoom, inertia, keyboard
  shortcuts, and focu...
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - pan-zoom-specification
  - boundary-definition
  - keyboard-shortcut-spec
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: pan_zoom_request
    schema: dynamic
  outputs:
  - name: pan_zoom_specification
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: canvas-interaction-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- pan_zoom_spec_writer
- boundary_definer
capabilities:
- pan-zoom-specification
- boundary-definition
- keyboard-shortcut-spec
routing:
  input_types:
  - pan_zoom_request
  output_types:
  - pan_zoom_specification
delegation:
  can_delegate_to: []
  escalates_to: canvas-interaction-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

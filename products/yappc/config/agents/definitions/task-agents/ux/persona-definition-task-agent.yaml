id: persona-definition-task-agent
name: Persona Definition Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Define detailed user personas with demographic, psychographic, goal, frustration, and technology
  usage attributes
summary: Define detailed user personas with demographic, psychographic, goal, frustration, and technology
  usage attributes
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - persona-definition
  - attribute-specification
  - archetype-creation
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: persona_definition_request
    schema: dynamic
  outputs:
  - name: user_persona
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: journey-design-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- persona_template_engine
- research_analyser
capabilities:
- persona-definition
- attribute-specification
- archetype-creation
routing:
  input_types:
  - persona_definition_request
  output_types:
  - user_persona
delegation:
  can_delegate_to: []
  escalates_to: journey-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

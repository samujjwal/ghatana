id: persona-definition-task-agent
name: Persona Definition Task Agent
version: 1.0.0
description: "Define detailed user personas with demographic, psychographic, goal, frustration, and technology usage attributes"

metadata:
  level: 3
  domain: ux
  type: worker
  tags: [persona-definition, attribute-specification, archetype-creation, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Define detailed user personas with demographic, psychographic, goal, frustration, and technology usage attributes

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [persona_template_engine, research_analyser]

capabilities:
  - persona-definition
  - attribute-specification
  - archetype-creation

routing:
  input_types: [persona_definition_request]
  output_types: [user_persona]

delegation:
  can_delegate_to: []
  escalates_to: journey-design-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

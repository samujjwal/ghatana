id: search-page-ux-task-agent
name: Search Page Ux Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Design search UX including search bar behaviour, autocomplete, filter/facet patterns, result
  card layout, and zero-results state
summary: Design search UX including search bar behaviour, autocomplete, filter/facet patterns, result
  card layout, and zero-re...
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - search-ux-design
  - autocomplete-spec
  - filter-facet-design
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: search_ux_request
    schema: dynamic
  outputs:
  - name: search_ux_specification
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: screen-design-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- search_ux_designer
- autocomplete_spec_writer
capabilities:
- search-ux-design
- autocomplete-spec
- filter-facet-design
routing:
  input_types:
  - search_ux_request
  output_types:
  - search_ux_specification
delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

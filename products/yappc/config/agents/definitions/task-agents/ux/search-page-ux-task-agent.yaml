id: search-page-ux-task-agent
name: Search Page Ux Task Agent
version: 1.0.0
description: "Design search UX including search bar behaviour, autocomplete, filter/facet patterns, result card layout, and zero-results state"

metadata:
  level: 3
  domain: ux
  type: worker
  tags: [search-ux-design, autocomplete-spec, filter-facet-design, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Design search UX including search bar behaviour, autocomplete, filter/facet patterns, result card layout, and zero-results state

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [search_ux_designer, autocomplete_spec_writer]

capabilities:
  - search-ux-design
  - autocomplete-spec
  - filter-facet-design

routing:
  input_types: [search_ux_request]
  output_types: [search_ux_specification]

delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

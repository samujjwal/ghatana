id: responsive-layout-task-agent
name: Responsive Layout Task Agent
version: 1.0.0
description: "Define responsive layout specifications for mobile/tablet/desktop breakpoints with component adaptation rules"

metadata:
  level: 3
  domain: ux
  type: worker
  tags: [responsive-specification, breakpoint-definition, adaptation-rules, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Define responsive layout specifications for mobile/tablet/desktop breakpoints with component adaptation rules

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [responsive_spec_writer, breakpoint_definer]

capabilities:
  - responsive-specification
  - breakpoint-definition
  - adaptation-rules

routing:
  input_types: [responsive_layout_request]
  output_types: [responsive_layout_spec]

delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: table-ux-task-agent
name: Table Ux Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Design table/data-grid UX with column priority (mobile-first), sorting/filtering patterns,
  inline actions, and pagination
summary: Design table/data-grid UX with column priority (mobile-first), sorting/filtering patterns, inline
  actions, and pagina...
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - table-design
  - column-prioritisation
  - sorting-filtering-ux
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: table_ux_request
    schema: dynamic
  outputs:
  - name: table_ux_specification
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: screen-design-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- table_designer
- column_priority_engine
capabilities:
- table-design
- column-prioritisation
- sorting-filtering-ux
routing:
  input_types:
  - table_ux_request
  output_types:
  - table_ux_specification
delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

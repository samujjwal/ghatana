id: keyboard-shortcut-task-agent
name: Keyboard Shortcut Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Define keyboard shortcut scheme ensuring no conflicts, covering power user workflows, and
  documenting discovery mechanism
summary: Define keyboard shortcut scheme ensuring no conflicts, covering power user workflows, and documenting
  discovery mecha...
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - shortcut-design
  - conflict-detection
  - discoverability-spec
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: keyboard_shortcut_request
    schema: dynamic
  outputs:
  - name: keyboard_shortcut_map
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: canvas-interaction-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- shortcut_scheme_designer
- conflict_detector
capabilities:
- shortcut-design
- conflict-detection
- discoverability-spec
routing:
  input_types:
  - keyboard_shortcut_request
  output_types:
  - keyboard_shortcut_map
delegation:
  can_delegate_to: []
  escalates_to: canvas-interaction-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

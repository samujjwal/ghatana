id: keyboard-shortcut-task-agent
name: Keyboard Shortcut Task Agent
version: 1.0.0
description: "Define keyboard shortcut scheme ensuring no conflicts, covering power user workflows, and documenting discovery mechanism"

metadata:
  level: 3
  domain: ux
  type: worker
  tags: [shortcut-design, conflict-detection, discoverability-spec, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Define keyboard shortcut scheme ensuring no conflicts, covering power user workflows, and documenting discovery mechanism

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [shortcut_scheme_designer, conflict_detector]

capabilities:
  - shortcut-design
  - conflict-detection
  - discoverability-spec

routing:
  input_types: [keyboard_shortcut_request]
  output_types: [keyboard_shortcut_map]

delegation:
  can_delegate_to: []
  escalates_to: canvas-interaction-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

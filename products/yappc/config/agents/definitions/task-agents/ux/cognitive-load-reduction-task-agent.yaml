id: cognitive-load-reduction-task-agent
name: Cognitive Load Reduction Task Agent
version: 1.0.0
description: "Identify high cognitive load areas in UX flows and recommend simplifications using progressive disclosure and chunking"

metadata:
  level: 3
  domain: ux
  type: worker
  tags: [cognitive-load-assessment, simplification-recommendation, information-chunking, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Identify high cognitive load areas in UX flows and recommend simplifications using progressive disclosure and chunking

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [cognitive_load_assessor, simplification_engine]

capabilities:
  - cognitive-load-assessment
  - simplification-recommendation
  - information-chunking

routing:
  input_types: [cognitive_load_request]
  output_types: [cognitive_load_reduction_plan]

delegation:
  can_delegate_to: []
  escalates_to: journey-design-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: cognitive-load-reduction-task-agent
name: Cognitive Load Reduction Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Identify high cognitive load areas in UX flows and recommend simplifications using progressive
  disclosure and chunking
summary: Identify high cognitive load areas in UX flows and recommend simplifications using progressive
  disclosure and chunking
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - cognitive-load-assessment
  - simplification-recommendation
  - information-chunking
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: cognitive_load_request
    schema: dynamic
  outputs:
  - name: cognitive_load_reduction_plan
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: journey-design-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- cognitive_load_assessor
- simplification_engine
capabilities:
- cognitive-load-assessment
- simplification-recommendation
- information-chunking
routing:
  input_types:
  - cognitive_load_request
  output_types:
  - cognitive_load_reduction_plan
delegation:
  can_delegate_to: []
  escalates_to: journey-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

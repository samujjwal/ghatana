id: dashboard-ux-task-agent
name: Dashboard Ux Task Agent
version: 1.0.0
description: "Design dashboard layout with widget hierarchy, data density levels, progressive disclosure, and personalisation hooks"

metadata:
  level: 3
  domain: ux
  type: worker
  tags: [dashboard-design, widget-layout, data-density-specification, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Design dashboard layout with widget hierarchy, data density levels, progressive disclosure, and personalisation hooks

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [dashboard_designer, widget_spec_writer]

capabilities:
  - dashboard-design
  - widget-layout
  - data-density-specification

routing:
  input_types: [dashboard_ux_request]
  output_types: [dashboard_ux_specification]

delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: dashboard-ux-task-agent
name: Dashboard Ux Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Design dashboard layout with widget hierarchy, data density levels, progressive disclosure,
  and personalisation hooks
summary: Design dashboard layout with widget hierarchy, data density levels, progressive disclosure, and
  personalisation hooks
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - dashboard-design
  - widget-layout
  - data-density-specification
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: dashboard_ux_request
    schema: dynamic
  outputs:
  - name: dashboard_ux_specification
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: screen-design-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- dashboard_designer
- widget_spec_writer
capabilities:
- dashboard-design
- widget-layout
- data-density-specification
routing:
  input_types:
  - dashboard_ux_request
  output_types:
  - dashboard_ux_specification
delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

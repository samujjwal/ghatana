id: error-state-task-agent
name: Error State Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Specify error states with user-friendly error messages, recovery actions, and appropriate
  visual hierarchy for all error types
summary: Specify error states with user-friendly error messages, recovery actions, and appropriate visual
  hierarchy for all er...
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - error-state-design
  - error-copy-writing
  - recovery-action-specification
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: error_state_request
    schema: dynamic
  outputs:
  - name: error_state_specification
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: screen-design-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- error_state_designer
- error_copy_writer
capabilities:
- error-state-design
- error-copy-writing
- recovery-action-specification
routing:
  input_types:
  - error_state_request
  output_types:
  - error_state_specification
delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

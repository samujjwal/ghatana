id: screen-state-task-agent
name: Screen State Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Define all screen states (loading, empty, error, success, partial-data, offline) with visual
  treatment and copy for each
summary: Define all screen states (loading, empty, error, success, partial-data, offline) with visual
  treatment and copy for each
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - screen-state-definition
  - copy-specification
  - visual-treatment
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: screen_state_request
    schema: dynamic
  outputs:
  - name: screen_states_specification
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: screen-design-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- state_definer
- copy_writer
capabilities:
- screen-state-definition
- copy-specification
- visual-treatment
routing:
  input_types:
  - screen_state_request
  output_types:
  - screen_states_specification
delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

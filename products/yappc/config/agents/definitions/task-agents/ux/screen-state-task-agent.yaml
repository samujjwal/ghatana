id: screen-state-task-agent
name: Screen State Task Agent
version: 1.0.0
description: "Define all screen states (loading, empty, error, success, partial-data, offline) with visual treatment and copy for each"

metadata:
  level: 3
  domain: ux
  type: worker
  tags: [screen-state-definition, copy-specification, visual-treatment, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Define all screen states (loading, empty, error, success, partial-data, offline) with visual treatment and copy for each

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [state_definer, copy_writer]

capabilities:
  - screen-state-definition
  - copy-specification
  - visual-treatment

routing:
  input_types: [screen_state_request]
  output_types: [screen_states_specification]

delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

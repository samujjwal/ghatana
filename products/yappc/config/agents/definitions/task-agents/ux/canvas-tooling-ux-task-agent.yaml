id: canvas-tooling-ux-task-agent
name: Canvas Tooling Ux Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Design canvas tooling UX including toolbar layout, tool mode switching, property panel design,
  and contextual menus
summary: Design canvas tooling UX including toolbar layout, tool mode switching, property panel design,
  and contextual menus
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - canvas-tooling-design
  - toolbar-layout
  - property-panel-spec
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: canvas_tooling_request
    schema: dynamic
  outputs:
  - name: canvas_tooling_specification
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: canvas-interaction-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- canvas_designer
- tooling_spec_writer
capabilities:
- canvas-tooling-design
- toolbar-layout
- property-panel-spec
routing:
  input_types:
  - canvas_tooling_request
  output_types:
  - canvas_tooling_specification
delegation:
  can_delegate_to: []
  escalates_to: canvas-interaction-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: visual-density-review-task-agent
name: Visual Density Review Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Review UI for appropriate visual density, identify overcrowded or too-sparse areas, and recommend
  density improvements
summary: Review UI for appropriate visual density, identify overcrowded or too-sparse areas, and recommend
  density improvements
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - density-review
  - spacing-audit
  - improvement-recommendation
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: density_review_request
    schema: dynamic
  outputs:
  - name: density_review_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: design-consistency-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- density_reviewer
- spacing_analyser
capabilities:
- density-review
- spacing-audit
- improvement-recommendation
routing:
  input_types:
  - density_review_request
  output_types:
  - density_review_report
delegation:
  can_delegate_to: []
  escalates_to: design-consistency-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

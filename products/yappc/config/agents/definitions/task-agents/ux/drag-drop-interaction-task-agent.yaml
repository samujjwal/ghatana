id: drag-drop-interaction-task-agent
name: Drag Drop Interaction Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Specify drag-and-drop interaction mechanics including drag initiation, preview rendering,
  drop zone highlighting, and snap behaviour
summary: Specify drag-and-drop interaction mechanics including drag initiation, preview rendering, drop
  zone highlighting, and...
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - drag-drop-specification
  - preview-design
  - drop-zone-specification
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: drag_drop_request
    schema: dynamic
  outputs:
  - name: drag_drop_specification
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: canvas-interaction-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- drag_drop_spec_writer
- snap_behaviour_definer
capabilities:
- drag-drop-specification
- preview-design
- drop-zone-specification
routing:
  input_types:
  - drag_drop_request
  output_types:
  - drag_drop_specification
delegation:
  can_delegate_to: []
  escalates_to: canvas-interaction-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

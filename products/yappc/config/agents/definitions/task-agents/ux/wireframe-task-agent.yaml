id: wireframe-task-agent
name: Wireframe Task Agent
version: 1.0.0
description: "Produce detailed wireframe specifications including layout structure, component placement, spacing, and interaction notes"

metadata:
  level: 3
  domain: ux
  type: worker
  tags: [wireframe-specification, layout-design, component-placement, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Produce detailed wireframe specifications including layout structure, component placement, spacing, and interaction notes

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [wireframe_spec_writer, layout_grid]

capabilities:
  - wireframe-specification
  - layout-design
  - component-placement

routing:
  input_types: [wireframe_request]
  output_types: [wireframe_specification]

delegation:
  can_delegate_to: []
  escalates_to: screen-design-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

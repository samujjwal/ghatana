id: design-token-alignment-task-agent
name: Design Token Alignment Task Agent
version: 1.0.0
description: "Audit component implementations against design token specifications and surface token drift"

metadata:
  level: 3
  domain: ux
  type: worker
  tags: [token-audit, drift-detection, compliance-scoring, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Audit component implementations against design token specifications and surface token drift

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [token_comparator, drift_detector]

capabilities:
  - token-audit
  - drift-detection
  - compliance-scoring

routing:
  input_types: [token_alignment_request]
  output_types: [token_alignment_report]

delegation:
  can_delegate_to: []
  escalates_to: design-consistency-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

id: design-token-alignment-task-agent
name: Design Token Alignment Task Agent
version: 1.0.0
namespace: yappc.task-agents.ux
status: active
owners:
- team: design
  contact: design@ghatana.com
description: Audit component implementations against design token specifications and surface token drift
summary: Audit component implementations against design token specifications and surface token drift
metadata:
  level: 3
  domain: ux
  type: worker
  tags:
  - token-audit
  - drift-detection
  - compliance-scoring
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: token_alignment_request
    schema: dynamic
  outputs:
  - name: token_alignment_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: design-consistency-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- token_comparator
- drift_detector
capabilities:
- token-audit
- drift-detection
- compliance-scoring
routing:
  input_types:
  - token_alignment_request
  output_types:
  - token_alignment_report
delegation:
  can_delegate_to: []
  escalates_to: design-consistency-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

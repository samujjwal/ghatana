id: interview-synthesis-task-agent
name: Interview Synthesis Task Agent
version: 1.0.0
description: "Synthesise qualitative interview transcripts into structured insights: themes, quotes, JTBD statements, and opportunity hypotheses"

metadata:
  level: 3
  domain: discovery
  type: worker
  tags: [transcript-analysis, theme-synthesis, jtbd-extraction, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Synthesise qualitative interview transcripts into structured insights: themes, quotes, JTBD statements, and opportunity hypotheses

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [transcript_parser, theme_clusterer, jtbd_extractor]

capabilities:
  - transcript-analysis
  - theme-synthesis
  - jtbd-extraction

routing:
  input_types: [interview_synthesis_request]
  output_types: [interview_insights]

delegation:
  can_delegate_to: []
  escalates_to: customer-research-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

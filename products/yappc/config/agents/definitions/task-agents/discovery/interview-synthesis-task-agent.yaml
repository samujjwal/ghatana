id: interview-synthesis-task-agent
name: Interview Synthesis Task Agent
version: 1.0.0
namespace: yappc.task-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: 'Synthesise qualitative interview transcripts into structured insights: themes, quotes, JTBD
  statements, and opportunity hypotheses'
summary: 'Synthesise qualitative interview transcripts into structured insights: themes, quotes, JTBD
  statements, and opportuni...'
metadata:
  level: 3
  domain: discovery
  type: worker
  tags:
  - transcript-analysis
  - theme-synthesis
  - jtbd-extraction
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: interview_synthesis_request
    schema: dynamic
  outputs:
  - name: interview_insights
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: customer-research-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- transcript_parser
- theme_clusterer
- jtbd_extractor
capabilities:
- transcript-analysis
- theme-synthesis
- jtbd-extraction
routing:
  input_types:
  - interview_synthesis_request
  output_types:
  - interview_insights
delegation:
  can_delegate_to: []
  escalates_to: customer-research-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

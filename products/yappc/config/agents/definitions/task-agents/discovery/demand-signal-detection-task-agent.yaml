id: demand-signal-detection-task-agent
name: Demand Signal Detection Task Agent
version: 1.0.0
namespace: yappc.task-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Detect demand signals from search trends, feature request volumes, support escalations, and
  sales call themes
summary: Detect demand signals from search trends, feature request volumes, support escalations, and sales
  call themes
metadata:
  level: 3
  domain: discovery
  type: worker
  tags:
  - demand-signal-aggregation
  - signal-strength-scoring
  - trend-detection
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: demand_signal_request
    schema: dynamic
  outputs:
  - name: demand_signal_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: opportunity-scoring-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- search_trend_reader
- feature_request_aggregator
- sales_call_analyser
capabilities:
- demand-signal-aggregation
- signal-strength-scoring
- trend-detection
routing:
  input_types:
  - demand_signal_request
  output_types:
  - demand_signal_report
delegation:
  can_delegate_to: []
  escalates_to: opportunity-scoring-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

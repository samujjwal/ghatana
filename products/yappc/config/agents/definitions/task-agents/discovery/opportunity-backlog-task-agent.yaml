id: opportunity-backlog-task-agent
name: Opportunity Backlog Task Agent
version: 1.0.0
description: "Maintain and groom the opportunity backlog by scoring, deduplicating, and linking opportunities to evidence and strategy"

metadata:
  level: 3
  domain: discovery
  type: worker
  tags: [opportunity-scoring, deduplication, evidence-linking, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Maintain and groom the opportunity backlog by scoring, deduplicating, and linking opportunities to evidence and strategy

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [opportunity_store, scoring_engine, deduplicator]

capabilities:
  - opportunity-scoring
  - deduplication
  - evidence-linking

routing:
  input_types: [opportunity_backlog_request]
  output_types: [groomed_opportunity_backlog]

delegation:
  can_delegate_to: []
  escalates_to: opportunity-scoring-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: opportunity-backlog-task-agent
name: Opportunity Backlog Task Agent
version: 1.0.0
namespace: yappc.task-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Maintain and groom the opportunity backlog by scoring, deduplicating, and linking opportunities
  to evidence and strategy
summary: Maintain and groom the opportunity backlog by scoring, deduplicating, and linking opportunities
  to evidence and strategy
metadata:
  level: 3
  domain: discovery
  type: worker
  tags:
  - opportunity-scoring
  - deduplication
  - evidence-linking
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: opportunity_backlog_request
    schema: dynamic
  outputs:
  - name: groomed_opportunity_backlog
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: opportunity-scoring-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- opportunity_store
- scoring_engine
- deduplicator
capabilities:
- opportunity-scoring
- deduplication
- evidence-linking
routing:
  input_types:
  - opportunity_backlog_request
  output_types:
  - groomed_opportunity_backlog
delegation:
  can_delegate_to: []
  escalates_to: opportunity-scoring-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: user-review-mining-task-agent
name: User Review Mining Task Agent
version: 1.0.0
description: "Mine app store reviews, G2, Capterra, and Reddit for product sentiment, pain points, and feature requests"

metadata:
  level: 3
  domain: discovery
  type: worker
  tags: [review-collection, sentiment-mining, pain-point-extraction, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Mine app store reviews, G2, Capterra, and Reddit for product sentiment, pain points, and feature requests

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [review_scraper, sentiment_analyser, theme_extractor]

capabilities:
  - review-collection
  - sentiment-mining
  - pain-point-extraction

routing:
  input_types: [review_mining_request]
  output_types: [mined_review_insights]

delegation:
  can_delegate_to: []
  escalates_to: customer-research-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 5000
  max_latency_ms: 25000
  timeout_ms: 50000

id: user-review-mining-task-agent
name: User Review Mining Task Agent
version: 1.0.0
namespace: yappc.task-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Mine app store reviews, G2, Capterra, and Reddit for product sentiment, pain points, and
  feature requests
summary: Mine app store reviews, G2, Capterra, and Reddit for product sentiment, pain points, and feature
  requests
metadata:
  level: 3
  domain: discovery
  type: worker
  tags:
  - review-collection
  - sentiment-mining
  - pain-point-extraction
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: review_mining_request
    schema: dynamic
  outputs:
  - name: mined_review_insights
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: customer-research-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- review_scraper
- sentiment_analyser
- theme_extractor
capabilities:
- review-collection
- sentiment-mining
- pain-point-extraction
routing:
  input_types:
  - review_mining_request
  output_types:
  - mined_review_insights
delegation:
  can_delegate_to: []
  escalates_to: customer-research-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 25000
  timeout_ms: 50000

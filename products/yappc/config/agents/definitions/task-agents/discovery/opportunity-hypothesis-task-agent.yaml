id: opportunity-hypothesis-task-agent
name: Opportunity Hypothesis Task Agent
version: 1.0.0
namespace: yappc.task-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Generate testable opportunity hypotheses from problem statements using IF/THEN/BECAUSE hypothesis
  format with validation criteria
summary: Generate testable opportunity hypotheses from problem statements using IF/THEN/BECAUSE hypothesis
  format with validat...
metadata:
  level: 3
  domain: discovery
  type: worker
  tags:
  - hypothesis-generation
  - validation-criteria-definition
  - assumption-mapping
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: hypothesis_request
    schema: dynamic
  outputs:
  - name: opportunity_hypotheses
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: problem-discovery-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- hypothesis_generator
- validation_criteria_builder
capabilities:
- hypothesis-generation
- validation-criteria-definition
- assumption-mapping
routing:
  input_types:
  - hypothesis_request
  output_types:
  - opportunity_hypotheses
delegation:
  can_delegate_to: []
  escalates_to: problem-discovery-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

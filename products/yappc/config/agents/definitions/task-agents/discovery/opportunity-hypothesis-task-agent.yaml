id: opportunity-hypothesis-task-agent
name: Opportunity Hypothesis Task Agent
version: 1.0.0
description: "Generate testable opportunity hypotheses from problem statements using IF/THEN/BECAUSE hypothesis format with validation criteria"

metadata:
  level: 3
  domain: discovery
  type: worker
  tags: [hypothesis-generation, validation-criteria-definition, assumption-mapping, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Generate testable opportunity hypotheses from problem statements using IF/THEN/BECAUSE hypothesis format with validation criteria

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [hypothesis_generator, validation_criteria_builder]

capabilities:
  - hypothesis-generation
  - validation-criteria-definition
  - assumption-mapping

routing:
  input_types: [hypothesis_request]
  output_types: [opportunity_hypotheses]

delegation:
  can_delegate_to: []
  escalates_to: problem-discovery-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

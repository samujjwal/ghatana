id: jobs-to-be-done-task-agent
name: Jobs To Be Done Task Agent
version: 1.0.0
namespace: yappc.task-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Extract and formalise JTBD statements from research data using the When/I want to/So I can
  format with context and outcome dimensions
summary: Extract and formalise JTBD statements from research data using the When/I want to/So I can format
  with context and ou...
metadata:
  level: 3
  domain: discovery
  type: worker
  tags:
  - jtbd-extraction
  - job-mapping
  - outcome-definition
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: jtbd_request
    schema: dynamic
  outputs:
  - name: jtbd_statements
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: customer-research-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- jtbd_framework_engine
- interview_analyser
capabilities:
- jtbd-extraction
- job-mapping
- outcome-definition
routing:
  input_types:
  - jtbd_request
  output_types:
  - jtbd_statements
delegation:
  can_delegate_to: []
  escalates_to: customer-research-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

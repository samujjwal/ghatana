id: jobs-to-be-done-task-agent
name: Jobs To Be Done Task Agent
version: 1.0.0
description: "Extract and formalise JTBD statements from research data using the When/I want to/So I can format with context and outcome dimensions"

metadata:
  level: 3
  domain: discovery
  type: worker
  tags: [jtbd-extraction, job-mapping, outcome-definition, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Extract and formalise JTBD statements from research data using the When/I want to/So I can format with context and outcome dimensions

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [jtbd_framework_engine, interview_analyser]

capabilities:
  - jtbd-extraction
  - job-mapping
  - outcome-definition

routing:
  input_types: [jtbd_request]
  output_types: [jtbd_statements]

delegation:
  can_delegate_to: []
  escalates_to: customer-research-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

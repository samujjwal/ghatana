id: support-ticket-clustering-task-agent
name: Support Ticket Clustering Task Agent
version: 1.0.0
namespace: yappc.task-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Cluster support tickets by problem type, frequency, and severity to identify systemic product
  issues
summary: Cluster support tickets by problem type, frequency, and severity to identify systemic product
  issues
metadata:
  level: 3
  domain: discovery
  type: worker
  tags:
  - ticket-clustering
  - issue-classification
  - impact-scoring
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: ticket_clustering_request
    schema: dynamic
  outputs:
  - name: ticket_cluster_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: customer-research-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- ticket_fetcher
- nlp_clusterer
- impact_scorer
capabilities:
- ticket-clustering
- issue-classification
- impact-scoring
routing:
  input_types:
  - ticket_clustering_request
  output_types:
  - ticket_cluster_report
delegation:
  can_delegate_to: []
  escalates_to: customer-research-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

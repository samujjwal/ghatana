id: regulatory-landscape-task-agent
name: Regulatory Landscape Task Agent
version: 1.0.0
description: "Map applicable regulatory requirements for a target market/industry including compliance obligations and timelines"

metadata:
  level: 3
  domain: discovery
  type: worker
  tags: [regulatory-scan, compliance-mapping, obligation-tracking, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Map applicable regulatory requirements for a target market/industry including compliance obligations and timelines

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [regulatory_database, compliance_mapper]

capabilities:
  - regulatory-scan
  - compliance-mapping
  - obligation-tracking

routing:
  input_types: [regulatory_scan_request]
  output_types: [regulatory_landscape_report]

delegation:
  can_delegate_to: []
  escalates_to: problem-discovery-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

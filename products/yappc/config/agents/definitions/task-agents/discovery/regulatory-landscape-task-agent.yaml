id: regulatory-landscape-task-agent
name: Regulatory Landscape Task Agent
version: 1.0.0
namespace: yappc.task-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Map applicable regulatory requirements for a target market/industry including compliance
  obligations and timelines
summary: Map applicable regulatory requirements for a target market/industry including compliance obligations
  and timelines
metadata:
  level: 3
  domain: discovery
  type: worker
  tags:
  - regulatory-scan
  - compliance-mapping
  - obligation-tracking
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: regulatory_scan_request
    schema: dynamic
  outputs:
  - name: regulatory_landscape_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: problem-discovery-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- regulatory_database
- compliance_mapper
capabilities:
- regulatory-scan
- compliance-mapping
- obligation-tracking
routing:
  input_types:
  - regulatory_scan_request
  output_types:
  - regulatory_landscape_report
delegation:
  can_delegate_to: []
  escalates_to: problem-discovery-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

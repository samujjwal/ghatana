id: market-trend-scan-task-agent
name: Market Trend Scan Task Agent
version: 1.0.0
namespace: yappc.task-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Scan and synthesise market trend signals from industry reports, news, analyst notes, and
  patent filings
summary: Scan and synthesise market trend signals from industry reports, news, analyst notes, and patent
  filings
metadata:
  level: 3
  domain: discovery
  type: worker
  tags:
  - market-trend-identification
  - signal-synthesis
  - trend-scoring
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: trend_scan_request
    schema: dynamic
  outputs:
  - name: market_trend_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: competitive-intelligence-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- web_search
- report_parser
- trend_aggregator
capabilities:
- market-trend-identification
- signal-synthesis
- trend-scoring
routing:
  input_types:
  - trend_scan_request
  output_types:
  - market_trend_report
delegation:
  can_delegate_to: []
  escalates_to: competitive-intelligence-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

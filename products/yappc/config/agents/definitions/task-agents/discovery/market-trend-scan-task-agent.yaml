id: market-trend-scan-task-agent
name: Market Trend Scan Task Agent
version: 1.0.0
description: "Scan and synthesise market trend signals from industry reports, news, analyst notes, and patent filings"

metadata:
  level: 3
  domain: discovery
  type: worker
  tags: [market-trend-identification, signal-synthesis, trend-scoring, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Scan and synthesise market trend signals from industry reports, news, analyst notes, and patent filings

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [web_search, report_parser, trend_aggregator]

capabilities:
  - market-trend-identification
  - signal-synthesis
  - trend-scoring

routing:
  input_types: [trend_scan_request]
  output_types: [market_trend_report]

delegation:
  can_delegate_to: []
  escalates_to: competitive-intelligence-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

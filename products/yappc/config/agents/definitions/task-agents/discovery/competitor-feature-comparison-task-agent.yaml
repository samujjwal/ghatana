id: competitor-feature-comparison-task-agent
name: Competitor Feature Comparison Task Agent
version: 1.0.0
description: "Compare competitor product features against own feature set using structured parity matrices with gap and advantage annotations"

metadata:
  level: 3
  domain: discovery
  type: worker
  tags: [feature-parity-analysis, gap-identification, competitive-benchmarking, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Compare competitor product features against own feature set using structured parity matrices with gap and advantage annotations

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [web_search, feature_matrix_builder]

capabilities:
  - feature-parity-analysis
  - gap-identification
  - competitive-benchmarking

routing:
  input_types: [competitor_comparison_request]
  output_types: [feature_parity_matrix]

delegation:
  can_delegate_to: []
  escalates_to: competitive-intelligence-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

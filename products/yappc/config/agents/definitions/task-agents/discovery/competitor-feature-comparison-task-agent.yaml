id: competitor-feature-comparison-task-agent
name: Competitor Feature Comparison Task Agent
version: 1.0.0
namespace: yappc.task-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Compare competitor product features against own feature set using structured parity matrices
  with gap and advantage annotations
summary: Compare competitor product features against own feature set using structured parity matrices
  with gap and advantage a...
metadata:
  level: 3
  domain: discovery
  type: worker
  tags:
  - feature-parity-analysis
  - gap-identification
  - competitive-benchmarking
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: competitor_comparison_request
    schema: dynamic
  outputs:
  - name: feature_parity_matrix
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: competitive-intelligence-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- web_search
- feature_matrix_builder
capabilities:
- feature-parity-analysis
- gap-identification
- competitive-benchmarking
routing:
  input_types:
  - competitor_comparison_request
  output_types:
  - feature_parity_matrix
delegation:
  can_delegate_to: []
  escalates_to: competitive-intelligence-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

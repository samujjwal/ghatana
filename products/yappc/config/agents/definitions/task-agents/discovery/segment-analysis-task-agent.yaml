id: segment-analysis-task-agent
name: Segment Analysis Task Agent
version: 1.0.0
namespace: yappc.task-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Analyse user segments by behaviour, demographic, and need profile to identify underserved
  and high-value segments
summary: Analyse user segments by behaviour, demographic, and need profile to identify underserved and
  high-value segments
metadata:
  level: 3
  domain: discovery
  type: worker
  tags:
  - segmentation-analysis
  - segment-profiling
  - opportunity-scoring
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: segment_analysis_request
    schema: dynamic
  outputs:
  - name: segment_profiles
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: customer-research-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- segment_analyser
- behavioural_data_reader
capabilities:
- segmentation-analysis
- segment-profiling
- opportunity-scoring
routing:
  input_types:
  - segment_analysis_request
  output_types:
  - segment_profiles
delegation:
  can_delegate_to: []
  escalates_to: customer-research-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

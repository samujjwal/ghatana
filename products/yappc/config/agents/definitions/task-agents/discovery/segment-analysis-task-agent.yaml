id: segment-analysis-task-agent
name: Segment Analysis Task Agent
version: 1.0.0
description: "Analyse user segments by behaviour, demographic, and need profile to identify underserved and high-value segments"

metadata:
  level: 3
  domain: discovery
  type: worker
  tags: [segmentation-analysis, segment-profiling, opportunity-scoring, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Analyse user segments by behaviour, demographic, and need profile to identify underserved and high-value segments

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [segment_analyser, behavioural_data_reader]

capabilities:
  - segmentation-analysis
  - segment-profiling
  - opportunity-scoring

routing:
  input_types: [segment_analysis_request]
  output_types: [segment_profiles]

delegation:
  can_delegate_to: []
  escalates_to: customer-research-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

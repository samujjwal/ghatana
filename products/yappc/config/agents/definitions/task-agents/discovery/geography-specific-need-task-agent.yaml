id: geography-specific-need-task-agent
name: Geography Specific Need Task Agent
version: 1.0.0
namespace: yappc.task-agents.discovery
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Identify geography-specific user needs, localisation requirements, and market nuances for
  expansion planning
summary: Identify geography-specific user needs, localisation requirements, and market nuances for expansion
  planning
metadata:
  level: 3
  domain: discovery
  type: worker
  tags:
  - geo-need-analysis
  - localisation-requirements
  - market-nuance-mapping
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: geo_need_request
    schema: dynamic
  outputs:
  - name: geo_need_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: customer-research-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- geo_data_reader
- localisation_checker
capabilities:
- geo-need-analysis
- localisation-requirements
- market-nuance-mapping
routing:
  input_types:
  - geo_need_request
  output_types:
  - geo_need_report
delegation:
  can_delegate_to: []
  escalates_to: customer-research-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

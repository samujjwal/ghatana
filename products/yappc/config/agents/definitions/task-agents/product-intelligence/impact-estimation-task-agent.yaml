id: impact-estimation-task-agent
name: Impact Estimation Task Agent
version: 1.0.0
description: "Estimate expected business impact of shipping an enhancement including affected users, metric lift, and revenue potential"

metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags: [impact-estimation, metric-lift-modelling, revenue-projection, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Estimate expected business impact of shipping an enhancement including affected users, metric lift, and revenue potential

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [impact_estimator, metric_lift_modeller, revenue_projector]

capabilities:
  - impact-estimation
  - metric-lift-modelling
  - revenue-projection

routing:
  input_types: [impact_estimation_request]
  output_types: [impact_estimate]

delegation:
  can_delegate_to: []
  escalates_to: enhancement-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

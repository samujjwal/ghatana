id: impact-estimation-task-agent
name: Impact Estimation Task Agent
version: 1.0.0
namespace: yappc.task-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Estimate expected business impact of shipping an enhancement including affected users, metric
  lift, and revenue potential
summary: Estimate expected business impact of shipping an enhancement including affected users, metric
  lift, and revenue poten...
metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags:
  - impact-estimation
  - metric-lift-modelling
  - revenue-projection
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: impact_estimation_request
    schema: dynamic
  outputs:
  - name: impact_estimate
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: enhancement-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- impact_estimator
- metric_lift_modeller
- revenue_projector
capabilities:
- impact-estimation
- metric-lift-modelling
- revenue-projection
routing:
  input_types:
  - impact_estimation_request
  output_types:
  - impact_estimate
delegation:
  can_delegate_to: []
  escalates_to: enhancement-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

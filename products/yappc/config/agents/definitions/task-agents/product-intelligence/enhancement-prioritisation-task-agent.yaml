id: enhancement-prioritisation-task-agent
name: Enhancement Prioritisation Task Agent
version: 1.0.0
namespace: yappc.task-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Score and rank enhancement opportunities using WSJF with calibrated value, time-criticality,
  risk-reduction, and job-size estimates
summary: Score and rank enhancement opportunities using WSJF with calibrated value, time-criticality,
  risk-reduction, and job-...
metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags:
  - wsjf-prioritisation
  - score-calibration
  - ranking
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: prioritisation_request
    schema: dynamic
  outputs:
  - name: wsjf_ranked_enhancements
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: enhancement-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- wsjf_scorer
- calibration_engine
capabilities:
- wsjf-prioritisation
- score-calibration
- ranking
routing:
  input_types:
  - prioritisation_request
  output_types:
  - wsjf_ranked_enhancements
delegation:
  can_delegate_to: []
  escalates_to: enhancement-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

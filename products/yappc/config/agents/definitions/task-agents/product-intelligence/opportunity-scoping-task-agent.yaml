id: opportunity-scoping-task-agent
name: Opportunity Scoping Task Agent
version: 1.0.0
description: "Scope product enhancement opportunities by defining problem boundaries, affected users, and success metrics before sizing"

metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags: [opportunity-scoping, boundary-definition, success-metric-definition, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Scope product enhancement opportunities by defining problem boundaries, affected users, and success metrics before sizing

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [opportunity_scoper, metric_definer]

capabilities:
  - opportunity-scoping
  - boundary-definition
  - success-metric-definition

routing:
  input_types: [opportunity_scoping_request]
  output_types: [scoped_opportunity]

delegation:
  can_delegate_to: []
  escalates_to: enhancement-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

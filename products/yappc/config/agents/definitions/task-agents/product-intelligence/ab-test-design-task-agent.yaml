id: ab-test-design-task-agent
name: Ab Test Design Task Agent
version: 1.0.0
namespace: yappc.task-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Design A/B test configurations including variant definitions, traffic allocation, experiment
  duration, and metric measurement plan
summary: Design A/B test configurations including variant definitions, traffic allocation, experiment
  duration, and metric mea...
metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags:
  - ab-test-design
  - variant-definition
  - traffic-allocation
  - metric-plan
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: ab_test_design_request
    schema: dynamic
  outputs:
  - name: ab_test_configuration
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: experimentation-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- ab_test_designer
- traffic_allocator
- metric_planner
capabilities:
- ab-test-design
- variant-definition
- traffic-allocation
- metric-plan
routing:
  input_types:
  - ab_test_design_request
  output_types:
  - ab_test_configuration
delegation:
  can_delegate_to: []
  escalates_to: experimentation-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

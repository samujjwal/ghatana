id: feedback-prioritisation-task-agent
name: Feedback Prioritisation Task Agent
version: 1.0.0
namespace: yappc.task-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Prioritise feedback themes using RICE scoring weighted by user segment value, churn risk
  signal, and strategic alignment
summary: Prioritise feedback themes using RICE scoring weighted by user segment value, churn risk signal,
  and strategic alignment
metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags:
  - feedback-prioritisation
  - rice-scoring
  - strategic-alignment
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: feedback_prioritisation_request
    schema: dynamic
  outputs:
  - name: prioritised_feedback_themes
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: feedback-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- rice_calculator
- strategic_aligner
- churn_signal_detector
capabilities:
- feedback-prioritisation
- rice-scoring
- strategic-alignment
routing:
  input_types:
  - feedback_prioritisation_request
  output_types:
  - prioritised_feedback_themes
delegation:
  can_delegate_to: []
  escalates_to: feedback-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: feedback-theme-clustering-task-agent
name: Feedback Theme Clustering Task Agent
version: 1.0.0
description: "Cluster feedback items into named themes using NLP topic modelling with volume and sentiment scores per theme"

metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags: [theme-clustering, nlp-topic-modelling, volume-scoring, sentiment-scoring, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Cluster feedback items into named themes using NLP topic modelling with volume and sentiment scores per theme

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [topic_modeller, theme_clusterer, sentiment_scorer]

capabilities:
  - theme-clustering
  - nlp-topic-modelling
  - volume-scoring
  - sentiment-scoring

routing:
  input_types: [theme_clustering_request]
  output_types: [feedback_themes]

delegation:
  can_delegate_to: []
  escalates_to: feedback-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

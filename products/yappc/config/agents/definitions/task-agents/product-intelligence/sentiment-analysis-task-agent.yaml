id: sentiment-analysis-task-agent
name: Sentiment Analysis Task Agent
version: 1.0.0
description: "Perform fine-grained sentiment analysis on feedback items classifying positive, neutral, negative with aspect-level sentiment"

metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags: [sentiment-analysis, aspect-level-sentiment, sentiment-classification, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Perform fine-grained sentiment analysis on feedback items classifying positive, neutral, negative with aspect-level sentiment

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [sentiment_analyser, aspect_extractor]

capabilities:
  - sentiment-analysis
  - aspect-level-sentiment
  - sentiment-classification

routing:
  input_types: [sentiment_request]
  output_types: [sentiment_analysis_result]

delegation:
  can_delegate_to: []
  escalates_to: feedback-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

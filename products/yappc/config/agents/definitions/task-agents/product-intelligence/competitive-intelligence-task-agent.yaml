id: competitive-intelligence-task-agent
name: Competitive Intelligence Task Agent
version: 1.0.0
description: "Monitor competitor product changes, pricing shifts, and feature announcements to inform strategic decisions"

metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags: [competitive-monitoring, feature-change-detection, pricing-intelligence, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Monitor competitor product changes, pricing shifts, and feature announcements to inform strategic decisions

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [competitor_monitor, feature_change_detector, pricing_tracker]

capabilities:
  - competitive-monitoring
  - feature-change-detection
  - pricing-intelligence

routing:
  input_types: [competitive_intelligence_request]
  output_types: [competitive_intelligence_report]

delegation:
  can_delegate_to: []
  escalates_to: analytics-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 5000
  max_latency_ms: 25000
  timeout_ms: 50000

id: competitive-intelligence-task-agent
name: Competitive Intelligence Task Agent
version: 1.0.0
namespace: yappc.task-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Monitor competitor product changes, pricing shifts, and feature announcements to inform strategic
  decisions
summary: Monitor competitor product changes, pricing shifts, and feature announcements to inform strategic
  decisions
metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags:
  - competitive-monitoring
  - feature-change-detection
  - pricing-intelligence
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: competitive_intelligence_request
    schema: dynamic
  outputs:
  - name: competitive_intelligence_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: analytics-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- competitor_monitor
- feature_change_detector
- pricing_tracker
capabilities:
- competitive-monitoring
- feature-change-detection
- pricing-intelligence
routing:
  input_types:
  - competitive_intelligence_request
  output_types:
  - competitive_intelligence_report
delegation:
  can_delegate_to: []
  escalates_to: analytics-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 25000
  timeout_ms: 50000

id: funnel-analysis-task-agent
name: Funnel Analysis Task Agent
version: 1.0.0
namespace: yappc.task-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Build and analyse conversion funnels step-by-step computing drop-off rates, time-in-step,
  and user path distributions
summary: Build and analyse conversion funnels step-by-step computing drop-off rates, time-in-step, and
  user path distributions
metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags:
  - funnel-construction
  - drop-off-analysis
  - path-distribution
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: funnel_analysis_request
    schema: dynamic
  outputs:
  - name: funnel_analysis_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: analytics-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- funnel_builder
- drop_off_analyser
- path_analyser
capabilities:
- funnel-construction
- drop-off-analysis
- path-distribution
routing:
  input_types:
  - funnel_analysis_request
  output_types:
  - funnel_analysis_report
delegation:
  can_delegate_to: []
  escalates_to: analytics-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

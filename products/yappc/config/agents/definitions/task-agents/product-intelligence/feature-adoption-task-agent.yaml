id: feature-adoption-task-agent
name: Feature Adoption Task Agent
version: 1.0.0
description: "Track feature adoption curves from launch: activation rate, time-to-first-use, depth-of-adoption, and sustained engagement"

metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags: [adoption-tracking, activation-rate, depth-of-adoption, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Track feature adoption curves from launch: activation rate, time-to-first-use, depth-of-adoption, and sustained engagement

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [adoption_tracker, engagement_scorer]

capabilities:
  - adoption-tracking
  - activation-rate
  - depth-of-adoption

routing:
  input_types: [feature_adoption_request]
  output_types: [feature_adoption_report]

delegation:
  can_delegate_to: []
  escalates_to: analytics-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

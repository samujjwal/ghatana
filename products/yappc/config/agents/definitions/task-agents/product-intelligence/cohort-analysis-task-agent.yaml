id: cohort-analysis-task-agent
name: Cohort Analysis Task Agent
version: 1.0.0
namespace: yappc.task-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Perform cohort retention analysis by acquisition cohort showing week-over-week retention
  curves and cohort quality comparison
summary: Perform cohort retention analysis by acquisition cohort showing week-over-week retention curves
  and cohort quality co...
metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags:
  - cohort-retention-analysis
  - retention-curve-generation
  - cohort-quality-comparison
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: cohort_analysis_request
    schema: dynamic
  outputs:
  - name: cohort_retention_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: analytics-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- cohort_analyser
- retention_curve_builder
capabilities:
- cohort-retention-analysis
- retention-curve-generation
- cohort-quality-comparison
routing:
  input_types:
  - cohort_analysis_request
  output_types:
  - cohort_retention_report
delegation:
  can_delegate_to: []
  escalates_to: analytics-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

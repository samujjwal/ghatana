id: experiment-results-task-agent
name: Experiment Results Task Agent
version: 1.0.0
namespace: yappc.task-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Synthesise experiment results into a decision-ready report with statistical summary, business
  impact projection, and recommendation
summary: Synthesise experiment results into a decision-ready report with statistical summary, business
  impact projection, and...
metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags:
  - results-synthesis
  - business-impact-projection
  - decision-recommendation
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: experiment_results_request
    schema: dynamic
  outputs:
  - name: experiment_results_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: experimentation-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- results_synthesiser
- impact_projector
capabilities:
- results-synthesis
- business-impact-projection
- decision-recommendation
routing:
  input_types:
  - experiment_results_request
  output_types:
  - experiment_results_report
delegation:
  can_delegate_to: []
  escalates_to: experimentation-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: nps-analysis-task-agent
name: Nps Analysis Task Agent
version: 1.0.0
namespace: yappc.task-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Analyse NPS survey responses computing promoter/passive/detractor segments with verbatim
  theme analysis and trend view
summary: Analyse NPS survey responses computing promoter/passive/detractor segments with verbatim theme
  analysis and trend view
metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags:
  - nps-analysis
  - segment-computation
  - verbatim-theme-analysis
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: nps_analysis_request
    schema: dynamic
  outputs:
  - name: nps_analysis_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: feedback-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- nps_analyser
- verbatim_theme_extractor
capabilities:
- nps-analysis
- segment-computation
- verbatim-theme-analysis
routing:
  input_types:
  - nps_analysis_request
  output_types:
  - nps_analysis_report
delegation:
  can_delegate_to: []
  escalates_to: feedback-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: nps-analysis-task-agent
name: Nps Analysis Task Agent
version: 1.0.0
description: "Analyse NPS survey responses computing promoter/passive/detractor segments with verbatim theme analysis and trend view"

metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags: [nps-analysis, segment-computation, verbatim-theme-analysis, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Analyse NPS survey responses computing promoter/passive/detractor segments with verbatim theme analysis and trend view

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [nps_analyser, verbatim_theme_extractor]

capabilities:
  - nps-analysis
  - segment-computation
  - verbatim-theme-analysis

routing:
  input_types: [nps_analysis_request]
  output_types: [nps_analysis_report]

delegation:
  can_delegate_to: []
  escalates_to: feedback-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

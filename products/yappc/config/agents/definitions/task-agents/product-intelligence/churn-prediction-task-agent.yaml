id: churn-prediction-task-agent
name: Churn Prediction Task Agent
version: 1.0.0
namespace: yappc.task-agents.product-intelligence
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Predict user churn risk using behavioural signals (session frequency decay, feature disengagement)
  and generate intervention recommendations
summary: Predict user churn risk using behavioural signals (session frequency decay, feature disengagement)
  and generate inter...
metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags:
  - churn-prediction
  - risk-scoring
  - intervention-recommendation
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: churn_prediction_request
    schema: dynamic
  outputs:
  - name: churn_risk_scores
    schema: dynamic
  - name: intervention_plan
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: analytics-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- churn_predictor
- risk_scorer
- intervention_recommender
capabilities:
- churn-prediction
- risk-scoring
- intervention-recommendation
routing:
  input_types:
  - churn_prediction_request
  output_types:
  - churn_risk_scores
  - intervention_plan
delegation:
  can_delegate_to: []
  escalates_to: analytics-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

id: churn-prediction-task-agent
name: Churn Prediction Task Agent
version: 1.0.0
description: "Predict user churn risk using behavioural signals (session frequency decay, feature disengagement) and generate intervention recommendations"

metadata:
  level: 3
  domain: product-intelligence
  type: worker
  tags: [churn-prediction, risk-scoring, intervention-recommendation, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Predict user churn risk using behavioural signals (session frequency decay, feature disengagement) and generate intervention recommendations

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [churn_predictor, risk_scorer, intervention_recommender]

capabilities:
  - churn-prediction
  - risk-scoring
  - intervention-recommendation

routing:
  input_types: [churn_prediction_request]
  output_types: [churn_risk_scores, intervention_plan]

delegation:
  can_delegate_to: []
  escalates_to: analytics-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

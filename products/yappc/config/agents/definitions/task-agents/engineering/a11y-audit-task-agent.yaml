id: a11y-audit-task-agent
name: A11y Audit Task Agent
version: 1.0.0
description: "Audit React component implementations for WCAG 2.2 violations including missing ARIA labels, contrast failures, and keyboard trap issues"

metadata:
  level: 3
  domain: engineering
  type: worker
  tags: [a11y-audit, wcag-checking, aria-validation, keyboard-testing, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Audit React component implementations for WCAG 2.2 violations including missing ARIA labels, contrast failures, and keyboard trap issues

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [a11y_auditor, contrast_checker, keyboard_tester]

capabilities:
  - a11y-audit
  - wcag-checking
  - aria-validation
  - keyboard-testing

routing:
  input_types: [a11y_audit_request]
  output_types: [a11y_audit_report]

delegation:
  can_delegate_to: []
  escalates_to: frontend-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

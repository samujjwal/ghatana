id: a11y-audit-task-agent
name: A11y Audit Task Agent
version: 1.0.0
namespace: yappc.task-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Audit React component implementations for WCAG 2.2 violations including missing ARIA labels,
  contrast failures, and keyboard trap issues
summary: Audit React component implementations for WCAG 2
metadata:
  level: 3
  domain: engineering
  type: worker
  tags:
  - a11y-audit
  - wcag-checking
  - aria-validation
  - keyboard-testing
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: a11y_audit_request
    schema: dynamic
  outputs:
  - name: a11y_audit_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: frontend-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- a11y_auditor
- contrast_checker
- keyboard_tester
capabilities:
- a11y-audit
- wcag-checking
- aria-validation
- keyboard-testing
routing:
  input_types:
  - a11y_audit_request
  output_types:
  - a11y_audit_report
delegation:
  can_delegate_to: []
  escalates_to: frontend-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: domain-logic-task-agent
name: Domain Logic Task Agent
version: 1.0.0
description: "Implement domain logic following DDD patterns in Java 21 with ActiveJ Promises and event sourcing where applicable"

metadata:
  level: 3
  domain: engineering
  type: worker
  tags: [domain-logic-implementation, activej-promises, event-sourcing, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Implement domain logic following DDD patterns in Java 21 with ActiveJ Promises and event sourcing where applicable

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [java_code_generator, domain_pattern_applier]

capabilities:
  - domain-logic-implementation
  - activej-promises
  - event-sourcing

routing:
  input_types: [domain_logic_request]
  output_types: [domain_logic_code]

delegation:
  can_delegate_to: []
  escalates_to: backend-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 5000
  max_latency_ms: 25000
  timeout_ms: 50000

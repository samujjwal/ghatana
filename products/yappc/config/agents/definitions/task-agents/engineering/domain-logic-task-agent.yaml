id: domain-logic-task-agent
name: Domain Logic Task Agent
version: 1.0.0
namespace: yappc.task-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Implement domain logic following DDD patterns in Java 21 with ActiveJ Promises and event
  sourcing where applicable
summary: Implement domain logic following DDD patterns in Java 21 with ActiveJ Promises and event sourcing
  where applicable
metadata:
  level: 3
  domain: engineering
  type: worker
  tags:
  - domain-logic-implementation
  - activej-promises
  - event-sourcing
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: domain_logic_request
    schema: dynamic
  outputs:
  - name: domain_logic_code
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: backend-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- java_code_generator
- domain_pattern_applier
capabilities:
- domain-logic-implementation
- activej-promises
- event-sourcing
routing:
  input_types:
  - domain_logic_request
  output_types:
  - domain_logic_code
delegation:
  can_delegate_to: []
  escalates_to: backend-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 25000
  timeout_ms: 50000

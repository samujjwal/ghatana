id: refactoring-task-agent
name: Refactoring Task Agent
version: 1.0.0
namespace: yappc.task-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Plan and execute safe refactoring operations (extract method, rename, move class) with impact
  analysis and test preservation
summary: Plan and execute safe refactoring operations (extract method, rename, move class) with impact
  analysis and test prese...
metadata:
  level: 3
  domain: engineering
  type: worker
  tags:
  - refactoring-planning
  - impact-analysis
  - test-preservation
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: refactoring_request
    schema: dynamic
  outputs:
  - name: refactoring_plan
    schema: dynamic
  - name: refactored_code
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: code-quality-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- refactoring_planner
- impact_analyser
- test_runner
capabilities:
- refactoring-planning
- impact-analysis
- test-preservation
routing:
  input_types:
  - refactoring_request
  output_types:
  - refactoring_plan
  - refactored_code
delegation:
  can_delegate_to: []
  escalates_to: code-quality-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 25000
  timeout_ms: 50000

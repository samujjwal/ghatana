id: dependency-update-task-agent
name: Dependency Update Task Agent
version: 1.0.0
description: "Assess library dependency updates for compatibility, security patches, and breaking changes then produce safe update plan"

metadata:
  level: 3
  domain: engineering
  type: worker
  tags: [dependency-assessment, compatibility-checking, security-patch-identification, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Assess library dependency updates for compatibility, security patches, and breaking changes then produce safe update plan

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [dependency_scanner, compatibility_checker, security_patch_reader]

capabilities:
  - dependency-assessment
  - compatibility-checking
  - security-patch-identification

routing:
  input_types: [dependency_update_request]
  output_types: [dependency_update_plan]

delegation:
  can_delegate_to: []
  escalates_to: code-quality-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

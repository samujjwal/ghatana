id: api-implementation-task-agent
name: Api Implementation Task Agent
version: 1.0.0
description: "Implement ActiveJ HTTP handlers with route registration, request validation, Promise chain, and error mapping"

metadata:
  level: 3
  domain: engineering
  type: worker
  tags: [api-implementation, activej-handler, route-registration, error-handling, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Implement ActiveJ HTTP handlers with route registration, request validation, Promise chain, and error mapping

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [activej_code_generator, route_builder, error_mapper]

capabilities:
  - api-implementation
  - activej-handler
  - route-registration
  - error-handling

routing:
  input_types: [api_implementation_request]
  output_types: [api_handler_code]

delegation:
  can_delegate_to: []
  escalates_to: backend-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 5000
  max_latency_ms: 25000
  timeout_ms: 50000

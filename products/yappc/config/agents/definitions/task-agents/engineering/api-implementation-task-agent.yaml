id: api-implementation-task-agent
name: Api Implementation Task Agent
version: 1.0.0
namespace: yappc.task-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Implement ActiveJ HTTP handlers with route registration, request validation, Promise chain,
  and error mapping
summary: Implement ActiveJ HTTP handlers with route registration, request validation, Promise chain, and
  error mapping
metadata:
  level: 3
  domain: engineering
  type: worker
  tags:
  - api-implementation
  - activej-handler
  - route-registration
  - error-handling
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: api_implementation_request
    schema: dynamic
  outputs:
  - name: api_handler_code
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: backend-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- activej_code_generator
- route_builder
- error_mapper
capabilities:
- api-implementation
- activej-handler
- route-registration
- error-handling
routing:
  input_types:
  - api_implementation_request
  output_types:
  - api_handler_code
delegation:
  can_delegate_to: []
  escalates_to: backend-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 25000
  timeout_ms: 50000

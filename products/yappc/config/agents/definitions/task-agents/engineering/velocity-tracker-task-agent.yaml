id: velocity-tracker-task-agent
name: Velocity Tracker Task Agent
version: 1.0.0
namespace: yappc.task-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Track team velocity trends, forecast sprint completion probability, and surface velocity
  anomalies for retrospective focus
summary: Track team velocity trends, forecast sprint completion probability, and surface velocity anomalies
  for retrospective...
metadata:
  level: 3
  domain: engineering
  type: worker
  tags:
  - velocity-tracking
  - forecast-generation
  - anomaly-detection
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: velocity_tracking_request
    schema: dynamic
  outputs:
  - name: velocity_report
    schema: dynamic
  - name: sprint_forecast
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: engineering-metrics-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- velocity_tracker
- forecast_engine
- anomaly_detector
capabilities:
- velocity-tracking
- forecast-generation
- anomaly-detection
routing:
  input_types:
  - velocity_tracking_request
  output_types:
  - velocity_report
  - sprint_forecast
delegation:
  can_delegate_to: []
  escalates_to: engineering-metrics-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

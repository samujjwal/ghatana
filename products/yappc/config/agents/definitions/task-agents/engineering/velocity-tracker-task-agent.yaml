id: velocity-tracker-task-agent
name: Velocity Tracker Task Agent
version: 1.0.0
description: "Track team velocity trends, forecast sprint completion probability, and surface velocity anomalies for retrospective focus"

metadata:
  level: 3
  domain: engineering
  type: worker
  tags: [velocity-tracking, forecast-generation, anomaly-detection, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Track team velocity trends, forecast sprint completion probability, and surface velocity anomalies for retrospective focus

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [velocity_tracker, forecast_engine, anomaly_detector]

capabilities:
  - velocity-tracking
  - forecast-generation
  - anomaly-detection

routing:
  input_types: [velocity_tracking_request]
  output_types: [velocity_report, sprint_forecast]

delegation:
  can_delegate_to: []
  escalates_to: engineering-metrics-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

id: story-point-estimation-task-agent
name: Story Point Estimation Task Agent
version: 1.0.0
description: "Estimate story points using reference stories, complexity factors, and team velocity calibration"

metadata:
  level: 3
  domain: engineering
  type: worker
  tags: [story-point-estimation, complexity-analysis, velocity-calibration, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Estimate story points using reference stories, complexity factors, and team velocity calibration

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [estimation_engine, reference_story_reader, velocity_tracker]

capabilities:
  - story-point-estimation
  - complexity-analysis
  - velocity-calibration

routing:
  input_types: [estimation_request]
  output_types: [story_point_estimates]

delegation:
  can_delegate_to: []
  escalates_to: engineering-metrics-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

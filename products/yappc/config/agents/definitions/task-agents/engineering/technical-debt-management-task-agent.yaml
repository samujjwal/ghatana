id: technical-debt-management-task-agent
name: Technical Debt Management Task Agent
version: 1.0.0
description: "Identify, quantify, and prioritise technical debt items with remediation effort estimates and business impact scores"

metadata:
  level: 3
  domain: engineering
  type: worker
  tags: [debt-identification, debt-quantification, remediation-planning, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Identify, quantify, and prioritise technical debt items with remediation effort estimates and business impact scores

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [debt_analyser, impact_scorer, remediation_estimator]

capabilities:
  - debt-identification
  - debt-quantification
  - remediation-planning

routing:
  input_types: [debt_management_request]
  output_types: [tech_debt_report, remediation_plan]

delegation:
  can_delegate_to: []
  escalates_to: code-quality-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

id: retrospective-analysis-task-agent
name: Retrospective Analysis Task Agent
version: 1.0.0
description: "Synthesise retrospective data into actionable improvement items with owner assignments and success metrics"

metadata:
  level: 3
  domain: engineering
  type: worker
  tags: [retrospective-synthesis, improvement-item-generation, owner-assignment, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Synthesise retrospective data into actionable improvement items with owner assignments and success metrics

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [retro_analyser, improvement_item_creator, owner_suggester]

capabilities:
  - retrospective-synthesis
  - improvement-item-generation
  - owner-assignment

routing:
  input_types: [retrospective_request]
  output_types: [retrospective_analysis, improvement_items]

delegation:
  can_delegate_to: []
  escalates_to: devex-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

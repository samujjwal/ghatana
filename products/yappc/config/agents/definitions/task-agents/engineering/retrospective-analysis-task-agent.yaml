id: retrospective-analysis-task-agent
name: Retrospective Analysis Task Agent
version: 1.0.0
namespace: yappc.task-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Synthesise retrospective data into actionable improvement items with owner assignments and
  success metrics
summary: Synthesise retrospective data into actionable improvement items with owner assignments and success
  metrics
metadata:
  level: 3
  domain: engineering
  type: worker
  tags:
  - retrospective-synthesis
  - improvement-item-generation
  - owner-assignment
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: retrospective_request
    schema: dynamic
  outputs:
  - name: retrospective_analysis
    schema: dynamic
  - name: improvement_items
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: devex-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- retro_analyser
- improvement_item_creator
- owner_suggester
capabilities:
- retrospective-synthesis
- improvement-item-generation
- owner-assignment
routing:
  input_types:
  - retrospective_request
  output_types:
  - retrospective_analysis
  - improvement_items
delegation:
  can_delegate_to: []
  escalates_to: devex-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

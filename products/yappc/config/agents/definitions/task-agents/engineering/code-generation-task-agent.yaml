id: code-generation-task-agent
name: Code Generation Task Agent
version: 1.0.0
namespace: yappc.task-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Generate boilerplate and scaffold code for new services, modules, or features following project
  conventions
summary: Generate boilerplate and scaffold code for new services, modules, or features following project
  conventions
metadata:
  level: 3
  domain: engineering
  type: worker
  tags:
  - code-scaffolding
  - boilerplate-generation
  - convention-application
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: code_generation_request
    schema: dynamic
  outputs:
  - name: generated_code
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: backend-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- scaffold_generator
- template_engine
- convention_enforcer
capabilities:
- code-scaffolding
- boilerplate-generation
- convention-application
routing:
  input_types:
  - code_generation_request
  output_types:
  - generated_code
delegation:
  can_delegate_to: []
  escalates_to: backend-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

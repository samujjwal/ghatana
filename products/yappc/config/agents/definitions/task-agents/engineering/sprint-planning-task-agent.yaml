id: sprint-planning-task-agent
name: Sprint Planning Task Agent
version: 1.0.0
namespace: yappc.task-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Plan sprint by mapping backlog items to team capacity, factoring in velocity, planned absences,
  and technical debt allocation
summary: Plan sprint by mapping backlog items to team capacity, factoring in velocity, planned absences,
  and technical debt al...
metadata:
  level: 3
  domain: engineering
  type: worker
  tags:
  - sprint-planning
  - capacity-matching
  - velocity-application
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: sprint_planning_request
    schema: dynamic
  outputs:
  - name: sprint_plan
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: engineering-metrics-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- sprint_planner
- capacity_calculator
- velocity_reader
capabilities:
- sprint-planning
- capacity-matching
- velocity-application
routing:
  input_types:
  - sprint_planning_request
  output_types:
  - sprint_plan
delegation:
  can_delegate_to: []
  escalates_to: engineering-metrics-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

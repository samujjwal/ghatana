id: issue-creation-task-agent
name: Issue Creation Task Agent
version: 1.0.0
description: "Create well-structured engineering issues with context, technical requirements, AC, and effort estimate in target tool (Jira/GitHub)"

metadata:
  level: 3
  domain: engineering
  type: worker
  tags: [issue-creation, context-enrichment, tool-integration, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Create well-structured engineering issues with context, technical requirements, AC, and effort estimate in target tool (Jira/GitHub)

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [issue_creator, jira_client, github_client]

capabilities:
  - issue-creation
  - context-enrichment
  - tool-integration

routing:
  input_types: [issue_creation_request]
  output_types: [created_issues]

delegation:
  can_delegate_to: []
  escalates_to: engineering-metrics-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

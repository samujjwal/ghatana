id: issue-creation-task-agent
name: Issue Creation Task Agent
version: 1.0.0
namespace: yappc.task-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Create well-structured engineering issues with context, technical requirements, AC, and effort
  estimate in target tool (Jira/GitHub)
summary: Create well-structured engineering issues with context, technical requirements, AC, and effort
  estimate in target too...
metadata:
  level: 3
  domain: engineering
  type: worker
  tags:
  - issue-creation
  - context-enrichment
  - tool-integration
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: issue_creation_request
    schema: dynamic
  outputs:
  - name: created_issues
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: engineering-metrics-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- issue_creator
- jira_client
- github_client
capabilities:
- issue-creation
- context-enrichment
- tool-integration
routing:
  input_types:
  - issue_creation_request
  output_types:
  - created_issues
delegation:
  can_delegate_to: []
  escalates_to: engineering-metrics-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

id: work-decomposition-task-agent
name: Work Decomposition Task Agent
version: 1.0.0
namespace: yappc.task-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Decompose epics and features into implementation tasks with size estimates, technical approach,
  and cross-cutting concerns identified
summary: Decompose epics and features into implementation tasks with size estimates, technical approach,
  and cross-cutting con...
metadata:
  level: 3
  domain: engineering
  type: worker
  tags:
  - work-decomposition
  - task-estimation
  - dependency-identification
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: decomposition_request
    schema: dynamic
  outputs:
  - name: implementation_tasks
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: engineering-metrics-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- decomposition_engine
- estimation_model
capabilities:
- work-decomposition
- task-estimation
- dependency-identification
routing:
  input_types:
  - decomposition_request
  output_types:
  - implementation_tasks
delegation:
  can_delegate_to: []
  escalates_to: engineering-metrics-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: component-generation-task-agent
name: Component Generation Task Agent
version: 1.0.0
description: "Generate React components with TypeScript, Tailwind styling, Jotai state, and accessibility attributes from specification"

metadata:
  level: 3
  domain: engineering
  type: worker
  tags: [react-component-generation, typescript-typing, tailwind-styling, a11y-attributes, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Generate React components with TypeScript, Tailwind styling, Jotai state, and accessibility attributes from specification

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [component_generator, typescript_checker, tailwind_applier]

capabilities:
  - react-component-generation
  - typescript-typing
  - tailwind-styling
  - a11y-attributes

routing:
  input_types: [component_generation_request]
  output_types: [react_component_code]

delegation:
  can_delegate_to: []
  escalates_to: frontend-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

id: component-generation-task-agent
name: Component Generation Task Agent
version: 1.0.0
namespace: yappc.task-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Generate React components with TypeScript, Tailwind styling, Jotai state, and accessibility
  attributes from specification
summary: Generate React components with TypeScript, Tailwind styling, Jotai state, and accessibility attributes
  from specifica...
metadata:
  level: 3
  domain: engineering
  type: worker
  tags:
  - react-component-generation
  - typescript-typing
  - tailwind-styling
  - a11y-attributes
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: component_generation_request
    schema: dynamic
  outputs:
  - name: react_component_code
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: frontend-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- component_generator
- typescript_checker
- tailwind_applier
capabilities:
- react-component-generation
- typescript-typing
- tailwind-styling
- a11y-attributes
routing:
  input_types:
  - component_generation_request
  output_types:
  - react_component_code
delegation:
  can_delegate_to: []
  escalates_to: frontend-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

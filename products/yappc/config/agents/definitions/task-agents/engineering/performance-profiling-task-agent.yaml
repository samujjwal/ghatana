id: performance-profiling-task-agent
name: Performance Profiling Task Agent
version: 1.0.0
namespace: yappc.task-agents.engineering
status: active
owners:
- team: backend-core
  contact: backend-core@ghatana.com
description: Profile service performance, identify hot paths, memory allocations, and I/O bottlenecks
  with prioritised improvement recommendations
summary: Profile service performance, identify hot paths, memory allocations, and I/O bottlenecks with
  prioritised improvement...
metadata:
  level: 3
  domain: engineering
  type: worker
  tags:
  - performance-profiling
  - hotpath-identification
  - bottleneck-analysis
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: profiling_request
    schema: dynamic
  outputs:
  - name: performance_profile_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: backend-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- profiler
- hotpath_identifier
- io_analyser
capabilities:
- performance-profiling
- hotpath-identification
- bottleneck-analysis
routing:
  input_types:
  - profiling_request
  output_types:
  - performance_profile_report
delegation:
  can_delegate_to: []
  escalates_to: backend-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

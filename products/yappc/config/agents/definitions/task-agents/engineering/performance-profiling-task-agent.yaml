id: performance-profiling-task-agent
name: Performance Profiling Task Agent
version: 1.0.0
description: "Profile service performance, identify hot paths, memory allocations, and I/O bottlenecks with prioritised improvement recommendations"

metadata:
  level: 3
  domain: engineering
  type: worker
  tags: [performance-profiling, hotpath-identification, bottleneck-analysis, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Profile service performance, identify hot paths, memory allocations, and I/O bottlenecks with prioritised improvement recommendations

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [profiler, hotpath_identifier, io_analyser]

capabilities:
  - performance-profiling
  - hotpath-identification
  - bottleneck-analysis

routing:
  input_types: [profiling_request]
  output_types: [performance_profile_report]

delegation:
  can_delegate_to: []
  escalates_to: backend-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

id: prompt-optimisation-task-agent
name: Prompt Optimisation Task Agent
version: 1.0.0
description: "Optimise prompt templates through systematic variable reduction, few-shot example selection, and token efficiency improvements"

metadata:
  level: 3
  domain: ai
  type: worker
  tags: [prompt-optimisation, few-shot-selection, token-reduction, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Optimise prompt templates through systematic variable reduction, few-shot example selection, and token efficiency improvements

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [prompt_analyser, few_shot_selector, token_optimizer]

capabilities:
  - prompt-optimisation
  - few-shot-selection
  - token-reduction

routing:
  input_types: [prompt_optimisation_request]
  output_types: [optimised_prompt]

delegation:
  can_delegate_to: []
  escalates_to: llm-integration-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

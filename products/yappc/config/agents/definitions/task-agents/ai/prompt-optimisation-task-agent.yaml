id: prompt-optimisation-task-agent
name: Prompt Optimisation Task Agent
version: 1.0.0
namespace: yappc.task-agents.ai
status: active
owners:
- team: ai-platform
  contact: ai-platform@ghatana.com
description: Optimise prompt templates through systematic variable reduction, few-shot example selection,
  and token efficiency improvements
summary: Optimise prompt templates through systematic variable reduction, few-shot example selection,
  and token efficiency imp...
metadata:
  level: 3
  domain: ai
  type: worker
  tags:
  - prompt-optimisation
  - few-shot-selection
  - token-reduction
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: prompt_optimisation_request
    schema: dynamic
  outputs:
  - name: optimised_prompt
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: llm-integration-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- prompt_analyser
- few_shot_selector
- token_optimizer
capabilities:
- prompt-optimisation
- few-shot-selection
- token-reduction
routing:
  input_types:
  - prompt_optimisation_request
  output_types:
  - optimised_prompt
delegation:
  can_delegate_to: []
  escalates_to: llm-integration-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: model-evaluation-task-agent
name: Model Evaluation Task Agent
version: 1.0.0
description: "Evaluate LLM model outputs against quality benchmarks using automated scoring rubrics and human evaluation samples"

metadata:
  level: 3
  domain: ai
  type: worker
  tags: [model-evaluation, quality-scoring, benchmark-comparison, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Evaluate LLM model outputs against quality benchmarks using automated scoring rubrics and human evaluation samples

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [evaluation_engine, benchmark_comparator, scoring_rubric]

capabilities:
  - model-evaluation
  - quality-scoring
  - benchmark-comparison

routing:
  input_types: [model_evaluation_request]
  output_types: [model_evaluation_report]

delegation:
  can_delegate_to: []
  escalates_to: llm-integration-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 5000
  max_latency_ms: 25000
  timeout_ms: 50000

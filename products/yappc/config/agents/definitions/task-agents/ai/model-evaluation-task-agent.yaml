id: model-evaluation-task-agent
name: Model Evaluation Task Agent
version: 1.0.0
namespace: yappc.task-agents.ai
status: active
owners:
- team: ai-platform
  contact: ai-platform@ghatana.com
description: Evaluate LLM model outputs against quality benchmarks using automated scoring rubrics and
  human evaluation samples
summary: Evaluate LLM model outputs against quality benchmarks using automated scoring rubrics and human
  evaluation samples
metadata:
  level: 3
  domain: ai
  type: worker
  tags:
  - model-evaluation
  - quality-scoring
  - benchmark-comparison
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: model_evaluation_request
    schema: dynamic
  outputs:
  - name: model_evaluation_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: llm-integration-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- evaluation_engine
- benchmark_comparator
- scoring_rubric
capabilities:
- model-evaluation
- quality-scoring
- benchmark-comparison
routing:
  input_types:
  - model_evaluation_request
  output_types:
  - model_evaluation_report
delegation:
  can_delegate_to: []
  escalates_to: llm-integration-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 25000
  timeout_ms: 50000

id: procedural-memory-task-agent
name: Procedural Memory Task Agent
version: 1.0.0
namespace: yappc.task-agents.ai
status: active
owners:
- team: ai-platform
  contact: ai-platform@ghatana.com
description: Store and retrieve procedural policies with version tracking, confidence scoring, and usage
  frequency updates
summary: Store and retrieve procedural policies with version tracking, confidence scoring, and usage frequency
  updates
metadata:
  level: 3
  domain: ai
  type: worker
  tags:
  - procedural-memory-store
  - policy-retrieval
  - confidence-tracking
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: procedural_memory_request
    schema: dynamic
  outputs:
  - name: procedural_memory_result
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: memory-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- procedural_memory_store
- policy_retriever
- confidence_tracker
capabilities:
- procedural-memory-store
- policy-retrieval
- confidence-tracking
routing:
  input_types:
  - procedural_memory_request
  output_types:
  - procedural_memory_result
delegation:
  can_delegate_to: []
  escalates_to: memory-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 400
  max_latency_ms: 2000
  timeout_ms: 4000

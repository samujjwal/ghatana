id: vector-search-task-agent
name: Vector Search Task Agent
version: 1.0.0
namespace: yappc.task-agents.ai
status: active
owners:
- team: ai-platform
  contact: ai-platform@ghatana.com
description: Execute vector similarity search against embedding indexes with configurable top-K, filters,
  and score thresholds
summary: Execute vector similarity search against embedding indexes with configurable top-K, filters,
  and score thresholds
metadata:
  level: 3
  domain: ai
  type: worker
  tags:
  - vector-search
  - embedding-query
  - similarity-scoring
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: vector_search_request
    schema: dynamic
  outputs:
  - name: vector_search_results
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: search-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- vector_store_client
- embedding_generator
capabilities:
- vector-search
- embedding-query
- similarity-scoring
routing:
  input_types:
  - vector_search_request
  output_types:
  - vector_search_results
delegation:
  can_delegate_to: []
  escalates_to: search-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 500
  max_latency_ms: 2500
  timeout_ms: 5000

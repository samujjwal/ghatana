id: context-window-task-agent
name: Context Window Task Agent
version: 1.0.0
namespace: yappc.task-agents.ai
status: active
owners:
- team: ai-platform
  contact: ai-platform@ghatana.com
description: Pack agent context windows by priority-ordering memory items, tool outputs, and conversation
  history within token budget
summary: Pack agent context windows by priority-ordering memory items, tool outputs, and conversation
  history within token budget
metadata:
  level: 3
  domain: ai
  type: worker
  tags:
  - context-packing
  - token-budgeting
  - priority-ordering
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: context_pack_request
    schema: dynamic
  outputs:
  - name: packed_context
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: agent-runtime-capability-agent-ai
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- token_counter
- context_packer
- priority_ranker
capabilities:
- context-packing
- token-budgeting
- priority-ordering
routing:
  input_types:
  - context_pack_request
  output_types:
  - packed_context
delegation:
  can_delegate_to: []
  escalates_to: agent-runtime-capability-agent-ai
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 300
  max_latency_ms: 1500
  timeout_ms: 3000

id: context-window-task-agent
name: Context Window Task Agent
version: 1.0.0
description: "Pack agent context windows by priority-ordering memory items, tool outputs, and conversation history within token budget"

metadata:
  level: 3
  domain: ai
  type: worker
  tags: [context-packing, token-budgeting, priority-ordering, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Pack agent context windows by priority-ordering memory items, tool outputs, and conversation history within token budget

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [token_counter, context_packer, priority_ranker]

capabilities:
  - context-packing
  - token-budgeting
  - priority-ordering

routing:
  input_types: [context_pack_request]
  output_types: [packed_context]

delegation:
  can_delegate_to: []
  escalates_to: agent-runtime-capability-agent-ai

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 300
  max_latency_ms: 1500
  timeout_ms: 3000

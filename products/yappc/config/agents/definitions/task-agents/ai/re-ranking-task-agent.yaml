id: re-ranking-task-agent
name: Re Ranking Task Agent
version: 1.0.0
description: "Re-rank search result sets using cross-encoder models or LLM-based relevance scoring for improved precision"

metadata:
  level: 3
  domain: ai
  type: worker
  tags: [re-ranking, cross-encoder-scoring, relevance-re-ordering, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Re-rank search result sets using cross-encoder models or LLM-based relevance scoring for improved precision

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [cross_encoder_model, llm_reranker]

capabilities:
  - re-ranking
  - cross-encoder-scoring
  - relevance-re-ordering

routing:
  input_types: [reranking_request]
  output_types: [reranked_results]

delegation:
  can_delegate_to: []
  escalates_to: search-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 600
  max_latency_ms: 3000
  timeout_ms: 6000

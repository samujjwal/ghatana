id: episodic-memory-task-agent
name: Episodic Memory Task Agent
version: 1.0.0
namespace: yappc.task-agents.ai
status: active
owners:
- team: ai-platform
  contact: ai-platform@ghatana.com
description: Store and retrieve episodic memory events with temporal indexing, recency weighting, and
  relevance scoring
summary: Store and retrieve episodic memory events with temporal indexing, recency weighting, and relevance
  scoring
metadata:
  level: 3
  domain: ai
  type: worker
  tags:
  - episodic-memory-store
  - temporal-indexing
  - relevance-scoring
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: episodic_memory_request
    schema: dynamic
  outputs:
  - name: episodic_memory_result
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: memory-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- episodic_memory_store
- temporal_indexer
capabilities:
- episodic-memory-store
- temporal-indexing
- relevance-scoring
routing:
  input_types:
  - episodic_memory_request
  output_types:
  - episodic_memory_result
delegation:
  can_delegate_to: []
  escalates_to: memory-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 400
  max_latency_ms: 2000
  timeout_ms: 4000

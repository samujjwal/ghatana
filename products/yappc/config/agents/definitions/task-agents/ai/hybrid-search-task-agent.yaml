id: hybrid-search-task-agent
name: Hybrid Search Task Agent
version: 1.0.0
namespace: yappc.task-agents.ai
status: active
owners:
- team: ai-platform
  contact: ai-platform@ghatana.com
description: Execute hybrid search combining BM25 keyword and vector semantic similarity with configurable
  alpha blending
summary: Execute hybrid search combining BM25 keyword and vector semantic similarity with configurable
  alpha blending
metadata:
  level: 3
  domain: ai
  type: worker
  tags:
  - hybrid-search
  - bm25-keyword-search
  - alpha-blending
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: hybrid_search_request
    schema: dynamic
  outputs:
  - name: hybrid_search_results
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: search-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- bm25_engine
- vector_store_client
- alpha_blender
capabilities:
- hybrid-search
- bm25-keyword-search
- alpha-blending
routing:
  input_types:
  - hybrid_search_request
  output_types:
  - hybrid_search_results
delegation:
  can_delegate_to: []
  escalates_to: search-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 800
  max_latency_ms: 4000
  timeout_ms: 8000

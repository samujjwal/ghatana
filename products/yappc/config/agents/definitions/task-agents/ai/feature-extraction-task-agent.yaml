id: feature-extraction-task-agent
name: Feature Extraction Task Agent
version: 1.0.0
namespace: yappc.task-agents.ai
status: active
owners:
- team: ai-platform
  contact: ai-platform@ghatana.com
description: Extract structured features from unstructured text for training datasets and analytical pipelines
summary: Extract structured features from unstructured text for training datasets and analytical pipelines
metadata:
  level: 3
  domain: ai
  type: worker
  tags:
  - feature-extraction
  - structured-extraction
  - schema-enforcement
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: feature_extraction_request
    schema: dynamic
  outputs:
  - name: extracted_features
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: data-pipeline-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- feature_extractor
- schema_enforcer
capabilities:
- feature-extraction
- structured-extraction
- schema-enforcement
routing:
  input_types:
  - feature_extraction_request
  output_types:
  - extracted_features
delegation:
  can_delegate_to: []
  escalates_to: data-pipeline-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

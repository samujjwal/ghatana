id: portfolio-scoring-task-agent
name: Portfolio Scoring Task Agent
version: 1.0.0
namespace: yappc.task-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Score portfolio health across strategic alignment, investment balance, execution velocity,
  and risk exposure dimensions
summary: Score portfolio health across strategic alignment, investment balance, execution velocity, and
  risk exposure dimensions
metadata:
  level: 3
  domain: portfolio
  type: worker
  tags:
  - portfolio-health-scoring
  - dimension-weighting
  - trend-analysis
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: portfolio_score_request
    schema: dynamic
  outputs:
  - name: portfolio_health_score
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: portfolio-analysis-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- portfolio_data_reader
- scoring_engine
- benchmark_comparator
capabilities:
- portfolio-health-scoring
- dimension-weighting
- trend-analysis
routing:
  input_types:
  - portfolio_score_request
  output_types:
  - portfolio_health_score
delegation:
  can_delegate_to: []
  escalates_to: portfolio-analysis-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

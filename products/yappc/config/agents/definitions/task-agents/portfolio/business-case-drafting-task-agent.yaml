id: business-case-drafting-task-agent
name: Business Case Drafting Task Agent
version: 1.0.0
description: "Draft structured business cases with problem statement, market opportunity, proposed solution, financial model, and risk sections"

metadata:
  level: 3
  domain: portfolio
  type: worker
  tags: [business-case-drafting, financial-modelling, risk-articulation, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Draft structured business cases with problem statement, market opportunity, proposed solution, financial model, and risk sections

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [template_engine, financial_calculator, doc_writer]

capabilities:
  - business-case-drafting
  - financial-modelling
  - risk-articulation

routing:
  input_types: [business_case_request]
  output_types: [business_case_draft]

delegation:
  can_delegate_to: []
  escalates_to: business-case-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 5000
  max_latency_ms: 25000
  timeout_ms: 50000

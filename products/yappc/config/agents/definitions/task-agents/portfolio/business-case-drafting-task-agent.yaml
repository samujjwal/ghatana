id: business-case-drafting-task-agent
name: Business Case Drafting Task Agent
version: 1.0.0
namespace: yappc.task-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Draft structured business cases with problem statement, market opportunity, proposed solution,
  financial model, and risk sections
summary: Draft structured business cases with problem statement, market opportunity, proposed solution,
  financial model, and r...
metadata:
  level: 3
  domain: portfolio
  type: worker
  tags:
  - business-case-drafting
  - financial-modelling
  - risk-articulation
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: business_case_request
    schema: dynamic
  outputs:
  - name: business_case_draft
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: business-case-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- template_engine
- financial_calculator
- doc_writer
capabilities:
- business-case-drafting
- financial-modelling
- risk-articulation
routing:
  input_types:
  - business_case_request
  output_types:
  - business_case_draft
delegation:
  can_delegate_to: []
  escalates_to: business-case-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 25000
  timeout_ms: 50000

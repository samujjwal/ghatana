id: strategy-option-comparison-task-agent
name: Strategy Option Comparison Task Agent
version: 1.0.0
namespace: yappc.task-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Compare strategic options using weighted scoring matrix across feasibility, impact, time-to-value,
  and risk dimensions
summary: Compare strategic options using weighted scoring matrix across feasibility, impact, time-to-value,
  and risk dimensions
metadata:
  level: 3
  domain: portfolio
  type: worker
  tags:
  - option-comparison
  - weighted-scoring
  - scenario-analysis
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: strategy_comparison_request
    schema: dynamic
  outputs:
  - name: strategy_comparison_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: strategic-planning-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- scoring_matrix
- scenario_comparator
capabilities:
- option-comparison
- weighted-scoring
- scenario-analysis
routing:
  input_types:
  - strategy_comparison_request
  output_types:
  - strategy_comparison_report
delegation:
  can_delegate_to: []
  escalates_to: strategic-planning-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

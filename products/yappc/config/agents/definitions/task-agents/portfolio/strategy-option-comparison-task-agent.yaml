id: strategy-option-comparison-task-agent
name: Strategy Option Comparison Task Agent
version: 1.0.0
description: "Compare strategic options using weighted scoring matrix across feasibility, impact, time-to-value, and risk dimensions"

metadata:
  level: 3
  domain: portfolio
  type: worker
  tags: [option-comparison, weighted-scoring, scenario-analysis, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Compare strategic options using weighted scoring matrix across feasibility, impact, time-to-value, and risk dimensions

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [scoring_matrix, scenario_comparator]

capabilities:
  - option-comparison
  - weighted-scoring
  - scenario-analysis

routing:
  input_types: [strategy_comparison_request]
  output_types: [strategy_comparison_report]

delegation:
  can_delegate_to: []
  escalates_to: strategic-planning-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: kpi-selection-task-agent
name: Kpi Selection Task Agent
version: 1.0.0
namespace: yappc.task-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Select the right KPIs for a given objective by evaluating leading/lagging indicator balance,
  data availability, and strategic relevance
summary: Select the right KPIs for a given objective by evaluating leading/lagging indicator balance,
  data availability, and s...
metadata:
  level: 3
  domain: portfolio
  type: worker
  tags:
  - kpi-selection
  - metric-evaluation
  - data-availability-check
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: kpi_selection_request
    schema: dynamic
  outputs:
  - name: kpi_recommendations
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: goal-management-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- kpi_library
- data_availability_checker
capabilities:
- kpi-selection
- metric-evaluation
- data-availability-check
routing:
  input_types:
  - kpi_selection_request
  output_types:
  - kpi_recommendations
delegation:
  can_delegate_to: []
  escalates_to: goal-management-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

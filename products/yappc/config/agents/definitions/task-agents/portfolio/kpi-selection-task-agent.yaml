id: kpi-selection-task-agent
name: Kpi Selection Task Agent
version: 1.0.0
description: "Select the right KPIs for a given objective by evaluating leading/lagging indicator balance, data availability, and strategic relevance"

metadata:
  level: 3
  domain: portfolio
  type: worker
  tags: [kpi-selection, metric-evaluation, data-availability-check, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Select the right KPIs for a given objective by evaluating leading/lagging indicator balance, data availability, and strategic relevance

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [kpi_library, data_availability_checker]

capabilities:
  - kpi-selection
  - metric-evaluation
  - data-availability-check

routing:
  input_types: [kpi_selection_request]
  output_types: [kpi_recommendations]

delegation:
  can_delegate_to: []
  escalates_to: goal-management-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

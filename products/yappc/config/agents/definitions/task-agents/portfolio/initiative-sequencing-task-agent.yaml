id: initiative-sequencing-task-agent
name: Initiative Sequencing Task Agent
version: 1.0.0
description: "Sequence initiatives by dependency graph, resource constraints, and strategic priority to produce an optimal roadmap timeline"

metadata:
  level: 3
  domain: portfolio
  type: worker
  tags: [dependency-resolution, capacity-aware-sequencing, timeline-generation, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Sequence initiatives by dependency graph, resource constraints, and strategic priority to produce an optimal roadmap timeline

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [dependency_graph_builder, capacity_model, timeline_generator]

capabilities:
  - dependency-resolution
  - capacity-aware-sequencing
  - timeline-generation

routing:
  input_types: [sequencing_request]
  output_types: [initiative_timeline]

delegation:
  can_delegate_to: []
  escalates_to: initiative-prioritization-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: initiative-sequencing-task-agent
name: Initiative Sequencing Task Agent
version: 1.0.0
namespace: yappc.task-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Sequence initiatives by dependency graph, resource constraints, and strategic priority to
  produce an optimal roadmap timeline
summary: Sequence initiatives by dependency graph, resource constraints, and strategic priority to produce
  an optimal roadmap...
metadata:
  level: 3
  domain: portfolio
  type: worker
  tags:
  - dependency-resolution
  - capacity-aware-sequencing
  - timeline-generation
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: sequencing_request
    schema: dynamic
  outputs:
  - name: initiative_timeline
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: initiative-prioritization-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- dependency_graph_builder
- capacity_model
- timeline_generator
capabilities:
- dependency-resolution
- capacity-aware-sequencing
- timeline-generation
routing:
  input_types:
  - sequencing_request
  output_types:
  - initiative_timeline
delegation:
  can_delegate_to: []
  escalates_to: initiative-prioritization-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

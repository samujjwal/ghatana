id: executive-status-synthesis-task-agent
name: Executive Status Synthesis Task Agent
version: 1.0.0
namespace: yappc.task-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Synthesise cross-initiative status into concise executive briefings with RAG indicators,
  blockers, and decisions needed
summary: Synthesise cross-initiative status into concise executive briefings with RAG indicators, blockers,
  and decisions needed
metadata:
  level: 3
  domain: portfolio
  type: worker
  tags:
  - status-aggregation
  - rag-scoring
  - executive-narrative
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: status_synthesis_request
    schema: dynamic
  outputs:
  - name: executive_status_brief
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: portfolio-analysis-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- status_aggregator
- rag_classifier
- doc_writer
capabilities:
- status-aggregation
- rag-scoring
- executive-narrative
routing:
  input_types:
  - status_synthesis_request
  output_types:
  - executive_status_brief
delegation:
  can_delegate_to: []
  escalates_to: portfolio-analysis-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

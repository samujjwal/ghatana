id: strategic-dependency-review-task-agent
name: Strategic Dependency Review Task Agent
version: 1.0.0
namespace: yappc.task-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Map cross-initiative dependencies, identify critical path items, and flag circular or high-risk
  dependency chains
summary: Map cross-initiative dependencies, identify critical path items, and flag circular or high-risk
  dependency chains
metadata:
  level: 3
  domain: portfolio
  type: worker
  tags:
  - dependency-mapping
  - critical-path-analysis
  - risk-flagging
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: dependency_review_request
    schema: dynamic
  outputs:
  - name: dependency_map
    schema: dynamic
  - name: risk_flags
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: initiative-prioritization-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- dependency_mapper
- critical_path_calculator
capabilities:
- dependency-mapping
- critical-path-analysis
- risk-flagging
routing:
  input_types:
  - dependency_review_request
  output_types:
  - dependency_map
  - risk_flags
delegation:
  can_delegate_to: []
  escalates_to: initiative-prioritization-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

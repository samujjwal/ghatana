id: strategic-dependency-review-task-agent
name: Strategic Dependency Review Task Agent
version: 1.0.0
description: "Map cross-initiative dependencies, identify critical path items, and flag circular or high-risk dependency chains"

metadata:
  level: 3
  domain: portfolio
  type: worker
  tags: [dependency-mapping, critical-path-analysis, risk-flagging, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Map cross-initiative dependencies, identify critical path items, and flag circular or high-risk dependency chains

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [dependency_mapper, critical_path_calculator]

capabilities:
  - dependency-mapping
  - critical-path-analysis
  - risk-flagging

routing:
  input_types: [dependency_review_request]
  output_types: [dependency_map, risk_flags]

delegation:
  can_delegate_to: []
  escalates_to: initiative-prioritization-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: okr-definition-task-agent
name: Okr Definition Task Agent
version: 1.0.0
description: "Draft well-formed OKRs with measurable key results, baseline values, targets, and owner assignments"

metadata:
  level: 3
  domain: portfolio
  type: worker
  tags: [okr-drafting, metric-definition, alignment-checking, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Draft well-formed OKRs with measurable key results, baseline values, targets, and owner assignments

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [okr_template_engine, metric_validator]

capabilities:
  - okr-drafting
  - metric-definition
  - alignment-checking

routing:
  input_types: [okr_request]
  output_types: [okr_set]

delegation:
  can_delegate_to: []
  escalates_to: goal-management-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

id: okr-definition-task-agent
name: Okr Definition Task Agent
version: 1.0.0
namespace: yappc.task-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Draft well-formed OKRs with measurable key results, baseline values, targets, and owner assignments
summary: Draft well-formed OKRs with measurable key results, baseline values, targets, and owner assignments
metadata:
  level: 3
  domain: portfolio
  type: worker
  tags:
  - okr-drafting
  - metric-definition
  - alignment-checking
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: okr_request
    schema: dynamic
  outputs:
  - name: okr_set
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: goal-management-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- okr_template_engine
- metric_validator
capabilities:
- okr-drafting
- metric-definition
- alignment-checking
routing:
  input_types:
  - okr_request
  output_types:
  - okr_set
delegation:
  can_delegate_to: []
  escalates_to: goal-management-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

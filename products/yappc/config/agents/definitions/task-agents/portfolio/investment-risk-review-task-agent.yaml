id: investment-risk-review-task-agent
name: Investment Risk Review Task Agent
version: 1.0.0
namespace: yappc.task-agents.portfolio
status: active
owners:
- team: product-leadership
  contact: product-leadership@ghatana.com
description: Assess investment risk by analysing market assumptions, technical feasibility uncertainty,
  competitive threats, and execution risk
summary: Assess investment risk by analysing market assumptions, technical feasibility uncertainty, competitive
  threats, and e...
metadata:
  level: 3
  domain: portfolio
  type: worker
  tags:
  - risk-identification
  - risk-scoring
  - mitigation-mapping
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: risk_review_request
    schema: dynamic
  outputs:
  - name: investment_risk_assessment
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: business-case-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- risk_scorer
- assumption_analyser
capabilities:
- risk-identification
- risk-scoring
- mitigation-mapping
routing:
  input_types:
  - risk_review_request
  output_types:
  - investment_risk_assessment
delegation:
  can_delegate_to: []
  escalates_to: business-case-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

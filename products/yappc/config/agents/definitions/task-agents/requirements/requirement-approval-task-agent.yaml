id: requirement-approval-task-agent
name: Requirement Approval Task Agent
version: 1.0.0
description: "Route requirements through defined approval workflows, track signoff status, and generate approval records"

metadata:
  level: 3
  domain: requirements
  type: worker
  tags: [approval-routing, signoff-tracking, approval-record-generation, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Route requirements through defined approval workflows, track signoff status, and generate approval records

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [approval_workflow_engine, signoff_tracker]

capabilities:
  - approval-routing
  - signoff-tracking
  - approval-record-generation

routing:
  input_types: [approval_request]
  output_types: [approval_record]

delegation:
  can_delegate_to: []
  escalates_to: requirement-governance-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

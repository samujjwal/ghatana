id: requirement-deduplication-task-agent
name: Requirement Deduplication Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Identify and merge duplicate or near-duplicate requirements using semantic similarity and
  structural matching
summary: Identify and merge duplicate or near-duplicate requirements using semantic similarity and structural
  matching
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - deduplication
  - semantic-matching
  - merge-resolution
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: dedup_request
    schema: dynamic
  outputs:
  - name: deduplicated_requirements
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-quality-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- semantic_matcher
- deduplicator
capabilities:
- deduplication
- semantic-matching
- merge-resolution
routing:
  input_types:
  - dedup_request
  output_types:
  - deduplicated_requirements
delegation:
  can_delegate_to: []
  escalates_to: requirement-quality-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

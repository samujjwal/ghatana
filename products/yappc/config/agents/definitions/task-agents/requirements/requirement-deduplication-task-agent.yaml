id: requirement-deduplication-task-agent
name: Requirement Deduplication Task Agent
version: 1.0.0
description: "Identify and merge duplicate or near-duplicate requirements using semantic similarity and structural matching"

metadata:
  level: 3
  domain: requirements
  type: worker
  tags: [deduplication, semantic-matching, merge-resolution, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Identify and merge duplicate or near-duplicate requirements using semantic similarity and structural matching

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [semantic_matcher, deduplicator]

capabilities:
  - deduplication
  - semantic-matching
  - merge-resolution

routing:
  input_types: [dedup_request]
  output_types: [deduplicated_requirements]

delegation:
  can_delegate_to: []
  escalates_to: requirement-quality-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

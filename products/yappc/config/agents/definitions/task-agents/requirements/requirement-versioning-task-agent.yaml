id: requirement-versioning-task-agent
name: Requirement Versioning Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Version control requirement changes with diff generation, change justification, and baseline
  snapshot management
summary: Version control requirement changes with diff generation, change justification, and baseline
  snapshot management
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - version-control
  - diff-generation
  - baseline-management
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: versioning_request
    schema: dynamic
  outputs:
  - name: versioned_requirement
    schema: dynamic
  - name: change_record
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-governance-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- version_manager
- diff_generator
capabilities:
- version-control
- diff-generation
- baseline-management
routing:
  input_types:
  - versioning_request
  output_types:
  - versioned_requirement
  - change_record
delegation:
  can_delegate_to: []
  escalates_to: requirement-governance-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

id: requirement-versioning-task-agent
name: Requirement Versioning Task Agent
version: 1.0.0
description: "Version control requirement changes with diff generation, change justification, and baseline snapshot management"

metadata:
  level: 3
  domain: requirements
  type: worker
  tags: [version-control, diff-generation, baseline-management, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Version control requirement changes with diff generation, change justification, and baseline snapshot management

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [version_manager, diff_generator]

capabilities:
  - version-control
  - diff-generation
  - baseline-management

routing:
  input_types: [versioning_request]
  output_types: [versioned_requirement, change_record]

delegation:
  can_delegate_to: []
  escalates_to: requirement-governance-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

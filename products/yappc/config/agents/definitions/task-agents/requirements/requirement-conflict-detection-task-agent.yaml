id: requirement-conflict-detection-task-agent
name: Requirement Conflict Detection Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Detect conflicts between requirements including mutually exclusive constraints, contradictory
  NFRs, and scope overlaps
summary: Detect conflicts between requirements including mutually exclusive constraints, contradictory
  NFRs, and scope overlaps
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - conflict-detection
  - constraint-analysis
  - overlap-identification
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: conflict_detection_request
    schema: dynamic
  outputs:
  - name: conflict_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-analysis-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- conflict_detector
- constraint_analyser
capabilities:
- conflict-detection
- constraint-analysis
- overlap-identification
routing:
  input_types:
  - conflict_detection_request
  output_types:
  - conflict_report
delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

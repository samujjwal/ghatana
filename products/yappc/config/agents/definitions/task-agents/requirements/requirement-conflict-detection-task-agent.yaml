id: requirement-conflict-detection-task-agent
name: Requirement Conflict Detection Task Agent
version: 1.0.0
description: "Detect conflicts between requirements including mutually exclusive constraints, contradictory NFRs, and scope overlaps"

metadata:
  level: 3
  domain: requirements
  type: worker
  tags: [conflict-detection, constraint-analysis, overlap-identification, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Detect conflicts between requirements including mutually exclusive constraints, contradictory NFRs, and scope overlaps

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [conflict_detector, constraint_analyser]

capabilities:
  - conflict-detection
  - constraint-analysis
  - overlap-identification

routing:
  input_types: [conflict_detection_request]
  output_types: [conflict_report]

delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

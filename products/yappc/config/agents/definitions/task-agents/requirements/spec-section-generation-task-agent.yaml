id: spec-section-generation-task-agent
name: Spec Section Generation Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Generate individual sections of a functional requirements specification from structured requirement
  inputs
summary: Generate individual sections of a functional requirements specification from structured requirement
  inputs
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - spec-section-writing
  - template-application
  - cross-reference-insertion
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: spec_section_request
    schema: dynamic
  outputs:
  - name: spec_section
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: spec-authoring-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- spec_template_engine
- section_writer
capabilities:
- spec-section-writing
- template-application
- cross-reference-insertion
routing:
  input_types:
  - spec_section_request
  output_types:
  - spec_section
delegation:
  can_delegate_to: []
  escalates_to: spec-authoring-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

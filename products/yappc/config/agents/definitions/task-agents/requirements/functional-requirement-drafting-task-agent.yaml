id: functional-requirement-drafting-task-agent
name: Functional Requirement Drafting Task Agent
version: 1.0.0
description: "Draft well-formed functional requirements in standard format with preconditions, main flow, alternate flows, and postconditions"

metadata:
  level: 3
  domain: requirements
  type: worker
  tags: [functional-requirement-drafting, flow-specification, template-application, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Draft well-formed functional requirements in standard format with preconditions, main flow, alternate flows, and postconditions

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [fr_template_engine, requirement_drafter]

capabilities:
  - functional-requirement-drafting
  - flow-specification
  - template-application

routing:
  input_types: [fr_draft_request]
  output_types: [functional_requirements]

delegation:
  can_delegate_to: []
  escalates_to: spec-authoring-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

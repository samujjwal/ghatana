id: functional-requirement-drafting-task-agent
name: Functional Requirement Drafting Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Draft well-formed functional requirements in standard format with preconditions, main flow,
  alternate flows, and postconditions
summary: Draft well-formed functional requirements in standard format with preconditions, main flow, alternate
  flows, and post...
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - functional-requirement-drafting
  - flow-specification
  - template-application
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: fr_draft_request
    schema: dynamic
  outputs:
  - name: functional_requirements
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: spec-authoring-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- fr_template_engine
- requirement_drafter
capabilities:
- functional-requirement-drafting
- flow-specification
- template-application
routing:
  input_types:
  - fr_draft_request
  output_types:
  - functional_requirements
delegation:
  can_delegate_to: []
  escalates_to: spec-authoring-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

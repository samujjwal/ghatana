id: requirement-normalisation-task-agent
name: Requirement Normalisation Task Agent
version: 1.0.0
description: "Normalise requirement language to consistent tense, voice, and SHALL/SHOULD/MAY modal verb convention"

metadata:
  level: 3
  domain: requirements
  type: worker
  tags: [language-normalisation, modal-verb-standardisation, consistency-enforcement, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Normalise requirement language to consistent tense, voice, and SHALL/SHOULD/MAY modal verb convention

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [normaliser, modal_verb_enforcer]

capabilities:
  - language-normalisation
  - modal-verb-standardisation
  - consistency-enforcement

routing:
  input_types: [normalisation_request]
  output_types: [normalised_requirements]

delegation:
  can_delegate_to: []
  escalates_to: requirement-quality-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

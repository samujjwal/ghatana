id: requirement-normalisation-task-agent
name: Requirement Normalisation Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Normalise requirement language to consistent tense, voice, and SHALL/SHOULD/MAY modal verb
  convention
summary: Normalise requirement language to consistent tense, voice, and SHALL/SHOULD/MAY modal verb convention
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - language-normalisation
  - modal-verb-standardisation
  - consistency-enforcement
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: normalisation_request
    schema: dynamic
  outputs:
  - name: normalised_requirements
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-quality-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- normaliser
- modal_verb_enforcer
capabilities:
- language-normalisation
- modal-verb-standardisation
- consistency-enforcement
routing:
  input_types:
  - normalisation_request
  output_types:
  - normalised_requirements
delegation:
  can_delegate_to: []
  escalates_to: requirement-quality-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

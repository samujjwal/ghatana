id: requirement-priority-task-agent
name: Requirement Priority Task Agent
version: 1.0.0
description: "Assign MoSCoW priority to requirements based on business value, stakeholder input, technical dependency, and risk"

metadata:
  level: 3
  domain: requirements
  type: worker
  tags: [priority-assignment, moscow-scoring, stakeholder-weighting, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Assign MoSCoW priority to requirements based on business value, stakeholder input, technical dependency, and risk

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [priority_engine, stakeholder_weight_reader]

capabilities:
  - priority-assignment
  - moscow-scoring
  - stakeholder-weighting

routing:
  input_types: [priority_request]
  output_types: [prioritised_requirements]

delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

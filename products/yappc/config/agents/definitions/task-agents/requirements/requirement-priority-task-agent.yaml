id: requirement-priority-task-agent
name: Requirement Priority Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Assign MoSCoW priority to requirements based on business value, stakeholder input, technical
  dependency, and risk
summary: Assign MoSCoW priority to requirements based on business value, stakeholder input, technical
  dependency, and risk
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - priority-assignment
  - moscow-scoring
  - stakeholder-weighting
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: priority_request
    schema: dynamic
  outputs:
  - name: prioritised_requirements
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-analysis-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- priority_engine
- stakeholder_weight_reader
capabilities:
- priority-assignment
- moscow-scoring
- stakeholder-weighting
routing:
  input_types:
  - priority_request
  output_types:
  - prioritised_requirements
delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

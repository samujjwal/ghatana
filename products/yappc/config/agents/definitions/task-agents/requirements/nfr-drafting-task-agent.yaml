id: nfr-drafting-task-agent
name: Nfr Drafting Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Draft measurable NFRs with specific numeric targets (e.g., P99 latency < 200ms) across all
  quality attribute categories
summary: Draft measurable NFRs with specific numeric targets (e
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - nfr-drafting
  - metric-specification
  - target-definition
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: nfr_draft_request
    schema: dynamic
  outputs:
  - name: non_functional_requirements
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: spec-authoring-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- nfr_template_engine
- metric_definer
capabilities:
- nfr-drafting
- metric-specification
- target-definition
routing:
  input_types:
  - nfr_draft_request
  output_types:
  - non_functional_requirements
delegation:
  can_delegate_to: []
  escalates_to: spec-authoring-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

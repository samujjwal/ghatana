id: nfr-drafting-task-agent
name: Nfr Drafting Task Agent
version: 1.0.0
description: "Draft measurable NFRs with specific numeric targets (e.g., P99 latency < 200ms) across all quality attribute categories"

metadata:
  level: 3
  domain: requirements
  type: worker
  tags: [nfr-drafting, metric-specification, target-definition, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Draft measurable NFRs with specific numeric targets (e.g., P99 latency < 200ms) across all quality attribute categories

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [nfr_template_engine, metric_definer]

capabilities:
  - nfr-drafting
  - metric-specification
  - target-definition

routing:
  input_types: [nfr_draft_request]
  output_types: [non_functional_requirements]

delegation:
  can_delegate_to: []
  escalates_to: spec-authoring-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

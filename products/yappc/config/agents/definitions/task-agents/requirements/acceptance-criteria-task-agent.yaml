id: acceptance-criteria-task-agent
name: Acceptance Criteria Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Generate Given/When/Then acceptance criteria for each requirement ensuring testability, clarity,
  and completeness
summary: Generate Given/When/Then acceptance criteria for each requirement ensuring testability, clarity,
  and completeness
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - ac-generation
  - gwt-formatting
  - testability-validation
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: ac_request
    schema: dynamic
  outputs:
  - name: acceptance_criteria
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: spec-authoring-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- gwt_generator
- testability_checker
capabilities:
- ac-generation
- gwt-formatting
- testability-validation
routing:
  input_types:
  - ac_request
  output_types:
  - acceptance_criteria
delegation:
  can_delegate_to: []
  escalates_to: spec-authoring-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

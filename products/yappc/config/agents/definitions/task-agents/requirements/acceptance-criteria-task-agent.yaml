id: acceptance-criteria-task-agent
name: Acceptance Criteria Task Agent
version: 1.0.0
description: "Generate Given/When/Then acceptance criteria for each requirement ensuring testability, clarity, and completeness"

metadata:
  level: 3
  domain: requirements
  type: worker
  tags: [ac-generation, gwt-formatting, testability-validation, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Generate Given/When/Then acceptance criteria for each requirement ensuring testability, clarity, and completeness

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [gwt_generator, testability_checker]

capabilities:
  - ac-generation
  - gwt-formatting
  - testability-validation

routing:
  input_types: [ac_request]
  output_types: [acceptance_criteria]

delegation:
  can_delegate_to: []
  escalates_to: spec-authoring-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

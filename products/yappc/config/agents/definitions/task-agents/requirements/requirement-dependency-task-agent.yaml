id: requirement-dependency-task-agent
name: Requirement Dependency Task Agent
version: 1.0.0
description: "Map dependencies between requirements to produce a prerequisite graph for implementation sequencing"

metadata:
  level: 3
  domain: requirements
  type: worker
  tags: [dependency-mapping, prerequisite-graph, sequencing-recommendation, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Map dependencies between requirements to produce a prerequisite graph for implementation sequencing

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [dependency_mapper, graph_builder]

capabilities:
  - dependency-mapping
  - prerequisite-graph
  - sequencing-recommendation

routing:
  input_types: [dependency_request]
  output_types: [requirement_dependency_graph]

delegation:
  can_delegate_to: []
  escalates_to: traceability-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

id: requirement-dependency-task-agent
name: Requirement Dependency Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Map dependencies between requirements to produce a prerequisite graph for implementation
  sequencing
summary: Map dependencies between requirements to produce a prerequisite graph for implementation sequencing
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - dependency-mapping
  - prerequisite-graph
  - sequencing-recommendation
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: dependency_request
    schema: dynamic
  outputs:
  - name: requirement_dependency_graph
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: traceability-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- dependency_mapper
- graph_builder
capabilities:
- dependency-mapping
- prerequisite-graph
- sequencing-recommendation
routing:
  input_types:
  - dependency_request
  output_types:
  - requirement_dependency_graph
delegation:
  can_delegate_to: []
  escalates_to: traceability-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

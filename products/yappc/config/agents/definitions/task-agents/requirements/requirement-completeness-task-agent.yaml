id: requirement-completeness-task-agent
name: Requirement Completeness Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Check requirement completeness against domain coverage checklist, identify gaps, and suggest
  missing requirements
summary: Check requirement completeness against domain coverage checklist, identify gaps, and suggest
  missing requirements
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - completeness-checking
  - gap-identification
  - suggestion-generation
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: completeness_request
    schema: dynamic
  outputs:
  - name: completeness_report
    schema: dynamic
  - name: gap_suggestions
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-quality-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- completeness_checker
- gap_suggester
capabilities:
- completeness-checking
- gap-identification
- suggestion-generation
routing:
  input_types:
  - completeness_request
  output_types:
  - completeness_report
  - gap_suggestions
delegation:
  can_delegate_to: []
  escalates_to: requirement-quality-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

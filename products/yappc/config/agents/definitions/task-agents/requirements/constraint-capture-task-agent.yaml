id: constraint-capture-task-agent
name: Constraint Capture Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Identify and document technical, business, regulatory, and resource constraints that bound
  the solution space
summary: Identify and document technical, business, regulatory, and resource constraints that bound the
  solution space
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - constraint-identification
  - constraint-documentation
  - boundary-definition
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: constraint_capture_request
    schema: dynamic
  outputs:
  - name: constraints_document
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-analysis-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- constraint_extractor
- constraint_recorder
capabilities:
- constraint-identification
- constraint-documentation
- boundary-definition
routing:
  input_types:
  - constraint_capture_request
  output_types:
  - constraints_document
delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

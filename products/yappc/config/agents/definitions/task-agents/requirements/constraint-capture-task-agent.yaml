id: constraint-capture-task-agent
name: Constraint Capture Task Agent
version: 1.0.0
description: "Identify and document technical, business, regulatory, and resource constraints that bound the solution space"

metadata:
  level: 3
  domain: requirements
  type: worker
  tags: [constraint-identification, constraint-documentation, boundary-definition, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Identify and document technical, business, regulatory, and resource constraints that bound the solution space

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [constraint_extractor, constraint_recorder]

capabilities:
  - constraint-identification
  - constraint-documentation
  - boundary-definition

routing:
  input_types: [constraint_capture_request]
  output_types: [constraints_document]

delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

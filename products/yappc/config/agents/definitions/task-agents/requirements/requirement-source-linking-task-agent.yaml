id: requirement-source-linking-task-agent
name: Requirement Source Linking Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Link each requirement to its originating source (user story, regulation, interview, business
  objective) for traceability
summary: Link each requirement to its originating source (user story, regulation, interview, business
  objective) for traceability
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - source-linking
  - traceability-establishment
  - evidence-attachment
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: source_linking_request
    schema: dynamic
  outputs:
  - name: source_linked_requirements
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: traceability-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- source_linker
- evidence_store
capabilities:
- source-linking
- traceability-establishment
- evidence-attachment
routing:
  input_types:
  - source_linking_request
  output_types:
  - source_linked_requirements
delegation:
  can_delegate_to: []
  escalates_to: traceability-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

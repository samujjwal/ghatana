id: requirement-type-classification-task-agent
name: Requirement Type Classification Task Agent
version: 1.0.0
description: "Classify requirements as functional, non-functional (performance/security/reliability/usability/maintainability), or constraint"

metadata:
  level: 3
  domain: requirements
  type: worker
  tags: [type-classification, nfr-categorisation, constraint-identification, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Classify requirements as functional, non-functional (performance/security/reliability/usability/maintainability), or constraint

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [requirement_classifier, nfr_tagger]

capabilities:
  - type-classification
  - nfr-categorisation
  - constraint-identification

routing:
  input_types: [classification_request]
  output_types: [classified_requirements]

delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 1000
  max_latency_ms: 5000
  timeout_ms: 10000

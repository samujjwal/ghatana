id: requirement-type-classification-task-agent
name: Requirement Type Classification Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Classify requirements as functional, non-functional (performance/security/reliability/usability/maintainability),
  or constraint
summary: Classify requirements as functional, non-functional (performance/security/reliability/usability/maintainability),
  or...
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - type-classification
  - nfr-categorisation
  - constraint-identification
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: classification_request
    schema: dynamic
  outputs:
  - name: classified_requirements
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-analysis-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- requirement_classifier
- nfr_tagger
capabilities:
- type-classification
- nfr-categorisation
- constraint-identification
routing:
  input_types:
  - classification_request
  output_types:
  - classified_requirements
delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 1000
  max_latency_ms: 5000
  timeout_ms: 10000

id: requirement-capture-task-agent
name: Requirement Capture Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Capture raw requirements from multiple sources (stakeholder interviews, documents, existing
  systems) and produce structured requirement records
summary: Capture raw requirements from multiple sources (stakeholder interviews, documents, existing systems)
  and produce stru...
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - requirement-capture
  - source-parsing
  - structured-extraction
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: capture_request
    schema: dynamic
  outputs:
  - name: raw_requirements
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-analysis-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- document_parser
- interview_analyser
- requirement_recorder
capabilities:
- requirement-capture
- source-parsing
- structured-extraction
routing:
  input_types:
  - capture_request
  output_types:
  - raw_requirements
delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

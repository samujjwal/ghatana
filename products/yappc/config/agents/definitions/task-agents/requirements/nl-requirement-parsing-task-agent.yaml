id: nl-requirement-parsing-task-agent
name: Nl Requirement Parsing Task Agent
version: 1.0.0
description: "Parse natural language requirement statements into structured components: actor, action, object, condition, and quality attribute"

metadata:
  level: 3
  domain: requirements
  type: worker
  tags: [nl-parsing, requirement-structuring, component-extraction, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Parse natural language requirement statements into structured components: actor, action, object, condition, and quality attribute

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [nlp_parser, requirement_structurer]

capabilities:
  - nl-parsing
  - requirement-structuring
  - component-extraction

routing:
  input_types: [nl_parse_request]
  output_types: [structured_requirement]

delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

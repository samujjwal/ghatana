id: nl-requirement-parsing-task-agent
name: Nl Requirement Parsing Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: 'Parse natural language requirement statements into structured components: actor, action,
  object, condition, and quality attribute'
summary: 'Parse natural language requirement statements into structured components: actor, action, object,
  condition, and quali...'
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - nl-parsing
  - requirement-structuring
  - component-extraction
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: nl_parse_request
    schema: dynamic
  outputs:
  - name: structured_requirement
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-analysis-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- nlp_parser
- requirement_structurer
capabilities:
- nl-parsing
- requirement-structuring
- component-extraction
routing:
  input_types:
  - nl_parse_request
  output_types:
  - structured_requirement
delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

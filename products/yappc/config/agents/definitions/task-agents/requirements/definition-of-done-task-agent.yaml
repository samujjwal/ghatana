id: definition-of-done-task-agent
name: Definition Of Done Task Agent
version: 1.0.0
description: "Define the Definition of Done checklist for a feature or epic covering code, test, documentation, and deployment criteria"

metadata:
  level: 3
  domain: requirements
  type: worker
  tags: [dod-definition, checklist-generation, quality-gate-specification, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Define the Definition of Done checklist for a feature or epic covering code, test, documentation, and deployment criteria

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [dod_template_engine, checklist_generator]

capabilities:
  - dod-definition
  - checklist-generation
  - quality-gate-specification

routing:
  input_types: [dod_request]
  output_types: [definition_of_done]

delegation:
  can_delegate_to: []
  escalates_to: spec-authoring-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 1000
  max_latency_ms: 5000
  timeout_ms: 10000

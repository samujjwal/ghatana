id: definition-of-done-task-agent
name: Definition Of Done Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Define the Definition of Done checklist for a feature or epic covering code, test, documentation,
  and deployment criteria
summary: Define the Definition of Done checklist for a feature or epic covering code, test, documentation,
  and deployment crit...
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - dod-definition
  - checklist-generation
  - quality-gate-specification
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: dod_request
    schema: dynamic
  outputs:
  - name: definition_of_done
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: spec-authoring-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- dod_template_engine
- checklist_generator
capabilities:
- dod-definition
- checklist-generation
- quality-gate-specification
routing:
  input_types:
  - dod_request
  output_types:
  - definition_of_done
delegation:
  can_delegate_to: []
  escalates_to: spec-authoring-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 1000
  max_latency_ms: 5000
  timeout_ms: 10000

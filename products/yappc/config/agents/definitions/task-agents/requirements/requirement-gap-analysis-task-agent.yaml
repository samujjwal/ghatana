id: requirement-gap-analysis-task-agent
name: Requirement Gap Analysis Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Identify requirement gaps against functional scope, user journey coverage, edge cases, and
  NFR domains
summary: Identify requirement gaps against functional scope, user journey coverage, edge cases, and NFR
  domains
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - gap-analysis
  - coverage-assessment
  - gap-recommendation
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: gap_analysis_request
    schema: dynamic
  outputs:
  - name: gap_analysis_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-analysis-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- gap_analyser
- coverage_checker
capabilities:
- gap-analysis
- coverage-assessment
- gap-recommendation
routing:
  input_types:
  - gap_analysis_request
  output_types:
  - gap_analysis_report
delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: persona-aligned-requirement-task-agent
name: Persona Aligned Requirement Task Agent
version: 1.0.0
description: "Validate that requirements adequately address needs of all defined user personas and surface persona-specific gaps"

metadata:
  level: 3
  domain: requirements
  type: worker
  tags: [persona-alignment, coverage-validation, gap-surfacing, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Validate that requirements adequately address needs of all defined user personas and surface persona-specific gaps

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [persona_reader, alignment_checker]

capabilities:
  - persona-alignment
  - coverage-validation
  - gap-surfacing

routing:
  input_types: [persona_alignment_request]
  output_types: [persona_aligned_requirements]

delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: persona-aligned-requirement-task-agent
name: Persona Aligned Requirement Task Agent
version: 1.0.0
namespace: yappc.task-agents.requirements
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Validate that requirements adequately address needs of all defined user personas and surface
  persona-specific gaps
summary: Validate that requirements adequately address needs of all defined user personas and surface
  persona-specific gaps
metadata:
  level: 3
  domain: requirements
  type: worker
  tags:
  - persona-alignment
  - coverage-validation
  - gap-surfacing
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: persona_alignment_request
    schema: dynamic
  outputs:
  - name: persona_aligned_requirements
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: requirement-analysis-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- persona_reader
- alignment_checker
capabilities:
- persona-alignment
- coverage-validation
- gap-surfacing
routing:
  input_types:
  - persona_alignment_request
  output_types:
  - persona_aligned_requirements
delegation:
  can_delegate_to: []
  escalates_to: requirement-analysis-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

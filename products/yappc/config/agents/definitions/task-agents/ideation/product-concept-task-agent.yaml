id: product-concept-task-agent
name: Product Concept Task Agent
version: 1.0.0
description: "Generate product concepts by combining problem context, user needs, and technology possibilities into distinct solution directions"

metadata:
  level: 3
  domain: ideation
  type: worker
  tags: [concept-generation, solution-space-exploration, concept-differentiation, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Generate product concepts by combining problem context, user needs, and technology possibilities into distinct solution directions

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [concept_generator, creative_llm]

capabilities:
  - concept-generation
  - solution-space-exploration
  - concept-differentiation

routing:
  input_types: [concept_request]
  output_types: [product_concepts]

delegation:
  can_delegate_to: []
  escalates_to: solution-framing-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

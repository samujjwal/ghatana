id: value-proposition-task-agent
name: Value Proposition Task Agent
version: 1.0.0
namespace: yappc.task-agents.ideation
status: active
owners:
- team: product
  contact: product@ghatana.com
description: 'Craft value propositions using the value proposition canvas format: customer jobs, pains,
  gains, products/features, pain relievers, gain creators'
summary: 'Craft value propositions using the value proposition canvas format: customer jobs, pains, gains,
  products/features, p...'
metadata:
  level: 3
  domain: ideation
  type: worker
  tags:
  - value-proposition-design
  - canvas-completion
  - benefit-articulation
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: value_prop_request
    schema: dynamic
  outputs:
  - name: value_proposition_canvas
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: solution-framing-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- vpc_template_engine
- benefit_mapper
capabilities:
- value-proposition-design
- canvas-completion
- benefit-articulation
routing:
  input_types:
  - value_prop_request
  output_types:
  - value_proposition_canvas
delegation:
  can_delegate_to: []
  escalates_to: solution-framing-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

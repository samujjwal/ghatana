id: user-value-mapping-task-agent
name: User Value Mapping Task Agent
version: 1.0.0
namespace: yappc.task-agents.ideation
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Map product features to specific user value outcomes showing direct line from feature to
  user job to measurable value
summary: Map product features to specific user value outcomes showing direct line from feature to user
  job to measurable value
metadata:
  level: 3
  domain: ideation
  type: worker
  tags:
  - value-mapping
  - feature-benefit-mapping
  - outcome-definition
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: value_mapping_request
    schema: dynamic
  outputs:
  - name: user_value_map
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: concept-validation-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- value_mapper
- benefit_extractor
capabilities:
- value-mapping
- feature-benefit-mapping
- outcome-definition
routing:
  input_types:
  - value_mapping_request
  output_types:
  - user_value_map
delegation:
  can_delegate_to: []
  escalates_to: concept-validation-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

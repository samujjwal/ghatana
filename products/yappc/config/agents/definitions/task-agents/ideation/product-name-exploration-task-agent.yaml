id: product-name-exploration-task-agent
name: Product Name Exploration Task Agent
version: 1.0.0
namespace: yappc.task-agents.ideation
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Generate and evaluate product name candidates for memorability, availability, cultural fit,
  and brand alignment
summary: Generate and evaluate product name candidates for memorability, availability, cultural fit, and
  brand alignment
metadata:
  level: 3
  domain: ideation
  type: worker
  tags:
  - name-generation
  - availability-checking
  - brand-alignment
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: name_exploration_request
    schema: dynamic
  outputs:
  - name: product_name_candidates
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: solution-framing-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- name_generator
- trademark_checker
- brand_evaluator
capabilities:
- name-generation
- availability-checking
- brand-alignment
routing:
  input_types:
  - name_exploration_request
  output_types:
  - product_name_candidates
delegation:
  can_delegate_to: []
  escalates_to: solution-framing-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

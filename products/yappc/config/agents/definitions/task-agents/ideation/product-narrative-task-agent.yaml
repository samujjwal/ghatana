id: product-narrative-task-agent
name: Product Narrative Task Agent
version: 1.0.0
namespace: yappc.task-agents.ideation
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Write compelling product narratives in Amazon PR/FAQ format with press release, FAQs, and
  internal FAQ sections
summary: Write compelling product narratives in Amazon PR/FAQ format with press release, FAQs, and internal
  FAQ sections
metadata:
  level: 3
  domain: ideation
  type: worker
  tags:
  - pr-faq-writing
  - narrative-structuring
  - benefit-articulation
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: narrative_request
    schema: dynamic
  outputs:
  - name: product_pr_faq
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: solution-framing-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- prfaq_template_engine
- narrative_writer
capabilities:
- pr-faq-writing
- narrative-structuring
- benefit-articulation
routing:
  input_types:
  - narrative_request
  output_types:
  - product_pr_faq
delegation:
  can_delegate_to: []
  escalates_to: solution-framing-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

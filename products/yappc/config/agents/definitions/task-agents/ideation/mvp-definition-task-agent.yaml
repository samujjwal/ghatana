id: mvp-definition-task-agent
name: Mvp Definition Task Agent
version: 1.0.0
namespace: yappc.task-agents.ideation
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Define MVP scope by identifying minimum feature set that tests core assumptions and delivers
  measurable user value
summary: Define MVP scope by identifying minimum feature set that tests core assumptions and delivers
  measurable user value
metadata:
  level: 3
  domain: ideation
  type: worker
  tags:
  - mvp-scoping
  - assumption-identification
  - value-delivery-mapping
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: mvp_definition_request
    schema: dynamic
  outputs:
  - name: mvp_definition
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: concept-validation-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- mvp_scoper
- assumption_extractor
capabilities:
- mvp-scoping
- assumption-identification
- value-delivery-mapping
routing:
  input_types:
  - mvp_definition_request
  output_types:
  - mvp_definition
delegation:
  can_delegate_to: []
  escalates_to: concept-validation-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

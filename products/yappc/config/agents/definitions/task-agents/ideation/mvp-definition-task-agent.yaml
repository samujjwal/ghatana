id: mvp-definition-task-agent
name: Mvp Definition Task Agent
version: 1.0.0
description: "Define MVP scope by identifying minimum feature set that tests core assumptions and delivers measurable user value"

metadata:
  level: 3
  domain: ideation
  type: worker
  tags: [mvp-scoping, assumption-identification, value-delivery-mapping, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Define MVP scope by identifying minimum feature set that tests core assumptions and delivers measurable user value

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [mvp_scoper, assumption_extractor]

capabilities:
  - mvp-scoping
  - assumption-identification
  - value-delivery-mapping

routing:
  input_types: [mvp_definition_request]
  output_types: [mvp_definition]

delegation:
  can_delegate_to: []
  escalates_to: concept-validation-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

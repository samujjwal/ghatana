id: differentiation-review-task-agent
name: Differentiation Review Task Agent
version: 1.0.0
namespace: yappc.task-agents.ideation
status: active
owners:
- team: product
  contact: product@ghatana.com
description: Review product differentiation by comparing concept against competitive alternatives on all
  key value dimensions
summary: Review product differentiation by comparing concept against competitive alternatives on all key
  value dimensions
metadata:
  level: 3
  domain: ideation
  type: worker
  tags:
  - differentiation-assessment
  - competitive-comparison
  - moat-identification
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: differentiation_review_request
    schema: dynamic
  outputs:
  - name: differentiation_assessment
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: differentiation-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- differentiation_scorer
- competitive_comparator
capabilities:
- differentiation-assessment
- competitive-comparison
- moat-identification
routing:
  input_types:
  - differentiation_review_request
  output_types:
  - differentiation_assessment
delegation:
  can_delegate_to: []
  escalates_to: differentiation-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: differentiation-review-task-agent
name: Differentiation Review Task Agent
version: 1.0.0
description: "Review product differentiation by comparing concept against competitive alternatives on all key value dimensions"

metadata:
  level: 3
  domain: ideation
  type: worker
  tags: [differentiation-assessment, competitive-comparison, moat-identification, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Review product differentiation by comparing concept against competitive alternatives on all key value dimensions

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [differentiation_scorer, competitive_comparator]

capabilities:
  - differentiation-assessment
  - competitive-comparison
  - moat-identification

routing:
  input_types: [differentiation_review_request]
  output_types: [differentiation_assessment]

delegation:
  can_delegate_to: []
  escalates_to: differentiation-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

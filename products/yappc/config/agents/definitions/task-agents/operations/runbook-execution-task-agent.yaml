id: runbook-execution-task-agent
name: Runbook Execution Task Agent
version: 1.0.0
namespace: yappc.task-agents.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Execute individual runbook steps with parameter injection, dry-run mode, output capture,
  and step-level rollback
summary: Execute individual runbook steps with parameter injection, dry-run mode, output capture, and
  step-level rollback
metadata:
  level: 3
  domain: operations
  type: worker
  tags:
  - runbook-step-execution
  - parameter-injection
  - output-capture
  - rollback
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: runbook_execution_request
    schema: dynamic
  outputs:
  - name: runbook_execution_result
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: sre-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- runbook_executor
- step_runner
- rollback_engine
capabilities:
- runbook-step-execution
- parameter-injection
- output-capture
- rollback
routing:
  input_types:
  - runbook_execution_request
  output_types:
  - runbook_execution_result
delegation:
  can_delegate_to: []
  escalates_to: sre-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

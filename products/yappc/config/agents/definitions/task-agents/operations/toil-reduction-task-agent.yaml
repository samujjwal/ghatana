id: toil-reduction-task-agent
name: Toil Reduction Task Agent
version: 1.0.0
description: "Identify toil tasks from oncall logs and runbooks, quantify engineering hours consumed, and propose automation candidates"

metadata:
  level: 3
  domain: operations
  type: worker
  tags: [toil-identification, effort-quantification, automation-candidate-selection, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Identify toil tasks from oncall logs and runbooks, quantify engineering hours consumed, and propose automation candidates

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [toil_analyser, effort_calculator, automation_evaluator]

capabilities:
  - toil-identification
  - effort-quantification
  - automation-candidate-selection

routing:
  input_types: [toil_reduction_request]
  output_types: [toil_reduction_plan]

delegation:
  can_delegate_to: []
  escalates_to: sre-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

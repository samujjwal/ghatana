id: toil-reduction-task-agent
name: Toil Reduction Task Agent
version: 1.0.0
namespace: yappc.task-agents.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Identify toil tasks from oncall logs and runbooks, quantify engineering hours consumed, and
  propose automation candidates
summary: Identify toil tasks from oncall logs and runbooks, quantify engineering hours consumed, and propose
  automation candid...
metadata:
  level: 3
  domain: operations
  type: worker
  tags:
  - toil-identification
  - effort-quantification
  - automation-candidate-selection
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: toil_reduction_request
    schema: dynamic
  outputs:
  - name: toil_reduction_plan
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: sre-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- toil_analyser
- effort_calculator
- automation_evaluator
capabilities:
- toil-identification
- effort-quantification
- automation-candidate-selection
routing:
  input_types:
  - toil_reduction_request
  output_types:
  - toil_reduction_plan
delegation:
  can_delegate_to: []
  escalates_to: sre-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

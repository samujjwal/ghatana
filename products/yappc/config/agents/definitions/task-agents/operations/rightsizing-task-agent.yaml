id: rightsizing-task-agent
name: Rightsizing Task Agent
version: 1.0.0
namespace: yappc.task-agents.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Identify over-provisioned resources using utilisation data and recommend optimal size configurations
  with savings estimates
summary: Identify over-provisioned resources using utilisation data and recommend optimal size configurations
  with savings est...
metadata:
  level: 3
  domain: operations
  type: worker
  tags:
  - rightsizing-analysis
  - utilisation-evaluation
  - savings-estimation
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: rightsizing_request
    schema: dynamic
  outputs:
  - name: rightsizing_recommendations
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: cost-management-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- rightsizing_engine
- utilisation_reader
- savings_calculator
capabilities:
- rightsizing-analysis
- utilisation-evaluation
- savings-estimation
routing:
  input_types:
  - rightsizing_request
  output_types:
  - rightsizing_recommendations
delegation:
  can_delegate_to: []
  escalates_to: cost-management-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

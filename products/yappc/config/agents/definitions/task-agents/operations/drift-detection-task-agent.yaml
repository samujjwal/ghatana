id: drift-detection-task-agent
name: Drift Detection Task Agent
version: 1.0.0
namespace: yappc.task-agents.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Detect infrastructure drift between desired IaC state and actual deployed state and classify
  drift severity
summary: Detect infrastructure drift between desired IaC state and actual deployed state and classify
  drift severity
metadata:
  level: 3
  domain: operations
  type: worker
  tags:
  - drift-detection
  - state-comparison
  - severity-classification
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: drift_detection_request
    schema: dynamic
  outputs:
  - name: drift_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: infra-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- drift_detector
- state_comparator
- severity_classifier
capabilities:
- drift-detection
- state-comparison
- severity-classification
routing:
  input_types:
  - drift_detection_request
  output_types:
  - drift_report
delegation:
  can_delegate_to: []
  escalates_to: infra-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

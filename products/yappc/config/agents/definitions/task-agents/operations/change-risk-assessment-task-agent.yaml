id: change-risk-assessment-task-agent
name: Change Risk Assessment Task Agent
version: 1.0.0
namespace: yappc.task-agents.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Score the risk of a specific change request using blast radius, recent incident context,
  and system stability indicators
summary: Score the risk of a specific change request using blast radius, recent incident context, and
  system stability indicators
metadata:
  level: 3
  domain: operations
  type: worker
  tags:
  - risk-scoring
  - blast-radius-estimation
  - stability-assessment
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: change_risk_request
    schema: dynamic
  outputs:
  - name: change_risk_score
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: change-management-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- risk_scorer
- blast_radius_calculator
- stability_reader
capabilities:
- risk-scoring
- blast-radius-estimation
- stability-assessment
routing:
  input_types:
  - change_risk_request
  output_types:
  - change_risk_score
delegation:
  can_delegate_to: []
  escalates_to: change-management-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

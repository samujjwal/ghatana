id: kb-update-task-agent
name: Kb Update Task Agent
version: 1.0.0
namespace: yappc.task-agents.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Author or update knowledge base articles from resolved ticket learnings with accuracy verification
summary: Author or update knowledge base articles from resolved ticket learnings with accuracy verification
metadata:
  level: 3
  domain: operations
  type: worker
  tags:
  - kb-article-authoring
  - accuracy-verification
  - article-publication
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: kb_update_request
    schema: dynamic
  outputs:
  - name: kb_article
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: support-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- kb_author
- accuracy_verifier
- kb_publisher
capabilities:
- kb-article-authoring
- accuracy-verification
- article-publication
routing:
  input_types:
  - kb_update_request
  output_types:
  - kb_article
delegation:
  can_delegate_to: []
  escalates_to: support-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

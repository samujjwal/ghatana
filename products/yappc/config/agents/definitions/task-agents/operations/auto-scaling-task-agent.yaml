id: auto-scaling-task-agent
name: Auto Scaling Task Agent
version: 1.0.0
description: "Configure auto-scaling policies for compute resources based on load patterns, latency targets, and cost constraints"

metadata:
  level: 3
  domain: operations
  type: worker
  tags: [auto-scaling-configuration, load-pattern-analysis, policy-generation, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Configure auto-scaling policies for compute resources based on load patterns, latency targets, and cost constraints

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [scaling_policy_generator, load_analyser, cost_constraint_checker]

capabilities:
  - auto-scaling-configuration
  - load-pattern-analysis
  - policy-generation

routing:
  input_types: [auto_scaling_request]
  output_types: [auto_scaling_policy]

delegation:
  can_delegate_to: []
  escalates_to: infra-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

id: cost-anomaly-task-agent
name: Cost Anomaly Task Agent
version: 1.0.0
description: "Detect cost anomalies by comparing spend against predicted baseline, identify root cause services/operations, and quantify impact"

metadata:
  level: 3
  domain: operations
  type: worker
  tags: [anomaly-detection, root-cause-identification, impact-quantification, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Detect cost anomalies by comparing spend against predicted baseline, identify root cause services/operations, and quantify impact

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [cost_anomaly_detector, root_cause_analyser, impact_calculator]

capabilities:
  - anomaly-detection
  - root-cause-identification
  - impact-quantification

routing:
  input_types: [cost_anomaly_request]
  output_types: [cost_anomaly_report]

delegation:
  can_delegate_to: []
  escalates_to: cost-management-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

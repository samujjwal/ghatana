id: cost-anomaly-task-agent
name: Cost Anomaly Task Agent
version: 1.0.0
namespace: yappc.task-agents.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Detect cost anomalies by comparing spend against predicted baseline, identify root cause
  services/operations, and quantify impact
summary: Detect cost anomalies by comparing spend against predicted baseline, identify root cause services/operations,
  and qua...
metadata:
  level: 3
  domain: operations
  type: worker
  tags:
  - anomaly-detection
  - root-cause-identification
  - impact-quantification
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: cost_anomaly_request
    schema: dynamic
  outputs:
  - name: cost_anomaly_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: cost-management-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- cost_anomaly_detector
- root_cause_analyser
- impact_calculator
capabilities:
- anomaly-detection
- root-cause-identification
- impact-quantification
routing:
  input_types:
  - cost_anomaly_request
  output_types:
  - cost_anomaly_report
delegation:
  can_delegate_to: []
  escalates_to: cost-management-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: iac-generation-task-agent
name: Iac Generation Task Agent
version: 1.0.0
namespace: yappc.task-agents.operations
status: active
owners:
- team: sre
  contact: sre@ghatana.com
description: Generate Terraform or Pulumi IaC code for requested infrastructure changes following security
  and cost policies
summary: Generate Terraform or Pulumi IaC code for requested infrastructure changes following security
  and cost policies
metadata:
  level: 3
  domain: operations
  type: worker
  tags:
  - iac-code-generation
  - terraform
  - pulumi
  - policy-compliance
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: iac_generation_request
    schema: dynamic
  outputs:
  - name: iac_code
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: infra-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- terraform_generator
- pulumi_generator
- policy_validator
capabilities:
- iac-code-generation
- terraform
- pulumi
- policy-compliance
routing:
  input_types:
  - iac_generation_request
  output_types:
  - iac_code
delegation:
  can_delegate_to: []
  escalates_to: infra-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 25000
  timeout_ms: 50000

id: iac-generation-task-agent
name: Iac Generation Task Agent
version: 1.0.0
description: "Generate Terraform or Pulumi IaC code for requested infrastructure changes following security and cost policies"

metadata:
  level: 3
  domain: operations
  type: worker
  tags: [iac-code-generation, terraform, pulumi, policy-compliance, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Generate Terraform or Pulumi IaC code for requested infrastructure changes following security and cost policies

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [terraform_generator, pulumi_generator, policy_validator]

capabilities:
  - iac-code-generation
  - terraform
  - pulumi
  - policy-compliance

routing:
  input_types: [iac_generation_request]
  output_types: [iac_code]

delegation:
  can_delegate_to: []
  escalates_to: infra-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 5000
  max_latency_ms: 25000
  timeout_ms: 50000

id: observability-plan-task-agent
name: Observability Plan Task Agent
version: 1.0.0
description: "Produce observability plan with metrics list, spanning strategy, log structure, and alert rules for a service"

metadata:
  level: 3
  domain: architecture
  type: worker
  tags: [observability-planning, metrics-definition, alert-rules, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Produce observability plan with metrics list, spanning strategy, log structure, and alert rules for a service

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [observability_planner, alert_rule_generator]

capabilities:
  - observability-planning
  - metrics-definition
  - alert-rules

routing:
  input_types: [observability_plan_request]
  output_types: [observability_plan]

delegation:
  can_delegate_to: []
  escalates_to: observability-architecture-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

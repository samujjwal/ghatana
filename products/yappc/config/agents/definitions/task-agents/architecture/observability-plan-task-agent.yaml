id: observability-plan-task-agent
name: Observability Plan Task Agent
version: 1.0.0
namespace: yappc.task-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Produce observability plan with metrics list, spanning strategy, log structure, and alert
  rules for a service
summary: Produce observability plan with metrics list, spanning strategy, log structure, and alert rules
  for a service
metadata:
  level: 3
  domain: architecture
  type: worker
  tags:
  - observability-planning
  - metrics-definition
  - alert-rules
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: observability_plan_request
    schema: dynamic
  outputs:
  - name: observability_plan
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: observability-architecture-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- observability_planner
- alert_rule_generator
capabilities:
- observability-planning
- metrics-definition
- alert-rules
routing:
  input_types:
  - observability_plan_request
  output_types:
  - observability_plan
delegation:
  can_delegate_to: []
  escalates_to: observability-architecture-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

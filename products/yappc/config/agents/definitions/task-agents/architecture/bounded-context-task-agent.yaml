id: bounded-context-task-agent
name: Bounded Context Task Agent
version: 1.0.0
description: "Define bounded contexts with explicit context maps showing upstream/downstream relationships and integration patterns"

metadata:
  level: 3
  domain: architecture
  type: worker
  tags: [bounded-context-definition, context-mapping, integration-pattern-selection, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Define bounded contexts with explicit context maps showing upstream/downstream relationships and integration patterns

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [context_mapper, integration_pattern_library]

capabilities:
  - bounded-context-definition
  - context-mapping
  - integration-pattern-selection

routing:
  input_types: [bounded_context_request]
  output_types: [bounded_context_map]

delegation:
  can_delegate_to: []
  escalates_to: service-design-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

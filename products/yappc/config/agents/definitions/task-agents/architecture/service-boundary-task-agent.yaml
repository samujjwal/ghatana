id: service-boundary-task-agent
name: Service Boundary Task Agent
version: 1.0.0
description: "Define service boundaries by decomposing domain model into deployment units with cohesion and coupling analysis"

metadata:
  level: 3
  domain: architecture
  type: worker
  tags: [service-decomposition, cohesion-analysis, coupling-minimisation, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Define service boundaries by decomposing domain model into deployment units with cohesion and coupling analysis

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [decomposition_engine, coupling_analyser]

capabilities:
  - service-decomposition
  - cohesion-analysis
  - coupling-minimisation

routing:
  input_types: [service_boundary_request]
  output_types: [service_boundary_definition]

delegation:
  can_delegate_to: []
  escalates_to: service-design-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

id: service-boundary-task-agent
name: Service Boundary Task Agent
version: 1.0.0
namespace: yappc.task-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Define service boundaries by decomposing domain model into deployment units with cohesion
  and coupling analysis
summary: Define service boundaries by decomposing domain model into deployment units with cohesion and
  coupling analysis
metadata:
  level: 3
  domain: architecture
  type: worker
  tags:
  - service-decomposition
  - cohesion-analysis
  - coupling-minimisation
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: service_boundary_request
    schema: dynamic
  outputs:
  - name: service_boundary_definition
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: service-design-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- decomposition_engine
- coupling_analyser
capabilities:
- service-decomposition
- cohesion-analysis
- coupling-minimisation
routing:
  input_types:
  - service_boundary_request
  output_types:
  - service_boundary_definition
delegation:
  can_delegate_to: []
  escalates_to: service-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

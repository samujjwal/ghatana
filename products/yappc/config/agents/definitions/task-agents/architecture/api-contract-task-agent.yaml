id: api-contract-task-agent
name: Api Contract Task Agent
version: 1.0.0
description: "Design REST/gRPC API contracts with OpenAPI/proto specifications, versioning strategy, and backward compatibility rules"

metadata:
  level: 3
  domain: architecture
  type: worker
  tags: [api-contract-design, openapi-specification, versioning-strategy, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Design REST/gRPC API contracts with OpenAPI/proto specifications, versioning strategy, and backward compatibility rules

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [openapi_generator, proto_generator, compatibility_checker]

capabilities:
  - api-contract-design
  - openapi-specification
  - versioning-strategy

routing:
  input_types: [api_contract_request]
  output_types: [api_contract_spec]

delegation:
  can_delegate_to: []
  escalates_to: service-design-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

id: deployment-topology-task-agent
name: Deployment Topology Task Agent
version: 1.0.0
namespace: yappc.task-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Design deployment topology including container orchestration, service mesh, network policies,
  and multi-region strategy
summary: Design deployment topology including container orchestration, service mesh, network policies,
  and multi-region strategy
metadata:
  level: 3
  domain: architecture
  type: worker
  tags:
  - deployment-topology-design
  - network-policy-spec
  - multi-region-strategy
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: deployment_topology_request
    schema: dynamic
  outputs:
  - name: deployment_topology_spec
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: service-design-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- topology_designer
- network_policy_builder
capabilities:
- deployment-topology-design
- network-policy-spec
- multi-region-strategy
routing:
  input_types:
  - deployment_topology_request
  output_types:
  - deployment_topology_spec
delegation:
  can_delegate_to: []
  escalates_to: service-design-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

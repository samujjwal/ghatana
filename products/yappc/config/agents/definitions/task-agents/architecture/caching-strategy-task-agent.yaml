id: caching-strategy-task-agent
name: Caching Strategy Task Agent
version: 1.0.0
description: "Design caching strategies including cache placement, eviction policies, invalidation patterns, and consistency guarantees"

metadata:
  level: 3
  domain: architecture
  type: worker
  tags: [caching-strategy-design, eviction-policy-selection, invalidation-design, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Design caching strategies including cache placement, eviction policies, invalidation patterns, and consistency guarantees

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [cache_strategy_designer, invalidation_pattern_library]

capabilities:
  - caching-strategy-design
  - eviction-policy-selection
  - invalidation-design

routing:
  input_types: [caching_request]
  output_types: [caching_strategy_spec]

delegation:
  can_delegate_to: []
  escalates_to: data-architecture-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

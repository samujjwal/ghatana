id: caching-strategy-task-agent
name: Caching Strategy Task Agent
version: 1.0.0
namespace: yappc.task-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Design caching strategies including cache placement, eviction policies, invalidation patterns,
  and consistency guarantees
summary: Design caching strategies including cache placement, eviction policies, invalidation patterns,
  and consistency guaran...
metadata:
  level: 3
  domain: architecture
  type: worker
  tags:
  - caching-strategy-design
  - eviction-policy-selection
  - invalidation-design
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: caching_request
    schema: dynamic
  outputs:
  - name: caching_strategy_spec
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: data-architecture-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- cache_strategy_designer
- invalidation_pattern_library
capabilities:
- caching-strategy-design
- eviction-policy-selection
- invalidation-design
routing:
  input_types:
  - caching_request
  output_types:
  - caching_strategy_spec
delegation:
  can_delegate_to: []
  escalates_to: data-architecture-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: audit-architecture-task-agent
name: Audit Architecture Task Agent
version: 1.0.0
description: "Design comprehensive audit logging architecture with event capture, tamper-evidence, retention, and compliance reporting"

metadata:
  level: 3
  domain: architecture
  type: worker
  tags: [audit-design, event-capture-spec, tamper-evidence-design, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Design comprehensive audit logging architecture with event capture, tamper-evidence, retention, and compliance reporting

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [audit_arch_designer, tamper_evidence_spec_builder]

capabilities:
  - audit-design
  - event-capture-spec
  - tamper-evidence-design

routing:
  input_types: [audit_architecture_request]
  output_types: [audit_architecture_spec]

delegation:
  can_delegate_to: []
  escalates_to: security-architecture-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: search-architecture-task-agent
name: Search Architecture Task Agent
version: 1.0.0
description: "Design search architecture covering indexing strategy, query routing, hybrid search pipeline, and relevance tuning approach"

metadata:
  level: 3
  domain: architecture
  type: worker
  tags: [search-architecture-design, indexing-strategy, query-routing, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Design search architecture covering indexing strategy, query routing, hybrid search pipeline, and relevance tuning approach

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [search_arch_designer, index_strategy_builder]

capabilities:
  - search-architecture-design
  - indexing-strategy
  - query-routing

routing:
  input_types: [search_architecture_request]
  output_types: [search_architecture_spec]

delegation:
  can_delegate_to: []
  escalates_to: data-architecture-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

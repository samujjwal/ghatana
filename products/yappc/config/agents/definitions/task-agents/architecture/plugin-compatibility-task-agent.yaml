id: plugin-compatibility-task-agent
name: Plugin Compatibility Task Agent
version: 1.0.0
namespace: yappc.task-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Generate plugin compatibility matrix and define semver contract rules for plugin API changes
summary: Generate plugin compatibility matrix and define semver contract rules for plugin API changes
metadata:
  level: 3
  domain: architecture
  type: worker
  tags:
  - compatibility-matrix
  - semver-rules
  - breaking-change-definition
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: plugin_compat_request
    schema: dynamic
  outputs:
  - name: plugin_compat_matrix
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: plugin-contract-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- compatibility_matrix_builder
- semver_rule_engine
capabilities:
- compatibility-matrix
- semver-rules
- breaking-change-definition
routing:
  input_types:
  - plugin_compat_request
  output_types:
  - plugin_compat_matrix
delegation:
  can_delegate_to: []
  escalates_to: plugin-contract-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

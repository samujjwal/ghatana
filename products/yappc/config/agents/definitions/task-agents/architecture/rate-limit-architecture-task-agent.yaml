id: rate-limit-architecture-task-agent
name: Rate Limit Architecture Task Agent
version: 1.0.0
namespace: yappc.task-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Design rate limiting architecture with sliding window, token bucket, and quota management
  strategies per tenant/user/API
summary: Design rate limiting architecture with sliding window, token bucket, and quota management strategies
  per tenant/user/API
metadata:
  level: 3
  domain: architecture
  type: worker
  tags:
  - rate-limit-design
  - algorithm-selection
  - quota-management
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: rate_limit_request
    schema: dynamic
  outputs:
  - name: rate_limit_spec
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: security-architecture-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- rate_limit_designer
- quota_manager
capabilities:
- rate-limit-design
- algorithm-selection
- quota-management
routing:
  input_types:
  - rate_limit_request
  output_types:
  - rate_limit_spec
delegation:
  can_delegate_to: []
  escalates_to: security-architecture-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

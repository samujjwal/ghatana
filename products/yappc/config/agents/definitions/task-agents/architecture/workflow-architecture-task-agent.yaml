id: workflow-architecture-task-agent
name: Workflow Architecture Task Agent
version: 1.0.0
namespace: yappc.task-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Design workflow orchestration and choreography patterns with BPMN-aligned state machines
  and saga compensation flows
summary: Design workflow orchestration and choreography patterns with BPMN-aligned state machines and
  saga compensation flows
metadata:
  level: 3
  domain: architecture
  type: worker
  tags:
  - workflow-design
  - state-machine-definition
  - saga-compensation
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: workflow_architecture_request
    schema: dynamic
  outputs:
  - name: workflow_architecture_spec
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: event-architecture-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- workflow_designer
- state_machine_builder
- saga_designer
capabilities:
- workflow-design
- state-machine-definition
- saga-compensation
routing:
  input_types:
  - workflow_architecture_request
  output_types:
  - workflow_architecture_spec
delegation:
  can_delegate_to: []
  escalates_to: event-architecture-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

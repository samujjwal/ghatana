id: agent-memory-design-task-agent
name: Agent Memory Design Task Agent
version: 1.0.0
namespace: yappc.task-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Design agent memory schemas for all memory types (episodic, semantic, procedural, preference)
  with retrieval indexes
summary: Design agent memory schemas for all memory types (episodic, semantic, procedural, preference)
  with retrieval indexes
metadata:
  level: 3
  domain: architecture
  type: worker
  tags:
  - memory-schema-design
  - index-definition
  - retrieval-pattern
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: agent_memory_design_request
    schema: dynamic
  outputs:
  - name: agent_memory_schema
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: memory-architecture-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- memory_schema_builder
- index_designer
capabilities:
- memory-schema-design
- index-definition
- retrieval-pattern
routing:
  input_types:
  - agent_memory_design_request
  output_types:
  - agent_memory_schema
delegation:
  can_delegate_to: []
  escalates_to: memory-architecture-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

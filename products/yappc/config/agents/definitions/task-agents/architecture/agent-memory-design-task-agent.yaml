id: agent-memory-design-task-agent
name: Agent Memory Design Task Agent
version: 1.0.0
description: "Design agent memory schemas for all memory types (episodic, semantic, procedural, preference) with retrieval indexes"

metadata:
  level: 3
  domain: architecture
  type: worker
  tags: [memory-schema-design, index-definition, retrieval-pattern, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Design agent memory schemas for all memory types (episodic, semantic, procedural, preference) with retrieval indexes

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [memory_schema_builder, index_designer]

capabilities:
  - memory-schema-design
  - index-definition
  - retrieval-pattern

routing:
  input_types: [agent_memory_design_request]
  output_types: [agent_memory_schema]

delegation:
  can_delegate_to: []
  escalates_to: memory-architecture-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

id: data-store-selection-task-agent
name: Data Store Selection Task Agent
version: 1.0.0
namespace: yappc.task-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Select optimal data stores for specific access patterns using decision matrix covering consistency,
  latency, scalability, and operational complexity
summary: Select optimal data stores for specific access patterns using decision matrix covering consistency,
  latency, scalabil...
metadata:
  level: 3
  domain: architecture
  type: worker
  tags:
  - data-store-selection
  - access-pattern-analysis
  - trade-off-evaluation
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: data_store_request
    schema: dynamic
  outputs:
  - name: data_store_recommendation
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: data-architecture-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- data_store_decision_engine
- access_pattern_analyser
capabilities:
- data-store-selection
- access-pattern-analysis
- trade-off-evaluation
routing:
  input_types:
  - data_store_request
  output_types:
  - data_store_recommendation
delegation:
  can_delegate_to: []
  escalates_to: data-architecture-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

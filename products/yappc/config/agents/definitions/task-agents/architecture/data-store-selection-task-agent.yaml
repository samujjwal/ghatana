id: data-store-selection-task-agent
name: Data Store Selection Task Agent
version: 1.0.0
description: "Select optimal data stores for specific access patterns using decision matrix covering consistency, latency, scalability, and operational complexity"

metadata:
  level: 3
  domain: architecture
  type: worker
  tags: [data-store-selection, access-pattern-analysis, trade-off-evaluation, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Select optimal data stores for specific access patterns using decision matrix covering consistency, latency, scalability, and operational complexity

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [data_store_decision_engine, access_pattern_analyser]

capabilities:
  - data-store-selection
  - access-pattern-analysis
  - trade-off-evaluation

routing:
  input_types: [data_store_request]
  output_types: [data_store_recommendation]

delegation:
  can_delegate_to: []
  escalates_to: data-architecture-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: plugin-lifecycle-task-agent
name: Plugin Lifecycle Task Agent
version: 1.0.0
description: "Define plugin lifecycle hooks (register, activate, configure, execute, deactivate, unregister) with sandboxing constraints"

metadata:
  level: 3
  domain: architecture
  type: worker
  tags: [plugin-lifecycle-design, hook-specification, sandbox-constraints, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Define plugin lifecycle hooks (register, activate, configure, execute, deactivate, unregister) with sandboxing constraints

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [lifecycle_spec_writer, sandbox_constraint_definer]

capabilities:
  - plugin-lifecycle-design
  - hook-specification
  - sandbox-constraints

routing:
  input_types: [plugin_lifecycle_request]
  output_types: [plugin_lifecycle_spec]

delegation:
  can_delegate_to: []
  escalates_to: plugin-contract-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: context-assembly-task-agent
name: Context Assembly Task Agent
version: 1.0.0
description: "Design context assembly pipeline for agent turns: memory retrieval, tool output integration, and context window packing"

metadata:
  level: 3
  domain: architecture
  type: worker
  tags: [context-assembly-design, window-packing-strategy, priority-ordering, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Design context assembly pipeline for agent turns: memory retrieval, tool output integration, and context window packing

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [context_assembly_designer, window_packer]

capabilities:
  - context-assembly-design
  - window-packing-strategy
  - priority-ordering

routing:
  input_types: [context_assembly_request]
  output_types: [context_assembly_spec]

delegation:
  can_delegate_to: []
  escalates_to: agent-runtime-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

id: context-assembly-task-agent
name: Context Assembly Task Agent
version: 1.0.0
namespace: yappc.task-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: 'Design context assembly pipeline for agent turns: memory retrieval, tool output integration,
  and context window packing'
summary: 'Design context assembly pipeline for agent turns: memory retrieval, tool output integration,
  and context window packing'
metadata:
  level: 3
  domain: architecture
  type: worker
  tags:
  - context-assembly-design
  - window-packing-strategy
  - priority-ordering
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: context_assembly_request
    schema: dynamic
  outputs:
  - name: context_assembly_spec
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: agent-runtime-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- context_assembly_designer
- window_packer
capabilities:
- context-assembly-design
- window-packing-strategy
- priority-ordering
routing:
  input_types:
  - context_assembly_request
  output_types:
  - context_assembly_spec
delegation:
  can_delegate_to: []
  escalates_to: agent-runtime-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

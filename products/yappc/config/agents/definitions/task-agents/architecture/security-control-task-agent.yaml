id: security-control-task-agent
name: Security Control Task Agent
version: 1.0.0
description: "Specify security controls for identified threats including authentication, authorisation, encryption, and input validation requirements"

metadata:
  level: 3
  domain: architecture
  type: worker
  tags: [security-control-specification, threat-mitigation-mapping, control-selection, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Specify security controls for identified threats including authentication, authorisation, encryption, and input validation requirements

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [security_control_library, threat_mitigation_mapper]

capabilities:
  - security-control-specification
  - threat-mitigation-mapping
  - control-selection

routing:
  input_types: [security_control_request]
  output_types: [security_controls_spec]

delegation:
  can_delegate_to: []
  escalates_to: security-architecture-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

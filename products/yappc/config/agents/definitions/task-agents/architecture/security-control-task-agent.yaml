id: security-control-task-agent
name: Security Control Task Agent
version: 1.0.0
namespace: yappc.task-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Specify security controls for identified threats including authentication, authorisation,
  encryption, and input validation requirements
summary: Specify security controls for identified threats including authentication, authorisation, encryption,
  and input valid...
metadata:
  level: 3
  domain: architecture
  type: worker
  tags:
  - security-control-specification
  - threat-mitigation-mapping
  - control-selection
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: security_control_request
    schema: dynamic
  outputs:
  - name: security_controls_spec
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: security-architecture-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- security_control_library
- threat_mitigation_mapper
capabilities:
- security-control-specification
- threat-mitigation-mapping
- control-selection
routing:
  input_types:
  - security_control_request
  output_types:
  - security_controls_spec
delegation:
  can_delegate_to: []
  escalates_to: security-architecture-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

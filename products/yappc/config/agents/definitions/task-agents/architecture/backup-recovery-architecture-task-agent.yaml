id: backup-recovery-architecture-task-agent
name: Backup Recovery Architecture Task Agent
version: 1.0.0
description: "Design backup and recovery architecture covering RPO/RTO targets, backup schedule, recovery procedures, and DR runbooks"

metadata:
  level: 3
  domain: architecture
  type: worker
  tags: [backup-design, rpo-rto-determination, recovery-procedure-design, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Design backup and recovery architecture covering RPO/RTO targets, backup schedule, recovery procedures, and DR runbooks

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [backup_arch_designer, dr_runbook_writer]

capabilities:
  - backup-design
  - rpo-rto-determination
  - recovery-procedure-design

routing:
  input_types: [backup_recovery_request]
  output_types: [backup_recovery_spec]

delegation:
  can_delegate_to: []
  escalates_to: data-architecture-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

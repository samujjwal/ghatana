id: backup-recovery-architecture-task-agent
name: Backup Recovery Architecture Task Agent
version: 1.0.0
namespace: yappc.task-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Design backup and recovery architecture covering RPO/RTO targets, backup schedule, recovery
  procedures, and DR runbooks
summary: Design backup and recovery architecture covering RPO/RTO targets, backup schedule, recovery procedures,
  and DR runbooks
metadata:
  level: 3
  domain: architecture
  type: worker
  tags:
  - backup-design
  - rpo-rto-determination
  - recovery-procedure-design
  - level3
identity:
  agentType: probabilistic
  subtype: llm
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: backup_recovery_request
    schema: dynamic
  outputs:
  - name: backup_recovery_spec
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: data-architecture-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- backup_arch_designer
- dr_runbook_writer
capabilities:
- backup-design
- rpo-rto-determination
- recovery-procedure-design
routing:
  input_types:
  - backup_recovery_request
  output_types:
  - backup_recovery_spec
delegation:
  can_delegate_to: []
  escalates_to: data-architecture-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

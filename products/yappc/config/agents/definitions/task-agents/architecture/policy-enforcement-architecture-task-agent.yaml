id: policy-enforcement-architecture-task-agent
name: Policy Enforcement Architecture Task Agent
version: 1.0.0
namespace: yappc.task-agents.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Design policy enforcement architecture using OPA/CEL for authorisation decisions at API gateway
  and service internals
summary: Design policy enforcement architecture using OPA/CEL for authorisation decisions at API gateway
  and service internals
metadata:
  level: 3
  domain: architecture
  type: worker
  tags:
  - policy-enforcement-design
  - opa-integration
  - decision-point-placement
  - level3
identity:
  agentType: PROBABILISTIC
  subtype: LLM
  determinismGuarantee: none
  stateMutability: local-state
  failureMode: retry
  criticality: medium
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: policy_enforcement_request
    schema: dynamic
  outputs:
  - name: policy_enforcement_spec
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: security-architecture-capability-agent
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - llm
  defaultReasoner: llm
memory:
  episodic:
    enabled: true
    retention_days: 90
    categories:
    - task-executions
  semantic:
    enabled: true
    categories:
    - domain-knowledge
  procedural:
    enabled: false
tools:
- policy_arch_designer
- opa_config_generator
capabilities:
- policy-enforcement-design
- opa-integration
- decision-point-placement
routing:
  input_types:
  - policy_enforcement_request
  output_types:
  - policy_enforcement_spec
delegation:
  can_delegate_to: []
  escalates_to: security-architecture-capability-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

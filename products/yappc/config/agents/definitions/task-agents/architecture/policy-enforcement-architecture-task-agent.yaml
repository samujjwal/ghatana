id: policy-enforcement-architecture-task-agent
name: Policy Enforcement Architecture Task Agent
version: 1.0.0
description: "Design policy enforcement architecture using OPA/CEL for authorisation decisions at API gateway and service internals"

metadata:
  level: 3
  domain: architecture
  type: worker
  tags: [policy-enforcement-design, opa-integration, decision-point-placement, level3]

generator:
  type: PIPELINE
  steps:
    - name: execute
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Execute task: Design policy enforcement architecture using OPA/CEL for authorisation decisions at API gateway and service internals

        Input: {{input}}
        Context: {{context}}

        Produce a structured, precise output meeting the task specification.

memory:
  episodic:
    enabled: true
    retention_days: 90
    categories: [task-executions]
  semantic:
    enabled: true
    categories: [domain-knowledge]
  procedural:
    enabled: false

tools: [policy_arch_designer, opa_config_generator]

capabilities:
  - policy-enforcement-design
  - opa-integration
  - decision-point-placement

routing:
  input_types: [policy_enforcement_request]
  output_types: [policy_enforcement_spec]

delegation:
  can_delegate_to: []
  escalates_to: security-architecture-capability-agent

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 4000
  max_latency_ms: 20000
  timeout_ms: 40000

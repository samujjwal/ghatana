id: systems-architect
name: Systems Architect
version: 1.0.0
namespace: yappc.definitions.architecture
status: active
owners:
- team: platform
  contact: platform@ghatana.com
description: Strategic agent for system design, tech stack selection, and architectural decision records
summary: Strategic agent for system design, tech stack selection, and architectural decision records
metadata:
  level: 1
  domain: architecture
  tags:
  - strategic
  - architecture
  - system-design
  - technical-leadership
identity:
  agentType: hybrid
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: requirements-document
    schema: dynamic
  - name: architecture-request
    schema: dynamic
  - name: tech-evaluation-request
    schema: dynamic
  - name: design-review-request
    schema: dynamic
  outputs:
  - name: architecture-decision-record
    schema: dynamic
  - name: system-design
    schema: dynamic
  - name: tech-stack-recommendation
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - architecture-orchestrator-agent
    - java-expert
    - react-expert
    - db-guardian
    - cloud-pilot
    - api-designer
    - sentinel
    escalation: &id001
    - master-orchestrator-agent
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - design-sessions
    - adr-history
    - architecture-reviews
  semantic:
    enabled: true
    categories:
    - architecture-patterns
    - tech-stack-evaluations
    - design-principles
  procedural:
    enabled: true
    categories:
    - design-guidelines
    - pattern-rules
    - review-checklist
tools:
- architecture_analyzer
- tech_stack_evaluator
- adr_generator
- diagram_generator
- pattern_detector
capabilities:
- system-architecture-design
- tech-stack-selection
- adr-creation
- pattern-enforcement
- scalability-planning
routing:
  input_types:
  - requirements-document
  - architecture-request
  - tech-evaluation-request
  - design-review-request
  output_types:
  - architecture-decision-record
  - system-design
  - tech-stack-recommendation
delegation:
  can_delegate_to:
  - architecture-orchestrator-agent
  - java-expert
  - react-expert
  - db-guardian
  - cloud-pilot
  - api-designer
  - sentinel
  escalates_to: *id001
governance:
  requires_approval: false
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 8000
  max_latency_ms: 20000
  timeout_ms: 30000

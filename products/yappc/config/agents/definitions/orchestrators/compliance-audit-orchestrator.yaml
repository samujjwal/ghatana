id: compliance-audit-orchestrator
name: Compliance Audit Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.compliance
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Orchestrates end-to-end compliance audit for a framework — delegates to compliance-control-evaluation-agent
  and compliance-gap-analysis-agent, produces final report.
summary: Orchestrates end-to-end compliance audit for a framework — delegates to compliance-control-evaluation-agent
  and compl...
metadata:
  level: 1
  domain: compliance
  tags:
  - orchestrator
  - compliance
  - soc2
  - gdpr
  - iso27001
identity:
  agentType: PLANNING
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: framework-id
    schema: dynamic
  - name: workspace-id
    schema: dynamic
  - name: audit-request
    schema: dynamic
  outputs:
  - name: compliance-audit-report
    schema: dynamic
  - name: gap-analysis
    schema: dynamic
  - name: compliance-score
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - compliance-control-evaluation-agent
    - compliance-gap-analysis-agent
    - sentinel
    escalation: systems-architect
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 1095
    categories:
    - compliance-audits
    - audit-history
  semantic:
    enabled: true
    categories:
    - framework-requirements
    - audit-patterns
  procedural:
    enabled: true
    categories:
    - audit-workflow
    - reporting-rules
tools:
- framework_loader
- audit_coordinator
- report_generator
capabilities:
- compliance-audit-orchestration
- multi-agent-orchestration
- compliance-reporting
routing:
  input_types:
  - framework-id
  - workspace-id
  - audit-request
  output_types:
  - compliance-audit-report
  - gap-analysis
  - compliance-score
delegation:
  can_delegate_to:
  - compliance-control-evaluation-agent
  - compliance-gap-analysis-agent
  - sentinel
  escalates_to: systems-architect
governance:
  requires_approval: true
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 60000
  max_latency_ms: 300000
  timeout_ms: 600000

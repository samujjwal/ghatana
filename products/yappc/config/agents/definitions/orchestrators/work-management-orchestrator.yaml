id: work-management-orchestrator
name: Work Management Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.engineering
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Manages work items across project management tools: creates issues, manages epics, tracks
  work item lifecycle, and maintains work item quality standards'
summary: 'Manages work items across project management tools: creates issues, manages epics, tracks work
  item lifecycle, and ma...'
metadata:
  level: 1
  domain: engineering
  tags:
  - orchestrator
  - work-management
  - issues
  - epics
  - jira
  - github
  - level1
identity:
  agentType: PLANNING
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: feature_plan
    schema: dynamic
  - name: epic_breakdown_request
    schema: dynamic
  - name: issue_creation_request
    schema: dynamic
  - name: work_item_update
    schema: dynamic
  outputs:
  - name: work_items
    schema: dynamic
  - name: epic_structure
    schema: dynamic
  - name: sprint_board
    schema: dynamic
  - name: work_item_quality_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - work-decomposition-task-agent
    - issue-creation-task-agent
    - story-point-estimation-task-agent
    escalation: delivery-planning-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - work-item-creations
    - epic-structures
    - sprint-allocations
  semantic:
    enabled: true
    categories:
    - issue-templates
    - decomposition-patterns
    - label-taxonomy
  procedural:
    enabled: true
    categories:
    - work-item-creation-rules
    - invest-criteria
    - decomposition-heuristics
tools:
- issue_creator
- epic_manager
- label_assigner
- ac_builder
- size_estimator
capabilities:
- work-decomposition
- issue-creation
- epic-management
- work-item-lifecycle
- quality-enforcement
routing:
  input_types:
  - feature_plan
  - epic_breakdown_request
  - issue_creation_request
  - work_item_update
  output_types:
  - work_items
  - epic_structure
  - sprint_board
  - work_item_quality_report
delegation:
  can_delegate_to:
  - work-decomposition-task-agent
  - issue-creation-task-agent
  - story-point-estimation-task-agent
  escalates_to: delivery-planning-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 40000
  timeout_ms: 60000

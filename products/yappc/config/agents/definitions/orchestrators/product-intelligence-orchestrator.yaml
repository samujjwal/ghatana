id: product-intelligence-orchestrator
name: Product Intelligence Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.product-intelligence
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Top-level product intelligence coordinator: aggregates feedback, experimentation results,
  and analytics to drive data-informed enhancement prioritisation'
summary: 'Top-level product intelligence coordinator: aggregates feedback, experimentation results, and
  analytics to drive data...'
metadata:
  level: 1
  domain: product-intelligence
  tags:
  - orchestrator
  - product-intelligence
  - analytics
  - experimentation
  - feedback
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: intelligence_request
    schema: dynamic
  - name: analytics_trigger
    schema: dynamic
  - name: experiment_result
    schema: dynamic
  - name: feedback_batch
    schema: dynamic
  outputs:
  - name: intelligence_brief
    schema: dynamic
  - name: prioritisation_update
    schema: dynamic
  - name: experiment_verdict
    schema: dynamic
  - name: analytics_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - feedback-orchestrator
    - experimentation-orchestrator
    - enhancement-orchestrator
    - product-analytics-capability-agent
    - kpi-tracking-task-agent
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - intelligence-reports
    - experiment-verdicts
    - feedback-summaries
    - enhancement-prioritisations
  semantic:
    enabled: true
    categories:
    - product-metrics
    - user-segments
    - experiment-history
  procedural:
    enabled: true
    categories:
    - intelligence-synthesis
    - prioritisation-frameworks
    - analytics-pipelines
tools:
- analytics_platform
- experiment_tracker
- feedback_aggregator
- roadmap_api
capabilities:
- feedback-intelligence
- experimentation-analysis
- enhancement-prioritisation
- product-analytics
routing:
  input_types:
  - intelligence_request
  - analytics_trigger
  - experiment_result
  - feedback_batch
  output_types:
  - intelligence_brief
  - prioritisation_update
  - experiment_verdict
  - analytics_report
delegation:
  can_delegate_to:
  - feedback-orchestrator
  - experimentation-orchestrator
  - enhancement-orchestrator
  - product-analytics-capability-agent
  - kpi-tracking-task-agent
  escalates_to: null
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 30000
  timeout_ms: 120000

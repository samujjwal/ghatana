id: cost-management-orchestrator
name: Cost Management Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.operations
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Detects cost anomalies, drives rightsizing and resource optimisation, advises on reserved
  capacity, and tracks cloud spending against budgets
summary: Detects cost anomalies, drives rightsizing and resource optimisation, advises on reserved capacity,
  and tracks cloud...
metadata:
  level: 1
  domain: operations
  tags:
  - orchestrator
  - cost
  - cloud-spend
  - rightsizing
  - finops
  - level1
identity:
  agentType: PLANNING
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: cost_report_request
    schema: dynamic
  - name: budget_alert
    schema: dynamic
  - name: cost_review_trigger
    schema: dynamic
  outputs:
  - name: cost_report
    schema: dynamic
  - name: optimisation_plan
    schema: dynamic
  - name: savings_projection
    schema: dynamic
  - name: budget_alert_action
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - cost-capability-agent
    - cost-anomaly-task-agent
    - rightsizing-task-agent
    - reserved-capacity-task-agent
    - budget-alert-task-agent
    - savings-report-task-agent
    escalation: operations-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - cost-anomalies
    - optimisation-actions
    - savings-realised
    - budget-events
  semantic:
    enabled: true
    categories:
    - cost-patterns
    - resource-pricing
    - reserved-strategies
  procedural:
    enabled: true
    categories:
    - rightsizing-rules
    - budget-alert-policies
    - approval-thresholds
tools:
- cloud_cost_explorer
- resource_utilisation_api
- reserved_capacity_api
- budget_tracker
capabilities:
- cost-anomaly-detection
- rightsizing
- reserved-capacity-planning
- budget-tracking
- savings-reporting
routing:
  input_types:
  - cost_report_request
  - budget_alert
  - cost_review_trigger
  output_types:
  - cost_report
  - optimisation_plan
  - savings_projection
  - budget_alert_action
delegation:
  can_delegate_to:
  - cost-capability-agent
  - cost-anomaly-task-agent
  - rightsizing-task-agent
  - reserved-capacity-task-agent
  - budget-alert-task-agent
  - savings-report-task-agent
  escalates_to: operations-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - finance-lead
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 5000
  max_latency_ms: 30000
  timeout_ms: 120000

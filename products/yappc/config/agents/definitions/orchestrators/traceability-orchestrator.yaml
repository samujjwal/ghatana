id: traceability-orchestrator
name: Traceability Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.requirements
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Manages requirements traceability: builds bidirectional trace matrices from requirements
  through design to code and tests; detects coverage gaps and orphaned artefacts'
summary: 'Manages requirements traceability: builds bidirectional trace matrices from requirements through
  design to code and t...'
metadata:
  level: 1
  domain: requirements
  tags:
  - orchestrator
  - traceability
  - trace-matrix
  - coverage
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: requirements_set
    schema: dynamic
  - name: design_artefacts
    schema: dynamic
  - name: code_artefacts
    schema: dynamic
  - name: test_cases
    schema: dynamic
  outputs:
  - name: trace_matrix
    schema: dynamic
  - name: coverage_report
    schema: dynamic
  - name: gap_analysis
    schema: dynamic
  - name: remediation_plan
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - specification-orchestrator
    - compliance-audit-orchestrator
    escalation: requirements-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 1095
    categories:
    - trace-matrices
    - coverage-snapshots
    - gap-remediations
  semantic:
    enabled: true
    categories:
    - trace-link-patterns
    - coverage-thresholds
    - artefact-types
  procedural:
    enabled: true
    categories:
    - trace-analysis-procedures
    - coverage-rules
    - remediation-workflows
tools:
- trace_link_builder
- coverage_analyzer
- matrix_generator
- gap_reporter
capabilities:
- traceability-management
- trace-matrix-generation
- coverage-analysis
- gap-detection
- remediation-planning
routing:
  input_types:
  - requirements_set
  - design_artefacts
  - code_artefacts
  - test_cases
  output_types:
  - trace_matrix
  - coverage_report
  - gap_analysis
  - remediation_plan
delegation:
  can_delegate_to:
  - specification-orchestrator
  - compliance-audit-orchestrator
  escalates_to: requirements-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 8000
  max_latency_ms: 60000
  timeout_ms: 90000

id: market-research-orchestrator
name: Market Research Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.discovery
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Conducts systematic market research: market sizing (TAM/SAM/SOM), competitive landscape
  mapping, trend analysis, and segment profiling'
summary: 'Conducts systematic market research: market sizing (TAM/SAM/SOM), competitive landscape mapping,
  trend analysis, and...'
metadata:
  level: 1
  domain: discovery
  tags:
  - orchestrator
  - market-research
  - tam
  - competitive
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: market_research_request
    schema: dynamic
  - name: competitive_question
    schema: dynamic
  - name: market_sizing_request
    schema: dynamic
  outputs:
  - name: market_research_report
    schema: dynamic
  - name: competitive_landscape
    schema: dynamic
  - name: market_sizing
    schema: dynamic
  - name: segment_profiles
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - opportunity-assessment-orchestrator
    - competitive-intelligence-task-agent
    escalation: discovery-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - market-analyses
    - competitive-snapshots
    - tam-calculations
  semantic:
    enabled: true
    categories:
    - market-data
    - competitor-profiles
    - industry-trends
    - sizing-models
  procedural:
    enabled: true
    categories:
    - market-sizing-methodologies
    - competitive-analysis-frameworks
tools:
- market_sizer
- competitor_analyzer
- trend_tracker
- segment_profiler
capabilities:
- market-sizing
- competitive-analysis
- segment-profiling
- trend-analysis
- market-opportunity-assessment
routing:
  input_types:
  - market_research_request
  - competitive_question
  - market_sizing_request
  output_types:
  - market_research_report
  - competitive_landscape
  - market_sizing
  - segment_profiles
delegation:
  can_delegate_to:
  - opportunity-assessment-orchestrator
  - competitive-intelligence-task-agent
  escalates_to: discovery-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 12000
  max_latency_ms: 90000
  timeout_ms: 120000

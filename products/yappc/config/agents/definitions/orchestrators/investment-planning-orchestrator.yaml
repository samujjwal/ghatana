id: investment-planning-orchestrator
name: Investment Planning Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.portfolio
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Manages investment allocation across the product portfolio: budget planning, ROI modelling,
  capacity forecasting, and investment governance'
summary: 'Manages investment allocation across the product portfolio: budget planning, ROI modelling,
  capacity forecasting, and...'
metadata:
  level: 1
  domain: portfolio
  tags:
  - orchestrator
  - investment
  - budget
  - roi
  - level1
identity:
  agentType: PLANNING
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: investment_request
    schema: dynamic
  - name: budget_review
    schema: dynamic
  - name: roi_assessment
    schema: dynamic
  - name: capacity_plan
    schema: dynamic
  outputs:
  - name: investment_plan
    schema: dynamic
  - name: roi_report
    schema: dynamic
  - name: budget_allocation
    schema: dynamic
  - name: capacity_forecast
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - governance-orchestrator
    - product-strategy-orchestrator
    escalation: portfolio-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 1095
    categories:
    - investment-decisions
    - budget-outcomes
    - roi-actuals
  semantic:
    enabled: true
    categories:
    - investment-models
    - roi-benchmarks
    - financial-frameworks
  procedural:
    enabled: true
    categories:
    - investment-review-procedures
    - budget-allocation-rules
tools:
- investment_evaluator
- roi_modeller
- budget_tracker
- capacity_planner
capabilities:
- investment-planning
- roi-modelling
- budget-allocation
- capacity-forecasting
- portfolio-impact-analysis
routing:
  input_types:
  - investment_request
  - budget_review
  - roi_assessment
  - capacity_plan
  output_types:
  - investment_plan
  - roi_report
  - budget_allocation
  - capacity_forecast
delegation:
  can_delegate_to:
  - governance-orchestrator
  - product-strategy-orchestrator
  escalates_to: portfolio-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - portfolio-orchestrator
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 8000
  max_latency_ms: 60000
  timeout_ms: 90000

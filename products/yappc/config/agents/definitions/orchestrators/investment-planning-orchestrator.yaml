id: investment-planning-orchestrator
name: Investment Planning Orchestrator
version: 1.0.0
description: "Manages investment allocation across the product portfolio: budget planning, ROI modelling, capacity forecasting, and investment governance"

metadata:
  level: 1
  domain: portfolio
  tags: [orchestrator, investment, budget, roi, level1]

generator:
  type: PIPELINE
  steps:
    - name: investment_intake
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.2
      max_tokens: 2500
      prompt: |
        You are the Investment Planning Orchestrator. Evaluate the investment request:

        Request: {{input}}
        Current budget allocation: {{context.budget_allocation}}
        Capacity plan: {{context.capacity}}
        Historical ROI data: {{context.roi_history}}

        Analyse:
        1. Investment ask (headcount, budget, timeline)
        2. Expected return (revenue, cost save, strategic value)
        3. Risk-adjusted NPV estimate
        4. Opportunity cost of alternatives foregone
        5. Required governance approvals

        Output as JSON: {investment_ask, expected_return, npv_estimate, opportunity_cost, approvals_needed}
    - name: roi_modelling
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Model ROI scenarios for the investment:
        Investment context: {{investment_intake}}
        Assumptions: {{context.financial_assumptions}}

        Return: {base_case_roi, bull_case_roi, bear_case_roi, payback_period, break_even_point}
    - name: portfolio_impact_analysis
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.2
      max_tokens: 2000
      prompt: |
        Analyse portfolio-level impact of this investment:
        ROI model: {{roi_modelling}}
        Existing investments: {{context.current_investments}}

        Identify: {portfolio_conflicts, synergy_opportunities, resource_contention, recommendation}

memory:
  episodic:
    enabled: true
    retention_days: 1095
    categories: [investment-decisions, budget-outcomes, roi-actuals]
  semantic:
    enabled: true
    categories: [investment-models, roi-benchmarks, financial-frameworks]
  procedural:
    enabled: true
    categories: [investment-review-procedures, budget-allocation-rules]

tools: [investment_evaluator, roi_modeller, budget_tracker, capacity_planner]

capabilities:
  - investment-planning
  - roi-modelling
  - budget-allocation
  - capacity-forecasting
  - portfolio-impact-analysis

routing:
  input_types: [investment_request, budget_review, roi_assessment, capacity_plan]
  output_types: [investment_plan, roi_report, budget_allocation, capacity_forecast]

delegation:
  can_delegate_to:
    - governance-orchestrator
    - product-strategy-orchestrator
  escalates_to: portfolio-orchestrator

governance:
  requires_approval: true
  approval_chain:
    - portfolio-orchestrator
  can_block: true
  audit_trail: comprehensive

performance:
  expected_latency_ms: 8000
  max_latency_ms: 60000
  timeout_ms: 90000

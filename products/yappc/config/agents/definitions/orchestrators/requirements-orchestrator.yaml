id: requirements-orchestrator
name: Requirements Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.requirements
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Orchestrates requirements engineering: elicitation, analysis, specification, acceptance
  criteria generation, and requirements traceability'
summary: 'Orchestrates requirements engineering: elicitation, analysis, specification, acceptance criteria
  generation, and requ...'
metadata:
  level: 1
  domain: requirements
  tags:
  - orchestrator
  - requirements
  - specification
  - acceptance-criteria
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: product_brief
    schema: dynamic
  - name: design_brief
    schema: dynamic
  - name: feature_request
    schema: dynamic
  - name: user_story
    schema: dynamic
  - name: epic
    schema: dynamic
  outputs:
  - name: requirements_spec
    schema: dynamic
  - name: acceptance_criteria
    schema: dynamic
  - name: nfr_set
    schema: dynamic
  - name: requirements_analysis_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - specification-orchestrator
    - traceability-orchestrator
    - architecture-orchestrator
    - ux-orchestrator
    escalation: product-strategy-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 1095
    categories:
    - requirements-sessions
    - specification-versions
    - requirements-changes
  semantic:
    enabled: true
    categories:
    - requirements-patterns
    - domain-glossary
    - acceptance-criteria-templates
  procedural:
    enabled: true
    categories:
    - elicitation-techniques
    - requirements-quality-rules
    - specification-templates
tools:
- requirements_extractor
- requirement_analyser
- spec_builder
- trace_matrix_builder
capabilities:
- requirements-elicitation
- requirements-analysis
- specification-generation
- acceptance-criteria-creation
- traceability-management
routing:
  input_types:
  - product_brief
  - design_brief
  - feature_request
  - user_story
  - epic
  output_types:
  - requirements_spec
  - acceptance_criteria
  - nfr_set
  - requirements_analysis_report
delegation:
  can_delegate_to:
  - specification-orchestrator
  - traceability-orchestrator
  - architecture-orchestrator
  - ux-orchestrator
  escalates_to: product-strategy-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 10000
  max_latency_ms: 90000
  timeout_ms: 120000

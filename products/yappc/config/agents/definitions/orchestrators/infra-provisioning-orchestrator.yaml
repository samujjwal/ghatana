id: infra-provisioning-orchestrator
name: Infrastructure Provisioning Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.operations
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Orchestrates IaC-driven resource provisioning, drift detection, cost-aware capacity planning,
  and infrastructure lifecycle management
summary: Orchestrates IaC-driven resource provisioning, drift detection, cost-aware capacity planning,
  and infrastructure life...
metadata:
  level: 1
  domain: operations
  tags:
  - orchestrator
  - infrastructure
  - iac
  - provisioning
  - drift
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: provisioning_request
    schema: dynamic
  - name: drift_alert
    schema: dynamic
  - name: capacity_plan_request
    schema: dynamic
  outputs:
  - name: provisioning_plan
    schema: dynamic
  - name: drift_report
    schema: dynamic
  - name: cost_analysis
    schema: dynamic
  - name: iac_execution_result
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - infra-capability-agent
    - iac-provisioning-task-agent
    - drift-detection-task-agent
    - resource-lifecycle-task-agent
    - capacity-planning-task-agent
    - cost-optimisation-task-agent
    escalation: operations-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - provisioning-records
    - drift-detections
    - cost-events
    - iac-plans
  semantic:
    enabled: true
    categories:
    - iac-templates
    - resource-topologies
    - compliance-rules
  procedural:
    enabled: true
    categories:
    - provisioning-procedures
    - rollback-plans
    - approval-gates
tools:
- iac_planner
- cloud_cost_calculator
- drift_detector
- compliance_checker
capabilities:
- iac-orchestration
- resource-provisioning
- drift-detection
- cost-aware-planning
- compliance-validation
routing:
  input_types:
  - provisioning_request
  - drift_alert
  - capacity_plan_request
  output_types:
  - provisioning_plan
  - drift_report
  - cost_analysis
  - iac_execution_result
delegation:
  can_delegate_to:
  - infra-capability-agent
  - iac-provisioning-task-agent
  - drift-detection-task-agent
  - resource-lifecycle-task-agent
  - capacity-planning-task-agent
  - cost-optimisation-task-agent
  escalates_to: operations-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - operations-lead
  - infra-security-reviewer
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 5000
  max_latency_ms: 60000
  timeout_ms: 300000

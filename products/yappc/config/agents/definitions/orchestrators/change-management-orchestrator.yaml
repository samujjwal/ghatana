id: change-management-orchestrator
name: Change Management Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.operations
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Manages change request assessment, CAB coordination, risk scoring, rollback planning, and
  post-change verification across all operational domains
summary: Manages change request assessment, CAB coordination, risk scoring, rollback planning, and post-change
  verification ac...
metadata:
  level: 1
  domain: operations
  tags:
  - orchestrator
  - change-management
  - cab
  - risk
  - rollback
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: change_request
    schema: dynamic
  - name: emergency_change_request
    schema: dynamic
  - name: change_calendar_update
    schema: dynamic
  outputs:
  - name: change_assessment
    schema: dynamic
  - name: rollback_plan
    schema: dynamic
  - name: cab_decision
    schema: dynamic
  - name: post_change_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - change-capability-agent
    - change-assessment-task-agent
    - risk-scoring-task-agent
    - cab-workflow-task-agent
    - rollback-planning-task-agent
    - post-change-verification-task-agent
    escalation: operations-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - change-requests
    - cab-decisions
    - rollbacks
    - verifications
  semantic:
    enabled: true
    categories:
    - change-patterns
    - blast-radius-maps
    - approval-policies
  procedural:
    enabled: true
    categories:
    - cab-procedures
    - risk-scoring
    - rollback-playbooks
tools:
- change_registry
- risk_scorer
- cab_workflow
- blast_radius_analyser
- maintenance_window_api
capabilities:
- change-request-assessment
- cab-coordination
- risk-scoring
- rollback-planning
- post-change-verification
routing:
  input_types:
  - change_request
  - emergency_change_request
  - change_calendar_update
  output_types:
  - change_assessment
  - rollback_plan
  - cab_decision
  - post_change_report
delegation:
  can_delegate_to:
  - change-capability-agent
  - change-assessment-task-agent
  - risk-scoring-task-agent
  - cab-workflow-task-agent
  - rollback-planning-task-agent
  - post-change-verification-task-agent
  escalates_to: operations-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - change-advisory-board
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 5000
  max_latency_ms: 30000
  timeout_ms: 86400000

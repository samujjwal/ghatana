id: security-posture-orchestrator
name: Security Posture Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.security
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Orchestrates end-to-end security posture assessment — delegates to sentinel, security-scanner-agent,
  vulnerability-scoring-agent, dependency-auditor, and security-operations-agent.
summary: Orchestrates end-to-end security posture assessment — delegates to sentinel, security-scanner-agent,
  vulnerability-sc...
metadata:
  level: 1
  domain: security
  tags:
  - orchestrator
  - security-posture
  - devsecops
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: workspace-id
    schema: dynamic
  - name: posture-request
    schema: dynamic
  outputs:
  - name: posture-report
    schema: dynamic
  - name: posture-score
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - sentinel
    - security-scanner-agent
    - vulnerability-scoring-agent
    - agent.yappc.dependency-auditor
    - security-operations-agent
    escalation: systems-architect
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - posture-assessments
    - posture-trends
  semantic:
    enabled: true
    categories:
    - posture-patterns
    - benchmark-data
  procedural:
    enabled: true
    categories:
    - assessment-workflow
    - scoring-rules
tools:
- posture_aggregator
- trend_analyzer
capabilities:
- security-posture-assessment
- multi-agent-orchestration
- posture-scoring
routing:
  input_types:
  - workspace-id
  - posture-request
  output_types:
  - posture-report
  - posture-score
delegation:
  can_delegate_to:
  - sentinel
  - security-scanner-agent
  - vulnerability-scoring-agent
  - agent.yappc.dependency-auditor
  - security-operations-agent
  escalates_to: systems-architect
governance:
  requires_approval: false
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 30000
  max_latency_ms: 120000
  timeout_ms: 180000

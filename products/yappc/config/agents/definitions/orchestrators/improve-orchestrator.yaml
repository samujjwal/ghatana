id: improve-orchestrator
name: Improve Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.improvement
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Orchestrates continuous improvement cycles — coordinates code quality analysis, performance
  profiling, tech debt reduction, dependency upgrades, and architectural fitness checks across the YAPPC
  codebase.
summary: Orchestrates continuous improvement cycles — coordinates code quality analysis, performance profiling,
  tech debt redu...
metadata:
  level: 2
  domain: improvement
  tags:
  - orchestrator
  - improvement
  - quality
  - tech-debt
  - performance
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: improvement-trigger
    schema: dynamic
  - name: quality-report
    schema: dynamic
  - name: debt-review-request
    schema: dynamic
  outputs:
  - name: improvement-report
    schema: dynamic
  - name: quality-delta
    schema: dynamic
  - name: debt-reduction-plan
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - quality-guard-agent
    - activej-expert-agent
    - fastify-expert-agent
    - react-expert-agent
    - prisma-expert-agent
    - fix-generator-agent
    - regression-test-writer-agent
    - diff-analyzer-agent
    escalation: master-orchestrator-agent
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - improvement-cycles
    - quality-trends
    - debt-reduction
  semantic:
    enabled: true
    categories:
    - improvement-patterns
    - quality-baselines
    - debt-inventory
  procedural:
    enabled: true
    categories:
    - improvement-workflows
    - prioritization-heuristics
tools:
- source_reader
- metrics_collector
- dependency_scanner
- complexity_analyzer
capabilities:
- code-quality-orchestration
- performance-improvement
- tech-debt-management
- dependency-management
routing:
  input_types:
  - improvement-trigger
  - quality-report
  - debt-review-request
  output_types:
  - improvement-report
  - quality-delta
  - debt-reduction-plan
delegation:
  can_delegate_to:
  - quality-guard-agent
  - activej-expert-agent
  - fastify-expert-agent
  - react-expert-agent
  - prisma-expert-agent
  - fix-generator-agent
  - regression-test-writer-agent
  - diff-analyzer-agent
  escalates_to: master-orchestrator-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 30000
  max_latency_ms: 300000
  timeout_ms: 600000

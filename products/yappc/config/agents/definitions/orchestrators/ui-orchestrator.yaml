id: ui-orchestrator
name: UI Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.ux
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Orchestrates UI design delivery: screen design, component design, responsive layout, visual
  design application, and design token management'
summary: 'Orchestrates UI design delivery: screen design, component design, responsive layout, visual
  design application, and d...'
metadata:
  level: 1
  domain: ux
  tags:
  - orchestrator
  - ui
  - screens
  - visual-design
  - level1
identity:
  agentType: PLANNING
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: ui_request
    schema: dynamic
  - name: ux_brief
    schema: dynamic
  - name: wireframes
    schema: dynamic
  - name: design_tokens
    schema: dynamic
  outputs:
  - name: screen_designs
    schema: dynamic
  - name: component_specs
    schema: dynamic
  - name: design_tokens
    schema: dynamic
  - name: design_handoff_package
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - design-system-orchestrator
    - interaction-design-orchestrator
    - frontend-engineering-orchestrator
    escalation: ux-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - ui-designs
    - component-iterations
    - design-reviews
  semantic:
    enabled: true
    categories:
    - ui-patterns
    - design-tokens
    - component-library
    - visual-design-decisions
  procedural:
    enabled: true
    categories:
    - ui-design-process
    - component-design-standards
    - handoff-procedures
tools:
- screen_designer
- component_designer
- token_manager
- layout_generator
capabilities:
- screen-design
- component-design
- visual-design-application
- design-token-management
- responsive-layout-design
routing:
  input_types:
  - ui_request
  - ux_brief
  - wireframes
  - design_tokens
  output_types:
  - screen_designs
  - component_specs
  - design_tokens
  - design_handoff_package
delegation:
  can_delegate_to:
  - design-system-orchestrator
  - interaction-design-orchestrator
  - frontend-engineering-orchestrator
  escalates_to: ux-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 10000
  max_latency_ms: 75000
  timeout_ms: 100000

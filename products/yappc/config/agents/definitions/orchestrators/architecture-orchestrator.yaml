id: architecture-orchestrator
name: Architecture Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.architecture
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Top-level architecture orchestrator — coordinates HLD/LLD generation, ADR management, API
  contract design, event architecture, and security/observability architecture
summary: Top-level architecture orchestrator — coordinates HLD/LLD generation, ADR management, API contract
  design, event arch...
metadata:
  level: 1
  domain: architecture
  tags:
  - orchestrator
  - architecture
  - hld
  - lld
  - adr
  - level1
identity:
  agentType: PLANNING
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: architecture_request
    schema: dynamic
  - name: requirements_set
    schema: dynamic
  - name: constraints
    schema: dynamic
  - name: design_review_request
    schema: dynamic
  outputs:
  - name: hld
    schema: dynamic
  - name: lld
    schema: dynamic
  - name: api_contracts
    schema: dynamic
  - name: event_contracts
    schema: dynamic
  - name: adr_set
    schema: dynamic
  - name: architecture_review
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - platform-architecture-orchestrator
    - plugin-architecture-orchestrator
    - runtime-architecture-orchestrator
    - domain-architecture-capability-agent
    - service-design-capability-agent
    - event-architecture-capability-agent
    - security-architecture-capability-agent
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 1095
    categories:
    - architecture-decisions
    - hld-versions
    - lld-versions
    - adr-history
  semantic:
    enabled: true
    categories:
    - architecture-patterns
    - service-catalogue
    - technology-decisions
    - adrs
  procedural:
    enabled: true
    categories:
    - architecture-review-procedures
    - design-standards
    - adr-templates
tools:
- architecture_designer
- hld_builder
- lld_builder
- adr_writer
- api_contract_builder
capabilities:
- architecture-coordination
- hld-generation
- lld-generation
- adr-management
- cross-cutting-concern-design
routing:
  input_types:
  - architecture_request
  - requirements_set
  - constraints
  - design_review_request
  output_types:
  - hld
  - lld
  - api_contracts
  - event_contracts
  - adr_set
  - architecture_review
delegation:
  can_delegate_to:
  - platform-architecture-orchestrator
  - plugin-architecture-orchestrator
  - runtime-architecture-orchestrator
  - domain-architecture-capability-agent
  - service-design-capability-agent
  - event-architecture-capability-agent
  - security-architecture-capability-agent
  escalates_to: null
governance:
  requires_approval: true
  approval_chain:
  - portfolio-orchestrator
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 20000
  max_latency_ms: 180000
  timeout_ms: 240000

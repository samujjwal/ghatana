id: concept-design-orchestrator
name: Concept Design Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.ideation
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Develops product concepts into detailed design briefs: feature decomposition, user flow
  sketching, value proposition articulation, and prototype planning'
summary: 'Develops product concepts into detailed design briefs: feature decomposition, user flow sketching,
  value proposition...'
metadata:
  level: 1
  domain: ideation
  tags:
  - orchestrator
  - concept-design
  - prototype
  - feature-brief
  - level1
identity:
  agentType: PLANNING
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: concept
    schema: dynamic
  - name: ideation_output
    schema: dynamic
  - name: shortlisted_idea
    schema: dynamic
  outputs:
  - name: design_brief
    schema: dynamic
  - name: feature_set
    schema: dynamic
  - name: user_flows
    schema: dynamic
  - name: prototype_plan
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - product-framing-orchestrator
    - ux-orchestrator
    - requirements-orchestrator
    escalation: ideation-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - concept-designs
    - feature-briefs
    - prototype-outcomes
  semantic:
    enabled: true
    categories:
    - design-patterns
    - ux-conventions
    - component-library-knowledge
  procedural:
    enabled: true
    categories:
    - concept-design-templates
    - feature-decomposition-methods
tools:
- concept_expander
- feature_decomposer
- prototype_planner
- value_prop_builder
capabilities:
- concept-design
- feature-brief-creation
- user-flow-design
- prototype-planning
- value-proposition-articulation
routing:
  input_types:
  - concept
  - ideation_output
  - shortlisted_idea
  output_types:
  - design_brief
  - feature_set
  - user_flows
  - prototype_plan
delegation:
  can_delegate_to:
  - product-framing-orchestrator
  - ux-orchestrator
  - requirements-orchestrator
  escalates_to: ideation-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 12000
  max_latency_ms: 90000
  timeout_ms: 120000

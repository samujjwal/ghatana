id: agile-execution-orchestrator
name: Agile Execution Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.engineering
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Manages agile ceremonies and execution insights: daily stand-up extraction, sprint health
  scoring, retrospective facilitation, and backlog grooming'
summary: 'Manages agile ceremonies and execution insights: daily stand-up extraction, sprint health scoring,
  retrospective faci...'
metadata:
  level: 1
  domain: engineering
  tags:
  - orchestrator
  - agile
  - scrum
  - retrospective
  - velocity
  - level1
identity:
  agentType: PLANNING
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: sprint_data
    schema: dynamic
  - name: ceremony_request
    schema: dynamic
  - name: velocity_metrics
    schema: dynamic
  - name: retro_notes
    schema: dynamic
  - name: backlog
    schema: dynamic
  outputs:
  - name: sprint_health_report
    schema: dynamic
  - name: ceremony_summary
    schema: dynamic
  - name: action_items
    schema: dynamic
  - name: backlog_refinement
    schema: dynamic
  - name: velocity_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - work-management-orchestrator
    - engineering-metrics-capability-agent
    - retrospective-analysis-task-agent
    escalation: engineering-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - sprint-reviews
    - retrospective-records
    - standup-summaries
  semantic:
    enabled: true
    categories:
    - agile-patterns
    - improvement-themes
    - team-health-signals
  procedural:
    enabled: true
    categories:
    - ceremony-facilitation-guides
    - retro-formats
    - grooming-procedures
tools:
- sprint_health_scorer
- ceremony_facilitator
- velocity_tracker
- improvement_tracker
capabilities:
- agile-ceremony-facilitation
- sprint-health-assessment
- velocity-tracking
- retrospective-facilitation
- backlog-grooming
routing:
  input_types:
  - sprint_data
  - ceremony_request
  - velocity_metrics
  - retro_notes
  - backlog
  output_types:
  - sprint_health_report
  - ceremony_summary
  - action_items
  - backlog_refinement
  - velocity_report
delegation:
  can_delegate_to:
  - work-management-orchestrator
  - engineering-metrics-capability-agent
  - retrospective-analysis-task-agent
  escalates_to: engineering-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 4000
  max_latency_ms: 30000
  timeout_ms: 45000

id: experimentation-orchestrator
name: Experimentation Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.product-intelligence
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Manages full experiment lifecycle: hypothesis framing, A/B and multivariate test setup,
  traffic allocation, statistical significance analysis, and verdicts'
summary: 'Manages full experiment lifecycle: hypothesis framing, A/B and multivariate test setup, traffic
  allocation, statistic...'
metadata:
  level: 1
  domain: product-intelligence
  tags:
  - orchestrator
  - experimentation
  - ab-testing
  - statistics
  - hypothesis
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: experiment_request
    schema: dynamic
  - name: experiment_results_ready
    schema: dynamic
  - name: experiment_stop_trigger
    schema: dynamic
  outputs:
  - name: experiment_spec
    schema: dynamic
  - name: experiment_results_report
    schema: dynamic
  - name: verdict
    schema: dynamic
  - name: learn_summary
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - experimentation-capability-agent
    - experiment-design-task-agent
    - ab-test-setup-task-agent
    - statistical-analysis-task-agent
    - experiment-verdict-task-agent
    - multivariate-test-task-agent
    escalation: product-intelligence-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - experiments
    - designs
    - results
    - verdicts
  semantic:
    enabled: true
    categories:
    - experiment-patterns
    - metric-definitions
    - hypothesis-library
  procedural:
    enabled: true
    categories:
    - power-analysis
    - significance-testing
    - stop-rules
tools:
- experiment_platform
- stats_engine
- traffic_allocator
- metric_store
capabilities:
- hypothesis-framing
- experiment-design
- ab-test-setup
- statistical-analysis
- experiment-verdict
routing:
  input_types:
  - experiment_request
  - experiment_results_ready
  - experiment_stop_trigger
  output_types:
  - experiment_spec
  - experiment_results_report
  - verdict
  - learn_summary
delegation:
  can_delegate_to:
  - experimentation-capability-agent
  - experiment-design-task-agent
  - ab-test-setup-task-agent
  - statistical-analysis-task-agent
  - experiment-verdict-task-agent
  - multivariate-test-task-agent
  escalates_to: product-intelligence-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - product-lead
  - data-scientist
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 5000
  max_latency_ms: 30000
  timeout_ms: 120000

id: on-call-orchestrator
name: On-Call Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.operations
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Manages on-call alert triage, escalation paths, runbook retrieval, incident handoff, and
  on-call load balancing to reduce engineer burnout
summary: Manages on-call alert triage, escalation paths, runbook retrieval, incident handoff, and on-call
  load balancing to re...
metadata:
  level: 1
  domain: operations
  tags:
  - orchestrator
  - on-call
  - alerts
  - escalation
  - pagerduty
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: alert_event
    schema: dynamic
  - name: pagerduty_webhook
    schema: dynamic
  - name: monitoring_trigger
    schema: dynamic
  outputs:
  - name: escalation_action
    schema: dynamic
  - name: runbook_result
    schema: dynamic
  - name: incident_created
    schema: dynamic
  - name: on_call_notification
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - on-call-capability-agent
    - alert-triage-task-agent
    - escalation-task-agent
    - runbook-execution-task-agent
    - auto-remediation-task-agent
    - incident-handoff-task-agent
    escalation: operations-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - alerts
    - escalations
    - runbook-executions
    - on-call-handoffs
  semantic:
    enabled: true
    categories:
    - alert-patterns
    - runbooks
    - escalation-policies
    - on-call-schedules
  procedural:
    enabled: true
    categories:
    - alert-triage-rules
    - escalation-chains
    - auto-remediation-scripts
tools:
- alerting_platform
- pagerduty_api
- runbook_executor
- incident_tracker
- on_call_scheduler
capabilities:
- alert-triage
- escalation-management
- runbook-retrieval
- auto-remediation
- incident-handoff
routing:
  input_types:
  - alert_event
  - pagerduty_webhook
  - monitoring_trigger
  output_types:
  - escalation_action
  - runbook_result
  - incident_created
  - on_call_notification
delegation:
  can_delegate_to:
  - on-call-capability-agent
  - alert-triage-task-agent
  - escalation-task-agent
  - runbook-execution-task-agent
  - auto-remediation-task-agent
  - incident-handoff-task-agent
  escalates_to: operations-orchestrator
governance:
  requires_approval: false
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 500
  max_latency_ms: 3000
  timeout_ms: 10000

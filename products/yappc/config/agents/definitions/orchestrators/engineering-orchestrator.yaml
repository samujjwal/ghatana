id: engineering-orchestrator
name: Engineering Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.engineering
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Top-level engineering orchestrator coordinating delivery planning, agile execution, frontend/backend
  implementation, code quality, and developer experience
summary: Top-level engineering orchestrator coordinating delivery planning, agile execution, frontend/backend
  implementation,...
metadata:
  level: 1
  domain: engineering
  tags:
  - orchestrator
  - engineering
  - coordination
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: engineering_request
    schema: dynamic
  - name: feature_plan
    schema: dynamic
  - name: sprint_plan
    schema: dynamic
  - name: implementation_task
    schema: dynamic
  - name: code_review_request
    schema: dynamic
  outputs:
  - name: implementation_plan
    schema: dynamic
  - name: sprint_board
    schema: dynamic
  - name: code_review
    schema: dynamic
  - name: quality_report
    schema: dynamic
  - name: engineering_summary
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - delivery-planning-orchestrator
    - agile-execution-orchestrator
    - frontend-engineering-orchestrator
    - backend-engineering-orchestrator
    - work-management-orchestrator
    - code-review-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - engineering-tasks
    - code-changes
    - sprint-outcomes
  semantic:
    enabled: true
    categories:
    - codebase-knowledge
    - engineering-patterns
    - quality-standards
  procedural:
    enabled: true
    categories:
    - engineering-workflows
    - quality-gate-rules
    - review-standards
tools:
- task_delegator
- quality_gate_checker
- sprint_tracker
- code_context_builder
capabilities:
- engineering-coordination
- delivery-planning
- implementation-oversight
- code-quality-enforcement
- developer-experience
routing:
  input_types:
  - engineering_request
  - feature_plan
  - sprint_plan
  - implementation_task
  - code_review_request
  output_types:
  - implementation_plan
  - sprint_board
  - code_review
  - quality_report
  - engineering_summary
delegation:
  can_delegate_to:
  - delivery-planning-orchestrator
  - agile-execution-orchestrator
  - frontend-engineering-orchestrator
  - backend-engineering-orchestrator
  - work-management-orchestrator
  - code-review-orchestrator
  escalates_to: null
governance:
  requires_approval: false
  can_block: true
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 60000
  timeout_ms: 90000

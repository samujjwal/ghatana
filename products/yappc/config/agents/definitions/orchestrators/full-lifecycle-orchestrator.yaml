id: full-lifecycle-orchestrator
name: Full Lifecycle Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.lifecycle
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Orchestrates a complete YAPPC lifecycle run for a development task — routes through all 8
  stages (intent→context→plan→execute→verify→observe→learn→institutionalize) by delegating to appropriate
  agents at each stage.
summary: Orchestrates a complete YAPPC lifecycle run for a development task — routes through all 8 stages
  (intent→context→plan...
metadata:
  level: 1
  domain: lifecycle
  tags:
  - orchestrator
  - lifecycle
  - sdlc
  - strategic
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: task-request
    schema: dynamic
  - name: project-id
    schema: dynamic
  - name: workspace-id
    schema: dynamic
  outputs:
  - name: lifecycle-result
    schema: dynamic
  - name: artifacts
    schema: dynamic
  - name: metrics
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - products-officer
    - context-gathering-agent
    - systems-architect
    - java-expert
    - react-expert
    - test-strategist
    - sentinel
    - monitoring-agent
    - institutionalize-agent
    escalation: master-orchestrator-agent
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - lifecycle-runs
    - stage-outputs
  semantic:
    enabled: true
    categories:
    - lifecycle-patterns
    - workflow-optimizations
  procedural:
    enabled: true
    categories:
    - stage-routing-rules
    - transition-criteria
tools:
- lifecycle_coordinator
- artifact_manager
- metrics_collector
capabilities:
- full-lifecycle-orchestration
- stage-routing
- multi-agent-orchestration
routing:
  input_types:
  - task-request
  - project-id
  - workspace-id
  output_types:
  - lifecycle-result
  - artifacts
  - metrics
delegation:
  can_delegate_to:
  - products-officer
  - context-gathering-agent
  - systems-architect
  - java-expert
  - react-expert
  - test-strategist
  - sentinel
  - monitoring-agent
  - institutionalize-agent
  escalates_to: master-orchestrator-agent
governance:
  requires_approval: false
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 60000
  max_latency_ms: 3600000
  timeout_ms: 7200000

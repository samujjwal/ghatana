id: backend-engineering-orchestrator
name: Backend Engineering Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.engineering
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Orchestrates backend engineering: API implementation, domain service logic, repository patterns,
  data migrations, messaging integration, and service testing'
summary: 'Orchestrates backend engineering: API implementation, domain service logic, repository patterns,
  data migrations, mes...'
metadata:
  level: 1
  domain: engineering
  tags:
  - orchestrator
  - backend
  - api
  - domain-logic
  - level1
identity:
  agentType: PLANNING
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: backend_task
    schema: dynamic
  - name: api_spec
    schema: dynamic
  - name: domain_model
    schema: dynamic
  - name: database_change_request
    schema: dynamic
  outputs:
  - name: api_implementation
    schema: dynamic
  - name: service_logic
    schema: dynamic
  - name: data_layer
    schema: dynamic
  - name: migration_scripts
    schema: dynamic
  - name: integration_tests
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - backend-capability-agent
    - api-implementation-task-agent
    - domain-logic-task-agent
    - data-access-task-agent
    - code-review-orchestrator
    escalation: engineering-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - backend-implementations
    - api-versions
    - domain-changes
  semantic:
    enabled: true
    categories:
    - api-patterns
    - domain-patterns
    - repository-patterns
    - messaging-patterns
  procedural:
    enabled: true
    categories:
    - backend-dev-standards
    - api-naming-conventions
    - error-handling-rules
tools:
- api_builder
- service_generator
- migration_runner
- test_orchestrator
- db_schema_analyser
capabilities:
- backend-engineering
- api-implementation
- domain-logic-implementation
- data-access-layer
- messaging-integration
routing:
  input_types:
  - backend_task
  - api_spec
  - domain_model
  - database_change_request
  output_types:
  - api_implementation
  - service_logic
  - data_layer
  - migration_scripts
  - integration_tests
delegation:
  can_delegate_to:
  - backend-capability-agent
  - api-implementation-task-agent
  - domain-logic-task-agent
  - data-access-task-agent
  - code-review-orchestrator
  escalates_to: engineering-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 10000
  max_latency_ms: 90000
  timeout_ms: 120000

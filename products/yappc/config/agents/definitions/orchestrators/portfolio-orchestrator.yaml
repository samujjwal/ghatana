id: portfolio-orchestrator
name: Portfolio Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.portfolio
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Top-level portfolio orchestrator — coordinates product portfolio strategy, investment planning,
  OKR alignment, and governance across all products and initiatives
summary: Top-level portfolio orchestrator — coordinates product portfolio strategy, investment planning,
  OKR alignment, and go...
metadata:
  level: 1
  domain: portfolio
  tags:
  - orchestrator
  - portfolio
  - strategy
  - level1
identity:
  agentType: PLANNING
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: portfolio_request
    schema: dynamic
  - name: initiative_proposal
    schema: dynamic
  - name: okr_review
    schema: dynamic
  - name: investment_proposal
    schema: dynamic
  outputs:
  - name: portfolio_decision
    schema: dynamic
  - name: investment_plan
    schema: dynamic
  - name: okr_alignment_report
    schema: dynamic
  - name: governance_record
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - product-strategy-orchestrator
    - investment-planning-orchestrator
    - governance-orchestrator
    - market-research-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 1095
    categories:
    - portfolio-decisions
    - investment-history
    - governance-outcomes
  semantic:
    enabled: true
    categories:
    - portfolio-patterns
    - strategic-frameworks
    - okr-history
    - industry-benchmarks
  procedural:
    enabled: true
    categories:
    - portfolio-review-procedures
    - governance-workflows
    - investment-criteria
tools:
- portfolio_manager
- okr_tracker
- investment_evaluator
- governance_gateway
capabilities:
- portfolio-strategy
- investment-planning
- okr-management
- strategic-alignment
- governance-coordination
routing:
  input_types:
  - portfolio_request
  - initiative_proposal
  - okr_review
  - investment_proposal
  output_types:
  - portfolio_decision
  - investment_plan
  - okr_alignment_report
  - governance_record
delegation:
  can_delegate_to:
  - product-strategy-orchestrator
  - investment-planning-orchestrator
  - governance-orchestrator
  - market-research-orchestrator
  escalates_to: null
governance:
  requires_approval: true
  approval_chain:
  - investment-planning-orchestrator
  - governance-orchestrator
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 10000
  max_latency_ms: 60000
  timeout_ms: 90000

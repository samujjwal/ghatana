id: ai-orchestrator
name: AI Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.ai
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Coordinates all AI/ML capabilities: search, memory management, LLM integration, data pipelines,
  agent runtime, and AI quality evaluation'
summary: 'Coordinates all AI/ML capabilities: search, memory management, LLM integration, data pipelines,
  agent runtime, and AI...'
metadata:
  level: 1
  domain: ai
  tags:
  - orchestrator
  - ai
  - llm
  - memory
  - search
  - level1
identity:
  agentType: PLANNING
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: ai_task
    schema: dynamic
  - name: llm_request
    schema: dynamic
  - name: search_request
    schema: dynamic
  - name: memory_request
    schema: dynamic
  - name: inference_request
    schema: dynamic
  outputs:
  - name: ai_response
    schema: dynamic
  - name: search_results
    schema: dynamic
  - name: memory_result
    schema: dynamic
  - name: quality_evaluation_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - search-orchestrator
    - agent-runtime-orchestrator
    - memory-orchestrator
    - data-pipeline-capability-agent
    - llm-integration-capability-agent
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - ai-requests
    - model-calls
    - quality-evaluations
    - cost-records
  semantic:
    enabled: true
    categories:
    - model-benchmarks
    - capability-patterns
    - cost-models
  procedural:
    enabled: true
    categories:
    - model-selection-rules
    - quality-thresholds
    - fallback-procedures
tools:
- ai_router
- model_selector
- quality_evaluator
- cost_tracker
capabilities:
- ai-coordination
- llm-integration
- search-integration
- memory-management
- quality-evaluation
routing:
  input_types:
  - ai_task
  - llm_request
  - search_request
  - memory_request
  - inference_request
  output_types:
  - ai_response
  - search_results
  - memory_result
  - quality_evaluation_report
delegation:
  can_delegate_to:
  - search-orchestrator
  - agent-runtime-orchestrator
  - memory-orchestrator
  - data-pipeline-capability-agent
  - llm-integration-capability-agent
  escalates_to: null
governance:
  requires_approval: false
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 2000
  max_latency_ms: 30000
  timeout_ms: 60000

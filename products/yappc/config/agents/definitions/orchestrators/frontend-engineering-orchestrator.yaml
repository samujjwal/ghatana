id: frontend-engineering-orchestrator
name: Frontend Engineering Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.engineering
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Orchestrates frontend engineering: component generation, UI logic, state management, accessibility
  auditing, performance optimisation, and Storybook management'
summary: 'Orchestrates frontend engineering: component generation, UI logic, state management, accessibility
  auditing, performa...'
metadata:
  level: 1
  domain: engineering
  tags:
  - orchestrator
  - frontend
  - react
  - typescript
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: frontend_task
    schema: dynamic
  - name: ui_spec
    schema: dynamic
  - name: component_request
    schema: dynamic
  - name: a11y_audit_request
    schema: dynamic
  outputs:
  - name: component_code
    schema: dynamic
  - name: storybook_stories
    schema: dynamic
  - name: a11y_report
    schema: dynamic
  - name: performance_report
    schema: dynamic
  - name: typescript_types
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - frontend-capability-agent
    - component-generation-task-agent
    - a11y-audit-task-agent
    - design-system-orchestrator
    escalation: engineering-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - frontend-implementations
    - component-reviews
    - performance-audits
  semantic:
    enabled: true
    categories:
    - component-patterns
    - react-patterns
    - accessibility-rules
    - performance-heuristics
  procedural:
    enabled: true
    categories:
    - component-development-standards
    - a11y-checklist
    - performance-budgets
tools:
- component_generator
- storybook_writer
- a11y_auditor
- bundle_analyzer
- typescript_checker
capabilities:
- frontend-engineering
- component-generation
- state-management
- accessibility-enforcement
- performance-optimisation
routing:
  input_types:
  - frontend_task
  - ui_spec
  - component_request
  - a11y_audit_request
  output_types:
  - component_code
  - storybook_stories
  - a11y_report
  - performance_report
  - typescript_types
delegation:
  can_delegate_to:
  - frontend-capability-agent
  - component-generation-task-agent
  - a11y-audit-task-agent
  - design-system-orchestrator
  escalates_to: engineering-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 8000
  max_latency_ms: 60000
  timeout_ms: 90000

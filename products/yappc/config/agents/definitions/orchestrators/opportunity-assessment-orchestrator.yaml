id: opportunity-assessment-orchestrator
name: Opportunity Assessment Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.discovery
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Evaluates and scores product opportunities: demand validation, feasibility assessment, strategic
  fit scoring, and opportunity prioritisation'
summary: 'Evaluates and scores product opportunities: demand validation, feasibility assessment, strategic
  fit scoring, and opp...'
metadata:
  level: 1
  domain: discovery
  tags:
  - orchestrator
  - opportunity
  - assessment
  - prioritisation
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: opportunity_request
    schema: dynamic
  - name: discovery_output
    schema: dynamic
  - name: market_signal
    schema: dynamic
  - name: customer_pain
    schema: dynamic
  outputs:
  - name: opportunity_score
    schema: dynamic
  - name: assessment_report
    schema: dynamic
  - name: prioritised_opportunities
    schema: dynamic
  - name: ice_scores
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - ideation-orchestrator
    - product-strategy-orchestrator
    escalation: discovery-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - opportunity-assessments
    - scored-opportunities
    - portfolio-decisions
  semantic:
    enabled: true
    categories:
    - opportunity-patterns
    - ice-benchmarks
    - strategic-priorities
  procedural:
    enabled: true
    categories:
    - opportunity-scoring-rules
    - feasibility-criteria
tools:
- opportunity_scorer
- demand_validator
- feasibility_assessor
- ice_calculator
capabilities:
- opportunity-framing
- demand-validation
- feasibility-assessment
- opportunity-scoring
- prioritisation
routing:
  input_types:
  - opportunity_request
  - discovery_output
  - market_signal
  - customer_pain
  output_types:
  - opportunity_score
  - assessment_report
  - prioritised_opportunities
  - ice_scores
delegation:
  can_delegate_to:
  - ideation-orchestrator
  - product-strategy-orchestrator
  escalates_to: discovery-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 8000
  max_latency_ms: 60000
  timeout_ms: 90000

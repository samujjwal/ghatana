id: sre-orchestrator
name: SRE Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.operations
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Coordinates SLO management, error budget tracking, toil reduction, runbook automation, reliability
  review, and post-incident learning
summary: Coordinates SLO management, error budget tracking, toil reduction, runbook automation, reliability
  review, and post-i...
metadata:
  level: 1
  domain: operations
  tags:
  - orchestrator
  - sre
  - slo
  - reliability
  - toil
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: slo_alert
    schema: dynamic
  - name: reliability_review_request
    schema: dynamic
  - name: post_incident_request
    schema: dynamic
  - name: toil_report
    schema: dynamic
  outputs:
  - name: reliability_action_plan
    schema: dynamic
  - name: runbook_result
    schema: dynamic
  - name: toil_automation_spec
    schema: dynamic
  - name: post_incident_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - sre-capability-agent
    - slo-management-task-agent
    - error-budget-task-agent
    - toil-automation-task-agent
    - runbook-execution-task-agent
    - post-incident-review-task-agent
    - on-call-orchestrator
    escalation: operations-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - slo-events
    - error-budget-burns
    - incidents
    - toil-records
    - runbook-executions
  semantic:
    enabled: true
    categories:
    - runbooks
    - reliability-patterns
    - slo-definitions
  procedural:
    enabled: true
    categories:
    - incident-response
    - slo-defence
    - toil-triage
tools:
- slo_dashboard
- error_budget_tracker
- runbook_executor
- toil_analyser
capabilities:
- slo-management
- error-budget-tracking
- toil-analysis
- runbook-automation
- post-incident-review
routing:
  input_types:
  - slo_alert
  - reliability_review_request
  - post_incident_request
  - toil_report
  output_types:
  - reliability_action_plan
  - runbook_result
  - toil_automation_spec
  - post_incident_report
delegation:
  can_delegate_to:
  - sre-capability-agent
  - slo-management-task-agent
  - error-budget-task-agent
  - toil-automation-task-agent
  - runbook-execution-task-agent
  - post-incident-review-task-agent
  - on-call-orchestrator
  escalates_to: operations-orchestrator
governance:
  requires_approval: false
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 60000

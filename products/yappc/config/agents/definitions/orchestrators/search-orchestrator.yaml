id: search-orchestrator
name: Search Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.ai
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Coordinates vector search, full-text search, semantic hybrid search, relevance evaluation,
  and re-ranking pipelines
summary: Coordinates vector search, full-text search, semantic hybrid search, relevance evaluation, and
  re-ranking pipelines
metadata:
  level: 1
  domain: ai
  tags:
  - orchestrator
  - search
  - vector
  - semantic
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: search_request
    schema: dynamic
  - name: retrieval_task
    schema: dynamic
  - name: query
    schema: dynamic
  outputs:
  - name: search_results
    schema: dynamic
  - name: ranked_documents
    schema: dynamic
  - name: relevance_report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - search-capability-agent
    - vector-search-task-agent
    - hybrid-search-task-agent
    - re-ranking-task-agent
    - query-analysis-task-agent
    escalation: ai-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 60
    categories:
    - search-queries
    - retrieval-results
    - relevance-scores
  semantic:
    enabled: true
    categories:
    - query-patterns
    - collection-schemas
    - relevance-benchmarks
  procedural:
    enabled: true
    categories:
    - search-strategies
    - reranking-rules
    - fusion-algorithms
tools:
- vector_db_search
- full_text_search
- embedding_service
- reranker
- hybrid_fusion
capabilities:
- vector-search
- hybrid-search
- semantic-retrieval
- re-ranking
- query-understanding
routing:
  input_types:
  - search_request
  - retrieval_task
  - query
  output_types:
  - search_results
  - ranked_documents
  - relevance_report
delegation:
  can_delegate_to:
  - search-capability-agent
  - vector-search-task-agent
  - hybrid-search-task-agent
  - re-ranking-task-agent
  - query-analysis-task-agent
  escalates_to: ai-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 500
  max_latency_ms: 3000
  timeout_ms: 10000

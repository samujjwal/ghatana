id: memory-orchestrator
name: Memory Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.ai
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Manages episodic capture, semantic encoding and retrieval, procedural knowledge application,
  and preference management across agent memory tiers
summary: Manages episodic capture, semantic encoding and retrieval, procedural knowledge application,
  and preference managemen...
metadata:
  level: 1
  domain: ai
  tags:
  - orchestrator
  - memory
  - episodic
  - semantic
  - procedural
  - level1
identity:
  agentType: PLANNING
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: memory_write_request
    schema: dynamic
  - name: memory_read_request
    schema: dynamic
  - name: memory_reflect_request
    schema: dynamic
  - name: preference_update
    schema: dynamic
  outputs:
  - name: memory_record
    schema: dynamic
  - name: retrieved_context
    schema: dynamic
  - name: reflection_summary
    schema: dynamic
  - name: preference_ack
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - memory-capability-agent
    - episodic-memory-task-agent
    - semantic-memory-task-agent
    - procedural-memory-task-agent
    - preference-task-agent
    - memory-reflection-task-agent
    escalation: ai-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - memory-ops
    - retrieval-queries
    - synthesis-outputs
  semantic:
    enabled: true
    categories:
    - memory-schemas
    - entity-types
    - policy-patterns
  procedural:
    enabled: true
    categories:
    - retention-rules
    - retrieval-algorithms
    - synthesis-procedures
tools:
- episodic_store
- semantic_vector_db
- procedural_policy_store
- memory_reflector
capabilities:
- episodic-memory-capture
- semantic-memory-retrieval
- procedural-knowledge-management
- preference-management
- memory-reflection
routing:
  input_types:
  - memory_write_request
  - memory_read_request
  - memory_reflect_request
  - preference_update
  output_types:
  - memory_record
  - retrieved_context
  - reflection_summary
  - preference_ack
delegation:
  can_delegate_to:
  - memory-capability-agent
  - episodic-memory-task-agent
  - semantic-memory-task-agent
  - procedural-memory-task-agent
  - preference-task-agent
  - memory-reflection-task-agent
  escalates_to: ai-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 300
  max_latency_ms: 5000
  timeout_ms: 15000

id: deploy-orchestrator
name: Deploy Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.deployment
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Orchestrates end-to-end deployment pipelines — coordinates artifact building, SBOM generation,
  artifact signing, environment provisioning, canary/blue-green rollout, smoke tests, and rollback decisions
  across all YAPPC deployment targets (JVM, Node, Tauri).
summary: Orchestrates end-to-end deployment pipelines — coordinates artifact building, SBOM generation,
  artifact signing, envi...
metadata:
  level: 2
  domain: deployment
  tags:
  - orchestrator
  - deployment
  - ci-cd
  - rollout
  - canary
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: deploy-request
    schema: dynamic
  - name: release-candidate
    schema: dynamic
  - name: rollback-trigger
    schema: dynamic
  outputs:
  - name: deployment-report
    schema: dynamic
  - name: rollout-status
    schema: dynamic
  - name: rollback-report
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - release-gate-agent
    - sbom-generator-agent
    - artifact-signer-agent
    - repo-integration-agent
    - database-integration-agent
    - observability-integration-agent
    - secret-store-integration-agent
    - artifact-store-integration-agent
    escalation: master-orchestrator-agent
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - deployments
    - rollbacks
    - incidents
  semantic:
    enabled: true
    categories:
    - deployment-patterns
    - failure-modes
    - environment-configs
  procedural:
    enabled: true
    categories:
    - rollout-procedures
    - rollback-procedures
    - smoke-test-suites
tools:
- deployment_coordinator
- environment_manager
- artifact_registry
- health_checker
capabilities:
- deployment-orchestration
- rollout-management
- rollback-management
- environment-provisioning
routing:
  input_types:
  - deploy-request
  - release-candidate
  - rollback-trigger
  output_types:
  - deployment-report
  - rollout-status
  - rollback-report
delegation:
  can_delegate_to:
  - release-gate-agent
  - sbom-generator-agent
  - artifact-signer-agent
  - repo-integration-agent
  - database-integration-agent
  - observability-integration-agent
  - secret-store-integration-agent
  - artifact-store-integration-agent
  escalates_to: master-orchestrator-agent
governance:
  requires_approval: true
  approval_chain:
  - release-gate-agent
  - sentinel
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 60000
  max_latency_ms: 1800000
  timeout_ms: 3600000

id: product-strategy-orchestrator
name: Product Strategy Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.portfolio
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Drives product strategy: vision articulation, market positioning, product-market fit analysis,
  strategic roadmap, and north-star metric definition'
summary: 'Drives product strategy: vision articulation, market positioning, product-market fit analysis,
  strategic roadmap, and...'
metadata:
  level: 1
  domain: portfolio
  tags:
  - orchestrator
  - product-strategy
  - vision
  - roadmap
  - level1
identity:
  agentType: PLANNING
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: strategy_request
    schema: dynamic
  - name: market_update
    schema: dynamic
  - name: competitive_alert
    schema: dynamic
  - name: vision_review
    schema: dynamic
  outputs:
  - name: strategy_document
    schema: dynamic
  - name: vision_statement
    schema: dynamic
  - name: roadmap
    schema: dynamic
  - name: positioning_brief
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - market-research-orchestrator
    - opportunity-assessment-orchestrator
    - discovery-orchestrator
    escalation: portfolio-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 1095
    categories:
    - strategy-decisions
    - market-analyses
    - competitive-moves
  semantic:
    enabled: true
    categories:
    - strategic-frameworks
    - market-knowledge
    - competitor-profiles
    - positioning-models
  procedural:
    enabled: true
    categories:
    - strategy-review-cadence
    - market-analysis-procedures
tools:
- market_analyzer
- competitive_intelligence_tool
- vision_builder
- roadmap_planner
capabilities:
- product-strategy
- market-analysis
- vision-definition
- roadmap-planning
- north-star-metric-definition
routing:
  input_types:
  - strategy_request
  - market_update
  - competitive_alert
  - vision_review
  output_types:
  - strategy_document
  - vision_statement
  - roadmap
  - positioning_brief
delegation:
  can_delegate_to:
  - market-research-orchestrator
  - opportunity-assessment-orchestrator
  - discovery-orchestrator
  escalates_to: portfolio-orchestrator
governance:
  requires_approval: true
  approval_chain:
  - portfolio-orchestrator
  can_block: false
  audit_trail: comprehensive
performance:
  expected_latency_ms: 15000
  max_latency_ms: 90000
  timeout_ms: 120000

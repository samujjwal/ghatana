id: discovery-orchestrator
name: Discovery Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.discovery
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Orchestrates the discovery phase: market research, customer interviews, opportunity mapping,
  and synthesis into product opportunities'
summary: 'Orchestrates the discovery phase: market research, customer interviews, opportunity mapping,
  and synthesis into produ...'
metadata:
  level: 1
  domain: discovery
  tags:
  - orchestrator
  - discovery
  - research
  - phase0
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: discovery_request
    schema: dynamic
  - name: research_focus
    schema: dynamic
  - name: customer_segment
    schema: dynamic
  - name: market_question
    schema: dynamic
  outputs:
  - name: discovery_report
    schema: dynamic
  - name: opportunity_brief
    schema: dynamic
  - name: validated_hypotheses
    schema: dynamic
  - name: research_plan
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - market-research-orchestrator
    - customer-insight-orchestrator
    - opportunity-assessment-orchestrator
    - ideation-orchestrator
    escalation: portfolio-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - discovery-sessions
    - interview-summaries
    - opportunity-backlogs
  semantic:
    enabled: true
    categories:
    - discovery-patterns
    - market-knowledge
    - customer-archetypes
  procedural:
    enabled: true
    categories:
    - discovery-methods
    - interview-guides
    - synthesis-templates
tools:
- research_planner
- interview_synthesizer
- opportunity_mapper
- market_analyzer
capabilities:
- discovery-orchestration
- research-planning
- customer-insight-synthesis
- opportunity-mapping
- market-analysis
routing:
  input_types:
  - discovery_request
  - research_focus
  - customer_segment
  - market_question
  output_types:
  - discovery_report
  - opportunity_brief
  - validated_hypotheses
  - research_plan
delegation:
  can_delegate_to:
  - market-research-orchestrator
  - customer-insight-orchestrator
  - opportunity-assessment-orchestrator
  - ideation-orchestrator
  escalates_to: portfolio-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 15000
  max_latency_ms: 120000
  timeout_ms: 180000

id: governance-orchestrator
name: Governance Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.portfolio
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Manages product governance: policy enforcement, compliance gate coordination, approval workflows,
  risk escalation, and audit trail management'
summary: 'Manages product governance: policy enforcement, compliance gate coordination, approval workflows,
  risk escalation, an...'
metadata:
  level: 1
  domain: portfolio
  tags:
  - orchestrator
  - governance
  - compliance
  - approvals
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: mission-critical
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: governance_request
    schema: dynamic
  - name: policy_check
    schema: dynamic
  - name: approval_request
    schema: dynamic
  - name: compliance_gate
    schema: dynamic
  outputs:
  - name: governance_decision
    schema: dynamic
  - name: approval_record
    schema: dynamic
  - name: compliance_report
    schema: dynamic
  - name: audit_trail
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - compliance-audit-orchestrator
    - security-posture-orchestrator
    escalation: portfolio-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 2555
    categories:
    - governance-decisions
    - policy-violations
    - approval-records
  semantic:
    enabled: true
    categories:
    - policy-library
    - compliance-requirements
    - risk-models
  procedural:
    enabled: true
    categories:
    - approval-procedures
    - escalation-rules
    - compliance-gates
tools:
- policy_engine
- approval_coordinator
- audit_writer
- risk_scorer
capabilities:
- policy-enforcement
- approval-workflow
- compliance-gate-coordination
- risk-escalation
- audit-trail-management
routing:
  input_types:
  - governance_request
  - policy_check
  - approval_request
  - compliance_gate
  output_types:
  - governance_decision
  - approval_record
  - compliance_report
  - audit_trail
delegation:
  can_delegate_to:
  - compliance-audit-orchestrator
  - security-posture-orchestrator
  escalates_to: portfolio-orchestrator
governance:
  requires_approval: false
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 3000
  max_latency_ms: 30000
  timeout_ms: 60000

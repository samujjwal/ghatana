id: customer-insight-orchestrator
name: Customer Insight Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.discovery
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: Synthesises customer insights from interviews, surveys, NPS, usage analytics, and support
  tickets to build rich customer understanding
summary: Synthesises customer insights from interviews, surveys, NPS, usage analytics, and support tickets
  to build rich custo...
metadata:
  level: 1
  domain: discovery
  tags:
  - orchestrator
  - customer-insight
  - jtbd
  - interviews
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: customer_insight_request
    schema: dynamic
  - name: interview_transcripts
    schema: dynamic
  - name: survey_data
    schema: dynamic
  - name: support_data
    schema: dynamic
  outputs:
  - name: insight_report
    schema: dynamic
  - name: persona_set
    schema: dynamic
  - name: jtbd_map
    schema: dynamic
  - name: pain_point_catalogue
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - feedback-orchestrator
    - sentiment-analysis-task-agent
    - feedback-theme-clustering-task-agent
    escalation: discovery-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - interview-sessions
    - insight-extractions
    - persona-versions
  semantic:
    enabled: true
    categories:
    - customer-personas
    - jtbd-library
    - pain-point-catalogue
    - customer-language
  procedural:
    enabled: true
    categories:
    - interview-techniques
    - synthesis-methods
    - persona-building
tools:
- interview_synthesizer
- survey_analyzer
- persona_builder
- jtbd_extractor
capabilities:
- customer-interview-synthesis
- jtbd-extraction
- persona-building
- pain-point-mapping
- quantitative-insight-synthesis
routing:
  input_types:
  - customer_insight_request
  - interview_transcripts
  - survey_data
  - support_data
  output_types:
  - insight_report
  - persona_set
  - jtbd_map
  - pain_point_catalogue
delegation:
  can_delegate_to:
  - feedback-orchestrator
  - sentiment-analysis-task-agent
  - feedback-theme-clustering-task-agent
  escalates_to: discovery-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 12000
  max_latency_ms: 90000
  timeout_ms: 120000

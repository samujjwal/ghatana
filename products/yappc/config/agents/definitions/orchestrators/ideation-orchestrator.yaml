id: ideation-orchestrator
name: Ideation Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.ideation
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Orchestrates ideation sessions: structured brainstorming, solution generation, concept evaluation,
  and idea prioritisation'
summary: 'Orchestrates ideation sessions: structured brainstorming, solution generation, concept evaluation,
  and idea prioritis...'
metadata:
  level: 1
  domain: ideation
  tags:
  - orchestrator
  - ideation
  - brainstorming
  - concepts
  - level1
identity:
  agentType: PLANNING
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: ideation_request
    schema: dynamic
  - name: opportunity_brief
    schema: dynamic
  - name: jtbd_map
    schema: dynamic
  - name: problem_statement
    schema: dynamic
  outputs:
  - name: concept_set
    schema: dynamic
  - name: shortlisted_ideas
    schema: dynamic
  - name: ideation_report
    schema: dynamic
  - name: ranked_concepts
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - concept-design-orchestrator
    - product-framing-orchestrator
    - requirements-orchestrator
    escalation: portfolio-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - ideation-sessions
    - concepts-generated
    - shortlisted-ideas
  semantic:
    enabled: true
    categories:
    - solution-patterns
    - innovation-analogies
    - design-precedents
  procedural:
    enabled: true
    categories:
    - ideation-techniques
    - evaluation-frameworks
    - concept-selection-criteria
tools:
- idea_generator
- concept_evaluator
- brainstorm_facilitator
- innovation_library
capabilities:
- ideation-facilitation
- solution-generation
- concept-evaluation
- idea-prioritisation
routing:
  input_types:
  - ideation_request
  - opportunity_brief
  - jtbd_map
  - problem_statement
  output_types:
  - concept_set
  - shortlisted_ideas
  - ideation_report
  - ranked_concepts
delegation:
  can_delegate_to:
  - concept-design-orchestrator
  - product-framing-orchestrator
  - requirements-orchestrator
  escalates_to: portfolio-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 15000
  max_latency_ms: 90000
  timeout_ms: 120000

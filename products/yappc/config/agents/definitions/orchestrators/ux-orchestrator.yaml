id: ux-orchestrator
name: UX Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.ux
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Orchestrates UX design lifecycle: user research, information architecture, wireframing,
  usability testing, and design handoff'
summary: 'Orchestrates UX design lifecycle: user research, information architecture, wireframing, usability
  testing, and design...'
metadata:
  level: 1
  domain: ux
  tags:
  - orchestrator
  - ux
  - design
  - usability
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: ux_request
    schema: dynamic
  - name: feature_brief
    schema: dynamic
  - name: persona_set
    schema: dynamic
  - name: user_flows
    schema: dynamic
  outputs:
  - name: ux_brief
    schema: dynamic
  - name: wireframes
    schema: dynamic
  - name: ia_document
    schema: dynamic
  - name: usability_test_plan
    schema: dynamic
  - name: design_handoff
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - ui-orchestrator
    - interaction-design-orchestrator
    - design-system-orchestrator
    - customer-insight-orchestrator
    escalation: product-strategy-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - design-sessions
    - usability-test-results
    - design-iterations
  semantic:
    enabled: true
    categories:
    - ux-patterns
    - accessibility-rules
    - design-precedents
    - heuristics
  procedural:
    enabled: true
    categories:
    - ux-process
    - usability-test-procedures
    - design-review-checklists
tools:
- ia_designer
- wireframe_generator
- usability_tester
- design_brief_builder
capabilities:
- ux-strategy
- information-architecture
- user-flow-design
- usability-testing
- design-handoff
routing:
  input_types:
  - ux_request
  - feature_brief
  - persona_set
  - user_flows
  output_types:
  - ux_brief
  - wireframes
  - ia_document
  - usability_test_plan
  - design_handoff
delegation:
  can_delegate_to:
  - ui-orchestrator
  - interaction-design-orchestrator
  - design-system-orchestrator
  - customer-insight-orchestrator
  escalates_to: product-strategy-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 12000
  max_latency_ms: 90000
  timeout_ms: 120000

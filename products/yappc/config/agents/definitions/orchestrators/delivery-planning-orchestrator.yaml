id: delivery-planning-orchestrator
name: Delivery Planning Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.engineering
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Plans engineering delivery: translates roadmap initiatives into sprint plans, manages dependencies,
  tracks capacity, and forecasts delivery timelines'
summary: 'Plans engineering delivery: translates roadmap initiatives into sprint plans, manages dependencies,
  tracks capacity,...'
metadata:
  level: 1
  domain: engineering
  tags:
  - orchestrator
  - delivery-planning
  - sprint
  - capacity
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: delivery_request
    schema: dynamic
  - name: roadmap
    schema: dynamic
  - name: sprint_input
    schema: dynamic
  - name: capacity_data
    schema: dynamic
  - name: backlog
    schema: dynamic
  outputs:
  - name: sprint_plan
    schema: dynamic
  - name: delivery_plan
    schema: dynamic
  - name: risk_assessment
    schema: dynamic
  - name: capacity_report
    schema: dynamic
  - name: timeline_forecast
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - work-management-orchestrator
    - agile-execution-orchestrator
    - delivery-planning-capability-agent
    escalation: engineering-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - sprint-plans
    - delivery-forecasts
    - planning-outcomes
  semantic:
    enabled: true
    categories:
    - velocity-benchmarks
    - planning-heuristics
    - estimation-patterns
  procedural:
    enabled: true
    categories:
    - sprint-planning-procedures
    - dependency-management-rules
tools:
- sprint_planner
- velocity_tracker
- capacity_calculator
- dependency_mapper
capabilities:
- delivery-planning
- sprint-planning
- capacity-planning
- dependency-mapping
- timeline-forecasting
routing:
  input_types:
  - delivery_request
  - roadmap
  - sprint_input
  - capacity_data
  - backlog
  output_types:
  - sprint_plan
  - delivery_plan
  - risk_assessment
  - capacity_report
  - timeline_forecast
delegation:
  can_delegate_to:
  - work-management-orchestrator
  - agile-execution-orchestrator
  - delivery-planning-capability-agent
  escalates_to: engineering-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 45000
  timeout_ms: 60000

id: feedback-orchestrator
name: Feedback Orchestrator
version: 1.0.0
namespace: yappc.orchestrators.product-intelligence
status: active
owners:
- team: yappc-core
  contact: yappc-platform@ghatana.com
description: 'Collects and synthesises user feedback: NLP classification, theme clustering, sentiment
  analysis, volume scoring, and prioritisation for product decisions'
summary: 'Collects and synthesises user feedback: NLP classification, theme clustering, sentiment analysis,
  volume scoring, and...'
metadata:
  level: 1
  domain: product-intelligence
  tags:
  - orchestrator
  - feedback
  - sentiment
  - nlp
  - clustering
  - level1
identity:
  agentType: planning
  subtype: workflow
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: autonomous
interfaces:
  inputs:
  - name: feedback_sync_trigger
    schema: dynamic
  - name: feedback_item
    schema: dynamic
  - name: feedback_batch_request
    schema: dynamic
  outputs:
  - name: feedback_summary
    schema: dynamic
  - name: theme_report
    schema: dynamic
  - name: sentiment_report
    schema: dynamic
  - name: prioritisation_list
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - feedback-capability-agent
    - feedback-collection-task-agent
    - feedback-classification-task-agent
    - theme-clustering-task-agent
    - sentiment-analysis-task-agent
    - feedback-prioritisation-task-agent
    escalation: product-intelligence-orchestrator
  mcp:
    enabled: false
    note: MCP proxy optional via InteroperabilityService
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - chain-of-thought
  - plan-and-solve
  defaultReasoner: plan-and-solve
  maxChainDepth: 5
memory:
  episodic:
    enabled: true
    retention_days: 365
    categories:
    - feedback-batches
    - theme-reports
    - sentiment-trends
    - prioritisation-outputs
  semantic:
    enabled: true
    categories:
    - feedback-taxonomy
    - user-segments
    - theme-history
  procedural:
    enabled: true
    categories:
    - classification-rules
    - clustering-algorithms
    - rice-scoring
tools:
- feedback_aggregator
- nlp_classifier
- theme_clusterer
- sentiment_analyser
- priority_scorer
capabilities:
- feedback-collection
- nlp-classification
- theme-clustering
- sentiment-analysis
- feedback-prioritisation
routing:
  input_types:
  - feedback_sync_trigger
  - feedback_item
  - feedback_batch_request
  output_types:
  - feedback_summary
  - theme_report
  - sentiment_report
  - prioritisation_list
delegation:
  can_delegate_to:
  - feedback-capability-agent
  - feedback-collection-task-agent
  - feedback-classification-task-agent
  - theme-clustering-task-agent
  - sentiment-analysis-task-agent
  - feedback-prioritisation-task-agent
  escalates_to: product-intelligence-orchestrator
governance:
  requires_approval: false
  can_block: false
  audit_trail: standard
performance:
  expected_latency_ms: 5000
  max_latency_ms: 30000
  timeout_ms: 120000

id: business-analyst
name: Business Analyst
version: 1.0.0
namespace: yappc.definitions.requirements-engineering
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Analyzes business requirements and creates user stories
summary: Analyzes business requirements and creates user stories
metadata:
  level: 2
  domain: requirements-engineering
  tags:
  - requirements
  - user-stories
  - acceptance-criteria
identity:
  agentType: HYBRID
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: RequirementRequest
    schema: dynamic
  - name: FeatureRequest
    schema: dynamic
  outputs:
  - name: UserStory
    schema: dynamic
  - name: AcceptanceCriteria
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - ux-research-agent
    - story-writer-agent
    - documentation-writer
    escalation: products-officer
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 90
  semantic:
    enabled: true
    categories:
    - requirements
    - user-stories
    - acceptance-criteria
  procedural:
    enabled: true
tools:
- file_read
- file_write
capabilities:
- requirements-analysis
- user-story-creation
- acceptance-criteria-definition
routing:
  input_types:
  - RequirementRequest
  - FeatureRequest
  output_types:
  - UserStory
  - AcceptanceCriteria
delegation:
  can_delegate_to:
  - ux-research-agent
  - story-writer-agent
  - documentation-writer
  escalates_to: products-officer
performance:
  expected_latency_ms: 3000
  max_latency_ms: 8000
  timeout_ms: 10000

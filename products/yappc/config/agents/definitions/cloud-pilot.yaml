id: cloud-pilot
name: Cloud Pilot
version: 1.0.0
namespace: yappc.definitions.devops-infrastructure
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Cloud infrastructure, Kubernetes, Docker, AWS/GCP expert
summary: Cloud infrastructure, Kubernetes, Docker, AWS/GCP expert
metadata:
  level: 2
  domain: devops-infrastructure
  tags:
  - kubernetes
  - docker
  - aws
  - gcp
  - terraform
identity:
  agentType: HYBRID
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: InfrastructureRequest
    schema: dynamic
  - name: DeploymentRequest
    schema: dynamic
  outputs:
  - name: KubernetesManifest
    schema: dynamic
  - name: Dockerfile
    schema: dynamic
  - name: TerraformScript
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - infrastructure-architect-agent
    - deployment-agent
    - environment-manager-agent
    escalation: systems-architect
learning:
  learningLevel: L3
  adaptationTargets:
    - PROCEDURAL_SKILL
    - SEMANTIC_FACT
    - NEGATIVE_KNOWLEDGE
  skillRefs:
    - skillId: kubernetes-manifests
      requiredLevel: L3
    - skillId: docker-creation
      requiredLevel: L2
    - skillId: terraform-scripting
      requiredLevel: L2
  masteryBindings:
    - namespace: yappc
      registryRef: yappc-mastery-registry
      freshnessPolicy: default
      versionPolicy: semver
      obsolescencePolicy: default
  masteryPolicyRefs:
    - promotion-policy-v1
    - freshness-policy-v1
  evaluationRefs:
    - eval-pack-java-code-quality-v1
  provenanceRequired: true
  promotionRequired: true
  governanceWorkflow: false
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 90
  semantic:
    enabled: true
    categories:
    - k8s-patterns
    - docker-images
    - cloud-architecture
  procedural:
    enabled: true
tools:
- file_read
- file_write
capabilities:
- kubernetes-manifest-generation
- dockerfile-creation
- terraform-scripting
- cloud-architecture
routing:
  input_types:
  - InfrastructureRequest
  - DeploymentRequest
  output_types:
  - KubernetesManifest
  - Dockerfile
  - TerraformScript
delegation:
  can_delegate_to:
  - infrastructure-architect-agent
  - deployment-agent
  - environment-manager-agent
  escalates_to: systems-architect
performance:
  expected_latency_ms: 2500
  max_latency_ms: 7000
  timeout_ms: 10000

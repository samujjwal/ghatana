id: documentation-writer
name: Documentation Writer
version: 1.0.0
namespace: yappc.definitions.documentation
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Technical documentation, API docs, architecture diagrams
summary: Technical documentation, API docs, architecture diagrams
metadata:
  level: 3
  domain: documentation
  tags:
  - documentation
  - api-docs
  - javadoc
  - markdown
identity:
  agentType: HYBRID
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: DocumentationRequest
    schema: dynamic
  - name: JavadocRequest
    schema: dynamic
  outputs:
  - name: Documentation
    schema: dynamic
  - name: APIDocumentation
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    escalation: java-expert
learningModel:
  learningLevel: L2
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 30
  semantic:
    enabled: true
    categories:
    - documentation-patterns
    - api-specifications
  procedural:
    enabled: false
tools:
- file_read
- file_write
- ast_parse
- ast_extract_imports
capabilities:
- javadoc-generation
- api-documentation
- readme-generation
- architecture-documentation
routing:
  input_types:
  - DocumentationRequest
  - JavadocRequest
  output_types:
  - Documentation
  - APIDocumentation
delegation:
  can_delegate_to: []
  escalates_to: java-expert
performance:
  expected_latency_ms: 1000
  max_latency_ms: 3000
  timeout_ms: 5000

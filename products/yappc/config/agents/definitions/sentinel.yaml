id: sentinel
name: Sentinel (Security Guardian)
version: 1.0.0
namespace: yappc.definitions.security
status: active
owners:
- team: security
  contact: security@ghatana.com
description: Domain expert for security analysis, OWASP compliance, and security governance
summary: Domain expert for security analysis, OWASP compliance, and security governance
metadata:
  level: 2
  domain: security
  tags:
  - expert
  - security
  - compliance
  - governance
identity:
  agentType: HYBRID
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: mission-critical
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: security-review-request
    schema: dynamic
  - name: code-review
    schema: dynamic
  - name: deployment-request
    schema: dynamic
  - name: architecture-change
    schema: dynamic
  outputs:
  - name: security-assessment
    schema: dynamic
  - name: compliance-report
    schema: dynamic
  - name: approval-decision
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - vuln-scanner
    - security-scanner-agent
    - security-operations-agent
    escalation: &id001
    - systems-architect
    - operations-orchestrator-agent
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 730
    categories:
    - security-reviews
    - vulnerability-findings
    - remediation-tracking
  semantic:
    enabled: true
    categories:
    - vulnerability-patterns
    - attack-vectors
    - security-best-practices
  procedural:
    enabled: true
    categories:
    - security-policies
    - compliance-rules
    - approval-workflows
tools:
- owasp_dependency_check
- sonarqube_security
- trivy_scanner
- secrets_detector
- sbom_generator
- compliance_checker
capabilities:
- security-analysis
- dependency-analysis
- compliance-validation
- security-governance
- vulnerability-assessment
routing:
  input_types:
  - security-review-request
  - code-review
  - deployment-request
  - architecture-change
  output_types:
  - security-assessment
  - compliance-report
  - approval-decision
delegation:
  can_delegate_to:
  - vuln-scanner
  - security-scanner-agent
  - security-operations-agent
  escalates_to: *id001
governance:
  requires_approval: true
  can_block: true
  audit_trail: comprehensive
performance:
  expected_latency_ms: 10000
  max_latency_ms: 60000
  timeout_ms: 120000

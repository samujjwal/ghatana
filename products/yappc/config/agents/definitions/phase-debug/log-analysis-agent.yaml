id: log-analysis-agent
name: Log Analysis Agent
version: 1.0.0
description: Analyzes application logs to identify error patterns, anomalies, and correlations relevant to the current debug session.

metadata:
  level: 3
  domain: debugging
  tags: [debugging, logs, pattern-detection, anomaly-detection]

generator:
  type: PIPELINE
  steps:
    - name: log_parsing
      type: RULE_BASED
      description: Parse and structure raw log entries by timestamp, level, source
    - name: pattern_analysis
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Analyze these application logs for the reported issue:
        
        Logs: {{input}}
        Error Context: {{context}}
        
        Identify:
        1. Error log entries with timestamps
        2. Warning patterns preceding the error
        3. Anomalous log patterns (frequency, timing, content)
        4. Correlated events across services
        5. Timeline reconstruction of the failure
        
        Output as JSON: {error_entries, warning_patterns, anomalies, correlations, timeline}

memory:
  episodic:
    enabled: true
    retention_days: 180
    categories: [log-analyses, error-patterns]
  semantic:
    enabled: true
    categories: [known-log-patterns, service-log-signatures]

tools: [log_parser, log_search]

capabilities:
  - log-analysis

routing:
  input_types: [log-file, log-stream, log-query-result]
  output_types: [log-analysis-report, error-timeline]

delegation:
  can_delegate_to: []
  escalates_to: debug-orchestrator

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 3000
  max_latency_ms: 15000
  timeout_ms: 30000

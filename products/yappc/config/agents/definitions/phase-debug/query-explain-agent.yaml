id: query-explain-agent
name: Query Explain Agent
version: 1.0.0
description: Analyzes database query execution plans (EXPLAIN ANALYZE) to identify slow queries, missing indexes, full table scans, and join inefficiencies.

metadata:
  level: 3
  domain: debugging
  tags: [debugging, database, query-plan, performance]

generator:
  type: PIPELINE
  steps:
    - name: explain_parse
      type: RULE_BASED
      description: Parse EXPLAIN ANALYZE output into structured plan tree with costs, rows, and timings
    - name: plan_analysis
      type: LLM
      provider: ANTHROPIC
      model: claude-3-5-sonnet-20241022
      temperature: 0.1
      max_tokens: 2000
      prompt: |
        Analyze this query execution plan:
        
        Query: {{query}}
        EXPLAIN Output: {{input}}
        Table Statistics: {{table_stats}}
        
        Identify:
        1. Full table scans (Seq Scan on large tables)
        2. Missing indexes (filter selectivity vs available indexes)
        3. Nested loop inefficiencies
        4. Sort/Hash spills to disk
        5. Recommended index additions or query rewrites
        
        Output as JSON: {bottlenecks, missing_indexes, rewrite_suggestions, estimated_improvement}

memory:
  episodic:
    enabled: true
    retention_days: 180
    categories: [query-analyses, index-recommendations]
  semantic:
    enabled: true
    categories: [query-patterns, postgres-optimization-rules]

tools: [query_runner, explain_parser, index_advisor]

capabilities:
  - query-optimization
  - root-cause-analysis

routing:
  input_types: [query-explain-output, slow-query-log]
  output_types: [query-analysis-report, index-recommendation]

delegation:
  can_delegate_to: []
  escalates_to: debug-orchestrator

governance:
  requires_approval: false
  can_block: false
  audit_trail: standard

performance:
  expected_latency_ms: 2000
  max_latency_ms: 10000
  timeout_ms: 20000

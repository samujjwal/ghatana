id: db-guardian
name: Database Guardian
version: 1.0.0
namespace: yappc.definitions.data-engineering
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Database design, schema migrations, query optimization expert
summary: Database design, schema migrations, query optimization expert
metadata:
  level: 2
  domain: data-engineering
  tags:
  - database
  - postgresql
  - migrations
  - performance
identity:
  agentType: HYBRID
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: SchemaRequest
    schema: dynamic
  - name: MigrationRequest
    schema: dynamic
  - name: QueryOptimizationRequest
    schema: dynamic
  outputs:
  - name: SchemaDefinition
    schema: dynamic
  - name: MigrationScript
    schema: dynamic
  - name: OptimizedQuery
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - database-designer-agent
    - java-class-writer
    escalation: systems-architect
learning:
  learningLevel: L3
  adaptationTargets:
    - PROCEDURAL_SKILL
    - SEMANTIC_FACT
    - NEGATIVE_KNOWLEDGE
  skillRefs:
    - skillId: database-design
      requiredLevel: L3
    - skillId: schema-migration
      requiredLevel: L2
    - skillId: query-optimization
      requiredLevel: L2
  masteryBindings:
    - namespace: yappc
      registryRef: yappc-mastery-registry
      freshnessPolicy: default
      versionPolicy: semver
      obsolescencePolicy: default
  masteryPolicyRefs:
    - promotion-policy-v1
    - freshness-policy-v1
  evaluationRefs:
    - eval-pack-java-code-quality-v1
  provenanceRequired: true
  promotionRequired: true
  governanceWorkflow: false
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 180
  semantic:
    enabled: true
    categories:
    - database-schemas
    - migrations
    - query-patterns
  procedural:
    enabled: true
tools:
- file_read
- file_write
capabilities:
- schema-design
- migration-generation
- query-optimization
- index-strategy
routing:
  input_types:
  - SchemaRequest
  - MigrationRequest
  - QueryOptimizationRequest
  output_types:
  - SchemaDefinition
  - MigrationScript
  - OptimizedQuery
delegation:
  can_delegate_to:
  - database-designer-agent
  - java-class-writer
  escalates_to: systems-architect
performance:
  expected_latency_ms: 3000
  max_latency_ms: 8000
  timeout_ms: 12000

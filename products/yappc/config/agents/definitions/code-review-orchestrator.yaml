id: code-review-orchestrator
name: Code Review Orchestrator
version: 1.0.0
namespace: yappc.definitions.quality-assurance
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: Orchestrates comprehensive code review process with static analysis, security scanning, and
  quality gates
summary: Orchestrates comprehensive code review process with static analysis, security scanning, and quality
  gates
metadata:
  level: 2
  domain: quality-assurance
  tags:
  - code-review
  - quality-gates
  - orchestration
identity:
  agentType: HYBRID
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs:
  - name: PullRequest
    schema: dynamic
  - name: CodeCommit
    schema: dynamic
  - name: ReviewRequest
    schema: dynamic
  outputs:
  - name: ReviewReport
    schema: dynamic
  - name: QualityScore
    schema: dynamic
  - name: ApprovalDecision
    schema: dynamic
interoperability:
  agentToAgent:
    enabled: true
    protocol: ghatana-a2a-v1
    delegation:
    - code-reviewer
    - vuln-scanner
    - performance-optimizer
    escalation: sentinel
learningModel:
  learningLevel: L3
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: true
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: true
    retention_days: 60
  semantic:
    enabled: true
    categories:
    - code-patterns
    - quality-metrics
    - review-decisions
  procedural:
    enabled: true
tools:
- checkstyle_validate
- pmd_analyze
- spotbugs_scan
- sonar_analyze
- metrics_complexity
- file_read
capabilities:
- code-review-orchestration
- quality-gate-enforcement
- aggregate-analysis
routing:
  input_types:
  - PullRequest
  - CodeCommit
  - ReviewRequest
  output_types:
  - ReviewReport
  - QualityScore
  - ApprovalDecision
delegation:
  can_delegate_to:
  - code-reviewer
  - vuln-scanner
  - performance-optimizer
  escalates_to: sentinel
governance:
  requires_approval: false
  can_block: true
performance:
  expected_latency_ms: 8000
  max_latency_ms: 20000
  timeout_ms: 30000

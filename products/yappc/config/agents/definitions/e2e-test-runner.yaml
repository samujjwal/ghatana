id: agent.yappc.e2e-test-runner
name: E2E Test Runner
version: 1.0.0
namespace: yappc.definitions.general
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: End-to-end test generation and execution agent
summary: End-to-end test generation and execution agent
metadata:
  author: YAPPC Team
  level: 3
  tags:
  - testing
  - e2e
  - automation
  - quality
identity:
  agentType: hybrid
  subtype: rule+llm
  determinismGuarantee: partial
  stateMutability: mutable
  failureMode: graceful-degrade
  criticality: high
  autonomyLevel: semi-autonomous
interfaces:
  inputs: []
  outputs: []
interoperability:
  agentToAgent:
    enabled: false
    protocol: ghatana-a2a-v1
learningModel:
  learningLevel: L0
  batchSize: 50
  humanReviewThreshold: 0.75
  reflectionEnabled: false
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
capabilities:
- e2e-test-generation
- test-automation
- browser-testing
- test-reporting

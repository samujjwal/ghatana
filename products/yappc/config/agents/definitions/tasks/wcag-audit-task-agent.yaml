id: wcag-audit-task-agent
name: WCAG Audit
version: 1.0.0
namespace: yappc.tasks.ux
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: WCAG Audit task agent
summary: Specialised task agent for WCAG Audit
metadata:
  level: 3
  domain: ux
  tags:
  - task-agent
  - level3
  - ux
identity:
  agentType: DETERMINISTIC
  subtype: rule
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: graceful-degrade
  criticality: medium
  autonomyLevel: automated
interfaces:
  inputs:
  - name: task_request
    schema: dynamic
  outputs:
  - name: task_result
    schema: dynamic
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- file_read
- file_write
capabilities:
- accessibility-auditing
delegation:
  can_delegate_to: []
  escalates_to: ux-orchestrator
performance:
  expected_latency_ms: 2000
  max_latency_ms: 8000
  timeout_ms: 15000

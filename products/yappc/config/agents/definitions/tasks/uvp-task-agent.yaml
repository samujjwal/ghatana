id: uvp-task-agent
name: UVP Formulation
version: 1.0.0
namespace: yappc.tasks.ideation
status: active
owners:
- team: yappc-core
  contact: yappc-core@ghatana.com
description: UVP Formulation task agent
summary: Specialised task agent for UVP Formulation
metadata:
  level: 3
  domain: ideation
  tags:
  - task-agent
  - level3
  - ideation
identity:
  agentType: deterministic
  subtype: rule
  determinismGuarantee: full
  stateMutability: stateless
  failureMode: graceful-degrade
  criticality: medium
  autonomyLevel: automated
interfaces:
  inputs:
  - name: task_request
    schema: dynamic
  outputs:
  - name: task_result
    schema: dynamic
reasoningProfile:
  reasonerPortfolio:
  - rule-engine
  - llm
  defaultReasoner: llm
  reasoningStrategy: deterministic-first
memory:
  episodic:
    enabled: false
  semantic:
    enabled: false
  procedural:
    enabled: false
tools:
- file_read
- file_write
capabilities:
- concept-generation
delegation:
  can_delegate_to: []
  escalates_to: ideation-orchestrator
performance:
  expected_latency_ms: 2000
  max_latency_ms: 8000
  timeout_ms: 15000

# ============================================================================
# New Domain Capabilities (10 Strategic Domains)
# ============================================================================

  # Portfolio
  - id: portfolio-analysis
    name: Portfolio Analysis
    description: Assess and analyze product portfolio health, value, and strategic fit
    category: strategy
    agent_capability: PortfolioAnalysis
    input_types: [portfolio_data, initiative_data]
    output_types: [portfolio_report, health_assessment]

  - id: investment-evaluation
    name: Investment Evaluation
    description: Evaluate investment cases and ROI for initiatives and products
    category: strategy
    agent_capability: InvestmentEvaluation
    input_types: [business_case, financial_data]
    output_types: [investment_recommendation, roi_analysis]

  - id: roadmap-strategy
    name: Roadmap Strategy
    description: Define, sequence, and align product roadmaps with business objectives
    category: strategy
    agent_capability: RoadmapStrategy
    input_types: [strategic_goals, initiative_list]
    output_types: [roadmap_document, sequencing_plan]

  # Discovery
  - id: user-research
    name: User Research
    description: Conduct user interviews, surveys, and observational research
    category: discovery
    agent_capability: UserResearch
    input_types: [research_plan, user_segment]
    output_types: [research_report, user_insights]

  - id: market-analysis
    name: Market Analysis
    description: Analyze market trends, competitive landscape, and customer segments
    category: discovery
    agent_capability: MarketAnalysis
    input_types: [market_brief, competitor_data]
    output_types: [market_report, opportunity_map]

  - id: insight-synthesis
    name: Insight Synthesis
    description: Synthesize research findings into actionable insights and opportunity themes
    category: discovery
    agent_capability: InsightSynthesis
    input_types: [research_data, observations]
    output_types: [synthesis_report, insight_themes]

  - id: opportunity-identification
    name: Opportunity Identification
    description: Identify and evaluate product opportunities from research signals
    category: discovery
    agent_capability: OpportunityIdentification
    input_types: [insight_themes, market_data]
    output_types: [opportunity_brief, priority_opportunities]

  # Ideation
  - id: concept-generation
    name: Concept Generation
    description: Generate creative product concepts and feature ideas from problem statements
    category: ideation
    agent_capability: ConceptGeneration
    input_types: [problem_statement, opportunity_brief]
    output_types: [concept_list, concept_brief]

  - id: feasibility-analysis
    name: Feasibility Analysis
    description: Assess technical and business feasibility of concepts and ideas
    category: ideation
    agent_capability: FeasibilityAnalysis
    input_types: [concept_brief, constraints]
    output_types: [feasibility_report, recommendation]

  - id: innovation-scouting
    name: Innovation Scouting
    description: Scout emerging technologies and industry innovations for applicability
    category: ideation
    agent_capability: InnovationScouting
    input_types: [technology_landscape, strategic_goals]
    output_types: [innovation_report, technology_recommendations]

  # Requirements
  - id: requirements-analysis
    name: Requirements Analysis
    description: Elicit, analyze, and structure business and technical requirements
    category: requirements
    agent_capability: RequirementsAnalysis
    input_types: [stakeholder_input, product_brief]
    output_types: [requirements_document, epics]

  - id: story-mapping
    name: Story Mapping
    description: Create user story maps that visualize user journeys and work breakdown
    category: requirements
    agent_capability: StoryMapping
    input_types: [requirements_document, user_journey]
    output_types: [story_map, sprint_backlog]

  - id: acceptance-criteria-writing
    name: Acceptance Criteria Writing
    description: Define clear, testable acceptance criteria for user stories
    category: requirements
    agent_capability: AcceptanceCriteriaWriting
    input_types: [user_story, requirements]
    output_types: [acceptance_criteria, test_checklist]

  - id: traceability-management
    name: Traceability Management
    description: Maintain bidirectional traceability between requirements, tests, and code
    category: requirements
    agent_capability: TraceabilityManagement
    input_types: [requirements, test_results, code_changes]
    output_types: [traceability_matrix, coverage_report]

  - id: spec-validation
    name: Spec Validation
    description: Validate requirements specifications for completeness, consistency, and testability
    category: requirements
    agent_capability: SpecValidation
    input_types: [requirements_document, constraints]
    output_types: [validation_report, gap_analysis]

  # UX
  - id: ux-research
    name: UX Research
    description: Conduct usability studies, user interviews, and UX evaluations
    category: ux
    agent_capability: UxResearch
    input_types: [research_questions, user_segment]
    output_types: [ux_report, usability_findings]

  - id: interaction-design
    name: Interaction Design
    description: Design user flows, interaction patterns, and wireframes
    category: ux
    agent_capability: InteractionDesign
    input_types: [user_requirements, design_brief]
    output_types: [wireframes, interaction_flows]

  - id: prototype-building
    name: Prototype Building
    description: Build interactive prototypes for user validation
    category: ux
    agent_capability: PrototypeBuilding
    input_types: [wireframes, interaction_flows]
    output_types: [prototype, prototype_spec]

  - id: usability-testing
    name: Usability Testing
    description: Plan and execute usability tests and synthesize findings
    category: ux
    agent_capability: UsabilityTesting
    input_types: [prototype, test_plan]
    output_types: [usability_report, issues_list]

  - id: accessibility-auditing
    name: Accessibility Auditing
    description: Audit designs and implementations for WCAG compliance and accessibility
    category: ux
    agent_capability: AccessibilityAuditing
    input_types: [design_artifact, code_artifact]
    output_types: [accessibility_report, remediation_plan]

  - id: design-system-curation
    name: Design System Curation
    description: Maintain and evolve the design system, component library, and design tokens
    category: ux
    agent_capability: DesignSystemCuration
    input_types: [design_patterns, component_needs]
    output_types: [design_system_update, component_spec]

  # Architecture
  - id: system-design
    name: System Design
    description: Design high-level system architecture and component interactions
    category: architecture
    agent_capability: SystemDesign
    input_types: [requirements, constraints]
    output_types: [architecture_document, system_diagram]

  - id: api-architecture
    name: API Architecture
    description: Design RESTful, GraphQL, and event-driven API contracts
    category: architecture
    agent_capability: ApiArchitecture
    input_types: [system_requirements, integration_needs]
    output_types: [api_contract, openapi_spec]

  - id: data-architecture
    name: Data Architecture
    description: Design data models, schemas, and data flow architectures
    category: architecture

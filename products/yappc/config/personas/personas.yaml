# YAPPC Authoritative Persona Definitions
# This file is the SINGLE SOURCE OF TRUTH for all persona-to-role/permission mappings.
# PersonaMapping.java delegates all lookups here via PersonaLoader.
# To add or modify personas, update this file only.

personas:

  # ── Administrative ───────────────────────────────────────────────────────────
  - id: WORKSPACE_ADMIN
    display_name: "Workspace Admin"
    category: administrative
    role: ADMIN
    permissions:
      - WORKSPACE_CREATE
      - WORKSPACE_READ
      - WORKSPACE_UPDATE
      - WORKSPACE_MANAGE_MEMBERS
      - PROJECT_CREATE
      - PROJECT_READ
      - PROJECT_UPDATE
      - REQUIREMENT_CREATE
      - REQUIREMENT_READ
      - REQUIREMENT_UPDATE
      - REQUIREMENT_APPROVE
      - ROLE_ASSIGN
      - USER_MANAGE

  - id: STAKEHOLDER
    display_name: "Stakeholder"
    category: administrative
    role: VIEWER
    permissions:
      - PROJECT_READ
      - REQUIREMENT_READ

  # ── Strategic ─────────────────────────────────────────────────────────────

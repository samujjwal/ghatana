domain:
  id: privacy-risk-compliance
  name: "Privacy, Risk & Compliance"
  description: "Ensure compliance and manage risks."
  order: 18
  icon: "gavel"
  color: "#5C6BC0"
  agent_personas:
    - "ComplianceAgent"
    - "RiskAssessor"
    - "GovernanceOfficer"
  audit_artifacts:
    - "ComplianceEvidence"
    - "RiskRegister"
    - "PolicyRecord"
  inputs:
    - "Data flows"
    - "Policies"
    - "Regulations"
  outputs:
    - "Compliance reports"
    - "Risk assessments"

tasks:
  # Core ICS compliance tasks
  - id: d18-t1
    name: "Privacy impact analysis"
    description: "Assess privacy risks."
    personas: ["Security", "Developer"]
    lifecycle_stages: ["plan", "verify"]
    automation_level: "assisted"
  - id: d18-t2
    name: "Compliance checks"
    description: "Verify adherence to regulations."
    personas: ["Security"]
    lifecycle_stages: ["verify"]
    automation_level: "assisted"
  - id: d18-t3
    name: "Audit preparation"
    description: "Prepare for external audits."
    personas: ["Security", "DevOps"]
    lifecycle_stages: ["verify"]
    automation_level: "assisted"
  - id: d18-t4
    name: "Risk tracking"
    description: "Monitor identified risks."
    personas: ["Security", "Tech Lead"]
    lifecycle_stages: ["observe"]
    automation_level: "assisted"


domain:
  id: performance-optimization
  name: "Performance & Optimization"
  description: "Optimize system performance and cost."
  order: 24
  icon: "speed"
  color: "#66BB6A"
  agent_personas:
    - "PerformanceOptimizer"
    - "CostAnalyzer"
    - "Profiler"
  audit_artifacts:
    - "PerformanceReport"
    - "OptimizationChange"
    - "BenchmarkResult"
  inputs:
    - "Metrics"
    - "Benchmarks"
    - "Performance data"
  outputs:
    - "Optimized systems"
    - "Performance reports"

tasks:
  # Core ICS performance tasks
  - id: d24-t1
    name: "Profiling"
    description: "Analyze resource usage."
    personas: ["Developer"]
    lifecycle_stages: ["verify"]
    automation_level: "assisted"
  - id: d24-t2
    name: "Cost optimization"
    description: "Reduce infrastructure costs."
    personas: ["DevOps", "Developer"]
    lifecycle_stages: ["observe", "execute"]
    automation_level: "assisted"
  - id: d24-t3
    name: "Latency reduction"
    description: "Improve response times."
    personas: ["Developer"]
    lifecycle_stages: ["execute"]
    automation_level: "assisted"
  - id: d24-t4
    name: "Reliability improvements"
    description: "Enhance system stability."
    personas: ["Developer", "DevOps"]
    lifecycle_stages: ["execute"]
    automation_level: "assisted"


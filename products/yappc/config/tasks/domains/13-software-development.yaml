domain:
  id: software-development
  name: "Software Development"
  description: "Write code, refactor, and fix bugs."
  order: 13
  icon: "code"
  color: "#EF5350"
  agent_personas:
    - "CodeExecutor"
    - "RefactorAgent"
    - "EnvironmentSetup"
  audit_artifacts:
    - "ChangeSet"
    - "CommitHistory"
    - "CodeSnapshot"
  inputs:
    - "Design specs"
    - "Tasks"
    - "Requirements"
  outputs:
    - "Source code"
    - "Configurations"
    - "Unit tests"

tasks:
  # Core ICS development tasks
  - id: d13-t1
    name: "Implement features"
    description: "Write code for new features."
    personas: ["Developer"]
    lifecycle_stages: ["execute"]
    automation_level: "assisted"
  - id: d13-t2
    name: "Refactor code"
    description: "Improve code structure."
    personas: ["Developer", "Tech Lead"]
    lifecycle_stages: ["execute"]
    automation_level: "assisted"
  - id: d13-t3
    name: "Fix defects"
    description: "Resolve bugs."
    personas: ["Developer"]
    lifecycle_stages: ["execute"]
    automation_level: "assisted"
  - id: d13-t4
    name: "Implement integrations"
    description: "Connect systems."
    personas: ["Developer", "Tech Lead"]
    lifecycle_stages: ["execute"]
    automation_level: "assisted"

  # Migrated from legacy implementation domain
  - id: impl-001
    name: "Write Production Code"
    description: "Write clean, maintainable production code."
    personas: ["Developer"]
    lifecycle_stages: ["execute"]
    automation_level: "assisted"
  - id: impl-002
    name: "Implement Error Handling"
    description: "Add proper error handling and recovery."

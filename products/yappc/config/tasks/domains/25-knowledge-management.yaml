domain:
  id: knowledge-management
  name: "Knowledge Management & Institutionalization"
  description: "Capture and share organizational knowledge."
  order: 25
  icon: "library_books"
  color: "#8D6E63"
  agent_personas:
    - "KnowledgeSynthesizer"
    - "PatternMiner"
    - "LearningAgent"
  audit_artifacts:
    - "KnowledgeRecord"
    - "StandardUpdate"
    - "LearningLog"
  inputs:
    - "Learnings"
    - "Outcomes"
    - "Experience"
  outputs:
    - "Organizational knowledge"
    - "Updated standards"

tasks:
  # Core ICS knowledge tasks
  - id: d25-t1
    name: "Capture lessons learned"
    description: "Document post-project learnings."
    personas: ["Developer", "Tech Lead"]
    lifecycle_stages: ["learn"]
    automation_level: "assisted"
  - id: d25-t2
    name: "Maintain standards"
    description: "Update coding and process standards."
    personas: ["Tech Lead"]
    lifecycle_stages: ["institutionalize"]
    automation_level: "assisted"
  - id: d25-t3
    name: "Update playbooks"
    description: "Refine operational guides."
    personas: ["DevOps", "Developer"]
    lifecycle_stages: ["institutionalize"]
    automation_level: "assisted"
  - id: d25-t4
    name: "Curate best practices"
    description: "Highlight effective methods."
    personas: ["Tech Lead", "Developer"]
    lifecycle_stages: ["learn", "institutionalize"]
    automation_level: "assisted"


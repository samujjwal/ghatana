domain:
  id: continuous-improvement
  name: "Continuous Improvement & Innovation"
  description: "Drive innovation and process improvement."
  order: 26
  icon: "upgrade"
  color: "#AB47BC"
  agent_personas:
    - "ImprovementAgent"
    - "InnovationScout"
    - "ProcessOptimizer"
  audit_artifacts:
    - "ImprovementProposal"
    - "ImpactAssessment"
    - "ProcessChange"
  inputs:
    - "Metrics"
    - "Feedback"
    - "Retrospectives"
  outputs:
    - "Improvement proposals"
    - "Process changes"

tasks:
  # Core ICS improvement tasks
  - id: d26-t1
    name: "Identify improvement opportunities"
    description: "Find areas for growth."
    personas: ["Developer", "Tech Lead"]
    lifecycle_stages: ["learn"]
    automation_level: "assisted"
  - id: d26-t2
    name: "Propose innovations"
    description: "Suggest new ideas."
    personas: ["Developer", "Tech Lead"]
    lifecycle_stages: ["learn"]
    automation_level: "manual"
  - id: d26-t3
    name: "Pilot new tools/processes"
    description: "Test new approaches."
    personas: ["Developer", "Tech Lead"]
    lifecycle_stages: ["execute"]
    automation_level: "assisted"
  - id: d26-t4
    name: "Evaluate impact"
    description: "Measure success of changes."
    personas: ["Developer", "Tech Lead", "PM"]
    lifecycle_stages: ["verify", "learn"]
    automation_level: "assisted"

  # Migrated from legacy meta domain

    required_capabilities:
      - logging
      - code-generation
    input_schema: obs-001-input
    output_schema: obs-001-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - ChangeSet
    ui:
      icon: "article"
      color: "#7B1FA2"

    required_capabilities:
      - documentation
      - code-generation
    input_schema: doc-001-input
    output_schema: doc-001-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - ChangeSet
    ui:
      icon: "code"
      color: "#26A69A"

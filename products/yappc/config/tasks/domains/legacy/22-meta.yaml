    name: "Context Switching"
    description: "Manage transitions between different work contexts"
    personas:
      - Developer
    lifecycle_stages:
      - context
    automation_level: assisted
    required_capabilities:
      - context-management
      - organization
    input_schema: meta-001-input
    output_schema: meta-001-output
    audit_artifacts:
      - ContextRecord
    ui:
      icon: "swap_calls"
      color: "#607D8B"
      tags:
        - context
        - switching
        - focus


# Meta Tasks
# Domain 22 of 22 - Developer Task Universe
# Reference: developer-tasks.md Part I, Section 22

domain:
  id: meta
  name: "Meta Tasks"
  description: "Tasks about managing tasks, context, and workflow"
  order: 22
  icon: "hub"
  color: "#607D8B"
  lifecycle_stages:
    - intent
    - context
    - observe

tasks:

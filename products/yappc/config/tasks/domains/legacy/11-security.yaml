# Security Tasks
# Domain 11 of 22 - Developer Task Universe
# Reference: developer-tasks.md Part I, Section 11

domain:
  id: security
  name: "Security"
  description: "Tasks related to application security and compliance"
  order: 11
  icon: "security"
  color: "#D32F2F"
  lifecycle_stages:
    - plan
    - execute
    - verify

tasks:
  - id: sec-001
    name: "Implement Authentication"
    description: "Design and implement user authentication mechanisms"
    personas:
      - Developer
      - Security
    lifecycle_stages:
      - plan
      - execute
    automation_level: assisted
    required_capabilities:
      - security
      - authentication
    input_schema: sec-001-input
    output_schema: sec-001-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - ChangeSet
      - SecurityReview
    ui:
      icon: "lock"
      color: "#D32F2F"
      tags:
        - authentication
        - identity
        - security

  - id: sec-002
    name: "Implement Authorization"
    description: "Design and implement access control and permissions"
    personas:
      - Developer
      - Security
    lifecycle_stages:
      - plan
      - execute
    automation_level: assisted
    required_capabilities:
      - security
      - authorization
    input_schema: sec-002-input
    output_schema: sec-002-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - ChangeSet
      - SecurityReview
    ui:
      icon: "verified_user"
      color: "#D32F2F"
      tags:
        - authorization
        - permissions
        - rbac

  - id: sec-003
    name: "Manage Secrets"
    description: "Handle API keys, credentials, and sensitive configuration"
    personas:
      - Developer
      - DevOps
      - Security
    lifecycle_stages:
      - execute
    automation_level: assisted
    required_capabilities:
      - security
      - secrets-management
    input_schema: sec-003-input
    output_schema: sec-003-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - PolicyCheck
    ui:
      icon: "vpn_key"
      color: "#D32F2F"
      tags:
        - secrets
        - credentials
        - vault

  - id: sec-004
    name: "Implement Input Validation"
    description: "Create input sanitization and validation logic"
    personas:
      - Developer
      - Security
    lifecycle_stages:
      - execute
    automation_level: assisted
    required_capabilities:
      - security
      - code-generation
    input_schema: sec-004-input
    output_schema: sec-004-output
    audit_artifacts:

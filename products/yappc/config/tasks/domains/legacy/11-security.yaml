      color: "#D32F2F"
      tags:
        - input-validation
        - sanitization
        - security

  - id: sec-005
    name: "Security Code Review"
    description: "Review code for security vulnerabilities"
    personas:
      - Security
      - Developer
    lifecycle_stages:

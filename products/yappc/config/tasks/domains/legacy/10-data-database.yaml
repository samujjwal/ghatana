# Data & Database Tasks
# Domain 10 of 22 - Developer Task Universe
# Reference: developer-tasks.md Part I, Section 10

domain:
  id: data-database
  name: "Data & Database"
  description: "Tasks related to database design, data modeling, and data management"
  order: 10
  icon: "storage"
  color: "#8D6E63"
  lifecycle_stages:
    - plan
    - execute
    - verify

tasks:
  - id: data-001
    name: "Design Database Schema"
    description: "Create logical and physical database schema designs"
    personas:
      - Developer
      - Tech Lead
    lifecycle_stages:
      - plan
    automation_level: assisted
    required_capabilities:
      - database-design
      - data-modeling
    input_schema: data-001-input
    output_schema: data-001-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - DecisionRecord
      - SchemaDesign
    ui:
      icon: "schema"
      color: "#8D6E63"
      tags:
        - schema
        - design
        - database


      - Developer
      - Tech Lead
    lifecycle_stages:
      - plan
    automation_level: assisted
    required_capabilities:
      - decomposition
      - planning
    input_schema: plan-001-input
    output_schema: plan-001-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - ChangeSet
    ui:
      icon: "format_list_bulleted"
      color: "#FFEAA7"
      tags:
        - breakdown
        - tasks
        - decomposition

  - id: plan-002
    name: "Estimate Effort"

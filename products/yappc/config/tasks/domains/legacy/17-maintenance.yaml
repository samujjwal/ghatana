# Maintenance Tasks
# Domain 17 of 22 - Developer Task Universe
# Reference: developer-tasks.md Part I, Section 17

domain:
  id: maintenance
  name: "Maintenance"
  description: "Tasks related to bug fixes, technical debt, and system maintenance"
  order: 17
  icon: "build_circle"
  color: "#78909C"
  lifecycle_stages:
    - execute
    - verify

tasks:
  - id: maint-001
    name: "Fix Bugs"
    description: "Investigate and fix reported bugs"
    personas:
      - Developer
    lifecycle_stages:
      - execute
      - verify
    automation_level: assisted
    required_capabilities:
      - debugging
      - coding
    input_schema: maint-001-input
    output_schema: maint-001-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - ChangeSet
      - BugFixRecord
    ui:
      icon: "bug_report"
      color: "#78909C"
      tags:
        - bugs
        - fixes
        - maintenance

  - id: maint-002
    name: "Address Technical Debt"
    description: "Identify and resolve technical debt"
    personas:
      - Developer
      - Tech Lead
    lifecycle_stages:
      - plan
      - execute
    automation_level: assisted
    required_capabilities:
      - refactoring
      - code-analysis
    input_schema: maint-002-input
    output_schema: maint-002-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - ChangeSet
      - TechDebtRecord
    ui:
      icon: "credit_score"
      color: "#78909C"
      tags:
        - technical-debt
        - cleanup
        - improvement

  - id: maint-003
    name: "Upgrade Dependencies"
    description: "Update project dependencies to newer versions"
    personas:
      - Developer
    lifecycle_stages:
      - execute
      - verify
    automation_level: assisted
    required_capabilities:
      - dependency-management
      - testing
    input_schema: maint-003-input
    output_schema: maint-003-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - ChangeSet
      - DependencyReport
    ui:
      icon: "upgrade"
      color: "#78909C"
      tags:
        - dependencies
        - upgrades
        - maintenance

  - id: maint-004
    name: "Migrate to New Technology"
    description: "Plan and execute technology migrations"
    personas:
      - Developer
      - Tech Lead
    lifecycle_stages:
      - plan
      - execute
    automation_level: assisted
    required_capabilities:

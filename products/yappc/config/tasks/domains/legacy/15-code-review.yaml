    personas:
      - Developer
      - Tech Lead
    lifecycle_stages:
      - verify
    automation_level: assisted
    required_capabilities:
      - code-review
      - analysis
    input_schema: review-001-input
    output_schema: review-001-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - VerificationResult
      - ReviewComments
    ui:
      icon: "compare"
      color: "#5C6BC0"
      tags:
        - pull-request
        - review
        - code-quality


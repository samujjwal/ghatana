# Code Review Tasks
# Domain 15 of 22 - Developer Task Universe
# Reference: developer-tasks.md Part I, Section 15

domain:
  id: code-review
  name: "Code Review"
  description: "Tasks related to reviewing code and providing feedback"
  order: 15
  icon: "rate_review"
  color: "#5C6BC0"
  lifecycle_stages:
    - verify
    - learn

tasks:

# Implementation / Coding Tasks
# Domain 7 of 22 - Developer Task Universe
# Reference: developer-tasks.md Part I, Section 7

domain:
  id: implementation
  name: "Implementation / Coding"
  description: "Core development tasks including writing code, refactoring, and quality improvements"
  order: 7
  icon: "code"
  color: "#2196F3"
  lifecycle_stages:
    - execute

tasks:
  # Core Development Tasks
  - id: impl-001
    name: "Write Application Code"
    description: "Write new application code to implement features"
    personas:
      - Developer
    lifecycle_stages:
      - execute
    automation_level: assisted
    required_capabilities:
      - code-generation
      - language-understanding
    input_schema: impl-001-input
    output_schema: impl-001-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - ChangeSet
    ui:
      icon: "code"
      color: "#2196F3"
      tags:
        - coding
        - implementation
        - development
      input_hints:
        - "Describe the functionality to implement"
        - "Include any specific patterns or conventions to follow"
      output_hints:
        - "Review generated code for correctness"
        - "Ensure error handling is included"

  - id: impl-002
    name: "Implement Business Logic"
    description: "Write code that implements business rules and workflows"
    personas:
      - Developer
    lifecycle_stages:
      - execute
    automation_level: assisted

# Architecture & Design Tasks
# Domain 4 of 22 - Developer Task Universe
# Reference: developer-tasks.md Part I, Section 4

domain:
  id: architecture
  name: "Architecture & Design"
  description: "Tasks related to designing system architecture, APIs, and data models"
  order: 4
  icon: "architecture"
  color: "#96CEB4"
  lifecycle_stages:
    - context
    - plan

tasks:
  - id: arch-001
    name: "Design System Architecture"
    description: "Create high-level system architecture with components and interactions"
    personas:
      - Tech Lead
      - Developer
    lifecycle_stages:
      - plan
    automation_level: assisted
    required_capabilities:
      - architecture-design
      - system-thinking
    input_schema: arch-001-input
    output_schema: arch-001-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - DecisionRecord
    ui:
      icon: "account_tree"
      color: "#96CEB4"
      tags:
        - architecture
        - design
        - system

  - id: arch-002
    name: "Define Component and Service Boundaries"

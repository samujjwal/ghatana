      - coordination
    input_schema: cicd-004-input
    output_schema: cicd-004-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - ReleaseRecord
    ui:
      icon: "new_releases"
      color: "#00897B"
      tags:
        - releases
        - versioning
        - deployment

  - id: cicd-005
    name: "Deploy to Environments"
    description: "Deploy applications to various environments"
    personas:
      - DevOps
      - Developer
    lifecycle_stages:

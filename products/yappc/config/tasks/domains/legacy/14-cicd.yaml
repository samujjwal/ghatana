# CI/CD & DevOps Tasks
# Domain 14 of 22 - Developer Task Universe
# Reference: developer-tasks.md Part I, Section 14

domain:
  id: cicd
  name: "CI/CD & DevOps"
  description: "Tasks related to continuous integration, deployment, and operations"
  order: 14
  icon: "autorenew"
  color: "#00897B"
  lifecycle_stages:
    - execute
    - verify

tasks:
  - id: cicd-001
    name: "Configure CI Pipeline"
    description: "Set up continuous integration pipeline"
    personas:
      - DevOps
      - Developer
    lifecycle_stages:
      - execute
    automation_level: assisted
    required_capabilities:
      - ci-configuration
      - automation
    input_schema: cicd-001-input
    output_schema: cicd-001-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - ChangeSet
    ui:
      icon: "settings_suggest"
      color: "#00897B"
      tags:
        - ci
        - pipeline
        - configuration

  - id: cicd-002
    name: "Configure CD Pipeline"
    description: "Set up continuous deployment pipeline"
    personas:
      - DevOps
    lifecycle_stages:
      - execute
    automation_level: assisted
    required_capabilities:
      - cd-configuration
      - automation
    input_schema: cicd-002-input
    output_schema: cicd-002-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - ChangeSet
    ui:
      icon: "rocket_launch"
      color: "#00897B"
      tags:
        - cd
        - deployment
        - pipeline

  - id: cicd-003
    name: "Write Build Scripts"
    description: "Create scripts for building applications"
    personas:
      - Developer
      - DevOps
    lifecycle_stages:
      - execute
    automation_level: assisted
    required_capabilities:
      - scripting
      - build-systems
    input_schema: cicd-003-input
    output_schema: cicd-003-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - ChangeSet
    ui:
      icon: "build"
      color: "#00897B"
      tags:
        - build
        - scripts
        - automation

  - id: cicd-004
    name: "Manage Releases"
    description: "Coordinate and manage software releases"
    personas:
      - DevOps
      - Tech Lead
    lifecycle_stages:
      - execute
    automation_level: assisted
    required_capabilities:

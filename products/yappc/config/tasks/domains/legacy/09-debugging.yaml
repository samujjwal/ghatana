# Debugging Tasks
# Domain 9 of 22 - Developer Task Universe
# Reference: developer-tasks.md Part I, Section 9

domain:
  id: debugging
  name: "Debugging"
  description: "Tasks related to diagnosing and fixing issues"
  order: 9
  icon: "bug_report"
  color: "#EF5350"
  lifecycle_stages:
    - execute
    - verify
    - observe

tasks:
  - id: debug-001
    name: "Reproduce Issues"
    description: "Replicate reported bugs in a controlled environment"
    personas:
      - Developer
      - QA
    lifecycle_stages:
      - execute
    automation_level: assisted
    required_capabilities:
      - debugging
      - environment-management
    input_schema: debug-001-input
    output_schema: debug-001-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - DecisionRecord
    ui:
      icon: "repeat"
      color: "#EF5350"
      tags:
        - reproduction
        - bugs
        - investigation


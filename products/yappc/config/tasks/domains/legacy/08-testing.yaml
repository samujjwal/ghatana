# Testing Tasks
# Domain 8 of 22 - Developer Task Universe
# Reference: developer-tasks.md Part I, Section 8

domain:
  id: testing
  name: "Testing"
  description: "Tasks related to creating and executing tests"
  order: 8
  icon: "science"
  color: "#66BB6A"
  lifecycle_stages:
    - execute
    - verify

tasks:
  # Test Creation Tasks
  - id: test-001
    name: "Write Unit Tests"
    description: "Create unit tests for individual functions and components"
    personas:
      - Developer
      - QA
    lifecycle_stages:
      - execute
      - verify
    automation_level: assisted
    required_capabilities:
      - testing
      - code-generation
    input_schema: test-001-input
    output_schema: test-001-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - ChangeSet
      - VerificationResult
    ui:
      icon: "check_box"
      color: "#66BB6A"
      tags:
        - unit-tests
        - testing
        - coverage

  - id: test-002

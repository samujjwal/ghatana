# Governance Tasks
# Domain 21 of 22 - Developer Task Universe
# Reference: developer-tasks.md Part I, Section 21

domain:
  id: governance
  name: "Governance"
  description: "Tasks related to decision tracking, approvals, and compliance"
  order: 21
  icon: "gavel"
  color: "#5D4037"
  lifecycle_stages:
    - institutionalize

tasks:
  - id: gov-001
    name: "Track Technical Decisions"
    description: "Record and track important technical decisions"
    personas:
      - Tech Lead
      - Developer
    lifecycle_stages:
      - institutionalize
    automation_level: assisted
    required_capabilities:
      - documentation
      - decision-tracking
    input_schema: gov-001-input
    output_schema: gov-001-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - DecisionRecord
    ui:
      icon: "fact_check"
      color: "#5D4037"
      tags:
        - decisions
        - tracking
        - governance

  - id: gov-002

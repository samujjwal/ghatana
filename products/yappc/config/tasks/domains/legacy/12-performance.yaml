# Performance Tasks
# Domain 12 of 22 - Developer Task Universe
# Reference: developer-tasks.md Part I, Section 12

domain:
  id: performance
  name: "Performance"
  description: "Tasks related to performance optimization and monitoring"
  order: 12
  icon: "speed"
  color: "#FF9800"
  lifecycle_stages:
    - verify
    - observe

tasks:
  - id: perf-001
    name: "Profile Application"
    description: "Use profiling tools to analyze application performance"
    personas:
      - Developer
    lifecycle_stages:
      - observe
    automation_level: assisted
    required_capabilities:
      - performance-profiling
      - analysis
    input_schema: perf-001-input
    output_schema: perf-001-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
      - PerformanceReport
    ui:
      icon: "timeline"
      color: "#FF9800"
      tags:
        - profiling
        - analysis
        - performance

  - id: perf-002

# Research & Discovery Tasks
# Domain 3 of 22 - Developer Task Universe
# Reference: developer-tasks.md Part I, Section 3

domain:
  id: research
  name: "Research & Discovery"
  description: "Tasks related to exploring codebases, researching tools, and prototyping"
  order: 3
  icon: "search"
  color: "#45B7D1"
  lifecycle_stages:
    - context
    - plan

tasks:
  - id: res-001
    name: "Explore Existing Codebases"
    description: "Navigate and understand existing code to find relevant patterns and dependencies"
    personas:
      - Developer
      - Tech Lead
    lifecycle_stages:
      - context
    automation_level: assisted
    required_capabilities:
      - code-analysis
      - navigation
    input_schema: res-001-input
    output_schema: res-001-output
    audit_artifacts:
      - InputSnapshot
      - OutputSnapshot
    ui:
      icon: "folder_open"
      color: "#45B7D1"
      tags:
        - codebase
        - exploration
        - analysis

  - id: res-002

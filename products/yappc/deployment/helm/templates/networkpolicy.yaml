{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "yappc.fullname" . }}-default
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "yappc.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "yappc.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  
  # Ingress rules
  ingress:
    {{- if .Values.networkPolicy.allowIngressFromNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- end }}
    
    {{- if .Values.networkPolicy.allowPrometheusMetrics }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: {{ .Values.monitoring.prometheus.port }}
    {{- end }}
    
    {{- if .Values.networkPolicy.allowFromPods }}
    - from:
        - podSelector:
            matchLabels:
              allow-yappc: "true"
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- end }}

  # Egress rules
  egress:
    {{- if .Values.networkPolicy.allowEgressToDNS }}
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    
    {{- if .Values.networkPolicy.allowEgressToDatabase }}
    # Allow database connectivity
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.database.port }}
    {{- end }}
    
    {{- if .Values.networkPolicy.allowEgressToCache }}
    # Allow cache connectivity (Redis)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.cache.port }}
    {{- end }}
    
    {{- if .Values.networkPolicy.allowEgressToExternalAPIs }}
    # Allow HTTPS to external APIs
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}

{{- if .Values.networkPolicy.enableCrossNamespacePolicy }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "yappc.fullname" . }}-cross-namespace
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "yappc.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "yappc.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow ingress from specific namespaces
    {{- range .Values.networkPolicy.allowFromNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ . }}
      ports:
        - protocol: TCP
          port: {{ $.Values.service.port }}
    {{- end }}
{{- end }}
{{- end }}

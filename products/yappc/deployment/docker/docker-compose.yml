# YAPPC Platform - Unified Docker Compose Configuration
# 
# Usage:
#   docker compose up                          # Start all services
#   docker compose --profile ai up            # Start AI services only
#   docker compose --profile web up           # Start web app only
#   docker compose --profile backend up       # Start backend only
#   docker compose --profile full up          # Start everything

version: "3.8"

networks:
  yappc-network:
    driver: bridge
  ghatana-network:
    external: true
    name: ghatana-network

volumes:
  postgres-data:
  redis-data:

services:
  # ============================================================================
  # AI Requirements Service
  # ============================================================================
  ai-requirements-api:
    profiles: [ai, backend, full]
    build:
      context: ../../core/ai
      dockerfile: Dockerfile
    container_name: yappc-ai-requirements
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ghatana-redis
      REDIS_PORT: 6379
      SERVER_PORT: 8081
      AI_PROVIDER: ${AI_PROVIDER}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      LOG_LEVEL: INFO
    ports:
      - "8081:8081"
    external_links:
      - ghatana-postgres:postgres
      - ghatana-redis:redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - yappc-network
      - ghatana-network
    restart: unless-stopped

  # ============================================================================
  # Lifecycle Service
  # ============================================================================
  lifecycle-api:
    profiles: [lifecycle, backend, full]
    build:
      context: ../../core/lifecycle
      dockerfile: Dockerfile
    container_name: yappc-lifecycle
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ghatana-redis
      REDIS_PORT: 6379
      SERVER_PORT: 8082
      LOG_LEVEL: INFO
    ports:
      - "8082:8082"
    external_links:
      - ghatana-postgres:postgres
      - ghatana-redis:redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - yappc-network
      - ghatana-network
    restart: unless-stopped

  # ============================================================================
  # Backend API (Node.js)
  # ============================================================================
  backend-api:
    profiles: [backend, full]
    build:
      context: ../../backend/api
      dockerfile: Dockerfile
    container_name: yappc-backend-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ghatana-postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@ghatana-redis:6379
      PORT: 3000
      NODE_ENV: production
      AI_REQUIREMENTS_URL: http://ai-requirements-api:8081
      LIFECYCLE_API_URL: http://lifecycle-api:8082
    ports:
      - "3000:3000"
    external_links:
      - ghatana-postgres:postgres
      - ghatana-redis:redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - yappc-network
      - ghatana-network
    restart: unless-stopped
    depends_on:
      - ai-requirements-api
      - lifecycle-api

  # ============================================================================
  # App Creator Web (React/Vite)
  # ============================================================================
  app-creator-web:
    profiles: [web, full]
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: yappc-app-creator
    environment:
      VITE_API_URL: http://backend-api:3000
      VITE_AI_API_URL: http://ai-requirements-api:8081
      VITE_LIFECYCLE_API_URL: http://lifecycle-api:8082
      PORT: 5173
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - yappc-network
    restart: unless-stopped
    depends_on:
      - backend-api

  # ============================================================================
  # YAPPC Main Backend (Legacy - Consolidated)
  # ============================================================================
  yappc-backend:
    profiles: [backend, full]
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    container_name: yappc-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ghatana-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SERVER_PORT: 8080
      METRICS_ENABLED: "true"
      TRACING_ENABLED: "true"
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT}
      LOG_LEVEL: INFO
      JVM_OPTS: "${JVM_OPTS}"
    ports:
      - "8080:8080"
    external_links:
      - ghatana-postgres:postgres
      - ghatana-redis:redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - yappc-network
      - ghatana-network
    restart: unless-stopped

  # ============================================================================
  # Observability - Jaeger (Optional)
  # ============================================================================
  jaeger:
    profiles: [observability, full]
    image: jaegertracing/all-in-one:latest
    container_name: yappc-jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"  # Jaeger UI
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "9411:9411"
    networks:
      - yappc-network
    restart: unless-stopped

  # ============================================================================
  # Observability - Prometheus (Optional)
  # ============================================================================
  prometheus:
    profiles: [observability, full]
    image: prom/prometheus:latest
    container_name: yappc-prometheus
    volumes:
      - ./prometheus.yappc.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - yappc-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'

  # ============================================================================
  # Observability - Grafana (Optional)
  # ============================================================================
  grafana:
    profiles: [observability, full]
    image: grafana/grafana:latest
    container_name: yappc-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    networks:
      - yappc-network
    restart: unless-stopped
    depends_on:
      - prometheus

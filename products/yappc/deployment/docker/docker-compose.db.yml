version: "3.8"

services:
  # ============================================================================
  # PostgreSQL Database - Persistence Layer
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: yappc-postgres
    environment:
      POSTGRES_USER: ghatana
      POSTGRES_PASSWORD: ghatana123
      POSTGRES_DB: yappc
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - yappc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghatana -d yappc"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # Flyway Migration Tool - Schema Management
  # ============================================================================
  flyway:
    image: flyway/flyway:10
    container_name: yappc-flyway
    command: -connectRetries=60 -url=jdbc:postgresql://postgres:5432/yappc -user=ghatana -password=ghatana123 -locations=filesystem:/flyway/sql migrate
    volumes:
      - ../../platform/src/main/resources/db/migration:/flyway/sql
    networks:
      - yappc-network
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    image: postgres:16-alpine
    container_name: yappc-seed
    command: >-
      sh -c "until pg_isready -h postgres -p 5432 -U ghatana -d yappc; do sleep 2; done;
      psql -h postgres -U ghatana -d yappc -f /seed/V1_0_0__YAPPC_DEV_SEED.sql"
    environment:
      PGPASSWORD: ghatana123
    volumes:
      - ../../platform/src/main/resources/db/seed:/seed:ro
    networks:
      - yappc-network
    depends_on:
      flyway:
        condition: service_completed_successfully

volumes:
  postgres_data:

networks:
  yappc-network:
    driver: bridge

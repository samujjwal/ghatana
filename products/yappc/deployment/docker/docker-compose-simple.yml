# YAPPC Platform - Simplified Docker Compose Configuration
# 
# Quick Start:
#   cp .env.example .env
#   docker compose -f docker-compose-simple.yml up
#
# This configuration starts all YAPPC services with minimal setup.
# All services run on the same network with sensible defaults.

version: "3.8"

networks:
  yappc-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: yappc-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yappc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yappc123}
      POSTGRES_DB: ${POSTGRES_DB:-yappc}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yappc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yappc-network
    restart: unless-stopped

  # ============================================================================
  # Redis Cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: yappc-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yappc-network
    restart: unless-stopped

  # ============================================================================
  # AI Requirements Service
  # ============================================================================
  ai-requirements-api:
    build:
      context: ../../core/ai
      dockerfile: Dockerfile
    container_name: yappc-ai-requirements
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-yappc}:${POSTGRES_PASSWORD:-yappc123}@postgres:5432/${POSTGRES_DB:-yappc}
      DATABASE_USERNAME: ${POSTGRES_USER:-yappc}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-yappc123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      SERVER_PORT: 8082
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - yappc-network
    restart: unless-stopped

  # ============================================================================
  # Lifecycle Service
  # ============================================================================
  lifecycle-api:
    build:
      context: ../../core/lifecycle
      dockerfile: Dockerfile
    container_name: yappc-lifecycle
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-yappc}:${POSTGRES_PASSWORD:-yappc123}@postgres:5432/${POSTGRES_DB:-yappc}
      DATABASE_USERNAME: ${POSTGRES_USER:-yappc}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-yappc123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      SERVER_PORT: 8082
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - yappc-network
    restart: unless-stopped

  # ============================================================================
  # YAPPC Main Backend
  # ============================================================================
  yappc-backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    container_name: yappc-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-yappc}:${POSTGRES_PASSWORD:-yappc123}@postgres:5432/${POSTGRES_DB:-yappc}
      DATABASE_USERNAME: ${POSTGRES_USER:-yappc}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-yappc123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      SERVER_PORT: 8082
      METRICS_ENABLED: "true"
      TRACING_ENABLED: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JVM_OPTS: "${JVM_OPTS:--Xmx1g -Xms512m}"
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-requirements-api:
        condition: service_healthy
      lifecycle-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - yappc-network
    restart: unless-stopped

  # ============================================================================
  # YAPPC Web App (React/Vite)
  # ============================================================================
  yappc-web:
    build:
      context: ../../frontend/web
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
        VITE_API_URL: http://yappc-backend:8082
    container_name: yappc-web
    environment:
      VITE_API_URL: http://yappc-backend:8082
      VITE_AI_API_URL: http://ai-requirements-api:8082
      VITE_LIFECYCLE_API_URL: http://lifecycle-api:8082
      PORT: 5173
    ports:
      - "5173:5173"
    depends_on:
      yappc-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - yappc-network
    restart: unless-stopped

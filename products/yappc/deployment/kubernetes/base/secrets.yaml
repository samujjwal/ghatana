# Kubernetes Secrets for YAPPC Platform
# NOTE: This is a TEMPLATE. In production, use sealed-secrets or external secret management.
# DO NOT commit actual secrets to git!

apiVersion: v1
kind: Secret
metadata:
  name: yappc-secrets
  namespace: yappc
  labels:
    app: yappc-agents
type: Opaque
stringData:
  # JWT Authentication (CHANGE IN PRODUCTION!)
  JWT_ACCESS_SECRET: "CHANGE_ME_TO_RANDOM_256_BIT_STRING"
  JWT_REFRESH_SECRET: "CHANGE_ME_TO_RANDOM_256_BIT_STRING"
  JWT_ISSUER: "yappc-production"
  JWT_EXPIRY_HOURS: "24"
  
  # Database (CHANGE IN PRODUCTION!)
  DATABASE_PASSWORD: "CHANGE_ME_TO_STRONG_PASSWORD"
  YAPPC_ENCRYPTION_KEY: "CHANGE_ME_TO_BASE64_256_BIT_KEY"
  
  # LLM API Keys (optional - for external providers)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  OLLAMA_API_KEY: ""
  
  # TLS/SSL
  TLS_KEYSTORE_PASSWORD: "CHANGE_ME_TO_KEYSTORE_PASSWORD"
---
# Secrets for the YAPPC Lifecycle Java service (separate runtime from BFF)
apiVersion: v1
kind: Secret
metadata:
  name: yappc-lifecycle-secrets
  namespace: yappc
  labels:
    app: yappc-lifecycle
type: Opaque
stringData:
  # Encryption key for project environment variables at rest (AES-256-GCM)
  # Must be a Base64-encoded 256-bit (32-byte) key (CHANGE IN PRODUCTION!)
  encryption-key: "CHANGE_ME_TO_BASE64_256_BIT_KEY"
  # JWT signing secret for the lifecycle service's own auth endpoints
  # Must match YAPPC_JWT_SECRET read by LifecycleServiceModule (CHANGE IN PRODUCTION!)
  jwt-secret: "CHANGE_ME_TO_RANDOM_256_BIT_STRING"
  # Comma-separated API keys for direct service-to-service calls
  api-keys: "CHANGE_ME_TO_STRONG_API_KEY"
  # Postgres connection URL for the lifecycle service
  database-url: "jdbc:postgresql://postgres:5432/yappc?user=yappc&password=CHANGE_ME"
---
# Example: Using SealedSecrets (Bitnami)
# Install: kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.0/controller.yaml
# 
# To seal this secret:
# 1. Fill in actual values above
# 2. kubeseal --format yaml < secrets.yaml > sealed-secrets.yaml
# 3. Apply: kubectl apply -f sealed-secrets.yaml
# 4. Delete secrets.yaml (never commit!)

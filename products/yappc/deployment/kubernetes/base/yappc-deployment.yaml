apiVersion: v1
kind: ServiceAccount
metadata:
  name: yappc
  namespace: yappc
  labels:
    app: yappc-agents
    component: sdlc-platform
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yappc-agents
  namespace: yappc
  labels:
    app: yappc-agents
    component: sdlc-platform
spec:
  replicas: 3  # Start with 3 replicas (HPA will adjust)
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime deployments
  selector:
    matchLabels:
      app: yappc-agents
  template:
    metadata:
      labels:
        app: yappc-agents
        component: sdlc-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: yappc
      automountServiceAccountToken: false
      # Security Context (non-root)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      # Init Container: Wait for Ollama to be ready
      initContainers:
        - name: wait-for-ollama
          image: busybox:1.36
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          command: ['sh', '-c']
          args:
            - |
              echo "Waiting for Ollama service..."
              until nc -z ollama-service 11434; do
                echo "Ollama not ready, waiting..."
                sleep 5
              done
              echo "✅ Ollama is ready!"
      
      # Main Container: YAPPC Agents
      containers:
        - name: yappc-agents
          image: docker.io/ghatana/yappc:2026.3.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          
          # Environment from ConfigMap
          envFrom:
            - configMapRef:
                name: yappc-config
          
          # Environment from Secrets
          env:
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: JWT_REFRESH_SECRET
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: DATABASE_PASSWORD
            - name: YAPPC_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: YAPPC_ENCRYPTION_KEY
          
          # Resource Limits
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
          
          # Persistent Storage
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: yappc-logs
              mountPath: /app/logs
            - name: yappc-cache
              mountPath: /app/cache
          
          # Health Checks
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          
          # Startup Probe
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20  # 3.5 minutes for startup
      
      # Volumes
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: yappc-logs
          persistentVolumeClaim:
            claimName: yappc-logs-pvc
        - name: yappc-cache
          persistentVolumeClaim:
            claimName: yappc-cache-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: yappc-service
  namespace: yappc
  labels:
    app: yappc-agents
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: yappc-agents
  sessionAffinity: ClientIP  # Sticky sessions for stateful operations
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: yappc-agents-default
  namespace: yappc
  labels:
    app: yappc-agents
    component: sdlc-platform
spec:
  podSelector:
    matchLabels:
      app: yappc-agents
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 11434
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

apiVersion: apps/v1
kind: Deployment
metadata:
  name: yappc-agents
  namespace: yappc
  labels:
    app: yappc-agents
    component: sdlc-platform
spec:
  replicas: 3  # Start with 3 replicas (HPA will adjust)
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime deployments
  selector:
    matchLabels:
      app: yappc-agents
  template:
    metadata:
      labels:
        app: yappc-agents
        component: sdlc-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # Security Context (non-root)
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      
      # Init Container: Wait for Ollama to be ready
      initContainers:
        - name: wait-for-ollama
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              echo "Waiting for Ollama service..."
              until nc -z ollama-service 11434; do
                echo "Ollama not ready, waiting..."
                sleep 5
              done
              echo "✅ Ollama is ready!"
      
      # Main Container: YAPPC Agents
      containers:
        - name: yappc-agents
          image: yappc-agents:latest  # TODO: Replace with actual image registry
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          
          # Environment from ConfigMap
          envFrom:
            - configMapRef:
                name: yappc-config
          
          # Environment from Secrets
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: JWT_SECRET
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: DATABASE_PASSWORD
            - name: DB_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: DB_ENCRYPTION_KEY
          
          # Resource Limits
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
          
          # Persistent Storage
          volumeMounts:
            - name: yappc-logs
              mountPath: /app/logs
            - name: yappc-cache
              mountPath: /app/cache
          
          # Health Checks
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          
          # Startup Probe
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20  # 3.5 minutes for startup
      
      # Volumes
      volumes:
        - name: yappc-logs
          persistentVolumeClaim:
            claimName: yappc-logs-pvc
        - name: yappc-cache
          persistentVolumeClaim:
            claimName: yappc-cache-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: yappc-service
  namespace: yappc
  labels:
    app: yappc-agents
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: yappc-agents
  sessionAffinity: ClientIP  # Sticky sessions for stateful operations
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours

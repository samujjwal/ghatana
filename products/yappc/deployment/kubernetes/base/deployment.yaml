# YAPPC Dashboard - Kubernetes Deployment
# Production-ready deployment with auto-scaling, health checks, and resource limits

apiVersion: apps/v1
kind: Deployment
metadata:
  name: yappc-backend
  namespace: yappc
  labels:
    app: yappc-backend
    version: v1.0.0
    tier: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: yappc-backend
  template:
    metadata:
      labels:
        app: yappc-backend
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: yappc-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # Init container for database migrations
      initContainers:
        - name: flyway-migrate
          image: flyway/flyway:latest
          command:
            - flyway
            - migrate
            - -url=$(DATABASE_URL)
            - -user=$(DATABASE_USERNAME)
            - -password=$(DATABASE_PASSWORD)
            - -locations=filesystem:/flyway/sql
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: database-url
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: database-username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: database-password
          volumeMounts:
            - name: migrations
              mountPath: /flyway/sql

      containers:
        - name: yappc-backend
          image: ghcr.io/ghatana/yappc-backend:1.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            # Database
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: database-url
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: database-username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: database-password

            # Redis
            - name: REDIS_HOST
              value: "yappc-redis"
            - name: REDIS_PORT
              value: "6379"

            # Server
            - name: SERVER_PORT
              value: "8080"

            # Observability
            - name: METRICS_ENABLED
              value: "true"
            - name: TRACING_ENABLED
              value: "true"
            - name: JAEGER_ENDPOINT
              value: "http://jaeger-collector:14250"

            # JVM
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"

          # Resource limits
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

          # Health checks
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

          # Startup probe for slow starts
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 30

          # Volume mounts
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: yappc-config
        - name: migrations
          configMap:
            name: yappc-migrations

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: yappc-backend
  namespace: yappc
  labels:
    app: yappc-backend
spec:
  type: ClusterIP
  selector:
    app: yappc-backend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  sessionAffinity: ClientIP

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: yappc-backend
  namespace: yappc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: yappc-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: yappc-backend
  namespace: yappc
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: yappc-backend

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: yappc-backend
  namespace: yappc

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yappc-backend
  namespace: yappc
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/websocket-services: "yappc-backend"
spec:
  tls:
    - hosts:
        - api.yappc.ghatana.com
      secretName: yappc-tls
  rules:
    - host: api.yappc.ghatana.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yappc-backend
                port:
                  number: 80

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: yappc-agents-hpa
  namespace: yappc
  labels:
    app: yappc-agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: yappc-agents
  minReplicas: 3
  maxReplicas: 10
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60  # Wait 1 min before scaling up
      policies:
        - type: Percent
          value: 50  # Scale up by 50% at a time
          periodSeconds: 60
        - type: Pods
          value: 2  # Or add 2 pods at a time
          periodSeconds: 60
      selectPolicy: Max  # Use the policy that scales up most
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
        - type: Percent
          value: 10  # Scale down by 10% at a time
          periodSeconds: 60
        - type: Pods
          value: 1  # Or remove 1 pod at a time
          periodSeconds: 60
      selectPolicy: Min  # Use the policy that scales down least
  metrics:
    # CPU-based scaling
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70  # Scale when CPU > 70%
    
    # Memory-based scaling
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80  # Scale when memory > 80%
    
    # Custom metric: HTTP request rate (requires metrics-server)
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "100"  # Scale when > 100 req/s per pod

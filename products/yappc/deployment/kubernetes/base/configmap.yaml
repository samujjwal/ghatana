apiVersion: v1
kind: ConfigMap
metadata:
  name: yappc-config
  namespace: yappc
  labels:
    app: yappc-agents
data:
  # Ollama Configuration
  OLLAMA_BASE_URL: "http://ollama-service:11434"
  OLLAMA_MODEL: "llama3.2"
  OLLAMA_TEMPERATURE: "0.7"
  OLLAMA_MAX_TOKENS: "4000"
  
  # GPU Configuration
  OLLAMA_GPU_ENABLED: "true"
  OLLAMA_BATCH_SIZE: "4"
  OLLAMA_REQUEST_TIMEOUT: "30000"
  
  # Agent Configuration
  YAPPC_AGENT_COUNT: "27"
  YAPPC_PHASE_COUNT: "4"
  YAPPC_MODE: "production"
  
  # Java/JVM Settings
  JAVA_OPTS: "-Xmx2G -Xms1G -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
  
  # Observability
  METRICS_ENABLED: "true"
  PROMETHEUS_PORT: "9090"
  
  # Logging
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-config
  namespace: yappc
  labels:
    app: ollama
data:
  # Ollama GPU Settings
  OLLAMA_HOST: "0.0.0.0:11434"
  OLLAMA_ORIGINS: "*"
  OLLAMA_NUM_GPU: "1"
  OLLAMA_GPU_LAYERS: "33"
  OLLAMA_NUM_THREAD: "8"
  OLLAMA_NUM_PARALLEL: "4"
  OLLAMA_FLASH_ATTENTION: "1"
  OLLAMA_MAX_LOADED_MODELS: "2"

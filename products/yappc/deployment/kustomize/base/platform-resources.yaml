apiVersion: v1
kind: ServiceAccount
metadata:
  name: yappc
  namespace: yappc
  labels:
    app: yappc-agents
    component: sdlc-platform
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yappc-agents
  namespace: yappc
  labels:
    app: yappc-agents
    component: sdlc-platform
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: yappc-agents
  template:
    metadata:
      labels:
        app: yappc-agents
        component: sdlc-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: yappc
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-ollama
          image: busybox:1.36
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
          args:
            - |
              echo "Waiting for Ollama service..."
              until nc -z ollama-service 11434; do
                echo "Ollama not ready, waiting..."
                sleep 5
              done
              echo "Ollama is ready!"
      containers:
        - name: yappc-agents
          image: docker.io/ghatana/yappc:2026.3.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: yappc-config
          env:
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: JWT_REFRESH_SECRET
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: DATABASE_PASSWORD
            - name: YAPPC_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: yappc-secrets
                  key: YAPPC_ENCRYPTION_KEY
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: yappc-logs
              mountPath: /app/logs
            - name: yappc-cache
              mountPath: /app/cache
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: yappc-logs
          persistentVolumeClaim:
            claimName: yappc-logs-pvc
        - name: yappc-cache
          persistentVolumeClaim:
            claimName: yappc-cache-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: yappc-service
  namespace: yappc
  labels:
    app: yappc-agents
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: yappc-agents
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: yappc-agents-default
  namespace: yappc
  labels:
    app: yappc-agents
    component: sdlc-platform
spec:
  podSelector:
    matchLabels:
      app: yappc-agents
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8082
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 11434
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yappc-config
  namespace: yappc
  labels:
    app: yappc-agents
data:
  OLLAMA_BASE_URL: "http://ollama-service:11434"
  OLLAMA_MODEL: "llama3.2"
  OLLAMA_TEMPERATURE: "0.7"
  OLLAMA_MAX_TOKENS: "4000"
  OLLAMA_GPU_ENABLED: "true"
  OLLAMA_BATCH_SIZE: "4"
  OLLAMA_REQUEST_TIMEOUT: "30000"
  YAPPC_AGENT_COUNT: "27"
  YAPPC_PHASE_COUNT: "4"
  YAPPC_MODE: "production"
  YAPPC_PROFILE: "production"
  YAPPC_KERNEL_LIFECYCLE_TRUTH_SOURCE: "data-cloud"
  JAVA_OPTS: "-Xmx2G -Xms1G -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
  METRICS_ENABLED: "true"
  PROMETHEUS_PORT: "9090"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-config
  namespace: yappc
  labels:
    app: ollama
data:
  OLLAMA_HOST: "0.0.0.0:11434"
  OLLAMA_ORIGINS: "*"
  OLLAMA_NUM_GPU: "1"
  OLLAMA_GPU_LAYERS: "33"
  OLLAMA_NUM_THREAD: "8"
  OLLAMA_NUM_PARALLEL: "4"
  OLLAMA_FLASH_ATTENTION: "1"
  OLLAMA_MAX_LOADED_MODELS: "2"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models-pvc
  namespace: yappc
  labels:
    app: ollama
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: fast-ssd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: yappc-logs-pvc
  namespace: yappc
  labels:
    app: yappc-agents
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: yappc-cache-pvc
  namespace: yappc
  labels:
    app: yappc-agents
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yappc-ingress
  namespace: yappc
  labels:
    app: yappc-agents
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://yappc.ghatana.ai"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - yappc.ghatana.ai
      secretName: yappc-tls-cert
  rules:
    - host: yappc.ghatana.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yappc-service
                port:
                  number: 8082
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@ghatana.ai
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: yappc-agents-hpa
  namespace: yappc
  labels:
    app: yappc-agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: yappc-agents
  minReplicas: 3
  maxReplicas: 10
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "100"

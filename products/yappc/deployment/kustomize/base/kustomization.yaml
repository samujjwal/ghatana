apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: yappc

labels:
  - pairs:
      app.kubernetes.io/part-of: yappc

resources:
  - platform-resources.yaml

# Note: Kustomize overlays are for pure-yaml workflows.
# For Helm-based deployments, use: helm install -f values-<env>.yaml
# This base is kept self-contained so kubectl kustomize works without non-default load restrictor flags.

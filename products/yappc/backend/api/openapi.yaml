components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantId:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
      description: Tenant identifier for multi-tenancy

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    # ========== Common ==========
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    # ========== Audit ==========
    AuditEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
        eventType:
          type: string
        principal:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
        success:
          type: boolean
        details:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time

    AuditEventsPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    RecordAuditEventRequest:
      type: object
      required: [eventType, resourceType, resourceId]
      properties:
        eventType:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
        details:
          type: object
          additionalProperties: true

    # ========== Versions ==========
    Version:
      type: object
      properties:
        id:
          type: string
          format: uuid
        resourceType:
          type: string
        resourceId:
          type: string
          format: uuid
        versionNumber:
          type: integer
        author:
          type: string
        reason:
          type: string
        snapshot:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    VersionHistory:
      type: object
      properties:
        resourceId:
          type: string
          format: uuid
        versions:
          type: array
          items:
            $ref: "#/components/schemas/Version"
        currentVersion:
          type: integer

    VersionComparison:
      type: object
      properties:
        fromVersion:
          type: integer
        toVersion:
          type: integer
        changes:
          type: array
          items:
            $ref: "#/components/schemas/FieldChange"

    FieldChange:
      type: object
      properties:
        field:
          type: string
        oldValue:
          type: string
        newValue:
          type: string
        changeType:
          type: string
          enum: [ADDED, MODIFIED, REMOVED]

    CreateVersionRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
        snapshot:
          type: object

    RollbackRequest:
      type: object
      required: [targetVersion]
      properties:
        targetVersion:
          type: integer
        reason:
          type: string

    # ========== Requirements ==========
    RequirementStatus:
      type: string
      enum:
        [DRAFT, REVIEW, APPROVED, REJECTED, IMPLEMENTED, VERIFIED, DEPRECATED]

    RequirementType:
      type: string
      enum:
        [
          FUNCTIONAL,
          NON_FUNCTIONAL,
          CONSTRAINT,
          INTERFACE,
          SECURITY,
          PERFORMANCE,
          USABILITY,
          COMPLIANCE,
        ]

    Priority:
      type: string
      enum: [CRITICAL, HIGH, MEDIUM, LOW]

    Requirement:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
        projectId:
          type: string
        title:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/RequirementType"
        status:
          $ref: "#/components/schemas/RequirementStatus"
        priority:
          $ref: "#/components/schemas/Priority"
        category:
          type: string
        createdBy:
          type: string
        assignedTo:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        versionNumber:
          type: integer
        tags:
          type: array
          items:
            type: string
        qualityMetrics:
          $ref: "#/components/schemas/QualityMetrics"

    QualityMetrics:
      type: object
      properties:
        testabilityScore:
          type: number
          format: double
        completenessScore:
          type: number
          format: double
        clarityScore:
          type: number
          format: double
        ambiguityFlags:
          type: array
          items:
            type: string

    CreateRequirementRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/RequirementType"
        priority:
          $ref: "#/components/schemas/Priority"
        category:
          type: string
        projectId:
          type: string
        tags:
          type: array
          items:
            type: string

    UpdateRequirementRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          $ref: "#/components/schemas/Priority"
        category:
          type: string
        assignedTo:
          type: string
        tags:
          type: array
          items:
            type: string

    RequirementsFunnel:
      type: object
      properties:
        draft:
          type: integer
        review:
          type: integer
        approved:
          type: integer
        rejected:
          type: integer
        implemented:
          type: integer
        verified:
          type: integer
        total:
          type: integer

    # ========== AI Suggestions ==========
    SuggestionType:
      type: string
      enum:
        [
          REQUIREMENT,
          CLARIFICATION,
          REFINEMENT,
          ALTERNATIVE,
          DECOMPOSITION,
          DEPENDENCY,
          EDGE_CASE,
          SECURITY,
          PERFORMANCE,
          TESTABILITY,
        ]

    SuggestionStatus:
      type: string
      enum: [PENDING, ACCEPTED, REJECTED, DEFERRED, APPLIED, EXPIRED]

    AISuggestion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
        projectId:
          type: string
        type:
          $ref: "#/components/schemas/SuggestionType"
        status:
          $ref: "#/components/schemas/SuggestionStatus"
        title:
          type: string
        content:
          type: string
        rationale:
          type: string
        sourceModel:
          type: string
        targetResourceId:
          type: string
        targetResourceType:
          type: string
        confidence:
          type: number
          format: double
        priority:
          $ref: "#/components/schemas/Priority"
        createdAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time
        reviewedBy:
          type: string
        reviewNotes:
          type: string

    GenerateSuggestionRequest:
      type: object
      required: [type, targetResourceType, targetResourceId]
      properties:
        type:
          $ref: "#/components/schemas/SuggestionType"
        targetResourceType:
          type: string
        targetResourceId:
          type: string
        context:
          type: string

    AcceptSuggestionRequest:
      type: object
      properties:
        notes:
          type: string

    RejectSuggestionRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    AISuggestionStats:
      type: object
      properties:
        pendingCount:
          type: integer
        acceptedCount:
          type: integer
        rejectedCount:
          type: integer
        acceptanceRate:
          type: number
          format: double
        averageConfidence:
          type: number
          format: double
        byType:
          type: object
          additionalProperties:
            type: integer

    # ========== Architecture ==========
    ImpactAnalysisRequest:
      type: object
      required: [requirementId]
      properties:
        requirementId:
          type: string
        changeDescription:
          type: string

    ImpactAnalysisResult:
      type: object
      properties:
        requirementId:
          type: string
        blastRadius:
          type: integer
        riskScore:
          type: number
          format: double
        riskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        affectedComponents:
          type: array
          items:
            type: string
        recommendations:
          type: array
          items:
            type: string

    DependencyGraph:
      type: object
      properties:
        rootComponent:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/DependencyNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/DependencyEdge"

    DependencyNode:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        depth:
          type: integer

    DependencyEdge:
      type: object
      properties:
        from:
          type: string
        to:
          type: string
        relationship:
          type: string

    SimulationRequest:
      type: object
      required: [changes]
      properties:
        changes:
          type: array
          items:
            $ref: "#/components/schemas/ProposedChange"

    ProposedChange:
      type: object
      properties:
        targetId:
          type: string
        targetType:
          type: string
        description:
          type: string

    SimulationResult:
      type: object
      properties:
        changeCount:
          type: integer
        totalBlastRadius:
          type: integer
        averageRiskScore:
          type: number
          format: double
        maxRiskScore:
          type: number
          format: double
        allAffectedComponents:
          type: array
          items:
            type: string

    ArchitectureHealth:
      type: object
      properties:
        totalComponents:
          type: integer
        totalDependencies:
          type: integer
        averageCoupling:
          type: number
          format: double
        maxCoupling:
          type: number
          format: double
        healthScore:
          type: number
          format: double
        hotspots:
          type: array
          items:
            type: string

    # ========== Authorization ==========
    CheckPermissionRequest:
      type: object
      required: [userId, resource, action]
      properties:
        userId:
          type: string
        resource:
          type: string
        action:
          type: string

    CheckPermissionResponse:
      type: object
      properties:
        allowed:
          type: boolean
        reason:
          type: string

    UserPermissions:
      type: object
      properties:
        userId:
          type: string
        permissions:
          type: array
          items:
            type: string
        roles:
          type: array

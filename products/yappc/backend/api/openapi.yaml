openapi: 3.0.3
info:
  title: YAPPC Dashboard API
  description: |
    REST API for YAPPC Dashboard capabilities including:
    - Audit Trail Management
    - Version History & Rollback
    - Requirements Management
    - AI Suggestions (Human-in-the-Loop)
    - Architecture Impact Analysis
    - Authorization & Persona Management

    ## Authentication
    All endpoints require authentication via Bearer token in the Authorization header.

    ## Multi-Tenancy
    All endpoints require an `X-Tenant-Id` header for tenant isolation.

    ## Personas
    The API supports 21 personas mapped from YAPPC and canonical requirements models.
    See `/auth/personas` endpoints for persona-based permissions.
  version: 1.0.0
  contact:
    name: YAPPC Team
    email: api@ghatana.com
  license:
    name: Proprietary
    url: https://ghatana.com/license

servers:
  - url: http://localhost:8080
    description: Local Development
  - url: https://api.yappc.ghatana.com
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Audit
    description: Audit trail operations
  - name: Versions
    description: Version history and rollback
  - name: Requirements
    description: Requirements management
  - name: AI Suggestions
    description: AI-generated suggestions with human review
  - name: Architecture
    description: Architecture impact analysis
  - name: Authorization
    description: Permission and persona management

paths:
  # ========== Audit Endpoints ==========
  /api/v1/audit/events:
    get:
      tags: [Audit]
      summary: Query audit events
      description: Retrieve audit events with filtering and pagination
      operationId: queryAuditEvents
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: resourceType
          in: query
          schema:
            type: string
            enum: [REQUIREMENT, VERSION, AI_SUGGESTION, ARCHITECTURE, SECURITY]
        - name: resourceId
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
        - name: userId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated audit events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventsPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Audit]
      summary: Record audit event
      description: Record a new audit event (typically called by services)
      operationId: recordAuditEvent
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordAuditEventRequest"
      responses:
        "201":
          description: Event recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEvent"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/audit/events/{resourceType}/{resourceId}:
    get:
      tags: [Audit]
      summary: Get audit events for resource
      operationId: getAuditEventsForResource
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: resourceType
          in: path
          required: true
          schema:
            type: string
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audit events for the resource
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEvent"

  # ========== Version Endpoints ==========
  /api/v1/versions/{resourceType}/{resourceId}/history:
    get:
      tags: [Versions]
      summary: Get version history
      operationId: getVersionHistory
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: resourceType
          in: path
          required: true
          schema:
            type: string
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Version history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionHistory"

  /api/v1/versions/{resourceType}/{resourceId}:
    post:
      tags: [Versions]
      summary: Create new version
      operationId: createVersion
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: resourceType
          in: path
          required: true
          schema:
            type: string
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVersionRequest"
      responses:
        "201":
          description: Version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"

  /api/v1/versions/{resourceType}/{resourceId}/compare:
    get:
      tags: [Versions]
      summary: Compare two versions
      operationId: compareVersions
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: resourceType
          in: path
          required: true
          schema:
            type: string
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: fromVersion
          in: query
          required: true
          schema:
            type: integer
        - name: toVersion
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Version comparison
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionComparison"

  /api/v1/versions/{resourceType}/{resourceId}/rollback:
    post:
      tags: [Versions]
      summary: Rollback to previous version
      operationId: rollbackVersion
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: resourceType
          in: path
          required: true
          schema:
            type: string
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RollbackRequest"
      responses:
        "200":
          description: Rollback successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"

  # ========== Requirements Endpoints ==========
  /api/v1/requirements:
    get:
      tags: [Requirements]
      summary: Query requirements
      operationId: queryRequirements
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: projectId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/RequirementStatus"
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/RequirementType"
        - name: priority
          in: query
          schema:
            $ref: "#/components/schemas/Priority"
        - name: assignedTo
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of requirements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Requirement"

    post:
      tags: [Requirements]
      summary: Create requirement
      operationId: createRequirement
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRequirementRequest"
      responses:
        "201":
          description: Requirement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Requirement"

  /api/v1/requirements/{id}:
    get:
      tags: [Requirements]
      summary: Get requirement by ID
      operationId: getRequirement
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Requirement details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Requirement"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Requirements]
      summary: Update requirement
      operationId: updateRequirement
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRequirementRequest"
      responses:
        "200":
          description: Requirement updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Requirement"

    delete:
      tags: [Requirements]
      summary: Delete requirement
      operationId: deleteRequirement
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Requirement deleted

  /api/v1/requirements/{id}/submit:
    post:
      tags: [Requirements]
      summary: Submit for review
      operationId: submitRequirementForReview
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Submitted for review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Requirement"

  /api/v1/requirements/{id}/approve:
    post:
      tags: [Requirements]
      summary: Approve requirement
      operationId: approveRequirement
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Requirement approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Requirement"

  /api/v1/requirements/{id}/reject:
    post:
      tags: [Requirements]
      summary: Reject requirement
      operationId: rejectRequirement
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Requirement rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Requirement"

  /api/v1/requirements/funnel:
    get:
      tags: [Requirements]
      summary: Get requirements funnel metrics
      operationId: getRequirementsFunnel
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Funnel metrics by status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementsFunnel"

  # ========== AI Suggestions Endpoints ==========
  /api/v1/ai/suggestions:
    get:
      tags: [AI Suggestions]
      summary: Get pending suggestions (inbox)
      operationId: getAISuggestionsInbox
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: projectId
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/SuggestionType"
        - name: minConfidence
          in: query
          schema:
            type: number
            format: double
            minimum: 0
            maximum: 1
      responses:
        "200":
          description: List of pending suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AISuggestion"

    post:
      tags: [AI Suggestions]
      summary: Generate AI suggestion
      operationId: generateAISuggestion
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateSuggestionRequest"
      responses:
        "201":
          description: Suggestion generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISuggestion"

  /api/v1/ai/suggestions/{id}:
    get:
      tags: [AI Suggestions]
      summary: Get suggestion by ID
      operationId: getAISuggestion
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Suggestion details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISuggestion"

  /api/v1/ai/suggestions/{id}/accept:
    post:
      tags: [AI Suggestions]
      summary: Accept suggestion
      operationId: acceptAISuggestion
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptSuggestionRequest"
      responses:
        "200":
          description: Suggestion accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISuggestion"

  /api/v1/ai/suggestions/{id}/reject:
    post:
      tags: [AI Suggestions]
      summary: Reject suggestion
      operationId: rejectAISuggestion
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectSuggestionRequest"
      responses:
        "200":
          description: Suggestion rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISuggestion"

  /api/v1/ai/suggestions/{id}/defer:
    post:
      tags: [AI Suggestions]
      summary: Defer suggestion
      operationId: deferAISuggestion
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Suggestion deferred
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISuggestion"

  /api/v1/ai/suggestions/stats:
    get:
      tags: [AI Suggestions]
      summary: Get suggestion statistics
      operationId: getAISuggestionStats
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Suggestion statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISuggestionStats"

  # ========== Architecture Endpoints ==========
  /api/v1/architecture/impact:
    post:
      tags: [Architecture]
      summary: Analyze impact of change
      operationId: analyzeArchitectureImpact
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImpactAnalysisRequest"
      responses:
        "200":
          description: Impact analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactAnalysisResult"

  /api/v1/architecture/dependencies/{componentId}:
    get:
      tags: [Architecture]
      summary: Get dependency graph
      operationId: getDependencyGraph
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: componentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dependency graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DependencyGraph"

  /api/v1/architecture/simulate:
    post:
      tags: [Architecture]
      summary: Simulate changes
      operationId: simulateArchitectureChanges
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulationRequest"
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationResult"

  /api/v1/architecture/health:
    get:
      tags: [Architecture]
      summary: Get architecture health metrics
      operationId: getArchitectureHealth
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Health metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureHealth"

  # ========== Authorization Endpoints ==========
  /api/v1/auth/check-permission:
    post:
      tags: [Authorization]
      summary: Check permission
      operationId: checkPermission
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckPermissionRequest"
      responses:
        "200":
          description: Permission check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckPermissionResponse"

  /api/v1/auth/users/{userId}/permissions:
    get:
      tags: [Authorization]
      summary: Get user permissions
      operationId: getUserPermissions
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPermissions"

  /api/v1/auth/personas/{persona}/permissions:
    get:
      tags: [Authorization]
      summary: Get persona permissions
      operationId: getPersonaPermissions
      parameters:
        - name: persona
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Persona permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaPermissions"

  /api/v1/auth/personas:
    get:
      tags: [Authorization]
      summary: List all personas
      operationId: listPersonas
      responses:
        "200":
          description: List of personas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Persona"

  # ========== Workspace API ==========
  /api/workspaces:
    get:
      tags: [Workspaces]
      summary: List workspaces
      operationId: listWorkspaces
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
    post:
      tags: [Workspaces]
      summary: Create a workspace
      operationId: createWorkspace
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

  /api/workspaces/{id}:
    get:
      tags: [Workspaces]
      summary: Get workspace by ID
      operationId: getWorkspace
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          description: Workspace not found
    put:
      tags: [Workspaces]
      summary: Update workspace
      operationId: updateWorkspace
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    delete:
      tags: [Workspaces]
      summary: Delete workspace
      operationId: deleteWorkspace
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Workspace deleted

  /api/workspaces/{id}/members:
    get:
      tags: [Workspaces]
      summary: List workspace members
      operationId: listWorkspaceMembers
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMember"
    post:
      tags: [Workspaces]
      summary: Add member to workspace
      operationId: addWorkspaceMember
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "201":
          description: Member added

  /api/workspaces/{id}/settings:
    get:
      tags: [Workspaces]
      summary: Get workspace settings
      operationId: getWorkspaceSettings
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace settings
          content:
            application/json:
              schema:
                type: object
    put:
      tags: [Workspaces]
      summary: Update workspace settings
      operationId: updateWorkspaceSettings
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Settings updated

  # ========== Approval Workflow API ==========
  /api/approvals:
    post:
      tags: [Approvals]
      summary: Create approval workflow
      operationId: createApprovalWorkflow
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApprovalRequest"
      responses:
        "201":
          description: Approval workflow created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalWorkflow"

  /api/approvals/pending:
    get:
      tags: [Approvals]
      summary: Get pending approvals
      operationId: getPendingApprovals
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: List of pending approvals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApprovalWorkflow"

  /api/approvals/{id}:
    get:
      tags: [Approvals]
      summary: Get approval workflow by ID
      operationId: getApprovalWorkflow
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Approval workflow details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalWorkflow"
    delete:
      tags: [Approvals]
      summary: Cancel approval workflow
      operationId: cancelApprovalWorkflow
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Workflow cancelled

  /api/approvals/{id}/decision:
    post:

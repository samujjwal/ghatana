personas:
  # Technical Execution Personas
  - id: "developer"
    label: "Developer"
    description: "Code quality, CI/CD pipelines, and development metrics"
    category: "TECHNICAL"
    icon: "👨‍💻"
    color: "#2196F3"
    focusAreas:
      - "Code reviews"
      - "Build pipelines"
      - "Testing"
      - "Deployments"
    permissions:
      - "code.read"
      - "code.write"
      - "build.trigger"
      - "tests.run"

  - id: "tech-lead"
    label: "Tech Lead"
    description: "Team leadership, technical direction, and code standards"
    category: "TECHNICAL"
    icon: "👔"
    color: "#00BCD4"
    focusAreas:
      - "Team guidance"
      - "Architecture review"
      - "Standards"
      - "Mentoring"
    permissions:
      - "code.read"
      - "code.write"
      - "code.approve"
      - "architecture.review"
      - "team.manage"

  - id: "architect"
    label: "Architect"
    description: "System design, scalability, and architectural decisions"
    category: "TECHNICAL"
    icon: "🏗️"
    color: "#FF9800"
    focusAreas:
      - "System design"
      - "Services"
      - "Scalability"
      - "Technology decisions"
    permissions:
      - "architecture.design"
      - "architecture.review"
      - "system.design"
      - "technology.evaluate"

  - id: "infrastructure-architect"
    label: "Infrastructure Architect"
    description: "Cloud architecture, infrastructure design, and platform strategy"
    category: "TECHNICAL"
    icon: "🏛️"
    color: "#607D8B"
    focusAreas:
      - "Cloud architecture"
      - "Infrastructure design"
      - "Platform strategy"
      - "Capacity planning"
    permissions:
      - "infrastructure.design"
      - "cloud.architecture"
      - "platform.strategy"

  # DevOps & Operations Personas
  - id: "devops"
    label: "DevOps"
    description: "Infrastructure, deployments, and operational excellence"
    category: "TECHNICAL"
    icon: "⚙️"
    color: "#4CAF50"
    focusAreas:
      - "Infrastructure"
      - "Deployments"
      - "Containers"
      - "Monitoring"
    permissions:
      - "deploy.trigger"
      - "infrastructure.manage"
      - "pipeline.configure"
      - "monitoring.setup"

  - id: "devops-engineer"
    label: "DevOps Engineer"
    description: "CI/CD automation, infrastructure as code, and deployment management"
    category: "TECHNICAL"
    icon: "🔧"
    color: "#4CAF50"
    focusAreas:
      - "CI/CD pipelines"
      - "Infrastructure as Code"
      - "Deployment automation"
      - "Container orchestration"
    permissions:
      - "pipeline.manage"
      - "infrastructure.provision"
      - "deploy.execute"
      - "container.manage"

  - id: "sre"
    label: "Site Reliability Engineer"
    description: "System reliability, performance optimization, and incident response"
    category: "TECHNICAL"
    icon: "🛠️"
    color: "#388E3C"
    focusAreas:
      - "Reliability engineering"
      - "Performance tuning"
      - "Incident management"
      - "SLO/SLA monitoring"
    permissions:
      - "monitoring.configure"
      - "incident.respond"
      - "performance.optimize"
      - "reliability.manage"

  - id: "operator"
    label: "Operator"
    description: "Real-time monitoring, alerting, and incident response"
    category: "TECHNICAL"
    icon: "📊"
    color: "#9C27B0"
    focusAreas:
      - "Monitoring"
      - "Alerting"
      - "Uptime"
      - "Performance"
    permissions:
      - "monitoring.view"
      - "alerts.manage"
      - "incident.report"
      - "logs.access"

  - id: "infrastructure-engineer"
    label: "Infrastructure Engineer"
    description: "Cloud infrastructure, networking, and disaster recovery"
    category: "TECHNICAL"
    icon: "🌐"
    color: "#388E3C"
    focusAreas:
      - "Cloud resources"
      - "Networking"
      - "Database"
      - "DR planning"
    permissions:
      - "infrastructure.provision"
      - "network.configure"
      - "database.manage"
      - "backup.manage"

  # Security & Compliance Personas
  - id: "security"
    label: "Security"
    description: "Threat detection, vulnerability management, and compliance"
    category: "GOVERNANCE"
    icon: "🔐"
    color: "#F44336"
    focusAreas:
      - "Vulnerabilities"
      - "Compliance"
      - "Incidents"
      - "Access control"
    permissions:
      - "security.scan"
      - "vulnerability.assess"
      - "compliance.audit"
      - "access.review"

  - id: "security-engineer"
    label: "Security Engineer"
    description: "Security architecture, threat modeling, and incident response"
    category: "GOVERNANCE"
    icon: "🛡️"
    color: "#D32F2F"
    focusAreas:
      - "Threat modeling"
      - "Security audit"
      - "Incident response"
      - "Penetration testing"
    permissions:
      - "security.audit"
      - "threat.model"
      - "security.test"
      - "incident.investigate"

  - id: "compliance-officer"
    label: "Compliance Officer"
    description: "Regulatory compliance, policy enforcement, and audit management"
    category: "GOVERNANCE"
    icon: "📜"
    color: "#C62828"
    focusAreas:
      - "Regulatory compliance"
      - "Policy enforcement"
      - "Audit management"
      - "Risk assessment"
    permissions:
      - "compliance.audit"
      - "policy.enforce"
      - "audit.manage"
      - "risk.assess"

  - id: "auditor"
    label: "Auditor"
    description: "Compliance audits, security assessments, and governance validation"
    category: "GOVERNANCE"
    icon: "🔍"
    color: "#AD1457"
    focusAreas:
      - "Audit trails"
      - "Compliance validation"
      - "Security assessments"
      - "Report generation"
    permissions:
      - "audit.view"
      - "compliance.verify"
      - "report.generate"
      - "findings.document"

  # Quality Assurance Personas
  - id: "qa-engineer"
    label: "QA Engineer"
    description: "Testing strategy, quality metrics, and automation"
    category: "TECHNICAL"
    icon: "✅"
    color: "#1976D2"
    focusAreas:
      - "Test automation"
      - "QA metrics"
      - "Test planning"
      - "Bug analysis"
    permissions:
      - "test.execute"
      - "test.automate"
      - "quality.measure"
      - "defect.track"

  - id: "quality-engineer"
    label: "Quality Engineer"
    description: "Quality assurance, test automation, and defect management"
    category: "TECHNICAL"
    icon: "🎯"
    color: "#1565C0"
    focusAreas:
      - "Quality gates"
      - "Test coverage"
      - "Defect analysis"
      - "Process improvement"
    permissions:
      - "quality.gate.manage"
      - "test.coverage.review"
      - "defect.analyze"
      - "process.improve"

  # Product & Management Personas
  - id: "product-manager"
    label: "Product Manager"
    description: "Roadmap management, requirements, and stakeholder communication"
    category: "MANAGEMENT"
    icon: "📋"

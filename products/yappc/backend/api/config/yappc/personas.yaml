  - id: "engineering-manager"
    label: "Engineering Manager"
    description: "Team management, resource planning, and delivery oversight"
    category: "MANAGEMENT"
    icon: "👨‍💼"
    color: "#0277BD"
    focusAreas:
      - "Team performance"
      - "Resource planning"
      - "Delivery tracking"
      - "People development"
    permissions:

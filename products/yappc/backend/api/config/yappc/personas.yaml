      - "resource.plan"
      - "delivery.track"
      - "performance.review"

  - id: "release-manager"
    label: "Release Manager"
    description: "Release planning, coordination, and deployment orchestration"
    category: "MANAGEMENT"
    icon: "🚀"
    color: "#01579B"
    focusAreas:
      - "Release planning"

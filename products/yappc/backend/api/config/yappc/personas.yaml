      - "Requirements"
      - "User feedback"
      - "Prioritization"
    permissions:
      - "roadmap.manage"
      - "requirements.define"
      - "feature.prioritize"
      - "stakeholder.communicate"

  - id: "product-owner"
    label: "Product Owner"

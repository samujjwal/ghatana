# Prometheus configuration for YAPPC API monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # YAPPC API metrics
  - job_name: "yappc-api"
    static_configs:
      - targets: ["yappc-api:8080"]
    metrics_path: "/actuator/prometheus"
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Redis metrics (requires redis_exporter)
  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

# YAPPC Authoritative Persona Definitions
# This file is the SINGLE SOURCE OF TRUTH for all persona-to-role/permission mappings.
# PersonaMapping.java delegates all lookups here via PersonaLoader.
# Permission values MUST match the String constants in com.ghatana.platform.security.rbac.Permission.
# To add or modify personas, update this file only.

personas:

  # ── Administrative ───────────────────────────────────────────────────────────
  - id: WORKSPACE_ADMIN
    display_name: "Workspace Admin"
    category: administrative
    role: ADMIN
    permissions:
      - workspace.create
      - workspace.read
      - workspace.update
      - workspace.manage_members
      - project.create
      - project.read
      - project.update
      - requirement.create
      - requirement.read
      - requirement.update
      - requirement.approve
      - role.assign
      - user.manage

  - id: STAKEHOLDER
    display_name: "Stakeholder"
    category: administrative
    role: VIEWER
    permissions:
      - project.read
      - requirement.read

  # ── Strategic ─────────────────────────────────────────────────────────────

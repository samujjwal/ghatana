apiVersion: v1
kind: Service
metadata:
  name: {{ include "yappc.fullname" . }}
  labels:
    {{- include "yappc.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.yappc.http }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.yappc.metrics }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "yappc.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api

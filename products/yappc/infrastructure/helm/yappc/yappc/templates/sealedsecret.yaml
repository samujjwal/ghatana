{{/*
  SealedSecret — encrypted secrets that can be safely committed to git.
  Requires Bitnami SealedSecrets controller installed in the cluster.

  Usage:
  1. Install kubeseal CLI: brew install kubeseal
  2. Encrypt your secrets:
     echo -n "my-jwt-secret" | kubeseal --raw --scope cluster-wide --name yappc-secrets
  3. Put the encrypted values in your values-production.yaml under sealedSecrets.encryptedData
  4. Deploy: helm install yappc . -f values.yaml -f values-production.yaml
*/}}
{{- if .Values.sealedSecrets.enabled }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "yappc.fullname" . }}-secrets
  labels:
    {{- include "yappc.labels" . | nindent 4 }}
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
spec:
  encryptedData:
    {{- range $key, $value := .Values.sealedSecrets.encryptedData }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  template:
    metadata:
      name: {{ include "yappc.fullname" . }}-secrets
      labels:
        {{- include "yappc.labels" . | nindent 8 }}
    type: Opaque
{{- end }}

{{/*
  Secret for non-SealedSecret environments (dev/local).
  In production, use SealedSecrets — see sealedsecret.yaml template.
*/}}
{{- if not .Values.sealedSecrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "yappc.fullname" . }}-secrets
  labels:
    {{- include "yappc.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwt.secret | quote }}
  JWT_ISSUER: {{ .Values.secrets.jwt.issuer | quote }}
  JWT_EXPIRY_HOURS: {{ .Values.secrets.jwt.expiryHours | quote }}
  DATABASE_PASSWORD: {{ .Values.secrets.database.password | quote }}
  DATABASE_ENCRYPTION_KEY: {{ .Values.secrets.database.encryptionKey | quote }}
  TLS_KEYSTORE_PASSWORD: {{ .Values.secrets.tls.keystorePassword | quote }}
{{- end }}

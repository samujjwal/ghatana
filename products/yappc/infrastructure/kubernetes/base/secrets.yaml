# Kubernetes Secrets for YAPPC Platform
# NOTE: This is a TEMPLATE. In production, use sealed-secrets or external secret management.
# DO NOT commit actual secrets to git!

apiVersion: v1
kind: Secret
metadata:
  name: yappc-secrets
  namespace: yappc
  labels:
    app: yappc-agents
type: Opaque
stringData:
  # JWT Authentication (CHANGE IN PRODUCTION!)
  JWT_SECRET: "CHANGE_ME_TO_RANDOM_256_BIT_STRING"
  JWT_ISSUER: "yappc-production"
  JWT_EXPIRY_HOURS: "24"
  
  # Database (CHANGE IN PRODUCTION!)
  DATABASE_PASSWORD: "CHANGE_ME_TO_STRONG_PASSWORD"
  DB_ENCRYPTION_KEY: "CHANGE_ME_TO_RANDOM_256_BIT_KEY"
  
  # LLM API Keys (optional - for external providers)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  OLLAMA_API_KEY: ""
  
  # TLS/SSL
  TLS_KEYSTORE_PASSWORD: "CHANGE_ME_TO_KEYSTORE_PASSWORD"
---
# Example: Using SealedSecrets (Bitnami)
# Install: kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.0/controller.yaml
# 
# To seal this secret:
# 1. Fill in actual values above
# 2. kubeseal --format yaml < secrets.yaml > sealed-secrets.yaml
# 3. Apply: kubectl apply -f sealed-secrets.yaml
# 4. Delete secrets.yaml (never commit!)

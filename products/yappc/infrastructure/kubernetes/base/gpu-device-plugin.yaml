# NVIDIA Device Plugin for Kubernetes
# Enables GPU scheduling and resource management
# Source: https://github.com/NVIDIA/k8s-device-plugin

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
  labels:
    app: nvidia-device-plugin
spec:
  selector:
    matchLabels:
      app: nvidia-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: nvidia-device-plugin
    spec:
      # Only run on GPU nodes
      nodeSelector:
        nvidia.com/gpu: "true"
      
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      
      # Priority class for system components
      priorityClassName: system-node-critical
      
      containers:
        - name: nvidia-device-plugin
          image: nvcr.io/nvidia/k8s-device-plugin:v0.14.3
          imagePullPolicy: IfNotPresent
          
          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          
          # Environment
          env:
            - name: FAIL_ON_INIT_ERROR
              value: "false"
            - name: NVIDIA_MIG_MONITOR_DEVICES
              value: "all"
            - name: PASS_DEVICE_SPECS
              value: "true"
          
          # Volume mounts
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
      
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
---
# RuntimeClass for GPU workloads
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: nvidia
handler: nvidia

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: yappc

commonLabels:
  app.kubernetes.io/part-of: yappc

resources:
  - ../../helm/yappc/yappc/templates/deployment.yaml
  - ../../helm/yappc/yappc/templates/service.yaml
  - ../../helm/yappc/yappc/templates/configmap.yaml
  - ../../helm/yappc/yappc/templates/ingress.yaml
  - ../../helm/yappc/yappc/templates/hpa.yaml
  - ../../helm/yappc/yappc/templates/pdb.yaml

# Note: Kustomize overlays are for pure-yaml workflows.
# For Helm-based deployments, use: helm install -f values-<env>.yaml

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: yappc-production

bases:
  - ../base

patches:
  - target:
      kind: Deployment
      name: .*
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "3Gi"

# Production uses SealedSecrets — secret.yaml is excluded.
# Use Helm with: helm install -f values.yaml -f values-production.yaml
# where values-production.yaml sets sealedSecrets.enabled=true

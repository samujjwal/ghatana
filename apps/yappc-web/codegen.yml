schema: '../../../libs/graphql/src/schema.graphql'
documents: 'src/**/*.{ts,tsx}'
generates:
  src/generated/graphql.ts:
    plugins:
      - 'typescript'
      - 'typescript-operations'
      - 'typescript-urql'
    config:
      withHooks: true
      withComponent: false
      withHOC: false
      scalars:
        DateTime: string
        ID: string
  src/generated/schema.json:
    plugins:
      - 'introspection'
